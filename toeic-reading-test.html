<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Reading Test | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Bảng màu SnapEnglish Deep Indigo & Sunset Orange --- */
        :root {
            --primary-eng: #3f51b5; /* Tím Than chuyên nghiệp */
            --secondary-eng: #e8eaf6; /* Tím nhạt thanh lịch */
            --accent-eng: #ff9800; /* Cam hoàng hôn nổi bật */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --text-main: #1a237e;
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 1);
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0;
            padding: 50px 20px;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        /* --- Background trang trí --- */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.25;
        }
        .shape-1 { width: 400px; height: 400px; background: var(--primary-eng); top: -100px; left: -100px; border-radius: 50%; }
        .shape-2 { width: 350px; height: 350px; background: var(--accent-eng); bottom: -50px; right: -50px; border-radius: 40% 60% 70% 30%; }

        /* --- Header --- */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            font-size: 38px; 
            margin-bottom: 10px;
            color: var(--primary-eng);
            letter-spacing: -1px;
            font-weight: 800;
        }

        .brand-accent { color: var(--accent-eng); }

        p.subtitle {
            color: #5c6bc0;
            font-size: 17px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* --- Tìm kiếm --- */
        .search-wrapper {
            max-width: 550px;
            margin: 0 auto 50px auto;
        }

        #searchInput {
            width: 100%;
            padding: 18px 28px;
            border-radius: 20px;
            border: 2px solid transparent;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            box-shadow: 0 15px 30px rgba(63, 81, 181, 0.1);
            box-sizing: border-box; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #searchInput:focus {
            border-color: var(--primary-eng);
            outline: none;
            background: #fff;
            transform: scale(1.02);
            box-shadow: 0 20px 40px rgba(63, 81, 181, 0.2);
        }

        #searchInput::placeholder { color: #9fa8da; }

        /* --- Grid Container --- */
        .container { 
            max-width: 1100px; 
            margin: auto; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* --- Card Unit Style --- */
        .unit-card { 
            background: var(--glass-bg);
            padding: 25px;
            border-radius: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            position: relative;
            animation: fadeIn 0.6s ease backwards;
        }

        .unit-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: #fff;
            box-shadow: 0 15px 35px rgba(63, 81, 181, 0.2);
            border-color: var(--primary-eng);
        }

        .status-badge {
            width: 8px;
            height: 50px;
            border-radius: 12px;
            background: var(--primary-eng);
            margin-right: 20px;
            transition: 0.4s;
        }

        .unit-card:hover .status-badge {
            background: var(--accent-eng);
            transform: scaleY(1.2);
        }

        .unit-info { flex-grow: 1; }

        .unit-tag {
            font-size: 11px;
            background: var(--secondary-eng);
            color: var(--primary-eng);
            padding: 4px 12px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: inline-block;
        }

        .unit-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0;
            color: #1a237e;
            line-height: 1.3;
        }

        .arrow-btn {
            color: var(--primary-eng);
            font-size: 22px;
            font-weight: bold;
            opacity: 0.4;
            transition: 0.3s;
        }

        .unit-card:hover .arrow-btn {
            opacity: 1;
            transform: translateX(5px);
            color: var(--accent-eng);
        }

        .hidden { display: none !important; }

        #noResults {
            text-align: center;
            grid-column: 1 / -1;
            padding: 60px;
            color: #7986cb;
            font-size: 20px;
            font-weight: 700;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="header-section">
        <h1>📚 Snap<span class="brand-accent">FullReading</span></h1>
        <p class="subtitle">Chinh phục 100 Câu Reading Full Test (2018 - 2026)</p>
    </div>
    
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Nhập năm hoặc số Test để học (VD: 2023, Test 5)...">
    </div>

    <div class="container" id="unitContainer">
        <div id="noResults" class="hidden">Hôm nay chưa tìm thấy bài thi này rồi... 🔎</div>
    </div>

   <script>
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.getElementById('unitContainer');
        const noResultsMsg = document.getElementById('noResults');
        const searchInput = document.getElementById('searchInput');

        const startYear = 2018;
        const endYear = 2026;
        const lessons = [];

        // Tạo danh sách Full Reading Test
        for (let year = startYear; year <= endYear; year++) {
            const maxTest = (year === 2018) ? 5 : 10;
            
            for (let test = 1; test <= maxTest; test++) {
                lessons.push({
                    year: year,
                    test: test,
                    title: `Reading Full Test ${test} - ${year}`,
                    // URL chuẩn theo yêu cầu
                    url: `toeic-reading-test-${test}-${year}.html`
                });
            }
        }

        function renderLessons() {
            lessons.forEach((item, index) => {
                const card = document.createElement('a');
                card.className = 'unit-card';
                card.href = item.url;
                
                card.setAttribute('data-search', `${item.year} test ${item.test}`);
                
                // Hiệu ứng render so le
                card.style.animationDelay = `${(index % 15) * 0.03}s`;

                card.innerHTML = `
                    <div class="status-badge"></div>
                    <div class="unit-info">
                        <span class="unit-tag">Reading 100 Câu</span>
                        <h3 class="unit-title">${item.title}</h3>
                    </div>
                    <div class="arrow-btn">→</div>
                `;
                container.appendChild(card);
            });
        }

        // Tìm kiếm thông minh
        searchInput.addEventListener('input', function() {
            const filter = this.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.unit-card');
            let count = 0;

            // Xử lý loại bỏ "part" nếu người dùng nhập nhầm
            const cleanFilter = filter.replace(/part\s*\d/g, '').trim();

            cards.forEach(card => {
                const searchText = card.getAttribute('data-search');
                if (searchText.includes(cleanFilter)) {
                    card.classList.remove('hidden');
                    count++;
                } else {
                    card.classList.add('hidden');
                }
            });

            if (count === 0) {
                noResultsMsg.classList.remove('hidden');
            } else {
                noResultsMsg.classList.add('hidden');
            }
        });

        renderLessons();
    });
   </script>
</body>
</html>
