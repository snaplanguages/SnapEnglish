<style>
  body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    box-sizing: border-box;
    background: linear-gradient(135deg, #f5f7fa 0%, #e2eafc 100%);
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: #333;
    overflow: hidden;
  }

  .container {
    display: flex;
    width: 100vw;
    height: 100vh;
  }

  .left-col {
    width: 66.66%;
    display: flex;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
    gap: 20px;
  }

  .right-col {
    width: 33.33%;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 15px;
    scroll-behavior: smooth;
  }

  .video-wrapper {
    height: 66.66%;
    width: 100%;
    border-radius: 24px;
    overflow: hidden;
  }

  .record-wrapper {
    height: 33.33%;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .glass {
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
  }

  .record-wrapper h3 {
    margin: 0 0 10px 0;
    color: #555;
    font-size: 1.4em;
  }

  .record-btn {
    background: linear-gradient(135deg, #ffb6c1, #ffc0cb);
    border: none;
    padding: 14px 36px;
    border-radius: 30px;
    color: #fff;
    font-size: 1.1em;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255, 182, 193, 0.6);
    transition: all 0.2s ease-in-out;
    margin-bottom: 15px;
  }

  .record-btn:active {
    transform: scale(0.96);
  }

  .record-btn.recording {
    background: linear-gradient(135deg, #ff6b81, #ff8499);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(255, 107, 129, 0.7); }
    70% { box-shadow: 0 0 0 15px rgba(255, 107, 129, 0); }
    100% { box-shadow: 0 0 0 0 rgba(255, 107, 129, 0); }
  }

  .result-box {
    width: 90%;
    min-height: 45px;
    background: rgba(255, 255, 255, 0.8);
    border-radius: 12px;
    padding: 10px 15px;
    margin-bottom: 10px;
    font-style: italic;
    color: #666;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  .score-box {
    font-size: 1.5em;
    font-weight: 700;
    color: #4CAF50;
  }

  .script-line {
    padding: 15px 20px;
    border-radius: 16px;
    transition: 0.3s;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.4);
  }

  .script-line:hover {
    background: rgba(255, 255, 255, 0.7);
  }

  .script-line.active {
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    transform: scale(1.02);
    border-left: 5px solid #ffb6c1;
  }

  .en-text {
    font-size: 1.15em;
    font-weight: 600;
    color: #333;
    line-height: 1.5;
  }

  .vi-text {
    font-size: 0.95em;
    color: #777;
    margin-top: 8px;
    line-height: 1.4;
  }

  .word {
    transition: color 0.1s, text-shadow 0.1s;
  }

  .word.highlight-word {
    color: #d81b60;
    text-shadow: 0 0 10px rgba(216, 27, 96, 0.3);
  }
</style>

    const scriptContainer = document.getElementById('script-container');
    
    transcriptData.forEach((line, index) => {
      const div = document.createElement('div');
      div.className = 'script-line';
      div.id = 'line-' + index;
      
      const enDiv = document.createElement('div');
      enDiv.className = 'en-text';
      
      line.words.forEach((w, wIdx) => {
        const span = document.createElement('span');
        span.className = 'word';
        span.id = `word-${index}-${wIdx}`;
        span.innerText = w.word + " ";
        enDiv.appendChild(span);
      });

      const viDiv = document.createElement('div');
      viDiv.className = 'vi-text';
      viDiv.innerText = line.vi;

      div.appendChild(enDiv);
      div.appendChild(viDiv);

      div.onclick = () => {
        if(player && player.seekTo) {
          player.seekTo(line.start, true);
          player.playVideo();
        }
      };

      scriptContainer.appendChild(div);
    });

    let player;
    function onYouTubeIframeAPIReady() {
      player = new YT.Player('ytplayer', {
        height: '100%',
        width: '100%',
        videoId: 'zgAeBUE1Mpg',
        playerVars: {
          'playsinline': 1,
          'rel': 0
        },
        events: {
          'onStateChange': onPlayerStateChange
        }
      });
    }

    let checkInterval;
    let currentLineIndex = -1;

    function onPlayerStateChange(event) {
      if (event.data == YT.PlayerState.PLAYING) {
        checkInterval = setInterval(updateHighlight, 100);
      } else {
        clearInterval(checkInterval);
      }
    }

    function updateHighlight() {
      const time = player.getCurrentTime();
      let foundLine = -1;

      for (let i = 0; i < transcriptData.length; i++) {
        if (time >= transcriptData[i].start && time <= transcriptData[i].end) {
          foundLine = i;
          break;
        }
      }

      if (foundLine !== -1) {
        if (currentLineIndex !== foundLine) {
          if (currentLineIndex !== -1) {
            document.getElementById('line-' + currentLineIndex).classList.remove('active');
            const prevWords = document.querySelectorAll(`#line-${currentLineIndex} .word`);
            prevWords.forEach(w => w.classList.remove('highlight-word'));
          }
          const activeLine = document.getElementById('line-' + foundLine);
          activeLine.classList.add('active');
          
          activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
          currentLineIndex = foundLine;
        }

        const words = transcriptData[currentLineIndex].words;
        words.forEach((w, idx) => {
          const span = document.getElementById(`word-${currentLineIndex}-${idx}`);
          if (time >= w.start && time <= w.end) {
            span.classList.add('highlight-word');
          } else {
            span.classList.remove('highlight-word');
          }
        });
      }
    }

    // Logic nút bấm Toggle Start/Stop thay vì giữ nguyên
    const recordBtn = document.getElementById('recordBtn');
    const resultText = document.getElementById('resultText');
    const scoreText = document.getElementById('scoreText');

    let recognition;
    let isRecording = false;

    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'en-US';

      recognition.onresult = function(event) {
        const spoken = event.results[0][0].transcript;
        resultText.innerText = `"${spoken}"`;
        calculateScore(spoken);
      };

      recognition.onerror = function(event) {
        resultText.innerText = "Error recognizing speech. Try again.";
        resetRecordButton();
      };

      recognition.onend = function() {
        if (isRecording) resetRecordButton();
      };

      recordBtn.onclick = () => {
        if (!isRecording) {
          // Bắt đầu
          if(player && player.pauseVideo) player.pauseVideo();
          recognition.start();
          isRecording = true;
          recordBtn.innerText = "Stop & Evaluate";
          recordBtn.classList.add('recording');
          resultText.innerText = "Listening...";
        } else {
          // Dừng
          recognition.stop();
          resetRecordButton();
        }
      };

    } else {
      resultText.innerText = "Web Speech API is not supported in this browser. Please use Chrome.";
    }

    function resetRecordButton() {
      isRecording = false;
      recordBtn.innerText = "Click to Speak";
      recordBtn.classList.remove('recording');
    }

    function calculateScore(spoken) {
      if (currentLineIndex === -1) {
        scoreText.innerText = "Please select a sentence!";
        scoreText.style.color = "#ff6b81";
        return;
      }
      
      const targetSentence = transcriptData[currentLineIndex].words.map(w => w.word).join(" ");
      const targetText = targetSentence.toLowerCase().replace(/[^\w\s]/gi, '');
      const spokenText = spoken.toLowerCase().replace(/[^\w\s]/gi, '');
      
      const targetWords = targetText.split(' ');
      const spokenWords = spokenText.split(' ');
      
      let matches = 0;
      targetWords.forEach(word => {
        if (spokenWords.includes(word)) matches++;
      });
      
      let percentage = Math.round((matches / targetWords.length) * 100);
      if (percentage > 100) percentage = 100;
      
      scoreText.innerText = `Accuracy: ${percentage}%`;
      scoreText.style.color = percentage >= 80 ? "#4CAF50" : (percentage >= 50 ? "#FF9800" : "#ff6b81");
    }
