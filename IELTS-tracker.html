<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEnglish IELTS Tracker - Chinh Phục Điểm Số</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B6B; /* Đỏ cam năng động */
            --secondary: #4ECDC4; /* Xanh ngọc dịu nhẹ */
            --listening: #45B7D1; /* Xanh dương */
            --reading: #96CEB4; /* Xanh lá */
            --writing: #FFBE0B; /* Vàng */
            --speaking: #9D4EDD; /* Tím */
            --bg-color: #f7f9fc;
            --text-main: #2d3436;
            --correct: #4caf50;
            --incorrect: #f44336;
            --total: #9c27b0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        .header p {
            color: #636e72;
            font-weight: 600;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media(max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        /* Form Style */
        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 1px solid #eee;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.2);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Quicksand', sans-serif;
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-reset {
            background: #ff7675;
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        /* Circular Progress & Estimated Score */
        .score-display {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .circle-wrap {
            width: 120px;
            height: 120px;
            background: #e6e9f0;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .circle-inner {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            z-index: 10;
        }

        /* History Table */
        .history-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            background: #fafafa;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .history-info strong { display: block; font-size: 16px; }
        .history-info span { font-size: 13px; color: #777; }
        
        .score-stats {
            margin-top: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .c-green { color: var(--correct); }
        .c-red { color: var(--incorrect); }
        .c-purple { color: var(--total); }

        .btn-delete {
            background: #ffeaa7;
            color: #d63031;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: -100px;
            right: 20px;
            background: white;
            border-left: 5px solid var(--secondary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: bottom 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            max-width: 300px;
        }

        #toast.show {
            bottom: 20px;
        }

        #toast .title { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        #toast .message { font-size: 14px; color: #555; line-height: 1.4; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>SnapEnglish IELTS Tracker 🚀</h1>
            <p>Kỷ luật là cầu nối giữa mục tiêu và thành tựu</p>
        </div>

        <div class="grid-layout">
            <div>
                <div class="card">
                    <form id="scoreForm">
                        <div class="form-group">
                            <label>Kỹ năng</label>
                            <select id="skill" required>
                                <option value="Listening">Listening 🎧</option>
                                <option value="Reading">Reading 📖</option>
                                <option value="Writing">Writing ✍️</option>
                                <option value="Speaking">Speaking 🗣️</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tên bài thi (VD: Cam 18 - Test 1)</label>
                            <input type="text" id="testName" placeholder="Nhập tên bài thi..." required>
                        </div>
                        <div class="form-group">
                            <label>Thời gian làm bài (Phút)</label>
                            <input type="number" id="timeTaken" placeholder="Ví dụ: 45" required>
                        </div>
                        <div class="form-group">
                            <label>Tổng số câu hỏi</label>
                            <input type="number" id="totalQ" value="40" required>
                        </div>
                        <div class="form-group">
                            <label>Số câu ĐÚNG</label>
                            <input type="number" id="correctQ" placeholder="Ví dụ: 30" required>
                        </div>
                        
                        <button type="submit" class="btn btn-submit">Ghi Nhận Điểm 🌟</button>
                    </form>

                    <div class="score-display" id="scoreDisplay">
                        <p style="font-weight: bold; margin-bottom: 10px;">Band Điểm Ước Tính</p>
                        <div class="circle-wrap" id="circleWrap">
                            <div class="circle-inner" id="estimatedBand">0.0</div>
                        </div>
                        <p style="margin-top: 10px; font-size: 14px; color: #777;" id="scoreQuote"></p>
                    </div>
                </div>
            </div>

            <div>
                <div class="card" style="margin-bottom: 20px;">
                    <canvas id="progressChart" height="150"></canvas>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0;">Lịch sử luyện tập</h3>
                        <button class="btn btn-reset" style="width: auto; margin: 0; padding: 8px 15px; font-size: 14px;" onclick="resetAll()">Xóa tất cả</button>
                    </div>
                    <div class="history-list" id="historyList">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">
        <div class="title" id="toastTitle">SnapBot thông báo 🤖</div>
        <div class="message" id="toastMessage"></div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('snapEnglishData')) || [];
        let chartInstance = null;

        // Bảng quy đổi điểm IELTS Reading/Listening (Ước tính chung)
        function calculateIELTSBand(correct, total) {
            let percentage = correct / total;
            if (percentage >= 0.97) return 9.0;
            if (percentage >= 0.87) return 8.0;
            if (percentage >= 0.75) return 7.0;
            if (percentage >= 0.57) return 6.0;
            if (percentage >= 0.4) return 5.0;
            if (percentage >= 0.25) return 4.0;
            return ((percentage * 9)).toFixed(1); // Ước tính cho W/S hoặc form không chuẩn
        }

        function init() {
            renderHistory();
            renderChart();
        }

        document.getElementById('scoreForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const skill = document.getElementById('skill').value;
            const testName = document.getElementById('testName').value;
            const timeTaken = document.getElementById('timeTaken').value;
            const totalQ = parseInt(document.getElementById('totalQ').value);
            const correctQ = parseInt(document.getElementById('correctQ').value);
            
            if (correctQ > totalQ) {
                alert("Số câu đúng không thể lớn hơn tổng số câu!");
                return;
            }

            const incorrectQ = totalQ - correctQ;
            const bandScore = calculateIELTSBand(correctQ, totalQ);
            const dateStr = new Date().toLocaleDateString('vi-VN');
            const timestamp = Date.now();

            const newRecord = {
                id: timestamp, date: dateStr, skill, testName, timeTaken, totalQ, correctQ, incorrectQ, bandScore
            };

            // So sánh và hiển thị popup (Toast)
            compareAndShowToast(newRecord);

            // Lưu dữ liệu
            records.push(newRecord);
            localStorage.setItem('snapEnglishData', JSON.stringify(records));

            // Hiển thị vòng tròn điểm
            showCircleScore(bandScore, correctQ, totalQ);

            // Cập nhật UI
            renderHistory();
            renderChart();
            this.reset();
            document.getElementById('totalQ').value = 40; // reset về mặc định 40
        });

        function showCircleScore(band, correct, total) {
            const display = document.getElementById('scoreDisplay');
            const wrap = document.getElementById('circleWrap');
            const bandEl = document.getElementById('estimatedBand');
            const quoteEl = document.getElementById('scoreQuote');
            
            display.style.display = 'block';
            bandEl.innerText = band;
            
            const percentage = (correct / total) * 100;
            wrap.style.background = `conic-gradient(var(--secondary) ${percentage}%, #e6e9f0 0)`;

            if(band >= 7.0) quoteEl.innerText = "Wow! Tuyệt vời quá Snap-er ơi! Giữ vững phong độ nhé! ✨";
            else if(band >= 5.0) quoteEl.innerText = "Khá lắm! Cố gắng chú ý các bẫy nhỏ để bứt phá nha! 💪";
            else quoteEl.innerText = "Vạn sự khởi đầu nan. Làm lại review lỗi sai kỹ là giỏi liền! 💖";
        }

        function compareAndShowToast(newRecord) {
            // Tìm bài thi gần nhất cùng kỹ năng
            const previousRecords = records.filter(r => r.skill === newRecord.skill);
            if (previousRecords.length === 0) {
                showToast("Chào mừng Snap-er!", `Lần đầu nhập điểm ${newRecord.skill}. Hãy giữ thói quen luyện tập mỗi ngày nhé!`);
                return;
            }

            const lastRecord = previousRecords[previousRecords.length - 1];
            const diff = newRecord.correctQ - lastRecord.correctQ;

            let title = "";
            let msg = "";

            if (diff > 0) {
                title = "Đỉnh quá Snap-er ơi! 🎉";
                msg = `Điểm ${newRecord.skill} hôm nay cao hơn lần trước! Bạn đã đúng thêm được ${diff} câu. Xứng đáng được ly trà sữa!`;
            } else if (diff < 0) {
                title = "Đừng nản chí nha! 🥺";
                msg = `Điểm ${newRecord.skill} hơi rớt nhẹ xíu so với lần trước. Đừng buồn, chỉ cần đúng thêm ${Math.abs(diff)} câu nữa là vượt kỷ lục cũ rồi!`;
            } else {
                title = "Phong độ ổn định! ⚖️";
                msg = `Cũng ngang ngửa lần trước đó! Đọc kỹ transcript/đáp án để bứt phá thêm vào ngày mai nha!`;
            }

            showToast(title, msg);
        }

        function showToast(title, message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMessage').innerText = message;
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 6000); // Ẩn sau 6 giây
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            // Xếp mới nhất lên đầu
            const reversed = [...records].reverse();

            reversed.forEach(record => {
                const colors = {
                    'Listening': 'var(--listening)',
                    'Reading': 'var(--reading)',
                    'Writing': 'var(--writing)',
                    'Speaking': 'var(--speaking)'
                };

                const div = document.createElement('div');
                div.className = 'history-item';
                div.style.borderLeftColor = colors[record.skill];
                
                div.innerHTML = `
                    <div class="history-info">
                        <strong>[${record.skill}] ${record.testName}</strong>
                        <span>🗓️ ${record.date} | ⏱️ ${record.timeTaken} phút | Đỉnh Band: ${record.bandScore}</span>
                        <div class="score-stats">
                            Đúng: <span class="c-green">${record.correctQ}</span> | 
                            Sai: <span class="c-red">${record.incorrectQ}</span> | 
                            Tổng: <span class="c-purple">${record.totalQ}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteRecord(${record.id})">Xóa</button>
                `;
                list.appendChild(div);
            });
        }

        function deleteRecord(id) {
            if(confirm("Bạn có chắc muốn xóa kết quả này không?")) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('snapEnglishData', JSON.stringify(records));
                renderHistory();
                renderChart();
            }
        }

        function resetAll() {
            if(confirm("Xóa toàn bộ lịch sử luyện tập? Mọi dữ liệu sẽ biến mất đó nha!")) {
                records = [];
                localStorage.removeItem('snapEnglishData');
                document.getElementById('scoreDisplay').style.display = 'none';
                renderHistory();
                renderChart();
            }
        }

        function renderChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            
            // Nhóm labels (các ngày)
            const labels = [...new Set(records.map(r => r.date))];
            
            const getDataBySkill = (skill) => {
                return labels.map(date => {
                    const dayRecords = records.filter(r => r.date === date && r.skill === skill);
                    if(dayRecords.length === 0) return null;
                    // Lấy điểm trung bình nếu 1 ngày làm nhiều bài
                    const avg = dayRecords.reduce((acc, curr) => acc + parseFloat(curr.bandScore), 0) / dayRecords.length;
                    return avg.toFixed(1);
                });
            };

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Listening', data: getDataBySkill('Listening'), borderColor: '#45B7D1', tension: 0.4, spanGaps: true },
                        { label: 'Reading', data: getDataBySkill('Reading'), borderColor: '#96CEB4', tension: 0.4, spanGaps: true },
                        { label: 'Writing', data: getDataBySkill('Writing'), borderColor: '#FFBE0B', tension: 0.4, spanGaps: true },
                        { label: 'Speaking', data: getDataBySkill('Speaking'), borderColor: '#9D4EDD', tension: 0.4, spanGaps: true }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top', labels: { font: { family: 'Quicksand' } } }
                    },
                    scales: {
                        y: { min: 0, max: 9, title: { display: true, text: 'Band Điểm' } }
                    }
                }
            });
        }

        // Khởi tạo app
        init();
    </script>
</body>
</html>
