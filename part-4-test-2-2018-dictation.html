<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 4 Test 2 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* TÔNG MÀU MỚI: Dark Slate & Vivid Rose */
        :root {
            --primary: #334155;         /* Slate 700 */
            --primary-hover: #1E293B;   /* Slate 800 */
            --secondary: #F1F5F9;       /* Slate 100 */
            --accent: #E11D48;          /* Rose 600 (Hồng đậm điểm nhấn) */
            --blue-pastel: #F8FAFC;     /* Slate 50 */
            --blue-dark: #0F172A;       /* Slate 900 */
            --text-dark: #0F172A;       /* Slate 900 */
            --text-light: #64748B;      /* Slate 500 */
            --bg-main: #E2E8F0;         /* Slate 200 (Nền ngoài xám nhạt) */
            --white: #FFFFFF;
            --brand-pink: #E11D48;      /* Rose 600 cho Logo SnapEnglish */
            --brand-text: #0F172A;
            --error-glow: #F43F5E;      /* Đỏ hồng báo lỗi */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }
        .brand-badge {
            background-color: var(--brand-pink);
            color: var(--white);
            font-weight: 800;
            font-size: 26px;
            padding: 8px 20px;
            border-radius: 15px;
            letter-spacing: -0.5px;
        }
        .brand-title {
            color: var(--brand-text);
            font-weight: 800;
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        /* Giao diện mở rộng toàn màn hình */
        .layout-container {
            display: flex;
            gap: 25px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
        }

        .sidebar {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .progress-section { text-align: center; }
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, #eee 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; transition: background 0.5s;
        }
        .progress-circle::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--white); border-radius: 50%; }
        .progress-text { position: relative; z-index: 1; font-size: 28px; font-weight: 700; color: var(--primary); }

        .instructions { background: var(--blue-pastel); padding: 20px; border-radius: 15px; color: var(--blue-dark); border: 1px solid #E2E8F0;}
        .instructions h3 { margin-bottom: 15px; font-size: 18px; }
        .instructions ul { list-style: none; }
        .instructions li { margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        kbd { background: var(--white); border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px; font-family: monospace; font-size: 13px; font-weight: bold; box-shadow: 0 2px 0 #ccc; color: #333;}

        .main-content {
            flex: 3; background: var(--white); border-radius: 20px; padding: 35px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); display: flex; flex-direction: column; position: relative;
        }

        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #eee; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-light); }
        select { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 600; color: var(--text-dark);}

        .audio-section { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px;}
        
        .speaker-badge { display: inline-block; padding: 8px 30px; border-radius: 20px; font-weight: bold; font-size: 16px; }
        .speaker-male { background: #E0E7FF; color: #0369A1; border: 1px solid #BAE6FD; }
        .speaker-female { background: #FCE7F3; color: #BE185D; border: 1px solid #FBCFE8; }

        .btn-play { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 15px rgba(51, 65, 85, 0.3);}
        .btn-play:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .input-section { flex-grow: 1; display: flex; flex-direction: column; }
        
        .message { text-align: center; margin-bottom: 10px; min-height: 45px; }
        .glow-error {
            color: var(--error-glow);
            text-shadow: 0 0 12px rgba(244, 63, 94, 0.6);
            font-weight: 800;
            background: #FFE4E6;
            padding: 2px 6px;
            border-radius: 6px;
            border: 2px dashed var(--error-glow);
            display: inline-block;
            transform: scale(1.05);
        }
        
        textarea { width: 100%; height: 120px; padding: 20px; border: 2px solid #CBD5E1; border-radius: 15px; font-size: 22px; outline: none; transition: 0.3s; resize: none; color: var(--text-dark); line-height: 1.6; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(51, 65, 85, 0.2); }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-enter { background: var(--blue-dark); color: var(--white); }
        .btn-enter:hover { background: #000000; }
        .btn-hint { background: var(--secondary); color: var(--primary); }
        .btn-hint:hover { background: #E2E8F0; }
        .btn-nav { background: #F1F5F9; color: #475569; border: 1px solid #CBD5E1;}
        .btn-nav:hover { background: #E2E8F0; }

        /* MODAL POPUP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 35px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative; max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: #10B981; font-size: 22px; margin-bottom: 15px; text-align: center; }
        .modal-script { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-align: center; padding-bottom: 15px; border-bottom: 2px dashed #eee;}
        .modal-content p { margin-bottom: 10px; line-height: 1.6; font-size: 16px; }
        
        .btn-next-modal { width: 100%; background: var(--primary); color: white; margin-top: 20px; padding: 15px; font-size: 18px; }
        .btn-next-modal:hover { background: var(--primary-hover); }

        /* END SCREEN */
        .end-screen { display: none; text-align: center; padding-top: 20px;}
        .transcript-box { text-align: left; background: #F8FAFC; padding: 25px; border-radius: 15px; height: 400px; overflow-y: auto; margin: 25px 0; border: 1px solid #E2E8F0; line-height: 1.8; font-size: 16px;}

        @media (max-width: 850px) {
            .layout-container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .main-content { flex: none; width: 100%; order: 1; min-height: 500px;}
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="header-brand">
        <div class="brand-badge">SnapEnglish</div>
        <div class="brand-title">Part 4 Test 2</div>
    </div>

    <div class="layout-container" id="app">
        <div class="sidebar">
            <div class="progress-section">
                <h2 style="color: var(--text-dark); margin-bottom: 25px; font-size: 22px;">Tiến độ bài học</h2>
                <div class="progress-circle" id="progress-ring"><div class="progress-text"><span id="progress-percent">0</span>%</div></div>
                <p style="color: var(--text-light); font-weight: 600; margin-top: 15px;">Câu: <span id="current-sentence-num">1</span> / <span id="total-sentences"></span></p>
                <p style="font-size: 14px; color: #888; margin-top: 5px;">Số lần luyện tập: <span id="study-count">0</span></p>
            </div>
            <div class="instructions">
                <h3>⌨️ Hướng dẫn phím tắt</h3>
                <ul>
                    <li><kbd>Ctrl</kbd> Lặp lại Audio.</li>
                    <li><kbd>Tab</kbd> Gợi ý từ tiếp theo.</li>
                    <li><kbd>Enter</kbd> Kiểm tra đáp án / Chuyển câu.</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div id="learning-screen" style="display: flex; flex-direction: column; height: 100%;">
                <div class="settings-bar">
                    <div class="setting-group">
                        <label>Tốc độ:</label>
                        <select id="speed-setting">
                            <option value="0.7">0.7x</option>
                            <option value="0.9" selected>0.9x</option>
                            <option value="1.0">1.0x</option>
                            <option value="1.2">1.2x</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Lặp tự động:</label>
                        <select id="repeat-setting">
                            <option value="1" selected>1 lần</option>
                            <option value="2">2 lần</option>
                            <option value="3">3 lần</option>
                        </select>
                    </div>
                </div>

                <div class="audio-section">
                    <div id="speaker-label" class="speaker-badge speaker-male">📢 Speaker</div>
                    <button class="btn-play" onclick="playAudio()">🔊 Nghe Audio (Ctrl)</button>
                </div>
                
                <div class="message" id="system-message"></div>

                <div class="input-section">
                    <textarea id="user-input" placeholder="Lắng nghe bài thông báo/phát biểu và gõ vào đây..." autofocus></textarea>
                    
                    <div class="actions">
                        <button class="btn btn-nav" onclick="prevSentenceManual()">⬅️ Back</button>
                        <button class="btn btn-enter" onclick="handleEnterAction()">Kiểm tra (Enter)</button>
                        <button class="btn btn-hint" onclick="giveHint()">💡 Gợi ý (Tab)</button>
                        <button class="btn btn-nav" onclick="nextSentenceManual()">Next ➡️</button>
                    </div>
                </div>
            </div>

            <div id="end-screen" class="end-screen">
                <h2 style="color: var(--primary); font-size: 28px;">Tuyệt vời! Hoàn thành Test 🏆</h2>
                <div class="transcript-box" id="full-transcript"></div>
                <div class="actions">
                    <button class="btn btn-enter" onclick="restartLesson()">🔄 Luyện tập lại</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
        <h3>🎉 Chính xác!</h3>
        <div class="modal-script" id="trans-en"></div>
        <p><strong>🇻🇳 Nghĩa:</strong> <span id="trans-vi"></span></p>
        <button class="btn btn-next-modal" onclick="nextSentence()">Qua câu tiếp theo (Enter) ➔</button>
    </div>
</div>

<script>
    // TOÀN BỘ DỮ LIỆU ĐƯỢC TRÍCH XUẤT TỪ PART 4 TEST 2 (Câu 71 đến 100)
    const lessonData = [
        // Talk 1 (71-73)
        { en: "Hello and welcome to the Healthy Ways Exhibition here in San Antonio.", vi: "Xin chào và chào mừng đến với Triển lãm Healthy Ways tại San Antonio.", speaker: "Hiroki", gender: "male" },
        { en: "My name is Hiroki, and I work at Cambria Technologies.", vi: "Tên tôi là Hiroki, và tôi làm việc tại Cambria Technologies.", speaker: "Hiroki", gender: "male" },
        { en: "Today, I'd like to show you a new personal fitness-tracking device my company just released.", vi: "Hôm nay, tôi muốn giới thiệu với các bạn một thiết bị theo dõi thể dục cá nhân mới mà công ty chúng tôi vừa ra mắt.", speaker: "Hiroki", gender: "male" },
        { en: "What makes our device unique is not its many features—it actually has all the same features as the other fitness trackers.", vi: "Điều làm cho thiết bị của chúng tôi trở nên độc đáo không phải là nhiều tính năng—thực tế nó có tất cả các tính năng giống như các thiết bị theo dõi thể dục khác.", speaker: "Hiroki", gender: "male" },
        { en: "What sets ours apart is its price: it's the least expensive device available.", vi: "Điều làm chúng tôi nổi bật là giá cả: đây là thiết bị rẻ nhất hiện có trên thị trường.", speaker: "Hiroki", gender: "male" },
        { en: "And by participating in today's session, you'll get one to keep, at no cost to you!", vi: "Hôm nay, vì các bạn đã tham gia buổi thảo luận này, các bạn sẽ nhận được một chiếc miễn phí!", speaker: "Hiroki", gender: "male" },
        { en: "All you'll have to do is fill out a survey about your exercise habits.", vi: "Tất cả những gì bạn cần làm là điền vào một bản khảo sát về thói quen tập thể dục của mình.", speaker: "Hiroki", gender: "male" },

        // Talk 2 (74-76)
        { en: "So now that you've all had a chance to see the museum's collection of abstract paintings, I'd like you to come out into the garden with me, where our collection of eighteenth-century sculptures is on display.", vi: "Vì tất cả các bạn đã có cơ hội ngắm nhìn bộ sưu tập tranh trừu tượng của bảo tàng, bây giờ tôi muốn các bạn cùng tôi ra ngoài vườn, nơi bộ sưu tập các tác phẩm điêu khắc thế kỷ 18 của chúng tôi đang được trưng bày.", speaker: "Speaker", gender: "female" },
        { en: "This collection was generously donated to us by art collector Emily Wellman two months ago.", vi: "Bộ sưu tập này đã được nhà sưu tập nghệ thuật Emily Wellman hào phóng tặng cho chúng tôi cách đây hai tháng.", speaker: "Speaker", gender: "female" },
        { en: "I'll tell you about two sculptures in particular.", vi: "Tôi sẽ nói cụ thể về hai bức tượng điêu khắc.", speaker: "Speaker", gender: "female" },
        { en: "Also, if you're interested in the collection more generally, I would highly recommend the short documentary about the collection, which is showing in the theater near the exit on the other side of the garden.", vi: "Ngoài ra, nếu bạn quan tâm đến bộ sưu tập một cách tổng quát hơn, tôi thực sự khuyên bạn nên xem bộ phim tài liệu ngắn về bộ sưu tập, đang được chiếu tại rạp gần cửa ra ở phía bên kia của khu vườn.", speaker: "Speaker", gender: "female" },

        // Talk 3 (77-79)
        { en: "Hi Mei-ling, this is Lee Sanders calling from Rose Avenue Properties.", vi: "Chào Mei-ling, tôi là Lee Sanders gọi đến từ Rose Avenue Properties.", speaker: "Lee Sanders", gender: "male" },
        { en: "It was great meeting you on Monday, and I hope you're still considering renting the two-bedroom apartment I showed you.", vi: "Rất vui được gặp cô vào thứ Hai, và tôi hy vọng cô vẫn đang cân nhắc việc thuê căn hộ hai phòng ngủ mà tôi đã cho cô xem.", speaker: "Lee Sanders", gender: "male" },
        { en: "You also asked about parking in the garage next door, and I wanted to get back to you to let you know that there are a few spaces available.", vi: "Cô cũng đã hỏi về vấn đề đậu xe ở gara bên cạnh, và tôi muốn phản hồi cho cô biết rằng hiện đang có một vài chỗ trống.", speaker: "Lee Sanders", gender: "male" },
        { en: "Anyway, this is a very popular building, so let me know what you want to do.", vi: "Dù sao thì đây là một tòa nhà rất được ưa chuộng, vì vậy hãy cho tôi biết cô muốn làm gì.", speaker: "Lee Sanders", gender: "male" },
        { en: "That way, I can prepare all the necessary paperwork for the lease.", vi: "Bằng cách đó, tôi có thể chuẩn bị mọi giấy tờ cần thiết cho hợp đồng thuê.", speaker: "Lee Sanders", gender: "male" },

        // Talk 4 (80-82)
        { en: "OK everyone, I have one final reminder before we end this meeting.", vi: "Được rồi mọi người, tôi có một lời nhắc cuối cùng trước khi kết thúc cuộc họp này.", speaker: "Manager", gender: "female" },
        { en: "Since all of the cashiers are present, I want to remind you of an important step in customer transactions here at GL Supermarket.", vi: "Vì tất cả các thu ngân đều có mặt, tôi muốn nhắc các bạn về một bước quan trọng trong quá trình giao dịch khách hàng tại GL Supermarket này.", speaker: "Manager", gender: "female" },
        { en: "As you know, many of our customers are part of our membership program, which means that they receive five percent off their purchase when you swipe their membership card.", vi: "Như các bạn đã biết, phần lớn khách hàng của chúng ta là thành viên của chương trình hội viên. Điều đó có nghĩa là họ sẽ được giảm giá 5% khi các bạn quẹt thẻ hội viên của họ.", speaker: "Manager", gender: "female" },
        { en: "Please remember that it is our responsibility to ask customers for their membership card when scanning their groceries.", vi: "Hãy nhớ rằng trách nhiệm của chúng ta là hỏi thẻ hội viên của khách hàng khi quét hàng tạp hóa.", speaker: "Manager", gender: "female" },
        { en: "If a customer doesn't have a membership card, make sure to mention that applications are available at the customer service desk.", vi: "Nếu khách hàng không có thẻ hội viên, hãy chắc chắn đề cập rằng đơn đăng ký luôn có sẵn tại bàn dịch vụ khách hàng.", speaker: "Manager", gender: "female" },

        // Talk 5 (83-85)
        { en: "Good morning, SKL Radio listeners, and welcome to the Madison Business Show.", vi: "Chào buổi sáng các thính giả đài SKL và chào mừng đến với Chương trình Kinh doanh Madison.", speaker: "Host", gender: "female" },
        { en: "Today I'll be speaking to professional career counselor Tara Goldberg.", vi: "Hôm nay tôi sẽ trò chuyện với chuyên gia tư vấn nghề nghiệp Tara Goldberg.", speaker: "Host", gender: "female" },
        { en: "Over this next hour, Ms. Goldberg will outline strategies for finding a profession that matches your skills, interests, and personality.", vi: "Trong một giờ tới, cô Goldberg sẽ trình bày các chiến lược tìm kiếm một nghề nghiệp phù hợp với kỹ năng, sở thích và tính cách của các bạn.", speaker: "Host", gender: "female" },
        { en: "During the last part of the program, she'd like to hear from listeners, so we encourage you to call in when we open up our lines, and let us know what you think.", vi: "Ở phần cuối chương trình, cô ấy muốn lắng nghe ý kiến từ thính giả, vì vậy chúng tôi khuyến khích các bạn hãy gọi điện khi chúng tôi mở đường dây để cho chúng tôi biết suy nghĩ của mình.", speaker: "Host", gender: "female" },
        { en: "Well, let me start off by saying welcome, Ms. Goldberg.", vi: "Nào, hãy để tôi bắt đầu bằng lời chào mừng cô Goldberg.", speaker: "Host", gender: "female" },
        { en: "From what I understand, you're publishing a book about this topic, which will be out in print next month.", vi: "Theo tôi được biết, cô sắp xuất bản một cuốn sách về chủ đề này vào tháng tới.", speaker: "Host", gender: "female" },

        // Talk 6 (86-88)
        { en: "Hey Deepak, it's Donna. I'm looking over your design for the magazine advertisement for Langford Restaurant, and I wanted to give you my thoughts.", vi: "Chào Deepak, Donna đây. Tôi đang xem qua bản thiết kế của anh cho quảng cáo tạp chí của Nhà hàng Langford, và tôi muốn chia sẻ suy nghĩ của mình.", speaker: "Donna", gender: "female" },
        { en: "It isn't what I was expecting. Langford Restaurant has always preferred very traditional advertisements, and this one that you made is quite modern.", vi: "Nó không giống như những gì tôi mong đợi. Nhà hàng Langford luôn ưa chuộng các quảng cáo rất truyền thống, trong khi bản thiết kế của anh lại khá hiện đại.", speaker: "Donna", gender: "female" },
        { en: "I'm sorry I didn't mention the client's preference before—I know this is your first time working with them.", vi: "Tôi xin lỗi vì đã không đề cập đến sở thích của khách hàng trước đó—tôi biết đây là lần đầu tiên anh làm việc với họ.", speaker: "Donna", gender: "female" },
        { en: "You know, why don't you ask Adam to help you out? He's worked with Langford Restaurant in the past.", vi: "Anh biết đấy, tại sao anh không nhờ Adam giúp đỡ nhỉ? Anh ấy đã từng làm việc với Nhà hàng Langford trước đây rồi.", speaker: "Donna", gender: "female" },
        { en: "Thanks, Deepak. I'll talk to you later.", vi: "Cảm ơn Deepak. Sẽ nói chuyện với anh sau nhé.", speaker: "Donna", gender: "female" },

        // Talk 7 (89-91)
        { en: "I'd like to take a minute to discuss the company guidelines for travel.", vi: "Tôi muốn dành một chút thời gian để thảo luận về các nguyên tắc đi công tác của công ty.", speaker: "Speaker", gender: "male" },
        { en: "I understand that many of you are planning to attend next month's conference in Scotland and need to book airline tickets soon.", vi: "Tôi hiểu rằng nhiều người trong số các bạn đang lên kế hoạch tham dự hội nghị vào tháng tới tại Scotland và cần đặt vé máy bay sớm.", speaker: "Speaker", gender: "male" },
        { en: "Before you make a reservation, please send the flight information to Vadim, our business manager.", vi: "Trước khi đặt chỗ, vui lòng gửi thông tin chuyến bay cho Vadim, quản lý kinh doanh của chúng ta.", speaker: "Speaker", gender: "male" },
        { en: "He will review it and notify you if the price of the flight is approved.", vi: "Anh ấy sẽ xem xét và thông báo cho bạn nếu giá chuyến bay được phê duyệt.", speaker: "Speaker", gender: "male" },
        { en: "After that, you may book your tickets. Remember that you will have to pay for your own meals while you're there, but you'll receive a reimbursement within two to three weeks of your return.", vi: "Sau đó, bạn mới có thể đặt vé. Hãy nhớ rằng bạn sẽ phải tự trả tiền ăn khi ở đó, nhưng bạn sẽ nhận được khoản hoàn trả trong vòng hai đến ba tuần sau khi trở về.", speaker: "Speaker", gender: "male" },

        // Talk 8 (92-94)
        { en: "Thanks for coming to this department head meeting. Today our focus is budgeting.", vi: "Cảm ơn các bạn đã đến dự cuộc họp trưởng bộ phận này. Hôm nay trọng tâm của chúng ta là lập ngân sách.", speaker: "Manager", gender: "female" },
        { en: "Our new video game is coming along, but once again the release date's been pushed back.", vi: "Trò chơi video mới của chúng ta đang được hoàn thiện, nhưng một lần nữa ngày phát hành lại bị lùi lại.", speaker: "Manager", gender: "female" },
        { en: "This means a lot of our resources will be tied up until this project is completed, but who knows when that will be.", vi: "Điều này có nghĩa là rất nhiều nguồn lực của chúng ta sẽ bị kẹt cho đến khi dự án này hoàn thành, nhưng ai biết được khi nào điều đó sẽ xảy ra.", speaker: "Manager", gender: "female" },
        { en: "For now, we need to cut costs in other places.", vi: "Hiện tại, chúng ta cần cắt giảm chi phí ở những nơi khác.", speaker: "Manager", gender: "female" },
        { en: "So I'd like each of you to identify areas in your department where you can make budget cuts.", vi: "Vì vậy, tôi muốn mỗi người trong số các bạn xác định các lĩnh vực trong bộ phận của mình mà bạn có thể cắt giảm ngân sách.", speaker: "Manager", gender: "female" },
        { en: "I'm ready to set aside time to work with you individually to review your departmental budgets.", vi: "Tôi sẵn sàng dành thời gian làm việc riêng với từng người để xem xét ngân sách của bộ phận các bạn.", speaker: "Manager", gender: "female" },
        { en: "Let me know when you have time to do this.", vi: "Hãy cho tôi biết khi nào bạn có thời gian để thực hiện việc này.", speaker: "Manager", gender: "female" },

        // Talk 9 (95-97)
        { en: "Hi. It's Maria, and I'm calling with some information about the party that we're organizing for Nadia's retirement.", vi: "Chào. Tôi là Maria, tôi gọi để thông báo một số thông tin về bữa tiệc mà chúng ta đang chuẩn bị cho sự nghỉ hưu của Nadia.", speaker: "Maria", gender: "female" },
        { en: "Now, um... you and I decided that the party would be on August fifth.", vi: "À, ừm... bạn và tôi đã quyết định rằng bữa tiệc sẽ diễn ra vào ngày 5 tháng 8.", speaker: "Maria", gender: "female" },
        { en: "And, I'm really glad to hear that forty people from the office are coming.", vi: "Và tôi thực sự vui mừng khi nghe nói có 40 người từ văn phòng sẽ đến.", speaker: "Maria", gender: "female" },
        { en: "But, unfortunately, it looks like we can't use the coupon from Dinner Delights after all.", vi: "Nhưng thật không may, có vẻ như rốt cuộc chúng ta không thể sử dụng phiếu giảm giá từ Dinner Delights.", speaker: "Maria", gender: "female" },
        { en: "We might want to make a reservation someplace else... Also, Marc agreed to play Nadia's favorite song on his guitar during the party.", vi: "Chúng ta có thể muốn đặt chỗ ở một nơi khác... Ngoài ra, Marc đã đồng ý chơi bài hát yêu thích của Nadia bằng ghi-ta trong bữa tiệc.", speaker: "Maria", gender: "female" },
        { en: "Do you think you could make photocopies of the lyrics so that everyone can sing along?", vi: "Bạn có nghĩ mình có thể sao chép lời bài hát để mọi người cùng hát theo không?", speaker: "Maria", gender: "female" },

        // Talk 10 (98-100)
        { en: "First, some great news to start the meeting—thanks to this team's excellent product designs, our line of Ruby Star appliances outsold all competing appliances on the market last quarter.", vi: "Đầu tiên, một tin vui để bắt đầu cuộc họp—nhờ vào những thiết kế sản phẩm tuyệt vời của nhóm này, dòng thiết bị Ruby Star của chúng ta đã bán chạy hơn tất cả các thiết bị cạnh tranh trên thị trường trong quý vừa qua.", speaker: "Speaker", gender: "male" },
        { en: "Well done! Now I want to discuss our revised product development process.", vi: "Làm tốt lắm! Bây giờ tôi muốn thảo luận về quy trình phát triển sản phẩm đã được sửa đổi của chúng ta.", speaker: "Speaker", gender: "male" },
        { en: "As you can see from this flowchart, we've added a step between \"create a design\" and \"build a model.\"", vi: "Như bạn có thể thấy từ sơ đồ này, chúng ta đã thêm một bước giữa \"thiết kế\" và \"xây dựng mô hình.\"", speaker: "Speaker", gender: "male" },
        { en: "This new step means you'll need approval from the executive board before creating your prototype.", vi: "Bước mới này có nghĩa là bạn sẽ cần sự chấp thuận của ban điều hành trước khi tạo ra nguyên mẫu của mình.", speaker: "Speaker", gender: "male" },
        { en: "Lately, there's been some concern about the amount of time being spent on prototypes that never actually become products.", vi: "Gần đây, đã có một số lo ngại về lượng thời gian dành cho các nguyên mẫu không bao giờ thực sự trở thành sản phẩm.", speaker: "Speaker", gender: "male" },
        { en: "This new process will help our team become more productive and use time more efficiently.", vi: "Quy trình mới này sẽ giúp nhóm của chúng ta năng suất hơn và sử dụng thời gian hiệu quả hơn.", speaker: "Speaker", gender: "male" }
    ];

    window.currentIndex = 0;
    let currentPlayCount = 0;
    let playTimeout;
    const synth = window.speechSynthesis;
    let maleVoice = null;
    let femaleVoice = null;

    const msgBox = document.getElementById("system-message");
    const inputField = document.getElementById("user-input");
    const modalOverlay = document.getElementById("feedback-modal");
    const labelDisplay = document.getElementById("speaker-label");

    function loadVoices() {
        let voices = synth.getVoices();
        if(voices.length === 0) return;
        maleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google UK English Male'))) || voices.find(v => v.lang.startsWith('en'));
        femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Google US English'))) || voices.find(v => v.lang.startsWith('en'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.onload = () => {
        loadVoices();
        let count = localStorage.getItem('part4_test2_count') || 0;
        document.getElementById('study-count').innerText = count;
        document.getElementById('total-sentences').innerText = lessonData.length;
        
        let savedIndex = parseInt(localStorage.getItem('part4_test2_progress'));
        if (!isNaN(savedIndex) && savedIndex < lessonData.length) {
            window.currentIndex = savedIndex;
        }

        updateUI();
    };

    function updateUI() {
        updateProgress();
        document.getElementById('current-sentence-num').innerText = window.currentIndex + 1;
        
        const data = lessonData[window.currentIndex];
        
        if (data.gender === "male") {
            labelDisplay.innerText = "👨 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-male";
        } else {
            labelDisplay.innerText = "👩 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-female";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            e.preventDefault();
            playAudio();
        } else if (e.key === 'Tab') {
            e.preventDefault();
            giveHint();
        } else if (e.key === 'Enter' && modalOverlay.style.display !== "flex") {
            e.preventDefault();
            handleEnterAction();
        }
    });

    function handleEnterAction() {
        if (modalOverlay.style.display === "flex") {
            nextSentence();
        } else {
            checkAnswer();
        }
    }

    function playAudio() {
        currentPlayCount = 0;
        clearTimeout(playTimeout);
        triggerAudioLoop();
    }

    function triggerAudioLoop() {
        if (synth.speaking) synth.cancel();
        
        const data = lessonData[window.currentIndex];
        const utterThis = new SpeechSynthesisUtterance(data.en);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value);
        
        if (data.gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
        else if (data.gender === 'male' && maleVoice) utterThis.voice = maleVoice;
        
        utterThis.onend = () => {
            currentPlayCount++;
            const maxRepeat = parseInt(document.getElementById('repeat-setting').value);
            if (currentPlayCount < maxRepeat) {
                playTimeout = setTimeout(triggerAudioLoop, 500);
            }
        };
        
        synth.speak(utterThis);
        if (modalOverlay.style.display !== "flex") inputField.focus();
    }

// 1. Hàm xóa dấu câu và ĐỒNG BỘ DẤU NHÁY từ mọi thiết bị
    function normalizeText(text) { 
        // Gom tất cả nháy cong, nháy ngược về nháy thẳng (')
        let standardText = text.replace(/[’‘`´]/g, "'"); 
        return standardText.toLowerCase().replace(/[.,?!–\-:"]/g, '').trim(); 
    }

    // 2. Hàm hỗ trợ quy đổi từ viết tắt sang dạng đầy đủ
    function expandContractions(text) {
        // Đồng bộ dấu nháy trước khi tra từ điển
        let lower = text.toLowerCase().replace(/[’‘`´]/g, "'");
        const dict = {
            "they're": "they are", "we're": "we are", "you're": "you are",
            "he's": "he is", "she's": "she is", "it's": "it is", "that's": "that is", "there's": "there is", "who's": "who is", "what's": "what is",
            "i'm": "i am",
            "they'd": "they would", "we'd": "we would", "you'd": "you would", "he'd": "he would", "she'd": "she would", "i'd": "i would",
            "they've": "they have", "we've": "we have", "you've": "you have", "i've": "i have",
            "they'll": "they will", "we'll": "we will", "you'll": "you will", "he'll": "he will", "she'll": "she will", "it'll": "it will", "i'll": "i will",
            "don't": "do not", "doesn't": "does not", "didn't": "did not",
            "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
            "haven't": "have not", "hasn't": "has not", "hadn't": "had not",
            "can't": "can not", "cannot": "can not", "won't": "will not", "wouldn't": "would not",
            "shouldn't": "should not", "couldn't": "could not", "mustn't": "must not"
        };
        
        lower = lower.replace(/[.,?!–\-:"]/g, '');
        return lower.split(/\s+/).map(w => dict[w] || w).join(' ').trim();
    }
    // 3. Hàm chuẩn hóa chính tả Anh-Anh sang Anh-Mỹ để bao dung lỗi
    function normalizeSpelling(text) {
        return text
            // Xử lý đuôi s/z (VD: realise -> realize, organise -> organize, organisation -> organization)
            .replace(/ise\b/g, 'ize')
            .replace(/ised\b/g, 'ized')
            .replace(/ising\b/g, 'izing')
            .replace(/ises\b/g, 'izes')
            .replace(/isation/g, 'ization')
            // Xử lý our/or (VD: colour -> color, favour -> favor)
            .replace(/our\b/g, 'or')
            .replace(/ours\b/g, 'ors')
            // Xử lý tre/ter (VD: centre -> center)
            .replace(/tre\b/g, 'ter')
            .replace(/tres\b/g, 'ters')
            // Xử lý phụ âm kép l/ll (VD: travelling -> traveling)
            .replace(/lling\b/g, 'ling')
            .replace(/lled\b/g, 'led');
    }
    function checkAnswer() {
        const rawUserInput = inputField.value;
        const rawTargetText = lessonData[window.currentIndex].en;
        
        // Mở rộng viết tắt, xóa nháy phẩy, VÀ đồng bộ chính tả s/z, our/or
        const userInputExpanded = normalizeSpelling(expandContractions(rawUserInput).replace(/'/g, ''));
        const targetTextExpanded = normalizeSpelling(expandContractions(rawTargetText).replace(/'/g, ''));
        
        // KIỂM TRA 1: Nếu đáp án đúng hoàn toàn (Full câu)
        if (userInputExpanded === targetTextExpanded) {
            msgBox.innerText = "";
            showModal();
            return;
        }

        // KIỂM TRA 2 (NÂNG CẤP): Đang gõ dở nhưng vẫn đúng hướng
        // (Bao dung cả trường hợp đang gõ They are thay vì They're)
        if (targetTextExpanded.startsWith(userInputExpanded) && userInputExpanded.length > 0) {
            msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
            return; 
        }

        // KIỂM TRA 3: NẾU SAI THẬT SỰ: Chạy logic cũ để tìm và bôi đỏ từ sai
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(rawTargetText);
        
        const userWordsNorm = userInput.split(' ').filter(w => w !== "");
        const targetWordsNorm = targetText.split(' ');
        
        const rawWords = rawUserInput.trim().split(/\s+/);

        if (userWordsNorm.length === 0) {
            msgBox.innerText = "Bạn chưa gõ gì cả. Nhấn Ctrl để nghe nhé!";
            return;
        }

        let wrongIndex = -1;
            for (let i = 0; i < userWordsNorm.length; i++) {
                if (userWordsNorm[i] !== targetWordsNorm[i]) {
                    wrongIndex = i;
                    break;
                }
            }

            if (wrongIndex !== -1) {
                // Tính vị trí cần select (bôi đen)
                let startPos = 0;
                for (let k = 0; k < wrongIndex; k++) {
                    startPos += rawWords[k].length + 1; // +1 là dấu khoảng trắng
                }
                
                const leadingSpaces = inputField.value.length - inputField.value.trimStart().length;
                startPos += leadingSpaces;
                let endPos = startPos + rawWords[wrongIndex].length;

                // Tự động bôi đen chữ sai
                inputField.focus();
                inputField.setSelectionRange(startPos, endPos);

                // Hiển thị đoạn text nhấp nháy đỏ
                let displayHTML = rawWords.map((w, idx) => {
                    if (idx === wrongIndex) {
                        return `<span class="glow-error">${w}</span>`;
                    }
                    return w;
                }).join(' ');

                msgBox.innerHTML = `Vị trí sai:<br><div style="margin-top:12px; font-size:19px; color:var(--text-dark); font-weight: 500;">${displayHTML}</div>`;
                
            } else if (userWordsNorm.length < targetWordsNorm.length) {
                msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
                inputField.focus();
                inputField.setSelectionRange(inputField.value.length, inputField.value.length);
            } else {
                msgBox.innerText = "Có lỗi sai chính tả nhỏ, hãy kiểm tra lại.";
            }
        
    }

    function giveHint() {
        if (modalOverlay.style.display === "flex") return;

        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[currentIndex].en);
        
        const targetWordsRaw = lessonData[currentIndex].en.split(' ');
        const targetWordsNorm = targetText.split(' ');
        const userWords = userInput.split(' ').filter(w => w !== "");

        let hintWord = targetWordsRaw[userWords.length];
        for (let i = 0; i < userWords.length; i++) {
            if (userWords[i] !== targetWordsNorm[i]) {
                hintWord = targetWordsRaw[i];
                inputField.value = targetWordsRaw.slice(0, i).join(' ') + (i > 0 ? " " : "");
                break;
            }
        }

        if (hintWord) {
            inputField.value += (inputField.value.length > 0 && !inputField.value.endsWith(' ') ? ' ' : '') + hintWord + ' ';
            msgBox.innerText = "Đã điền từ tiếp theo!";
        }
    }

    function showModal() {
        inputField.blur();
        const data = lessonData[window.currentIndex];
        
        document.getElementById("trans-en").innerText = data.en;
        document.getElementById("trans-vi").innerText = data.vi;
        
        modalOverlay.style.display = "flex";
        document.querySelector('.btn-next-modal').focus();
    }

    function prevSentenceManual() {
        if (window.currentIndex > 0) {
            window.currentIndex--;
            resetForNewSentence();
        }
    }

    function nextSentenceManual() {
        if (window.currentIndex < lessonData.length - 1) {
            window.currentIndex++;
            resetForNewSentence();
        } else {
            finishLesson();
        }
    }
    
    function resetForNewSentence() {
    modalOverlay.style.display = "none";
    inputField.value = "";
    msgBox.innerHTML = "";
    
    // Lưu Local dự phòng
    localStorage.setItem('part4_test2_progress', window.currentIndex); 
    // LƯU LÊN CLOUD
    if(window.saveProgressToCloud) window.saveProgressToCloud(window.currentIndex); 
    
    updateUI();
    playAudio();
}

    function nextSentence() {
    modalOverlay.style.display = "none";
    window.currentIndex++;
    inputField.value = "";
    msgBox.innerHTML = "";
    
    if (window.currentIndex < lessonData.length) {
        // Lưu Local dự phòng
        localStorage.setItem('part4_test2_progress', window.currentIndex);
        // LƯU LÊN CLOUD
        if(window.saveProgressToCloud) window.saveProgressToCloud(window.currentIndex);

        updateUI();
        playAudio();
    } else {
        finishLesson();
    }
}
    function updateProgress() {
        const percent = Math.round((window.currentIndex / lessonData.length) * 100);
        document.getElementById("progress-percent").innerText = percent;
        document.getElementById("progress-ring").style.background = `conic-gradient(var(--primary) ${percent}%, #eee 0)`;
    }

    function finishLesson() {
        document.getElementById("learning-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        
        let count = parseInt(localStorage.getItem('part4_test2_count')) || 0;
        count++;
        localStorage.setItem('part4_test2_count', count);
        document.getElementById('study-count').innerText = count;

        localStorage.removeItem('part4_test2_progress');

        const transcriptBox = document.getElementById("full-transcript");
        let htmlContent = "";

        lessonData.forEach(d => {
            const color = d.gender === 'male' ? '#0369A1' : '#BE185D';
            htmlContent += `<p style="margin-bottom:12px; padding-left: 10px;">
                <strong style="color:${color}">${d.speaker}:</strong> <span style="font-weight: 500;">${d.en}</span><br>
                <span style="color:var(--text-light); font-size: 14px;">${d.vi}</span>
            </p>`;
        });
        transcriptBox.innerHTML = htmlContent;
    }

    function restartLesson() {
        localStorage.setItem('part4_test2_progress', 0);
        location.reload();
    }
</script>

    const db = getFirestore(app); // KHỞI TẠO FIRESTORE

    // Khai báo hàm để lưu tiến độ lên Cloud có thể gọi từ bên ngoài module
    window.saveProgressToCloud = async (progressIndex) => {
        if (window.currentUserUid) {
            try {
                await setDoc(doc(db, "userProgress", window.currentUserUid), {
                    part4_test2_progress: progressIndex
                }, { merge: true });
            } catch (e) {
                console.error("Lỗi khi lưu tiến độ:", e);
            }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            window.currentUserUid = user.uid;
            window.currentUserEmail = user.email;
            console.log("Đã đồng bộ ngầm tài khoản:", user.email);

            // KHI ĐĂNG NHẬP, KÉO DỮ LIỆU TỪ CLOUD VỀ
            try {
                const docRef = doc(db, "userProgress", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    let cloudProgress = docSnap.data().part4_test2_progress;
                    if (cloudProgress !== undefined) {
                        // Gắn tiến độ mới và cập nhật giao diện
                        window.currentIndex = cloudProgress; 
                        window.updateUI();
                    }
                }
            } catch (error) {
                console.error("Lỗi khi tải tiến độ:", error);
            }
           
        } else {
            window.currentUserUid = null;
            window.currentUserEmail = null;
            console.log("Trạng thái: Khách vãng lai");
        }
    });
</script>
</body>
</html>
