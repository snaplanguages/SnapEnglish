<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Culture Vocabulary Master | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDF9F1;
            --primary: #A44A3F; /* Đỏ gạch truyền thống, sâu sắc */
            --secondary: #E3B5A4;
            --accent: #F5E6E8;
            --text-main: #3E3E3E;
            --text-light: #8E8E8E;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--white);
            max-width: 900px; /* Mở rộng giao diện */
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(164, 74, 63, 0.08);
            padding: 50px 40px; /* Tăng padding */
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Lora', serif;
            color: var(--primary);
            font-size: 32px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-light);
            margin-bottom: 35px;
            font-style: italic;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #f0f0f0;
            border-radius: 5px;
            margin-bottom: 35px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .exercise-area {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question {
            font-size: 24px; /* Chữ to hơn */
            font-weight: 600;
            margin-bottom: 30px;
            color: var(--text-main);
            line-height: 1.6;
        }

        button.option-btn {
            background-color: var(--white);
            border: 2px solid var(--accent);
            color: var(--text-main);
            padding: 15px 20px; /* Nút to hơn */
            margin: 10px 0;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
        }

        button.option-btn:hover {
            background-color: var(--accent);
            transform: translateY(-2px);
        }

        button.option-btn.correct {
            background-color: var(--primary);
            border-color: var(--primary);
            color: var(--white);
        }

        button.option-btn.wrong {
            background-color: #bc4749;
            border-color: #bc4749;
            color: var(--white);
        }

        input[type="text"] {
            width: 80%;
            padding: 18px; /* Ô nhập text to hơn */
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-size: 18px;
            font-family: 'Nunito', sans-serif;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .blank-input {
            width: auto;
            min-width: 120px;
            display: inline-block;
            margin: 0 10px;
            padding: 8px 12px;
            border-bottom: 2px solid var(--primary);
            border-top: none;
            border-left: none;
            border-right: none;
            border-radius: 0;
            background-color: transparent;
        }

        .action-btn {
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 15px 40px; /* Nút Action to hơn */
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.2s;
            box-shadow: 0 4px 15px rgba(164, 74, 63, 0.3);
        }

        .action-btn:hover {
            background-color: #8A3E34;
        }

        .scramble-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 25px;
        }
        
        .scramble-word {
            background: var(--accent);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            transition: 0.2s;
            color: var(--text-main);
        }
        
        .scramble-word.selected {
            opacity: 0.5;
            pointer-events: none;
        }

        .answer-dropzone {
            min-height: 60px;
            border: 2px dashed var(--secondary);
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 15px;
        }

        .feedback {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            height: 28px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Culture Vocab Master</h1>
    <div class="subtitle">"Văn hóa là cội nguồn, từ vựng là đôi cánh."</div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="exercise-area" id="exerciseArea">
    </div>

    <div class="feedback" id="feedbackText"></div>
    <button class="action-btn" id="nextBtn" style="display: none;" onclick="nextQuestion()">Tiếp tục ➔</button>
</div>

        { en: "reflect cultural values", vn: "phản ánh giá trị văn hóa" },
        { en: "traditional art forms", vn: "các loại hình nghệ thuật truyền thống" },
        { en: "a universal language of emotion", vn: "ngôn ngữ cảm xúc phổ quát" },
        { en: "cultural representation", vn: "sự đại diện văn hóa" },
        { en: "preserve artistic heritage", vn: "bảo tồn di sản nghệ thuật" },
        { en: "promote cultural appreciation", vn: "thúc đẩy sự trân trọng văn hóa" },

        // Thương mại hóa và du lịch
        { en: "commercial exploitation", vn: "sự khai thác thương mại" },
        { en: "to commodify cultural traditions", vn: "biến truyền thống thành hàng hóa" },
        { en: "cultural authenticity", vn: "tính nguyên bản văn hóa" },
        { en: "mass tourism", vn: "du lịch đại trà" },
        { en: "a source of income for local communities", vn: "nguồn thu cho cộng đồng địa phương" },
        { en: "financial incentives for preservation", vn: "động lực tài chính cho bảo tồn" },
        { en: "the erosion of traditions", vn: "sự xói mòn truyền thống" },
        { en: "a double-edged sword", vn: "con dao hai lưỡi" },
        { en: "to keep traditions alive", vn: "giữ cho truyền thống tồn tại" },
        { en: "cultural commodification", vn: "thương mại hóa văn hóa" },
        { en: "profit-driven tourism", vn: "du lịch vì lợi nhuận" },
        { en: "authentic cultural experiences", vn: "trải nghiệm văn hóa chân thực" },
        { en: "tourist-oriented performances", vn: "các màn trình diễn phục vụ du khách" },

        // Toàn cầu hóa và thay đổi văn hóa
        { en: "cultural homogenisation", vn: "sự đồng nhất hóa văn hóa" },
        { en: "the spread of global culture", vn: "sự lan rộng văn hóa toàn cầu" },
        { en: "multinational corporations", vn: "tập đoàn đa quốc gia" },
        { en: "to dilute local cultures", vn: "làm phai nhạt văn hóa địa phương" },
        { en: "cross-border cultural influence", vn: "ảnh hưởng văn hóa xuyên biên giới" },
        { en: "adopt foreign cultural elements", vn: "tiếp nhận yếu tố văn hóa ngoại lai" },
        { en: "economic growth at the expense of culture", vn: "tăng trưởng kinh tế đánh đổi văn hóa" },
        { en: "a more interconnected world", vn: "thế giới kết nối hơn" },
        { en: "cultural resilience", vn: "khả năng thích ứng của văn hóa" },
        { en: "cultural exchange", vn: "sự giao lưu văn hóa" },
        { en: "global interconnectedness", vn: "sự kết nối toàn cầu" },
        { en: "the influence of multinational corporations", vn: "ảnh hưởng của các tập đoàn đa quốc gia" },
        { en: "exposure to diverse cultures", vn: "sự tiếp xúc với các nền văn hóa đa dạng" },
        { en: "mutual cultural enrichment", vn: "sự làm giàu văn hóa lẫn nhau" },
        { en: "erosion of local cultures", vn: "sự xói mòn văn hóa bản địa" },
        { en: "global cultural landscape", vn: "bức tranh văn hóa toàn cầu" },
        { en: "striking a balance between global and local values", vn: "cân bằng giữa giá trị toàn cầu và địa phương" },

        // Kiến trúc - lịch sử - học hỏi
        { en: "architectural heritage", vn: "di sản kiến trúc" },
        { en: "functional design", vn: "thiết kế chú trọng công năng" },
        { en: "aesthetic appeal", vn: "giá trị thẩm mỹ" },
        { en: "historical significance", vn: "ý nghĩa lịch sử" },
        { en: "traditional architectural styles", vn: "phong cách kiến trúc truyền thống" },
        { en: "strike a balance between form and function", vn: "cân bằng hình thức và công năng" },
        { en: "a sense of history", vn: "cảm giác về lịch sử" },
        { en: "first-hand experience", vn: "trải nghiệm trực tiếp" },
        { en: "cultural immersion", vn: "hòa mình vào văn hóa" },
        { en: "virtual exposure to culture", vn: "tiếp xúc văn hóa gián tiếp" },
        { en: "to gain cultural insights", vn: "hiểu sâu về văn hóa" },
        { en: "a superficial understanding", vn: "sự hiểu biết hời hợt" },
        { en: "media representations of culture", vn: "sự thể hiện văn hóa qua truyền thông" },
        { en: "a deeper appreciation of traditions", vn: "sự trân trọng sâu sắc truyền thống" },
        { en: "broaden cultural horizons", vn: "mở rộng tầm nhìn văn hóa" },
        { en: "immersive cultural experiences", vn: "trải nghiệm văn hóa nhập vai" },
        { en: "develop intercultural competence", vn: "phát triển năng lực liên văn hóa" },
        { en: "supplement rather than replace real experience", vn: "bổ trợ chứ không thay thế trải nghiệm thực" }
    ];

    let currentItem = {};
    let currentIndex = 0;
    const totalQuestions = 20; 
    let currentScrambleWords = [];
    let blankWordData = { word: '', fullEn: '' };

    const exerciseArea = document.getElementById('exerciseArea');
    const feedbackText = document.getElementById('feedbackText');
    const nextBtn = document.getElementById('nextBtn');
    const progressFill = document.getElementById('progressFill');

    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffleArray(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function updateProgress() {
        const percent = (currentIndex / totalQuestions) * 100;
        progressFill.style.width = `${percent}%`;
    }

    function resetSession() {
        currentIndex = 0;
        startExercise();
    }

    function startExercise() {
        if (currentIndex >= totalQuestions) {
            exerciseArea.innerHTML = `
                <h2 style="font-family: 'Lora', serif; color: var(--primary);">Hoàn thành xuất sắc!</h2>
                <p style="font-size: 18px; margin-top: 10px;">Bạn đã "thu nạp" thành công các tinh hoa từ vựng mảng Văn hóa. Giữ vững tinh thần này cho các chủ đề khác nhé!</p>
                <button class="action-btn" onclick="resetSession()">Luyện tiếp Session mới</button>
            `;
            feedbackText.innerHTML = "";
            nextBtn.style.display = "none";
            updateProgress();
            return;
        }

        feedbackText.innerHTML = "";
        nextBtn.style.display = "none";
        currentItem = getRandomItem(vocabData);
        updateProgress();

        const type = Math.floor(Math.random() * 5) + 1;
        
        switch(type) {
            case 1: renderMultipleChoice(); break;
            case 2: renderTyping(); break;
            case 3: renderMatching(); break;
            case 4: renderUnscramble(); break;
            case 5: renderFillInBlank(); break;
        }
    }

    function renderMultipleChoice() {
        let options = [currentItem];
        while(options.length < 4) {
            let randomOpt = getRandomItem(vocabData);
            if(!options.find(o => o.en === randomOpt.en)) options.push(randomOpt);
        }
        options = shuffleArray(options);

        let html = `<div class="question">Nghĩa của cụm từ: <br><span style="color:var(--primary); font-family: 'Lora', serif; font-size: 30px; display: inline-block; margin-top: 10px;">"${currentItem.en}"</span> <br>là gì?</div>`;
        options.forEach(opt => {
            html += `<button class="option-btn" onclick="checkAnswer(this, '${opt.vn.replace(/'/g, "\\'")}', '${currentItem.vn.replace(/'/g, "\\'")}')">${opt.vn}</button>`;
        });
        exerciseArea.innerHTML = html;
    }

    function renderTyping() {
        exerciseArea.innerHTML = `
            <div class="question">Viết cụm từ tiếng Anh cho:<br><span style="color:var(--primary); font-size: 28px; display: inline-block; margin-top: 10px;">"${currentItem.vn}"</span></div>
            <input type="text" id="typeInput" placeholder="Gõ tiếng Anh vào đây..." onkeypress="handleEnter(event, checkTyping)">
            <button class="action-btn" onclick="checkTyping()">Kiểm tra</button>
        `;
        setTimeout(() => document.getElementById('typeInput').focus(), 100);
    }

    function renderMatching() {
        let options = [currentItem];
        while(options.length < 4) {
            let randomOpt = getRandomItem(vocabData);
            if(!options.find(o => o.vn === randomOpt.vn)) options.push(randomOpt);
        }
        options = shuffleArray(options);

        let html = `<div class="question">Chọn tiếng Anh chuẩn cho:<br><span style="color:var(--primary); font-size: 28px; display: inline-block; margin-top: 10px;">"${currentItem.vn}"</span></div>`;
        options.forEach(opt => {
            html += `<button class="option-btn" onclick="checkAnswer(this, '${opt.en.replace(/'/g, "\\'")}', '${currentItem.en.replace(/'/g, "\\'")}')">${opt.en}</button>`;
        });
        exerciseArea.innerHTML = html;
    }

    function renderUnscramble() {
        const words = shuffleArray(currentItem.en.split(' '));
        currentScrambleWords = [];
        
        let html = `
            <div class="question">Xếp từ thành cụm hoàn chỉnh:<br><span style="color:var(--text-light); font-size: 20px; display: inline-block; margin-top: 10px;">(${currentItem.vn})</span></div>
            <div class="answer-dropzone" id="dropzone"></div>
            <div class="scramble-container" id="scrambleWords">
        `;
        
        words.forEach((word, index) => {
            html += `<div class="scramble-word" id="sw-${index}" onclick="selectScrambleWord('${word.replace(/'/g, "\\'")}', ${index})">${word}</div>`;
        });
        
        html += `</div>
        <div>
            <button class="action-btn" onclick="checkScramble()">Kiểm tra</button>
            <button class="action-btn" style="background:#e9ecef; color:#495057; margin-left:10px;" onclick="resetScramble()">Làm lại</button>
        </div>`;
        exerciseArea.innerHTML = html;
    }

    function renderFillInBlank() {
        const words = currentItem.en.split(' ');
        if(words.length < 2) { 
            renderMultipleChoice();
            return; 
        }
        const blankIndex = Math.floor(Math.random() * words.length);
        blankWordData.word = words[blankIndex];
        blankWordData.fullEn = currentItem.en;
        
        let displayWords = [...words];
        displayWords[blankIndex] = `<input type="text" id="blankInput" class="blank-input" onkeypress="handleEnter(event, checkBlank)">`;
        
        exerciseArea.innerHTML = `
            <div class="question">Điền từ còn thiếu vào cụm sau:<br><span style="color:var(--text-light); font-size: 20px; display: inline-block; margin-top: 10px;">(${currentItem.vn})</span></div>
            <div style="font-size: 26px; font-weight: 600; margin-bottom: 25px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px;">
                ${displayWords.join(' ')}
            </div>
            <button class="action-btn" onclick="checkBlank()">Kiểm tra</button>
        `;
        setTimeout(() => document.getElementById('blankInput').focus(), 100);
    }

    function selectScrambleWord(word, index) {
        document.getElementById(`sw-${index}`).classList.add('selected');
        currentScrambleWords.push({word, index});
        renderDropzone();
    }

    function renderDropzone() {
        const dropzone = document.getElementById('dropzone');
        dropzone.innerHTML = currentScrambleWords.map(item => `<div class="scramble-word" style="background:var(--primary); color:white">${item.word}</div>`).join('');
    }

    function resetScramble() {
        currentScrambleWords = [];
        renderDropzone();
        document.querySelectorAll('.scramble-word').forEach(el => el.classList.remove('selected'));
    }

    function checkScramble() {
        const answer = currentScrambleWords.map(item => item.word).join(' ');
        if(answer === currentItem.en) showFeedback(true);
        else showFeedback(false, currentItem.en);
    }

    function checkBlank() {
        const input = document.getElementById('blankInput').value.trim().toLowerCase();
        // Xóa dấu câu để check mượt hơn
        const cleanInput = input.replace(/[.,'"]/g, "");
        const cleanWord = blankWordData.word.toLowerCase().replace(/[.,'"]/g, "");
        
        if(cleanInput === cleanWord) showFeedback(true);
        else showFeedback(false, blankWordData.fullEn);
    }

    function handleEnter(e, checkFunction) {
        if(e.key === 'Enter') checkFunction();
    }

    function checkAnswer(btn, selected, correct) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
        
        if(selected === correct) {
            btn.classList.add('correct');
            showFeedback(true);
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
            showFeedback(false, correct);
        }
    }

    function checkTyping() {
        const input = document.getElementById('typeInput').value.trim().toLowerCase();
        // Bỏ dấu nháy hoặc dấu chấm phẩy khi so sánh nếu có
        const cleanInput = input.replace(/[.,'"]/g, "");
        const cleanTarget = currentItem.en.toLowerCase().replace(/[.,'"]/g, "");

        if(cleanInput === cleanTarget) showFeedback(true);
        else showFeedback(false, currentItem.en);
    }

    function showFeedback(isCorrect, correctAnswer = "") {
        if(isCorrect) {
            feedbackText.innerHTML = `<span style="color: #A44A3F;">Chuẩn không cần chỉnh! 🎨</span>`;
        } else {
            feedbackText.innerHTML = `<span style="color: #bc4749;">Chưa chính xác. Đáp án đúng là: <b>${correctAnswer}</b></span>`;
        }
        nextBtn.style.display = "inline-block";
    }

    function nextQuestion() {
        currentIndex++;
        startExercise();
    }

    window.onload = startExercise;

</script>
</body>
</html>
