    <script>
        const exercises = [
            {
                title: "Exercise 1: Chia động từ với 'Be going to'",
                tip: "Cấu trúc: am/is/are + going to + V(nguyên thể). Dùng để diễn tả một kế hoạch, dự định đã được lên lịch từ trước hoặc một dự đoán có bằng chứng cụ thể ở hiện tại.",
                colorClass: "color-1",
                icon: "🍡",
                questions: [
                    { q: "1. I (buy) a new smartphone next week.", options: ["am going to buy", "is going to buy", "are going to buy"], a: "am going to buy", exp: "Kế hoạch đã định. Ngôi 'I' đi với 'am going to'." },
                    { q: "2. Look at those dark clouds! It (rain).", options: ["are going to rain", "am going to rain", "is going to rain"], a: "is going to rain", exp: "Dự đoán có bằng chứng hiện tại (mây đen). Chủ ngữ 'It' -> is going to rain." },
                    { q: "3. We (not / travel) to Japan this year.", options: ["aren't going to travel", "isn't going to travel", "am not going to travel"], a: "aren't going to travel", exp: "Dự định không làm gì. Ngôi 'We' -> aren't going to." },
                    { q: "4. (you / visit) your grandparents tomorrow?", options: ["Are you going to visit", "Is you going to visit", "Do you going to visit"], a: "Are you going to visit", exp: "Câu hỏi về dự định: Đảo to be 'Are' lên trước 'you'." },
                    { q: "5. She (study) abroad next month.", options: ["are going to study", "is going to study", "am going to study"], a: "is going to study", exp: "Kế hoạch chắc chắn trong tương lai. Ngôi 'She' -> is going to." },
                    { q: "6. Watch out! You (drop) the glass!", options: ["is going to drop", "are going to drop", "am going to drop"], a: "are going to drop", exp: "Dự đoán sự việc sắp xảy ra trước mắt (sắp làm rơi ly). Ngôi 'You' -> are going to." },
                    { q: "7. They (have) a baby in March.", options: ["is going to have", "are going to have", "am going to have"], a: "are going to have", exp: "Sự việc có tính kế hoạch/đã biết trước. 'They' -> are going to have." },
                    { q: "8. What (he / do) tonight?", options: ["is he going to do", "are he going to do", "does he going to do"], a: "is he going to do", exp: "Hỏi về kế hoạch tối nay: What + is + he + going to do?" },
                    { q: "9. I have decided. I (not / eat) this pizza.", options: ["isn't going to eat", "aren't going to eat", "am not going to eat"], a: "am not going to eat", exp: "Đã đưa ra quyết định từ trước (have decided) -> am not going to." },
                    { q: "10. My father (sell) his old house.", options: ["are going to sell", "is going to sell", "am going to sell"], a: "is going to sell", exp: "Dự định của bố. 'My father' là số ít -> is going to." },
                    { q: "11. We (play) tennis this afternoon.", options: ["is going to play", "are going to play", "am going to play"], a: "are going to play", exp: "Kế hoạch chiều nay. Ngôi 'We' -> are going to." },
                    { q: "12. Look at the traffic! We (be) late.", options: ["are going to be", "is going to be", "am going to be"], a: "are going to be", exp: "Căn cứ hiện tại: kẹt xe -> chắc chắn sẽ muộn. 'We' -> are going to be." },
                    { q: "13. (she / invite) him to the party?", options: ["Is she going to invite", "Are she going to invite", "Does she going to invite"], a: "Is she going to invite", exp: "Câu hỏi về dự định của cô ấy. Dùng 'Is she going to'." },
                    { q: "14. The boat is full of water. It (sink).", options: ["are going to sink", "am going to sink", "is going to sink"], a: "is going to sink", exp: "Bằng chứng: thuyền đầy nước -> sắp chìm. 'It' -> is going to sink." },
                    { q: "15. I (wash) my hair this evening.", options: ["are going to wash", "is going to wash", "am going to wash"], a: "am going to wash", exp: "Dự định cá nhân tối nay -> am going to wash." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice (Trắc nghiệm)",
                tip: "Nhớ đọc kỹ ngữ cảnh: Nếu thấy có sự 'chuẩn bị', 'dự định', 'bằng chứng' thì 100% chọn 'Be going to' nhé!",
                colorClass: "color-2",
                icon: "🍧",
                questions: [
                    { q: "1. 'Have you made a decision?' - 'Yes, I _______ buy that house.'", options: ["A. am going to", "B. will", "C. going to"], a: "A. am going to", exp: "Đã đưa ra quyết định rồi (made a decision) -> Dùng tương lai gần." },
                    { q: "2. Look at the sky! It _______ rain.", options: ["A. will", "B. is going to", "C. is"], a: "B. is going to", exp: "Nhìn bầu trời kìa (bằng chứng) -> Sắp mưa rồi." },
                    { q: "3. We _______ have a party next Sunday.", options: ["A. are going to", "B. will to", "C. going to"], a: "A. are going to", exp: "Kế hoạch tổ chức tiệc vào Chủ nhật tới. Phải có to be 'are'." },
                    { q: "4. He is driving too fast! He _______ crash.", options: ["A. will", "B. is going to", "C. crashes"], a: "B. is going to", exp: "Lái xe quá nhanh (bằng chứng hiện tại) -> Sắp đụng xe." },
                    { q: "5. 'Why are you wearing sports clothes?' - 'I _______ play football.'", options: ["A. will", "B. am going to", "C. play"], a: "B. am going to", exp: "Mặc sẵn đồ thể thao (đã chuẩn bị) -> Dự định đi đá bóng." },
                    { q: "6. They _______ build a new hospital here next year.", options: ["A. are going to", "B. will", "C. builds"], a: "A. are going to", exp: "Kế hoạch xây bệnh viện (thường đã được lên kế hoạch kĩ lưỡng)." },
                    { q: "7. She _______ study harder next semester. That's her plan.", options: ["A. will", "B. is going to", "C. studies"], a: "B. is going to", exp: "Câu sau có chữ 'plan' (kế hoạch) -> Dùng is going to." },
                    { q: "8. What _______ do this weekend?", options: ["A. are you going to", "B. do you go to", "C. will you to"], a: "A. are you going to", exp: "Hỏi về dự định cuối tuần." },
                    { q: "9. I _______ travel to Da Lat tomorrow. I have the tickets.", options: ["A. am going to", "B. will", "C. travel"], a: "A. am going to", exp: "Đã có vé (sự chuẩn bị) -> Dùng tương lai gần." },
                    { q: "10. Watch out! The dog _______ bite you!", options: ["A. is going to", "B. will", "C. going to"], a: "A. is going to", exp: "Sự việc hiển hiện trước mắt sắp xảy ra (Coi chừng!)." },
                    { q: "11. 'Did you buy the ingredients?' - 'Yes, I _______ bake a cake.'", options: ["A. will", "B. am going to", "C. baked"], a: "B. am going to", exp: "Đã mua nguyên liệu sẵn -> Dự định làm bánh đã có từ trước." },
                    { q: "12. We _______ move to a new apartment next month.", options: ["A. are going to", "B. will", "C. moving"], a: "A. are going to", exp: "Kế hoạch chuyển nhà." },
                    { q: "13. My sister is pregnant. She _______ have a baby.", options: ["A. is going to", "B. will", "C. has"], a: "A. is going to", exp: "Đang mang thai (bằng chứng) -> Sắp sinh em bé." },
                    { q: "14. I feel terrible. I think I _______ be sick.", options: ["A. am going to", "B. will", "C. am"], a: "A. am going to", exp: "Cảm thấy rất tệ (cơ thể có dấu hiệu) -> Sắp ốm rồi." },
                    { q: "15. Are you _______ help me or not?", options: ["A. going to", "B. will", "C. go to"], a: "A. going to", exp: "Câu hỏi về ý định (Có định giúp hay không?). Đã có 'Are you' nên chỉ cần 'going to'." }
                ]
            },
            {
                title: "Exercise 3: Chọn câu dịch / Đồng nghĩa",
                tip: "Trong tiếng Việt, 'sắp' hoặc 'dự định' là dấu hiệu rõ ràng nhất của thì Tương lai gần.",
                colorClass: "color-3",
                icon: "🌸",
                questions: [
                    { q: "1. 'Nhìn đám mây đen kìa, trời sắp mưa rồi!'", options: ["A. Look at the dark clouds, it will rain.", "B. Look at the dark clouds, it is going to rain."], a: "B. Look at the dark clouds, it is going to rain.", exp: "Có bằng chứng (mây đen) -> is going to rain." },
                    { q: "2. 'Tôi dự định mua một chiếc laptop mới vào tháng tới.'", options: ["A. I am going to buy a new laptop next month.", "B. I will buy a new laptop next month."], a: "A. I am going to buy a new laptop next month.", exp: "Có 'dự định' -> am going to." },
                    { q: "3. 'Cẩn thận! Bạn sắp vấp ngã kìa!'", options: ["A. Watch out! You will trip!", "B. Watch out! You are going to trip!"], a: "B. Watch out! You are going to trip!", exp: "Cảnh báo một việc sắp sửa xảy ra ngay trước mắt -> are going to." },
                    { q: "4. 'Họ không có dự định đi du lịch vào mùa hè này.'", options: ["A. They aren't going to travel this summer.", "B. They won't travel this summer."], a: "A. They aren't going to travel this summer.", exp: "Nói về dự định/kế hoạch đã thống nhất -> aren't going to." },
                    { q: "5. 'Bạn dự định làm gì vào cuối tuần này?'", options: ["A. What will you do this weekend?", "B. What are you going to do this weekend?"], a: "B. What are you going to do this weekend?", exp: "Hỏi về kế hoạch đã được lên lịch -> What are you going to do?" },
                    { q: "6. 'Tôi đã lên kế hoạch rồi. Tôi sẽ nghỉ việc.'", options: ["A. I have a plan. I will quit my job.", "B. I have a plan. I am going to quit my job."], a: "B. I have a plan. I am going to quit my job.", exp: "Đã có plan (kế hoạch) -> am going to." },
                    { q: "7. 'Chiếc thuyền đang chìm! Nó sắp chìm hẳn rồi.'", options: ["A. The boat is sinking! It is going to sink.", "B. The boat is sinking! It will sink."], a: "A. The boat is sinking! It is going to sink.", exp: "Hiện tượng đang xảy ra là bằng chứng cho kết quả sắp tới -> is going to sink." },
                    { q: "8. 'Cô ấy sắp sinh em bé vào tháng sau.'", options: ["A. She will have a baby next month.", "B. She is going to have a baby next month."], a: "B. She is going to have a baby next month.", exp: "Sự việc có tính dự báo chuẩn xác/kế hoạch tự nhiên -> is going to." },
                    { q: "9. 'Chúng tôi sẽ tổ chức tiệc sinh nhật vào thứ 7.'", options: ["A. We are going to hold a birthday party on Saturday.", "B. We will hold a birthday party on Saturday."], a: "A. We are going to hold a birthday party on Saturday.", exp: "Tổ chức tiệc thường phải có kế hoạch chuẩn bị trước -> are going to." },
                    { q: "10. 'Tôi đã quyết định rồi, tôi sẽ không nói cho anh ta biết.'", options: ["A. I have decided. I am not going to tell him.", "B. I have decided. I won't tell him."], a: "A. I have decided. I am not going to tell him.", exp: "Đã quyết định từ trước (have decided) -> am not going to." }
                ]
            },
            {
                title: "Exercise 4: WILL (Tương lai đơn) hay BE GOING TO (Tương lai gần)?",
                tip: "Phân biệt cực gắt: <br> - <b>Will</b>: Nghĩ ra MỚI quyết định ngay lúc nói, lời hứa, đề nghị giúp đỡ. <br> - <b>Be going to</b>: Đã có kế hoạch TỪ TRƯỚC, có bằng chứng hiện tại.",
                colorClass: "color-4",
                icon: "🍒",
                questions: [
                    { q: "1. 'I am hungry.' - 'I _______ make you a sandwich.'", options: ["A. will", "B. am going to"], a: "A. will", exp: "Nghe bạn than đói nên quyết định làm bánh ngay lập tức (không có ý định từ trước) -> Will." },
                    { q: "2. 'Why did you buy flour?' - 'I _______ make a cake.'", options: ["A. will", "B. am going to"], a: "B. am going to", exp: "Đã mua bột sẵn (có sự chuẩn bị) -> Ý định làm bánh có từ trước -> Am going to." },
                    { q: "3. Look at that boy on the wall! He _______ fall!", options: ["A. will", "B. is going to"], a: "B. is going to", exp: "Thấy cậu bé chênh vênh trên tường (bằng chứng) -> Sắp ngã -> Is going to." },
                    { q: "4. I promise I _______ be late again.", options: ["A. won't", "B. am not going to"], a: "A. won't", exp: "Lời hứa (promise) -> Luôn dùng Will (phủ định là won't)." },
                    { q: "5. 'The phone is ringing!' - 'I _______ answer it.'", options: ["A. will", "B. am going to"], a: "A. will", exp: "Nghe chuông và quyết định nhấc máy ngay lúc đó -> Will." },
                    { q: "6. I have decided. I _______ learn Japanese next year.", options: ["A. will", "B. am going to"], a: "B. am going to", exp: "Đã ra quyết định từ trước (I have decided) -> Am going to." },
                    { q: "7. Perhaps she _______ be late.", options: ["A. will", "B. is going to"], a: "A. will", exp: "Dự đoán không chắc chắn (Perhaps - có lẽ) -> Will." },
                    { q: "8. I _______ visit my grandparents tomorrow. I have bought the train tickets.", options: ["A. will", "B. am going to"], a: "B. am going to", exp: "Đã mua vé tàu (có sự sắp xếp trước) -> Am going to." },
                    { q: "9. Don't worry, I _______ help you with this heavy bag.", options: ["A. will", "B. am going to"], a: "A. will", exp: "Đề nghị giúp đỡ ai đó ngay tại thời điểm nói -> Will." },
                    { q: "10. 'Have you called Mom?' - 'Oh, I forgot. I _______ call her now.'", options: ["A. will", "B. am going to"], a: "A. will", exp: "Quên mất và bây giờ mới quyết định gọi (quyết định tức thì) -> Will." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo lấy gốc:</strong> ${ex.tip}</span>
                </div>
            `;

            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${qObj.a}.</strong> <br> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
