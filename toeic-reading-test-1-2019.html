const HISTORY_KEY = "snapenglish_test2_2018_history";
let isReviewingMode = false; // Biến cờ hiệu để biết đang xem lại hay làm thật

function saveAttemptToHistory(score, total, userAnswersMap) {
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    let now = new Date();
    
    let attempt = {
        id: Date.now(),
        date: now.toLocaleDateString('vi-VN'),
        time: now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }),
        score: score,
        total: total,
        toeicScore: calculateToeicReading(score, total),
        answers: userAnswersMap // Lưu lại toàn bộ ABCD đã chọn
    };
    
    history.unshift(attempt); // Đẩy bài mới nhất lên đầu
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
}

function openHistoryModal() {
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    let listEl = document.getElementById("historyList");
    
    if (history.length === 0) {
        listEl.innerHTML = `<div style="text-align:center; color:#888; padding: 20px;">Bạn chưa làm bài lần nào trên thiết bị này.</div>`;
    } else {
        // Cập nhật giao diện: Thêm nút Xóa (dấu x) kế bên nút Xem lại
        listEl.innerHTML = history.map((item, index) => `
            <div class="history-item">
                <div class="history-info">
                    <span class="history-date">Lần ${history.length - index}: ${item.time} - ${item.date}</span>
                    <span class="history-score">Điểm: ${item.toeicScore}/495 (${item.score}/${item.total} câu)</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-review" onclick="restoreAttempt(${item.id})">Xem lại</button>
                    <button class="btn-delete-history" onclick="deleteAttempt(${item.id})" title="Xóa bài này">&times;</button>
                </div>
            </div>
        `).join("");
    }
    
    document.getElementById('setupOverlay').style.display = 'none';
    document.getElementById('historyOverlay').style.display = 'flex';
}

function closeHistoryModal() {
    document.getElementById('historyOverlay').style.display = 'none';
    document.getElementById('setupOverlay').style.display = 'flex';
}

// Hàm xử lý Xóa lịch sử có xác nhận
function deleteAttempt(attemptId) {
    showCustomConfirm("Bạn có chắc chắn muốn xóa bài làm này khỏi lịch sử không?", function() {
        let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        history = history.filter(h => h.id !== attemptId); 
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); 
        openHistoryModal(); 
    });
}

function restoreAttempt(attemptId) {
    let history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    let attempt = history.find(h => h.id === attemptId);
    
    if(!attempt) return;

    isReviewingMode = true; // Bật cờ hiệu "Đang xem lại"
    document.getElementById('historyOverlay').style.display = 'none';
    
    // Mở khóa & làm sạch toàn bộ các nút radio (phòng trường hợp người học xem bài A rồi chuyển sang bài B)
    document.querySelectorAll('input[type="radio"]').forEach(el => {
        el.disabled = false;
        el.checked = false; 
    });
    
    // Tự động đánh dấu lại các Radio button đáp án học viên đã chọn trong lịch sử
    for (let qId in attempt.answers) {
        let val = attempt.answers[qId];
        if (val) {
            let radio = document.querySelector(`input[name="q${qId}"][value="${val}"]`);
            if (radio) radio.checked = true;
        }
    }
    
   // Đổi chữ nút Nộp bài thành "Đang xem lại" cho ngầu
    let btnSubmit = document.querySelector('.btn-submit');
    if(btnSubmit) {
        btnSubmit.innerText = "ĐANG XEM LẠI";
        btnSubmit.style.background = "#888";
        btnSubmit.style.boxShadow = "none";
    }

    // --- THÊM 2 DÒNG NÀY VÀO TRƯỚC DẤU NGOẶC NHỌN ĐÓNG HÀM ---
    isSubmitted = false; 
    executeSubmit();
}


function scrollToEvidence(evId) {
    const evElement = document.getElementById(evId);
    if(evElement) {
        // Cuộn đoạn văn chứa dẫn chứng vào giữa màn hình
        evElement.scrollIntoView({behavior: "smooth", block: "center"});
        
        // Thêm class 'focus-blink' để bật chế độ nháy vàng in đậm
        evElement.classList.add("focus-blink");
        
        // Tắt nổi bật sau 1.5 giây để trả văn bản về bình thường
        setTimeout(() => {
            evElement.classList.remove("focus-blink");
        }, 1500);
    } else {
        showCustomAlert("Chưa được gắn ID dẫn chứng trong bài đọc!");
    }
}
// --- GRADING ---
function submitTest(manual) {
    if (isSubmitted) return;
    if (manual) document.getElementById('confirmOverlay').style.display = 'flex';
    else executeSubmit();
}

function closeConfirmModal() { document.getElementById('confirmOverlay').style.display = 'none'; }
function closeResultModal() { document.getElementById('resultOverlay').style.display = 'none'; }

function executeSubmit() {
    document.getElementById('confirmOverlay').style.display = 'none';
    isSubmitted = true;
    clearInterval(timerInterval);
    document.querySelectorAll('input, select').forEach(el => el.disabled = true);
    
    document.getElementById('mainContainer').classList.add('show-translation');
    
    let activeTabIndex = 1;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
        if (b.classList.contains('active')) activeTabIndex = i + 1;
    });
    switchTab(activeTabIndex);
    
    let score = 0;
    let totalQuestions = allQuestionIds.length;
    let userAnswersMap = {}; // Thêm cái này để hứng đáp án học viên

    allQuestionIds.forEach(id => {
        let userAns = "";
        let radios = document.getElementsByName(`q${id}`);
        for (let r of radios) if (r.checked) userAns = r.value;
        
        userAnswersMap[id] = userAns; // Ghi nhận đáp án câu này

        let correctAns = answerKey[id];
        let isCorrect = (userAns === correctAns);
        if (isCorrect && userAns !== "") score++; // Có chọn mới tính điểm

        let feedbackEl = document.getElementById(`fb-${id}`);
        if(feedbackEl) {
            if(isCorrect && userAns !== "") {
                feedbackEl.innerHTML = `<span style="color:var(--correct);">✓ Đúng</span>`;
            } else if (userAns === "") {
                feedbackEl.innerHTML = `<span style="color:#888;">Trống (Đáp án: <span style="background:#dce775; color:#333; padding:2px 5px; border-radius:4px;">${correctAns}</span>)</span>`;
            } else {
                feedbackEl.innerHTML = `<span style="color:var(--wrong);">✗ Sai (Đáp án: <span style="background:#dce775; color:#333; padding:2px 5px; border-radius:4px;">${correctAns}</span>)</span>`;
            }
        }
        
        let nav = document.getElementById(`nav-${id}`);
        if(nav) {
            if (isCorrect && userAns !== "") {
                nav.style.background = "#c8e6c9"; nav.style.color = "#2e7d32"; nav.style.borderColor = "#81c784";
            } else {
                nav.style.background = "#ffcdd2"; nav.style.color = "#c62828"; nav.style.borderColor = "#ef9a9a";
            }
        }

        let expContainer = document.getElementById(`exp-${id}`);
        if(expContainer && explanations[id]) {
            let expData = explanations[id];
            let quoteHtml = expData.quote ? `<div class="exp-quote">"${expData.quote}"</div>` : '';
            let vocabHtml = expData.vocab ? `<div class="exp-vocab">${expData.vocab}</div>` : '';
            let tipHtml = expData.tip ? `<div style="margin-top:8px; color:var(--primary-dark); font-weight:600;">📌 Mẹo: ${expData.tip}</div>` : '';
            let evHtml = expData.evId ? `<button onclick="scrollToEvidence('${expData.evId}')" style="margin-top:12px; background:var(--highlight); border:1px solid #fbc02d; color:#f57f17; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:700; font-family:inherit; font-size:15px; transition:0.2s;" onmouseover="this.style.background='#fff59d'" onmouseout="this.style.background='var(--highlight)'">🔍 Xem dẫn chứng trong bài</button>` : '';
            
            expContainer.innerHTML = `
                <div class="exp-box show">
                    <div class="exp-title">💡 Giải thích chi tiết Câu ${id}</div>
                    ${quoteHtml}
                    <div class="exp-text">${expData.exp}</div>
                    ${vocabHtml}
                    ${tipHtml}
                    ${evHtml} </div>
            `;
        }
    });

   
    if (!isReviewingMode) {
        saveAttemptToHistory(score, totalQuestions, userAnswersMap);
        
        if(window.luuDiemTOEICReadingFull) {
            // Tính toán thời gian thực tế đã làm (số phút ban đầu trừ đi số phút còn lại)
            let minutesAssigned = (currentMode === 'mock') ? 75 : parseInt(document.getElementById('timeInput').value);
            if(isNaN(minutesAssigned) || minutesAssigned < 1) minutesAssigned = 75;
            let timeTaken = Math.round(minutesAssigned - (testDuration / 60));
            
            // Truyền thêm timeTaken vào hàm
            window.luuDiemTOEICReadingFull(score, totalQuestions, "ETS 2019 - Test 1", timeTaken);
        }
    } else {
        // Đưa khối else này ra đúng vị trí của nó
        let toastMsg = document.createElement("div");
        toastMsg.innerText = "Đã khôi phục bài làm ngày cũ!";
        toastMsg.style.cssText = "position:fixed; top:20px; right:20px; background:var(--primary); color:white; padding:15px 20px; border-radius:12px; font-weight:bold; font-family:'Quicksand',sans-serif; z-index:99999; box-shadow:0 10px 30px rgba(0,0,0,0.2);";
        document.body.appendChild(toastMsg);
        setTimeout(() => toastMsg.remove(), 3000);
    }
}
        

function calculateToeicReading(raw, total) {
    if (raw === 0) return 5;
    let percent = raw / total;
    let score = Math.round((percent * 495) / 5) * 5; 
    return score > 495 ? 495 : (score < 5 ? 5 : score);
}

// --- HIGHLIGHT SYSTEM ---
const mainContainer = document.getElementById("mainContainer");
const menu = document.getElementById("ctxMenu");
let targetElement = null;
let selectedRange = null;

// Chuyển menu sang fixed để bám đúng con trỏ chuột dù đang cuộn ở cột nào
menu.style.position = "fixed";

mainContainer.addEventListener("contextmenu", (e) => {
    e.preventDefault();
    targetElement = null; selectedRange = null;
    
    // Nếu click chuột phải vào vùng đã highlight -> Hiện nút Xóa
    if (e.target.classList.contains("highlight")) {
        targetElement = e.target;
        showMenu(e.clientX, e.clientY, "remove");
        return;
    }
    
    // Nếu bôi đen văn bản mới -> Hiện nút Thêm
    let sel = window.getSelection();
    if (sel.toString().trim().length > 0 && mainContainer.contains(sel.anchorNode)) {
        selectedRange = sel.getRangeAt(0);
        showMenu(e.clientX, e.clientY, "add");
    } else {
        menu.style.display = "none";
    }
});

// Bấm chuột trái ra ngoài thì ẩn menu
document.addEventListener("click", (e) => { 
    if (menu && !menu.contains(e.target)) menu.style.display = "none"; 
});

function showMenu(x, y, mode) {
    menu.style.display = "block";
    let mw = menu.offsetWidth;
    let mh = menu.offsetHeight;
    
    // Chống tràn màn hình
    let left = x + mw > window.innerWidth ? window.innerWidth - mw - 10 : x;
    let top = y + mh > window.innerHeight ? window.innerHeight - mh - 10 : y;
    
    menu.style.left = left + "px";
    menu.style.top = top + "px";
    
    menu.children[0].style.display = (mode === "add") ? "block" : "none";
    menu.children[1].style.display = (mode === "remove") ? "block" : "none";
}

function doHighlight() {
    if (selectedRange) {
        try { 
            let span = document.createElement("span");
            span.className = "highlight";
            selectedRange.surroundContents(span); 
        } catch(e) {
            showCustomAlert("Lưu ý: Chỉ có thể bôi vàng các cụm từ nằm trong cùng một đoạn văn. Vui lòng không bôi đen vắt ngang qua các khoảng ngắt dòng nhé!");
        }
        window.getSelection().removeAllRanges();
    }
    menu.style.display = "none";
}

function removeHighlight() {
    if (targetElement) {
        let text = document.createTextNode(targetElement.textContent);
        targetElement.parentNode.replaceChild(text, targetElement);
        mainContainer.normalize(); // Nối lại văn bản liền mạch
    }
    menu.style.display = "none";
}

   // Thêm timeTaken vào tham số của hàm
    window.luuDiemTOEICReadingFull = async function(correct, total, testTitle, timeTaken) {
        if (!window.currentUserUid) return;
        
        let scoreConverted = Math.round(((correct / total) * 495) / 5) * 5;
        let timestamp = Date.now();
        let docId = window.currentUserUid + "_toeic_" + timestamp;

        let now = new Date();
        let hours = now.getHours().toString().padStart(2, '0');
        let minutes = now.getMinutes().toString().padStart(2, '0');
        let timeString = hours + ":" + minutes; 

        try {
            await setDoc(doc(db, "user_toeic_scores", docId), {
                email: window.currentUserEmail,
                skill: "Reading",
                testName: testTitle,
                partName: "Full",
                correctQ: correct,
                totalQ: total,
                score: scoreConverted,
                date: now.toLocaleDateString('vi-VN'),
                time: timeString, 
                Time: timeString, 
                timeTaken: timeTaken, // Thêm dòng này để fix lỗi undefined
                timestamp: timestamp
            });
            showInGameToast("☁️ Đã đồng bộ điểm Reading lên Tracker!");
        } catch (e) {
            console.error(e);
        }
    }
