<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Collocations Unit 1 - Family | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    
    <base target="_self"> 

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fffaf5;
            --text-main: #431407;
            --white: #ffffff;
            --primary: #f97316;
            --secondary: #9a3412;
            --border-light: #ffedd5;
            --hover-bg: #fff7ed;
        }

        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#fdba74 1px, transparent 1px);
            background-size: 25px 25px;
            color: var(--text-main);
            margin: 0; padding: 0; line-height: 1.6;
        }

        /* Đã thu nhỏ khung header */
        .sticky-header {
            position: sticky; top: 0; z-index: 1000;
            background: linear-gradient(135deg, #f97316, #ea580c);
            padding: 8px 15px; 
            text-align: center;
            box-shadow: 0 5px 15px rgba(249, 115, 22, 0.3);
            border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
            border: 3px solid #fff; border-top: none;
            backdrop-filter: blur(5px);
        }

        h1 { color: #fff; font-size: 1.35em; margin: 0; font-weight: 800; text-shadow: 1px 1px 3px rgba(0,0,0,0.1); }
        .subtitle { color: #fff; font-size: 0.9em; font-weight: 700; margin-top: 3px; }

        .score-board {
            display: inline-block; background: #fff; padding: 4px 20px;
            border-radius: 20px; font-size: 1.15em; font-weight: 800;
            color: #ea580c; margin-top: 6px; border: 2px dashed #fdba74;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
        }

        .container { max-width: 900px; margin: 30px auto 0; padding: 0 20px 50px 20px; }

        .exercise-card {
            background: var(--white); border-radius: 25px; padding: 30px;
            margin-bottom: 40px; box-shadow: 0 10px 25px rgba(154, 52, 18, 0.1);
            border-top: 8px solid var(--primary);
        }

        .ex-title { font-size: 1.5em; font-weight: 800; color: var(--secondary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        .tip-box {
            background: #fffbeb; border: 2px dashed #fcd34d; color: #92400e;
            padding: 15px 20px; border-radius: 15px; margin-bottom: 30px; font-weight: 700;
        }

        .question-block {
            background: #ffffff; border-radius: 20px; padding: 20px;
            margin-bottom: 20px; border: 2px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .question-text { font-size: 1.1em; font-weight: 700; margin-bottom: 15px; color: var(--secondary); }

        .options { display: flex; flex-direction: column; gap: 10px; }

        .option-btn {
            background: #fffcf9; border: 2px solid var(--border-light);
            padding: 12px 20px; border-radius: 12px; font-size: 1.05em;
            font-weight: 700; color: #7c2d12; cursor: pointer; text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--hover-bg); transform: translateX(5px); }
        .option-btn:disabled { cursor: not-allowed; }

        .option-btn.correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534 !important; }
        .option-btn.incorrect { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b !important; }

        .explanation { margin-top: 15px; padding: 15px 20px; border-radius: 12px; font-size: 1.05em; font-weight: 600; display: none; line-height: 1.7; }
        .explanation.show { display: block; }
        .explanation.success { background: #f0fdf4; color: #166534; border-left: 5px solid #22c55e; }
        .explanation.error { background: #fff1f2; color: #e11d48; border-left: 5px solid #f43f5e; }

        .explanation ul { margin: 5px 0; padding-left: 20px; }
        .explanation li { margin-bottom: 8px; }

        /* Đã giữ nguyên CSS nút nhưng đổi ý nghĩa ở HTML */
        .back-to-top {
            position: fixed; bottom: 25px; right: 25px; background: var(--primary);
            color: white; width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; cursor: pointer; text-decoration: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="sticky-header">
        <h1>🏡 Trạm Luyện Tập Collocations 🏡</h1>
        <div class="subtitle">Unit 1: Family (Các cụm từ về Gia Đình)</div>
        <div class="score-board">Điểm: <span id="score">0</span> / 20 ✨</div>
    </div>

    <div class="container" id="app"></div>

    <a href="unit-1-idioms.html" class="back-to-top" title="Trở về lý thuyết">🔙</a>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Choose the best answer to complete the sentences.",
                tip: "Lưu ý: Để chọn đúng, hãy phân tích xem từ đó có tạo thành một cụm từ cố định (Collocation) phổ biến hay không.",
                questions: [
                    ["Question 1: The technological advances _______ birth to the Industrial Revolution...", 
                    ["A. took", "B. gave", "C. had", "D. made"], 1, 
                    "<ul><li><strong>B đúng:</strong> Cụm từ <b>Give birth to something</b> nghĩa là sản sinh ra hoặc khai sinh ra cái gì đó (ở đây là Cách mạng Công nghiệp).</li><li><strong>A, C, D sai:</strong> Các động từ này không đi với 'birth' để tạo nghĩa 'khai sinh/tạo ra' trong ngữ cảnh này.</li></ul>"],

                    ["Question 2: A number of the kids in my classroom come from _______ homes.", 
                    ["A. broken", "B. damaged", "C. hurt", "D. separated"], 0, 
                    "<ul><li><strong>A đúng:</strong> <b>Broken home</b> là cụm từ chỉ gia đình tan vỡ (bố mẹ ly hôn).</li><li><strong>B sai:</strong> 'Damaged' thường dùng cho máy móc, vật chất bị hư hại.</li><li><strong>C sai:</strong> 'Hurt' chỉ cảm giác đau đớn về thể xác hoặc tâm hồn của cá nhân.</li><li><strong>D sai:</strong> Dù 'separated' là ly thân nhưng không tạo thành cụm danh từ 'separated home' để chỉ hoàn cảnh gia đình tan vỡ.</li></ul>"],

                    ["Question 3: After a _______ divorce from his wife of 20 years, the actor married a woman young enough to be his daughter.", 
                    ["A. hostile", "B. unhappy", "C. bitter", "D. normal"], 2, 
                    "<ul><li><strong>C đúng:</strong> <b>Bitter divorce</b> chỉ cuộc ly hôn gay gắt, đầy thù hận và xích mích tình cảm.</li><li><strong>A, B sai:</strong> Không phải là collocation chuẩn để mô tả tính chất của một vụ ly hôn.</li><li><strong>D sai:</strong> Ngữ cảnh câu mang nghĩa tiêu cực (ly hôn sau 20 năm rồi lấy vợ trẻ), không dùng 'normal' (bình thường).</li></ul>"],

                    ["Question 4: An _______ family is a family consisting of parents, children, aunts, uncles, and cousins...", 
                    ["A. nuclear", "B. loving", "C. close-knit", "D. extended"], 3, 
                    "<ul><li><strong>D đúng:</strong> <b>Extended family</b> (đại gia đình) bao gồm nhiều thế hệ và họ hàng (dì, chú, anh em họ).</li><li><strong>A sai:</strong> <b>Nuclear family</b> chỉ gồm bố mẹ và con cái ruột.</li><li><strong>B, C sai:</strong> Đây là các tính từ chỉ trạng thái tình cảm (êm ấm, khăng khít), không dùng để phân loại cấu trúc gia đình.</li></ul>"],

                    ["Question 5: His parents died in a car accident 3 years ago and he has been _______ up by his grandparents.", 
                    ["A. grown", "B. brought", "C. taken", "D. made"], 1, 
                    "<ul><li><strong>B đúng:</strong> <b>Bring up</b> nghĩa là nuôi nấng. Dạng bị động 'be brought up' là được nuôi dưỡng.</li><li><strong>A sai:</strong> <b>Grow up</b> là tự lớn lên (nội động từ), không dùng ở dạng bị động cho người.</li><li><strong>C sai:</strong> 'Take up' thường là bắt đầu một sở thích hoặc gánh vác công việc.</li><li><strong>D sai:</strong> 'Make up' mang nghĩa bịa đặt, làm hòa hoặc trang điểm.</li></ul>"],

                    ["Question 6: A _______ mother is the woman who gives birth to a child, regardless of whether she brings up the child.", 
                    ["A. step", "B. adoptive", "C. birth", "D. law"], 2, 
                    "<ul><li><strong>C đúng:</strong> <b>Birth mother</b> (mẹ đẻ) là người trực tiếp sinh ra đứa trẻ về mặt sinh học.</li><li><strong>A sai:</strong> 'Stepmother' là mẹ kế.</li><li><strong>B sai:</strong> 'Adoptive mother' là mẹ nuôi (người nhận nuôi nhưng không sinh ra).</li><li><strong>D sai:</strong> 'Mother-in-law' là mẹ chồng hoặc mẹ vợ.</li></ul>"],

                    ["Question 7: She decided to quit the job because she was not on good _______ with her boss.", 
                    ["A. terms", "B. well", "C. relations", "D. relationships"], 0, 
                    "<ul><li><strong>A đúng:</strong> Cụm từ <b>Be on good terms with someone</b> nghĩa là có mối quan hệ tốt/hòa nhã với ai đó.</li><li><strong>B sai:</strong> 'Well' là trạng từ, không đi với cấu trúc 'on good...'.</li><li><strong>C, D sai:</strong> Mặc dù 'relations/relationships' nghĩa là quan hệ nhưng không nằm trong cấu trúc thành ngữ cố định 'on good terms'.</li></ul>"],

                    ["Question 8: John had a _______ childhood, growing up with happily married parents and three brothers.", 
                    ["A. carefree", "B. careful", "C. careless", "D. troubled"], 0, 
                    "<ul><li><strong>A đúng:</strong> <b>Carefree childhood</b> là tuổi thơ êm đềm, không lo âu, hạnh phúc.</li><li><strong>B, C sai:</strong> 'Careful' (cẩn thận) và 'Careless' (cẩu thả) dùng cho tính cách, không dùng cho thời kỳ thơ ấu.</li><li><strong>D sai:</strong> <b>Troubled childhood</b> là tuổi thơ khó khăn, đầy biến cố (ngược với mô tả cha mẹ hạnh phúc trong đề).</li></ul>"],

                    ["Question 9: My aunt's going through a _______ divorce; she's paying a fortune in legal fees.", 
                    ["A. bitter", "B. messy", "C. mutual", "D. carefree"], 1, 
                    "<ul><li><strong>B đúng:</strong> <b>Messy divorce</b> chỉ cuộc ly hôn phức tạp, có tranh chấp tài sản và tốn kém phí pháp lý.</li><li><strong>A sai:</strong> 'Bitter' nhấn mạnh vào sự thù hằn tình cảm hơn là khía cạnh tài chính/pháp lý.</li><li><strong>C sai:</strong> 'Mutual divorce' là ly hôn đồng thuận, thường nhanh chóng và ít tốn kém hơn.</li><li><strong>D sai:</strong> 'Carefree' (không lo âu) hoàn toàn vô nghĩa khi đi với ly hôn.</li></ul>"],

                    ["Question 10: Some women choose to _______ an abortion rather than care for a severely disabled child.", 
                    ["A. have", "B. give", "C. get", "D. A and C"], 3, 
                    "<ul><li><strong>D đúng:</strong> Cả <b>Have an abortion</b> và <b>Get an abortion</b> đều là những cụm từ chuẩn để chỉ việc phá thai.</li><li><strong>B sai:</strong> Không dùng động từ 'Give' trong ngữ cảnh này.</li></ul>"],

                    ["Question 11: A judge might _______ sole custody to the mother, and the father has to pay child support.", 
                    ["A. reward", "B. award", "C. receive", "D. accept"], 1, 
                    "<ul><li><strong>B đúng:</strong> <b>Award sole custody</b> là thuật ngữ pháp lý: giao quyền nuôi con duy nhất cho ai đó.</li><li><strong>A sai:</strong> 'Reward' là thưởng cho công lao, không dùng cho quyết định của tòa án.</li><li><strong>C, D sai:</strong> Quan tòa là người đưa ra phán quyết (trao quyền), không phải người nhận quyền nuôi con.</li></ul>"],

                    ["Question 12: He is a _______ boy in the family and his parents always give him everything he wants.", 
                    ["A. blue-eyed", "B. naked-eyed", "C. black sheep", "D. spoiled"], 0, 
                    "<ul><li><strong>A đúng:</strong> <b>Blue-eyed boy</b> là thành ngữ chỉ 'đứa con cưng' hoặc người được ưu ái nhất.</li><li><strong>B sai:</strong> 'Naked-eyed' là mắt thường (quan sát không dùng kính).</li><li><strong>C sai:</strong> 'Black sheep' là đứa con phá gia chi tử, làm xấu mặt gia đình.</li><li><strong>D sai:</strong> Dù 'spoiled' (bị nuông chiều) hợp nghĩa, nhưng đề bài cần một cụm thành ngữ đi với danh từ 'boy'.</li></ul>"],

                    ["Question 13: My sister _______ pregnant immediately after she got married.", 
                    ["A. took", "B. gave", "C. had", "D. got"], 3, 
                    "<ul><li><strong>D đúng:</strong> Cụm từ cố định là <b>Get pregnant</b> (mang thai).</li><li><strong>A, B, C sai:</strong> Các động từ này không kết hợp với tính từ 'pregnant' để tạo nghĩa mang bầu.</li></ul>"],

                    ["Question 14: _______ is the fact of someone having been born into a family that belongs to the highest social class.", 
                    ["A. Cold blood", "B. Blue blood", "C. Bad blood", "D. Fresh blood"], 1, 
                    "<ul><li><strong>B đúng:</strong> <b>Blue blood</b> (máu xanh) là thành ngữ chỉ dòng giống hoàng tộc hoặc giới thượng lưu.</li><li><strong>A sai:</strong> 'Cold blood' là máu lạnh (tàn nhẫn).</li><li><strong>C sai:</strong> 'Bad blood' là sự thù hằn giữa hai bên.</li><li><strong>D sai:</strong> 'Fresh blood' chỉ những thành viên mới, nhân tố mới.</li></ul>"],

                    ["Question 15: My son is making a diagram of our family _______ for a school project.", 
                    ["A. background", "B. tree", "C. root", "D. roof"], 1, 
                    "<ul><li><strong>B đúng:</strong> <b>Family tree</b> là sơ đồ cây gia đình (gia phả).</li><li><strong>A sai:</strong> 'Background' là nền tảng, hoàn cảnh xuất thân.</li><li><strong>C sai:</strong> 'Root' là gốc rễ.</li><li><strong>D sai:</strong> 'Roof' là mái nhà.</li></ul>"],

                    ["Question 16: My wife is pregnant with twins. They are _______ in February.", 
                    ["A. come", "B. date", "C. due", "D. here"], 2, 
                    "<ul><li><strong>C đúng:</strong> <b>Due</b> (hoặc be due) dùng để nói về thời điểm dự kiến em bé sẽ chào đời.</li><li><strong>A, B, D sai:</strong> Không đúng cấu trúc chuyên dụng để nói về ngày dự sinh.</li></ul>"],

                    ["Question 17: ...you may give the baby _______ adoption. There are professional services to help you.", 
                    ["A. up for", "B. in for", "C. out of", "D. up to"], 0, 
                    "<ul><li><strong>A đúng:</strong> <b>Give the baby up for adoption</b> là cụm từ chuẩn nghĩa là đem con cho người khác nhận nuôi.</li><li><strong>B, C, D sai:</strong> Các giới từ này không tạo thành cụm từ có ý nghĩa trên.</li></ul>"],

                    ["Question 18: Sally was granted sole _______ of the children from her first marriage.", 
                    ["A. keeping", "B. custody", "C. guardian", "D. protection"], 1, 
                    "<ul><li><strong>B đúng:</strong> <b>Sole custody</b> nghĩa là quyền nuôi con duy nhất (chỉ vợ hoặc chồng có quyền).</li><li><strong>A, C, D sai:</strong> Không phải thuật ngữ pháp lý dùng để chỉ quyền nuôi dưỡng trẻ em sau ly hôn.</li></ul>"],

                    ["Question 19: The celebrity wrote a book about his _______ family.", 
                    ["A. debilitated", "B. defective", "C. dysfunctional", "D. effective"], 2, 
                    "<ul><li><strong>C đúng:</strong> <b>Dysfunctional family</b> là gia đình không êm ấm, thường xuyên có xung đột và bất hòa.</li><li><strong>A sai:</strong> 'Debilitated' thường dùng cho sức khỏe bị suy yếu.</li><li><strong>B sai:</strong> 'Defective' dùng cho sản phẩm bị lỗi kỹ thuật.</li><li><strong>D sai:</strong> 'Effective' (hiệu quả) không dùng để mô tả tính chất gia đình trong ngữ cảnh này.</li></ul>"],

                    ["Question 20: They have three biological children and two _______ children.", 
                    ["A. adopted", "B. adoptive", "C. adopting", "D. adoptable"], 0, 
                    "<ul><li><strong>A đúng:</strong> <b>Adopted child</b> là con nuôi (đứa trẻ được người khác nhận về nuôi).</li><li><strong>B sai:</strong> 'Adoptive' dùng cho bố mẹ (adoptive parents - bố mẹ nuôi).</li><li><strong>C, D sai:</strong> Không dùng làm tính từ đứng trước danh từ để chỉ đứa trẻ đã được nhận nuôi.</li></ul>"]
                ]
            }
        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        exercises.forEach((ex, exIndex) => {
            const card = document.createElement("div");
            card.className = "exercise-card";
            card.innerHTML = `
                <h2 class="ex-title">✨ ${ex.title}</h2>
                <div class="tip-box">💡 <strong>Hướng dẫn:</strong> ${ex.tip}</div>
                <div id="q-container-${exIndex}"></div>
            `;
            app.appendChild(card);

            const qContainer = card.querySelector(`#q-container-${exIndex}`);
            ex.questions.forEach((qObj, qIdx) => {
                const [qText, options, correctIdx, expText] = qObj;
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";
                qBlock.innerHTML = `
                    <div class="question-text">${qText}</div>
                    <div class="options"></div>
                    <div class="explanation"></div>
                `;
                
                const optDiv = qBlock.querySelector(".options");
                const expDiv = qBlock.querySelector(".explanation");

                options.forEach((opt, idx) => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    btn.onclick = () => {
                        const siblings = optDiv.querySelectorAll(".option-btn");
                        siblings.forEach(b => b.disabled = true);
                        
                        if(idx === correctIdx) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.className = "explanation success show";
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> ${expText}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings[correctIdx].classList.add("correct");
                            expDiv.className = "explanation error show";
                            expDiv.innerHTML = `❌ <strong>Chưa đúng rồi!</strong> ${expText}`;
                        }
                    };
                    optDiv.appendChild(btn);
                });
                qContainer.appendChild(qBlock);
            });
        });
    </script>
</body>
</html>
