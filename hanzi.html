<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luyện Viết Hán Tự | SnapChinese</title>
  <link rel="icon" type="image/png" href="ảnh.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

  <style>
    :root {
      --primary: #e63946;
      --secondary: #ff4d6d;
      --bg: #fff5f5;
      --glass: rgba(255, 255, 255, 0.85);
      --shadow: 0 10px 30px rgba(230, 57, 70, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #fff0f0 0%, #ffe6e6 100%);
      color: #2d3436;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* --- GIAO DIỆN TẬP TRUNG (DEEP WORK) --- */
    .writing-container {
      max-width: 900px;
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 40px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .header-info { margin-bottom: 30px; }
    .header-info h1 { font-weight: 800; color: var(--primary); font-size: 2rem; margin-bottom: 10px; }
    .header-info p { font-weight: 600; color: #636e72; }

    /* --- KHUNG VIẾT CHỮ (MI ZI GE) --- */
    .practice-area {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      align-items: center;
    }

    #target-word-container {
      background: white;
      border: 4px solid var(--primary);
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s ease;
      position: relative;
    }
    /* Tạo lưới Mễ Tự Cách (Mi Zi Ge) bằng CSS */
    #target-word-container::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(to right, rgba(230, 57, 70, 0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(230, 57, 70, 0.1) 1px, transparent 1px),
        linear-gradient(45deg, transparent 49%, rgba(230, 57, 70, 0.1) 49%, rgba(230, 57, 70, 0.1) 51%, transparent 51%),
        linear-gradient(-45deg, transparent 49%, rgba(230, 57, 70, 0.1) 49%, rgba(230, 57, 70, 0.1) 51%, transparent 51%);
      background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%;
      pointer-events: none;
    }

    .word-details {
      flex: 1;
      min-width: 280px;
      text-align: left;
      background: rgba(255, 77, 109, 0.05);
      padding: 25px;
      border-radius: 20px;
      border-left: 5px solid var(--primary);
    }

    .word-details h2 { font-size: 1.5rem; margin-bottom: 10px; color: var(--primary); }
    .detail-item { margin-bottom: 8px; font-weight: 700; }
    .detail-item span { color: #636e72; font-weight: 400; }

    /* --- ĐIỀU KHIỂN --- */
    .controls {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 15px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-animate { background: var(--primary); color: white; }
    .btn-quiz { background: #ff8a00; color: white; }
    .btn-reset { background: #e2e8f0; color: #475569; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); opacity: 0.9; }

    /* --- LỘ TRÌNH CHI TIẾT --- */
    .roadmap-section {
      margin-top: 50px;
      width: 100%;
      max-width: 900px;
    }

    .roadmap-title {
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hsk-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .hsk-tab {
      padding: 8px 20px;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
      border: 2px solid transparent;
      transition: 0.3s;
    }

    .hsk-tab.active {
      border-color: var(--primary);
      color: var(--primary);
      background: #fff0f0;
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 15px;
    }

    .word-card {
      background: white;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid #eee;
      font-family: "Ma Shan Zheng", cursive;
    }

    .word-card:hover {
      background: var(--primary);
      color: white;
      transform: scale(1.1);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Floating Home Button */
    .back-home {
      position: fixed; bottom: 30px; left: 30px;
      width: 50px; height: 50px; background: white;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 20px; box-shadow: var(--shadow);
      z-index: 100; transition: 0.3s;
    }
    .back-home:hover { transform: rotate(-10deg) scale(1.1); }
  </style>
</head>

<body>

  <a href="hsk-index.html" class="back-home">🏮</a>

  <div class="writing-container">
    <div class="header-info">
      <h1>Luyện Viết Hán Tự 🖌️</h1>
      <p>Nắm vững quy tắc bút thuận - Khơi nguồn cảm hứng học tập</p>
    </div>

    <div class="practice-area">
      <div id="target-word-container"></div>

      <div class="word-details">
        <h2 id="char-name">你好 (Nǐ hǎo)</h2>
        <div class="detail-item">Hán Việt: <span id="char-hv">Nễ Hảo</span></div>
        <div class="detail-item">Ý nghĩa: <span id="char-mean">Lời chào (Xin chào)</span></div>
        <div class="detail-item">Bộ thủ: <span id="char-radical">人 (Nhân)</span></div>
        <div class="detail-item">Số nét: <span id="char-strokes">7 nét</span></div>
        <div style="margin-top:15px; font-style: italic; font-size: 0.9rem; color: #888;">
          * Mẹo: Viết từ trái sang phải, từ trên xuống dưới.
        </div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-animate" onclick="writer.animateCharacter()">▶️ Xem quy tắc nét</button>
      <button class="btn btn-quiz" onclick="writer.quiz()">📝 Thử thách viết</button>
      <button class="btn btn-reset" onclick="writer.cancelQuiz(); writer.showCharacter();">🔄 Làm mới</button>
    </div>
  </div>

  <div class="roadmap-section">
    <h3 class="roadmap-title">🎯 Lộ trình chinh phục HSK</h3>
    
    <div class="hsk-tabs">
      <div class="hsk-tab active" onclick="loadWordSet(1)">HSK 1</div>
      <div class="hsk-tab" onclick="loadWordSet(2)">HSK 2</div>
      <div class="hsk-tab" onclick="loadWordSet(3)">HSK 3</div>
      <div class="hsk-tab" onclick="loadWordSet(4)">HSK 4</div>
      <div class="hsk-tab" onclick="loadWordSet(5)">HSK 5</div>
      <div class="hsk-tab" onclick="loadWordSet(6)">HSK 6</div>
    </div>

    <div class="word-grid" id="word-list">
      </div>
  </div>

  <script>
    let writer;
    const currentData = {
      char: '你',
      name: '你 (Nǐ)',
      hv: 'Nễ',
      mean: 'Bạn, anh, chị (ngôi thứ 2)',
      radical: '人 (Nhân)',
      strokes: '7 nét'
    };

    // Khởi tạo Hanzi Writer
    function initWriter(char) {
      document.getElementById('target-word-container').innerHTML = ''; // Clear cũ
      writer = HanziWriter.create('target-word-container', char, {
        width: 250,
        height: 250,
        padding: 20,
        strokeAnimationSpeed: 1, 
        delayBetweenStrokes: 200, // Ms
        strokeColor: '#e63946', // Màu nét vẽ
        outlineColor: '#eee',
        showOutline: true,
        showCharacter: true
      });
    }

    // Load dữ liệu chữ
    function updateCharInfo(data) {
      document.getElementById('char-name').innerText = data.name;
      document.getElementById('char-hv').innerText = data.hv;
      document.getElementById('char-mean').innerText = data.mean;
      document.getElementById('char-radical').innerText = data.radical;
      document.getElementById('char-strokes').innerText = data.strokes;
      initWriter(data.char);
    }

    // Dữ liệu mẫu cho Lộ trình (Thực tế bạn sẽ lấy từ Database/Firebase)
    const hskData = {
      1: [
        {char: '我', name: '我 (Wǒ)', hv: 'Ngã', mean: 'Tôi', radical: '戈', strokes: '7'},
        {char: '你', name: '你 (Nǐ)', hv: 'Nễ', mean: 'Bạn', radical: '人', strokes: '7'},
        {char: '好', name: '好 (Hǎo)', hv: 'Hảo', mean: 'Tốt/Ngon', radical: '女', strokes: '6'},
        {char: '爱', name: '爱 (Ài)', hv: 'Ái', mean: 'Yêu', radical: '爪', strokes: '10'},
        {char: '家', name: '家 (Jiā)', hv: 'Gia', mean: 'Nhà', radical: '宀', strokes: '10'},
        {char: '学', name: '学 (Xué)', hv: 'Học', mean: 'Học tập', radical: '子', strokes: '8'},
        {char: '书', name: '书 (Shū)', hv: 'Thư', mean: 'Sách', radical: '丨', strokes: '4'},
        {char: '水', name: '水 (Shuǐ)', hv: 'Thủy', mean: 'Nước', radical: '水', strokes: '4'}
      ],
      2: [
        {char: '唱', name: '唱 (Chàng)', hv: 'Xướng', mean: 'Hát', radical: '口', strokes: '11'},
        {char: '跳', name: '跳 (Tiào)', hv: 'Khiêu', mean: 'Nhảy', radical: '足', strokes: '13'}
      ]
    };

    function loadWordSet(level) {
      // Cập nhật tab active
      document.querySelectorAll('.hsk-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');

      const listContainer = document.getElementById('word-list');
      listContainer.innerHTML = '';

      const words = hskData[level] || [];
      words.forEach(item => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerText = item.char;
        card.onclick = () => updateCharInfo(item);
        listContainer.appendChild(card);
      });
    }

    // Khởi tạo mặc định
    window.onload = () => {
      updateCharInfo(currentData);
      loadWordSet(1);
    };
  </script>
</body>
</html>
