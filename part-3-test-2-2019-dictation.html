<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 3 Test 2 (2019) | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* TÔNG MÀU MỚI: Dark Violet & Emerald */
        :root {
            --primary: #4C1D95;         /* Violet 900 */
            --primary-hover: #5B21B6;   /* Violet 800 */
            --secondary: #ECFDF5;       /* Emerald 50 */
            --accent: #10B981;          /* Emerald 500 (Ngọc Lục Bảo) */
            --blue-pastel: #F5F3FF;     /* Violet 50 */
            --blue-dark: #2E1065;       /* Violet 950 */
            --text-dark: #0F172A;       /* Slate 900 */
            --text-light: #475569;      /* Slate 600 */
            --bg-main: #F8FAFC;         /* Slate 50 */
            --white: #FFFFFF;
            --brand-pink: #10B981;      /* Emerald 500 cho Logo SnapEnglish */
            --brand-text: #0F172A;
            --error-glow: #E11D48;      /* Rose 600 (Đỏ báo lỗi) */
            
            /* Màu huy hiệu cho Part 3 (Hội thoại) */
            --badge-male-bg: #E0E7FF; --badge-male-border: #C7D2FE; --badge-male-text: #3730A3;
            --badge-female-bg: #FCE7F3; --badge-female-border: #FBCFE8; --badge-female-text: #9D174D;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Bố cục full màn hình (Gỡ bỏ max-width) */
        .layout-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }
        .brand-badge {
            background-color: var(--brand-pink);
            color: var(--white);
            font-weight: 800;
            font-size: 26px;
            padding: 8px 20px;
            border-radius: 15px;
            letter-spacing: -0.5px;
        }
        .brand-title {
            color: var(--brand-text);
            font-weight: 800;
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        .layout-container {
            display: flex;
            gap: 25px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
        }

        /* LEFT PANEL */
        .sidebar {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(76, 29, 149, 0.08);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #E2E8F0;
        }

        .progress-section { text-align: center; }
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, #eee 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; transition: background 0.5s;
        }
        .progress-circle::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--white); border-radius: 50%; }
        .progress-text { position: relative; z-index: 1; font-size: 28px; font-weight: 700; color: var(--primary); }

        .instructions { background: var(--blue-pastel); padding: 20px; border-radius: 15px; color: var(--blue-dark); border: 1px solid #DDD6FE;}
        .instructions h3 { margin-bottom: 15px; font-size: 18px; }
        .instructions ul { list-style: none; }
        .instructions li { margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        kbd { background: var(--white); border: 1px solid #CBD5E1; border-radius: 4px; padding: 3px 8px; font-family: monospace; font-size: 13px; font-weight: bold; box-shadow: 0 2px 0 #CBD5E1; color: #333;}

        /* RIGHT PANEL */
        .main-content {
            flex: 3; background: var(--white); border-radius: 20px; padding: 35px;
            box-shadow: 0 10px 30px rgba(76, 29, 149, 0.08); display: flex; flex-direction: column; position: relative;
            border: 1px solid #E2E8F0;
        }

        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #E2E8F0; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-light); }
        select { padding: 6px 12px; border-radius: 8px; border: 1px solid #CBD5E1; outline: none; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 600; color: var(--text-dark);}

        /* Khung hiển thị ảnh (Cho các câu có lược đồ Part 3) */
        .image-section { text-align: center; margin-bottom: 15px; display: none; } /* Ẩn mặc định */
        .part1-image { 
            max-height: 250px; 
            max-width: 100%; 
            height: auto; 
            object-fit: contain; 
            border-radius: 10px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            border: 2px solid #eee;
        }

        .audio-section { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 15px;}
        
        .speaker-badge { display: inline-block; padding: 8px 30px; border-radius: 20px; font-weight: bold; font-size: 16px; }
        .speaker-male { background: var(--badge-male-bg); color: var(--badge-male-text); border: 1px solid var(--badge-male-border); }
        .speaker-female { background: var(--badge-female-bg); color: var(--badge-female-text); border: 1px solid var(--badge-female-border); }

        .btn-play { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 15px rgba(76, 29, 149, 0.3);}
        .btn-play:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .input-section { flex-grow: 1; display: flex; flex-direction: column; }
        
        /* Hiệu ứng báo lỗi phát sáng */
        .message { text-align: center; margin-bottom: 10px; min-height: 45px; }
        .glow-error {
            color: var(--error-glow);
            text-shadow: 0 0 12px rgba(225, 29, 72, 0.6);
            font-weight: 800;
            background: #FFF1F2;
            padding: 2px 6px;
            border-radius: 6px;
            border: 2px dashed var(--error-glow);
            display: inline-block;
            transform: scale(1.05);
        }
        
        textarea { width: 100%; height: 120px; padding: 20px; border: 2px solid #CBD5E1; border-radius: 15px; font-size: 22px; outline: none; transition: 0.3s; resize: none; color: var(--text-dark); line-height: 1.6; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(76, 29, 149, 0.15); }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-enter { background: var(--blue-dark); color: var(--white); }
        .btn-enter:hover { background: #000000; }
        .btn-hint { background: var(--secondary); color: var(--accent); border: 1px solid #A7F3D0; }
        .btn-hint:hover { background: #D1FAE5; }
        .btn-nav { background: #F8FAFC; color: #475569; border: 1px solid #E2E8F0;}
        .btn-nav:hover { background: #F1F5F9; }

        /* MODAL POPUP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 35px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative; max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: var(--accent); font-size: 22px; margin-bottom: 15px; text-align: center; }
        .modal-script { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-align: center; padding-bottom: 15px; border-bottom: 2px dashed #E2E8F0;}
        .modal-content p { margin-bottom: 10px; line-height: 1.6; font-size: 16px; }
        
        .btn-next-modal { width: 100%; background: var(--primary); color: white; margin-top: 20px; padding: 15px; font-size: 18px; }
        .btn-next-modal:hover { background: var(--primary-hover); }

        /* END SCREEN */
        .end-screen { display: none; text-align: center; padding-top: 20px;}
        .transcript-box { text-align: left; background: #F8FAFC; padding: 25px; border-radius: 15px; height: 350px; overflow-y: auto; margin: 25px 0; border: 1px solid #E2E8F0; line-height: 1.8; font-size: 16px;}

        @media (max-width: 850px) {
            .layout-container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .main-content { flex: none; width: 100%; order: 1; min-height: 500px;}
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="header-brand">
        <div class="brand-badge">SnapEnglish</div>
        <div class="brand-title">Part 3 Test 2 (2019)</div>
    </div>

    <div class="layout-container" id="app">
        <div class="sidebar">
            <div class="progress-section">
                <h2 style="color: var(--text-dark); margin-bottom: 25px; font-size: 22px;">Tiến độ bài học</h2>
                <div class="progress-circle" id="progress-ring"><div class="progress-text"><span id="progress-percent">0</span>%</div></div>
                <p style="color: var(--text-light); font-weight: 600; margin-top: 15px;">Câu: <span id="current-sentence-num">1</span> / <span id="total-sentences"></span></p>
                <p style="font-size: 14px; color: #888; margin-top: 5px;">Số lần luyện tập: <span id="study-count">0</span></p>
            </div>
            <div class="instructions">
                <h3>⌨️ Hướng dẫn phím tắt</h3>
                <ul>
                    <li><kbd>Ctrl</kbd> Lặp lại Audio.</li>
                    <li><kbd>Tab</kbd> Gợi ý từ tiếp theo.</li>
                    <li><kbd>Enter</kbd> Kiểm tra đáp án / Chuyển câu.</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div id="learning-screen" style="display: flex; flex-direction: column; height: 100%;">
                <div class="settings-bar">
                    <div class="setting-group">
                        <label>Tốc độ:</label>
                        <select id="speed-setting">
                            <option value="0.7">0.7x</option>
                            <option value="0.9" selected>0.9x</option>
                            <option value="1.0">1.0x</option>
                            <option value="1.2">1.2x</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Lặp tự động:</label>
                        <select id="repeat-setting">
                            <option value="1" selected>1 lần</option>
                            <option value="2">2 lần</option>
                            <option value="3">3 lần</option>
                        </select>
                    </div>
                </div>

                <div class="image-section" id="image-section">
                    <img id="question-image" class="part1-image" src="" alt="Part 3 Graphic">
                </div>

                <div class="audio-section">
                    <div id="speaker-label" class="speaker-badge speaker-male">👨 Man</div>
                    <button class="btn-play" onclick="playAudio()">🔊 Nghe Audio (Ctrl)</button>
                </div>
                
                <div class="message" id="system-message"></div>

                <div class="input-section">
                    <textarea id="user-input" placeholder="Lắng nghe hội thoại và gõ vào đây..." autofocus></textarea>
                    
                    <div class="actions">
                        <button class="btn btn-nav" onclick="prevSentenceManual()">⬅️ Back</button>
                        <button class="btn btn-enter" onclick="handleEnterAction()">Kiểm tra (Enter)</button>
                        <button class="btn btn-hint" onclick="giveHint()">💡 Gợi ý (Tab)</button>
                        <button class="btn btn-nav" onclick="nextSentenceManual()">Next ➡️</button>
                    </div>
                </div>
            </div>

            <div id="end-screen" class="end-screen">
                <h2 style="color: var(--primary); font-size: 28px;">Tuyệt vời! Hoàn thành Test 🏆</h2>
                <div class="transcript-box" id="full-transcript"></div>
                <div class="actions">
                    <button class="btn btn-enter" onclick="restartLesson()">🔄 Luyện tập lại</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
        <h3>🎉 Chính xác!</h3>
        <div class="modal-script" id="trans-en"></div>
        <p><strong>🇻🇳 Nghĩa:</strong> <span id="trans-vi"></span></p>
        <button class="btn btn-next-modal" onclick="nextSentence()">Qua câu tiếp theo (Enter) ➔</button>
    </div>
</div>

<script>
    // TOÀN BỘ DỮ LIỆU ĐƯỢC TRÍCH XUẤT TỪ FILE "part 3 test 2 2019.docx"
    const lessonData = [
        // Conversation 1 (32-34)
        { en: "Hi, Ms. Larson. Thanks for agreeing to review the budget report that I prepared. I wanted to make sure that I did it correctly since it's my first time.", vi: "Chào cô Larson. Cám ơn vì đã đồng ý phê duyệt báo cáo ngân sách tôi đã chuẩn bị. Tôi muốn chắc chắn rằng mình làm nó chính xác bởi đây là lần đầu tiên tôi làm.", speaker: "Man", gender: "male" },
        { en: "Yes, Jason, it looked very good overall. The only thing I'll need you to do is to add more details to the expenditures list. We like to have every office supply itemized.", vi: "Ừ, Jason, tổng quan thì nó rất ổn. Chỉ có một thứ tôi cần cậu làm đó là thêm các chi tiết vào danh sách chi tiêu. Chúng tôi muốn mọi dụng cụ văn phòng được chia thành từng nhóm.", speaker: "Woman", gender: "female" },
        { en: "Oh, OK, sure. I'll work on getting those details this afternoon. It would be helpful to see how it was done in the past. Is there an example of a report that I can look at?", vi: "Ồ, Ok, được ạ. Tôi sẽ thêm những chi tiết đó ngay chiều nay. Sẽ khá có ích khi được xem nó đã được làm thế nào trước đây. Có ví dụ mẫu của báo cáo nào mà tôi có thể xem không ạ?", speaker: "Man", gender: "male" },
        { en: "You should talk to Emiko - she can give you a copy of last month's report.", vi: "Cậu nên nói với Emiko – cô ta có thể đưa cậu một bản sao của bản báo cáo tháng trước.", speaker: "Woman", gender: "female" },

        // Conversation 2 (35-37)
        { en: "Ms. Batra, how does the stage look to you? Is the piano in the right place?", vi: "Cô Batra, sân khấu trông thế nào theo ý cô? Cái đàn piano (dương cầm) nằm đúng vị trí chứ?", speaker: "Man", gender: "male" },
        { en: "The stage arrangement is fine. But can we make sure that there'll be enough background lighting? I want all the members of my band to be visible.", vi: "Sắp xếp sân khấu thì ổn. Nhưng liệu chúng ta có thể đảm bảo sẽ có đủ ánh sáng hậu cảnh chứ? Tôi muốn mọi thành viên trong ban nhạc của tôi đều được nhìn thấy.", speaker: "Woman", gender: "female" },
        { en: "Of course. But I'd rather do it when the rest of your band is here so I can be sure the lighting is right.", vi: "Tất nhiên. Nhưng tôi muốn làm điều đó khi toàn bộ ban nhạc có mặt tại đây để tôi có thể đảm bảo ánh sáng cho đúng.", speaker: "Man", gender: "male" },
        { en: "OK. I'm meeting them for lunch and then we're coming back here to rehearse together this afternoon. We'll see you then.", vi: "Ok. Tôi sắp gặp họ trong bữa trưa và rồi chúng tôi sẽ quay lại đây cùng diễn tập vào buổi chiều. Sẽ gặp anh lúc đó nhé.", speaker: "Woman", gender: "female" },

        // Conversation 3 (38-40)
        { en: "Hi, Bob, I received your e-mail about the software training at two P.M. this Friday. But I have to meet with the marketing director of J. Alderman and Sons at that time.", vi: "Ê Bob, tớ đã nhận email của cậu về đợt tập huấn phần mềm vào hai giờ chiều thứ sáu này. Nhưng tớ phải gặp giám đốc tiếp thị của J. Alderman và Sons tại thời điểm đó.", speaker: "Woman", gender: "female" },
        { en: "Oh, I'm sorry; I completely forgot that you had a client meeting. How long do you think it'll take?", vi: "Ồ, tớ xin lỗi; tớ quên hẳn rằng cậu có một buổi gặp mặt khách hàng. Cậu nghĩ bao lâu thì nó sẽ xong?", speaker: "Man", gender: "male" },
        { en: "Probably thirty to forty-five minutes. I have to review a contract with him. Is there any way that you could start the training later in the day?", vi: "Khoảng từ ba mươi tới bốn mươi lăm phút. Tớ phải phê duyệt một hợp đồng với ông ta. Có cách nào để cậu bắt đầu tập huấn trễ hơn vào hôm đó không?", speaker: "Woman", gender: "female" },
        { en: "Unfortunately, the rest of the team isn't free after three P.M., but if it's OK with you, I can just e-mail you the training documents to look over on your own. Contact me next week if you have any questions.", vi: "Không may là cả đội sẽ không rảnh sau ba giờ chiều, nhưng nếu điều này ổn với cậu thì tớ có thể gửi email mấy văn bảng tập huấn cho cậu để cậu tự xem. Liên lạc với tớ tuần sau nếu cậu có câu hỏi nào nhé.", speaker: "Man", gender: "male" },

        // Conversation 4 (41-43)
        { en: "OK, Mr. Patel. Did the doctor want you to make another appointment?", vi: "Ok, ông Patel. Bác sĩ có dặn ông sắp xếp một cuộc hẹn khác không?", speaker: "Woman", gender: "female" },
        { en: "Yes, but I'll have to check my work calendar.", vi: "Có, nhưng tôi phải xem lại lịch làm việc của mình đã.", speaker: "Man", gender: "male" },
        { en: "You can now make appointments on our Web site if you have an account. Just log on and view available times online.", vi: "Giờ đây ông có thể tạo một cuộc hẹn trên trang Web của chúng tôi nếu ông có tài khoản. Cứ đăng nhập vào và xem thời gian phù hợp trực tuyến.", speaker: "Woman", gender: "female" },
        { en: "Great. How do I sign up for an account?", vi: "Tuyệt. Tôi đăng ký tài khoản thế nào đây?", speaker: "Man", gender: "male" },
        { en: "Colin handles all registrations. Colin, can you help Mr. Patel set up a patient account on our Web site?", vi: "Colin lo hết mọi vấn đề đăng nhập. Colin, cậu giúp ông Patel tạo một tài khoản bệnh nhân trên trang Web của chúng ta nhé?", speaker: "Woman", gender: "female" },
        { en: "Certainly. If you have a smart phone, we can do it now. Or I can give you a handout with instructions to set up your account later.", vi: "Chắc chắn rồi. Nếu ông có điện thoại thông minh, ta có thể làm ngay. Hoặc tôi có thể đưa ông một tờ hướng dẫn để tạo tài khoản sau.", speaker: "Man", gender: "male" },
        { en: "I’ll set it up later.", vi: "Tôi sẽ tạo nó sau.", speaker: "Man", gender: "male" },
        { en: "OK. Here's the handout. Please call with any questions.", vi: "Vâng. Đây là tờ hướng dẫn. Gọi chúng tôi nếu có câu hỏi nào nhé.", speaker: "Man", gender: "male" },

        // Conversation 5 (44-46)
        { en: "Mina, I was thinking about our travel plans for the industry conference we're going to in Boston. It's only two weeks away.", vi: "Mina, tớ đang nghĩ về kế hoạch đi lại của chúng ta cho hội nghị công nghiệp mà chúng ta sẽ tới ở Boston. Chỉ còn hai tuần nữa thôi.", speaker: "Man", gender: "male" },
        { en: "Well, the three of us are all taking the same flight, so maybe we could ride together from the office to the airport. But, we'll be gone for several days, so the cost of parking would really add up.", vi: "Ừ thì, cả ba chúng ta đều đi cùng một chuyến bay, nên có lẽ chúng ta có thể đi cùng xe từ văn phòng tới sân bay. Nhưng chúng ta sẽ đi tận vài ngày, nên phí đỗ xe sẽ tăng cao lắm đây.", speaker: "Woman", gender: "female" },
        { en: "True. You know, I think it's twenty dollars to take a taxi.", vi: "Đúng thật. Cậu biết không, tớ nghĩ chỉ có hai mươi đô cho một chuyến taxi thôi.", speaker: "Man", gender: "male" },
        { en: "That's a possibility. Let's ask Martin what he thinks.", vi: "Đó là một cách khả thi. Để hỏi xem Martin nghĩ thế nào.", speaker: "Woman", gender: "female" },

        // Conversation 6 (47-49)
        { en: "Sam, Mr. Kim just called about his order. He wants us to double the number of uniforms we're making for his hotel staff.", vi: "Sam, ông Kim vừa mới gọi cho tôi nói về đơn hàng của ông ấy. Ông ấy muốn chúng ta gấp đôi số đồng phục mà chúng ta đang làm cho nhân viên của khách sạn ông ấy.", speaker: "Woman", gender: "female" },
        { en: "That's great news! Has the deadline changed also?", vi: "Thật là một tin tốt! Thời hạn cũng được thay đổi phải không?", speaker: "Man", gender: "male" },
        { en: "Actually, he still wants the order to be finished by the first of May.", vi: "Thật ra, ông ấy vẫn muốn đơn hàng được hoàn tất vào ngày đầu tháng Năm.", speaker: "Woman", gender: "female" },
        { en: "Hmm... That's a problem. There's no way we can make so many uniforms that quickly.", vi: "Hừm… Rắc rối đây. Không cách gì chúng ta có thể làm một lượng lớn đồng phục nhanh vậy được.", speaker: "Man", gender: "male" },
        { en: "How about we hire some part-time tailors to help with this extra work?", vi: "Hay là chúng ta thuê thêm thợ may bán thời gian để phụ phần việc thêm này?", speaker: "Woman", gender: "female" },
        { en: "Good idea. Can you get a list of names for me?", vi: "Ý hay đấy. Lấy cho tôi danh sách tên được chứ?", speaker: "Man", gender: "male" },

        // Conversation 7 (50-52)
        { en: "Hello, Ma'am. Thanks for shopping at Freshmade Supermarket. Do you have one of our loyalty cards?", vi: "Chào chị. Cám ơn chị đã mua hàng ở Siêu thị Freshmade. Chị có thẻ thành viên của tụi em không ạ?", speaker: "Man", gender: "male" },
        { en: "Yes, but I forgot to bring it today.", vi: "Có, nhưng hôm nay chị quên mang mất rồi.", speaker: "Woman", gender: "female" },
        { en: "Unfortunately, I can't look up your phone number because our computer system isn't working, so I can't give you a discount today.", vi: "Thật không may, em không thể tìm số điện thoại của chị vì hệ thống máy tính bên em không hoạt động, nên không thể giảm giá cho chị hôm nay được.", speaker: "Man", gender: "male" },
        { en: "OK. I understand. Oh, and I took this bottle of soy sauce from the shelf, but I don't want to buy it now.", vi: "Không sao, chị hiểu mà. Ồ, với lại chị lấy chai nước tương này trên kệ, nhưng hiện giờ chị chưa muốn mua nó.", speaker: "Woman", gender: "female" },
        { en: "That's fine, I know where it belongs. Now, will you be paying with cash or credit?", vi: "Dạ không sao, em biết chỗ của nó. Chị muốn thanh toán bằng tiền mặt hay thẻ ạ?", speaker: "Man", gender: "male" },

        // Conversation 8 (53-55)
        { en: "Hello, Mr. Tanaka. Welcome to Bike Solutions Consulting. When I heard that a representative from the Burrville City Council wanted to meet, I was very excited.", vi: "Xin chào, ngài Tanaka. Chào mừng đến với Ban tư vấn về giải pháp xe đạp. Lúc tôi nghe rằng một đại biểu bên Hội đồng thành phố Burrville muốn gặp, tôi đã rất phấn khích.", speaker: "Woman", gender: "female" },
        { en: "Well, we know your company helps cities set up their bike-share programs, and Burrville wants to set one up, too.", vi: "Chà, chúng tôi biết công ty của cô đã giúp nhiều thành phố thiết lập các chương trình chia sẻ xe đạp của họ, và Burrville cũng muốn thiết lập một chương trình của riêng mình.", speaker: "Man", gender: "male" },
        { en: "That's great news! What are your goals for your program?", vi: "Thật là một tin tuyệt vời! Mục tiêu của anh cho chương trình của mình là gì?", speaker: "Woman", gender: "female" },
        { en: "We want to encourage our residents to exercise as well as to reduce car traffic. But it's going to be a challenge convincing people to participate.", vi: "Chúng tôi muốn khuyến khích cư dân của chúng tôi tập thể dục cũng như giảm lượng giao thông. Nhưng chắc sẽ là một thách thức để thuyết phục mọi người tham gia đấy.", speaker: "Man", gender: "male" },
        { en: "We'll handle that. When cities partner with us, part of the service we provide is an advertising campaign. We'll produce television and radio commercials that will encourage community members to use the bikes.", vi: "Chúng tôi sẽ lo việc đó. Khi các thành phố hợp tác với chúng tôi, một phần trong dịch vụ chúng tôi cung cấp là một chiến dịch quảng cáo. Chúng tôi sẽ sản xuất những quảng cáo trên truyền hình và đài phát thanh để khuyến khích các thành viên trong cộng đồng sử dụng xe đạp.", speaker: "Woman", gender: "female" },

        // Conversation 9 (56-58)
        { en: "Thanks for stopping by, Vincent and Sanjay. The board of directors decided to purchase new security cameras, so someone from Menovar Technologies is coming tomorrow to deliver and install them.", vi: "Cảm ơn hai anh đã ghé qua, Vincent và Sanjay. Hội đồng quản trị đã quyết định mua máy ảnh an ninh mới, vì vậy người nào đó từ Menovar Technologies sẽ đến vào ngày mai để giao và cài đặt chúng.", speaker: "Woman", gender: "female" },
        { en: "It'll be good to have the latest equipment.", vi: "Thật tốt khi có các thiết bị mới nhất.", speaker: "Man", gender: "male" },
        { en: "I agree. So Vincent, I'll need some of your Maintenance Department staff to help with the installation.", vi: "Nhất trí luôn. Vậy Vincent, tôi sẽ cần một số nhân viên của Bộ phận Bảo trì bên bạn để giúp với việc lắp đặt.", speaker: "Woman", gender: "female" },
        { en: "No problem. I'll send two people over to assist.", vi: "Không thành vấn đề. Tôi sẽ cử hai người tới hỗ trợ.", speaker: "Man", gender: "male" },
        { en: "Thanks.", vi: "Cảm ơn anh!", speaker: "Woman", gender: "female" },
        { en: "Will there be a training session for my security personnel to use the new camera system?", vi: "Liệu sẽ có một buổi đào tạo cho nhân viên an ninh của tôi sử dụng hệ thống camera mới không?", speaker: "Man", gender: "male" },
        { en: "Yes, Sanjay-Menovar Technologies suggested next Monday for the training. Is that OK for your team?", vi: "Có, Sanjay - Menovar Technologies đã gợi ý thời gian vào thứ Hai tới cho khóa đào tạo. Thế có ổn với đội của bạn không?", speaker: "Woman", gender: "female" },
        { en: "Sure. How about ten o'clock?", vi: "Hẳn rồi. Mười giờ được không nhỉ?", speaker: "Man", gender: "male" },
        { en: "I'll e-mail Menovar right away to see if that works for them.", vi: "Tôi sẽ gửi e-mail cho Menovar ngay để xem lúc đó có hợp với họ không.", speaker: "Woman", gender: "female" },

        // Conversation 10 (59-61)
        { en: "Thank you for agreeing to meet me for this interview. The readers of Auto World Magazine are eager to hear about your company's plans for a new car manufacturing plant.", vi: "Cảm ơn anh đã đồng ý gặp tôi cho cuộc phỏng vấn này. Độc giả của Tạp chí 'Thế giới xe hơi' rất muốn được nghe về kế hoạch của công ty anh về một nhà máy sản xuất xe hơi mới.", speaker: "Woman", gender: "female" },
        { en: "Yes, we'll be opening a facility in Indonesia soon. We currently have two plants in this country, so we're looking forward to expanding our production capabilities overseas.", vi: "Vâng, chúng tôi sẽ mở một cơ sở tại Indonesia trong thời gian tới. Chúng tôi hiện có hai nhà máy ở quốc gia này, vì vậy chúng tôi đang mong muốn mở rộng quy mô sản xuất của chúng tôi ở nước ngoài.", speaker: "Man", gender: "male" },
        { en: "I see. And when will the first cars be built in that factory?", vi: "Tôi hiểu rồi. Và khi nào những chiếc xe đầu tiên sẽ được chế tạo trong nhà máy đó?", speaker: "Woman", gender: "female" },
        { en: "That's a good question. Right now we're planning on December.", vi: "Câu hỏi hay đấy. Hiện tại chúng tôi đang lên kế hoạch vào tháng 12.", speaker: "Man", gender: "male" },

        // Conversation 11 (62-64)
        { en: "Hi Raymond. It's Marta Dunmore. I'm calling about the wood options we discussed for my new kitchen floor.", vi: "Chào Raymond. Đây là Marta Dunmore. Tôi gọi để bàn về các lựa chọn ốp gỗ mà chúng ta đã thảo luận cho sàn bếp mới của tôi.", speaker: "Woman", gender: "female" },
        { en: "Great! What did you decide?", vi: "Tuyệt! Cô đã quyết định được sẽ chọn cái nào chưa?", speaker: "Man", gender: "male" },
        { en: "Well, I thought about choosing the dark pine. But then I took the samples you gave me into the kitchen and looked at them carefully. I decided the pattern on the oak will look best.", vi: "Ừ thì, tôi đã nghĩ về việc chọn màu thông tối. Nhưng sau đó tôi lấy các mẫu anh đưa cho tôi vào bếp và xem xét chúng cẩn thận. Tôi quyết định hoa văn gỗ sồi sẽ trông đẹp nhất.", speaker: "Woman", gender: "female" },
        { en: "Oak is a great choice. It's harder than pine, so it's a good value. And the light color of the ash and maple don't really match your kitchen.", vi: "Gỗ sồi là một lựa chọn tuyệt vời. Nó cứng hơn gỗ thông, vì vậy giá trị của nó rất tốt. Và màu sáng của tần bì và phong không thật sự hợp lắm với nhà bếp của cô.", speaker: "Man", gender: "male" },
        { en: "OK, great. When can you start the installation?", vi: "Tuyệt lắm. Khi nào anh có thể bắt đầu việc lắp đặt?", speaker: "Woman", gender: "female" },
        { en: "I’ll have to check my calendar when I get back to the office. Can I give you a call later?", vi: "Tôi sẽ phải kiểm tra lịch của mình khi tôi quay lại văn phòng. Tôi có thể gọi cho cô sau được không?", speaker: "Man", gender: "male" },

        // Conversation 12 (65-67)
        { en: "I think the restaurant's going to get some nice publicity by being in the community festival this weekend. It'll be a great way to get customers interested in our food.", vi: "Tôi nghĩ rằng nhà hàng sẽ có được danh tiếng tốt đẹp qua việc tham gia lễ hội cộng đồng vào cuối tuần này. Thật tuyệt vời khi khiến khách hàng quan tâm đến các món ăn của chúng ta.", speaker: "Man", gender: "male" },
        { en: "It's definitely good advertising. Aren't you working the first day of the festival?", vi: "Đó chắc chắn là một sự quảng bá tốt. Mà không phải anh làm việc vào ngày đầu tiên của lễ hội à?", speaker: "Woman", gender: "female" },
        { en: "Yeah - but if the event gets rained out and is held at a later date, I won't be able to work it because I'll be on holiday. Luckily, the weather this weekend should be warm and sunny, so I plan to be at the festival's opening day. How about you?", vi: "Có - nhưng rủi thay sự kiện bị mưa và được tổ chức vào một ngày sau đó, tôi sẽ không thể làm được vì tôi đi nghỉ mất rồi. May mắn thay, thời tiết cuối tuần này chắc sẽ ấm áp và đầy nắng, vì vậy tôi chắc sẽ có mặt trong ngày khai mạc lễ hội. Còn cô thì sao?", speaker: "Man", gender: "male" },
        { en: "I'm not scheduled to work for the restaurant, but I’ll be there helping a friend. She has a small jewelry shop and needs a hand with her booth.", vi: "Bữa đó tôi không có lịch làm việc cho nhà hàng, nhưng tôi sẽ ở đó để giúp một người bạn. Cô ấy có một cửa hàng trang sức nhỏ và cần giúp một tay với gian hàng của mình.", speaker: "Woman", gender: "female" },

        // Conversation 13 (68-70)
        { en: "Welcome to the Natural History Museum. Can I help you?", vi: "Chào mừng đến với Bảo tàng Lịch sử Tự nhiên. Tôi có thể giúp gì cho cô?", speaker: "Man", gender: "male", image: "https://zenlishtoeic.vn/wp-content/uploads/2023/01/zenlish-3-10.png" },
        { en: "Hi - I'm trying to find the special Fossils exhibit I saw advertised on TV. Can you tell me how to get to it?", vi: "Xin chào - tôi đang cố tìm triển lãm Hóa thạch đặc biệt mà tôi thấy được quảng cáo trên TV. Anh có thể cho tôi biết làm thế nào để đến đó không?", speaker: "Woman", gender: "female", image: "https://zenlishtoeic.vn/wp-content/uploads/2023/01/zenlish-3-10.png" },
        { en: "Sure. We're here in the Main Hall. That's the Bird Hall over there. The fossils are just in the next room, on the other side of Bird Hall. It's a large well-lit space that we often use for special exhibits. That's where you want to go.", vi: "Được chứ. Chúng ta đang ở đây trong Sảnh chính. Đó là Sảnh trưng bày chim chóc đằng kia. Hóa thạch ở ngay phòng bên cạnh, phía bên kia của Sảnh chim chóc. Đó là một chỗ rộng rãi sáng sủa mà chúng tôi thường sử dụng cho các triển lãm đặc biệt. Đó là nơi cô muốn đến.", speaker: "Man", gender: "male", image: "https://zenlishtoeic.vn/wp-content/uploads/2023/01/zenlish-3-10.png" },
        { en: "Thanks. Oh - and is my ticket good for special exhibits?", vi: "Cảm ơn anh! Ô - và vé của tôi có dùng được cho các cuộc triển lãm đặc biệt không?", speaker: "Woman", gender: "female", image: "https://zenlishtoeic.vn/wp-content/uploads/2023/01/zenlish-3-10.png" },
        { en: "Yes. Everything is included with regular admission at our museum.", vi: "Có chứ. Mọi thứ đều bao gồm trong đây cùng vé vào cổng thông thường tại bảo tàng chúng tôi.", speaker: "Man", gender: "male", image: "https://zenlishtoeic.vn/wp-content/uploads/2023/01/zenlish-3-10.png" }
    ];

    let currentIndex = 0;
    let currentPlayCount = 0;
    let playTimeout;
    const synth = window.speechSynthesis;
    let maleVoice = null;
    let femaleVoice = null;

    const msgBox = document.getElementById("system-message");
    const inputField = document.getElementById("user-input");
    const modalOverlay = document.getElementById("feedback-modal");
    const labelDisplay = document.getElementById("speaker-label");
    const imageSection = document.getElementById("image-section");
    const imageDisplay = document.getElementById("question-image");

    function loadVoices() {
        let voices = synth.getVoices();
        if(voices.length === 0) return;
        maleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google UK English Male'))) || voices.find(v => v.lang.startsWith('en'));
        femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Google US English'))) || voices.find(v => v.lang.startsWith('en'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.onload = () => {
        loadVoices();
        let count = localStorage.getItem('part3_test2_2019_count') || 0;
        document.getElementById('study-count').innerText = count;
        document.getElementById('total-sentences').innerText = lessonData.length;
        
        let savedIndex = parseInt(localStorage.getItem('part3_test2_2019_progress'));
        if (!isNaN(savedIndex) && savedIndex < lessonData.length) {
            currentIndex = savedIndex;
        }

        updateUI();
    };

    function updateUI() {
        updateProgress();
        document.getElementById('current-sentence-num').innerText = currentIndex + 1;
        
        const data = lessonData[currentIndex];
        
        if (data.gender === "male") {
            labelDisplay.innerText = "👨 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-male";
        } else {
            labelDisplay.innerText = "👩 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-female";
        }

        // Logic hiển thị ảnh dành riêng cho Part 3 (Nếu câu có chứa URL ảnh)
        if(data.image) {
            imageDisplay.src = data.image;
            imageSection.style.display = "block";
        } else {
            imageSection.style.display = "none";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            e.preventDefault();
            playAudio();
        } else if (e.key === 'Tab') {
            e.preventDefault();
            giveHint();
        } else if (e.key === 'Enter' && modalOverlay.style.display !== "flex") {
            e.preventDefault();
            handleEnterAction();
        }
    });

    function handleEnterAction() {
        if (modalOverlay.style.display === "flex") {
            nextSentence();
        } else {
            checkAnswer();
        }
    }

    function playAudio() {
        currentPlayCount = 0;
        clearTimeout(playTimeout);
        triggerAudioLoop();
    }

    function triggerAudioLoop() {
        if (synth.speaking) synth.cancel();
        
        const data = lessonData[currentIndex];
        const utterThis = new SpeechSynthesisUtterance(data.en);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value);
        
        if (data.gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
        else if (data.gender === 'male' && maleVoice) utterThis.voice = maleVoice;
        
        utterThis.onend = () => {
            currentPlayCount++;
            const maxRepeat = parseInt(document.getElementById('repeat-setting').value);
            if (currentPlayCount < maxRepeat) {
                playTimeout = setTimeout(triggerAudioLoop, 500);
            }
        };
        
        synth.speak(utterThis);
        if (modalOverlay.style.display !== "flex") inputField.focus();
    }

    function normalizeText(text) { return text.toLowerCase().replace(/[.,?!–\-:;"]/g, '').trim(); }

    function checkAnswer() {
        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[currentIndex].en);
        
        if (userInput === targetText) {
            msgBox.innerText = "";
            showModal();
        } else {
            const userWordsNorm = userInput.split(' ').filter(w => w !== "");
            const targetWordsNorm = targetText.split(' ');
            const rawWords = rawUserInput.trim().split(/\s+/);

            if (userWordsNorm.length === 0) {
                msgBox.innerText = "Bạn chưa gõ gì cả. Nhấn Ctrl để nghe nhé!";
                return;
            }

            let wrongIndex = -1;
            for (let i = 0; i < userWordsNorm.length; i++) {
                if (userWordsNorm[i] !== targetWordsNorm[i]) {
                    wrongIndex = i;
                    break;
                }
            }

            if (wrongIndex !== -1) {
                let startPos = 0;
                for (let k = 0; k < wrongIndex; k++) {
                    startPos += rawWords[k].length + 1;
                }
                
                const leadingSpaces = inputField.value.length - inputField.value.trimStart().length;
                startPos += leadingSpaces;
                let endPos = startPos + rawWords[wrongIndex].length;

                inputField.focus();
                inputField.setSelectionRange(startPos, endPos);

                let displayHTML = rawWords.map((w, idx) => {
                    if (idx === wrongIndex) {
                        return `<span class="glow-error">${w}</span>`;
                    }
                    return w;
                }).join(' ');

                msgBox.innerHTML = `Vị trí sai:<br><div style="margin-top:12px; font-size:19px; color:var(--text-dark); font-weight: 500;">${displayHTML}</div>`;
                
            } else if (userWordsNorm.length < targetWordsNorm.length) {
                msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
                inputField.focus();
                inputField.setSelectionRange(inputField.value.length, inputField.value.length);
            } else {
                msgBox.innerText = "Có lỗi sai chính tả nhỏ, hãy kiểm tra lại.";
            }
        }
    }

    function giveHint() {
        if (modalOverlay.style.display === "flex") return;

        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[currentIndex].en);
        
        const targetWordsRaw = lessonData[currentIndex].en.split(' ');
        const targetWordsNorm = targetText.split(' ');
        const userWords = userInput.split(' ').filter(w => w !== "");

        let hintWord = targetWordsRaw[userWords.length];
        for (let i = 0; i < userWords.length; i++) {
            if (userWords[i] !== targetWordsNorm[i]) {
                hintWord = targetWordsRaw[i];
                inputField.value = targetWordsRaw.slice(0, i).join(' ') + (i > 0 ? " " : "");
                break;
            }
        }

        if (hintWord) {
            inputField.value += (inputField.value.length > 0 && !inputField.value.endsWith(' ') ? ' ' : '') + hintWord + ' ';
            msgBox.innerText = "Đã điền từ tiếp theo!";
        }
    }

    function showModal() {
        inputField.blur();
        const data = lessonData[currentIndex];
        
        document.getElementById("trans-en").innerText = data.en;
        document.getElementById("trans-vi").innerText = data.vi;
        
        modalOverlay.style.display = "flex";
        document.querySelector('.btn-next-modal').focus();
    }

    function prevSentenceManual() {
        if (currentIndex > 0) {
            currentIndex--;
            resetForNewSentence();
        }
    }

    function nextSentenceManual() {
        if (currentIndex < lessonData.length - 1) {
            currentIndex++;
            resetForNewSentence();
        } else {
            finishLesson();
        }
    }
    
    function resetForNewSentence() {
        modalOverlay.style.display = "none";
        inputField.value = "";
        msgBox.innerHTML = "";
        localStorage.setItem('part3_test2_2019_progress', currentIndex);
        updateUI();
        playAudio();
    }

    function nextSentence() {
        modalOverlay.style.display = "none";
        currentIndex++;
        inputField.value = "";
        msgBox.innerHTML = "";
        
        if (currentIndex < lessonData.length) {
            localStorage.setItem('part3_test2_2019_progress', currentIndex);
            updateUI();
            playAudio();
        } else {
            finishLesson();
        }
    }

    function updateProgress() {
        const percent = Math.round((currentIndex / lessonData.length) * 100);
        document.getElementById("progress-percent").innerText = percent;
        document.getElementById("progress-ring").style.background = `conic-gradient(var(--primary) ${percent}%, #eee 0)`;
    }

    function finishLesson() {
        document.getElementById("learning-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        
        let count = parseInt(localStorage.getItem('part3_test2_2019_count')) || 0;
        count++;
        localStorage.setItem('part3_test2_2019_count', count);
        document.getElementById('study-count').innerText = count;

        localStorage.removeItem('part3_test2_2019_progress');

        const transcriptBox = document.getElementById("full-transcript");
        let lastImage = "";
        let htmlContent = "";

        lessonData.forEach(d => {
            if(d.image && d.image !== lastImage) {
                htmlContent += `<div style="text-align:center; margin: 20px 0 10px;">
                    <img src="${d.image}" style="max-height: 150px; max-width: 100%; height: auto; object-fit: contain; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.05); border: 1px solid #E2E8F0;">
                </div>`;
                lastImage = d.image;
            }

            const color = d.gender === 'male' ? '#1D4ED8' : '#A16207';
            htmlContent += `<p style="margin-bottom:12px; padding-left: 10px;">
                <strong style="color:${color}">${d.speaker}:</strong> <span style="font-weight: 500;">${d.en}</span><br>
                <span style="color:var(--text-light); font-size: 14px;">${d.vi}</span>
            </p>`;
        });
        transcriptBox.innerHTML = htmlContent;
    }

    function restartLesson() {
        localStorage.setItem('part3_test2_2019_progress', 0);
        location.reload();
    }
</script>
