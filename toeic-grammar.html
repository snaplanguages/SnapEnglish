<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Grammar | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette màu pastel trưởng thành */
            --pastel-green: #e2f0cb;
            --pastel-purple: #c7ceea;
            --pastel-earth-orange: #f5cba7;
            
            /* Glassmorphism variables */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-main: #4a4a4a;
            --text-sub: #7f8c8d;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0;
            padding: 20px;
            /* Gradient kết hợp xanh lá, tím và cam đất pastel */
            background: linear-gradient(135deg, var(--pastel-green) 0%, var(--pastel-purple) 50%, var(--pastel-earth-orange) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
        }

        h1 { 
            color: #6a5acd; 
            font-size: 32px;
            margin-bottom: 5px;
            font-weight: 800;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.7);
        }
/* Button to Home */
        .home-btn {
            display: block;
            width: 200px;
            margin: 0 auto 30px auto;
            text-align: center;
            padding: 12px 25px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 700;
            transition: all 0.3s ease;
        }
        .home-btn:hover {
            background: white;
            transform: scale(1.05);
        }
        p.subtitle {
            color: var(--text-sub);
            font-size: 16px;
            margin-bottom: 35px;
            font-weight: 600;
            text-align: center;
        }

        /* SEARCH BAR - Glassmorphism */
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto 40px auto;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 16px 50px 16px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            color: var(--text-main);
            outline: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #searchInput::placeholder {
            color: #8c8c8c;
        }

        #searchInput:focus {
            border-color: var(--pastel-purple);
            box-shadow: 0 8px 32px rgba(199, 206, 234, 0.5);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.85);
        }

        .search-icon {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            color: #8c8c8c;
            font-size: 18px;
            pointer-events: none;
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* CARD STYLE - Glassmorphism */
        a.unit-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 22px 25px;
            border-radius: 20px;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
        }

        a.unit-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 6px;
            /* Phối viền thẻ gradient cam đất và tím */
            background: linear-gradient(to bottom, var(--pastel-earth-orange), var(--pastel-purple));
            transition: width 0.3s ease;
        }
        
        a.unit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(199, 206, 234, 0.6);
            background: rgba(255, 255, 255, 0.85);
        }

        a.unit-card:hover::before {
            width: 8px;
        }

        .unit-info {
            text-align: left;
            flex-grow: 1;
            padding-left: 15px;
        }

        .unit-number {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #9084b0; 
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
        }

        .unit-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            line-height: 1.4;
        }

        .arrow-icon {
            color: #e0a39c; 
            font-size: 20px;
            font-weight: bold;
            transition: transform 0.3s ease;
        }

        a.unit-card:hover .arrow-icon {
            transform: translateX(4px);
        }

        .hidden { display: none !important; }
        
        #noResults {
            text-align: center;
            grid-column: 1 / -1;
            color: #7f8c8d;
            font-style: italic;
            display: none;
            padding: 30px;
            background: var(--glass-bg);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }
    </style>
</head>
<body>

    <h1>✨ TOEIC Grammar</h1>
    <p class="subtitle">Hành trình chinh phục ngữ pháp từ con số 0 với SnapEnglish</p>
    <a href="index.html" class="home-btn">🏠 Về Trang Chủ</a>
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Tìm kiếm bài học (VD: 12 hoặc Tương lai)...">
        <span class="search-icon">🔍</span>
    </div>

    <div class="container" id="unitContainer">
        <div id="noResults">Không tìm thấy bài học nào phù hợp nè... 🥺</div>
    </div>

   <script>
    const titles = [
        "Các thì đơn", "Bẫy các thì đơn", "Thì tiếp diễn", "Thì hoàn thành", "Sự hòa hợp danh từ và động từ (P1)", 
        "Sự hòa hợp danh từ và động từ (P2)", "Ôn tập", "Câu bị động", "Bẫy câu bị động", "Câu điều kiện", "Mệnh đề quan hệ", "Bẫy mệnh đề quan hệ",
        "Ôn tập", "Đại từ", "Danh từ", "Danh từ đếm được và không đếm được", "Các cụm danh từ thường gặp", "Bẫy danh từ",
        "Tính từ", "Các cụm tính từ thường gặp", "Ôn tập", "Bẫy tính từ", "Trạng từ", "Các cụm trạng từ thường gặp",
        "Các cụm động từ thường gặp", "Cụm động từ & giới từ", "Liên từ (P1)", "Liên từ (P2)", "Giới từ", "Ôn tập"
    ];

    const links = [
        "unit-1-toeic.html", "unit-2-toeic.html", "unit-3-toeic.html", "unit-4-toeic.html", "unit-5-toeic.html", 
        "unit-6-toeic.html", "unit-7-toeic.html", "unit-8-toeic.html", "unit-9-toeic.html", "unit-10-toeic.html", 
        "unit-11-toeic.html", "unit-12-toeic.html", "unit-13-toeic.html", "unit-14-toeic.html", "unit-15-toeic.html", 
        "unit-16-toeic.html", "unit-17-toeic.html", "unit-18-toeic.html", "unit-19-toeic.html", "unit-20-toeic.html", 
        "unit-21-toeic.html", "unit-22-toeic.html", "unit-23-toeic.html", "unit-24-toeic.html", "unit-25-toeic.html", 
        "unit-26-toeic.html", "unit-27-toeic.html", "unit-28-toeic.html", "unit-29-toeic.html", "unit-30-toeic.html"
    ];

    const container = document.getElementById('unitContainer');
    const searchInput = document.getElementById('searchInput');
    const noResultsMsg = document.getElementById('noResults');

    function renderUnits() {
        titles.forEach((title, index) => {
            const unitNum = index + 1;
            const link = links[index] || "#"; 

            const card = document.createElement('a');
            card.className = 'unit-card';
            card.setAttribute('data-search', `unit ${unitNum} ${title.toLowerCase()}`);
            
            if (link !== "#") {
                card.href = link;
                card.target = "_blank"; // Giữ mở tab mới để đảm bảo UX điều hướng
            } else {
                card.href = "javascript:void(0)";
                card.onclick = function() {
                    alert("🚧 Bài này chưa được gắn link (cần sửa trong code)!");
                };
            }

            card.innerHTML = `
                <div class="unit-info">
                    <span class="unit-number">Unit ${unitNum}</span>
                    <h3 class="unit-title">${title}</h3>
                </div>
                <div class="arrow-icon">➔</div>
            `;
            container.insertBefore(card, noResultsMsg);
        });
    }

    searchInput.addEventListener('keyup', function() {
        const filter = this.value.toLowerCase().trim();
        const cards = document.querySelectorAll('.unit-card');
        let hasResult = false;

        cards.forEach(card => {
            const searchText = card.getAttribute('data-search');
            if (searchText.includes(filter)) {
                card.classList.remove('hidden');
                hasResult = true;
            } else {
                card.classList.add('hidden');
            }
        });

        if (!hasResult) {
            noResultsMsg.style.display = 'block';
        } else {
            noResultsMsg.style.display = 'none';
        }
    });

    renderUnits();
   </script>

</body>
</html>
