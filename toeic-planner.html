<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Journey Planner | SnapEnglish</title>
  <link rel="icon" type="image/png" href="ảnh.png">
    <style>
        :root {
            --bg-color: #FDF9F1;
            --primary-color: #DDA7A5; /* Hồng đất */
            --secondary-color: #B2D8D8; /* Xanh ngọc */
            --accent-color: #8C7A80;
            --text-main: #5C4B51;
            --white: #FFFFFF;
            --border-light: #E8E2D9;
            --shadow: 0 8px 20px rgba(92, 75, 81, 0.08);
            --radius: 12px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--white);
            max-width: 800px;
            width: 100%;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 30px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: var(--accent-color);
            font-size: 0.95em;
            margin-bottom: 25px;
        }

        /* Form Inputs */
        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-light);
            border-radius: 8px;
            font-size: 1em;
            color: var(--text-main);
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus { border-color: var(--secondary-color); }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #C89593; }
        
        .btn-reset {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            margin-top: 20px;
        }
        .btn-reset:hover { background-color: var(--primary-color); color: var(--white); }

        /* Progress Bar */
        .progress-wrapper { margin: 20px 0 30px 0; }
        .progress-bg {
            background-color: var(--border-light);
            height: 10px;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: var(--secondary-color);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease;
        }
        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            font-weight: bold;
            color: var(--secondary-color);
            margin-top: 8px;
        }

        /* Weekly Planner Table Styles */
        .week-block {
            border: 2px solid var(--border-light);
            border-radius: var(--radius);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .week-header {
            background-color: rgba(178, 216, 216, 0.15);
            padding: 15px 20px;
            border-bottom: 2px solid var(--border-light);
        }

        .week-title {
            color: #4A8C8C;
            font-size: 1.2em;
            font-weight: bold;
            margin: 0 0 5px 0;
        }

        .week-goal {
            color: var(--accent-color);
            font-size: 0.9em;
            margin: 0;
            font-style: italic;
        }

        .day-row {
            display: flex;
            border-bottom: 1px solid var(--border-light);
            transition: background-color 0.2s;
        }

        .day-row:last-child { border-bottom: none; }
        .day-row:hover { background-color: #FAFAFA; }

        .day-label {
            width: 100px;
            padding: 15px;
            background-color: rgba(232, 226, 217, 0.3);
            font-weight: bold;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid var(--border-light);
            flex-shrink: 0;
        }

        .task-list {
            padding: 10px 15px;
            flex-grow: 1;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            padding: 6px 0;
        }

        .task-item input[type="checkbox"] {
            margin-top: 3px;
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--secondary-color);
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-text {
            font-size: 0.9em;
            line-height: 1.5;
            color: var(--text-main);
            transition: 0.3s;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #A9A9A9;
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .input-row { grid-template-columns: 1fr; }
            .day-row { flex-direction: column; }
            .day-label { width: 100%; border-right: none; border-bottom: 1px solid var(--border-light); padding: 8px 15px; justify-content: flex-start; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h1>Lộ Trình TOEIC Chi Tiết</h1>
        <p class="subtitle">Nhập thông tin để tạo bảng kế hoạch học tập từng ngày.</p>
        
        <div class="input-row">
            <div class="input-group">
                <label>Điểm hiện tại:</label>
                <input type="number" id="currentScore" placeholder="VD: 500">
            </div>
            <div class="input-group">
                <label>Mục tiêu:</label>
                <input type="number" id="targetScore" placeholder="VD: 700">
            </div>
            <div class="input-group">
                <label>Thời gian (Tháng):</label>
                <input type="number" id="months" placeholder="VD: 3">
            </div>
        </div>
        <button onclick="generateRoadmap()">Tạo Bảng Lộ Trình</button>
    </div>

    <div id="roadmap-screen" class="hidden">
        <h1>Kế Hoạch Hàng Ngày</h1>
        <p class="subtitle" id="roadmap-summary"></p>

        <div class="progress-wrapper">
            <div class="progress-bg">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="progress-stats">
                <span id="progress-text">Hoàn thành: 0%</span>
                <span id="task-count">0/0 Tasks</span>
            </div>
        </div>

        <div id="planner-container"></div>

        <button class="btn-reset" onclick="resetRoadmap()">Xóa & Cài Đặt Lại Từ Đầu</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'toeic_daily_planner_v2';

    window.onload = function() {
        const savedData = localStorage.getItem(STORAGE_KEY);
        if (savedData) renderRoadmap(JSON.parse(savedData));
    };

    function generateRoadmap() {
        const current = parseInt(document.getElementById('currentScore').value);
        const target = parseInt(document.getElementById('targetScore').value);
        const months = parseInt(document.getElementById('months').value);

        if (!current || !target || !months) return alert('Vui lòng nhập đủ thông tin!');
        
        const totalWeeks = months * 4; // Giả định 1 tháng = 4 tuần học
        const plan = {
            current, target, months,
            weeks: []
        };

        // Logic sinh task chi tiết hàng ngày
        for (let w = 1; w <= totalWeeks; w++) {
            let weekGoal = "";
            let dailyTasks = [];

            // Phân bổ giai đoạn
            if (w <= Math.ceil(totalWeeks * 0.4)) {
                weekGoal = "Xây dựng từ vựng cốt lõi & Ngữ pháp nền tảng. Luyện nghe chép chính tả cơ bản.";
                dailyTasks = [
                    ["Học 20 từ vựng chủ đề Office. Đặt câu ví dụ.", "Luyện nghe chép chính tả (Dictation) Part 1 - 5 bức tranh."],
                    ["Học 1 chủ điểm Ngữ pháp (thì/từ loại).", "Làm 20 câu Part 5. Ghi chú chi tiết lý do từng câu đúng, câu sai."],
                    ["Ôn lại 20 từ vựng ngày 1.", "Nghe chép chính tả Part 2 - 10 câu hỏi & đáp."],
                    ["Làm 30 câu Part 5 & 6. Bắt buộc tra từ điển các từ chưa biết trong câu sai."],
                    ["Đọc dịch 2 đoạn văn Part 7 (Single Passage). Tóm tắt ý chính."],
                    ["Mini Test Tuần: 50 câu Nghe + 50 câu Đọc.", "Phân tích bẫy trong bài Test. Ghi chép lỗi sai vào sổ."],
                    ["Nghỉ ngơi, đọc báo tiếng Anh giải trí hoặc xem phim phụ đề."]
                ];
            } else if (w <= Math.ceil(totalWeeks * 0.75)) {
                weekGoal = "Tăng tốc độ làm bài, nhận diện bẫy đề thi Part 3, 4, 7.";
                dailyTasks = [
                    ["Luyện nghe Part 3: Phân tích trước câu hỏi (Skimming).", "Nghe chép chính tả các đoạn hội thoại có chứa đáp án."],
                    ["Luyện đọc Part 7: Kỹ năng quét thông tin (Scanning).", "Dịch toàn bộ bài đọc sang tiếng Việt để nạp từ mới."],
                    ["Luyện nghe Part 4: Tập trung vào từ khóa thay thế (Paraphrase).", "Làm 15 câu Part 5 nâng cao."],
                    ["Làm 1 đề Part 7 (Double/Triple Passages) bấm giờ.", "Rà soát lại toàn bộ đáp án sai, giải thích rõ lý do."],
                    ["Tổng ôn từ vựng & cấu trúc đã ghi chép trong tuần."],
                    ["Thi thử Half-Test (100 câu / 60 phút) ép thời gian.", "Chấm điểm và phân tích sâu các câu đánh lụi."],
                    ["Nghỉ ngơi nạp lại năng lượng."]
                ];
            } else {
                weekGoal = "Thực chiến giải đề, tối ưu hóa điểm số và thời gian.";
                dailyTasks = [
                    ["Giải Full Test (Bấm giờ 120 phút liên tục)."],
                    ["Phân tích Full Test: Tra cứu 100% các câu sai.", "Ghi chú tại sao chọn sai (Do từ vựng, ngữ pháp hay bẫy?)."],
                    ["Luyện tập bù đắp lỗ hổng: Làm 50 câu chuyên về dạng hay sai nhất."],
                    ["Giải Full Test tiếp theo (Bấm giờ 120 phút)."],
                    ["Phân tích Full Test: Chữa chi tiết từng câu đúng và cả câu sai."],
                    ["Tổng hợp các từ vựng Paraphrase (từ đồng nghĩa) thường gặp trong đề thi."],
                    ["Ôn tập nhẹ nhàng các lỗi sai thường gặp. Chuẩn bị tâm lý thi."]
                ];
            }

            let weekData = {
                weekNum: w,
                goal: weekGoal,
                days: []
            };

            dailyTasks.forEach((tasksArray, index) => {
                let dayTasks = tasksArray.map(taskText => ({
                    id: `w${w}d${index+1}t${Math.random().toString(36).substr(2, 9)}`,
                    text: taskText,
                    completed: false
                }));
                weekData.days.push({ dayNum: index + 1, tasks: dayTasks });
            });

            plan.weeks.push(weekData);
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(plan));
        renderRoadmap(plan);
    }

    function renderRoadmap(plan) {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('roadmap-screen').classList.remove('hidden');
        document.getElementById('roadmap-summary').innerText = `Mục tiêu: ${plan.current} ➔ ${plan.target} TOEIC (${plan.months} tháng / ${plan.weeks.length} tuần)`;

        const container = document.getElementById('planner-container');
        container.innerHTML = '';
        
        let totalTasks = 0;
        let completedTasks = 0;

        plan.weeks.forEach((week, wIndex) => {
            const weekBlock = document.createElement('div');
            weekBlock.className = 'week-block';

            // Header Tuần
            const header = document.createElement('div');
            header.className = 'week-header';
            header.innerHTML = `<h3 class="week-title">Tuần ${week.weekNum}</h3><p class="week-goal">Mục tiêu: ${week.goal}</p>`;
            weekBlock.appendChild(header);

            // Các ngày trong tuần
            week.days.forEach((day, dIndex) => {
                const dayRow = document.createElement('div');
                dayRow.className = 'day-row';

                const dayLabel = document.createElement('div');
                dayLabel.className = 'day-label';
                dayLabel.innerText = `Ngày ${day.dayNum}`;
                
                const taskList = document.createElement('div');
                taskList.className = 'task-list';

                day.tasks.forEach((task, tIndex) => {
                    totalTasks++;
                    if (task.completed) completedTasks++;

                    const taskItem = document.createElement('div');
                    taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = task.completed;
                    checkbox.onchange = (e) => updateTaskStatus(wIndex, dIndex, tIndex, e.target.checked);

                    const text = document.createElement('div');
                    text.className = 'task-text';
                    text.innerText = task.text;

                    taskItem.appendChild(checkbox);
                    taskItem.appendChild(text);
                    taskList.appendChild(taskItem);
                });

                dayRow.appendChild(dayLabel);
                dayRow.appendChild(taskList);
                weekBlock.appendChild(dayRow);
            });

            container.appendChild(weekBlock);
        });

        // Cập nhật thanh tiến độ
        const percent = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-text').innerText = `Hoàn thành: ${percent}%`;
        document.getElementById('task-count').innerText = `${completedTasks}/${totalTasks} Nhiệm vụ`;
    }

    function updateTaskStatus(wIndex, dIndex, tIndex, isCompleted) {
        let plan = JSON.parse(localStorage.getItem(STORAGE_KEY));
        plan.weeks[wIndex].days[dIndex].tasks[tIndex].completed = isCompleted;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(plan));
        renderRoadmap(plan); // Re-render để cập nhật CSS gạch ngang và Progress Bar
    }

    function resetRoadmap() {
        if(confirm('Chắc chắn muốn xóa toàn bộ dữ liệu lịch trình hiện tại?')) {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('roadmap-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }
    }
</script>

</body>
</html>
