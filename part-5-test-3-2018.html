<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 5 Test 3 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <style>
        body {
            -webkit-user-select: none; 
            -moz-user-select: none; 
            -ms-user-select: none; 
            user-select: none; 
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #88b04b;         /* Xanh lá đặc trưng SnapEnglish */
            --primary-dark: #6a8e35;
            --primary-light: #e6f0d8;
            --accent: #F4A261;          /* Cam đào ấm áp */
            --bg-body: #FAFCFA;         /* Trắng ngà ánh xanh nhẹ */
            --bg-pane: #FFFFFF;
            --text-main: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --correct: #10b981;
            --wrong: #f43f5e;
            --header-h: 80px;
            --footer-h: 90px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER & BRANDING --- */
        header {
            height: var(--header-h); background: #fff;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100; border-bottom: 2px solid var(--primary-light);
        }
        
        .brand-logo {
            display: flex; align-items: center; gap: 12px; font-size: 26px; font-weight: 800; color: var(--primary);
        }
        .brand-logo span {
            background: var(--primary); color: white; padding: 6px 16px; 
            border-radius: 12px; font-size: 22px; font-weight: 800;
        }

        .controls { display: flex; gap: 20px; align-items: center; }
        .timer-box { 
            font-weight: 800; color: var(--accent); 
            background: #FFF3EB; padding: 10px 25px; border-radius: 15px; font-size: 20px;
            border: 2px solid #FAD6CD;
        }
        .btn-submit { 
            background: var(--primary); color: white; border: none; padding: 12px 30px; 
            border-radius: 15px; font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.2s;
            font-family: inherit; box-shadow: 0 5px 0 var(--primary-dark);
        }
        .btn-submit:active { transform: translateY(5px); box-shadow: none; }
        .btn-submit:hover { filter: brightness(1.1); }

        /* --- MAIN LAYOUT (FULL SCREEN) --- */
        .container { 
            display: flex; flex-direction: column;
            height: calc(100vh - var(--header-h) - var(--footer-h)); 
            width: 100%; 
            padding: 40px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .quiz-wrapper {
            width: 100%; /* Phóng to hết màn hình */
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 30px;
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- QUESTION UI --- */
        .q-block { 
            background: white; padding: 35px; border-radius: 20px; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.03); 
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }
        .q-block:hover { border-color: var(--primary-light); box-shadow: 0 10px 30px rgba(136, 176, 75, 0.1); }

        .q-header { display: flex; align-items: flex-start; margin-bottom: 20px; }
        .q-num {
            min-width: 45px; height: 45px; background: var(--primary-light); color: var(--primary-dark);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 800; margin-right: 15px; flex-shrink: 0;
            border: 2px solid var(--primary);
        }
        .q-text { font-size: 20px; line-height: 1.6; font-weight: 700; color: #1e293b; padding-top: 5px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .option-label {
            display: flex; align-items: center; background: #f8fafc; border: 2px solid var(--border);
            border-radius: 15px; padding: 15px 20px; font-size: 18px; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .option-label:hover { background: #f1f5f9; border-color: #94a3b8; }
        .option-label input { display: none; }
        
        /* Trạng thái đã chọn */
        .option-label.selected {
            background: var(--primary-light); border-color: var(--primary); color: var(--primary-dark);
        }

        /* --- FEEDBACK & EXPLANATION --- */
        .feedback { font-size: 18px; font-weight: 800; margin-top: 15px; display: none; }
        .feedback.correct { color: var(--correct); display: block; }
        .feedback.wrong { color: var(--wrong); display: block; }

        .explanation {
            display: none; background: #f8fafc; border-left: 6px solid var(--primary);
            padding: 20px; border-radius: 12px; margin-top: 20px; font-size: 17px; line-height: 1.7;
            color: #475569; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
            animation: fadeIn 0.4s ease;
        }
        .explanation.show { display: block; }
        .exp-title { font-weight: 800; color: var(--primary-dark); margin-bottom: 8px; font-size: 18px; display: flex; align-items: center; gap: 8px;}

        /* --- FOOTER NAVIGATION --- */
        footer {
            height: var(--footer-h); background: #fff; border-top: 2px solid var(--border);
            display: flex; align-items: center; padding: 0 40px; z-index: 100;
        }
        .nav-label { font-size: 16px; font-weight: 800; color: var(--text-light); text-transform: uppercase; margin-right: 25px; flex-shrink: 0; }
        .nav-scroller { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; align-items: center; width: 100%;}
        .nav-dot {
            min-width: 45px; height: 45px; border: 2px solid var(--border); border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800;
            cursor: pointer; color: #94a3b8; background: white; transition: 0.2s; flex-shrink: 0;
        }
        .nav-dot:hover { border-color: var(--primary); color: var(--primary); }
        .nav-dot.done { background: var(--primary-light); color: var(--primary-dark); border-color: var(--primary); }

        /* --- MODALS --- */
        .custom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: none; align-items: center; justify-content: center; z-index: 99999;
        }
        .custom-modal {
            background: white; padding: 45px; border-radius: 25px;
            box-shadow: 0 20px 50px rgba(136, 176, 75, 0.2);
            width: 90%; max-width: 450px; text-align: center; border: 2px solid var(--primary-light);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-modal h2 { color: var(--primary-dark); font-size: 28px; margin-top: 0; font-weight: 800; }
        
        #timeInput { 
            width: 100px; padding: 12px; font-size: 20px; text-align: center; 
            border: 2px solid var(--border); border-radius: 12px; font-family: inherit; font-weight: bold; outline: none; margin: 20px 0;
        }
        #timeInput:focus { border-color: var(--primary); }

        .modal-actions { display: flex; gap: 15px; margin-top: 25px; justify-content: center; }
        .btn-cancel {
            background: #f1f5f9; color: #475569; border: none; padding: 14px 20px;
            border-radius: 15px; font-weight: 800; font-size: 17px; cursor: pointer; flex: 1; transition: 0.2s;
        }
        .btn-cancel:hover { background: #e2e8f0; }
        .btn-confirm {
            background: var(--primary); color: white; border: none; padding: 14px 20px;
            border-radius: 15px; font-weight: 800; font-size: 17px; cursor: pointer; flex: 1; transition: 0.2s;
            box-shadow: 0 4px 0 var(--primary-dark);
        }
        .btn-confirm:active { transform: translateY(4px); box-shadow: none; }
        
        .score-circle {
            width: 130px; height: 130px; background: linear-gradient(135deg, var(--primary-light) 0%, var(--primary) 100%);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            margin: 0 auto 20px auto; color: white; font-size: 32px; font-weight: 800;
            box-shadow: 0 10px 20px rgba(136, 176, 75, 0.4); border: 4px solid white;
        }
    </style>
</head>
<body>

<div id="setupOverlay" class="custom-overlay" style="display: flex;">
    <div class="custom-modal">
        <h2>Sẵn sàng chinh phục? 🚀</h2>
        <p style="font-size: 18px; color: #64748b;">Cài đặt thời gian làm bài Part 5 (Gợi ý: 15 phút)</p>
        <input type="number" id="timeInput" value="15" min="1" max="60"> <span style="font-size: 18px; font-weight: bold; color: #475569;">phút</span>
        <button class="btn-confirm" style="width: 100%; margin-top: 10px;" onclick="startTestActual()">BẮT ĐẦU NGAY</button>
    </div>
</div>

<header>
    <div class="brand-logo"><span>SnapEnglish</span> Part 5 Test 3</div>
    <div class="controls">
        <div class="timer-box">⏰ <span id="timer">00:00</span></div>
        <button class="btn-submit" onclick="askSubmit()">NỘP BÀI</button>
    </div>
</header>

<div class="container" id="mainContainer">
    <div class="quiz-wrapper" id="quiz-wrapper">
        </div>
</div>

<footer>
    <div class="nav-label">Điều hướng:</div>
    <div class="nav-scroller" id="navPalette">
        </div>
</footer>

<div id="confirmOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>Xác nhận nộp bài</h2>
        <p style="font-size: 18px; color: #475569;">Bạn có chắc chắn muốn nộp bài để xem giải thích chi tiết không?</p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeConfirmModal()">Quay lại</button>
            <button class="btn-confirm" onclick="submitQuiz()">Nộp bài</button>
        </div>
    </div>
</div>

<div id="resultOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>🎉 Tuyệt vời!</h2>
        <div class="score-circle" id="score-display">0/30</div>
        <p style="font-size: 18px; color: #64748b; font-weight: 600; margin-bottom: 25px;">Hãy xem lại phần giải thích chi tiết cho các câu sai nhé!</p>
        <button class="btn-confirm" style="width: 100%;" onclick="closeResultModal()">Xem Giải Thích Chi Tiết</button>
    </div>
</div>

<script>
    // --- BẢO MẬT KHÓA CODE (ANTI-CHEAT) ---
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.addEventListener('keydown', function(e) {
        if(e.keyCode == 123) { e.preventDefault(); return false; } // Chống F12
        if(e.ctrlKey && e.shiftKey && e.keyCode == 73) { e.preventDefault(); return false; } // Chống Ctrl+Shift+I
        if(e.ctrlKey && e.shiftKey && e.keyCode == 74) { e.preventDefault(); return false; } // Chống Ctrl+Shift+J
        if(e.ctrlKey && e.keyCode == 85) { e.preventDefault(); return false; } // Chống Ctrl+U
    });

    // --- DATA ---
    const questions = [
        { id: 101, q: "All shelves in the holiday merchandise section need to remain ----- stocked.", options: ["full", "fully", "fuller", "fullest"], a: "fully", 
          exp: "<b>Cấu trúc:</b> remain + trạng từ (adv) + tính từ phân từ (V-ed/P2). Trạng từ 'fully' bổ nghĩa cho tính từ 'stocked' (được lấp đầy toàn bộ)." },
        { id: 102, q: "------ to the exercise room is included with your stay at the Bayland Hotel.", options: ["Access", "Accessed", "Accessing", "Accessible"], a: "Access", 
          exp: "<b>Ngữ pháp:</b> Cần một danh từ đứng đầu câu làm chủ ngữ. 'Access to...' (Quyền truy cập vào...). 'Accessible' là tính từ." },
        { id: 103, q: "Mr. Okello's promotion means that ------ will supervise a larger team.", options: ["he", "his", "him", "himself"], a: "he", 
          exp: "<b>Ngữ pháp:</b> Sau 'that' cần một mệnh đề mới hoàn chỉnh (S + V). Đại từ nhân xưng chủ ngữ 'he' là lựa chọn duy nhất phù hợp làm chủ ngữ cho động từ 'will supervise'." },
        { id: 104, q: "Juniper Worldwide, Inc., will be ------ payroll service providers on January 1.", options: ["changing", "attending", "holding", "turning"], a: "changing", 
          exp: "<b>Từ vựng:</b> changing providers (thay đổi nhà cung cấp). Các từ khác không hợp nghĩa: attending (tham dự), holding (tổ chức), turning (xoay)." },
        { id: 105, q: "The Valletta Visitor Centre offers daily boat rides ------ the city's historic waterfront.", options: ["between", "along", "below", "apart"], a: "along", 
          exp: "<b>Giới từ:</b> 'along the waterfront' (dọc theo bờ sông/bờ biển). Rất phổ biến trong ngữ cảnh mô tả các chuyến đi thuyền." },
        { id: 106, q: "Ultrora Action's T-Pro tennis shoe is the lightest ------ on the market right now.", options: ["that", "any", "one", "either"], a: "one", 
          exp: "<b>Đại từ:</b> 'one' thay thế cho danh từ 'shoe' đã được nhắc tới phía trước, tránh lặp từ (the lightest shoe -> the lightest one)." },
        { id: 107, q: "Duram Biscuit Corp. is able to ------ good deals with its wholesale suppliers.", options: ["negotiating", "negotiates", "negotiated", "negotiate"], a: "negotiate", 
          exp: "<b>Ngữ pháp:</b> Cấu trúc 'be able to + V(nguyên thể)' (có khả năng làm gì). Do đó chọn 'negotiate' (thương lượng)." },
        { id: 108, q: "At Razani Marketing, there are ------ opportunities for professional advancement.", options: ["plenty", "each", "very", "many"], a: "many", 
          exp: "<b>Lượng từ:</b> 'opportunities' là danh từ đếm được số nhiều. 'Many' đi với danh từ số nhiều. 'Plenty' phải đi với 'of'. 'Each' đi với danh từ số ít." },
        { id: 109, q: "Parking on Dahakno Street will be prohibited for the next few days ------ emergency repairs to water lines.", options: ["so that", "as a result", "in order to", "because of"], a: "because of", 
          exp: "<b>Giới từ:</b> 'emergency repairs' là một cụm danh từ. Chọn 'because of + Noun phrase' (bởi vì). 'so that' phải cộng mệnh đề." },
        { id: 110, q: "Accountants applying for the training must obtain a ------- from their supervisor.", options: ["referring", "referred", "referral", "refer"], a: "referral", 
          exp: "<b>Từ loại:</b> Sau mạo từ 'a' cần một danh từ. 'referral' (sự giới thiệu/giấy giới thiệu) là danh từ." },
        { id: 111, q: "The evaluation report will be completed ------ after the auditors inspect the laboratory.", options: ["when", "only", "still", "most"], a: "only", 
          exp: "<b>Trạng từ:</b> 'only after' (chỉ sau khi) là cụm từ cố định nhấn mạnh thời điểm. Báo cáo sẽ được hoàn thành *chỉ sau khi* kiểm toán viên kiểm tra xong." },
        { id: 112, q: "In light of our recent expansion, it will be ------ to hire another administrative assistant by June 1.", options: ["necessitating", "necessary", "necessarily", "necessities"], a: "necessary", 
          exp: "<b>Cấu trúc:</b> It is/will be + Tính từ (Adj) + to V. 'necessary' là tính từ (sẽ là cần thiết để thuê...)." },
        { id: 113, q: "Due to low registration, the communications workshop scheduled for July 2 will be postponed ------ further notice.", options: ["until", "onto", "since", "all"], a: "until", 
          exp: "<b>Giới từ:</b> Cụm từ cố định 'postponed until further notice' (bị hoãn cho đến khi có thông báo mới)." },
        { id: 114, q: "The initial response to the beta version of the software allows us to be ------ optimistic about future product sales.", options: ["fairness", "fairest", "fairly", "fair"], a: "fairly", 
          exp: "<b>Từ loại:</b> Cần một trạng từ bổ nghĩa cho tính từ 'optimistic'. 'fairly' (khá) là đáp án đúng (khá lạc quan)." },
        { id: 115, q: "Orvale School's business mentors are retired executives with a ------ of expertise across a wide range of industries.", options: ["wealth", "height", "labor", "fame"], a: "wealth", 
          exp: "<b>Cụm từ cố định (Collocation):</b> 'a wealth of expertise/knowledge' (một lượng lớn/sự phong phú về chuyên môn)." },
        { id: 116, q: "Thank you for your interest in our ------- line of compact refrigerators.", options: ["update", "updated", "updates", "updating"], a: "updated", 
          exp: "<b>Từ loại:</b> Cần một tính từ đứng trước danh từ 'line'. Phân từ V-ed 'updated' đóng vai trò tính từ mang nghĩa bị động (dòng sản phẩm được cập nhật)." },
        { id: 117, q: "The judges may begin to review the entries ------ the deadline for submitting slogans has passed.", options: ["how", "nor", "now that", "whether"], a: "now that", 
          exp: "<b>Liên từ:</b> 'now that' = 'because' (bởi vì giờ đây). Bởi vì hạn chót đã qua, ban giám khảo có thể bắt đầu chấm bài." },
        { id: 118, q: "On his daily radio show, Trade Biz, Antonio Koslor ------ business news from all over the globe.", options: ["analysis", "analyzer", "analyzes", "analyzing"], a: "analyzes", 
          exp: "<b>Chia động từ:</b> Chủ ngữ 'Antonio Koslor' số ít, câu kể sự thật/thói quen 'daily radio show' dùng thì hiện tại đơn -> 'analyzes'." },
        { id: 119, q: "The purchase of The New Lagos Reporter will not lead to changes ------ editorial staff.", options: ["in", "again", "positions", "ultimately"], a: "in", 
          exp: "<b>Giới từ:</b> 'changes in something' (sự thay đổi trong lĩnh vực/bộ phận nào đó). Sự mua lại sẽ không dẫn đến sự thay đổi trong ban biên tập." },
        { id: 120, q: "Professor Reginald Layke's proposal for an additional course in business management was approved in a ------ short time.", options: ["surprised", "surprise", "surprisingly", "surprising"], a: "surprisingly", 
          exp: "<b>Từ loại:</b> Cần trạng từ (adv) bổ nghĩa cho tính từ 'short'. 'surprisingly short time' (khoảng thời gian ngắn một cách đáng ngạc nhiên)." },
        { id: 121, q: "Candell Science Museum trustees are expected to be ------ of all the museum's operations.", options: ["aware", "current", "serious", "alert"], a: "aware", 
          exp: "<b>Giới từ:</b> Chỉ có tính từ 'aware' đi được với giới từ 'of' (nhận thức được/biết về toàn bộ hoạt động của bảo tàng)." },
        { id: 122, q: "With the completion of its airport, Honokai Island's tourism ------ has improved dramatically.", options: ["economical", "economic", "economize", "economy"], a: "economy", 
          exp: "<b>Từ loại:</b> Sở hữu cách 's cần một danh từ. 'tourism economy' (nền kinh tế du lịch) là danh từ ghép phù hợp." },
        { id: 123, q: "Brock's Bistro has requested that we ------ the number of dinner guests by Monday.", options: ["personify", "magnify", "specify", "testify"], a: "specify", 
          exp: "<b>Từ vựng:</b> 'specify the number' (nêu rõ/xác định rõ số lượng). Các từ khác: magnify (phóng to), testify (làm chứng)." },
        { id: 124, q: "Doi Textiles, Inc., is well-known ------ the fashion world as being a trendsetter for young women's clothing.", options: ["toward", "throughout", "regarding", "aboard"], a: "throughout", 
          exp: "<b>Giới từ:</b> 'throughout the fashion world' (xuyên suốt/trên toàn thế giới thời trang). Phù hợp nhất về nghĩa." },
        { id: 125, q: "To sign up for any class at Routen Academy, simply complete the online ------ form.", options: ["enrollment", "inventory", "complaint", "solicitation"], a: "enrollment", 
          exp: "<b>Từ vựng:</b> 'enrollment form' (mẫu đơn đăng ký/ghi danh). Phù hợp với ngữ cảnh 'sign up for class' (đăng ký lớp học)." },
        { id: 126, q: "A reception will be held to introduce the newly ------ director of marketing to the employees.", options: ["appoint", "appoints", "appointed", "appointing"], a: "appointed", 
          exp: "<b>Từ loại:</b> Phân từ V-ed đóng vai trò tính từ đứng trước danh từ 'director'. 'newly appointed' (vừa mới được bổ nhiệm)." },
        { id: 127, q: "To fill two vacant positions on its benefits committee, Adidion Labs ------ employees who are ready for a challenge.", options: ["seeking", "is seeking", "are sought", "have been sought"], a: "is seeking", 
          exp: "<b>Thì/Thể:</b> Chủ ngữ 'Adidion Labs' là tên 1 công ty (số ít). Câu chủ động diễn tả hành động đang diễn ra -> 'is seeking' (đang tìm kiếm)." },
        { id: 128, q: "The software for tracking orders has been successful as it has greatly ------ decreased time spent on the task.", options: ["haltingly", "intimately", "permissibly", "markedly"], a: "markedly", 
          exp: "<b>Từ vựng (Trạng từ):</b> 'markedly decreased' (giảm một cách rõ rệt/đáng kể). Phù hợp nhất với ngữ cảnh khen ngợi phần mềm." },
        { id: 129, q: "Lately the community sports program has had a surplus of volunteers, ------ are students.", options: ["inasmuch as", "the reason being", "because of them", "most of whom"], a: "most of whom", 
          exp: "<b>Mệnh đề quan hệ:</b> Dùng đại từ quan hệ thay thế cho 'volunteers'. 'most of whom' (hầu hết trong số họ) nối 2 vế câu một cách hợp lý." },
        { id: 130, q: "Please use the attached survey to let us know how ------ your recent stay at the Copper Mine Inn was.", options: ["knowledgeable", "considerable", "enjoyable", "available"], a: "enjoyable", 
          exp: "<b>Từ vựng:</b> 'how enjoyable' (thú vị/thoải mái đến mức nào). Dùng để hỏi về trải nghiệm tại khách sạn ('stay at the Copper Mine Inn')." }
    ];

    const quizWrapper = document.getElementById("quiz-wrapper");
    const navPalette = document.getElementById("navPalette");
    const userAnswers = {};
    let testDuration = 0;
    let timerInterval = null;
    let isSubmitted = false;

    // --- RENDER QUESTIONS ---
    function renderQuiz() {
        questions.forEach((q, index) => {
            // Render Nav Dot
            let dot = document.createElement("div");
            dot.className = "nav-dot";
            dot.id = `nav-${q.id}`;
            dot.innerText = index + 1;
            dot.onclick = () => {
                const el = document.getElementById(`q-${q.id}`);
                el.scrollIntoView({ behavior: "smooth", block: "center" });
                el.style.borderColor = "var(--primary)";
                setTimeout(() => el.style.borderColor = "var(--border)", 1000);
            };
            navPalette.appendChild(dot);

            // Render Question Block
            let qBlock = document.createElement("div");
            qBlock.className = "q-block";
            qBlock.id = `q-${q.id}`;

            let optionsHtml = q.options.map((opt, i) => `
                <label class="option-label" id="label-${q.id}-${i}">
                    <input type="radio" name="q-${q.id}" value="${opt}" onclick="selectOption(${q.id}, '${opt}', ${i})">
                    <span>${String.fromCharCode(65 + i)}. ${opt}</span>
                </label>
            `).join('');

            qBlock.innerHTML = `
                <div class="q-header">
                    <div class="q-num">${index + 1}</div>
                    <div class="q-text">${q.q}</div>
                </div>
                <div class="options-grid">${optionsHtml}</div>
                <div class="feedback" id="fb-${q.id}"></div>
                <div class="explanation" id="exp-${q.id}">
                    <div class="exp-title">💡 Giải thích chi tiết:</div>
                    ${q.exp}
                </div>
            `;
            quizWrapper.appendChild(qBlock);
        });
    }

    // --- LOGIC ---
    function selectOption(qId, value, optIndex) {
        if (isSubmitted) return;
        userAnswers[qId] = value;
        
        // Update UI for options
        const qBlock = document.getElementById(`q-${qId}`);
        const labels = qBlock.querySelectorAll('.option-label');
        labels.forEach(l => l.classList.remove('selected'));
        document.getElementById(`label-${qId}-${optIndex}`).classList.add('selected');

        // Update Nav Dot
        document.getElementById(`nav-${qId}`).classList.add('done');
    }

    function startTestActual() {
        document.getElementById('setupOverlay').style.display = 'none';
        let minutes = parseInt(document.getElementById('timeInput').value);
        if (isNaN(minutes) || minutes < 1) minutes = 15;
        testDuration = minutes * 60;
        startTimer();
    }

    function startTimer() {
        const display = document.getElementById("timer");
        timerInterval = setInterval(() => {
            let m = Math.floor(testDuration / 60);
            let s = testDuration % 60;
            display.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (--testDuration < 0) { 
                clearInterval(timerInterval); 
                submitQuiz(); 
            }
        }, 1000);
    }

    function askSubmit() {
        if(isSubmitted) return;
        document.getElementById('confirmOverlay').style.display = 'flex';
    }

    function closeConfirmModal() {
        document.getElementById('confirmOverlay').style.display = 'none';
    }

    function closeResultModal() {
        document.getElementById('resultOverlay').style.display = 'none';
    }

    function submitQuiz() {
        document.getElementById('confirmOverlay').style.display = 'none';
        isSubmitted = true;
        clearInterval(timerInterval);

        // Khóa tất cả input
        document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);

        let correctCount = 0;

        questions.forEach(q => {
            const userAnswer = userAnswers[q.id];
            const isCorrect = userAnswer === q.a;
            if (isCorrect) correctCount++;

            // Highlight Nav Dot
            const dot = document.getElementById(`nav-${q.id}`);
            dot.style.background = isCorrect ? "#d1fae5" : "#ffe4e6";
            dot.style.color = isCorrect ? "#065f46" : "#be123c";
            dot.style.borderColor = isCorrect ? "var(--correct)" : "var(--wrong)";

            // Highlight Feedback & Correct Answer
            const fb = document.getElementById(`fb-${q.id}`);
            const exp = document.getElementById(`exp-${q.id}`);
            
            if (userAnswer) {
                if (isCorrect) {
                    fb.innerHTML = `✓ Chính xác`;
                    fb.className = "feedback correct";
                } else {
                    fb.innerHTML = `✗ Sai. Đáp án đúng là: <span style="background: var(--primary-light); padding: 2px 8px; border-radius: 6px; color: var(--primary-dark);">${q.a}</span>`;
                    fb.className = "feedback wrong";
                }
            } else {
                fb.innerHTML = `⚠ Chưa trả lời. Đáp án đúng là: <span style="background: var(--primary-light); padding: 2px 8px; border-radius: 6px; color: var(--primary-dark);">${q.a}</span>`;
                fb.className = "feedback wrong";
            }
            
            // Hiện hộp giải thích
            exp.classList.add('show');

            // Đánh dấu trực quan trên đáp án
            const qBlock = document.getElementById(`q-${q.id}`);
            const labels = qBlock.querySelectorAll('.option-label');
            labels.forEach(label => {
                const text = label.innerText.slice(3).trim(); // Bỏ "A. "
                if (text === q.a) {
                    label.style.borderColor = "var(--correct)";
                    label.style.background = "#f0fdf4";
                } else if (text === userAnswer && !isCorrect) {
                    label.style.borderColor = "var(--wrong)";
                    label.style.background = "#fff1f2";
                }
            });
        });

        // Hiện Result Modal
        document.getElementById("score-display").textContent = `${correctCount}/30`;
        setTimeout(() => document.getElementById('resultOverlay').style.display = 'flex', 500);
    }

    // Init
    renderQuiz();
</script>

</body>
</html>
