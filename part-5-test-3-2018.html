<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 5 - Test 3 - 2018 | SnapEnglish</title>
     <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
        
    <style>
        :root {
            /* Tông màu Pastel SnapEnglish */
            --primary: #d88c9a;       /* Hồng đào trầm */
            --primary-dark: #c47382;
            --secondary: #9cb494;     /* Xanh matcha */
            --secondary-dark: #7a9073;
            --bg-body: #fdf6f6;       /* Trắng hồng pastel */
            --bg-card: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
            --border: #f1e4e4;
            --correct-bg: #e8f5e9;
            --correct-text: #2e7d32;
            --wrong-bg: #ffebee;
            --wrong-text: #c62828;
            --header-h: 80px;
            --footer-h: 90px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Nunito', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden; 
            user-select: none; /* Chống bôi đen text */
        }

        /* --- HEADER --- */
        header {
            height: var(--header-h); background: #fff;
            box-shadow: 0 4px 20px rgba(216, 140, 154, 0.08);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 100; flex-shrink: 0;
            border-bottom: 2px solid var(--border);
        }
        
        .brand { font-size: 26px; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 12px; }
        .brand span { background: var(--secondary); color: white; padding: 6px 14px; border-radius: 12px; font-size: 18px; box-shadow: 0 4px 10px rgba(156, 180, 148, 0.3);}

        .controls { display: flex; gap: 20px; align-items: center; }
        .timer-box { 
            font-weight: 800; color: var(--primary-dark); 
            background: #fff0f3; padding: 10px 25px; border-radius: 20px; font-size: 20px;
            border: 2px solid #ffe3e3;
        }
        .btn-submit { 
            background: var(--primary); color: white; border: none; padding: 12px 35px; 
            border-radius: 20px; font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(216, 140, 154, 0.4);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(216, 140, 154, 0.6); }

        /* --- MAIN CONTAINER (FULL SCREEN) --- */
        .main-area {
            flex: 1;
            width: 100%;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            scroll-behavior: smooth;
        }
        
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: #e2c2c8; border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        .question-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 1400px;
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.03);
            border: 2px solid var(--border);
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .question-card.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .q-header { display: flex; justify-content: space-between; margin-bottom: 30px; align-items: center; border-bottom: 2px dashed var(--border); padding-bottom: 20px;}
        .q-num { font-size: 24px; font-weight: 800; color: var(--secondary-dark); }
        .q-text { font-size: 22px; line-height: 1.6; font-weight: 700; margin-bottom: 35px; color: #1e293b; background: #fafafa; padding: 25px; border-radius: 15px; border-left: 6px solid var(--secondary);}

        /* Options */
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option {
            background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 15px;
            padding: 20px 25px; font-size: 19px; font-weight: 600; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center;
        }
        .option:hover:not(.disabled) { background: #f1f5f9; border-color: #cbd5e1; }
        .option.selected { background: #f0fdfa; border-color: var(--secondary); color: var(--secondary-dark); box-shadow: 0 4px 15px rgba(156, 180, 148, 0.2); }
        .option.disabled { cursor: default; }
        
        .option.correct { background: var(--correct-bg); border-color: #81c784; color: var(--correct-text); box-shadow: 0 4px 15px rgba(46, 125, 50, 0.15);}
        .option.wrong { background: var(--wrong-bg); border-color: #e57373; color: var(--wrong-text); }

        /* --- NAVIGATION BUTTONS (INSIDE CARD) --- */
        .q-nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 35px;
            padding-top: 25px;
            border-top: 2px dashed var(--border);
        }
        .btn-nav {
            padding: 12px 30px; border-radius: 15px; font-size: 18px; font-weight: 700; cursor: pointer;
            border: none; transition: 0.3s; font-family: inherit; background: #f1f5f9; color: #64748b;
        }
        .btn-nav:hover:not(:disabled) { background: #e2e8f0; color: #334155; transform: translateY(-2px); }
        .btn-nav.next { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(216, 140, 154, 0.3); }
        .btn-nav.next:hover:not(:disabled) { background: var(--primary-dark); }
        .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }

        /* --- PHẦN GIẢI THÍCH CHI TIẾT --- */
        .explanation-box {
            display: none; margin-top: 40px; background: #fff; border-radius: 20px;
            padding: 35px; border: 2px solid var(--border); border-left: 8px solid var(--primary);
            box-shadow: 0 10px 30px rgba(216, 140, 154, 0.1); animation: fadeIn 0.5s ease;
        }
        .explanation-box.show { display: block; }
        
        .exp-title { font-size: 20px; font-weight: 800; color: var(--primary-dark); margin-bottom: 15px; display: flex; align-items: center; gap: 10px;}
        .exp-content { font-size: 18px; line-height: 1.7; color: #444; margin-bottom: 20px; }
        .exp-content ul { padding-left: 20px; margin: 10px 0; }
        .exp-content li { margin-bottom: 8px; }
        
        .vocab-box { background: #fef5e7; padding: 20px 25px; border-radius: 15px; border-left: 5px solid #f5b041; margin-top: 20px; font-size: 18px;}
        .trans-box { color: #6d4c41; font-size: 19px; font-style: italic; border-top: 2px dashed #f1e4e4; margin-top: 25px; padding-top: 20px; font-weight: 600;}

        /* --- FOOTER & NAV BOARD --- */
        footer {
            height: var(--footer-h); background: #fff; border-top: 2px solid var(--border);
            display: flex; align-items: center; padding: 0 40px; box-shadow: 0 -4px 20px rgba(0,0,0,0.03);
            z-index: 100; flex-shrink: 0;
        }
        .nav-scroller { display: flex; gap: 12px; overflow-x: auto; padding: 10px 0; align-items: center; width: 100%;}
        .nav-scroller::-webkit-scrollbar { height: 6px; }
        .nav-dot {
            min-width: 50px; height: 50px; border: 2px solid #e2e8f0; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 800;
            cursor: pointer; color: #94a3b8; background: white; transition: 0.3s; flex-shrink: 0;
        }
        .nav-dot:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-2px);}
        .nav-dot.done { background: #fff0f3; color: var(--primary-dark); border-color: var(--primary); }
        .nav-dot.correct { background: var(--correct-bg); color: var(--correct-text); border-color: #81c784; }
        .nav-dot.wrong { background: var(--wrong-bg); color: var(--wrong-text); border-color: #e57373; }
        .nav-dot.active { border-color: var(--secondary); box-shadow: 0 0 0 3px rgba(156, 180, 148, 0.3); }

        /* --- MODALS --- */
        .custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(253, 246, 246, 0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 99999; }
        .custom-modal { background: white; padding: 50px; border-radius: 30px; box-shadow: 0 20px 50px rgba(216, 140, 154, 0.2); width: 90%; max-width: 500px; text-align: center; border: 2px solid var(--border); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .custom-modal h2 { color: var(--primary-dark); font-size: 32px; margin-top: 0; font-weight: 800; }
        .modal-actions { display: flex; gap: 20px; margin-top: 35px; }
        .btn-modal { flex: 1; padding: 15px; border-radius: 20px; font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.3s; font-family: inherit; border: none; }
        .btn-cancel { background: #f1f5f9; color: #64748b; }
        .btn-cancel:hover { background: #e2e8f0; }
        .btn-confirm { background: var(--secondary); color: white; box-shadow: 0 4px 15px rgba(156, 180, 148, 0.4); }
        .btn-confirm:hover { background: var(--secondary-dark); transform: translateY(-2px); }
        #timeInput { width: 100px; padding: 12px; font-size: 22px; text-align: center; border: 2px solid var(--border); border-radius: 15px; outline: none; font-weight: 800; color: var(--primary-dark);}
    </style>
</head>
<body>

<script>
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; 
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    }
    setInterval(function() {
        var before = new Date().getTime();
        debugger;
        var after = new Date().getTime();
        if (after - before > 100) {
            document.body.innerHTML = "<h1 style='text-align:center; margin-top: 20%; color: #d88c9a;'>SnapEnglish - Security Alert!</h1><p style='text-align:center;'>Vui lòng không can thiệp vào mã nguồn của hệ thống.</p>";
        }
    }, 1000);
</script>

<div id="setupOverlay" class="custom-overlay" style="display: flex;">
    <div class="custom-modal">
        <h2>Sẵn sàng chưa? 🚀</h2>
        <p style="font-size: 20px; color: #64748b; margin-bottom: 25px;">Cài đặt thời gian làm bài Part 5<br>(Gợi ý: 15-20 phút)</p>
        <div style="margin-bottom: 30px;">
            <input type="number" id="timeInput" value="20" min="1"> <span style="font-size: 20px; font-weight: 800; color: #444;">phút</span>
        </div>
        <button class="btn-modal btn-confirm" style="width: 100%; padding: 18px;" onclick="startTest()">BẮT ĐẦU NGAY</button>
    </div>
</div>

<header>
    <div class="brand"><span>SnapEnglish</span> Part 5 - Test 3</div>
    <div class="controls">
        <div class="timer-box">⏱ <span id="timer">00:00</span></div>
        <button class="btn-submit" id="mainSubmitBtn" onclick="askSubmit()">NỘP BÀI</button>
    </div>
</header>

<div class="main-area" id="mainArea">
    </div>

<footer>
    <div style="font-size: 16px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-right: 25px; flex-shrink: 0;">Điều hướng:</div>
    <div class="nav-scroller" id="navPalette"></div>
</footer>

<div id="confirmOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>Xác nhận nộp bài</h2>
        <p style="font-size: 18px; color: #555;">Bạn có chắc chắn muốn nộp bài để xem giải thích chi tiết không?</p>
        <div class="modal-actions">
            <button class="btn-modal btn-cancel" onclick="closeConfirmModal()">Quay lại</button>
            <button class="btn-modal btn-confirm" style="background: var(--primary);" onclick="submitTest()">Nộp bài</button>
        </div>
    </div>
</div>

<div id="resultOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>🎉 Tuyệt vời!</h2>
        <div id="resultMessage" style="margin: 25px 0; line-height: 1.8;"></div>
        <button class="btn-modal btn-confirm" style="width: 100%;" onclick="closeResultModal()">Xem Giải Thích Chi Tiết</button>
    </div>
</div>

<script>
    const questionsData = [
        {
            id: 101, q: "All shelves in the holiday merchandise section need to remain ----- stocked.",
            options: ["full", "fully", "fuller", "fullest"], a: "fully",
            exp: {
                correct: "Chỗ trống đứng trước tính từ phân từ `stocked` (được lấp đầy), do đó ta cần một **Trạng từ** để bổ nghĩa cho nó. `fully stocked` mang nghĩa là được lấp đầy hoàn toàn.",
                wrong: "<ul><li>**full (adj):** Tính từ không thể đứng trước để bổ nghĩa cho tính từ/phân từ khác.</li><li>**fuller / fullest:** Các dạng so sánh của tính từ, sai từ loại.</li></ul>",
                vocab: "<b>merchandise (n):</b> hàng hóa<br><b>remain (v):</b> duy trì, giữ ở trạng thái",
                trans: "Tất cả các kệ trong khu vực hàng hóa dành cho kỳ nghỉ cần được duy trì trạng thái lấp đầy hàng hoàn toàn."
            }
        },
        {
            id: 102, q: "------ to the exercise room is included with your stay at the Bayland Hotel.",
            options: ["Access", "Accessed", "Accessing", "Accessible"], a: "Access",
            exp: {
                correct: "Chỗ trống đứng đầu câu, trước giới từ `to`, đóng vai trò làm Chủ ngữ chính của câu. Do đó ta cần một **Danh từ**. `Access` (sự truy cập, quyền sử dụng) là đáp án chính xác.",
                wrong: "<ul><li>**Accessed (v-ed):** Động từ chia thì quá khứ.</li><li>**Accessing (v-ing):** Nếu làm danh động từ thì không đi kèm giới từ `to` ngay phía sau theo cấu trúc này.</li><li>**Accessible (adj):** Tính từ không làm chủ ngữ.</li></ul>",
                vocab: "<b>access to (n):</b> quyền sử dụng/truy cập vào đâu<br><b>include (v):</b> bao gồm",
                trans: "Quyền sử dụng phòng tập thể dục đã được bao gồm trong thời gian bạn lưu trú tại Khách sạn Bayland."
            }
        },
        {
            id: 103, q: "Mr. Okello's promotion means that ------ will supervise a larger team.",
            options: ["he", "his", "him", "himself"], a: "he",
            exp: {
                correct: "Sau liên từ `that` là một mệnh đề mới. Chỗ trống đứng trước động từ `will supervise`, do đó cần một **Đại từ nhân xưng làm chủ ngữ**. Chọn `he`.",
                wrong: "<ul><li>**his:** Tính từ sở hữu (phải cộng danh từ) hoặc đại từ sở hữu.</li><li>**him:** Đại từ tân ngữ, đứng sau động từ.</li><li>**himself:** Đại từ phản thân.</li></ul>",
                vocab: "<b>promotion (n):</b> sự thăng tiến<br><b>supervise (v):</b> giám sát, quản lý",
                trans: "Việc thăng chức của ông Okello có nghĩa là ông ấy sẽ quản lý một đội ngũ lớn hơn."
            }
        },
        {
            id: 104, q: "Juniper Worldwide, Inc., will be ------ payroll service providers on January 1.",
            options: ["changing", "attending", "holding", "turning"], a: "changing",
            exp: {
                correct: "Dựa vào ngữ nghĩa: công ty này sẽ `thay đổi` (change) nhà cung cấp dịch vụ trả lương vào ngày 1 tháng 1.",
                wrong: "<ul><li>**attending:** tham dự.</li><li>**holding:** tổ chức, cầm nắm.</li><li>**turning:** xoay, rẽ.</li></ul>",
                vocab: "<b>payroll service provider (n):</b> nhà cung cấp dịch vụ trả lương (kế toán)",
                trans: "Juniper Worldwide, Inc., sẽ thay đổi nhà cung cấp dịch vụ trả lương vào ngày 1 tháng 1."
            }
        },
        {
            id: 105, q: "The Valletta Visitor Centre offers daily boat rides ------ the city's historic waterfront.",
            options: ["between", "along", "below", "apart"], a: "along",
            exp: {
                correct: "Cần một giới từ chỉ hướng di chuyển hoặc vị trí. `along` (dọc theo) đi với `waterfront` (bờ sông/bờ biển) tạo thành cụm từ hợp lý về mặt không gian: những chuyến đi thuyền dọc theo bờ sông.",
                wrong: "<ul><li>**between:** giữa (cần 2 đối tượng).</li><li>**below:** bên dưới.</li><li>**apart:** xa cách, tách rời.</li></ul>",
                vocab: "<b>waterfront (n):</b> khu vực bờ sông, bờ biển<br><b>historic (adj):</b> mang tính lịch sử",
                trans: "Trung tâm Du khách Valletta cung cấp các chuyến đi thuyền hàng ngày dọc theo khu vực bờ sông lịch sử của thành phố."
            }
        },
        {
            id: 106, q: "Ultrora Action's T-Pro tennis shoe is the lightest ------ on the market right now.",
            options: ["that", "any", "one", "either"], a: "one",
            exp: {
                correct: "Đại từ `one` được dùng để thay thế cho danh từ số ít `shoe` đã nhắc đến phía trước, tránh lặp từ. `the lightest one` = the lightest shoe.",
                wrong: "<ul><li>**that:** Thường thay thế cho danh từ số ít đi với giới từ (that of).</li><li>**any / either:** Không phù hợp ngữ pháp trong cấu trúc so sánh nhất này.</li></ul>",
                vocab: "<b>lightest (adj):</b> nhẹ nhất",
                trans: "Giày tennis T-Pro của Ultrora Action là đôi nhẹ nhất trên thị trường hiện nay."
            }
        },
        {
            id: 107, q: "Duram Biscuit Corp. is able to ------ good deals with its wholesale suppliers.",
            options: ["negotiating", "negotiates", "negotiated", "negotiate"], a: "negotiate",
            exp: {
                correct: "Cấu trúc cố định: **be able to + V-nguyên thể** (có khả năng làm gì). Chọn `negotiate`.",
                wrong: "Các đáp án chia thêm -ing, -s, -ed đều vi phạm cấu trúc theo sau `to`.",
                vocab: "<b>negotiate (v):</b> đàm phán, thương lượng<br><b>wholesale supplier (n):</b> nhà cung cấp bán buôn",
                trans: "Tập đoàn bánh quy Duram có khả năng đàm phán được những thỏa thuận tốt với các nhà cung cấp bán buôn của mình."
            }
        },
        {
            id: 108, q: "At Razani Marketing, there are ------ opportunities for professional advancement.",
            options: ["plenty", "each", "very", "many"], a: "many",
            exp: {
                correct: "Sau chỗ trống là danh từ đếm được số nhiều `opportunities`. Lượng từ `many` (nhiều) + Danh từ số nhiều là lựa chọn chính xác.",
                wrong: "<ul><li>**plenty:** Phải có `of` (plenty of) mới đứng trước danh từ.</li><li>**each:** Cộng danh từ số ít.</li><li>**very:** Trạng từ, không bổ nghĩa cho danh từ theo cách này.</li></ul>",
                vocab: "<b>opportunity (n):</b> cơ hội<br><b>professional advancement (n):</b> sự thăng tiến nghề nghiệp",
                trans: "Tại Razani Marketing, có rất nhiều cơ hội để thăng tiến nghề nghiệp."
            }
        },
        {
            id: 109, q: "Parking on Dahakno Street will be prohibited for the next few days ------ emergency repairs to water lines.",
            options: ["so that", "as a result", "in order to", "because of"], a: "because of",
            exp: {
                correct: "Sau chỗ trống là một cụm danh từ `emergency repairs...`. Chỉ có giới từ `because of` (+ Noun phrase) mang nghĩa `bởi vì` là phù hợp để chỉ nguyên nhân.",
                wrong: "<ul><li>**so that:** Cộng một mệnh đề (S + V).</li><li>**as a result:** Thường đứng đầu câu hoặc sau dấu phẩy, không nối trực tiếp cụm danh từ.</li><li>**in order to:** Cộng V-nguyên thể.</li></ul>",
                vocab: "<b>prohibit (v):</b> cấm<br><b>emergency repair (n):</b> sửa chữa khẩn cấp",
                trans: "Việc đỗ xe trên đường Dahakno sẽ bị cấm trong vài ngày tới BỞI VÌ việc sửa chữa khẩn cấp các đường ống nước."
            }
        },
        {
            id: 110, q: "Accountants applying for the training must obtain a ------- from their supervisor.",
            options: ["referring", "referred", "referral", "refer"], a: "referral",
            exp: {
                correct: "Sau mạo từ `a` cần một **Danh từ đếm được số ít**. `referral` (thư giới thiệu, sự giới thiệu) là danh từ chính xác.",

    ];

    let currentQIndex = 0;
    let userAnswers = new Array(questionsData.length).fill(null);
    let isSubmitted = false;
    let testDuration = 0;
    let timerInterval = null;

    const mainArea = document.getElementById('mainArea');
    const navPalette = document.getElementById('navPalette');

    function initQuiz() {
        questionsData.forEach((q, index) => {
            let dot = document.createElement('div');
            dot.className = 'nav-dot';
            dot.id = `nav-${index}`;
            dot.innerText = index + 1;
            dot.onclick = () => jumpToQuestion(index);
            navPalette.appendChild(dot);

            let card = document.createElement('div');
            card.className = 'question-card';
            card.id = `card-${index}`;
            
            let optionsHtml = q.options.map((opt, optIndex) => `
                <div class="option" id="opt-${index}-${optIndex}" onclick="selectOption(${index}, '${opt}', ${optIndex})">
                    <strong style="margin-right:15px; color: var(--primary); font-size: 22px;">${String.fromCharCode(65 + optIndex)}.</strong> ${opt}
                </div>
            `).join('');

            card.innerHTML = `
                <div class="q-header">
                    <div class="q-num">Question ${index + 1}</div>
                    <div style="font-weight: 700; color: #94a3b8;">${index + 1} / ${questionsData.length}</div>
                </div>
                <div class="q-text">${q.q}</div>
                <div class="options">
                    ${optionsHtml}
                </div>
                
                <div class="q-nav-buttons">
                    <button class="btn-nav btn-prev" onclick="jumpToQuestion(${index - 1})" ${index === 0 ? 'disabled' : ''}>Quay lại</button>
                    <button class="btn-nav btn-next next" onclick="jumpToQuestion(${index + 1})" ${index === questionsData.length - 1 ? 'disabled' : ''}>Tiếp theo</button>
                </div>

                <div class="explanation-box" id="exp-${index}">
                    <div class="exp-title">💡 Giải Thích Chi Tiết</div>
                    <div class="exp-content">
                        <div style="color: var(--correct-text); background: var(--correct-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #c8e6c9;">
                            <strong>✅ Phân tích đáp án đúng:</strong><br>${q.exp.correct}
                        </div>
                        <div style="color: #555; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #e2e8f0;">
                            <strong>❌ Tại sao sai:</strong><br>${q.exp.wrong}
                        </div>
                    </div>
                    <div class="vocab-box">
                        <strong>📚 Từ Vựng Cốt Lõi:</strong><br>${q.exp.vocab}
                    </div>
                    <div class="trans-box">👉 Dịch: "${q.exp.trans}"</div>
                </div>
            `;
            mainArea.appendChild(card);
        });
    }

    function startTest() {
        document.getElementById('setupOverlay').style.display = 'none';
        let minutes = parseInt(document.getElementById('timeInput').value) || 20;
        testDuration = minutes * 60;
        initQuiz();
        jumpToQuestion(0);
        
        timerInterval = setInterval(() => {
            let m = Math.floor(testDuration / 60);
            let s = testDuration % 60;
            document.getElementById("timer").textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            if (--testDuration < 0) { 
                clearInterval(timerInterval); 
                executeSubmit(); 
            }
        }, 1000);
    }

    function jumpToQuestion(index) {
        if (index < 0 || index >= questionsData.length) return;
        
        // Ẩn thẻ cũ & cập nhật viền nav-dot
        let oldCard = document.getElementById(`card-${currentQIndex}`);
        let oldDot = document.getElementById(`nav-${currentQIndex}`);
        if(oldCard) oldCard.classList.remove('active');
        if(oldDot) oldDot.classList.remove('active');
        
        // Hiện thẻ mới
        currentQIndex = index;
        let newCard = document.getElementById(`card-${currentQIndex}`);
        let newDot = document.getElementById(`nav-${currentQIndex}`);
        if(newCard) newCard.classList.add('active');
        if(newDot) newDot.classList.add('active');
        
        // Luôn cuộn lên trên cùng của mainArea để người dùng không phải kéo tay lên
        mainArea.scrollTo(0, 0);
    }

    function selectOption(qIndex, answer, optIndex) {
        if(isSubmitted) return; 
        
        userAnswers[qIndex] = answer;
        for(let i=0; i<4; i++) {
            document.getElementById(`opt-${qIndex}-${i}`).classList.remove('selected');
        }
        document.getElementById(`opt-${qIndex}-${optIndex}`).classList.add('selected');
        document.getElementById(`nav-${qIndex}`).classList.add('done');
        
        // Chuyển tự động sang câu kế tiếp sau 0.4s nếu chưa hết
        if(qIndex < questionsData.length - 1) {
            setTimeout(() => jumpToQuestion(qIndex + 1), 400);
        }
    }

    function askSubmit() {
        if(isSubmitted) return;
        document.getElementById('confirmOverlay').style.display = 'flex';
    }

    function closeConfirmModal() {
        document.getElementById('confirmOverlay').style.display = 'none';
    }
    
    function closeResultModal() {
        document.getElementById('resultOverlay').style.display = 'none';
        // Chỉ cần trở về câu số 1, các thẻ khác vẫn ẩn (vì 1 lúc chỉ hiện 1 câu)
        jumpToQuestion(0);
    }

    function submitTest() {
        document.getElementById('confirmOverlay').style.display = 'none';
        executeSubmit();
    }

    function executeSubmit() {
        if(isSubmitted) return;
        isSubmitted = true;
        clearInterval(timerInterval);
        document.getElementById("mainSubmitBtn").style.display = 'none';

        let score = 0;
        
        questionsData.forEach((q, index) => {
            let uAns = userAnswers[index];
            let isCorrect = uAns === q.a;
            if(isCorrect) score++;

            for(let i=0; i<4; i++) {
                let optEl = document.getElementById(`opt-${index}-${i}`);
                optEl.classList.add('disabled');
                
                let optText = q.options[i];
                if (optText === q.a) {
                    optEl.classList.add('correct'); 
                } else if (optText === uAns) {
                    optEl.classList.add('wrong'); 
                }
            }

            document.getElementById(`exp-${index}`).classList.add('show');

            let dot = document.getElementById(`nav-${index}`);
            dot.classList.remove('done');
            if (isCorrect) dot.classList.add('correct');
            else dot.classList.add('wrong');
        });

        document.getElementById('resultMessage').innerHTML = `
            <strong style="font-size: 40px; color: var(--primary); display: block; margin-bottom: 15px;">${score} / ${questionsData.length}</strong>
            <p style="font-size: 18px; color: #64748b; font-weight: 600;">Bạn đã hoàn thành bài kiểm tra!<br>Hãy bấm vào các câu ở bảng điều hướng bên dưới hoặc dùng nút "Tiếp theo" để xem giải thích chi tiết nhé.</p>
        `;
        document.getElementById('resultOverlay').style.display = 'flex';

        if(window.luuDiemTOEICLenFirebase) {
            window.luuDiemTOEICLenFirebase(questionsData.length, score, "Test 3 - 2018", "Reading", "Part 5");
        }
    }
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlTU4B563sSsTVbLai_je29l6eC8T-cm0",
        authDomain: "snapenglish-cb6e2.firebaseapp.com",
        projectId: "snapenglish-cb6e2",
        storageBucket: "snapenglish-cb6e2.firebasestorage.app",
        messagingSenderId: "373152038413",
        appId: "1:373152038413:web:19284622571390f8585f44"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Giao diện Toast nhanh (không cần CSS)
    function showInGameToast(msg) {
        let toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.cssText = "position:fixed; bottom:20px; right:20px; background:#4ECDC4; color:white; padding:15px 20px; border-radius:12px; font-weight:bold; font-family:'Quicksand',sans-serif; z-index:99999; box-shadow:0 10px 30px rgba(0,0,0,0.2); transform:translateY(100px); opacity:0; transition:all 0.4s ease;";
        document.body.appendChild(toast);
        
        setTimeout(() => { toast.style.transform = "translateY(0)"; toast.style.opacity = "1"; }, 100);
        setTimeout(() => { toast.style.transform = "translateY(100px)"; toast.style.opacity = "0"; }, 3500);
        setTimeout(() => { toast.remove(); }, 4000);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.currentUserUid = user.uid;
            window.currentUserEmail = user.email;
        } else {
            showInGameToast("⚠️ Bạn đang chơi dưới dạng Khách, điểm sẽ không lưu lên kho!");
        }
    });

    // Hàm tính điểm theo chuẩn TOEIC
    function calculateToeicScore(skill, correct, total) {
        let percentage = correct / total;
        let maxScore = (skill === 'Listening' || skill === 'Reading') ? 495 : 200;
        let step = (skill === 'Listening' || skill === 'Reading') ? 5 : 10;
        let estimated = Math.round((percentage * maxScore) / step) * step;
        if (estimated > maxScore) return maxScore;
        if (estimated < 5 && (skill === 'Listening' || skill === 'Reading')) return 5;
        if (estimated < 0) return 0;
        return estimated;
    }

    // Gắn hàm này vào lúc nộp bài (Ví dụ trong hàm finishTest() hoặc submitQuiz())
    window.luuDiemTOEICLenFirebase = async function(tongSoCau, soCauDung, tenBai, kyNang, tenPart) {
        if (!window.currentUserUid) return; 

        // Tính điểm quy đổi
        let diemQuyDoi = calculateToeicScore(kyNang, soCauDung, tongSoCau);
        let thoiGianHienTai = document.getElementById("timer") ? document.getElementById("timer").innerText : "--"; 

        let timestamp = Date.now();
        let docId = window.currentUserUid + "_toeic_" + timestamp;
        
        try {
            await setDoc(doc(db, "user_toeic_scores", docId), {
                email: window.currentUserEmail,
                skill: kyNang,           // VD: "Reading" hoặc "Listening"
                testName: tenBai,        // VD: "Test 1 - 2018"
                partName: tenPart,       // VD: "Part 5"
                timeTaken: thoiGianHienTai,
                totalQ: tongSoCau,
                correctQ: soCauDung,
                score: diemQuyDoi,       // Lưu thẳng điểm đã nhân hệ số (VD: 150 điểm)
                date: new Date().toLocaleDateString('vi-VN'),
                timestamp: timestamp
            });
            showInGameToast("☁️ Đã đồng bộ điểm số lên Máy Chủ!");
        } catch (error) {
            console.error(error);
        }
    }
</script>
