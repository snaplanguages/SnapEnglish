<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 5 - Test 3 - 2018 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        
    <style>
        :root {
            --primary: #0ea5e9;       
            --primary-dark: #0284c7;
            --secondary: #0d9488;     
            --secondary-dark: #0f766e;
            --bg-body: #f8fafc;       
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --correct-bg: #f0fdf4;
            --correct-text: #166534;
            --correct-border: #bbf7d0;
            --wrong-bg: #fef2f2;
            --wrong-text: #991b1b;
            --wrong-border: #fecaca;
            --grammar-bg: #eff6ff;
            --grammar-border: #bfdbfe;
            --vocab-bg: #fffbeb;
            --vocab-border: #fde68a;
            --header-h: 75px;
        }
        ::selection { background: #bae6fd; color: #0c4a6e; }
        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden; 
        }

        /* --- HEADER CHÍNH --- */
        header {
            height: var(--header-h); background: #fff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 1000; flex-shrink: 0;
            position: relative;
        }
        
        .brand { font-size: 22px; font-weight: 800; color: #1e293b; display: flex; align-items: center; gap: 10px; }
        .brand span { background: #1e293b; color: white; padding: 4px 12px; border-radius: 8px; font-size: 16px; box-shadow: 0 4px 10px rgba(30, 41, 59, 0.2);}

        .controls { display: flex; gap: 15px; align-items: center; }

        .btn-nav-toggle {
            background: #f1f5f9; color: var(--text-main); border: 1px solid var(--border);
            padding: 8px 20px; border-radius: 8px; font-weight: 600; font-size: 15px; 
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px;
            font-family: inherit;
        }
        .btn-nav-toggle:hover { background: #e2e8f0; border-color: #cbd5e1; }

        .btn-submit { 
            background: #10b981; color: white; border: none; padding: 9px 24px; 
            border-radius: 8px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); font-family: inherit;
        }
        .btn-submit:hover { transform: translateY(-2px); background: #059669; }

        /* --- DROPDOWN LIST --- */
        .nav-dropdown {
            position: absolute; top: calc(var(--header-h) + 10px); right: 40px;
            background: #fff; border-radius: 12px; border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 320px;
            max-height: 400px; overflow-y: auto; z-index: 999;
            padding: 20px; display: none; grid-template-columns: repeat(5, 1fr); gap: 10px;
            opacity: 0; transform: translateY(-10px); transition: 0.3s ease;
        }
        .nav-dropdown.show {
            display: grid; opacity: 1; transform: translateY(0);
        }
        .nav-dropdown::-webkit-scrollbar { width: 6px; }
        .nav-dropdown::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        .nav-dot {
            height: 45px; border: 1px solid var(--border); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;
            cursor: pointer; color: var(--text-light); background: #f8fafc; transition: 0.2s;
        }
        .nav-dot:hover { border-color: var(--primary); color: var(--primary); }
        .nav-dot.done { background: #f0f9ff; color: var(--primary-dark); border-color: #bae6fd; }
        .nav-dot.correct { background: var(--correct-bg); color: var(--correct-text); border-color: var(--correct-border); }
        .nav-dot.wrong { background: var(--wrong-bg); color: var(--wrong-text); border-color: var(--wrong-border); }
        .nav-dot.active { box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.4); border-color: var(--primary); }

        /* --- MAIN KHU VỰC CÂU HỎI --- */
        .main-area {
            flex: 1; width: 100%; overflow-y: auto; padding: 40px;
            display: flex; justify-content: center; align-items: flex-start; scroll-behavior: smooth;
        }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .question-card {
            background: var(--bg-card);
            width: 100%; max-width: none; 
            border-radius: 12px;
            padding: 35px 40px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border);
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .question-card.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER CỦA CÂU HỎI */
        .q-header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px dashed #cbd5e1; padding-bottom: 15px; margin-bottom: 25px;
        }
        .q-header-left { display: flex; align-items: center; gap: 15px; }
        .q-num { font-size: 20px; font-weight: 700; color: #0ea5e9; }
        
        .timer-pill {
            font-weight: 600; color: #f43f5e; background: #ffe4e6; 
            padding: 6px 14px; border-radius: 20px; font-size: 14px;
            display: flex; align-items: center; gap: 6px;
            border: 1px solid #fecdd3;
        }

        .q-counter-pill {
            font-weight: 600; color: #0284c7; background: #e0f2fe; 
            padding: 6px 16px; border-radius: 20px; font-size: 14px;
        }

        .q-text { 
            font-size: 17px; line-height: 1.6; font-weight: 500; margin-bottom: 25px; 
            color: #1e293b; background: transparent; padding: 0; border: none;
        }

        /* CÁC ĐÁP ÁN */
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px;
            padding: 14px 20px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: space-between; color: #475569;
        }
        .option:hover:not(.disabled) { background: #f8fafc; border-color: #94a3b8; }
        .option.selected { background: #f0f9ff; border-color: #0ea5e9; color: #0369a1; font-weight: 600; }
        .option.disabled { cursor: default; }
        
        .option.correct { background: var(--correct-bg); border-color: #86efac; color: var(--correct-text); font-weight: 600; }
        .option.wrong { background: var(--wrong-bg); border-color: #fca5a5; color: var(--wrong-text); opacity: 0.9;}

        /* --- NAVIGATION BUTTONS --- */
        .q-nav-buttons {
            display: flex; justify-content: flex-end; margin-top: 30px;
        }
        .btn-nav.next { 
            background: #38bdf8; color: white; border: none; font-family: inherit;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.3); border-radius: 24px; 
            padding: 10px 32px; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
        } 
        .btn-nav.next:hover:not(:disabled) { background: #0284c7; }
        .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

        /* --- PHẦN GIẢI THÍCH CHI TIẾT --- */
        .explanation-box {
            display: none; margin-top: 40px; animation: fadeIn 0.5s ease;
            border-top: 2px dashed #e2e8f0; padding-top: 30px;
        }
        .explanation-box.show { display: block; }
        
        .exp-main-title { font-size: 17px; font-weight: 700; color: #334155; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .exp-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 15px; }
        
        .box { padding: 18px; border-radius: 12px; border: 1px solid; font-size: 15px; line-height: 1.6; }
        .box-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;}
        
        .box-correct { background: var(--correct-bg); border-color: var(--correct-border); color: #064e3b; }
        .box-correct .box-title { color: var(--correct-text); }
        
        .box-wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: #7f1d1d; }
        .box-wrong .box-title { color: var(--wrong-text); }
        .box-wrong ul { margin: 0; padding-left: 20px; }
        .box-wrong li { margin-bottom: 6px; }
        
        .box-grammar { background: var(--grammar-bg); border-color: var(--grammar-border); color: #1e3a8a; }
        .box-grammar .box-title { color: #1d4ed8; }
        
        .box-vocab { background: var(--vocab-bg); border-color: var(--vocab-border); color: #78350f; }
        .box-vocab .box-title { color: #b45309; }
        
        .box-trans { background: #f1f5f9; border-color: #e2e8f0; color: #475569; font-style: italic; border-left: 4px solid #94a3b8;}
        .box-trans .box-title { color: #64748b; font-style: normal;}

        /* --- MODALS --- */
        .custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 99999; }
        .custom-modal { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--border); animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .custom-modal h2 { color: var(--text-main); font-size: 24px; margin-top: 0; font-weight: 800; }
        .modal-actions { display: flex; gap: 12px; margin-top: 25px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 8px; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; font-family: inherit; border: none; }
        .btn-cancel { background: #f1f5f9; color: #475569; }
        .btn-cancel:hover { background: #e2e8f0; color: #1e293b;}
        .btn-confirm-start { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.25); }
        .btn-confirm-start:hover { background: var(--primary-dark); transform: translateY(-1px); }
        #timeInput { width: 90px; padding: 10px; font-size: 16px; text-align: center; border: 2px solid var(--border); border-radius: 8px; outline: none; font-weight: 700; color: var(--primary-dark); font-family: inherit;}
        #timeInput:focus { border-color: var(--primary); }
        /* 1. Màn hình Tablet / Laptop màn hình nhỏ */
@media (max-width: 1024px) {
    .question-card { padding: 30px 40px; }
    header { padding: 0 20px; }
    .nav-dropdown { right: 20px; }
}

/* 2. Màn hình Điện thoại di động (Mobile) */
@media (max-width: 768px) {
    :root {
        --header-h: auto; /* Để header tự động co giãn theo nội dung */
    }
    
    /* Căn lại Header và các nút bấm */
    header {
        flex-direction: column;
        padding: 15px;
        gap: 12px;
        text-align: center;
    }
    .brand {
        font-size: 18px;
        justify-content: center;
        flex-wrap: wrap;
    }
    .controls {
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        width: 100%;
    }
    .btn-nav-local, .btn-nav-toggle, .btn-submit {
        font-size: 13px;
        padding: 8px 12px;
        flex-grow: 1; /* Để các nút dàn đều chiều ngang trên mobile */
        text-align: center;
        justify-content: center;
    }
    
    /* Căn lại Bảng danh sách câu hỏi (Dropdown) */
    .nav-dropdown {
        top: 140px; 
        left: 5%;
        right: 5%;
        width: auto;
        grid-template-columns: repeat(5, 1fr);
    }

    /* Thu nhỏ khoảng cách khu vực làm bài chính */
    .main-area { padding: 20px 15px; }
    .question-card { padding: 20px; border-radius: 16px; }
    
    .q-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }
    .q-header-left { width: 100%; justify-content: space-between; }
    .q-counter-pill { width: 100%; justify-content: center; }
    
    .q-text { font-size: 17px; margin-bottom: 20px; }
    
    /* Các đáp án: Chuyển thành dạng cột nếu câu trả lời quá dài */
    .option { 
        font-size: 15px; 
        padding: 12px 15px; 
        flex-direction: column; 
        align-items: flex-start; 
        gap: 8px; 
    }
    .option span[id^="badge-"] { padding-left: 0; align-self: flex-start; font-size: 13px; }
    
    /* Thu gọn phần Giải thích chi tiết */
    .exp-main-title { font-size: 18px; }
    .box { padding: 15px; font-size: 15px; }
    
    /* Nút "Câu Tiếp Theo" tràn viền cho dễ bấm trên cảm ứng */
    .q-nav-buttons { justify-content: center; margin-top: 25px; }
    .btn-nav.next { width: 100%; font-size: 15px; padding: 12px; }

    /* Thu gọn Modals (Popup) */
    .custom-modal { padding: 25px 20px; width: 92%; }
    .custom-modal h2 { font-size: 22px; }
    .modal-actions { flex-direction: column; gap: 10px; }
    .btn-modal { width: 100%; }
    
    /* Box nhập thời gian */
    #timeInput { width: 80px; font-size: 16px; padding: 10px; }
}

/* 3. Màn hình Điện thoại cực nhỏ (Ví dụ: iPhone SE cũ) */
@media (max-width: 480px) {
    .nav-dropdown { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .nav-dot { height: 40px; font-size: 14px; }
    .brand span { font-size: 13px; padding: 3px 10px;}
    .timer-pill, .q-counter-pill { font-size: 13px; padding: 6px 12px; }
}
    </style>
</head>

<script>
    // Script bảo vệ mã nguồn
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
        if(e.keyCode == 123) return false; 
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false;
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
    }
    setInterval(function() {
        var before = new Date().getTime();
        debugger;
        var after = new Date().getTime();
        if (after - before > 100) {
            document.body.innerHTML = "<h1 style='text-align:center; margin-top: 20%; color: #0ea5e9;'>SnapEnglish - Security Alert!</h1><p style='text-align:center;'>Vui lòng không can thiệp vào mã nguồn của hệ thống.</p>";
        }
    }, 1000);
</script>

<div id="setupOverlay" class="custom-overlay" style="display: flex;">
    <div class="custom-modal">
        <h2>Sẵn sàng chưa? 🚀</h2>
        <p style="font-size: 16px; color: #64748b; margin-bottom: 25px; line-height: 1.5;">Cài đặt thời gian làm bài Part 5<br>(Gợi ý: 15-20 phút)</p>
        <div style="margin-bottom: 30px; display: flex; justify-content: center; align-items: center; gap: 10px;">
            <input type="number" id="timeInput" value="20" min="1"> 
            <span style="font-size: 16px; font-weight: 700; color: #475569;">phút</span>
        </div>
        <button class="btn-modal btn-confirm-start" style="width: 100%;" onclick="startTest()">BẮT ĐẦU NGAY</button>
    </div>
</div>

<header>
    <div class="brand"><span>SnapEnglish</span> Part 5 - Test 3 (2018)</div>
    <div class="controls">
        <button class="btn-nav-toggle" onclick="toggleNavDropdown()">📑 Danh sách câu</button>
        <button class="btn-submit" id="mainSubmitBtn" onclick="askSubmit()">NỘP BÀI</button>
    </div>
    <div class="nav-dropdown" id="navDropdown"></div>
</header>

<div class="main-area" id="mainArea">
    </div>

<div id="confirmOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>Xác nhận nộp bài</h2>
        <p style="font-size: 16px; color: #475569; margin-top: 15px;">Bạn có chắc chắn muốn nộp bài để xem giải thích chi tiết không?</p>
        <div class="modal-actions">
            <button class="btn-modal btn-cancel" onclick="closeConfirmModal()">Quay lại</button>
            <button class="btn-modal btn-confirm-start" onclick="submitTest()">Nộp bài</button>
        </div>
    </div>
</div>

<div id="resultOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>🎉 Tuyệt vời!</h2>
        <div id="resultMessage" style="margin: 25px 0; line-height: 1.6;"></div>
        <button class="btn-modal btn-confirm-start" style="width: 100%;" onclick="closeResultModal()">Xem Giải Thích Chi Tiết</button>
    </div>
</div>

<script>
    // DỮ LIỆU ĐÃ ĐƯỢC CHUẨN HÓA VỚI ĐẦY ĐỦ NGỮ PHÁP & GIẢI THÍCH MỞ RỘNG
    const questionsData = [
        {
            id: 101, q: "All shelves in the holiday merchandise section need to remain ----- stocked.",
            options: ["full", "fully", "fuller", "fullest"], a: "fully",
            exp: {
                correct: "Chỗ trống đứng trước phân từ quá khứ `stocked` (được lấp đầy), do đó ta cần một <b>Trạng từ</b> để bổ nghĩa cho phân từ này. `fully stocked` mang nghĩa là được lấp đầy hoàn toàn.",
                wrong: "<ul><li><b>(A) full</b>: Tính từ không thể đứng trước để bổ nghĩa cho một tính từ/phân từ khác.</li><li><b>(C) fuller / (D) fullest</b>: Các dạng so sánh của tính từ, sai từ loại.</li></ul>",
                grammar: "Cấu trúc: <b>Trạng từ (Adv) + Phân từ quá khứ (V-ed)</b> dùng như một cụm tính từ miêu tả trạng thái.",
                vocab: "<b>merchandise (n):</b> hàng hóa<br><b>remain (v):</b> duy trì, giữ ở trạng thái<br><b>fully stocked:</b> lấp đầy hoàn toàn",
                trans: "Tất cả các kệ trong khu vực hàng hóa dành cho kỳ nghỉ cần được duy trì trạng thái lấp đầy hàng hoàn toàn."
            }
        },
        {
            id: 102, q: "------ to the exercise room is included with your stay at the Bayland Hotel.",
            options: ["Access", "Accessed", "Accessing", "Accessible"], a: "Access",
            exp: {
                correct: "Chỗ trống đứng đầu câu, trước giới từ `to`, đóng vai trò làm <b>Chủ ngữ chính</b> của câu. Do đó ta cần một Danh từ. `Access` (sự truy cập, quyền sử dụng) là đáp án chính xác.",
                wrong: "<ul><li><b>(B) Accessed</b>: Động từ chia thì quá khứ (V-ed).</li><li><b>(C) Accessing</b>: Danh động từ (V-ing) thường không đi kèm giới từ `to` trực tiếp trong ngữ cảnh này mà không có tân ngữ.</li><li><b>(D) Accessible</b>: Tính từ không thể đứng làm chủ ngữ.</li></ul>",
                grammar: "Cấu trúc: <b>Noun + to + Noun</b> đóng vai trò làm Chủ ngữ trong câu.",
                vocab: "<b>access to (n):</b> quyền sử dụng/truy cập vào đâu<br><b>include (v):</b> bao gồm",
                trans: "Quyền sử dụng phòng tập thể dục đã được bao gồm trong thời gian bạn lưu trú tại Khách sạn Bayland."
            }
        },
        {
            id: 103, q: "Mr. Okello's promotion means that ------ will supervise a larger team.",
            options: ["he", "his", "him", "himself"], a: "he",
            exp: {
                correct: "Sau liên từ `that` bắt đầu một mệnh đề mới hoàn chỉnh (S + V). Chỗ trống đứng trước động từ `will supervise`, do đó cần một <b>Đại từ nhân xưng làm Chủ ngữ</b>. Chọn `he`.",
                wrong: "<ul><li><b>(B) his</b>: Tính từ sở hữu (cần + Noun) hoặc đại từ sở hữu.</li><li><b>(C) him</b>: Đại từ tân ngữ, chỉ đứng sau động từ.</li><li><b>(D) himself</b>: Đại từ phản thân, không làm chủ ngữ.</li></ul>",
                grammar: "Cấu trúc mệnh đề danh ngữ: <b>that + Chủ ngữ (S) + Động từ (V)</b>.",
                vocab: "<b>promotion (n):</b> sự thăng tiến, thăng chức<br><b>supervise (v):</b> giám sát, quản lý",
                trans: "Việc thăng chức của ông Okello có nghĩa là ông ấy sẽ quản lý một đội ngũ lớn hơn."
            }

                wrong: "<ul><li><b>(A) personify</b>: nhân cách hóa.</li><li><b>(B) magnify</b>: phóng đại.</li><li><b>(D) testify</b>: làm chứng.</li></ul>",
                grammar: "Thể giả định (Subjunctive): <b>S + requested that + S + V(nguyên thể không to)</b>.",

        },
        {
            id: 124, q: "Doi Textiles, Inc., is well-known ------ the fashion world as being a trendsetter for young women's clothing.",

            exp: {
                correct: "Giới từ `throughout` + danh từ chỉ không gian/khu vực mang nghĩa là 'khắp nơi, xuyên suốt'. `throughout the fashion world` = khắp thế giới thời trang.",

                grammar: "Giới từ chỉ phạm vi không gian: <b>Throughout + Khu vực/Nơi chốn</b>.",

                trans: "Doi Textiles, Inc., nổi tiếng KHẮP thế giới thời trang vì là người tạo ra xu hướng cho quần áo phụ nữ trẻ."

        },
        {
            id: 125, q: "To sign up for any class at Routen Academy, simply complete the online ------ form.",
            options: ["enrollment", "inventory", "complaint", "solicitation"], a: "enrollment",
            exp: {
                correct: "Cụm danh từ cố định trong ngữ cảnh trường học/khóa học: `enrollment form` (mẫu đơn đăng ký/nhập học).",
                wrong: "<ul><li><b>(B) inventory</b>: hàng tồn kho.</li><li><b>(C) complaint</b>: khiếu nại.</li><li><b>(D) solicitation</b>: sự xúi giục, chèo kéo.</li></ul>",
                grammar: "Sử dụng Danh từ đứng trước làm định ngữ bổ nghĩa cho Danh từ đứng sau: <b>enrollment form</b>.",
                vocab: "<b>sign up (v):</b> đăng ký<br><b>complete (v):</b> hoàn thành, điền vào",
                trans: "Để đăng ký bất kỳ lớp học nào tại Học viện Routen, chỉ cần điền vào MẪU ĐƠN ĐĂNG KÝ trực tuyến."
            }
        },
        {
            id: 126, q: "A reception will be held to introduce the newly ------ director of marketing to the employees.",
            options: ["appoint", "appoints", "appointed", "appointing"], a: "appointed",
            exp: {
                correct: "Cấu trúc bổ nghĩa: Trạng từ (newly) + Tính từ/Phân từ (appointed) + Danh từ (director). Mang nghĩa bị động 'người giám đốc mới được bổ nhiệm'.",
                wrong: "<ul><li><b>(A) appoint / (B) appoints</b>: Động từ chia thì không thể đứng trước danh từ.</li><li><b>(D) appointing</b>: V-ing mang nghĩa chủ động, sai logic.</li></ul>",
                grammar: "Cấu trúc Cụm danh từ: <b>Adv + V-ed (dùng như Tính từ) + Noun</b>.",
                vocab: "<b>reception (n):</b> tiệc chiêu đãi<br><b>appoint (v):</b> bổ nhiệm",
                trans: "Một buổi tiệc chiêu đãi sẽ được tổ chức để giới thiệu giám đốc tiếp thị MỚI ĐƯỢC BỔ NHIỆM với các nhân viên."
            }
        },
        {
            id: 127, q: "To fill two vacant positions on its benefits committee, Adidion Labs ------ employees who are ready for a challenge.",
            options: ["seeking", "is seeking", "are sought", "have been sought"], a: "is seeking",
            exp: {
                correct: "Chủ ngữ là `Adidion Labs` (tên công ty, số ít), động từ mang nghĩa chủ động (công ty TÌM KIẾM nhân viên). Do đó dùng thì Hiện tại tiếp diễn `is seeking`.",
                wrong: "<ul><li><b>(A) seeking</b>: V-ing thiếu to be.</li><li><b>(C) are sought / (D) have been sought</b>: Thể bị động, không hợp ngữ cảnh.</li></ul>",
                grammar: "Thì Hiện tại tiếp diễn mang ý nghĩa chủ động: <b>S (số ít) + is + V-ing</b>.",
                vocab: "<b>vacant (adj):</b> trống, khuyết<br><b>seek (v):</b> tìm kiếm",
                trans: "Để lấp đầy hai vị trí trống trong ủy ban phúc lợi, Adidion Labs ĐANG TÌM KIẾM những nhân viên sẵn sàng cho thử thách."
            }
        },
        {
            id: 128, q: "The software for tracking orders has been successful as it has greatly ------ decreased time spent on the task.",
            options: ["haltingly", "intimately", "permissibly", "markedly"], a: "markedly",
            exp: {
                correct: "Chỗ trống cần <b>Trạng từ</b> bổ nghĩa cho động từ `decreased`. `markedly` (một cách rõ rệt, đáng kể) đi kèm với động từ chỉ sự tăng giảm là sự kết hợp (collocation) hoàn hảo.",
                wrong: "<ul><li><b>(A) haltingly</b>: ngập ngừng.</li><li><b>(B) intimately</b>: thân mật.</li><li><b>(C) permissibly</b>: có thể chấp nhận/cho phép được.</li></ul>",
                grammar: "Trạng từ bổ nghĩa cho động từ: <b>Adv + Verb</b> (Decreased markedly: Giảm đáng kể).",
                vocab: "<b>tracking (v-ing):</b> theo dõi<br><b>decrease (v):</b> làm giảm",
                trans: "Phần mềm theo dõi đơn hàng đã thành công vì nó làm giảm MỘT CÁCH RÕ RỆT thời gian dành cho công việc."
            }
        },
        {
            id: 129, q: "Lately the community sports program has had a surplus of volunteers, ------ are students.",
            options: ["inasmuch as", "the reason being", "because of them", "most of whom"], a: "most of whom",
            exp: {
                correct: "Cần nối mệnh đề. Cấu trúc đại từ quan hệ chỉ số lượng: Lượng từ + of whom/which. Thay thế cho người (`volunteers`) nên dùng `whom`. Ta có `most of whom` (hầu hết trong số họ).",
                wrong: "<ul><li>Các từ khác không đóng vai trò nối mệnh đề quan hệ và không có đại từ quan hệ để nối hai vế độc lập có dấu phẩy.</li></ul>",
                grammar: "Mệnh đề quan hệ chỉ số lượng: <b>Lượng từ (Most, All, Some...) + of + whom / which + V</b>.",
                vocab: "<b>surplus (n):</b> sự dư thừa<br><b>volunteer (n):</b> tình nguyện viên",
                trans: "Gần đây chương trình thể thao cộng đồng đã có dư thừa tình nguyện viên, HẦU HẾT TRONG SỐ HỌ là sinh viên."
            }
        },
        {
            id: 130, q: "Please use the attached survey to let us know how ------ your recent stay at the Copper Mine Inn was.",
            options: ["knowledgeable", "considerable", "enjoyable", "available"], a: "enjoyable",
            exp: {
                correct: "Cấu trúc cảm thán hoặc mệnh đề danh từ: `how + Adjective + S + V`. Dựa vào ngữ cảnh đánh giá thời gian lưu trú (stay) tại nhà nghỉ, tính từ `enjoyable` (thú vị, làm hài lòng) là chính xác.",
                wrong: "<ul><li><b>(A) knowledgeable</b>: có kiến thức (chỉ người).</li><li><b>(B) considerable</b>: đáng kể.</li><li><b>(D) available</b>: có sẵn.</li></ul>",
                grammar: "Cấu trúc mệnh đề bắt đầu bằng How chỉ mức độ: <b>How + Adjective/Adverb + Subject + Verb</b>.",
                vocab: "<b>attached survey (n):</b> bản khảo sát đính kèm<br><b>enjoyable (adj):</b> thú vị, vui vẻ",
                trans: "Vui lòng sử dụng bản khảo sát đính kèm để cho chúng tôi biết thời gian lưu trú gần đây của bạn tại Copper Mine Inn THÚ VỊ như thế nào."
            }
        }
    ];

    let currentQIndex = 0;
    let userAnswers = new Array(questionsData.length).fill(null);
    let isSubmitted = false;
    let testDuration = 0;
    let timerInterval = null;

    const mainArea = document.getElementById('mainArea');
    const navDropdown = document.getElementById('navDropdown');

    function toggleNavDropdown() {
        navDropdown.classList.toggle('show');
    }

    document.addEventListener('click', function(event) {
        if (!event.target.closest('.controls') && !event.target.closest('.nav-dropdown')) {
            navDropdown.classList.remove('show');
        }
    });

    function initQuiz() {
        questionsData.forEach((q, index) => {
            let dot = document.createElement('div');
            dot.className = 'nav-dot';
            dot.id = `nav-${index}`;
            dot.innerText = index + 1;
            dot.onclick = () => {
                jumpToQuestion(index);
                navDropdown.classList.remove('show'); 
            };
            navDropdown.appendChild(dot);

            let card = document.createElement('div');
            card.className = 'question-card';
            card.id = `card-${index}`;
            
            let optionsHtml = q.options.map((opt, optIndex) => `
                <div class="option" id="opt-${index}-${optIndex}" onclick="selectOption(${index}, '${opt}', ${optIndex})">
                    <div style="display:flex; align-items:center;">
                        <strong style="margin-right:15px; color: var(--primary); font-size: 18px; width: 25px;">${String.fromCharCode(65 + optIndex)}.</strong> 
                        <span style="flex-grow: 1;">${opt}</span>
                    </div>
                    <span id="badge-${index}-${optIndex}" style="font-size: 14px; font-weight: 700; padding-left: 10px;"></span>
                </div>
            `).join('');

            card.innerHTML = `
                <div class="q-header">
                    <div class="q-header-left">
                        <div class="q-num">Part 5 Practice</div>
                        <div class="timer-pill" id="card-timer-${index}">⏱ 00:00</div>
                    </div>
                    <div class="q-counter-pill">
                        Câu ${index + 1} / ${questionsData.length}
                    </div>
                </div>
                <div class="q-text">
                    ${index + 101}. ${q.q}
                </div>
                <div class="options">
                    ${optionsHtml}
                </div>
                
                <div class="q-nav-buttons">
                    <button class="btn-nav next" onclick="jumpToQuestion(${index + 1})" ${index === questionsData.length - 1 ? 'disabled' : ''}>Tiếp theo</button>
                </div>

                <div class="explanation-box" id="exp-${index}">
                    <div class="exp-main-title">💡 Giải Thích Chi Tiết</div>
                    
                    <div class="exp-grid">
                        <div class="box box-correct">
                            <div class="box-title">✅ Phân Tích Đáp Án Đúng</div>
                            ${q.exp.correct}
                        </div>
                        
                        <div class="box box-wrong">
                            <div class="box-title">❌ Vì Sao Các Đáp Án Kia Sai?</div>
                            ${q.exp.wrong}
                        </div>
                        
                        <div class="box box-grammar">
                            <div class="box-title">📖 Cấu Trúc / Ngữ Pháp</div>
                            ${q.exp.grammar}
                        </div>

                        <div class="box box-vocab">
                            <div class="box-title">📚 Từ Vựng Cốt Lõi</div>
                            ${q.exp.vocab}
                        </div>
                    </div>
                    
                    <div class="box box-trans">
                        <div class="box-title">🌐 Dịch Nghĩa Toàn Câu:</div>
                        "${q.exp.trans}"
                    </div>
                </div>
            `;
            mainArea.appendChild(card);
        });
    }

    function updateCardTimers(m, s) {
        let timeStr = `⏱ ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        for(let i=0; i<questionsData.length; i++) {
            let tEl = document.getElementById(`card-timer-${i}`);
            if(tEl) tEl.innerText = timeStr;
        }
    }

    function startTest() {
        document.getElementById('setupOverlay').style.display = 'none';
        let minutes = parseInt(document.getElementById('timeInput').value) || 20;
        testDuration = minutes * 60;
        initQuiz();
        jumpToQuestion(0);
        
        timerInterval = setInterval(() => {
            let m = Math.floor(testDuration / 60);
            let s = testDuration % 60;
            // Cập nhật timer trên thẻ hiện tại
            updateCardTimers(m, s);

            if (--testDuration < 0) { 
                clearInterval(timerInterval); 
                executeSubmit(); 
            }
        }, 1000);
    }

    function jumpToQuestion(index) {
        if (index < 0 || index >= questionsData.length) return;
        
        let oldCard = document.getElementById(`card-${currentQIndex}`);
        let oldDot = document.getElementById(`nav-${currentQIndex}`);
        if(oldCard) oldCard.classList.remove('active');
        if(oldDot) oldDot.classList.remove('active');
        
        currentQIndex = index;
        let newCard = document.getElementById(`card-${currentQIndex}`);
        let newDot = document.getElementById(`nav-${currentQIndex}`);
        if(newCard) newCard.classList.add('active');
        if(newDot) newDot.classList.add('active');
        
        mainArea.scrollTo(0, 0);
    }

    function selectOption(qIndex, answer, optIndex) {
        if(isSubmitted) return; 
        
        userAnswers[qIndex] = answer;
        for(let i=0; i<4; i++) {
            document.getElementById(`opt-${qIndex}-${i}`).classList.remove('selected');
        }
        document.getElementById(`opt-${qIndex}-${optIndex}`).classList.add('selected');
        document.getElementById(`nav-${qIndex}`).classList.add('done');
        
        if(qIndex < questionsData.length - 1) {
            setTimeout(() => jumpToQuestion(qIndex + 1), 350);
        }
    }

    function askSubmit() {
        if(isSubmitted) return;
        document.getElementById('confirmOverlay').style.display = 'flex';
    }

    function closeConfirmModal() {
        document.getElementById('confirmOverlay').style.display = 'none';
    }
    
    function closeResultModal() {
        document.getElementById('resultOverlay').style.display = 'none';
        jumpToQuestion(0);
        navDropdown.classList.add('show'); 
    }

    function submitTest() {
        document.getElementById('confirmOverlay').style.display = 'none';
        executeSubmit();
    }

    function executeSubmit() {
        if(isSubmitted) return;
        isSubmitted = true;
        clearInterval(timerInterval);
        document.getElementById("mainSubmitBtn").style.display = 'none';

        let score = 0;
        
        questionsData.forEach((q, index) => {
            let uAns = userAnswers[index];
            let isCorrect = uAns === q.a;
            if(isCorrect) score++;

            let unAnsweredWarning = "";
            if (!uAns) {
                unAnsweredWarning = `<div style="background: #fffbeb; color: #b45309; padding: 12px 18px; border-radius: 8px; margin-bottom: 20px; font-weight: 700; border: 1px solid #fde68a;">⚠️ Bạn đã bỏ trống câu này!</div>`;
            }

            for(let i=0; i<4; i++) {
                let optEl = document.getElementById(`opt-${index}-${i}`);
                let badgeEl = document.getElementById(`badge-${index}-${i}`);
                optEl.classList.add('disabled');
                
                let optText = q.options[i];
                if (optText === q.a) {
                    optEl.classList.add('correct'); 
                    if (optText === uAns) {
                        badgeEl.innerHTML = "✅ Chính xác";
                        badgeEl.style.color = "var(--correct-text)";
                    } else {
                        badgeEl.innerHTML = "👈 Đáp án đúng";
                        badgeEl.style.color = "var(--correct-text)";
                    }
                } else if (optText === uAns) {
                    optEl.classList.add('wrong'); 
                    badgeEl.innerHTML = "❌ Bạn chọn sai";
                    badgeEl.style.color = "var(--wrong-text)";
                }
            }

            let expBox = document.getElementById(`exp-${index}`);
            expBox.classList.add('show');
            if(unAnsweredWarning) {
                expBox.insertAdjacentHTML('afterbegin', unAnsweredWarning);
            }

            let dot = document.getElementById(`nav-${index}`);
            dot.classList.remove('done', 'active');
            if (isCorrect) dot.classList.add('correct');
            else dot.classList.add('wrong');
        });

        document.getElementById('resultMessage').innerHTML = `
            <strong style="font-size: 38px; color: var(--primary); display: block; margin-bottom: 15px;">${score} / ${questionsData.length}</strong>
            <p style="font-size: 16px; color: #64748b; font-weight: 500;">Bạn đã hoàn thành bài kiểm tra!<br>Hãy xem danh sách câu hỏi để đọc phần Giải Thích siêu chi tiết nhé.</p>
        `;
        document.getElementById('resultOverlay').style.display = 'flex';

        // Đồng bộ điểm Firebase
        if (window.luuDiemTOEICLenFirebase) {
            window.luuDiemTOEICLenFirebase(questionsData.length, score, "ETS 2018 - Test 3", "Reading", "Part 5");
        }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlTU4B563sSsTVbLai_je29l6eC8T-cm0",
        authDomain: "snapenglish-cb6e2.firebaseapp.com",
        projectId: "snapenglish-cb6e2",
        storageBucket: "snapenglish-cb6e2.firebasestorage.app",
        messagingSenderId: "373152038413",
        appId: "1:373152038413:web:19284622571390f8585f44"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function showInGameToast(msg) {
        let toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.cssText = "position:fixed; bottom:20px; right:20px; background:#0ea5e9; color:white; padding:15px 20px; border-radius:8px; font-weight:600; font-family:'Be Vietnam Pro',sans-serif; z-index:99999; box-shadow:0 10px 30px rgba(14, 165, 233, 0.3); transform:translateY(100px); opacity:0; transition:all 0.4s ease;";
        document.body.appendChild(toast);
        
        setTimeout(() => { toast.style.transform = "translateY(0)"; toast.style.opacity = "1"; }, 100);
        setTimeout(() => { toast.style.transform = "translateY(100px)"; toast.style.opacity = "0"; }, 3500);
        setTimeout(() => { toast.remove(); }, 4000);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.currentUserUid = user.uid;
            window.currentUserEmail = user.email;
        } else {
            showInGameToast("⚠️ Bạn đang chơi dưới dạng Khách, điểm sẽ không lưu lên kho!");
        }
    });

    function calculateToeicScore(skill, correct, total) {
        let percentage = correct / total;
        let maxScore = (skill === 'Listening' || skill === 'Reading') ? 495 : 200;
        let step = (skill === 'Listening' || skill === 'Reading') ? 5 : 10;
        let estimated = Math.round((percentage * maxScore) / step) * step;
        if (estimated > maxScore) return maxScore;
        if (estimated < 5 && (skill === 'Listening' || skill === 'Reading')) return 5;
        if (estimated < 0) return 0;
        return estimated;
    }

    window.luuDiemTOEICLenFirebase = async function(tongSoCau, soCauDung, tenBai, kyNang, tenPart) {
        if (!window.currentUserUid) return; 

        let diemQuyDoi = calculateToeicScore(kyNang, soCauDung, tongSoCau);
        let thoiGianHienTai = "--";
        let inputPhut = parseInt(document.getElementById('timeInput').value) || 20; 
        let tongThoiGianGoc = inputPhut * 60;

        if (typeof testDuration !== 'undefined') {
            let thoiGianDaLam = tongThoiGianGoc - testDuration;
            if (thoiGianDaLam < 0) thoiGianDaLam = 0; 
            
            let m = Math.floor(thoiGianDaLam / 60);
            let s = thoiGianDaLam % 60;
            thoiGianHienTai = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        let timestamp = Date.now();
        let docId = window.currentUserUid + "_toeic_" + timestamp;
        
        try {
            await setDoc(doc(db, "user_toeic_scores", docId), {
                email: window.currentUserEmail,
                skill: kyNang,
                testName: tenBai,
                partName: tenPart,
                timeTaken: thoiGianHienTai,
                totalQ: tongSoCau,
                correctQ: soCauDung,
                score: diemQuyDoi,
                date: new Date().toLocaleDateString('vi-VN'),
                timestamp: timestamp
            });
            showInGameToast("☁️ Đã đồng bộ điểm số lên Máy Chủ!");
        } catch (error) {
            console.error(error);
        }
    }
</script>
