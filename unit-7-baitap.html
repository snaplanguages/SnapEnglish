<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 7 - Thì Hiện Tại Hoàn Thành</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fffbeb;
            --text-main: #78350f;
            --white: #ffffff;
            --primary: #f59e0b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#fde68a 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* THANH CỐ ĐỊNH NHỎ GỌN */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #fcd34d, #fb923c);
            padding: 10px 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(251, 146, 60, 0.3);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            border: 3px solid #fff;
            border-top: none;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #fff;
            font-size: 1.6em;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #fff;
            font-size: 0.95em;
            font-weight: 700;
            margin-top: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 5px 25px;
            border-radius: 20px;
            font-size: 1.25em;
            font-weight: 800;
            color: #d97706;
            margin-top: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px dashed #fbbf24;
            transition: transform 0.3s ease;
        }

        .score-board:hover {
            transform: scale(1.05);
        }

        .container {
            max-width: 900px;
            margin: 30px auto 0;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.1);
            border-top: 8px solid;
            transition: transform 0.3s ease;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #fff8f1;
            border: 2px dashed;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05em;
        }

        .question-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #fef3c7;
            transition: all 0.3s ease;
        }

        .question-block:hover {
            border-color: #fde68a;
            box-shadow: 0 5px 15px rgba(251, 146, 60, 0.1);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #92400e;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #fffbeb;
            border: 2px solid #fde68a;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: #b45309;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #fbbf24;
            background: #fef3c7;
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            animation: bounce 0.4s ease;
        }

        .option-btn.incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            opacity: 0.9;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.4s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fef2f2;
            color: #991b1b;
            border-left: 5px solid #ef4444;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-to-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #fbbf24;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            background: #f59e0b;
        }

        /* Color Themes for 4 Exercises */
        .color-1 { border-top-color: #fb923c; }
        .color-1 .ex-title { color: #ea580c; }
        .color-1 .tip-box { border-color: #fdba74; color: #c2410c; background: #fff7ed;}

        .color-2 { border-top-color: #fbbf24; }
        .color-2 .ex-title { color: #d97706; }
        .color-2 .tip-box { border-color: #fcd34d; color: #b45309; background: #fffbeb;}

        .color-3 { border-top-color: #f43f5e; }
        .color-3 .ex-title { color: #e11d48; }
        .color-3 .tip-box { border-color: #fda4af; color: #be123c; background: #fff1f2;}

        .color-4 { border-top-color: #10b981; }
        .color-4 .ex-title { color: #059669; }
        .color-4 .tip-box { border-color: #6ee7b7; color: #047857; background: #ecfdf5;}

    </style>
</head>
<body>

    <div class="sticky-header">
        <h1>🌻 Trạm Luyện Tập Grammar 🌻</h1>
        <div class="subtitle">Unit 7: Thì Hiện Tại Hoàn Thành (Present Perfect)</div>
        <div class="score-board">Điểm: <span id="score">0</span> / 45 🌟</div>
    </div>

    <div class="container" id="app">
        </div>

    <a href="unit-7-grammar.html" target="_blank" class="back-to-top" title="Lên đầu trang">⬆️</a>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Chia dạng đúng của động từ",
                tip: "Cấu trúc: Have/Has + V(p2). Dấu hiệu: since, for, already, yet, just, recently, so far, ever, never. Lưu ý động từ bất quy tắc nhé!",
                colorClass: "color-1",
                icon: "🍯",
                questions: [
                    { q: "1. I (study) English for 3 years.", options: ["have studied", "has studied", "studied"], a: "have studied", exp: "Có 'for 3 years'. Ngôi 'I' dùng 'have' + V(ed)." },
                    { q: "2. She (not visit) her grandparents since last month.", options: ["don't visit", "haven't visited", "hasn't visited"], a: "hasn't visited", exp: "Có 'since last month'. Ngôi 'She' (số ít) dùng 'hasn't' + V(ed)." },
                    { q: "3. They (already / finish) their homework.", options: ["have already finished", "already have finished", "has already finished"], a: "have already finished", exp: "Trạng từ 'already' đứng giữa 'have' và V(p2)." },
                    { q: "4. (you / ever / be) to New York?", options: ["Do you ever be", "Have you ever been", "Are you ever been"], a: "Have you ever been", exp: "Câu hỏi có 'ever' (đã từng) -> Đảo 'Have' lên trước chủ ngữ." },
                    { q: "5. He (just / buy) a new car.", options: ["has just buy", "have just bought", "has just bought"], a: "has just bought", exp: "Ngôi 'He' đi với 'has'. V(p2) của buy là 'bought'." },
                    { q: "6. We (know) each other since we were in high school.", options: ["knew", "have known", "has known"], a: "have known", exp: "Có 'since' (kể từ khi). V(p2) của know là 'known'." },
                    { q: "7. My father (work) in this company for 10 years.", options: ["works", "has worked", "have worked"], a: "has worked", exp: "Có 'for 10 years'. 'My father' là số ít -> dùng 'has'." },
                    { q: "8. It is the first time I (eat) this kind of food.", options: ["eat", "have eaten", "ate"], a: "have eaten", exp: "Cấu trúc: It is the first time + S + Have/Has + V(p2) (Đây là lần đầu tiên làm gì)." },
                    { q: "9. (she / see) this movie before?", options: ["Does she see", "Has she seen", "Have she seen"], a: "Has she seen", exp: "Có 'before' cuối câu -> HTHT. Ngôi 'she' mượn 'Has'." },
                    { q: "10. I (never / meet) such a beautiful girl.", options: ["have never met", "am never meeting", "never have met"], a: "have never met", exp: "Trạng từ 'never' đứng giữa 'have' và V(p2) 'met'." },
                    { q: "11. They (live) here since 2010.", options: ["live", "have lived", "has lived"], a: "have lived", exp: "Có 'since + mốc thời gian'. Chủ ngữ 'They' dùng 'have'." },
                    { q: "12. John (lose) his key. He can't get into the house.", options: ["has lost", "lost", "loses"], a: "has lost", exp: "Hành động mất chìa khóa xảy ra ở quá khứ, nhưng kết quả/hậu quả còn lưu lại ở hiện tại (không vào được nhà) -> Dùng HTHT." },
                    { q: "13. How long (you / wait) for me?", options: ["do you wait", "are you waiting", "have you waited"], a: "have you waited", exp: "Hỏi về khoảng thời gian (How long) diễn ra cho tới nay -> HTHT." },
                    { q: "14. We (not receive) any letters from him recently.", options: ["haven't received", "hasn't received", "didn't receive"], a: "haven't received", exp: "Có dấu hiệu 'recently' (gần đây). Chủ ngữ 'We' dùng 'haven't'." },
                    { q: "15. She (be) to Paris twice.", options: ["is", "has been", "was"], a: "has been", exp: "Diễn tả trải nghiệm/ số lần (twice - 2 lần) -> Dùng HTHT." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice (Trắc nghiệm)",
                tip: "Phân biệt kĩ 'Since' (mốc thời gian: since 1990, since yesterday) và 'For' (khoảng thời gian: for 2 months, for a long time) nhé!",
                colorClass: "color-2",
                icon: "🍊",
                questions: [
                    { q: "1. I _______ my homework yet.", options: ["A. haven't finished", "B. didn't finish", "C. hasn't finished"], a: "A. haven't finished", exp: "Có 'yet' ở cuối câu phủ định -> Dùng HTHT. Ngôi 'I' dùng 'haven't'." },
                    { q: "2. _______ you ever eaten sushi?", options: ["A. Did", "B. Have", "C. Has"], a: "B. Have", exp: "Có 'ever' -> HTHT. Ngôi 'you' dùng trợ động từ 'Have'." },
                    { q: "3. They have been married _______ 20 years.", options: ["A. since", "B. for", "C. in"], a: "B. for", exp: "'20 years' là một khoảng thời gian -> Dùng 'for'." },
                    { q: "4. He hasn't seen her _______ they graduated.", options: ["A. since", "B. for", "C. when"], a: "A. since", exp: "Sau chỗ trống là một mệnh đề chia quá khứ đơn (they graduated) -> Đây là một mốc thời gian -> Dùng 'since'." },
                    { q: "5. We have _______ seen that movie.", options: ["A. already", "B. yet", "C. ever"], a: "A. already", exp: "Câu khẳng định, vị trí đứng giữa 'have' và V(p2) -> Dùng 'already' (rồi)." },
                    { q: "6. Have you finished the report _______?", options: ["A. already", "B. yet", "C. just"], a: "B. yet", exp: "Câu hỏi nghi vấn, từ đứng ở cuối câu -> Dùng 'yet' (chưa)." },
                    { q: "7. She _______ out. She will be back soon.", options: ["A. has just gone", "B. just went", "C. have just gone"], a: "A. has just gone", exp: "Vừa mới đi ra ngoài (hậu quả: cô ấy không có ở đây) -> HTHT với 'just'. Chủ ngữ She -> has just gone." },
                    { q: "8. This is the most interesting book I _______.", options: ["A. ever read", "B. have ever read", "C. have never read"], a: "B. have ever read", exp: "Đi sau cấu trúc so sánh hơn nhất (the most interesting) ta luôn dùng HTHT với 'ever'." },
                    { q: "9. My parents _______ to London many times.", options: ["A. have been", "B. went", "C. has been"], a: "A. have been", exp: "Nhấn mạnh số lần trải nghiệm (many times) -> HTHT. 'My parents' là số nhiều -> have been." },
                    { q: "10. I _______ her recently.", options: ["A. didn't see", "B. haven't seen", "C. hasn't seen"], a: "B. haven't seen", exp: "Có 'recently' (dạo gần đây) -> HTHT. Phủ định với 'I' là 'haven't'." }
                ]
            },
            {
                title: "Exercise 3: Chọn câu đồng nghĩa / Dịch đúng",
                tip: "Đây là dạng bài viết lại câu cực kỳ quan trọng trong các bài thi. Chú ý sự chuyển đổi: Started/Began + V-ing -> Have/Has + V(p2).",
                colorClass: "color-3",
                icon: "🍓",
                questions: [
                    { q: "1. 'Tôi đã làm việc ở đây được 5 năm.'", options: ["A. I have worked here for 5 years.", "B. I have worked here since 5 years."], a: "A. I have worked here for 5 years.", exp: "'5 năm' là khoảng thời gian -> Dùng 'for'." },
                    { q: "2. 'Cô ấy chưa bao giờ đến London.'", options: ["A. She has ever been to London.", "B. She has never been to London."], a: "B. She has never been to London.", exp: "'Chưa bao giờ' -> never (mang sẵn nghĩa phủ định, không cần thêm not)." },
                    { q: "3. 'Chúng tôi vừa mới hoàn thành bài tập.'", options: ["A. We have just finished the homework.", "B. We have finished the homework yet."], a: "A. We have just finished the homework.", exp: "'Vừa mới' -> just (đứng giữa have và V-p2)." },
                    { q: "4. 'Đây là lần đầu tiên tôi ăn món này.'", options: ["A. This is the first time I have eaten this food.", "B. This is the first time I ate this food."], a: "A. This is the first time I have eaten this food.", exp: "Cấu trúc: 'This is the first time + S + HTHT'." },
                    { q: "5. 'Bạn đã từng gặp cô ấy bao giờ chưa?'", options: ["A. Have you ever met her?", "B. Do you ever meet her?"], a: "A. Have you ever met her?", exp: "Hỏi về trải nghiệm 'đã từng... chưa' dùng HTHT với 'ever'." },
                    { q: "6. 'Anh ấy đã không gọi cho tôi từ tuần trước.'", options: ["A. He hasn't called me for last week.", "B. He hasn't called me since last week."], a: "B. He hasn't called me since last week.", exp: "'Tuần trước' (last week) là một mốc thời gian -> Dùng 'since'." },
                    { q: "7. 'Họ đã sống ở đây kể từ năm 2010.'", options: ["A. They have lived here since 2010.", "B. They have lived here for 2010."], a: "A. They have lived here since 2010.", exp: "'Năm 2010' là mốc thời gian -> Dùng 'since'." },
                    { q: "8. 'Tôi vẫn chưa tìm thấy chìa khóa.'", options: ["A. I haven't found the key already.", "B. I haven't found the key yet."], a: "B. I haven't found the key yet.", exp: "'Chưa' trong câu phủ định dùng 'yet' ở cuối câu." },
                    { q: "9. 'Cô ấy đã đi Paris (và hiện tại chưa về).' (have gone to vs have been to)", options: ["A. She has gone to Paris.", "B. She has been to Paris."], a: "A. She has gone to Paris.", exp: "'Have/has gone to' nghĩa là đã đi đến đó và hiện vẫn đang ở đó (chưa về)." },
                    { q: "10. 'Anh ấy đã mua chiếc xe này được 2 tháng rồi.'", options: ["A. He has had this car for 2 months.", "B. He has bought this car for 2 months."], a: "A. He has had this car for 2 months.", exp: "'Buy' (mua) là hành động chớp nhoáng, không thể kéo dài 'for 2 months'. Phải đổi thành trạng thái sở hữu 'have' -> has had." }
                ]
            },
            {
                title: "Exercise 4: Hiện Tại Hoàn Thành hay Quá Khứ Đơn?",
                tip: "Hiện tại hoàn thành: Kết quả còn lưu tới HIỆN TẠI (for, since, recently). Quá khứ đơn: Hành động đã CHẤM DỨT hoàn toàn trong quá khứ (yesterday, last week, in 2010).",
                colorClass: "color-4",
                icon: "🍀",
                questions: [
                    { q: "1. I (see) that movie last night.", options: ["A. saw", "B. have seen"], a: "A. saw", exp: "Có 'last night' (tối qua) là mốc thời gian đã qua -> Quá khứ đơn." },
                    { q: "2. We (know) each other for 10 years.", options: ["A. knew", "B. have known"], a: "B. have known", exp: "Có 'for 10 years' (được 10 năm nay) -> HT Hoàn thành." },
                    { q: "3. She (go) to the supermarket an hour ago.", options: ["A. went", "B. has gone"], a: "A. went", exp: "Có 'ago' (cách đây) -> Quá khứ đơn." },
                    { q: "4. They (not play) tennis since last month.", options: ["A. didn't play", "B. haven't played"], a: "B. haven't played", exp: "Có 'since' -> HT Hoàn thành." },
                    { q: "5. (you / visit) your grandparents last weekend?", options: ["A. Did you visit", "B. Have you visited"], a: "A. Did you visit", exp: "Có 'last weekend' -> Quá khứ đơn. Mượn trợ động từ 'Did'." },
                    { q: "6. I (just / finish) reading the book.", options: ["A. just finished", "B. have just finished"], a: "B. have just finished", exp: "Có 'just' (vừa mới) diễn tả hành động mới xảy ra -> HT Hoàn thành." },
                    { q: "7. He (start) his new job in 2020.", options: ["A. started", "B. has started"], a: "A. started", exp: "Có 'in 2020' (vào năm 2020) là một thời điểm cụ thể đã qua -> Quá khứ đơn." },
                    { q: "8. I (never / be) to Australia.", options: ["A. was never", "B. have never been"], a: "B. have never been", exp: "Có 'never' trải nghiệm từ trước tới nay -> HT Hoàn thành." },
                    { q: "9. Tom (buy) a new house two days ago.", options: ["A. bought", "B. has bought"], a: "A. bought", exp: "Có 'two days ago' (2 ngày trước) -> Quá khứ đơn." },
                    { q: "10. How long (she / live) in this city?", options: ["A. did she live", "B. has she lived"], a: "B. has she lived", exp: "Hỏi 'How long' để biết khoảng thời gian cho tới tận bây giờ -> HT Hoàn thành." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo xịn:</strong> ${ex.tip}</span>
                </div>
            `;

            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Rất giỏi!</strong> <br> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${qObj.a}.</strong> <br> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
