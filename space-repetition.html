<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEnglish | Advanced Spaced Repetition</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* THEME: Mint & Peach Pastel */
        :root {
            --primary: #10B981;       
            --primary-hover: #059669;
            --accent: #F472B6;        
            --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-dark: #0F172A;
            --text-light: #475569;
            --white: #FFFFFF;
            --success: #10B981;
            --error: #EF4444;
            
            --lvl-new: #94A3B8;
            --lvl-short: #FBBF24;
            --lvl-long: #F472B6;
            --lvl-mem: #8B5CF6;
            --lvl-master: #10B981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        cite { display: none !important; }

        body {
            background: var(--bg-gradient);
            color: var(--text-dark);
            min-height: 100vh;
            width: 100vw;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            border-radius: 24px;
        }

        .header-brand {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-radius: 0; 
            border-top: none; 
            border-left: none; 
            border-right: none;
        }

        .brand-logo { font-size: 28px; font-weight: 800; color: var(--primary); }
        .sync-status { display: flex; align-items: center; gap: 8px; font-weight: 600; background: var(--white); padding: 8px 16px; border-radius: 20px;}
        .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); }

        .container {
            width: 100%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        .view-section {
            width: 100%;
            display: none;
            animation: fadeIn 0.4s ease-out forwards;
        }
        .view-section.active { display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* STUDY LAYOUT */
        .study-layout { display: flex; gap: 30px; width: 100%; }
        .sidebar { flex: 1; min-width: 300px; padding: 30px; display: flex; flex-direction: column; gap: 20px; max-height: calc(100vh - 120px); overflow-y: auto;}
        .main-card { flex: 3; padding: 40px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 500px; text-align: center; position: relative;}

        /* STATS & PROGRESS CIRCLES */
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px;}
        .stat-item { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--text-light); text-align: center;}
        .circle-badge { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: 800; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        
        .bg-new { background: var(--lvl-new); }
        .bg-short { background: var(--lvl-short); }
        .bg-long { background: var(--lvl-long); }
        .bg-mem { background: var(--lvl-mem); }
        .bg-master { background: var(--lvl-master); }

        /* SEARCH BAR */
        .search-box { width: 100%; position: relative; }
        .search-input { width: 100%; padding: 12px 20px; border-radius: 12px; border: 2px solid transparent; outline: none; background: rgba(255,255,255,0.8); font-weight: 600;}
        .search-input:focus { border-color: var(--primary); }
        .search-results { position: absolute; top: 100%; left: 0; width: 100%; background: white; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); z-index: 10; max-height: 200px; overflow-y: auto; display: none;}
        .search-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid #eee; text-align: left; font-weight: 600;}
        .search-item:hover { background: var(--bg-gradient); }

        /* STUDY UI ELEMENTS */
        .step-indicators { display: flex; gap: 8px; position: absolute; top: 30px; left: 30px; }
        .step-dot { width: 35px; height: 35px; border-radius: 50%; background: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 18px; filter: grayscale(100%); opacity: 0.5; transition: 0.3s;}
        .step-dot.active { filter: grayscale(0%); opacity: 1; background: var(--white); box-shadow: 0 4px 10px rgba(0,0,0,0.1); transform: scale(1.1);}

        .card-type-badge { background: var(--primary); color: white; padding: 6px 16px; border-radius: 20px; font-weight: 700; font-size: 14px; margin-bottom: 20px; display: inline-block;}
        
        .prompt-container { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .prompt-text { font-size: 32px; font-weight: 800; color: var(--text-dark); line-height: 1.4; }
        .btn-audio { background: var(--glass-bg); border: none; font-size: 24px; cursor: pointer; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-audio:hover { background: white; transform: scale(1.1); }
        
        .sub-prompt { font-size: 18px; color: var(--text-light); font-weight: 600; margin-bottom: 30px; }
        
        .answer-input { width: 80%; max-width: 500px; padding: 18px 25px; border-radius: 50px; border: 2px solid transparent; background: rgba(255,255,255,0.9); font-size: 22px; text-align: center; outline: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .answer-input:focus { border-color: var(--primary); }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 800px; }
        .option-btn { background: rgba(255,255,255,0.9); border: 2px solid transparent; padding: 18px 20px; border-radius: 15px; font-size: 18px; font-weight: 600; color: var(--text-dark); cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .option-btn:hover { transform: translateY(-2px); border-color: var(--primary); }
        
        .tf-grid { display: flex; gap: 20px; justify-content: center; margin-top: 20px;}
        .tf-btn { padding: 15px 40px; font-size: 20px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; color: white; transition: 0.2s;}
        .tf-true { background: var(--success); }
        .tf-false { background: var(--error); }
        .tf-btn:hover { transform: scale(1.05); opacity: 0.9;}

        .btn-primary { background: var(--primary); color: white; padding: 14px 32px; border-radius: 50px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .feedback-message { margin-top: 25px; font-size: 20px; font-weight: 700; min-height: 30px; }
        .correct { color: var(--success); }
        .wrong { color: var(--error); }
        .hidden { display: none !important; }

        /* CUSTOM MODALS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: white; padding: 40px; border-radius: 24px; text-align: center; max-width: 450px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); animation: popIn 0.3s ease-out;}
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .word-detail-box { text-align: left; background: #F8FAFC; padding: 20px; border-radius: 15px; margin: 20px 0; }
        .btn-danger { background: var(--error); color: white; padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }

        /* Flashcard Component */
        .flashcard-inner { width: 100%; max-width: 500px; height: 300px; perspective: 1000px; cursor: pointer; margin: 0 auto;}
        .flashcard-content { width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; position: relative;}
        .flashcard-inner.flipped .flashcard-content { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px;}
        .card-back { transform: rotateY(180deg); background: var(--bg-gradient);}
    </style>
</head>
<body>

    <header class="header-brand glass-panel">
        <div class="brand-logo">SnapEnglish</div>
        <div class="sync-status">
            <div class="sync-dot" id="sync-dot"></div>
            <span id="sync-text">Connecting...</span>
        </div>
    </header>

    <div class="modal-overlay" id="alert-modal">
        <div class="modal-box">
            <h2 style="color: var(--primary); margin-bottom: 15px;" id="alert-title">Notification</h2>
            <p style="font-size: 18px; color: var(--text-light); margin-bottom: 25px;" id="alert-msg"></p>
            <button class="btn-primary" onclick="closeModal('alert-modal')">Got it!</button>
        </div>
    </div>

    <div class="modal-overlay" id="word-detail-modal">
        <div class="modal-box" style="max-width: 500px;">
            <h2 style="color: var(--text-dark);" id="detail-word">Word</h2>
            <div class="word-detail-box">
                <p><strong>Pronunciation:</strong> <span id="detail-pron"></span></p>
                <p><strong>POS:</strong> <span id="detail-pos"></span></p>
                <p><strong>Definition:</strong> <span id="detail-def"></span></p>
                <p><strong>Example:</strong> <span id="detail-ex"></span></p>
            </div>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <button class="btn-primary" onclick="closeModal('word-detail-modal')" style="background: var(--text-light);">Close</button>
                <button class="btn-danger" onclick="deleteCurrentWord()">Delete Word</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="study-view" class="view-section active">
            <div class="study-layout">
                
                <div class="sidebar glass-panel">
                    <div class="search-box">
                        <input type="text" class="search-input" id="search-bar" placeholder="Search learned words..." oninput="filterWords()">
                        <div class="search-results" id="search-results"></div>
                    </div>

                    <hr style="border: 1px dashed var(--glass-border); margin: 5px 0;">

                    <div style="text-align: center;">
                        <h3 style="color: var(--text-dark); margin-bottom: 5px;">Total Words Learned</h3>
                        <div style="font-size: 42px; font-weight: 800; color: var(--primary);" id="total-words">0</div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="circle-badge bg-new" id="stat-new">0</div>
                            <span>New</span>
                        </div>
                        <div class="stat-item">
                            <div class="circle-badge bg-short" id="stat-short">0</div>
                            <span>Short</span>
                        </div>
                        <div class="stat-item">
                            <div class="circle-badge bg-long" id="stat-long">0</div>
                            <span>Long</span>
                        </div>
                        <div class="stat-item">
                            <div class="circle-badge bg-mem" id="stat-mem">0</div>
                            <span>Mem.</span>
                        </div>
                        <div class="stat-item">
                            <div class="circle-badge bg-master" id="stat-master">0</div>
                            <span>Master</span>
                        </div>
                    </div>

                    <button class="btn-primary" style="width: 100%; margin-top: 20px; background: white; color: var(--primary);" onclick="triggerDummyImport()">+ Load Sample Words</button>
                </div>

                <div class="main-card glass-panel">
                    
                    <div class="step-indicators hidden" id="step-trackers">
                        <div class="step-dot" id="dot-0">🐻</div>
                        <div class="step-dot" id="dot-1">🐻</div>
                        <div class="step-dot" id="dot-2">🐻</div>
                        <div class="step-dot" id="dot-3">🐻</div>
                        <div class="step-dot" id="dot-4">🐻</div>
                    </div>

                    <div id="completion-message" class="hidden">
                        <h2 style="color: var(--success); font-size: 32px; margin-bottom: 15px;">🎉 You're All Caught Up!</h2>
                        <p style="font-size: 18px; color: var(--text-light);">Excellent work. Check back later for your next reviews.</p>
                    </div>

                    <div id="active-card" class="hidden" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                        <div class="card-type-badge" id="exercise-badge">Exercise Type</div>
                        
                        <div class="prompt-container">
                            <div class="prompt-text" id="prompt-main">Loading...</div>
                            <button class="btn-audio hidden" id="audio-btn" onclick="playCurrentWordAudio()">🔊</button>
                        </div>
                        <div class="sub-prompt" id="prompt-sub"></div>

                        <div id="ui-flashcard" class="flashcard-inner hidden" onclick="this.classList.toggle('flipped'); document.getElementById('fc-next').classList.remove('hidden');">
                            <div class="flashcard-content">
                                <div class="card-face">
                                    <h1 style="font-size: 40px; color: var(--primary);" id="fc-word">Word</h1>
                                    <p style="color: #888; font-size: 20px; margin-top: 10px;" id="fc-pron"></p>
                                </div>
                                <div class="card-face card-back">
                                    <h3 style="color: var(--text-dark); margin-bottom: 10px;">Definition</h3>
                                    <p style="font-size: 22px; font-weight: 600;" id="fc-def"></p>
                                </div>
                            </div>
                        </div>
                        <button class="btn-primary hidden" id="fc-next" style="margin-top: 30px;" onclick="handleStepAnswer(true)">I got it ➔</button>

                        <div id="ui-type" class="hidden" style="width: 100%; text-align: center;">
                            <input type="text" class="answer-input" id="type-input" placeholder="Type here and press Enter" autocomplete="off">
                        </div>

                        <div id="ui-mc" class="hidden options-grid" id="mc-container"></div>

                        <div id="ui-tf" class="hidden tf-grid">
                            <button class="tf-btn tf-true" onclick="handleTFAnswer(true)">TRUE</button>
                            <button class="tf-btn tf-false" onclick="handleTFAnswer(false)">FALSE</button>
                        </div>

                        <div class="feedback-message" id="feedback-msg"></div>
                        <button class="btn-primary hidden" id="next-btn" style="margin-top: 20px;" onclick="loadNextExercise()">Next ➔</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // --- FIREBASE SETUP ---
        const firebaseConfig = { apiKey: "AIzaSyBlTU4B563sSsTVbLai_je29l6eC8T-cm0", authDomain: "snapenglish-cb6e2.firebaseapp.com", projectId: "snapenglish-cb6e2" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- SRS LOGIC ---
        const INTERVALS = [0, 1000*60*60, 1000*60*60*12, 1000*60*60*24, 1000*60*60*24*3, 1000*60*60*24*7, 1000*60*60*24*30, 1000*60*60*24*365];
        
        window.deck = [];
        window.activePool = []; 
        window.currentCard = null;
        window.hasNotifiedDue = false;
        window.currentTfCorrect = true;

        // --- TEXT TO SPEECH (TTS) SETUP ---
        const synth = window.speechSynthesis;
        let engVoice = null;
        
        const loadVoices = () => {
            let voices = synth.getVoices();
            engVoice = voices.find(v => v.lang.includes('en-US') && (v.name.includes('Google') || v.name.includes('Natural'))) || voices.find(v => v.lang.startsWith('en'));
        };
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        window.playCurrentWordAudio = () => {
            if (!window.currentCard) return;
            if (synth.speaking) synth.cancel();
            const utterThis = new SpeechSynthesisUtterance(window.currentCard.word);
            utterThis.lang = 'en-US';
            utterThis.rate = 0.9; // Slightly slower for better dictation clarity
            if (engVoice) utterThis.voice = engVoice;
            synth.speak(utterThis);
        };

        onAuthStateChanged(auth, (user) => {
            const syncText = document.getElementById("sync-text");
            const syncDot = document.getElementById("sync-dot");
            if (user) {
                window.currentUserUid = user.uid;
                syncText.innerText = "Synced Real-time";
                syncDot.style.backgroundColor = "var(--success)";
                onSnapshot(doc(db, "userProgress", user.uid), (docSnap) => {
                    if (docSnap.exists() && docSnap.data().srsDeck) {
                        window.deck = docSnap.data().srsDeck;
                        initStudySession();
                    }
                });
            } else {
                syncText.innerText = "Local Mode";
                syncDot.style.backgroundColor = "var(--accent)";
                const localData = localStorage.getItem("snap_srs_deck");
                if (localData) window.deck = JSON.parse(localData);
                initStudySession();
            }
        });

        window.saveData = async () => {
            if (window.currentUserUid) {
                await setDoc(doc(db, "userProgress", window.currentUserUid), { srsDeck: window.deck }, { merge: true });
            } else {
                localStorage.setItem("snap_srs_deck", JSON.stringify(window.deck));
            }
            renderStats();
        };

        // --- UI UTILS ---
        window.showCustomAlert = (title, msg) => {
            document.getElementById("alert-title").innerText = title;
            document.getElementById("alert-msg").innerText = msg;
            document.getElementById("alert-modal").style.display = "flex";
        };
        window.closeModal = (id) => document.getElementById(id).style.display = "none";

        window.renderStats = () => {
            document.getElementById("total-words").innerText = window.deck.length;
            let counts = { new:0, short:0, long:0, mem:0, master:0 };
            window.deck.forEach(c => {
                if(c.level === 0) counts.new++;
                else if(c.level <= 2) counts.short++;
                else if(c.level <= 4) counts.long++;
                else if(c.level <= 6) counts.mem++;
                else counts.master++;
            });
            document.getElementById("stat-new").innerText = counts.new;
            document.getElementById("stat-short").innerText = counts.short;
            document.getElementById("stat-long").innerText = counts.long;
            document.getElementById("stat-mem").innerText = counts.mem;
            document.getElementById("stat-master").innerText = counts.master;
        };

        // --- SEARCH & DELETE ---
        window.filterWords = () => {
            const query = document.getElementById("search-bar").value.toLowerCase();
            const resBox = document.getElementById("search-results");
            resBox.innerHTML = "";
            if(!query) { resBox.style.display = "none"; return; }
            
            const results = window.deck.filter(c => c.word.toLowerCase().includes(query)).slice(0, 5);
            if(results.length === 0) { resBox.style.display = "none"; return; }

            results.forEach(c => {
                let div = document.createElement("div");
                div.className = "search-item";
                div.innerText = c.word;
                div.onclick = () => showWordDetail(c);
                resBox.appendChild(div);
            });
            resBox.style.display = "block";
        };

        window.showWordDetail = (card) => {
            window.wordToDelete = card.id;
            document.getElementById("detail-word").innerText = card.word;
            document.getElementById("detail-pron").innerText = card.pronunciation;
            document.getElementById("detail-pos").innerText = card.pos;
            document.getElementById("detail-def").innerText = card.definition;
            document.getElementById("detail-ex").innerText = card.example;
            document.getElementById("word-detail-modal").style.display = "flex";
            document.getElementById("search-results").style.display = "none";
            document.getElementById("search-bar").value = "";
        };

        window.deleteCurrentWord = () => {
            if(confirm("Are you sure you want to delete this word from your learning history?")) {
                window.deck = window.deck.filter(c => c.id !== window.wordToDelete);
                window.activePool = window.activePool.filter(c => c.id !== window.wordToDelete);
                saveData();
                closeModal('word-detail-modal');
                showCustomAlert("Deleted", "Word has been removed from your deck.");
                initStudySession();
            }
        };

        // --- CORE STUDY LOOP ---
        window.initStudySession = () => {
            renderStats();
            loadVoices(); // Ensure voices are loaded
            
            if (window.activePool.length === 0) {
                const now = Date.now();
                let dueQueue = window.deck.filter(c => c.nextReview <= now);
                
                if(dueQueue.length > 0 && !window.hasNotifiedDue) {
                    showCustomAlert("Review Time!", `You have ${dueQueue.length} words ready for review/learning.`);
                    window.hasNotifiedDue = true;
                }

                dueQueue.sort(() => Math.random() - 0.5);
                window.activePool = dueQueue.slice(0, 5).map(c => ({...c, currentStep: 0}));
            }

            if(window.activePool.length === 0) {
                document.getElementById("active-card").classList.add("hidden");
                document.getElementById("step-trackers").classList.add("hidden");
                document.getElementById("completion-message").classList.remove("hidden");
            } else {
                document.getElementById("active-card").classList.remove("hidden");
                document.getElementById("step-trackers").classList.remove("hidden");
                document.getElementById("completion-message").classList.add("hidden");
                loadNextExercise();
            }
        };

        window.loadNextExercise = () => {
            if(window.activePool.length === 0) return initStudySession();

            const poolIndex = Math.floor(Math.random() * window.activePool.length);
            window.currentCard = window.activePool[poolIndex];

            updateStepUI(window.currentCard.currentStep);
            hideAllUIs();
            document.getElementById("feedback-msg").innerHTML = "";
            document.getElementById("next-btn").classList.add("hidden");
            document.getElementById("audio-btn").classList.remove("hidden");

            const step = window.currentCard.currentStep;
            const isNew = window.currentCard.level === 0;

            if(step === 0) {
                if(isNew) renderFlashcard(); else renderMCDef();
            } else if (step === 1) {
                renderTypeDef();
            } else if (step === 2) {
                renderMCEx();
            } else if (step === 3) {
                renderTF();
            } else if (step === 4) {
                renderTypePron();
            }
        };

        const updateStepUI = (step) => {
            for(let i=0; i<5; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(i <= step) dot.classList.add('active'); else dot.classList.remove('active');
            }
        };

        const hideAllUIs = () => {
            document.getElementById("ui-flashcard").classList.add("hidden");
            document.getElementById("ui-type").classList.add("hidden");
            document.getElementById("ui-mc").classList.add("hidden");
            document.getElementById("ui-tf").classList.add("hidden");
            document.getElementById("fc-next").classList.add("hidden");
            document.getElementById("ui-flashcard").classList.remove("flipped");
            document.getElementById("audio-btn").classList.add("hidden");
        };

        // --- STEP RENDERERS ---
        const renderFlashcard = () => {
            document.getElementById("exercise-badge").innerText = "Step 1: Introduction";
            document.getElementById("prompt-main").innerText = "Review the Flashcard";
            document.getElementById("prompt-sub").innerText = "Tap to flip";
            document.getElementById("audio-btn").classList.remove("hidden");
            
            document.getElementById("ui-flashcard").classList.remove("hidden");
            document.getElementById("fc-word").innerText = window.currentCard.word;
            document.getElementById("fc-pron").innerText = window.currentCard.pronunciation;
            document.getElementById("fc-def").innerText = window.currentCard.definition;

            // Auto-play TTS
            setTimeout(playCurrentWordAudio, 300);
        };

        const renderMCDef = () => {
            document.getElementById("exercise-badge").innerText = "Step 1: Meaning";
            document.getElementById("prompt-main").innerText = window.currentCard.word;
            document.getElementById("prompt-sub").innerText = `[${window.currentCard.pos}] Choose the correct definition`;
            document.getElementById("audio-btn").classList.remove("hidden");
            
            let options = [window.currentCard.definition];
            let distractors = window.deck.filter(c => c.word !== window.currentCard.word).map(c=>c.definition);
            distractors.sort(() => Math.random() - 0.5);
            options.push(...distractors.slice(0, 3));
            options.sort(() => Math.random() - 0.5);

            const mcUI = document.getElementById("ui-mc");
            mcUI.innerHTML = "";
            options.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => handleStepAnswer(opt === window.currentCard.definition, btn);
                mcUI.appendChild(btn);
            });
            mcUI.classList.remove("hidden");
            
            // Auto-play TTS
            setTimeout(playCurrentWordAudio, 300);
        };

        const renderTypeDef = () => {
            document.getElementById("exercise-badge").innerText = "Step 2: Recall";
            document.getElementById("prompt-main").innerText = window.currentCard.definition;
            document.getElementById("prompt-sub").innerText = "Type the word for this definition";
            // No auto-play here, and hide audio button to avoid revealing the answer
            document.getElementById("audio-btn").classList.add("hidden");

            const typeInput = document.getElementById("type-input");
            typeInput.value = "";
            typeInput.disabled = false;
            document.getElementById("ui-type").classList.remove("hidden");
            setTimeout(() => typeInput.focus(), 100);
            
            typeInput.onkeypress = (e) => {
                if(e.key === "Enter" && !typeInput.disabled) {
                    const val = typeInput.value.trim().toLowerCase();
                    handleStepAnswer(val === window.currentCard.word.toLowerCase());
                }
            };
        };

        const renderMCEx = () => {
            document.getElementById("exercise-badge").innerText = "Step 3: Context";
            const regex = new RegExp(`\\b${window.currentCard.word}\\b`, 'gi');
            let blanked = window.currentCard.example ? window.currentCard.example.replace(regex, "_________") : "I want to _________ this word.";
            document.getElementById("prompt-main").innerHTML = blanked;
            document.getElementById("prompt-sub").innerText = "Fill in the blank";
            // No auto-play here
            document.getElementById("audio-btn").classList.add("hidden");
            
            let options = [window.currentCard.word];
            let distractors = window.deck.filter(c => c.word !== window.currentCard.word).map(c=>c.word);
            distractors.sort(() => Math.random() - 0.5);
            options.push(...distractors.slice(0, 3));
            options.sort(() => Math.random() - 0.5);

            const mcUI = document.getElementById("ui-mc");
            mcUI.innerHTML = "";
            options.forEach(opt => {
                let btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => handleStepAnswer(opt === window.currentCard.word, btn);
                mcUI.appendChild(btn);
            });
            mcUI.classList.remove("hidden");
        };

        const renderTF = () => {
            document.getElementById("exercise-badge").innerText = "Step 4: Verification";
            document.getElementById("prompt-sub").innerText = "Does this definition match the word?";
            document.getElementById("audio-btn").classList.remove("hidden");
            
            window.currentTfCorrect = Math.random() > 0.5;
            let showDef = window.currentCard.definition;
            
            if(!window.currentTfCorrect && window.deck.length > 1) {
                let distractors = window.deck.filter(c => c.word !== window.currentCard.word);
                showDef = distractors[Math.floor(Math.random() * distractors.length)].definition;
            }

            document.getElementById("prompt-main").innerHTML = `<span style="color:var(--primary)">${window.currentCard.word}</span> <br><span style="font-size:24px; font-weight:600;">= ${showDef}</span>`;
            document.getElementById("ui-tf").classList.remove("hidden");

            // Auto-play TTS
            setTimeout(playCurrentWordAudio, 300);
        };

        window.handleTFAnswer = (userChoice) => {
            handleStepAnswer(userChoice === window.currentTfCorrect);
            document.querySelectorAll(".tf-btn").forEach(b => b.disabled = true);
        };

        const renderTypePron = () => {
            document.getElementById("exercise-badge").innerText = "Step 5: Mastery";
            document.getElementById("prompt-main").innerText = window.currentCard.pronunciation || "[Listen carefully]";
            document.getElementById("prompt-sub").innerText = "Type the word based on its pronunciation";
            document.getElementById("audio-btn").classList.remove("hidden");

            const typeInput = document.getElementById("type-input");
            typeInput.value = "";
            typeInput.disabled = false;
            document.getElementById("ui-type").classList.remove("hidden");
            setTimeout(() => typeInput.focus(), 100);
            
            typeInput.onkeypress = (e) => {
                if(e.key === "Enter" && !typeInput.disabled) {
                    const val = typeInput.value.trim().toLowerCase();
                    handleStepAnswer(val === window.currentCard.word.toLowerCase());
                }
            };

            // Auto-play TTS for dictation
            setTimeout(playCurrentWordAudio, 300);
        };

        // --- VERIFICATION & ADVANCEMENT ---
        window.handleStepAnswer = (isCorrect, btnElement = null) => {
            const msg = document.getElementById("feedback-msg");
            document.getElementById("next-btn").classList.remove("hidden");
            document.getElementById("type-input").disabled = true;

            // Make audio button visible on answer reveal so they can listen to correct word
            document.getElementById("audio-btn").classList.remove("hidden");

            if (btnElement) {
                document.querySelectorAll(".option-btn").forEach(b => {
                    b.disabled = true;
                    if(b.innerText === window.currentCard.word || b.innerText === window.currentCard.definition) b.style.borderColor = "var(--success)";
                });
                if(!isCorrect) btnElement.style.borderColor = "var(--error)";
            }

            if (isCorrect) {
                msg.innerHTML = `<span class="correct">Excellent!</span>`;
                window.currentCard.currentStep++;
            } else {
                msg.innerHTML = `<span class="wrong">Incorrect.</span> The answer is <strong>${window.currentCard.word}</strong>.`;
                window.currentCard.currentStep = 0; 
            }

            if (window.currentCard.currentStep >= 5) {
                msg.innerHTML += ` <br><span style="color:var(--primary); font-size:16px;">Word complete! Advancing to next SRS level.</span>`;
                
                let deckCard = window.deck.find(c => c.id === window.currentCard.id);
                if(isCorrect) {
                    deckCard.level = Math.min(deckCard.level + 1, INTERVALS.length - 1);
                } else {
                    deckCard.level = 0;
                }
                deckCard.nextReview = Date.now() + INTERVALS[deckCard.level];
                
                window.activePool = window.activePool.filter(c => c.id !== window.currentCard.id);
                saveData();
            }
        };

        document.addEventListener("keydown", (e) => {
            const nextBtn = document.getElementById("next-btn");
            if (e.key === "Enter" && !nextBtn.classList.contains("hidden")) {
                loadNextExercise();
            }
        });

        // --- DUMMY DATA FOR TESTING ---
        window.triggerDummyImport = () => {
            const dummy = [
                {id:"1", word:"abandon", pron:"/əˈbændən/", pos:"verb", def:"to leave a place, thing, or person forever", ex:"We had to abandon the car.", level:0, nextReview:Date.now()},
                {id:"2", word:"crucial", pron:"/ˈkruː.ʃəl/", pos:"adj", def:"extremely important or necessary", ex:"Her work has been crucial to the project's success.", level:0, nextReview:Date.now()},
                {id:"3", word:"dilemma", pron:"/daɪˈlem.ə/", pos:"noun", def:"a situation in which a difficult choice has to be made", ex:"The president is clearly in a dilemma about how to tackle the crisis.", level:0, nextReview:Date.now()}
            ];
            dummy.forEach(d => {
                if(!window.deck.find(c => c.word === d.word)) window.deck.push(d);
            });
            saveData();
            initStudySession();
        };
    </script>
</body>
</html>
