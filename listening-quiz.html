<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Listening | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Bảng màu SnapEnglish Pastel */
            --primary: #a29bfe;      /* Tím */
            --primary-dark: #6c5ce7;
            --accent-green: #55efc4; /* Xanh mint */
            --accent-orange: #e7a87c;/* Cam đất */
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #f4f2ff 100%);
            --text-dark: #2d3436;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 8px 32px 0 rgba(162, 155, 254, 0.15);
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            margin: 0;
            padding: 50px 20px;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Background Shapes --- */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape-1 { width: 350px; height: 350px; background: var(--accent-green); top: -50px; left: -100px; }
        .shape-2 { width: 400px; height: 400px; background: var(--primary); bottom: -100px; right: -50px; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.05); }
        }

        /* --- Header Section --- */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            font-family: 'Quicksand', sans-serif;
            font-size: 38px; 
            margin-bottom: 10px;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        h1 img { width: 45px; height: auto; border-radius: 12px; }
        .brand-name { color: var(--accent-orange); font-weight: 700; }

        .subtitle {
            color: #636e72;
            font-size: 16px;
            max-width: 650px;
            margin: 0 auto;
        }

        /* --- Search Bar --- */
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto 40px auto;
        }

        #searchInput {
            width: 100%;
            padding: 15px 25px;
            border-radius: 20px;
            border: 2px solid transparent;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            font-size: 15px;
            font-family: 'Nunito', sans-serif;
            box-shadow: var(--glass-shadow);
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
        }

        /* --- Grid Layout --- */
        .quiz-list { 
            max-width: 1100px; 
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        /* --- Quiz Card (Tối giản - Không Desc) --- */
        .quiz-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 12px 25px rgba(162, 155, 254, 0.25);
        }

        .icon-box {
            font-size: 28px;
            width: 50px;
            height: 50px;
            background: #f4f2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            margin-right: 15px;
            transition: 0.3s;
        }

        .quiz-card:hover .icon-box {
            background: var(--primary);
            color: white;
            transform: scale(1.1) rotate(5deg);
        }

        .card-content { flex-grow: 1; }

        .quiz-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 0 0 8px 0;
        }

        .quiz-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            text-transform: uppercase;
        }

        /* Phân loại Section theo màu */
        .tag-s1 { background: #e3fded; color: #00b894; }
        .tag-s2 { background: #fff3e0; color: #e17055; }
        .tag-s3 { background: #e0dbff; color: #6c5ce7; }
        .tag-s4 { background: #ffeaa7; color: #d63031; }

        .hidden { display: none !important; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .quiz-list { grid-template-columns: 1fr; }
            h1 { font-size: 30px; }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="container">
        <header class="header-section">
            <h1>
                <img src="ảnh.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/29/29302.png'" alt="Logo">
                <span class="brand-name">SnapEnglish</span> Listening
            </h1>
            <p class="subtitle">Luyện kỹ năng nghe IELTS với các Section từ dễ đến khó. Click để bắt đầu bài thi thử.</p>
        </header>

        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Tìm bài nghe (VD: Section 1, Mock Test)...">
        </div>

        <div id="quizList" class="quiz-list"></div>
    </div>

    <script>
        // Dữ liệu bài nghe (Đã bỏ Description theo yêu cầu)
        const quizzes = [
            { name: "Listening Quiz 1", tag: "Section 1", tagClass: "tag-s1", url: "quiz1-listening.html", icon: "📞" },
            { name: "Listening Quiz 2", tag: "Section 2", tagClass: "tag-s2", url: "quiz2-listening.html", icon: "🏛️" },
            { name: "Listening Quiz 3", tag: "Section 3", tagClass: "tag-s3", url: "quiz3-listening.html", icon: "🎓" },
            { name: "Listening Quiz 4", tag: "Section 4", tagClass: "tag-s4", url: "quiz4-listening.html", icon: "🔬" },
            { name: "Listening Quiz 5", tag: "Section 1", tagClass: "tag-s1", url: "quiz5-listening.html", icon: "🏨" },
            { name: "Listening Quiz 6", tag: "Section 2", tagClass: "tag-s2", url: "quiz6-listening.html", icon: "🎙️" }
            
        ];

        const quizListDiv = document.getElementById("quizList");
        const searchInput = document.getElementById("searchInput");

        function renderQuizzes() {
            quizListDiv.innerHTML = '';
            quizzes.forEach((quiz, index) => {
                const card = document.createElement("a");
                card.className = "quiz-card";
                card.href = quiz.url;
                card.target = "_blank"; // Luôn mở sang tab mới
                card.setAttribute("data-search", `${quiz.name} ${quiz.tag}`.toLowerCase());
                
                card.style.animationDelay = `${index * 0.05}s`;

                card.innerHTML = `
                    <div class="icon-box">${quiz.icon}</div>
                    <div class="card-content">
                        <h3 class="quiz-title">${quiz.name}</h3>
                        <div class="quiz-meta">
                            <span class="quiz-tag ${quiz.tagClass}">${quiz.tag}</span>
                        </div>
                    </div>
                `;
                quizListDiv.appendChild(card);
            });
        }

        searchInput.addEventListener('input', function() {
            const filter = this.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.quiz-card');
            
            cards.forEach(card => {
                const text = card.getAttribute('data-search');
                if (text.includes(filter)) {
                    card.classList.remove('hidden');
                    card.style.animation = "none"; 
                    card.style.opacity = "1";
                } else {
                    card.classList.add('hidden');
                }
            });
        });

        renderQuizzes();
    </script>
</body>
</html>
