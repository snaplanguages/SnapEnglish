<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách bài mẫu | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #a29bfe;
            --primary-dark: #6c5ce7;
            --accent-green: #55efc4;
            --accent-orange: #e7a87c;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #f4f2ff 100%);
            --text-dark: #2d3436;
            --text-gray: #636e72;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(162, 155, 254, 0.15);
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            margin: 0;
            padding: 40px 20px;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Background Shapes --- */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape-1 { width: 350px; height: 350px; background: var(--primary); top: -50px; left: -50px; }
        .shape-2 { width: 300px; height: 300px; background: var(--accent-orange); bottom: -50px; right: -50px; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.05); }
        }

        /* --- Header & Nút Quay lại --- */
        .top-bar {
            max-width: 800px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            color: var(--primary-dark);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(162, 155, 254, 0.2);
            color: var(--accent-orange);
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            font-family: 'Quicksand', sans-serif;
            font-size: 36px; 
            color: var(--primary-dark);
            margin: 0 0 10px 0;
        }

        #type-title {
            color: var(--accent-orange);
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-gray);
            font-size: 16px;
        }

        /* --- List Bài Mẫu --- */
        .container { 
            max-width: 800px; 
            margin: auto; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 50px;
        }

        .sample-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px 25px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .sample-card:hover {
            transform: translateY(-4px) scale(1.01);
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 12px 30px rgba(162, 155, 254, 0.25);
        }

        .sample-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .sample-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #2d3436;
            margin: 0;
        }

        .sample-desc {
            font-size: 14px;
            color: var(--text-gray);
            margin: 0;
        }

        .sample-meta {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .band-tag {
            background: #f4f2ff;
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid #e0dbff;
        }

        .read-icon {
            font-size: 20px;
            color: var(--accent-orange);
            transition: 0.3s;
        }

        .sample-card:hover .read-icon {
            transform: translateX(5px);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: var(--glass-bg);
            border-radius: 20px;
            color: var(--text-gray);
            border: 1px dashed #b2bec3;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .sample-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .sample-meta {
                width: 100%;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="top-bar">
        <a href="samples.html" class="back-btn">⬅ Quay lại thư viện</a>
    </div>

    <div class="header-section">
        <h1>Dạng bài: <span id="type-title">Loading...</span></h1>
        <p class="subtitle">Chọn một bài mẫu dưới đây để phân tích cấu trúc và từ vựng.</p>
    </div>

    <div class="container" id="sample-list"></div>

    <script>
        // Lấy type từ URL
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');

        // Ánh xạ tên hiển thị đẹp cho các dạng bài
        const typeNames = {
            'line_graph': '📈 Line Graph',
            'bar_chart': '📊 Bar Chart',
            'pie_chart': '🔵 Pie Chart',
            'table': '📋 Table',
            'map': '🗺️ Map',
            'process': '🔄 Process',
            'mixed': '📉 Mixed Charts'
        };

        // Cập nhật tiêu đề trang
        document.getElementById('type-title').innerText = typeNames[type] || 'Chưa xác định';

        // Dữ liệu bài mẫu (Đã mở rộng & chuyên nghiệp hóa)
        const sampleData = {
            line_graph: [
                { title: "Mục đích đến Anh của khách quốc tế", desc: "Phân tích xu hướng biến động và sự 'đổi ngôi' giữa các mục đích chuyến đi từ 1989-2009.", link: "sampleline-1.html", band: "Band 8.0+" },
                { title: "Tỷ lệ thất nghiệp ở 3 quốc gia", desc: "So sánh dữ liệu biến động trong giai đoạn kinh tế suy thoái.", link: "sampleline-2.html", band: "Band 8.0" }
            ],
            bar_chart: [
                { title: "Doanh thu bán lẻ theo nhóm tuổi", desc: "Sử dụng cấu trúc so sánh hơn/nhất linh hoạt.", link: "samplebar-1.html", band: "Band 7.0" },
                { title: "Sự thay đổi trong phương tiện giao thông", desc: "So sánh tỷ lệ sử dụng phương tiện công cộng và cá nhân.", link: "samplebar-2.html", band: "Band 8.0" }
            ],
            pie_chart: [
                { title: "Tỷ trọng chi tiêu của hộ gia đình", desc: "So sánh sự phân bổ tài chính giữa năm 1950 và 2010.", link: "samplepie-1.html", band: "Band 7.5" }
            ],
            map: [
                { title: "Quy hoạch hòn đảo du lịch", desc: "Mô tả sự phát triển cơ sở hạ tầng trước và sau.", link: "samplemap-1.html", band: "Band 8.0" }
            ],
            process: [
                { title: "Quy trình sản xuất sô-cô-la", desc: "Ứng dụng nhuần nhuyễn thể bị động và từ nối tuần tự.", link: "sampleprocess-1.html", band: "Band 7.5+" }
            ]
        };

        const sampleList = document.getElementById("sample-list");

        if (type && sampleData[type] && sampleData[type].length > 0) {
            sampleData[type].forEach((sample, index) => {
                const linkObj = document.createElement("a");
                linkObj.className = "sample-card";
                linkObj.href = sample.link;
                linkObj.target = "_blank"; // Tuân thủ việc mở link bài học sang tab mới
                
                linkObj.style.animationDelay = `${index * 0.1}s`;

                linkObj.innerHTML = `
                    <div class="sample-info">
                        <h3 class="sample-title">${sample.title}</h3>
                        <p class="sample-desc">${sample.desc}</p>
                    </div>
                    <div class="sample-meta">
                        <span class="band-tag">${sample.band}</span>
                        <span class="read-icon">➔</span>
                    </div>
                `;
                sampleList.appendChild(linkObj);
            });
        } else {
            sampleList.innerHTML = `
                <div class="empty-state">
                    <h3>Oops! Chưa có bài mẫu nào.</h3>
                    <p>Giáo viên đang cập nhật bài mẫu cho dạng biểu đồ này. Bạn hãy quay lại sau nhé!</p>
                </div>
            `;
        }
    </script>

</body>
</html>
