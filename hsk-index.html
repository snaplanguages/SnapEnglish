<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HSK Practice - Dashboard</title>
   <link rel="icon" type="image/png" href="ảnh.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    /* --- Cài đặt chung --- */
    :root {
      /* Đổi màu chủ đạo sang Xanh Mint */
      --primary-color: #48c9b0; 
      --primary-hover: #1abc9c;
      --bg-color: #f0fbf9; /* Nền xanh mint rất nhạt */
      --text-color: #333;
      --card-bg: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Poppins', 'Quicksand', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      overflow-x: hidden; 
    }

    /* --- Phần nội dung chính --- */
    .container {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0 20px;
      text-align: center;
    }

    .welcome-text h2 {
      font-size: 1.8rem;
      color: #444;
      margin-bottom: 5px;
    }

    .welcome-text p {
      font-family: 'Quicksand', sans-serif;
      font-size: 1rem;
      color: #666;
      max-width: 700px;
      margin: 0 auto 30px auto;
    }

    /* --- Grid Layout --- */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    /* --- Card Link Style --- */
    a.card-link {
        text-decoration: none;
        color: inherit;
        display: block;
    }

    /* --- Card Style --- */
    .card {
      background: var(--card-bg);
      padding: 25px 15px;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      position: relative;
      height: 100%;
    }

    .card:hover {
      transform: translateY(-5px);
      /* Đổi màu bóng đổ khi hover sang tone mint */
      box-shadow: 0 10px 25px rgba(72, 201, 176, 0.2); 
      border-color: var(--primary-color);
    }

    .card::before {
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
      height: 60px;
      /* Nền icon màu mint nhạt */
      background-color: #e8f8f5; 
      border-radius: 50%;
      margin-bottom: 12px;
      transition: background-color 0.3s;
    }

    .card:hover::before {
      background-color: var(--primary-color);
    }

    .card h3 {
      margin: 0;
      font-size: 16px;
      color: #444;
      font-weight: 700;
    }

    /* Icons tương ứng với các mục mới */
    a.card-link:nth-child(1) .card::before { content: "📚"; } /* Từ vựng */
    a.card-link:nth-child(2) .card::before { content: "🧩"; } /* Ngữ pháp */
    a.card-link:nth-child(3) .card::before { content: "🗣️"; } /* Phát âm */
    a.card-link:nth-child(4) .card::before { content: "🎧"; } /* Nghe */
    a.card-link:nth-child(5) .card::before { content: "🎙️"; } /* Nói */
    a.card-link:nth-child(6) .card::before { content: "📖"; } /* Đọc */
    a.card-link:nth-child(7) .card::before { content: "✍️"; } /* Viết */

    /* Footer */
    footer {
      margin-top: 30px;
      padding: 10px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="welcome-text">
      <h2>Chào mừng bạn trở lại! ✨</h2>
      <p>Chọn kỹ năng bạn muốn luyện tập hôm nay.</p>
    </div>
    
    <div class="grid">
      
      <a href="tu-vung-hsk.html" class="card-link">
        <div class="card">
          <h3>Từ vựng</h3>
        </div>
      </a>

      <a href="ngu-phap-hsk.html" class="card-link">
        <div class="card">
          <h3>Ngữ pháp</h3>
        </div>
      </a>

      <a href="phat-am-hsk.html" class="card-link">
        <div class="card">
          <h3>Phát âm</h3>
        </div>
      </a>

      <a href="nghe-hsk.html" class="card-link">
        <div class="card">
          <h3>Nghe</h3>
        </div>
      </a>

      <a href="noi-hsk.html" class="card-link">
        <div class="card">
          <h3>Nói</h3>
        </div>
      </a>

      <a href="doc-hsk.html" class="card-link">
        <div class="card">
          <h3>Đọc</h3>
        </div>
      </a>

      <a href="viet-hsk.html" class="card-link">
        <div class="card">
          <h3>Viết</h3>
        </div>
      </a>

    </div>
  </div>
  
  <footer>
    <p>&copy; 2026 HSK Practice. All rights reserved. 🌿</p>
  </footer>

</body>
</html>
