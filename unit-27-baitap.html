    <script>
        const exData = [
            ["Question 1 [517059]: I enjoyed the movie very much. I wish I _______ the book from which it was made.", 
            ["A. have read", "B. had read", "C. should have read", "D. am reading"], 1, 
            "<ul><li><strong>A, D sai:</strong> Cấu trúc Wish không dùng thì hiện tại.</li><li><strong>B đúng:</strong> Sự việc 'enjoyed' nằm ở quá khứ. Điều ước trái với quá khứ phải dùng thì Quá khứ hoàn thành (S + wish + S + had + V3/ed). Tôi ước mình ĐÃ ĐỌC cuốn sách đó.</li><li><strong>C sai:</strong> 'should have V3' (lẽ ra nên làm) không dùng trong mệnh đề Wish.</li></ul>"],

            ["Question 2 [517060]: You are late. If you _______ a few minutes earlier, you _______ him.", 
            ["A. came / would meet", "B. had come / would have met", "C. come / will meet", "D. had come / would meet"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Việc đến muộn và lỡ gặp là sự thật đã xảy ra trong quá khứ. Câu giả định trái với quá khứ phải dùng Câu điều kiện loại 3.</li><li><strong>B đúng:</strong> ĐK loại 3: If + S + had + V3/ed, S + would have + V3/ed. (Nếu bạn đến sớm hơn vài phút, bạn đã gặp được anh ấy rồi).</li></ul>"],

            ["Question 3 [517061]: I can't stand him. He always talks as though he _______ everything.", 
            ["A. knew", "B. knows", "C. has known", "D. had known"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc 'as though / as if' (cứ như thể là). Hành động 'talks' ở hiện tại. Người này thực chất không biết mọi thứ (trái với hiện tại) -> Lùi một thì thành Quá khứ đơn (knew).</li><li><strong>B, C sai:</strong> Chưa lùi thì (phải lùi thì để thể hiện sự giả định không có thật).</li><li><strong>D sai:</strong> Dùng QKHT khi sự việc giả định trái với quá khứ. Ở đây ngữ cảnh đang ở hiện tại.</li></ul>"],

            ["Question 4 [517062]: His doctor suggested that he _______ a short trip abroad.", 
            ["A. will take", "B. would take", "C. take", "D. took"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai cấu trúc Bàng thái cách (Subjunctive). Không lùi thì theo cách thông thường.</li><li><strong>C đúng:</strong> Cấu trúc giả định với các động từ yêu cầu, đề nghị (suggest, recommend, insist...): <strong>S1 + suggested that + S2 + (should) + V-inf</strong>. Động từ 'take' phải ở dạng nguyên thể không chia.</li></ul>"],

            ["Question 5 [517063]: We might have failed if you _______ us a helping hand.", 
            ["A. have not given", "B. would not give", "C. had not given", "D. did not give"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Không khớp thì với mệnh đề chính.</li><li><strong>C đúng:</strong> Mệnh đề chính là 'might have failed' -> Câu điều kiện loại 3 (trái với quá khứ). Mệnh đề If phải dùng Quá khứ hoàn thành (had + V3/ed).</li></ul>"],

            ["Question 6 [517064]: The law requires that everyone _______ his car checked at least once a month.", 
            ["A. has", "B. have", "C. had", "D. will have"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Dù chủ ngữ là 'everyone' (ngôi 3 số ít), động từ cũng không được chia (has) hay lùi thì.</li><li><strong>B đúng:</strong> Cấu trúc Bàng thái cách với 'require': <strong>S1 + requires that + S2 + (should) + V-inf</strong>. Động từ 'have' ở dạng nguyên thể.</li></ul>"],

            ["Question 7 [517065]: He was busy yesterday, otherwise he _______ to the meeting.", 
            ["A. would come", "B. would have been", "C. would have come", "D. would be"], 2, 
            "<ul><li><strong>A, D sai:</strong> Là cấu trúc mệnh đề chính ĐK loại 2.</li><li><strong>B sai:</strong> 'would have been to the meeting' kém tự nhiên hơn 'would have come'.</li><li><strong>C đúng:</strong> Dấu hiệu 'was busy yesterday' (quá khứ). 'otherwise' = if he hadn't been busy (Nếu anh ta không bận -> ĐK loại 3). Mệnh đề chính dùng <strong>would have + V3/ed</strong>.</li></ul>"],

            ["Question 8 [517066]: If there were no subjunctive mood, English _______ much easier.", 
            ["A. will be", "B. would have been", "C. could have been", "D. would be"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> A là ĐK loại 1. B, C là ĐK loại 3.</li><li><strong>D đúng:</strong> Mệnh đề If dùng 'were' -> ĐK loại 2 (giả định trái với hiện tại). Mệnh đề chính phải dùng <strong>would/could + V-inf</strong> (would be).</li></ul>"],

            ["Question 9 [517067]: I don't understand this point of grammar. I wish I _______ it better.", 
            ["A. understood", "B. would understand", "C. had understood", "D. understand"], 0, 
            "<ul><li><strong>A đúng:</strong> Câu gốc ở hiện tại ('don't understand'). Điều ước trái với hiện tại dùng thì Quá khứ đơn (understood).</li><li><strong>B sai:</strong> 'would + V' dùng cho điều ước về tương lai hoặc phàn nàn.</li><li><strong>C sai:</strong> Dùng cho điều ước trái quá khứ.</li><li><strong>D sai:</strong> Không dùng hiện tại trong mệnh đề Wish.</li></ul>"],

            ["Question 10 [517068]: It never stops raining here. I wish it _______ raining.", 
            ["A. have stopped", "B. would stop", "C. had stopped", "D. stops"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Không đúng dạng của câu ước phàn nàn.</li><li><strong>B đúng:</strong> Khi muốn phàn nàn về một thói quen gây bực mình và muốn nó thay đổi trong tương lai, ta dùng <strong>S + wish + S + would + V-inf</strong>. (Tôi ước trời ngừng mưa đi).</li></ul>"],

            ["Question 11 [517069]: I should never have said that. I wish I _______ that.", 
            ["A. didn't say", "B. wouldn't say", "C. hadn't said", "D. don't say"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Hành động lỡ lời đã xảy ra trong quá khứ ('should have said' - lẽ ra không nên nói).</li><li><strong>C đúng:</strong> Điều ước trái với một sự việc trong quá khứ -> dùng Quá khứ hoàn thành (hadn't said).</li></ul>"],

            ["Question 12 [517070]: I miss my friends. I wish my friends _______ here right now.", 
            ["A. were", "B. would be", "C. had been", "D. are"], 0, 
            "<ul><li><strong>A đúng:</strong> Dấu hiệu 'right now' (hiện tại). Ước trái với hiện tại dùng Quá khứ đơn. Đối với động từ tobe, ta luôn dùng <strong>were</strong> cho mọi ngôi trong câu Wish/ĐK loại 2.</li><li><strong>B, C, D sai:</strong> Sai cấu trúc thì của câu ước hiện tại.</li></ul>"],

            ["Question 13 [517071]: I speak English terribly. I wish I _______ English well.", 
            ["A. spoke", "B. can speak", "C. had spoken", "D. speaks"], 0, 
            "<ul><li><strong>A đúng:</strong> Thực tế là 'speak terribly' (ở hiện tại). Ước trái với hiện tại dùng Quá khứ đơn (spoke).</li><li><strong>B sai:</strong> Phải lùi 'can' thành 'could'.</li><li><strong>C sai:</strong> Dùng cho ước trái quá khứ.</li><li><strong>D sai:</strong> Không dùng HTĐ trong câu Wish.</li></ul>"],

            ["Question 14 [517072]: I cannot sleep. The dog next door is making too much noise. I wish it _______ quiet.", 
            ["A. keep", "B. would keep", "C. had kept", "D. will keep"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> D sai vì không dùng will trong mệnh đề Wish. C sai vì đây không phải ước cho quá khứ.</li><li><strong>B đúng:</strong> Phàn nàn về hành động gây ồn ào của con chó, mong muốn sự việc thay đổi -> Dùng cấu trúc Wish phàn nàn: <strong>would + V-inf</strong>.</li></ul>"],

            ["Question 15 [517073]: -\"What will you do during winter vacation?\" -\"I don't know, but it's about time I _______ something.\"", 
            ["A. decided", "B. I'll decide", "C. I'd decided", "D. I'm deciding"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc <strong>It's (high/about) time + S + V(past simple)</strong>: Đã đến lúc ai đó nên làm gì. Động từ 'decide' chia ở Quá khứ đơn (decided).</li><li><strong>B, C, D sai:</strong> Không tuân theo cấu trúc ngữ pháp của 'It's time'.</li></ul>"],

            ["Question 16 [517074]: He was very busy yesterday, otherwise, he _______ to your birthday party.", 
            ["A. would come", "B. came", "C. would have come", "D. should come"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai thì mệnh đề chính (vì ngữ cảnh ở quá khứ).</li><li><strong>C đúng:</strong> Dấu hiệu 'yesterday'. 'otherwise' mang ý nghĩa điều kiện loại 3 (Nếu hôm qua không bận). Mệnh đề chính phải dùng <strong>would have + V3/ed</strong>.</li></ul>"],

            ["Question 17 [517075]: The two strangers talked as if they _______ friends for years.", 
            ["A. should be", "B. had been", "C. have been", "D. were"], 1, 
            "<ul><li><strong>A, C sai:</strong> Mệnh đề 'as if' phải lùi thì so với động từ chính để thể hiện sự giả định.</li><li><strong>B đúng:</strong> Động từ chính 'talked' ở Quá khứ. Họ không thực sự là bạn (giả định trái với quá khứ) -> lùi xuống Quá khứ hoàn thành (had been).</li><li><strong>D sai:</strong> 'were' chỉ dùng nếu giả định cùng thời điểm với hiện tại.</li></ul>"],

            ["Question 18 [517076]: It is about time you _______ harder for the next exam.", 
            ["A. work", "B. are working", "C. worked", "D. have worked"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai cấu trúc 'It is time'.</li><li><strong>C đúng:</strong> Cấu trúc <strong>It is about time + S + V(past simple)</strong> (Đã đến lúc bạn phải học chăm hơn). Dùng Quá khứ đơn 'worked'.</li></ul>"],

            ["Question 19 [517077]: The ceiling in this room doesn't look very safe. It looks as if it _______ down.", 
            ["A. would fall", "B. falls", "C. is falling", "D. is going to fall"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Trong trường hợp này, sự việc có khả năng rất cao sẽ xảy ra thật ở hiện tại/tương lai (do có bằng chứng rõ ràng: trần nhà trông không an toàn). Ta <strong>KHÔNG LÙI THÌ</strong> sau 'as if'.</li><li><strong>D đúng:</strong> Dùng thì Tương lai gần (is going to fall) để diễn tả một dự đoán có căn cứ rõ ràng.</li></ul>"],

            ["Question 20 [517078]: Team rules require that each player _______ responsible for memorizing one rule...", 
            ["A. is", "B. was", "C. be", "D. were"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Động từ không chia theo ngôi 'each player' hay theo thì thông thường.</li><li><strong>C đúng:</strong> Cấu trúc Bàng thái cách: <strong>require that + S + (should) + V-inf</strong>. Động từ to be phải giữ nguyên thể là 'be'.</li></ul>"],

            ["Question 21 [517079]: To avoid unnecessary injury, the coach insisted that the players' tackling drills _______ on the proper way to fall down.", 
            ["A. focused", "B. focus", "C. were focused", "D. to focus"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Sai cấu trúc Bàng thái cách.</li><li><strong>B đúng:</strong> Cấu trúc giả định với 'insist' (khăng khăng, yêu cầu): <strong>insisted that + S + (should) + V-inf</strong>. Dùng nguyên thể 'focus'.</li></ul>"],

            ["Question 22 [517080]: I wish I _______ to retake my exams.", 
            ["A. do not have", "B. will not have", "C. am about", "D. did not have"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Không dùng Hiện tại hoặc Tương lai đơn trong mệnh đề Wish.</li><li><strong>D đúng:</strong> Điều ước ở hiện tại (mong muốn không phải thi lại) -> lùi về Quá khứ đơn (did not have).</li></ul>"],

            ["Question 23 [517081]: The spacemen felt as if he _______ in a paradise.", 
            ["A. had been", "B. falls", "C. fall", "D. has fallen"], 0, 
            "<ul><li><strong>A đúng:</strong> Động từ chính 'felt' ở Quá khứ. Việc 'ở thiên đường' là không có thật (trái với quá khứ) -> Lùi về Quá khứ hoàn thành (had been).</li><li><strong>B, C, D sai:</strong> Lệch thì và sai hoàn toàn nghĩa động từ.</li></ul>"],

            ["Question 24 [517082]: He looked frightened as if he _______ a ghost.", 
            ["A. has seen", "B. had seen", "C. were", "D. saw"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Động từ chính 'looked' (quá khứ). Việc 'thấy ma' không có thật trong quá khứ -> phải lùi về QKHT.</li><li><strong>B đúng:</strong> Dùng Quá khứ hoàn thành 'had seen' (trông cứ như thể là vừa nhìn thấy ma).</li></ul>"],

            ["Question 25 [517083]: I wish another more effective teaching method _______ used.", 
            ["A. is", "B. was", "C. were", "D. has been"], 2, 
            "<ul><li><strong>A, D sai:</strong> Không dùng Hiện tại trong câu Wish.</li><li><strong>B sai:</strong> Trong ngữ pháp chuẩn mực, 'were' được ưu tiên cho mọi ngôi trong câu giả định.</li><li><strong>C đúng:</strong> Điều ước ở hiện tại, động từ to be chia là 'were' (Tôi ước một phương pháp dạy học hiệu quả hơn ĐƯỢC sử dụng).</li></ul>"],

            ["Question 26 [517084]: She wishes she _______ a fairy now.", 
            ["A. was", "B. were", "C. is", "D. had been"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Dấu hiệu 'now' -> ước trái với hiện tại, phải dùng QKĐ. Không dùng 'was' hay 'is'.</li><li><strong>B đúng:</strong> Tobe trong câu Wish trái hiện tại luôn là 'were' cho mọi ngôi.</li></ul>"],

            ["Question 27 [517331]: She spent money as if she _______ plenty of it.", 
            ["A. have", "B. had", "C. had had", "D. should have"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> 'spent' ở quá khứ, nếu dùng 'had' thì chỉ lùi một thì, chưa phản ánh đúng sự việc giả định trái quá khứ.</li><li><strong>C đúng:</strong> Động từ chính 'spent' (QKĐ). Việc cô ấy thực chất không có nhiều tiền (trái với quá khứ) -> lùi xuống Quá khứ hoàn thành 'had had' (had trợ động từ + had V3 của have).</li></ul>"],

            ["Question 28 [517332]: The emperor demanded that the thief _______ brought before him.", 
            ["A. were", "B. will be", "C. was", "D. be"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Động từ to be không chia theo thì thông thường.</li><li><strong>D đúng:</strong> Cấu trúc Bàng thái cách với 'demand' (yêu cầu): <strong>demanded that + S + (should) + V-inf</strong>. Thể bị động là 'be + V3/ed' (be brought).</li></ul>"],

            ["Question 29 [517333]: She talks too much but I wish she _______.", 
            ["A. didn't", "B. doesn't", "C. won't", "D. wouldn't"], 0, 
            "<ul><li><strong>A đúng:</strong> Sự việc 'talks' ở hiện tại. Ước cô ấy KHÔNG nói nhiều (trái hiện tại) -> dùng Quá khứ đơn (didn't).</li><li><strong>B, C sai:</strong> Không dùng Hiện tại/Tương lai trong Wish.</li><li><strong>D sai (kém chính xác hơn A):</strong> 'wouldn't' thiên về phàn nàn hành động tương lai, nhưng vì vế trước là thói quen chung 'talks', 'didn't' là chuẩn xác nhất để phủ định hành động đó.</li></ul>"],

            ["Question 30 [517334]: They will drink wine but I wish they _______.", 
            ["A. didn't", "B. don't", "C. won't", "D. wouldn't"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Sự việc 'will drink' thuộc tương lai. C không được dùng trong mệnh đề Wish.</li><li><strong>D đúng:</strong> Điều ước trái với một dự định/sự việc ở tương lai -> dùng <strong>S + wish + S + would/wouldn't + V</strong>.</li></ul>"],

            ["Question 31 [517335]: I demand that he _______ immediately.", 
            ["A. apologize", "B. shall apologize", "C. will apologize", "D. has apologized"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc Bàng thái cách: <strong>demand that + S + V-inf</strong>. Dù chủ ngữ là 'he', động từ vẫn giữ nguyên thể 'apologize'.</li><li><strong>B, C, D sai:</strong> Không chia theo thì hay mượn trợ động từ will/shall/has.</li></ul>"],

            ["Question 32 [517336]: The teacher requires Rose _______ by heart 15 English words each day.", 
            ["A. learn", "B. to learn", "C. must learn", "D. learning"], 1, 
            "<ul><li><strong>A sai:</strong> Cấu trúc 'require that S + V-inf', nhưng ở đây KHÔNG CÓ chữ 'that'.</li><li><strong>B đúng:</strong> Cấu trúc động từ đi kèm tân ngữ: <strong>require somebody TO DO something</strong> (yêu cầu ai làm gì). Do đó phải dùng 'to learn'.</li><li><strong>C, D sai:</strong> Sai ngữ pháp.</li></ul>"],

            ["Question 33 [517337]: I suggested that she _______ her lawyer before signing the contract.", 
            ["A. consults", "B. shall consult", "C. will consult", "D. should consult"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> 'suggest that' yêu cầu động từ nguyên thể hoặc có 'should', không chia thêm 's' hay dùng 'will/shall'.</li><li><strong>D đúng:</strong> Cấu trúc Bàng thái cách với 'suggest': <strong>suggested that + S + (should) + V-inf</strong>. Có 'should consult' là hoàn toàn chính xác.</li></ul>"],

            ["Question 34 [517338]: It is necessary that everything _______ ready by two o'clock tomorrow.", 
            ["A. be", "B. was", "C. were", "D. would have been"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc Bàng thái cách với tính từ (It is necessary/important/essential... that): <strong>It is + adj + that + S + (should) + V-inf</strong>. Tobe giữ nguyên là 'be'.</li><li><strong>B, C, D sai:</strong> Động từ không được chia theo thì.</li></ul>"],

            ["Question 35 [517339]: They recommend that she _______ to a ski resort in Spain.", 
            ["A. will go", "B. would have gone", "C. should go", "D. should have gone"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai cấu trúc Bàng thái cách.</li><li><strong>C đúng:</strong> Cấu trúc giả định với 'recommend': <strong>recommend that + S + (should) + V-inf</strong>.</li></ul>"],

            ["Question 36 [517340]: It is advisable that you _______ your application as soon as possible.", 
            ["A. submit", "B. will submit", "C. will have submitted", "D. should have submitted"], 0, 
            "<ul><li><strong>A đúng:</strong> Tương tự câu 34, cấu trúc giả định <strong>It is advisable that + S + (should) + V-inf</strong>. Từ 'submit' ở dạng nguyên thể.</li><li><strong>B, C, D sai:</strong> Động từ bị chia sai thì.</li></ul>"],

            ["Question 37 [517341]: It is desirable that the hotel manager _______ to call the maintenance staff every 6 months to clean up the air conditioners.", 
            ["A. remember", "B. will remember", "C. must remember", "D. remembers"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc giả định <strong>It is desirable that + S + V-inf</strong>. Dù 'manager' là ngôi 3 số ít, động từ vẫn không thêm 's' (remember).</li><li><strong>B, C, D sai:</strong> Động từ bị chia sai hoặc thêm modal verbs không đúng (must).</li></ul>"],

            ["Question 38 [517342]: The Principal demanded that the heaters _______ immediately. Winter is coming!", 
            ["A. are repaired", "B. be repaired", "C. were repaired", "D. repair"], 1, 
            "<ul><li><strong>A, C sai:</strong> Bị chia theo thì.</li><li><strong>B đúng:</strong> Cấu trúc giả định <strong>demanded that + S + (should) + V-inf</strong>. Ở dạng bị động, động từ tobe giữ nguyên là 'be' -> 'be repaired' (các lò sưởi PHẢI ĐƯỢC sửa).</li><li><strong>D sai:</strong> Dùng chủ động là sai nghĩa (lò sưởi không tự sửa).</li></ul>"],

            ["Question 39 [517343]: The boss insisted that Sam _______ at the meeting as he is too talkative for such a confidential project.", 
            ["A. not be", "B. isn't", "C. was", "D. is"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc giả định <strong>insist that + S + (should) NOT + V-inf</strong>. Thêm 'not' ngay trước động từ nguyên thể 'be'. (Sếp yêu cầu Sam KHÔNG ĐƯỢC CÓ MẶT).</li><li><strong>B, C, D sai:</strong> Động từ bị chia sai thì.</li></ul>"],

            ["Question 40 [517344]: The doctor insisted that she _______ to the hospital for tests.", 
            ["A. go", "B. goes", "C. will go", "D. has gone"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc giả định <strong>insisted that + S + (should) + V-inf</strong>. Động từ 'go' giữ nguyên thể.</li><li><strong>B, C, D sai:</strong> Động từ bị chia theo các thì khác nhau là sai quy tắc bàng thái cách.</li></ul>"],

            ["Question 41 [517345]: She suggested that we _______ in the lobby of the hotel at 9:00 a.m.", 
            ["A. shall meet", "B. will meet", "C. should meet", "D. would have met"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Không dùng shall/will/would have trong cấu trúc suggest.</li><li><strong>C đúng:</strong> Cấu trúc <strong>suggest that + S + should + V-inf</strong> (Đề xuất rằng ai đó NÊN làm gì).</li></ul>"],

            ["Question 42 [517346]: According to some historians, if Napoleon had not invaded Russia, he _______ the rest of the world.", 
            ["A. had conquered", "B. would conquer", "C. would have conquered", "D. conquered"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai cấu trúc mệnh đề chính Câu điều kiện loại 3.</li><li><strong>C đúng:</strong> Dấu hiệu mệnh đề If: 'had not invaded' (QKHT) -> ĐK loại 3. Mệnh đề chính: <strong>S + would have + V3/ed</strong>.</li></ul>"],

            ["Question 43 [517347]: Tony would have forgotten the appointment if I _______ him.", 
            ["A. don't remind", "B. didn't remind", "C. hadn't reminded", "D. reminded"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai thì hoặc ngược nghĩa (nhắc nhở thì sao lại quên).</li><li><strong>C đúng:</strong> Mệnh đề chính 'would have forgotten' -> ĐK loại 3. Mệnh đề If phải dùng Quá khứ hoàn thành <strong>had(n't) + V3/ed</strong>.</li></ul>"],

            ["Question 44 [517348]: He said if he had not answered the phone at the petroleum station then, he _______ a fine.", 
            ["A. would pay", "B. hadn't paid", "C. had been paid", "D. wouldn't have had to pay"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Lệch thì hoặc sai cấu trúc mệnh đề chính ĐK loại 3.</li><li><strong>D đúng:</strong> Dấu hiệu 'had not answered' -> ĐK loại 3. Cấu trúc: <strong>wouldn't have + V3/ed</strong> (wouldn't have had to = đã không phải làm gì).</li></ul>"],

            ["Question 45 [517349]: If I _______ taller, I might be better at basketball.", 
            ["A. am", "B. I were", "C. I had been", "D. were I"], 1, 
            "<ul><li><strong>A, C sai:</strong> 'might be' (tương đương would be) -> ĐK loại 2. Không dùng Hiện tại đơn hay QKHT.</li><li><strong>B đúng:</strong> ĐK loại 2 dùng tobe là 'were' cho mọi ngôi (If I were). (Đáp án trong sách bị đánh máy nhầm Option A là 'I am' và B là 'I were' dư chữ I, mình bám sát đáp án B).</li><li><strong>D sai:</strong> Không dùng đảo ngữ có chữ If.</li></ul>"],

            ["Question 46 [517350]: If she _______ sick, she would have gone out with me to the party.", 
            ["A. wasn't", "B. hadn't been", "C. hasn't been", "D. weren't"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Sai thì (Đây là cấu trúc ĐK loại 3).</li><li><strong>B đúng:</strong> Mệnh đề chính 'would have gone' -> ĐK loại 3. Mệnh đề If chia ở Quá khứ hoàn thành (hadn't been). Nếu cô ấy KHÔNG BỊ ỐM (trong quá khứ), cô ấy đã đi chơi rồi.</li></ul>"]
        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        const card = document.createElement("div");
        card.className = `exercise-card`;

        let htmlContent = `
            <h2 class="ex-title">🔥 Trắc Nghiệm: 46 Câu Giả Định Thức & Bàng Thái Cách</h2>
            <div class="tip-box">
                <span>💡 <strong>Mẹo làm bài cực mạnh:</strong> <br>- Câu <strong>Wish</strong> và <strong>As if/As though</strong>: Ước/Giả định ở Hiện tại -> dùng Quá Khứ Đơn (tobe = were). Ước/Giả định ở Quá Khứ -> dùng Quá Khứ Hoàn Thành.<br>- Cấu trúc <strong>Bàng Thái Cách</strong> (suggest, demand, insist, important, necessary... that): Động từ phía sau LUÔN ở dạng nguyên thể không chia <strong>(V-inf)</strong> hoặc <strong>should + V-inf</strong> cho tất cả các ngôi!</span>
            </div>
            <div id="questions-container"></div>
        `;

        card.innerHTML = htmlContent;
        app.appendChild(card);

        const qContainer = document.getElementById("questions-container");

        exData.forEach((qObj) => {
            const [qText, options, correctIndex, expText] = qObj;
            
            const qBlock = document.createElement("div");
            qBlock.className = "question-block";

            const qTitle = document.createElement("div");
            qTitle.className = "question-text";
            qTitle.innerText = qText;
            qBlock.appendChild(qTitle);

            const optContainer = document.createElement("div");
            optContainer.className = "options";
            
            const expDiv = document.createElement("div");
            expDiv.className = "explanation";

            options.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = opt; // Using innerHTML if options have tags
                
                btn.onclick = () => {
                    const siblings = optContainer.querySelectorAll(".option-btn");
                    siblings.forEach(sibling => sibling.disabled = true);

                    if(idx === correctIndex) {
                        btn.classList.add("correct");
                        currentScore++;
                        scoreDisplay.innerText = currentScore;
                        expDiv.classList.add("success", "show");
                        expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${expText}`;
                    } else {
                        btn.classList.add("incorrect");
                        siblings[correctIndex].classList.add("correct");
                        expDiv.classList.add("error", "show");
                        expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> ${expText}`;
                    }
                };
                optContainer.appendChild(btn);
            });

            qBlock.appendChild(optContainer);
            qBlock.appendChild(expDiv);
            qContainer.appendChild(qBlock);
        });
    </script>
</body>
</html>
