<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEnglish TOEIC Tracker - Chinh Phục Đỉnh Cao</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FF6B6B; /* Đỏ cam năng động */
            --secondary: #4ECDC4; /* Xanh ngọc dịu nhẹ */
            --listening: #45B7D1; /* Xanh dương */
            --reading: #96CEB4; /* Xanh lá */
            --writing: #FFBE0B; /* Vàng */
            --speaking: #9D4EDD; /* Tím */
            --bg-color: #f7f9fc;
            --text-main: #2d3436;
            --correct: #4caf50;
            --incorrect: #f44336;
            --total: #9c27b0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            padding: 30px;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        .header p {
            color: #636e72;
            font-weight: 600;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        @media(max-width: 768px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        /* Form Style */
        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
            border: 1px solid #eee;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.2);
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Quicksand', sans-serif;
        }

        .btn-submit {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-reset {
            background: #ff7675;
            color: white;
            width: 100%;
            margin-top: 15px;
        }

        /* Circular Progress & Estimated Score */
        .score-display {
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        .circle-wrap {
            width: 120px;
            height: 120px;
            background: #e6e9f0;
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .circle-inner {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--primary);
            z-index: 10;
        }

        /* History Table */
        .history-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .history-item {
            background: #fafafa;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }

        .history-info strong { display: block; font-size: 16px; }
        .history-info span { font-size: 13px; color: #777; }
        
        .score-stats {
            margin-top: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .c-green { color: var(--correct); }
        .c-red { color: var(--incorrect); }
        .c-purple { color: var(--total); }

        .btn-delete {
            background: #ffeaa7;
            color: #d63031;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: -100px;
            right: 20px;
            background: white;
            border-left: 5px solid var(--secondary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: bottom 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            max-width: 300px;
        }

        #toast.show {
            bottom: 20px;
        }

        #toast .title { font-weight: bold; margin-bottom: 5px; color: var(--primary); }
        #toast .message { font-size: 14px; color: #555; line-height: 1.4; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>SnapEnglish TOEIC 🚀</h1>
            <p>Hành trình chinh phục 990 bắt đầu từ hôm nay</p>
        </div>

        <div class="grid-layout">
            <div>
                <div class="card">
                    <form id="scoreForm">
                        <div class="form-group">
                            <label>Kỹ năng (Part)</label>
                            <select id="skill" required onchange="updateDefaultQuestions()">
                                <option value="Listening">Listening 🎧 (Max 495đ)</option>
                                <option value="Reading">Reading 📖 (Max 495đ)</option>
                                <option value="Speaking">Speaking 🗣️ (Max 200đ)</option>
                                <option value="Writing">Writing ✍️ (Max 200đ)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tên bài thi (VD: ETS 2024 - Test 1)</label>
                            <input type="text" id="testName" placeholder="Nhập tên bài thi..." required>
                        </div>
                        <div class="form-group">
                            <label>Thời gian làm bài (Phút)</label>
                            <input type="number" id="timeTaken" placeholder="Ví dụ: 45" required>
                        </div>
                        <div class="form-group">
                            <label>Tổng số câu hỏi</label>
                            <input type="number" id="totalQ" value="100" required>
                        </div>
                        <div class="form-group">
                            <label>Số câu ĐÚNG</label>
                            <input type="number" id="correctQ" placeholder="Ví dụ: 85" required>
                        </div>
                        
                        <button type="submit" class="btn btn-submit">Ghi Nhận Điểm 🌟</button>
                    </form>

                    <div class="score-display" id="scoreDisplay">
                        <p style="font-weight: bold; margin-bottom: 10px;">Điểm TOEIC Ước Tính</p>
                        <div class="circle-wrap" id="circleWrap">
                            <div class="circle-inner" id="estimatedScore">0</div>
                        </div>
                        <p style="margin-top: 10px; font-size: 14px; color: #777;" id="scoreQuote"></p>
                    </div>
                </div>
            </div>

            <div>
                <div class="card" style="margin-bottom: 20px;">
                    <canvas id="progressChart" height="150"></canvas>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3 style="margin: 0;">Lịch sử luyện tập</h3>
                        <button class="btn btn-reset" style="width: auto; margin: 0; padding: 8px 15px; font-size: 14px;" onclick="resetAll()">Xóa tất cả</button>
                    </div>
                    <div class="history-list" id="historyList">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast">
        <div class="title" id="toastTitle">SnapBot thông báo 🤖</div>
        <div class="message" id="toastMessage"></div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('snapToeicData')) || [];
        let chartInstance = null;

        // Tự động cập nhật số câu hỏi mặc định khi chọn kỹ năng
        function updateDefaultQuestions() {
            const skill = document.getElementById('skill').value;
            const totalQInput = document.getElementById('totalQ');
            if (skill === 'Listening' || skill === 'Reading') {
                totalQInput.value = 100;
            } else if (skill === 'Speaking') {
                totalQInput.value = 11;
            } else if (skill === 'Writing') {
                totalQInput.value = 8;
            }
        }

        // Bảng quy đổi điểm TOEIC ước tính (Tương đối theo tỷ lệ chuẩn ETS)
        function calculateToeicScore(skill, correct, total) {
            let percentage = correct / total;
            let maxScore = (skill === 'Listening' || skill === 'Reading') ? 495 : 200;
            let step = (skill === 'Listening' || skill === 'Reading') ? 5 : 10;
            
            // Tính điểm theo tỷ lệ và làm tròn theo step (bước nhảy 5đ cho L/R, 10đ cho S/W)
            let estimated = Math.round((percentage * maxScore) / step) * step;
            
            // Đảm bảo không vượt quá max hoặc dưới 5
            if (estimated > maxScore) return maxScore;
            if (estimated < 5 && (skill === 'Listening' || skill === 'Reading')) return 5;
            if (estimated < 0) return 0;
            return estimated;
        }

        function init() {
            updateDefaultQuestions();
            renderHistory();
            renderChart();
        }

        document.getElementById('scoreForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const skill = document.getElementById('skill').value;
            const testName = document.getElementById('testName').value;
            const timeTaken = document.getElementById('timeTaken').value;
            const totalQ = parseInt(document.getElementById('totalQ').value);
            const correctQ = parseInt(document.getElementById('correctQ').value);
            
            if (correctQ > totalQ) {
                alert("Số câu đúng không thể lớn hơn tổng số câu!");
                return;
            }

            const incorrectQ = totalQ - correctQ;
            const calculatedScore = calculateToeicScore(skill, correctQ, totalQ);
            const dateStr = new Date().toLocaleDateString('vi-VN');
            const timestamp = Date.now();

            const newRecord = {
                id: timestamp, date: dateStr, skill, testName, timeTaken, totalQ, correctQ, incorrectQ, score: calculatedScore
            };

            // So sánh và hiển thị popup (Toast)
            compareAndShowToast(newRecord);

            // Lưu dữ liệu
            records.push(newRecord);
            localStorage.setItem('snapToeicData', JSON.stringify(records));

            // Hiển thị vòng tròn điểm
            showCircleScore(calculatedScore, correctQ, totalQ, skill);

            // Cập nhật UI
            renderHistory();
            renderChart();
            
            // Reset form nhưng giữ nguyên kỹ năng
            const currentSkill = document.getElementById('skill').value;
            this.reset();
            document.getElementById('skill').value = currentSkill;
            updateDefaultQuestions();
        });

        function showCircleScore(score, correct, total, skill) {
            const display = document.getElementById('scoreDisplay');
            const wrap = document.getElementById('circleWrap');
            const scoreEl = document.getElementById('estimatedScore');
            const quoteEl = document.getElementById('scoreQuote');
            
            display.style.display = 'block';
            scoreEl.innerText = score;
            
            const percentage = (correct / total) * 100;
            wrap.style.background = `conic-gradient(var(--secondary) ${percentage}%, #e6e9f0 0)`;

            // Lời khuyên tuỳ chỉnh theo TOEIC
            if (percentage >= 85) {
                quoteEl.innerText = "Wow! Phong độ huỷ diệt quá Snap-er ơi! Giữ vững nhé! ✨";
            } else if (percentage >= 60) {
                quoteEl.innerText = "Khá lắm! Cố gắng nghe kỹ Part 3,4 hoặc cày thêm từ vựng Part 7 nha! 💪";
            } else {
                quoteEl.innerText = "Sai ở đâu ghim lại ở đó. Ôn kỹ transcript và bẫy đề là lên trình ngay! 💖";
            }
        }

        function compareAndShowToast(newRecord) {
            const previousRecords = records.filter(r => r.skill === newRecord.skill);
            if (previousRecords.length === 0) {
                showToast("Chào mừng Snap-er!", `Lần đầu nhập điểm ${newRecord.skill}. Hãy giữ thói quen luyện đề TOEIC mỗi ngày nhé!`);
                return;
            }

            const lastRecord = previousRecords[previousRecords.length - 1];
            const diff = newRecord.correctQ - lastRecord.correctQ;
            const scoreDiff = newRecord.score - lastRecord.score;

            let title = "";
            let msg = "";

            if (diff > 0) {
                title = "Đỉnh quá Snap-er ơi! 🎉";
                msg = `Điểm ${newRecord.skill} hôm nay TĂNG ${scoreDiff}đ! Bạn đúng thêm được ${diff} câu so với lần trước. Xứng đáng một ly trà sữa!`;
            } else if (diff < 0) {
                title = "Đừng nản chí nha! 🥺";
                msg = `Điểm ${newRecord.skill} hơi rớt nhẹ xíu. Đừng buồn, check lại phần mình hay sai nhất, ngày mai làm lại phục thù!`;
            } else {
                title = "Phong độ ổn định! ⚖️";
                msg = `Số câu đúng bằng y xì lần trước! Tối nay xem thêm một chút mẹo làm bài của SnapEnglish để bứt phá nha!`;
            }

            showToast(title, msg);
        }

        function showToast(title, message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMessage').innerText = message;
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 6000);
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            
            const reversed = [...records].reverse();

            reversed.forEach(record => {
                const colors = {
                    'Listening': 'var(--listening)',
                    'Reading': 'var(--reading)',
                    'Writing': 'var(--writing)',
                    'Speaking': 'var(--speaking)'
                };

                const div = document.createElement('div');
                div.className = 'history-item';
                div.style.borderLeftColor = colors[record.skill];
                
                div.innerHTML = `
                    <div class="history-info">
                        <strong>[${record.skill}] ${record.testName}</strong>
                        <span>🗓️ ${record.date} | ⏱️ ${record.timeTaken} phút | Điểm ước tính: ${record.score}</span>
                        <div class="score-stats">
                            Đúng: <span class="c-green">${record.correctQ}</span> | 
                            Sai: <span class="c-red">${record.incorrectQ}</span> | 
                            Tổng: <span class="c-purple">${record.totalQ}</span>
                        </div>
                    </div>
                    <button class="btn-delete" onclick="deleteRecord(${record.id})">Xóa</button>
                `;
                list.appendChild(div);
            });
        }

        function deleteRecord(id) {
            if(confirm("Bạn có chắc muốn xóa kết quả này không?")) {
                records = records.filter(r => r.id !== id);
                localStorage.setItem('snapToeicData', JSON.stringify(records));
                renderHistory();
                renderChart();
            }
        }

        function resetAll() {
            if(confirm("Xóa toàn bộ lịch sử luyện TOEIC? Mọi dữ liệu sẽ biến mất đó nha!")) {
                records = [];
                localStorage.removeItem('snapToeicData');
                document.getElementById('scoreDisplay').style.display = 'none';
                renderHistory();
                renderChart();
            }
        }

        function renderChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            const labels = [...new Set(records.map(r => r.date))];
            
            // Hàm lấy % đúng thay vì điểm tuyệt đối để chung 1 biểu đồ (Vì LR max 495, SW max 200)
            const getPercentageBySkill = (skill) => {
                return labels.map(date => {
                    const dayRecords = records.filter(r => r.date === date && r.skill === skill);
                    if(dayRecords.length === 0) return null;
                    const avgCorrect = dayRecords.reduce((acc, curr) => acc + (curr.correctQ / curr.totalQ * 100), 0) / dayRecords.length;
                    return avgCorrect.toFixed(1);
                });
            };

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Listening (%)', data: getPercentageBySkill('Listening'), borderColor: '#45B7D1', tension: 0.4, spanGaps: true },
                        { label: 'Reading (%)', data: getPercentageBySkill('Reading'), borderColor: '#96CEB4', tension: 0.4, spanGaps: true },
                        { label: 'Speaking (%)', data: getPercentageBySkill('Speaking'), borderColor: '#9D4EDD', tension: 0.4, spanGaps: true },
                        { label: 'Writing (%)', data: getPercentageBySkill('Writing'), borderColor: '#FFBE0B', tension: 0.4, spanGaps: true }
                    ]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'top', labels: { font: { family: 'Quicksand' } } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.y + '% Tỷ lệ đúng';
                                }
                            }
                        }
                    },
                    scales: {
                        y: { min: 0, max: 100, title: { display: true, text: 'Tỷ lệ đúng (%)' } }
                    }
                }
            });
        }

        // Khởi tạo app
        init();
    </script>
</body>
</html>
