<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giải thích chi tiết Part 7 - Test 1 - 2019 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Tông màu mới: Tím mộng mơ & Hồng nhiệt huyết */
            --primary: #8b5cf6; /* Tím Purple */
            --primary-light: #f5f3ff;
            --primary-dark: #5b21b6;
            --accent: #ec4899; /* Hồng Pink */
            --bg-body: #f8fafc;
            --text-main: #334155;
            --border: #e2e8f0;
            --correct: #10b981; /* Xanh lá mạ */
            --correct-bg: #d1fae5;
            --wrong: #ef4444;
            --wrong-bg: #fee2e2;
            --highlight: #fef08a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #7c3aed, #db2777);
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
            z-index: 10;
        }

        .brand {
            font-size: 22px;
            font-weight: 800;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand span {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 4px 12px;
            border-radius: 8px;
            font-size: 16px;
            backdrop-filter: blur(5px);
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        #progress-text {
            font-weight: 700; color: #f1f5f9; margin-right: 15px; background: rgba(0,0,0,0.2); padding: 5px 12px; border-radius: 20px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            border: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
        }

        .btn-outline {
            background: rgba(255,255,255,0.1);
            border: 2px solid white;
            color: white;
        }

        .btn-outline:hover { background: white; color: var(--primary-dark); }
        
        .btn-primary {
            background: white;
            color: var(--primary-dark);
            box-shadow: 0 4px 0 rgba(255,255,255,0.3);
        }

        .btn-primary:active { transform: translateY(4px); box-shadow: none; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; background: #e2e8f0; color: #94a3b8; border-color: transparent;}

        /* MAIN LAYOUT */
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .passage-section {
            flex: 6;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--border);
            background: #fff;
        }

        .passage-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            overflow-y: auto;
        }

        .col-eng, .col-vie {
            padding: 30px;
            line-height: 1.8;
            font-size: 17px;
            overflow-y: auto;
        }

        .col-eng { border-right: 2px dashed var(--primary-light); background: #faf5ff; }
        .col-vie { background: #fdf2f8; color: #475569; }
        
        .col-title {
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 20px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
            display: inline-block;
        }

        .question-section {
            flex: 4;
            padding: 30px;
            overflow-y: auto;
            background: var(--bg-body);
        }

        /* HIGHLIGHT EVIDENCE EFFECT */
        .ev-box {
            border-radius: 4px;
            transition: all 0.4s ease;
            padding: 2px 4px;
            border: 1px solid transparent;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.05);
        }

        .ev-box.focus-blink {
            background-color: var(--highlight) !important;
            border-color: #eab308;
            transform: scale(1.03);
            box-shadow: 0 0 20px rgba(234, 179, 8, 0.6);
            z-index: 10;
            position: relative;
            color: #7c3aed !important;
            font-weight: 800;
        }

        /* QUESTION CARDS */
        .q-card {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            border: 1px solid var(--primary-light);
            border-top: 5px solid var(--primary);
        }

        .q-text { font-size: 18px; font-weight: 800; margin-bottom: 10px; color: #0f172a; }
        .q-text-vi { font-size: 16px; color: var(--accent); font-style: italic; margin-bottom: 20px; font-weight: 600; }

        .option {
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 2px solid var(--border);
            font-size: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: #f8fafc;
            transition: 0.2s;
        }

        .opt-en { font-weight: 700; color: #334155;}
        .opt-vi { font-size: 14.5px; color: #64748b; font-style: italic; }

        .option.is-correct { background: var(--correct-bg); border-color: var(--correct); box-shadow: 0 4px 10px rgba(16, 185, 129, 0.15);}
        .option.is-correct .opt-en { color: #047857; }

        /* EXPLANATION BOX */
        .exp-box {
            margin-top: 20px;
            padding: 20px;
            background: var(--primary-light);
            border-radius: 15px;
            border: 1px solid #ddd6fe;
        }
        .exp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px dashed #c4b5fd; padding-bottom: 10px; }
        .exp-title { font-weight: 800; color: var(--primary-dark); font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .btn-locate { background: #fff; border: 2px solid var(--primary); color: var(--primary); padding: 6px 15px; border-radius: 20px; font-weight: 800; font-size: 14px; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px rgba(139,92,246,0.2); }
        .btn-locate:hover { background: var(--primary); color: white; transform: scale(1.05);}
        .exp-content { line-height: 1.7; font-size: 16px; margin-bottom: 15px; color: #1e293b;}
        .exp-vocab { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);}
        .exp-vocab ul { padding-left: 20px; margin: 0; }
        .exp-vocab li { margin-bottom: 8px; color: #334155;}
        .exp-vocab b { color: var(--accent); background: #fdf2f8; padding: 2px 8px; border-radius: 6px; font-weight: 800;}

        /* DOC BOX STYLING */
        .doc-box { border: 1px solid #e2e8f0; padding: 25px; border-radius: 15px; background: #fff; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);}
        .email-header { background: #f1f5f9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--primary); margin-bottom: 20px; font-size: 15.5px; line-height: 1.6;}
        .center-text { text-align: center; }
        table.table-data { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 15px;}
        table.table-data th, table.table-data td { border: 1px solid #cbd5e1; padding: 10px; text-align: center; }
        table.table-data th { background: var(--primary-light); color: var(--primary-dark); font-weight: 800; }
        .divider { text-align: center; color: #cbd5e1; margin: 20px 0; font-size: 20px; letter-spacing: 5px; }
    </style>
</head>

    }

    function scrollToEvidence(evId) {
        const evElement = document.getElementById(evId);
        if(evElement) {
            evElement.scrollIntoView({behavior: "smooth", block: "center"});
            evElement.classList.remove("focus-blink");
            void evElement.offsetWidth; 
            evElement.classList.add("focus-blink");
            setTimeout(() => evElement.classList.remove("focus-blink"), 2000);
        }
    }

    // Khởi tạo
    window.onload = () => { renderPassage(0); };
</script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Lấy dữ liệu đáp án người dùng đã lưu từ trang Test
        const savedAnswersJSON = localStorage.getItem('snapEnglish_userAnswers');
        
        if (savedAnswersJSON) {
            const userAnswers = JSON.parse(savedAnswersJSON);
            const expBoxes = document.querySelectorAll('.exp-box');

            expBoxes.forEach((box) => {
                const qNumberElement = box.querySelector('.q-number');
                const ansTextElement = box.querySelector('.ans-text');
                
                if (qNumberElement && ansTextElement) {
                    // Lấy số thứ tự câu hỏi (ví dụ "Câu 147" -> 147)
                    const qId = parseInt(qNumberElement.innerText.replace(/\D/g, '')); 
                    
                    // Tự động quét và lấy đáp án đúng (A, B, C, D) từ thẻ HTML
                    const correctAnswerMatch = ansTextElement.innerText.match(/\(([A-D])\)/);
                    const correctAnswer = correctAnswerMatch ? correctAnswerMatch[1] : null;
                    
                    const userAnswer = userAnswers[qId];
                    
                    // Chỉ tạo thẻ hiển thị nếu quét được đáp án
                    if (correctAnswer) {
                        const resultDiv = document.createElement('div');
                        resultDiv.style.margin = "15px 0 10px 0";
                        resultDiv.style.fontWeight = "700";
                        resultDiv.style.padding = "10px 15px";
                        resultDiv.style.borderRadius = "8px";
                        resultDiv.style.fontSize = "15px";
                        resultDiv.style.display = "inline-block";

                        if (!userAnswer) {
                            resultDiv.innerHTML = "Bạn chưa chọn đáp án ⚪";
                            resultDiv.style.backgroundColor = "#f1f3f5";
                            resultDiv.style.color = "#6c757d";
                            resultDiv.style.border = "1px solid #dee2e6";
                        } else if (userAnswer === correctAnswer) {
                            resultDiv.innerHTML = `Bạn đã chọn: <strong>(${userAnswer})</strong> <span style="margin-left: 8px;">✅ Đúng</span>`;
                            resultDiv.style.backgroundColor = "#e8f5e9"; 
                            resultDiv.style.color = "#2e7d32";
                            resultDiv.style.border = "1px solid #c8e6c9";
                        } else {
                            resultDiv.innerHTML = `Bạn đã chọn: <strong>(${userAnswer})</strong> <span style="margin-left: 8px;">❌ Sai</span>`;
                            resultDiv.style.backgroundColor = "#ffebee"; 
                            resultDiv.style.color = "#c62828";
                            resultDiv.style.border = "1px solid #ffcdd2";
                        }
                        
                        // Chèn kết quả vào ngay dưới thẻ chứa đáp án đúng
                        ansTextElement.parentNode.insertBefore(resultDiv, ansTextElement.nextSibling);
                    }
                }
            });
        }
    });
</script>
