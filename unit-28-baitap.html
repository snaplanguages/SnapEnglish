        .exercise-card {

        .ex-title {

            margin-top: 0;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: var(--bg-color);
            border: 2px dashed #fda4af;

            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 30px;

        .question-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--border-light);
            transition: all 0.3s ease;

        .question-block:hover {
            border-color: #fb7185;
            box-shadow: 0 5px 15px rgba(225, 29, 72, 0.1);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;

        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: var(--bg-color);
            border: 2px solid var(--border-light);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: var(--secondary);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #fb7185;
            background: var(--hover-bg);
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;

        .option-btn.incorrect {

            border-color: #ef4444 !important;

        .explanation {

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fff1f2;
            color: #e11d48;
            border-left: 5px solid #f43f5e;
        }

        .explanation ul {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }

        .explanation li {
            margin-bottom: 5px;
        }

        /* Nút quay về lý thuyết (Cập nhật từ back-to-top) */

            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(225, 29, 72, 0.4);

        .btn-back-grammar:hover {
            transform: translateY(-5px);

            color: #ffffff;
            box-shadow: 0 8px 20px rgba(225, 29, 72, 0.5);
        }

        @media (max-width: 768px) {
            .btn-back-grammar { bottom: 15px; left: 15px; padding: 10px 15px; font-size: 0.9em; }

    <script>
        const exData = [
            ["Question 1: Khi muốn nâng ly chúc mừng và hô to '100% nào!', bạn nói thế nào?", 
            ["A. Bottom up!", "B. Be good!", "C. Almost!", "D. After you"], 0, 
            "<ul><li><strong>A đúng:</strong> 'Bottom up!' có nghĩa là 100% nào! (cạn ly).</li><li><strong>B sai:</strong> 'Be good!' nghĩa là Ngoan nhá!</li><li><strong>C sai:</strong> 'Almost!' nghĩa là Gần xong rồi!</li><li><strong>D sai:</strong> 'After you' nghĩa là Xin nhường đi trước.</li></ul>"],

            ["Question 2: Bạn đang mở cửa và muốn nhường một người khác đi vào trước, bạn nên nói gì?", 
            ["A. Do as I say", "B. Come over", "C. After you", "D. Go away!"], 2, 
            "<ul><li><strong>A sai:</strong> Làm theo lời tôi.</li><li><strong>B sai:</strong> Ghé chơi.</li><li><strong>C đúng:</strong> 'After you' dùng để nhường ai đó đi trước.</li><li><strong>D sai:</strong> Cút đi! (Rất bất lịch sự).</li></ul>"],

            ["Question 3: Câu 'Giang sơn khó đổi, bản tính khó dời' tương ứng với câu giao tiếp nào?", 
            ["A. Hit or miss", "B. Always the same", "C. Boys will be boys!", "D. I guess so"], 2, 
            "<ul><li><strong>A sai:</strong> Được chăng hay chớ.</li><li><strong>B sai:</strong> Trước sau như một.</li><li><strong>C đúng:</strong> 'Boys will be boys!' là thành ngữ tương đương với bản tính khó dời.</li><li><strong>D sai:</strong> Tôi đoán vậy.</li></ul>"],

            ["Question 4: 'Tự mình làm thì tự mình chịu đi!' trong tiếng Anh là gì?", 
            ["A. Ask for it!", "B. Make some noise!", "C. Just kidding", "D. Take it or leave it!"], 0, 
            "<ul><li><strong>A đúng:</strong> 'Ask for it!' mang nghĩa chuốc lấy hậu quả, tự làm tự chịu.</li><li><strong>B sai:</strong> Sôi nổi lên nào!</li><li><strong>C sai:</strong> Chỉ đùa thôi.</li><li><strong>D sai:</strong> Chịu thì lấy, không chịu thì thôi!</li></ul>"],

            ["Question 5: Bạn muốn khuyên bạn mình 'Cứ liều thử đi!', hãy dùng câu nào?", 
            ["A. Go for it!", "B. Try your best!", "C. You better believe it!", "D. Mark my words!"], 0, 
            "<ul><li><strong>A đúng:</strong> 'Go for it!' nghĩa là Cứ liều thử đi / Nắm lấy cơ hội đi.</li><li><strong>B sai:</strong> Cố gắng lên (chỉ sự nỗ lực, không có yếu tố 'liều').</li><li><strong>C sai:</strong> Chắc chắn mà!</li><li><strong>D sai:</strong> Nhớ lời tao đó!</li></ul>"],

            ["Question 6: 'Hit or miss' mang nghĩa là gì?", 
            ["A. Đánh hay trượt", "B. Trước sau như một", "C. Được chăng hay chớ", "D. Tự làm tự chịu"], 2, 
            "<ul><li><strong>A sai:</strong> Đây là dịch word-by-word.</li><li><strong>B sai:</strong> Always the same.</li><li><strong>C đúng:</strong> 'Hit or miss' mang nghĩa là Được chăng hay chớ, hên xui.</li><li><strong>D sai:</strong> Ask for it.</li></ul>"],

            ["Question 7: Khi sếp muốn hỏi nhân viên 'Có rảnh không?', sếp sẽ nói:", 
            ["A. What's up?", "B. Got a minute?", "C. How's it going?", "D. What's on your mind?"], 1, 
            "<ul><li><strong>A sai:</strong> Có chuyện gì vậy? (Hỏi thăm).</li><li><strong>B đúng:</strong> 'Got a minute?' (Có một phút không?) nghĩa là Có rảnh không?.</li><li><strong>C sai:</strong> Dạo này ra sao rồi?</li><li><strong>D sai:</strong> Bạn đang lo lắng gì vậy?</li></ul>"],

            ["Question 8: Cụm từ 'Thật là đúng lúc' trong tiếng Anh là:", 
            ["A. In the nick of time", "B. About when?", "C. I'm in a hurry", "D. Give me a certain time!"], 0, 
            "<ul><li><strong>A đúng:</strong> 'In the nick of time' nghĩa là Thật đúng lúc / Vừa kịp lúc.</li><li><strong>B sai:</strong> Vào khoảng thời gian nào?</li><li><strong>C sai:</strong> Tôi đang bận / vội.</li><li><strong>D sai:</strong> Cho mình thêm thời gian!</li></ul>"],

            ["Question 9: Khi một kẻ xấu gặp quả báo, bạn có thể nói 'Đáng đời mày!' bằng câu:", 
            ["A. Poor you!", "B. It serves you right!", "C. That's a lie!", "D. What a jerk!"], 1, 
            "<ul><li><strong>A sai:</strong> Tội nghiệp bạn quá! (Dùng để đồng cảm).</li><li><strong>B đúng:</strong> 'It serves you right!' nghĩa là Đáng đời mày!</li><li><strong>C sai:</strong> Xạo quá!</li><li><strong>D sai:</strong> Thật là đáng ghét.</li></ul>"],

            ["Question 10: 'The more, the merrier!' có nghĩa là gì?", 
            ["A. Cơ hội ngàn năm có một", "B. Không có gì đặc biệt", "C. Càng đông càng vui!", "D. Chuyện này khó tin quá"], 2, 
            "<ul><li><strong>A sai:</strong> It's a kind of once-in-life!</li><li><strong>B sai:</strong> Nothing particular!</li><li><strong>C đúng:</strong> 'The more, the merrier!' nghĩa là Càng đông người thì càng vui.</li><li><strong>D sai:</strong> This is too good to be true!</li></ul>"],

            ["Question 11: 'Take it or leave it!' được dùng với ý nghĩa nào?", 
            ["A. Xin nhường đi trước", "B. Chịu thì lấy, không chịu thì thôi!", "C. Lấy nó hoặc bỏ nó", "D. Đủ rồi đó!"], 1, 
            "<ul><li><strong>A sai:</strong> After you.</li><li><strong>B đúng:</strong> Thành ngữ này mang tính ngã giá: Chịu thì lấy, không chịu thì thôi!</li><li><strong>C sai:</strong> Dịch sát nghĩa đen, không đúng ngữ khí giao tiếp.</li><li><strong>D sai:</strong> This is the limit!</li></ul>"],

            ["Question 12: Khi nghe tin bạn mình vừa trải qua một ca phẫu thuật an toàn, bạn thở phào: 'Thật là nhẹ nhõm!'. Câu đó là:", 
            ["A. What a relief!", "B. What a jerk!", "C. Good job!", "D. Right on!"], 0, 
            "<ul><li><strong>A đúng:</strong> 'What a relief!' thể hiện sự trút bỏ gánh nặng, Thật là nhẹ nhõm.</li><li><strong>B sai:</strong> Thật là đáng ghét.</li><li><strong>C sai:</strong> Làm tốt lắm.</li><li><strong>D sai:</strong> Quá đúng.</li></ul>"],

            ["Question 13: Bạn muốn gọi ai đó 'Sôi nổi lên nào!', bạn dùng:", 
            ["A. Speak up!", "B. Try your best!", "C. Make some noise!", "D. Be good!"], 2, 
            "<ul><li><strong>A sai:</strong> Hãy nói lớn lên!</li><li><strong>B sai:</strong> Cố gắng lên!</li><li><strong>C đúng:</strong> 'Make some noise!' hay được dùng ở các bữa tiệc/concert để bảo mọi người: Sôi nổi lên nào!</li><li><strong>D sai:</strong> Ngoan nhá!</li></ul>"],

            ["Question 14: Khi rủ ai đó làm việc điên rồ và họ đáp 'Tôi hả? Không đời nào!', câu Tiếng Anh là gì?", 
            ["A. No, not a bit", "B. Me? Not likely!", "C. I can't say for sure", "D. Of course!"], 1, 
            "<ul><li><strong>A sai:</strong> Không chẳng có gì.</li><li><strong>B đúng:</strong> 'Me? Not likely!' có nghĩa là Tôi hả? Không đời nào!</li><li><strong>C sai:</strong> Tôi không thể nói chắc.</li><li><strong>D sai:</strong> Dĩ nhiên!</li></ul>"],

            ["Question 15: Cụm từ 'Scratch one's head' diễn tả hành động gì?", 
            ["A. Gãi đầu vì ngứa", "B. Nghĩ muốn nát óc", "C. Vô tình quên mất", "D. Chỉ đùa thôi"], 1, 
            "<ul><li><strong>A sai:</strong> Nghĩa đen.</li><li><strong>B đúng:</strong> Nghĩa bóng trong giao tiếp là Nghĩ muốn nát óc (để giải quyết vấn đề).</li><li><strong>C sai:</strong> Không mang nghĩa quên.</li><li><strong>D sai:</strong> Just kidding.</li></ul>"],

            ["Question 16: 'This is the limit!' mang hàm ý gì?", 
            ["A. Đây là ranh giới", "B. Đủ rồi đó! (Tức giận)", "C. Gần xong rồi!", "D. Thật đúng lúc"], 1, 
            "<ul><li><strong>A sai:</strong> Nghĩa đen.</li><li><strong>B đúng:</strong> Dùng khi hết kiên nhẫn, mang nghĩa Đủ rồi đó!</li><li><strong>C sai:</strong> Almost!</li><li><strong>D sai:</strong> In the nick of time.</li></ul>"],

            ["Question 17: Khi thấy bạn mình ngẩn ngơ, bạn hỏi 'Bạn đang lo lắng gì vậy?', bạn nói:", 
            ["A. What's up?", "B. What's on your mind?", "C. How come?", "D. What have you been doing?"], 1, 
            "<ul><li><strong>A sai:</strong> Có chuyện gì vậy? (Hỏi thăm chung chung).</li><li><strong>B đúng:</strong> 'What's on your mind?' đi sâu vào tâm lý, nghĩa là Bạn đang nghĩ/lo lắng gì vậy.</li><li><strong>C sai:</strong> Làm thế nào vậy?</li><li><strong>D sai:</strong> Dạo này đang làm gì?</li></ul>"],

            ["Question 18: Để nhắc nhở ai đó đi nhanh lên, 'Bạn phải đi ngay!', bạn dùng câu:", 
            ["A. You'll have to step on it.", "B. I won't take but a minute.", "C. Go away!", "D. Don't go yet."], 0, 
            "<ul><li><strong>A đúng:</strong> 'Step on it' nghĩa lóng là tăng tốc/vội lên. Bạn phải đi ngay.</li><li><strong>B sai:</strong> Sẽ không mất nhiều thời gian đâu.</li><li><strong>C sai:</strong> Cút đi!</li><li><strong>D sai:</strong> Đừng đi vội.</li></ul>"],

            ["Question 19: 'Chuyện quái quỷ gì đang diễn ra vậy?' trong tiếng Anh là:", 
            ["A. What the hell are you doing?", "B. What the hell is going on?", "C. How come?", "D. Who knows!"], 1, 
            "<ul><li><strong>A sai:</strong> Anh đang làm cái quái gì thế kia?</li><li><strong>B đúng:</strong> 'What the hell is going on?' hỏi về tình huống: Chuyện quái quỷ gì đang diễn ra vậy?</li><li><strong>C sai:</strong> Sao lại thế?</li><li><strong>D sai:</strong> Ai mà biết được!</li></ul>"],

            ["Question 20: Khi một người bạn giúp bạn qua khỏi rắc rối lớn, bạn cảm thán:", 
            ["A. You better believe it!", "B. You're a life saver!", "C. It serves you right!", "D. Mark my words!"], 1, 
            "<ul><li><strong>A sai:</strong> Chắc chắn mà!</li><li><strong>B đúng:</strong> 'You're a life saver' nghĩa là Bạn đúng là vị cứu tinh.</li><li><strong>C sai:</strong> Đáng đời mày!</li><li><strong>D sai:</strong> Nhớ lời tao đó!</li></ul>"],

            ["Question 21: Hoàn thành câu: 'Hell with _______!' (Thôi kệ nó!)", 
            ["A. haggling", "B. guessing", "C. believing", "D. talking"], 0, 
            "<ul><li><strong>A đúng:</strong> 'Hell with haggling!' là cụm từ cố định trong sách nghĩa là Thôi kệ nó! (Haggling: mặc cả).</li><li><strong>B, C, D sai:</strong> Không nằm trong cụm giao tiếp của bài.</li></ul>"],

            ["Question 22: Điền vào chỗ trống: 'Get your head out of your _______!' (Đừng có giả vờ khờ khạo/ngu ngốc!)", 
            ["A. mind", "B. hat", "C. ass", "D. limit"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Không đúng cụm từ lóng.</li><li><strong>C đúng:</strong> 'Get your head out of your ass!' là câu lóng mang nghĩa Đừng có khờ khạo/ảo tưởng nữa!</li></ul>"],

            ["Question 23: Điền vào chỗ trống: 'In the _______ of time' (Thật đúng lúc)", 
            ["A. point", "B. nick", "C. limit", "D. limit"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Sai từ vựng của idiom.</li><li><strong>B đúng:</strong> 'In the nick of time' là thành ngữ cố định.</li></ul>"],

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        // Nhóm 50 câu vào 1 card chung để tạo danh sách
        const card = document.createElement("div");
        card.className = `exercise-card`;

        let htmlContent = `
            <h2 class="ex-title">🔥 Trắc Nghiệm: 50 Câu Giao Tiếp Thông Dụng</h2>
            <div class="tip-box">
                <span>💡 <strong>Hướng dẫn:</strong> Đọc kỹ câu hỏi tiếng Việt/tiếng Anh và chọn đáp án tương đồng nhất. Đừng quên đọc giải thích để học thêm từ vựng nhé!</span>
            </div>
            <div id="questions-container"></div>
        `;

        card.innerHTML = htmlContent;
        app.appendChild(card);

        const qContainer = document.getElementById("questions-container");

        exData.forEach((qObj) => {
            const [qText, options, correctIndex, expText] = qObj;
            
            const qBlock = document.createElement("div");
            qBlock.className = "question-block";

            const qTitle = document.createElement("div");
            qTitle.className = "question-text";
            qTitle.innerText = qText;
            qBlock.appendChild(qTitle);

            const optContainer = document.createElement("div");
            optContainer.className = "options";
            
            const expDiv = document.createElement("div");
            expDiv.className = "explanation";

            options.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = opt; // Handle potential HTML inside options
                
                btn.onclick = () => {
                    const siblings = optContainer.querySelectorAll(".option-btn");
                    siblings.forEach(sibling => sibling.disabled = true);

                    if(idx === correctIndex) {
                        btn.classList.add("correct");
                        currentScore++;
                        scoreDisplay.innerText = currentScore;
                        expDiv.classList.add("success", "show");
                        expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${expText}`;
                    } else {
                        btn.classList.add("incorrect");
                        siblings[correctIndex].classList.add("correct");
                        expDiv.classList.add("error", "show");
                        expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> ${expText}`;
                    }
                };
                optContainer.appendChild(btn);
            });

            qBlock.appendChild(optContainer);
            qBlock.appendChild(expDiv);
            qContainer.appendChild(qBlock);
        });
