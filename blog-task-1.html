<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Task 1 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Bảng màu SnapEnglish Pastel (Tím, Xanh lá, Cam đất) --- */
        :root {
            --primary: #a29bfe;      /* Tím pastel chủ đạo */
            --primary-dark: #6c5ce7;
            --accent-green: #55efc4; /* Xanh mint tươi sáng */
            --accent-orange: #e7a87c;/* Cam đất ấm áp */
            
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #f4f2ff 100%);
            --text-dark: #2d3436;
            --text-gray: #636e72;
            
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
            --glass-shadow: 0 8px 32px 0 rgba(162, 155, 254, 0.15);
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            margin: 0;
            padding: 50px 20px;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Background Blobs trang trí (Hiệu ứng không gian) --- */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; right: -50px; }
        .shape-2 { width: 350px; height: 350px; background: var(--accent-orange); bottom: -50px; left: -100px; }
        .shape-3 { width: 250px; height: 250px; background: var(--accent-green); top: 40%; left: 30%; filter: blur(100px); opacity: 0.3; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.05); }
        }

        /* --- Header Section --- */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 { 
            font-family: 'Quicksand', sans-serif;
            font-size: 42px; 
            margin-bottom: 10px;
            color: var(--primary-dark);
            letter-spacing: -0.5px;
        }

        .brand-name { color: var(--accent-orange); font-weight: 700; }

        p.subtitle {
            color: var(--text-gray);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }

        /* --- Thanh Tìm Kiếm --- */
        .search-wrapper {
            max-width: 550px;
            margin: 0 auto 50px auto;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 16px 28px;
            border-radius: 20px;
            border: 2px solid transparent;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            font-size: 16px;
            font-family: 'Nunito', sans-serif;
            color: var(--text-dark);
            box-shadow: var(--glass-shadow);
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        #searchInput::placeholder { color: #a4b0be; }

        #searchInput:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
            box-shadow: 0 10px 40px 0 rgba(162, 155, 254, 0.25);
        }

        /* --- Grid Bài Học --- */
        .container { 
            max-width: 1100px; 
            margin: auto; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            padding-bottom: 60px;
        }

        /* --- Card Chuyên Nghiệp --- */
        .task-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 25px;
            border-radius: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: var(--glass-shadow);
        }

        .task-card:hover {
            transform: translateY(-8px);
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 15px 35px rgba(162, 155, 254, 0.3);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .icon-box {
            font-size: 36px;
            width: 65px;
            height: 65px;
            background: #f4f2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            margin-right: 18px;
            transition: 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .task-card:hover .icon-box {
            background: var(--primary);
            color: white;
            transform: scale(1.05) rotate(-5deg);
        }

        .card-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 0;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-gray);
            line-height: 1.5;
            margin: 0 0 20px 0;
            flex-grow: 1;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            border-top: 1px dashed #dfe6e9;
            padding-top: 15px;
        }

        .difficulty-tag {
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .tag-easy { background: #e3fded; color: #00b894; }
        .tag-med { background: #fff3e0; color: #e17055; }
        .tag-hard { background: #ffeaa7; color: #d63031; }

        .view-btn {
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .task-card:hover .view-btn {
            color: var(--accent-orange);
        }

        .hidden { display: none !important; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <div class="header-section">
        <h1>📚 <span class="brand-name">SnapEnglish</span> Task 1</h1>
        <p class="subtitle">Thư viện bài mẫu IELTS Writing Task 1. Chọn dạng biểu đồ bên dưới để phân tích cách viết, từ vựng và cấu trúc ăn điểm.</p>
    </div>
    
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Tìm kiếm dạng bài (VD: Line, Map, Process)...">
    </div>

    <div class="container" id="unitContainer">
        </div>

    <script>
        // Danh sách các dạng bài IELTS Task 1
        const task1Data = [
            { 
                title: "Line Graph", 
                desc: "Biểu đồ đường. Dạng bài phổ biến nhất, tập trung vào việc mô tả xu hướng thay đổi dữ liệu theo thời gian.",
                icon: "📈", 
                url: "samples.html?type=line_graph",
                difficulty: "Dễ tiếp cận",
                tagClass: "tag-easy"
            },
            { 
                title: "Bar Chart", 
                desc: "Biểu đồ cột. Đòi hỏi kỹ năng so sánh sự chênh lệch giữa các hạng mục hoặc xu hướng qua các năm.",
                icon: "📊", 
                url: "samples.html?type=bar_chart",
                difficulty: "Phổ biến",
                tagClass: "tag-med"
            },
            { 
                title: "Pie Chart", 
                desc: "Biểu đồ tròn. Phân tích tỷ lệ phần trăm, thường xuất hiện dưới dạng 2-3 biểu đồ để so sánh.",
                icon: "🔵", 
                url: "samples.html?type=pie_chart",
                difficulty: "Phổ biến",
                tagClass: "tag-med"
            },
            { 
                title: "Table", 
                desc: "Bảng số liệu. Đòi hỏi khả năng lọc thông tin vì lượng dữ liệu thô thường rất nhiều và phức tạp.",
                icon: "📋", 
                url: "samples.html?type=table",
                difficulty: "Nhiều dữ liệu",
                tagClass: "tag-med"
            },
            { 
                title: "Map", 
                desc: "Bản đồ. Mô tả sự quy hoạch, thay đổi của một khu vực hoặc tòa nhà trước và sau một khoảng thời gian.",
                icon: "🗺️", 
                url: "samples.html?type=map",
                difficulty: "Từ vựng phương hướng",
                tagClass: "tag-hard"
            },
            { 
                title: "Process / Diagram", 
                desc: "Biểu đồ quy trình. Yêu cầu mô tả các bước sản xuất, vận hành máy móc hoặc vòng đời sinh học.",
                icon: "🔄", 
                url: "samples.html?type=process",
                difficulty: "Cấu trúc bị động",
                tagClass: "tag-hard"
            },
            { 
                title: "Mixed Charts", 
                desc: "Biểu đồ kết hợp (VD: Line + Bar). Đòi hỏi kỹ năng tổng hợp và liên kết 2 tệp dữ liệu khác nhau.",
                icon: "📉", 
                url: "samples.html?type=mixed",
                difficulty: "Thử thách",
                tagClass: "tag-hard"
            }
        ];

        const container = document.getElementById('unitContainer');
        const searchInput = document.getElementById('searchInput');

        function renderTasks() {
            container.innerHTML = '';
            task1Data.forEach((task, index) => {
                const card = document.createElement('a');
                card.className = 'task-card';
                card.href = task.url;
                card.target = "_blank"; // Tuân thủ yêu cầu mở bài học ở tab mới
                card.setAttribute('data-search', task.title.toLowerCase() + " " + task.desc.toLowerCase());
                
                // Hiệu ứng xuất hiện lần lượt
                card.style.animation = `fadeInUp 0.6s ease forwards`;
                card.style.animationDelay = `${index * 0.08}s`;
                card.style.opacity = "0";

                card.innerHTML = `
                    <div class="card-header">
                        <div class="icon-box">${task.icon}</div>
                        <h3 class="card-title">${task.title}</h3>
                    </div>
                    <p class="card-desc">${task.desc}</p>
                    <div class="card-footer">
                        <span class="difficulty-tag ${task.tagClass}">${task.difficulty}</span>
                        <span class="view-btn">Xem mẫu ➔</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Keyframe cho animation xuất hiện
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(styleSheet);

        // Xử lý bộ lọc tìm kiếm
        searchInput.addEventListener('input', function() {
            const filter = this.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.task-card');
            
            cards.forEach(card => {
                const text = card.getAttribute('data-search');
                if (text.includes(filter)) {
                    card.classList.remove('hidden');
                    card.style.opacity = "1";
                    card.style.animation = "none"; // tắt animation khi search để mượt hơn
                } else {
                    card.classList.add('hidden');
                }
            });
        });

        // Khởi tạo
        renderTasks();
    </script>
    
</body>
</html>
