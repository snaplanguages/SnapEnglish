<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 4 Test 1 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* TÔNG MÀU MỚI: Soft Lavender & Mint Pastel */
        :root {
            --primary: #9284F1;         /* Tím Lavender */
            --primary-hover: #7B6BD7;   
            --secondary: #D4F1F4;       /* Xanh Mint/Aqua pastel */
            --accent: #FF9A8B;          /* Cam Peach điểm nhấn */
            --blue-pastel: #F4F0FF;     /* Tím siêu nhạt */
            --blue-dark: #4A5568;       /* Xám Slate trưởng thành */
            --text-dark: #2D3748;       
            --text-light: #718096;      
            --bg-main: #F7FAFC;         
            --white: #FFFFFF;
            --brand-pink: #FF8A65;      /* Cam san hô cho Logo */
            --brand-text: #2D3748;
            --error-glow: #F43F5E;      /* Đỏ báo lỗi */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }
        .brand-badge {
            background-color: var(--brand-pink);
            color: var(--white);
            font-weight: 800;
            font-size: 26px;
            padding: 8px 20px;
            border-radius: 15px;
            letter-spacing: -0.5px;
        }
        .brand-title {
            color: var(--brand-text);
            font-weight: 800;
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        /* Giao diện mở rộng toàn màn hình */
        .layout-container {
            display: flex;
            gap: 25px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
        }

        .sidebar {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(146, 132, 241, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .progress-section { text-align: center; }
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, #eee 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; transition: background 0.5s;
        }
        .progress-circle::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--white); border-radius: 50%; }
        .progress-text { position: relative; z-index: 1; font-size: 28px; font-weight: 700; color: var(--primary); }

        .instructions { background: var(--blue-pastel); padding: 20px; border-radius: 15px; color: var(--blue-dark); }
        .instructions h3 { margin-bottom: 15px; font-size: 18px; }
        .instructions ul { list-style: none; }
        .instructions li { margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        kbd { background: var(--white); border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px; font-family: monospace; font-size: 13px; font-weight: bold; box-shadow: 0 2px 0 #ccc; color: #333;}

        .main-content {
            flex: 3; background: var(--white); border-radius: 20px; padding: 35px;
            box-shadow: 0 10px 30px rgba(146, 132, 241, 0.15); display: flex; flex-direction: column; position: relative;
        }

        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #eee; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-light); }
        select { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 600; color: var(--text-dark);}

        .audio-section { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px;}
        
        .speaker-badge { display: inline-block; padding: 8px 30px; border-radius: 20px; font-weight: bold; font-size: 16px; }
        .speaker-male { background: #EBF8FF; color: #3182CE; border: 1px solid #BEE3F8; }
        .speaker-female { background: #FFF5F5; color: #E53E3E; border: 1px solid #FED7D7; }

        .btn-play { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 15px rgba(146, 132, 241, 0.3);}
        .btn-play:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .input-section { flex-grow: 1; display: flex; flex-direction: column; }
        
        .message { text-align: center; margin-bottom: 10px; min-height: 45px; }
        .glow-error {
            color: var(--error-glow);
            text-shadow: 0 0 12px rgba(244, 63, 94, 0.6);
            font-weight: 800;
            background: #FFE4E6;
            padding: 2px 6px;
            border-radius: 6px;
            border: 2px dashed var(--error-glow);
            display: inline-block;
            transform: scale(1.05);
        }
        
        textarea { width: 100%; height: 120px; padding: 20px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 22px; outline: none; transition: 0.3s; resize: none; color: var(--text-dark); line-height: 1.6; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(146, 132, 241, 0.2); }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-enter { background: var(--blue-dark); color: var(--white); }
        .btn-enter:hover { background: #2D3748; }
        .btn-hint { background: var(--secondary); color: var(--blue-dark); }
        .btn-hint:hover { background: #B2EBF2; }
        .btn-nav { background: #E2E8F0; color: #4A5568; }
        .btn-nav:hover { background: #CBD5E1; }

        /* MODAL POPUP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 35px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative; max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: #38A169; font-size: 22px; margin-bottom: 15px; text-align: center; }
        .modal-script { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-align: center; padding-bottom: 15px; border-bottom: 2px dashed #eee;}
        .modal-content p { margin-bottom: 10px; line-height: 1.6; font-size: 16px; }
        
        .btn-next-modal { width: 100%; background: var(--primary); color: white; margin-top: 20px; padding: 15px; font-size: 18px; }
        .btn-next-modal:hover { background: var(--primary-hover); }

        /* END SCREEN */
        .end-screen { display: none; text-align: center; padding-top: 20px;}
        .transcript-box { text-align: left; background: #F7FAFC; padding: 25px; border-radius: 15px; height: 400px; overflow-y: auto; margin: 25px 0; border: 1px solid #E2E8F0; line-height: 1.8; font-size: 16px;}

        @media (max-width: 850px) {
            .layout-container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .main-content { flex: none; width: 100%; order: 1; min-height: 500px;}
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="header-brand">
        <div class="brand-badge">SnapEnglish</div>
        <div class="brand-title">Part 4 Test 1</div>
    </div>

    <div class="layout-container" id="app">
        <div class="sidebar">
            <div class="progress-section">
                <h2 style="color: var(--text-dark); margin-bottom: 25px; font-size: 22px;">Tiến độ bài học</h2>
                <div class="progress-circle" id="progress-ring"><div class="progress-text"><span id="progress-percent">0</span>%</div></div>
                <p style="color: var(--text-light); font-weight: 600; margin-top: 15px;">Câu: <span id="current-sentence-num">1</span> / <span id="total-sentences"></span></p>
                <p style="font-size: 14px; color: #888; margin-top: 5px;">Số lần luyện tập: <span id="study-count">0</span></p>
            </div>
            <div class="instructions">
                <h3>⌨️ Hướng dẫn phím tắt</h3>
                <ul>
                    <li><kbd>Ctrl</kbd> Lặp lại Audio.</li>
                    <li><kbd>Tab</kbd> Gợi ý từ tiếp theo.</li>
                    <li><kbd>Enter</kbd> Kiểm tra đáp án / Chuyển câu.</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div id="learning-screen" style="display: flex; flex-direction: column; height: 100%;">
                <div class="settings-bar">
                    <div class="setting-group">
                        <label>Tốc độ:</label>
                        <select id="speed-setting">
                            <option value="0.7">0.7x</option>
                            <option value="0.9" selected>0.9x</option>
                            <option value="1.0">1.0x</option>
                            <option value="1.2">1.2x</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Lặp tự động:</label>
                        <select id="repeat-setting">
                            <option value="1" selected>1 lần</option>
                            <option value="2">2 lần</option>
                            <option value="3">3 lần</option>
                        </select>
                    </div>
                </div>

                <div class="audio-section">
                    <div id="speaker-label" class="speaker-badge speaker-male">📢 Speaker</div>
                    <button class="btn-play" onclick="playAudio()">🔊 Nghe Audio (Ctrl)</button>
                </div>
                
                <div class="message" id="system-message"></div>

                <div class="input-section">
                    <textarea id="user-input" placeholder="Lắng nghe bài thông báo/phát biểu và gõ vào đây..." autofocus></textarea>
                    
                    <div class="actions">
                        <button class="btn btn-nav" onclick="prevSentenceManual()">⬅️ Back</button>
                        <button class="btn btn-enter" onclick="handleEnterAction()">Kiểm tra (Enter)</button>
                        <button class="btn btn-hint" onclick="giveHint()">💡 Gợi ý (Tab)</button>
                        <button class="btn btn-nav" onclick="nextSentenceManual()">Next ➡️</button>
                    </div>
                </div>
            </div>

            <div id="end-screen" class="end-screen">
                <h2 style="color: var(--primary); font-size: 28px;">Tuyệt vời! Hoàn thành Test 🏆</h2>
                <div class="transcript-box" id="full-transcript"></div>
                <div class="actions">
                    <button class="btn btn-enter" onclick="restartLesson()">🔄 Luyện tập lại</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
        <h3>🎉 Chính xác!</h3>
        <div class="modal-script" id="trans-en"></div>
        <p><strong>🇻🇳 Nghĩa:</strong> <span id="trans-vi"></span></p>
        <button class="btn btn-next-modal" onclick="nextSentence()">Qua câu tiếp theo (Enter) ➔</button>
    </div>
</div>

<script>
    // TOÀN BỘ DỮ LIỆU ĐƯỢC TRÍCH XUẤT TỪ PART 4 TEST 1 (Câu 71 đến 100)
    const lessonData = [
        // Talk 1 (71-73)
        { en: "Hi Ms. Xiao. This is Franklin Moore calling from Franklin Auto Express.", vi: "Xin chào cô Xiao. Tôi là Franklin Moore gọi từ Franklin Auto Express.", speaker: "Franklin Moore", gender: "male" },
        { en: "I found the problem with your car's air conditioner - you've got a bad sensor switch, which needs to be replaced.", vi: "Tôi đã tìm ra vấn đề với máy điều hòa ô tô của cô - công tắc cảm biến bị hỏng và cần được thay thế.", speaker: "Franklin Moore", gender: "male" },
        { en: "I ordered the part this morning, but it won't arrive at the shop until tomorrow.", vi: "Tôi đã đặt hàng bộ phận này vào sáng nay nhưng phải đến ngày mai nó mới được giao đến xưởng sửa chữa.", speaker: "Franklin Moore", gender: "male" },
        { en: "So if you'd like, we can offer to lend you a car to use until your car is fixed.", vi: "Vì vậy, nếu cô muốn, chúng tôi có thể cho cô mượn một chiếc xe để sử dụng cho đến khi xe của cô được sửa xong.", speaker: "Franklin Moore", gender: "male" },
        { en: "Please give me a call back at 555-0101.", vi: "Vui lòng gọi lại cho tôi theo số 555-0101.", speaker: "Franklin Moore", gender: "male" },

        // Talk 2 (74-76)
        { en: "Good morning. I called this meeting to discuss how all cashiers at our store should interact with customers.", vi: "Chào buổi sáng. Lý do tôi triệu tập cuộc họp hôm nay là để thảo luận về cách tất cả các nhân viên thu ngân tại cửa hàng của chúng ta nên ứng xử với khách hàng.", speaker: "Manager", gender: "male" },
        { en: "I've noticed that some of you are so focused on scanning items and getting people through the line quickly, that you're ignoring the customers.", vi: "Tôi nhận thấy rằng một số người trong các bạn quá tập trung vào việc quét mã vạch sản phẩm và giải quyết nhanh hàng người chờ thanh toán mà phớt lờ khách hàng.", speaker: "Manager", gender: "male" },
        { en: "We want to leave customers at our supermarket with a good impression, so it's crucial that you greet them.", vi: "Chúng ta muốn để lại ấn tượng tốt cho khách hàng tại siêu thị của chúng ta. Vì vậy, điều vô cùng quan trọng là các bạn phải chào hỏi họ.", speaker: "Manager", gender: "male" },
        { en: "Be sure to be pleasant when they arrive at your cash register.", vi: "Hãy chắc chắn tỏ ra vui vẻ khi họ đến quầy thu ngân của bạn.", speaker: "Manager", gender: "male" },
        { en: "I'm now going to have you work in pairs to play the part of the cashier and customer to practice being friendly while also being fast and efficient.", vi: "Bây giờ tôi sẽ để các bạn làm việc theo cặp, đóng vai nhân viên thu ngân và khách hàng để thực hành thái độ thân thiện trong khi vẫn đảm bảo sự nhanh chóng và hiệu quả.", speaker: "Manager", gender: "male" },

        // Talk 3 (77-79)
        { en: "Hi, it's your neighbor, Indira.", vi: "Xin chào. Tôi là Indira, hàng xóm của bạn đây.", speaker: "Indira", gender: "female" },
        { en: "My return flight was scheduled to leave in an hour and they just announced it's been canceled.", vi: "Chuyến bay khứ hồi của tôi dự kiến khởi hành trong một giờ nữa nhưng họ vừa thông báo rằng nó đã bị hủy.", speaker: "Indira", gender: "female" },
        { en: "I'm standing in line right now, waiting to talk to a ticket agent.", vi: "Bây giờ tôi đang xếp hàng chờ để nói chuyện với nhân viên bán vé.", speaker: "Indira", gender: "female" },
        { en: "I'm so tired of traveling, but it looks like I won't make it home this evening - I think the next flight's in the morning.", vi: "Tôi quá mệt mỏi với việc đi lại rồi, nhưng có vẻ như tối nay tôi sẽ không thể về đến nhà - tôi nghĩ chuyến bay tiếp theo là vào sáng mai.", speaker: "Indira", gender: "female" },
        { en: "Can you believe it?", vi: "Bạn có tin được không?", speaker: "Indira", gender: "female" },
        { en: "Anyway, I have a favor to ask.", vi: "Dù sao thì tôi có một việc muốn nhờ.", speaker: "Indira", gender: "female" },
        { en: "Could you go by my house after work?", vi: "Sau giờ làm việc, bạn có thể ghé qua nhà tôi một lát được không?", speaker: "Indira", gender: "female" },
        { en: "A package was supposed to arrive today, and I'd rather it didn't just sit in front of my door overnight.", vi: "Một bưu kiện dự kiến sẽ đến vào hôm nay, và tôi không muốn nó cứ nằm trước cửa nhà tôi qua đêm.", speaker: "Indira", gender: "female" },
        { en: "I really appreciate it!", vi: "Thực sự cảm ơn bạn rất nhiều!", speaker: "Indira", gender: "female" },

        // Talk 4 (80-82)
        { en: "Welcome to the Hoffman Textiles Factory tour.", vi: "Chào mừng bạn đến với chuyến tham quan Nhà máy Dệt may Hoffman.", speaker: "Guide", gender: "female" },
        { en: "As most of you know, our factory provides quality fabrics to clothing manufacturers around the world.", vi: "Như hầu hết các bạn đã biết, nhà máy của chúng tôi cung cấp các loại vải chất lượng cho các nhà sản xuất quần áo trên toàn thế giới.", speaker: "Guide", gender: "female" },
        { en: "During the tour of the facility, you'll see the care that goes into making each of our many types of fabrics.", vi: "Trong chuyến tham quan cơ sở, các bạn sẽ thấy sự chăm chút được đưa vào việc tạo ra từng loại trong số nhiều loại vải của chúng tôi.", speaker: "Guide", gender: "female" },
        { en: "Now, normally we'd start by showing you how fabric is made on the weaving machines, but another tour group is still in that area.", vi: "Thông thường, chúng tôi sẽ bắt đầu bằng việc chỉ cho các bạn xem vải được tạo ra như thế nào trên các máy dệt, nhưng hiện tại một nhóm tham quan khác vẫn đang ở khu vực đó.", speaker: "Guide", gender: "female" },
        { en: "So today we'll start in the final packaging room and do the tour in reverse, visiting the weaving machines at the end.", vi: "Vì vậy, hôm nay chúng ta sẽ bắt đầu từ phòng đóng gói thành phẩm và thực hiện chuyến tham quan theo trình tự ngược lại, đến thăm các máy dệt vào cuối chuyến.", speaker: "Guide", gender: "female" },
        { en: "Then we can offer you a 10% discount on fabric purchases today only.", vi: "Sau đó, chúng tôi có thể cung cấp cho bạn mức giảm giá 10% khi mua vải chỉ trong ngày hôm nay.", speaker: "Guide", gender: "female" },

        // Talk 5 (83-85)
        { en: "In local news, Westcot Railway officials have revealed a plan for a new railway line to be installed between the capital city, Milton, and the popular tourist destination Greenview City.", vi: "Trong tin tức địa phương, các quan chức của Đường sắt Westcot đã tiết lộ một kế hoạch xây dựng một tuyến đường sắt mới giữa thủ đô Milton và điểm đến du lịch nổi tiếng Thành phố Greenview.", speaker: "Reporter", gender: "female" },
        { en: "Construction on the project is scheduled to begin at the end of this year.", vi: "Quá trình thi công dự án dự kiến bắt đầu vào cuối năm nay.", speaker: "Reporter", gender: "female" },
        { en: "According to the announcement, railway cars on the new line will offer travelers more comfortable seats for the twelve-hour train ride.", vi: "Theo thông báo, các toa tàu trên tuyến mới sẽ cung cấp cho du khách chỗ ngồi thoải mái hơn cho chuyến đi kéo dài 12 giờ.", speaker: "Reporter", gender: "female" },
        { en: "The Travel and Tourism Association has already voiced its strong support for the new railway line.", vi: "Hiệp hội Du lịch và Lữ hành đã lên tiếng ủng hộ mạnh mẽ tuyến đường sắt mới.", speaker: "Reporter", gender: "female" },
        { en: "Jackie Hall, spokesperson for the association, says tourism professionals are happy to see this much-needed upgrade and anticipate a boost to their industry.", vi: "Jackie Hall, người phát ngôn của hiệp hội, cho biết các chuyên gia du lịch rất vui mừng khi thấy đợt nâng cấp rất cần thiết này và dự đoán nó sẽ tạo cú hích cho ngành công nghiệp của họ.", speaker: "Reporter", gender: "female" },

        // Talk 6 (86-88)
        { en: "Welcome to this morning's seminar for freelance writers.", vi: "Chào mừng các bạn đến với hội thảo sáng nay dành cho các nhà văn tự do.", speaker: "Speaker", gender: "male" },
        { en: "Today we'll be discussing strategies for negotiating contracts between you and your publisher.", vi: "Hôm nay chúng ta sẽ thảo luận về các chiến lược đàm phán hợp đồng giữa các bạn và nhà xuất bản của mình.", speaker: "Speaker", gender: "male" },
        { en: "I know some people are still on their way, but another conference is scheduled to begin here at one o'clock.", vi: "Tôi biết một số người vẫn đang trên đường tới đây, nhưng một hội nghị khác dự kiến sẽ bắt đầu ở đây vào lúc một giờ.", speaker: "Speaker", gender: "male" },
        { en: "So let's go over some administrative details.", vi: "Vậy nên chúng ta hãy cùng xem qua một số chi tiết hành chính trước.", speaker: "Speaker", gender: "male" },
        { en: "As you know, the parking fee was included in your registration, so I have passes for everyone.", vi: "Như các bạn đã biết, phí đỗ xe đã được bao gồm trong phí đăng ký, vì vậy tôi có vé đỗ xe cho tất cả mọi người.", speaker: "Speaker", gender: "male" },
        { en: "I'll come around and hand those out now.", vi: "Tôi sẽ đi vòng quanh và phát chúng cho các bạn bây giờ.", speaker: "Speaker", gender: "male" },

        // Talk 7 (89-91)
        { en: "OK, the next topic I want to discuss is staffing.", vi: "Được rồi, chủ đề tiếp theo tôi muốn thảo luận là nhân sự.", speaker: "Manager", gender: "female" },
        { en: "First of all, the management team knows how hard you've all been working in the Information Technology department, and we want to say thank you.", vi: "Trước hết, đội ngũ quản lý biết tất cả các bạn ở bộ phận Công nghệ Thông tin đã làm việc chăm chỉ như thế nào, và chúng tôi muốn nói lời cảm ơn.", speaker: "Manager", gender: "female" },
        { en: "The company has grown a lot over the last year - we've doubled our number of contracts!", vi: "Công ty đã phát triển rất nhiều trong năm qua - chúng ta đã tăng gấp đôi số lượng hợp đồng!", speaker: "Manager", gender: "female" },
        { en: "Because of this, we've decided to hire five additional employees to help with the work load in our department.", vi: "Chính vì điều này, chúng tôi đã quyết định thuê thêm năm nhân viên để giúp giải quyết khối lượng công việc trong bộ phận của chúng ta.", speaker: "Manager", gender: "female" },
        { en: "We recently posted the openings online, but uh, we're hoping to fill these positions as soon as possible.", vi: "Gần đây chúng tôi đã đăng tin tuyển dụng trực tuyến, nhưng chúng tôi hy vọng sẽ lấp đầy những vị trí này càng sớm càng tốt.", speaker: "Manager", gender: "female" },
        { en: "So if you can recommend anyone who meets the qualifications, please contact me at your earliest convenience.", vi: "Vì vậy, nếu bạn có thể giới thiệu bất kỳ ai đáp ứng đủ tiêu chuẩn, vui lòng liên hệ với tôi sớm nhất có thể.", speaker: "Manager", gender: "female" },

        // Talk 8 (92-94)
        { en: "Thanks for listening to Radio KVS.", vi: "Cảm ơn quý vị đã lắng nghe Đài KVS.", speaker: "Host", gender: "male" },
        { en: "I want to remind all our listeners that our free summer concert series starts next week.", vi: "Tôi muốn nhắc tất cả các thính giả của chúng ta rằng chuỗi buổi hòa nhạc mùa hè miễn phí của chúng ta sẽ bắt đầu vào tuần tới.", speaker: "Host", gender: "male" },
        { en: "The first show'll feature legendary guitarist Dimitri Phillips, performing with his band, so this will be a big event!", vi: "Buổi biểu diễn đầu tiên sẽ có sự góp mặt của nghệ sĩ guitar huyền thoại Dimitri Phillips, biểu diễn cùng ban nhạc của anh ấy, vì vậy đây sẽ là một sự kiện lớn!", speaker: "Host", gender: "male" },
        { en: "The performance is next Wednesday in Salsbury Park, beginning at seven, but make sure you get in line early for your free ticket.", vi: "Buổi biểu diễn diễn ra vào thứ Tư tuần sau tại Công viên Salsbury, bắt đầu lúc 7 giờ, nhưng hãy đảm bảo rằng bạn xếp hàng sớm để nhận vé miễn phí.", speaker: "Host", gender: "male" },
        { en: "Attendees can bring in their own food and drink, but certain items are prohibited.", vi: "Những người tham dự có thể tự mang theo đồ ăn và thức uống, nhưng một số vật dụng nhất định bị cấm.", speaker: "Host", gender: "male" },
        { en: "For a full list of what is allowed in the park, check out the park department Web site.", vi: "Để xem danh sách đầy đủ những vật dụng được phép mang vào công viên, hãy kiểm tra trang web của sở công viên.", speaker: "Host", gender: "male" },
        { en: "And if you can't make this show, there will be many concerts throughout the summer.", vi: "Và nếu bạn không thể tham dự buổi biểu diễn này, sẽ còn nhiều buổi hòa nhạc khác diễn ra trong suốt mùa hè.", speaker: "Host", gender: "male" },

        // Talk 9 (95-97)
        { en: "Before we talk about our sales results from this year, let me say how pleased I am with the success that Susie's Online Clothing Boutique has been having.", vi: "Trước khi chúng ta nói về kết quả bán hàng của năm nay, hãy để tôi nói rằng tôi rất vui mừng với thành công mà Susie's Online Clothing Boutique đã đạt được.", speaker: "Susie", gender: "female" },
        { en: "When I started the business last year, I was not sure how well it would do, but the results show that we've exceeded our goal! Of course, there's always room for improvement.", vi: "Khi tôi bắt đầu kinh doanh vào năm ngoái, tôi không chắc nó sẽ hoạt động tốt như thế nào, nhưng kết quả cho thấy chúng ta đã vượt qua mục tiêu của mình! Tất nhiên, luôn có chỗ để cải thiện.", speaker: "Susie", gender: "female" },
        { en: "We know our biggest rival is Fashion Plus.", vi: "Chúng ta biết đối thủ lớn nhất của chúng ta là Fashion Plus.", speaker: "Susie", gender: "female" },
        { en: "This chart compares features of the two companies.", vi: "Biểu đồ này so sánh các tính năng của hai công ty.", speaker: "Susie", gender: "female" },
        { en: "If we want to be competitive, we'll have to offer all the same services.", vi: "Nếu chúng ta muốn cạnh tranh, chúng ta sẽ phải cung cấp tất cả các dịch vụ tương tự.", speaker: "Susie", gender: "female" },
        { en: "So let's talk about what we can add to our services so that we can keep up with Fashion Plus.", vi: "Vì vậy, hãy nói về những gì chúng ta có thể bổ sung vào dịch vụ của mình để có thể theo kịp Fashion Plus.", speaker: "Susie", gender: "female" },

        // Talk 10 (98-100)
        { en: "Welcome to the new employee orientation at Tockney Nature Center.", vi: "Chào mừng các bạn đến với buổi định hướng nhân viên mới tại Trung tâm Tự nhiên Tockney.", speaker: "Speaker", gender: "male" },
        { en: "We're happy that you'll be guiding our bird-watching tours!", vi: "Chúng tôi rất vui vì các bạn sẽ hướng dẫn các chuyến đi xem chim của chúng tôi!", speaker: "Speaker", gender: "male" },
        { en: "Behind me there's a trail map of the Nature Center.", vi: "Phía sau tôi là bản đồ các tuyến đường mòn của Trung tâm Tự nhiên.", speaker: "Speaker", gender: "male" },
        { en: "We'll be walking down trail two so I can show you some interesting spots to take visitors.", vi: "Chúng ta sẽ đi dọc theo tuyến đường số 2 để tôi có thể chỉ cho các bạn một số điểm thú vị để đưa du khách đến tham quan.", speaker: "Speaker", gender: "male" },
        { en: "You can use the other trails as well, except for this trail right here because there's a family of bald eagles nesting nearby.", vi: "Các bạn cũng có thể sử dụng các tuyến đường khác, ngoại trừ tuyến đường ngay tại đây vì có một gia đình đại bàng hói đang làm tổ gần đó.", speaker: "Speaker", gender: "male" },
        { en: "For the first time, the Center's collaborating with the state university on a research project about eagles.", vi: "Lần đầu tiên, trung tâm đang hợp tác với trường đại học tiểu bang trong một dự án nghiên cứu về đại bàng.", speaker: "Speaker", gender: "male" },
        { en: "We've positioned a live camera on one tree there, and we don't want anything to disturb the birds for the duration of the study.", vi: "Chúng tôi đã đặt một camera trực tiếp trên một cái cây ở đó, và chúng tôi không muốn bất cứ thứ gì làm phiền những con chim trong suốt thời gian nghiên cứu.", speaker: "Speaker", gender: "male" }
    ];

    let currentIndex = 0;
    let currentPlayCount = 0;
    let playTimeout;
    const synth = window.speechSynthesis;
    let maleVoice = null;
    let femaleVoice = null;

    const msgBox = document.getElementById("system-message");
    const inputField = document.getElementById("user-input");
    const modalOverlay = document.getElementById("feedback-modal");
    const labelDisplay = document.getElementById("speaker-label");

    function loadVoices() {
        let voices = synth.getVoices();
        if(voices.length === 0) return;
        maleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google UK English Male'))) || voices.find(v => v.lang.startsWith('en'));
        femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Google US English'))) || voices.find(v => v.lang.startsWith('en'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.onload = () => {
        loadVoices();
        let count = localStorage.getItem('part4_test1_count') || 0;
        document.getElementById('study-count').innerText = count;
        document.getElementById('total-sentences').innerText = lessonData.length;
        
        let savedIndex = parseInt(localStorage.getItem('part4_test1_progress'));
        if (!isNaN(savedIndex) && savedIndex < lessonData.length) {
            currentIndex = savedIndex;
        }

        updateUI();
    };

    function updateUI() {
        updateProgress();
        document.getElementById('current-sentence-num').innerText = currentIndex + 1;
        
        const data = lessonData[currentIndex];
        
        if (data.gender === "male") {
            labelDisplay.innerText = "👨 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-male";
        } else {
            labelDisplay.innerText = "👩 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-female";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            e.preventDefault();
            playAudio();
        } else if (e.key === 'Tab') {
            e.preventDefault();
            giveHint();
        } else if (e.key === 'Enter' && modalOverlay.style.display !== "flex") {
            e.preventDefault();
            handleEnterAction();
        }
    });

    function handleEnterAction() {
        if (modalOverlay.style.display === "flex") {
            nextSentence();
        } else {
            checkAnswer();
        }
    }

    function playAudio() {
        currentPlayCount = 0;
        clearTimeout(playTimeout);
        triggerAudioLoop();
    }

    function triggerAudioLoop() {
        if (synth.speaking) synth.cancel();
        
        const data = lessonData[currentIndex];
        const utterThis = new SpeechSynthesisUtterance(data.en);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value);
        
        if (data.gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
        else if (data.gender === 'male' && maleVoice) utterThis.voice = maleVoice;
        
        utterThis.onend = () => {
            currentPlayCount++;
            const maxRepeat = parseInt(document.getElementById('repeat-setting').value);
            if (currentPlayCount < maxRepeat) {
                playTimeout = setTimeout(triggerAudioLoop, 500);
            }
        };
        
        synth.speak(utterThis);
        if (modalOverlay.style.display !== "flex") inputField.focus();
    }

    function normalizeText(text) { return text.toLowerCase().replace(/[.,?!–\-:"]/g, '').trim(); }

    function checkAnswer() {
        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[currentIndex].en);
        
        if (userInput === targetText) {
            msgBox.innerText = "";
            showModal();
        } else {
            const userWordsNorm = userInput.split(' ').filter(w => w !== "");
            const targetWordsNorm = targetText.split(' ');
            const rawWords = rawUserInput.trim().split(/\s+/);

            if (userWordsNorm.length === 0) {
                msgBox.innerText = "Bạn chưa gõ gì cả. Nhấn Ctrl để nghe nhé!";
                return;
            }

            let wrongIndex = -1;
            for (let i = 0; i < userWordsNorm.length; i++) {
                if (userWordsNorm[i] !== targetWordsNorm[i]) {
                    wrongIndex = i;
                    break;
                }
            }

            if (wrongIndex !== -1) {
                let startPos = 0;
                for (let k = 0; k < wrongIndex; k++) {
                    startPos += rawWords[k].length + 1;
                }
                
                const leadingSpaces = inputField.value.length - inputField.value.trimStart().length;
                startPos += leadingSpaces;
                let endPos = startPos + rawWords[wrongIndex].length;

                inputField.focus();
                inputField.setSelectionRange(startPos, endPos);

                let displayHTML = rawWords.map((w, idx) => {
                    if (idx === wrongIndex) {
                        return `<span class="glow-error">${w}</span>`;
                    }
                    return w;
                }).join(' ');

                msgBox.innerHTML = `Vị trí sai:<br><div style="margin-top:12px; font-size:19px; color:var(--text-dark); font-weight: 500;">${displayHTML}</div>`;
                
            } else if (userWordsNorm.length < targetWordsNorm.length) {
                msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
                inputField.focus();
                inputField.setSelectionRange(inputField.value.length, inputField.value.length);
            } else {
                msgBox.innerText = "Có lỗi sai chính tả nhỏ, hãy kiểm tra lại.";
            }
        }
    }

    function giveHint() {
        if (modalOverlay.style.display === "flex") return;

        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[currentIndex].en);
        
        const targetWordsRaw = lessonData[currentIndex].en.split(' ');
        const targetWordsNorm = targetText.split(' ');
        const userWords = userInput.split(' ').filter(w => w !== "");

        let hintWord = targetWordsRaw[userWords.length];
        for (let i = 0; i < userWords.length; i++) {
            if (userWords[i] !== targetWordsNorm[i]) {
                hintWord = targetWordsRaw[i];
                inputField.value = targetWordsRaw.slice(0, i).join(' ') + (i > 0 ? " " : "");
                break;
            }
        }

        if (hintWord) {
            inputField.value += (inputField.value.length > 0 && !inputField.value.endsWith(' ') ? ' ' : '') + hintWord + ' ';
            msgBox.innerText = "Đã điền từ tiếp theo!";
        }
    }

    function showModal() {
        inputField.blur();
        const data = lessonData[currentIndex];
        
        document.getElementById("trans-en").innerText = data.en;
        document.getElementById("trans-vi").innerText = data.vi;
        
        modalOverlay.style.display = "flex";
        document.querySelector('.btn-next-modal').focus();
    }

    function prevSentenceManual() {
        if (currentIndex > 0) {
            currentIndex--;
            resetForNewSentence();
        }
    }

    function nextSentenceManual() {
        if (currentIndex < lessonData.length - 1) {
            currentIndex++;
            resetForNewSentence();
        } else {
            finishLesson();
        }
    }
    
    function resetForNewSentence() {
        modalOverlay.style.display = "none";
        inputField.value = "";
        msgBox.innerHTML = "";
        localStorage.setItem('part4_test1_progress', currentIndex);
        updateUI();
        playAudio();
    }

    function nextSentence() {
        modalOverlay.style.display = "none";
        currentIndex++;
        inputField.value = "";
        msgBox.innerHTML = "";
        
        if (currentIndex < lessonData.length) {
            localStorage.setItem('part4_test1_progress', currentIndex);
            updateUI();
            playAudio();
        } else {
            finishLesson();
        }
    }

    function updateProgress() {
        const percent = Math.round((currentIndex / lessonData.length) * 100);
        document.getElementById("progress-percent").innerText = percent;
        document.getElementById("progress-ring").style.background = `conic-gradient(var(--primary) ${percent}%, #eee 0)`;
    }

    function finishLesson() {
        document.getElementById("learning-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        
        let count = parseInt(localStorage.getItem('part4_test1_count')) || 0;
        count++;
        localStorage.setItem('part4_test1_count', count);
        document.getElementById('study-count').innerText = count;

        localStorage.removeItem('part4_test1_progress');

        const transcriptBox = document.getElementById("full-transcript");
        let htmlContent = "";

        lessonData.forEach(d => {
            const color = d.gender === 'male' ? '#3182CE' : '#E53E3E';
            htmlContent += `<p style="margin-bottom:12px; padding-left: 10px;">
                <strong style="color:${color}">${d.speaker}:</strong> <span style="font-weight: 500;">${d.en}</span><br>
                <span style="color:var(--text-light); font-size: 14px;">${d.vi}</span>
            </p>`;
        });
        transcriptBox.innerHTML = htmlContent;
    }

    function restartLesson() {
        localStorage.setItem('part4_test1_progress', 0);
        location.reload();
    }
</script>
