<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 22 - Câu Bị Động | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ecfdf5;
            --text-main: #064e3b;
            --white: #ffffff;
            --primary: #10b981;
            --secondary: #047857;
            --border-light: #a7f3d0;
            --hover-bg: #d1fae5;
            --snap-brand: #FF6B6B; /* Màu nhấn thương hiệu SnapEnglish */
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#6ee7b7 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* THANH CỐ ĐỊNH NHỎ GỌN */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #10b981, #047857);
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            border: 3px solid #fff;
            border-top: none;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #fff;
            font-size: 1.6em;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            font-weight: 800;
        }

        .subtitle {
            color: #fff;
            font-size: 0.95em;
            font-weight: 700;
            margin-top: 5px;
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 5px 25px;
            border-radius: 20px;
            font-size: 1.25em;
            font-weight: 800;
            color: #059669;
            margin-top: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px dashed #6ee7b7;
            transition: transform 0.3s ease;
        }

        .score-board:hover {
            transform: scale(1.05);
        }

        .container {
            max-width: 900px;
            margin: 30px auto 0;
            padding: 0 20px 50px 20px;
        }

        /* SnapEnglish Brand Elements */
        .snap-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .snap-logo-text {
            font-size: 1.8em;
            font-weight: 800;
            color: #047857;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .snap-logo-text span {
            color: var(--snap-brand);
        }

        .snap-slogan {
            color: #064e3b;
            font-weight: 700;
            font-size: 1.1em;
            margin-top: 5px;
        }

        .snap-footer {
            text-align: center;
            margin-top: 20px;
            padding-bottom: 40px;
            color: #059669;
            font-weight: 600;
            font-size: 0.95em;
        }

        /* Cards & Questions */
        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.15);
            border-top: 8px solid var(--primary);
        }

        .ex-title {
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 0;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #ecfdf5;
            border: 2px dashed #6ee7b7;
            color: #064e3b;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            font-size: 1.05em;
        }

        .question-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .question-block:hover {
            border-color: #34d399;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.1);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--secondary);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: var(--bg-color);
            border: 2px solid var(--border-light);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: var(--secondary);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #34d399;
            background: var(--hover-bg);
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }

        .option-btn.incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            line-height: 1.7;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fff1f2;
            color: #e11d48;
            border-left: 5px solid #f43f5e;
        }

        /* Nút quay về lý thuyết (Cập nhật từ back-to-top) */
        .btn-back-grammar {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #ffffff;
            color: var(--primary);
            padding: 12px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 999;
            border: 2px solid var(--primary);
            gap: 8px;
        }
        
        .btn-back-grammar:hover {
            transform: translateY(-5px);
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.5);
        }

        @media (max-width: 768px) {
            .btn-back-grammar { bottom: 15px; left: 15px; padding: 10px 15px; font-size: 0.9em; }
        }
    </style>
</head>
<body>

    <div class="sticky-header">
        <h1>🛡️ Trạm Luyện Tập Grammar 🛡️</h1>
        <div class="subtitle">Unit 22: Câu Bị Động (Passive Voice)</div>
        <div class="score-board">Điểm: <span id="score">0</span> / 30 ✨</div>
    </div>

    <div class="container" id="app">
        <div class="snap-header">
            <div class="snap-logo-text">📸 Snap<span>English</span></div>
            <p class="snap-slogan">✨ Học tiếng Anh "nhanh như chớp" cùng SnapEnglish ✨</p>
        </div>
        </div>

    <div class="snap-footer">
        <p>Thành thạo Tiếng Anh không khó khi đã có <strong>SnapEnglish</strong>!</p>
        <p>© 2026 SnapEnglish. All rights reserved.</p>
    </div>

    <a href="unit-22-grammar.html" class="btn-back-grammar" title="Về Lý Thuyết">
        <span>🔙 Về Lý Thuyết</span>
    </a>

    <script>
        const exercises = [
            {
                title: "Exercise 1 [202201]: Chia dạng đúng của động từ",
                tip: "Xác định THÌ của câu dựa vào trạng từ chỉ thời gian (tomorrow, since, last year, now...) và áp dụng công thức bị động tương ứng (be + V3/ed).",
                questions: [
                    ["Question 1 [516793]: Tomorrow's meeting (hold) _______ in the hall.", 
                    ["A. is held", "B. will be held", "C. has been held", "D. holds"], 1, 
                    "Dấu hiệu 'Tomorrow' -> Thì tương lai đơn. Bị động tương lai đơn: <strong>will be + V3/ed</strong> (will be held)."],

                    ["Question 2 [516794]: The building (build) _______ on waste land near the town since 2017 by contractors.", 
                    ["A. is built", "B. was built", "C. has been built", "D. had been built"], 2, 
                    "Dấu hiệu 'since 2017' -> Thì hiện tại hoàn thành. Bị động HTHT: <strong>has/have been + V3/ed</strong> (has been built)."],

                    ["Question 3 [516795]: Billions of dollars (spend) _______ on cancer research by the government last year.", 
                    ["A. are spent", "B. was spent", "C. were spent", "D. have been spent"], 2, 
                    "Dấu hiệu 'last year' -> Thì quá khứ đơn. Chủ ngữ 'Billions of dollars' là số nhiều. Bị động QKĐ số nhiều: <strong>were + V3/ed</strong> (were spent)."],

                    ["Question 4 [516796]: References (not use) _______ in the exam rooms.", 
                    ["A. aren't used", "B. won't be used", "C. wasn't used", "D. haven't been used"], 0, 
                    "Đây là một quy định chung/sự thật hiển nhiên -> Thì hiện tại đơn. Bị động HTĐ: <strong>am/is/are + V3/ed</strong> (aren't used)."],

                    ["Question 5 [516797]: Ted (bite) _______ by a bee while he was sitting in the garden.", 
                    ["A. is bitten", "B. was bitten", "C. has been bitten", "D. had been bitten"], 1, 
                    "Hành động xen vào một hành động đang diễn ra trong quá khứ ('while he was sitting') -> Thì quá khứ đơn. Bị động QKĐ: <strong>was/were + V3/ed</strong> (was bitten)."],

                    ["Question 6 [516798]: Make sure your hands (clean) _______ before you have your dinner.", 
                    ["A. are cleaned", "B. were cleaned", "C. have been cleaned", "D. will be cleaned"], 0, 
                    "Mệnh đề chỉ thời gian 'before you have' (hiện tại) -> Vế trước dùng thì hiện tại đơn. Bị động HTĐ: <strong>are cleaned</strong>."],

                    ["Question 7 [516799]: This house and these cars (paint) _______ for Christmas tonight by the Greens.", 
                    ["A. will be painted", "B. are painted", "C. have been painted", "D. were painted"], 0, 
                    "Dấu hiệu 'tonight/for Christmas' -> Sự việc sẽ diễn ra trong tương lai. Bị động TLĐ: <strong>will be painted</strong> (hoặc are going to be painted)."],

                    ["Question 8 [516800]: This T-shirt (wash) _______ so many times that it's lost its shape.", 
                    ["A. was washed", "B. has been washed", "C. is washed", "D. had been washed"], 1, 
                    "Dấu hiệu 'so many times' (nhiều lần tính đến hiện tại) -> Thì hiện tại hoàn thành. Bị động HTHT: <strong>has been washed</strong>."],

                    ["Question 9 [516801]: By the time I came here all the better jobs (take) _______.", 
                    ["A. were taken", "B. have been taken", "C. had been taken", "D. are taken"], 2, 
                    "Dấu hiệu 'By the time + QKĐ (came)' -> Sự việc xảy ra TRƯỚC một thời điểm trong quá khứ -> Thì quá khứ hoàn thành. Bị động QKHT: <strong>had been + V3/ed</strong> (had been taken)."],

                    ["Question 10 [516802]: The first question must (answer) _______ before you attempt the others.", 
                    ["A. answer", "B. be answered", "C. have answered", "D. been answered"], 1, 
                    "Bị động với động từ khuyết thiếu (must): <strong>must be + V3/ed</strong> (must be answered)."],

                    ["Question 11 [516803]: The products damaged during shipment or packaging should (replace) _______ immediately.", 
                    ["A. replace", "B. be replacing", "C. be replaced", "D. have replaced"], 2, 
                    "Bị động với động từ khuyết thiếu (should): <strong>should be + V3/ed</strong> (should be replaced)."],

                    ["Question 12 [516804]: A new hospital (build) _______ next year.", 
                    ["A. was built", "B. will be built", "C. has been built", "D. is built"], 1, 
                    "Dấu hiệu 'next year' -> Thì tương lai đơn. Bị động TLĐ: <strong>will be built</strong>."],

                    ["Question 13 [516805]: My favorite program (show) _______ on TV now. I don't want to miss it.", 
                    ["A. is shown", "B. has been shown", "C. is being shown", "D. was being shown"], 2, 
                    "Dấu hiệu 'now' -> Thì hiện tại tiếp diễn. Bị động HTTD: <strong>am/is/are + being + V3/ed</strong> (is being shown)."],

                    ["Question 14 [516806]: When I came in the room, John (ask) _______ some questions by our teacher.", 
                    ["A. is asked", "B. was asked", "C. was being asked", "D. had been asked"], 2, 
                    "Hành động đang diễn ra tại một thời điểm xác định trong quá khứ (when I came in) -> Thì quá khứ tiếp diễn. Bị động QKTD: <strong>was/were + being + V3/ed</strong> (was being asked)."],

                    ["Question 15 [516807]: The problem already (discuss) _______ by the board of directors when it was proposed again.", 
                    ["A. was already discussed", "B. has already been discussed", "C. had already been discussed", "D. is already discussed"], 2, 
                    "Hành động đã thảo luận xong TRƯỚC KHI được đề xuất lại (when it was proposed - quá khứ) -> Thì quá khứ hoàn thành. Bị động QKHT: <strong>had been + V3/ed</strong>."]
                ]
            },
            {
                title: "Exercise 2 [202202]: Chọn câu có nghĩa gần nhất",
                tip: "Phân tích câu chủ động: Tìm TÂN NGỮ đưa lên làm CHỦ NGỮ, sau đó biến đổi động từ thành dạng Bị Động (be + V3/ed) giữ nguyên thì của câu gốc.",
                questions: [
                    ["Question 1 [516808]: Police reported that a man had helped them with their investigation.", 
                    ["A. Police reported that a man had been helped with their investigation by them.", "B. Police was reported that they had been helped...", "C. Police reported that they had been helped with their investigation by a man.", "D. Police reported that their investigation has been helped by a man."], 2, 
                    "Mệnh đề cần chuyển bị động là 'a man had helped them'. Tân ngữ 'them' đổi thành 'they'. Động từ QKHT 'had helped' -> 'had been helped'. 'by a man' để cuối."],

                    ["Question 2 [516809]: They are going to do further tests on the drug soon.", 
                    ["A. Further tests are going to done on the drug soon.", "B. Further tests are going to do on the drug soon.", "C. Further tests are going to be done on the drug soon.", "D. Further tests are going to be done the drug soon."], 2, 
                    "Tương lai gần 'are going to do' -> bị động: <strong>are going to be done</strong>. Chủ ngữ mới là 'Further tests'."],

                    ["Question 3 [516810]: You ought to read this book on the spot.", 
                    ["A. This book ought to be read on the spot.", "B. This book ought to been read on the spot.", "C. This book ought to being read on the spot", "D. This book ought to have been read on the spot."], 0, 
                    "Bị động với Modal Verb (ought to): <strong>ought to be + V3/ed</strong> (ought to be read)."],

                    ["Question 4 [516811]: They might cancel our plan due to lack of funds.", 
                    ["A. Our plan might be cancelled due to lack of funds.", "B. Our plan might be cancel due to lack of fund", "C. Our plan might cancelled due to lack of funds", "D. Our plan might cancel due to lack of funds."], 0, 
                    "Bị động với Modal Verb (might): <strong>might be + V3/ed</strong> (might be cancelled)."],

                    ["Question 5 [516812]: They had to make plans for extra places in schools in the 1990s.", 
                    ["A. Extra places in schools had to be made plans in the 1990s.", "B. Extra places in schools in the 1990s had to make plans", "C. Extra places in schools were had to make plans in the 1990s", "D. Plans for extra places in schools in the 1990s had to be made."], 3, 
                    "Tân ngữ là 'plans for extra places in schools in the 1990s'. Bị động với 'had to': <strong>had to be + V3/ed</strong> (had to be made)."],

                    ["Question 6 [516813]: The robbers attacked the police from behind.", 
                    ["A. The police was attacked from behind.", "B. The police were attacked from behind.", "C. The police were attacked from behind by the robbers.", "D. The police attracted the robber from behind."], 2, 
                    "Động từ QKĐ 'attacked' -> 'were attacked' (do 'police' luôn là danh từ số nhiều). 'by the robbers' chỉ tác nhân rõ ràng nên C là đáp án đầy đủ và chính xác nhất."],

                    ["Question 7 [516814]: They will not hold the conference in this narrow room.", 
                    ["A. The conference will not be hold in this narrow room.", "B. The conference will not be held in this narrow room.", "C. The conference will not be held in this narrow room by they.", "D. The conference will not been held in this narrow room."], 1, 
                    "Tương lai đơn 'will not hold' -> bị động: <strong>will not be held</strong>. (Lưu ý: V3 của hold là held). Không dùng 'by they'."],

                    ["Question 8 [516815]: They were showing his photograph on television when I turned it on.", 
                    ["A. When I turned television on, he was being shown his photograph on it.", "B. His photograph was being shown on television when I turned it on.", "C. His photograph is being shown on television when I turned it on.", "D. The television was shown his photograph when I turned it on."], 1, 
                    "Quá khứ tiếp diễn 'were showing' -> bị động: <strong>was being shown</strong>. Tân ngữ 'his photograph' lên làm chủ ngữ."],

                    ["Question 9 [516816]: They haven't decided anything yet.", 
                    ["A. Nothing has been decided yet.", "B. Anything haven't been decided yet.", "C. Nothing has decided yet.", "D. Anything have decided yet."], 0, 
                    "'haven't... anything' = 'nothing'. Đưa 'Nothing' lên làm chủ ngữ số ít, động từ chia ở thể khẳng định HTHT bị động: <strong>has been decided</strong>."],

                    ["Question 10 [516817]: John will receive the papers tomorrow.", 
                    ["A. The papers will have been received tomorrow by John.", "B. The papers will be received by John tomorrow.", "C. The papers will be received tomorrow by John.", "D. The papers will have received by John tomorrow."], 1, 
                    "Tương lai đơn 'will receive' -> <strong>will be received</strong>. Quy tắc đặt 'by + O': 'by John' đứng trước trạng từ chỉ thời gian 'tomorrow'."],

                    ["Question 11 [516818]: The fire has caused a considerable damage.", 
                    ["A. A considerable damage been has caused the fire.", "B. A considerable damage has caused the fire.", "C. A considerable damage has been caused by the fire.", "D. A considerable damage has been caused with the fire."], 2, 
                    "Hiện tại hoàn thành 'has caused' -> bị động: <strong>has been caused</strong>. Tác nhân gây ra hành động dùng 'by the fire'."],

                    ["Question 12 [516819]: They have painted the walls green.", 
                    ["A. The walls has painted green.", "B. The green has been painted walls", "C. The walls have been painted green", "D. The walls have painted to green"], 2, 
                    "HTHT 'have painted' -> bị động: <strong>have been painted</strong> (do 'walls' số nhiều). Tân ngữ 'the walls' làm chủ ngữ, tính từ 'green' giữ nguyên vị trí sau động từ."],

                    ["Question 13 [516820]: We're going to give David a big surprise.", 
                    ["A. A big surprise is going to give David", "B. A big surprise is going to be given to David", "C. David is going to give a big surprise", "D. David is going to be given to a big surprise"], 1, 
                    "Tương lai gần 'are going to give'. Nếu lấy tân ngữ chỉ vật (A big surprise) lên làm chủ ngữ -> <strong>is going to be given TO David</strong> (phải có giới từ 'to')."],

                    ["Question 14 [516821]: The police are interviewing all the witnesses.", 
                    ["A. All the witnesses are interviewing the police.", "B. All the witnesses are being interviewed by the police.", "C. All the witnesses is interviewed the police.", "D. All the witnesses were being interviewed by the police."], 1, 
                    "Hiện tại tiếp diễn 'are interviewing' -> bị động: <strong>are being interviewed</strong>. (witnesses số nhiều dùng 'are')."],

                    ["Question 15 [516822]: The mayor is going to open a new airport.", 
                    ["A. A new airport is going to be opened the mayor.", "B. A new airport is going to open by the mayor.", "C. A new airport is going to be opened by the mayor.", "D. A new airport is going to be open by the mayor."], 2, 
                    "Tương lai gần 'is going to open' -> bị động: <strong>is going to be opened</strong>. Phải có 'by the mayor'."]
                ]
            }
        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        exercises.forEach((ex, exIndex) => {
            const card = document.createElement("div");
            card.className = `exercise-card`;

            let htmlContent = `
                <h2 class="ex-title">✨ ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡 <strong>Hướng dẫn:</strong> ${ex.tip}</span>
                </div>
            `;

            card.innerHTML = htmlContent;
            
            const containerId = `ex-container-${exIndex}`;
            const qContainer = document.createElement("div");
            qContainer.id = containerId;
            card.appendChild(qContainer);
            app.appendChild(card);

            ex.questions.forEach((qObj) => {
                const [qText, options, correctIndex, expText] = qObj;
                
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qTitle = document.createElement("div");
                qTitle.className = "question-text";
                qTitle.innerText = qText;
                qBlock.appendChild(qTitle);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                options.forEach((opt, idx) => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(idx === correctIndex) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> Giải thích: ${expText}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings[correctIndex].classList.add("correct");
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> Giải thích: ${expText}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                qContainer.appendChild(qBlock);
            });
        });
    </script>
