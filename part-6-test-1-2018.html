<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Reading Part 6 - 2018 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-purple: #e2d9f3;
            --pastel-green: #d4edda;
            --pastel-orange: #fcd4b6;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.4);
            --primary-btn: #a29bfe;
            --primary-btn-hover: #6c5ce7;
            --accent-btn: #81ecec;
            --accent-btn-hover: #00cec9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--pastel-purple) 0%, var(--pastel-green) 50%, var(--pastel-orange) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-attachment: fixed;
        }

        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.3);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .progress-indicator {
            font-weight: 500;
            color: var(--primary-btn-hover);
            background: rgba(255,255,255,0.8);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .passage-col, .question-col {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .passage-col {
            border-right: 2px dashed rgba(162, 155, 254, 0.3);
            font-size: 1.1rem;
            line-height: 1.8;
            color: #3d3d3d;
        }

        .passage-col p {
            margin-bottom: 1rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(162, 155, 254, 0.5);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(162, 155, 254, 0.8);
        }

        .question-block {
            background: rgba(255, 255, 255, 0.5);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
            transition: transform 0.2s ease;
        }

        .question-block:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.7);
        }

        .question-title {
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--primary-btn-hover);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .option-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .option-label:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--primary-btn);
        }

        .option-label input[type="radio"] {
            margin-right: 1rem;
            accent-color: var(--primary-btn-hover);
            transform: scale(1.2);
        }

        .option-label.selected {
            background: #f0eaff;
            border-color: var(--primary-btn-hover);
            font-weight: 500;
        }

        .footer {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.3);
        }

        .btn {
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-prev {
            background: #fff;
            color: var(--text-dark);
            border: 1px solid #ddd;
        }

        .btn-prev:hover {
            background: #f1f2f6;
        }

        .btn-next {
            background: var(--primary-btn);
            color: #fff;
        }

        .btn-next:hover {
            background: var(--primary-btn-hover);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .btn-submit {
            background: #fdcb6e;
            color: #2d3436;
        }

        .btn-submit:hover {
            background: #ffeaa7;
            box-shadow: 0 4px 15px rgba(253, 203, 110, 0.4);
        }

        .btn-explain {
            background: var(--accent-btn);
            color: #2d3436;
            display: none; 
            margin-left: 10px;
        }

        .btn-explain:hover {
            background: var(--accent-btn-hover);
            box-shadow: 0 4px 15px rgba(0, 206, 201, 0.4);
        }

        /* Result overlay */
        .result-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .result-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .result-box {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: translateY(20px);
            transition: transform 0.5s ease;
        }

        .result-overlay.active .result-box {
            transform: translateY(0);
        }

        .result-box h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary-btn-hover);
        }

        .result-score {
            font-size: 3rem;
            font-weight: 700;
            color: #2d3436;
            margin-bottom: 2rem;
        }
        
        .footer-buttons {
            display: flex;
            gap: 1rem;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            .passage-col {
                border-right: none;
                border-bottom: 2px dashed rgba(162, 155, 254, 0.3);
                height: 40%;
            }
            .question-col {
                height: 60%;
            }
            .glass-container {
                height: 95vh;
            }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header">
        <h1>TOEIC Reading - Part 6</h1>
        <div class="progress-indicator" id="progress-text">Passage 1 / 4</div>
    </div>

    <div class="main-content">
        <div class="passage-col" id="passage-container">
            </div>
        <div class="question-col" id="questions-container">
            </div>
    </div>

    <div class="footer">
        <button class="btn btn-prev" id="btn-prev" onclick="changePassage(-1)" style="display: none;">Quay lại</button>
        <div class="footer-buttons">
            <button class="btn btn-next" id="btn-next" onclick="changePassage(1)">Tiếp theo</button>
            <button class="btn btn-submit" id="btn-submit" onclick="submitQuiz()" style="display: none;">Nộp bài</button>
            <a href="part-6-2018-answers-reading.html" target="_blank" class="btn btn-explain" id="btn-explain">Giải thích đáp án</a>
        </div>
    </div>

    <div class="result-overlay" id="result-overlay">
        <div class="result-box">
            <h2>Hoàn thành xuất sắc! 🌟</h2>
            <div class="result-score">
                <span id="score-correct">0</span> / <span id="score-total">16</span>
            </div>
            <p style="margin-bottom: 1.5rem; color: var(--text-light);">Bạn có thể xem lại bài làm hoặc check giải thích chi tiết.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-prev" onclick="closeResult()">Xem lại bài</button>
                <a href="part-6-2018-answers-reading.html" target="_blank" class="btn" style="background: var(--accent-btn-hover); color: white;">Giải thích đáp án</a>
            </div>
        </div>
    </div>
</div>

<script>
    const quizData = [
        {
            passage: `<p>Cecil Munrow, founder and president of Munrow's, Liverpool's largest retail clothier, announced that he <b>(31) ____________</b> £4,000 to the city's new community center. The funds derive from the sale of tickets to a party held last night at his company's <b>(32) __________</b>. Mr. Munrow will present a check to the center tomorrow at its opening ceremony.</p><p><b>(33) ____________</b> the past twenty years, Mr. Munrow has organized several fund-raising events for charitable institutions and community services <b>(34) _____________</b>.</p>`,
            questions: [
                { id: 31, options: { A: "will donate", B: "donated", C: "might donate", D: "donating" }, correct: "A" },
                { id: 32, options: { A: "museum", B: "hotel", C: "factory", D: "store" }, correct: "D" },
                { id: 33, options: { A: "Despite", B: "Over", C: "Between", D: "Beneath" }, correct: "B" },
                { id: 34, options: { A: "The opening ceremony will begin at 10:00 A.M.", B: "The community center offers classes for adults and children.", C: "Last night’s event was the most successful thus far.", D: "Mr.Munrow plans to open a new location in London next year." }, correct: "C" }
            ]
        },
        {
            passage: `<p>WXO Radio Turns 50!</p><p>On February 3 WXO Radio will celebrate its fiftieth anniversary. That’s half a century of stimulating <b>(35) _________</b>. Over the years, we <b>(36) _______</b> our listeners breaking news, thought-provoking stories, and popular music from around the world.</p><p>Now we invite you to celebrate with us during an open house from 5:00 P.M to 6:30 P.M on February 3 at our Eighth Street studio. Take a tour and see some of the behind-the-scenes magic. Watch a demonstration of our digital audio equipment. <b>(37) _________</b>. The open house is free, but registration is required. We hope you can join us for this <b>(38) ________</b> occasion.</p>`,
            questions: [
                { id: 35, options: { A: "concerts", B: "discussions", C: "programming", D: "development" }, correct: "C" },
                { id: 36, options: { A: "offers", B: "offering", C: "will offer", D: "have offered" }, correct: "D" },
                { id: 37, options: { A: "We plan to merge with another local radio station next year.", B: "You can even meet some of your favorite broadcasters.", C: "This is the first event in our February schedule.", D: "This station continues to be a vital part of your community." }, correct: "B" },
                { id: 38, options: { A: "special", B: "specialize", C: "especially", D: "specialization" }, correct: "A" }
            ]
        },
        {
            passage: `<p>June 8-Today the Bratton City Council approved an agreement with KGRM Enterprises. Under the agreement, KGRM <b>(39) _____</b> the 22-acre lot on Mueller Street. The proposal calls for building both offices and retail stores on the site.</p><p>Bratton's mayor, Keith Wercler, says he welcomes the <b>(40) __________</b> opportunities this project will bring to the area. "We expect the project to create 700 permanent full-time jobs," he said. "I am glad it was finally approved after so many postponements." <b>(41) _________</b>.</p><p>KGRM spokesperson Katie Cornyn expects the project will take five years to complete, yet cautions that setbacks may still occur. "We've provided the council our best <b>(42) ________</b>, but it's not possible to foresee all issues that may arise," Cornyn said.</p>`,
            questions: [
                { id: 39, options: { A: "to develop", B: "will develop", C: "has developed", D: "could have developed" }, correct: "B" },
                { id: 40, options: { A: "economic", B: "unforeseen", C: "volunteer", D: "frequent" }, correct: "A" },
                { id: 41, options: { A: "While the city is anxious for work to get underway, delays are typical for major commercial endeavors such as this.", B: "Nearby tenants, however, have raised some valid concerns about the construction noise.", C: "Despite city officials' promises to grant the company a long-term agreement, they now may have to reconsider.", D: "Council members will vote on three different proposals from the architects." }, correct: "A" },
                { id: 42, options: { A: "argument", B: "background", C: "estimate", D: "combination" }, correct: "C" }
            ]
        },
        {
            passage: `<p>From: Customer Care &lt;custcare@arttodaymag.ca&gt;<br>To: Karina Bhat &lt;kbhat871@5mail.ca&gt;<br>Date: November 5<br>Subject: Welcome to Art Today<br>Attachment: Form</p><p>Dear Ms. Bhat:</p><p>Thank you for subscribing to Art Today! <b>(43) _______</b> you will be among the first to know about exciting art exhibits, concerts, auctions, and festivals throughout Western Canada. Your first issue will arrive within the next few days, and then each issue will be sent at the beginning of the month. <b>(44) ______</b>.</p><p>Your subscription also allows you unlimited <b>(45) _______</b> to articles, videos, and other multimedia on our Web site. All you need to do is log in using your subscriber number and password, which you will find <b>(46) ____</b> the enclosed enrollment form.</p><p>Sincerely,<br>Ken Suzuki<br>Customer Representative</p>`,
            questions: [
                { id: 43, options: { A: "Now", B: "Afterward", C: "Then", D: "Meanwhile" }, correct: "A" },
                { id: 44, options: { A: "To place a subscription, call our service desk during business hours.", B: "If you do not receive your copy in a week, please contact us immediately.", C: "Artists are invited to submit descriptions of their work.", D: "The first concert is scheduled to take place in Vancouver in early October." }, correct: "B" },
                { id: 45, options: { A: "accessing", B: "accesses", C: "accessed", D: "access" }, correct: "D" },
                { id: 46, options: { A: "for", B: "about", C: "on", D: "at" }, correct: "C" }
            ]
        }
    ];

    let currentIndex = 0;
    const userAnswers = {};
    const totalQuestions = quizData.reduce((acc, curr) => acc + curr.questions.length, 0);

    const passageContainer = document.getElementById('passage-container');
    const questionsContainer = document.getElementById('questions-container');
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnSubmit = document.getElementById('btn-submit');
    const btnExplain = document.getElementById('btn-explain');
    const progressText = document.getElementById('progress-text');

    function renderView() {
        const currentData = quizData[currentIndex];
        
        // Render Passage
        passageContainer.innerHTML = currentData.passage;

        // Render Questions
        let html = '';
        currentData.questions.forEach(q => {
            html += `<div class="question-block" id="qb-${q.id}">
                        <div class="question-title">Câu ${q.id}</div>
                        <div class="options">`;
            
            for (const [key, value] of Object.entries(q.options)) {
                const isSelected = userAnswers[q.id] === key;
                html += `
                    <label class="option-label ${isSelected ? 'selected' : ''}">
                        <input type="radio" name="q${q.id}" value="${key}" 
                               ${isSelected ? 'checked' : ''} 
                               onchange="selectAnswer(${q.id}, '${key}')">
                        <b>${key}.</b> &nbsp; ${value}
                    </label>
                `;
            }
            html += `</div></div>`;
        });
        questionsContainer.innerHTML = html;

        // Update Progress & Buttons
        progressText.innerText = `Cụm bài đọc ${currentIndex + 1} / ${quizData.length}`;
        
        btnPrev.style.display = currentIndex === 0 ? 'none' : 'inline-block';
        
        if (currentIndex === quizData.length - 1) {
            btnNext.style.display = 'none';
            btnSubmit.style.display = 'inline-block';
        } else {
            btnNext.style.display = 'inline-block';
            btnSubmit.style.display = 'none';
        }
        
        // Reset scroll position
        passageContainer.scrollTop = 0;
        questionsContainer.scrollTop = 0;
    }

    function selectAnswer(questionId, answer) {
        userAnswers[questionId] = answer;
        
        // Cập nhật UI highlight
        const block = document.getElementById(`qb-${questionId}`);
        const labels = block.querySelectorAll('.option-label');
        labels.forEach(label => label.classList.remove('selected'));
        
        const selectedInput = block.querySelector(`input[value="${answer}"]`);
        if(selectedInput) {
            selectedInput.closest('.option-label').classList.add('selected');
        }
    }

    function changePassage(direction) {
        currentIndex += direction;
        renderView();
    }

    function submitQuiz() {
        let correctCount = 0;
        
        quizData.forEach(passage => {
            passage.questions.forEach(q => {
                if(userAnswers[q.id] === q.correct) {
                    correctCount++;
                }
            });
        });

        document.getElementById('score-correct').innerText = correctCount;
        document.getElementById('score-total').innerText = totalQuestions;
        document.getElementById('result-overlay').classList.add('active');
        
        // Hiển thị nút giải thích đáp án
        btnExplain.style.display = 'inline-block';
    }

    function closeResult() {
        document.getElementById('result-overlay').classList.remove('active');
    }

    // Initialize
    renderView();
</script>

</body>
</html>
