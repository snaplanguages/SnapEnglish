<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 3 - Mạo Từ (Articles)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f8ff;
            --text-main: #4a4a4a;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#bae1ff 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #bae1ff, #baffc9);
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 20px rgba(186, 225, 255, 0.4);
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            color: #2c3e50;
            font-size: 2.8em;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            font-weight: 900;
        }

        .subtitle {
            color: #34495e;
            font-size: 1.2em;
            font-weight: 700;
            margin-top: 10px;
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1.5em;
            font-weight: 800;
            color: #3498db;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 3px dashed #bae1ff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border-top: 10px solid;
            transition: transform 0.3s ease;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.8em;
            font-weight: 800;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #fdf5e6;
            border: 2px dashed #ffdfba;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-weight: 600;
            color: #e67e22;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-block {
            background: #fcfcfc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #e0e0e0;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #bae1ff;
            background: #f0f8ff;
            transform: scale(1.05);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #baffc9 !important;
            border-color: #4ade80 !important;
            color: #166534 !important;
            animation: pop 0.4s ease;
        }

        .option-btn.incorrect {
            background: #ffb3ba !important;
            border-color: #ff6b6b !important;
            color: #991b1b !important;
            opacity: 0.8;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.3s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 5px solid #4ade80;
        }

        .explanation.error {
            background: #ffebee;
            color: #c62828;
            border-left: 5px solid #ff6b6b;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Colors */
        .color-1 { border-top-color: #bae1ff; }
        .color-1 .ex-title { color: #3498db; }
        .color-2 { border-top-color: #baffc9; }
        .color-2 .ex-title { color: #2ecc71; }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #bae1ff;
            color: #2c3e50;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: bold;
        }
        .back-to-top:hover {
            transform: translateY(-5px);
            background: #85c1e9;
        }
    </style>
</head>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Điền mạo từ a/an/the hoặc Ø",
                tip: "Nhớ kỹ nha: 'a/an' cho danh từ đếm được số ít (nhắc lần đầu). 'The' cho danh từ xác định (đã biết, duy nhất, nhắc lần 2). Chỗ nào mang nghĩa chung chung, danh từ không đếm được/số nhiều hoặc tên riêng thì để rỗng (Ø).",
                colorClass: "color-1",
                icon: "⛵",
                questions: [
                    { q: "1. Yesterday morning, I bought ___ electronic iron.", options: ["a", "an", "the", "Ø"], a: "an", exp: "'electronic' bắt đầu bằng nguyên âm 'e' và được nhắc đến lần đầu tiên -> dùng 'an'." },
                    { q: "2. I think ___ man standing over there is seriously ill because his face looks pale.", options: ["a", "an", "the", "Ø"], a: "the", exp: "'man' được xác định rõ ràng bởi mệnh đề 'standing over there' (đứng ở đằng kia) -> dùng 'the'." },
                    { q: "3. I just bought ___ new shirt and some new shoes. ___ shirt was pretty expensive, but ___ shoes weren't.", options: ["a - The - the", "the - A - the", "a - The - Ø", "the - The - the"], a: "a - The - the", exp: "Lần đầu nhắc đến 'shirt' (số ít) dùng 'a'. Câu sau nhắc lại 'shirt' và 'shoes' đều đã được xác định -> dùng 'The / the'." },
                    { q: "4. I really enjoyed ___ book I've just finished reading.", options: ["a", "an", "the", "Ø"], a: "the", exp: "Cuốn sách đã được xác định rõ bằng mệnh đề 'I've just finished reading' (cuốn mà tôi vừa đọc xong) -> dùng 'the'." },
                    { q: "5. I lived on ___ Lombard Street when I first came to town.", options: ["a", "an", "the", "Ø"], a: "Ø", exp: "Trước tên đường (Street) không sử dụng mạo từ -> dùng rỗng (Ø)." },
                    { q: "6. ___ moon appears to change its shape as it goes through its monthly cycle of phases.", options: ["A", "An", "The", "Ø"], a: "The", exp: "Mặt trăng (moon) là danh từ chỉ vật thể duy nhất trong tự nhiên -> dùng 'The'." },
                    { q: "7. Two people were taken to ___ hospital after the accident.", options: ["a", "an", "the", "Ø"], a: "Ø", exp: "Đưa tới bệnh viện để chữa trị (đúng mục đích của bệnh viện) thì không dùng mạo từ -> dùng Ø." },
                    { q: "8. ___ lunch in Spain is ___ bit different from what we're used to in America.", options: ["The - a", "Ø - a", "A - a", "Ø - the"], a: "Ø - a", exp: "Bữa ăn nói chung (lunch) không dùng mạo từ (Ø). Cụm từ cố định 'a bit' mang nghĩa là một chút -> 'a'." },
                    { q: "9. After this tour you have ___ whole afternoon free to explore the city.", options: ["a", "an", "the", "Ø"], a: "the", exp: "Thường dùng cấu trúc 'the whole + N' (toàn bộ cái gì đó) -> 'the whole afternoon'." },
                    { q: "10. I often go to ___ movies but I haven't been to ___ theatre for ages.", options: ["the - the", "a - the", "the - a", "Ø - Ø"], a: "the - the", exp: "Cụm từ cố định chỉ nơi chốn công cộng: 'go to the movies' (đi xem phim) và 'go to the theatre' (đi xem kịch)." },
                    { q: "11. I must go to ___ bank, and then I am going to ___ post office to get some stamps.", options: ["a - a", "the - the", "a - the", "the - a"], a: "the - the", exp: "Ngân hàng (bank) và bưu điện (post office) là các địa điểm công cộng quen thuộc -> dùng 'the'." },
                    { q: "12. They go to ___ church every Sunday.", options: ["a", "an", "the", "Ø"], a: "Ø", exp: "Đi đến nhà thờ để đi lễ (đúng mục đích sử dụng) thì không dùng mạo từ -> Ø." },
                    { q: "13. ___ Times is a British daily national newspaper based in London.", options: ["A", "An", "The", "Ø"], a: "The", exp: "Trước tên của các tờ báo lớn, ta sử dụng mạo từ 'The' (Ví dụ: The New York Times, The Times)." },
                    { q: "14. Yesterday I met ___ university professor at ___ entrance of the lab.", options: ["an - the", "a - the", "the - the", "a - an"], a: "a - the", exp: "'university' phát âm bắt đầu bằng phụ âm /j/ nên dùng 'a'. Lối vào phòng thí nghiệm (entrance of the lab) đã xác định -> 'the'." },
                    { q: "15. The office walls and furniture are ___ uniform grey.", options: ["a", "an", "the", "Ø"], a: "a", exp: "'uniform' phát âm bắt đầu bằng /j/ (phụ âm) -> dùng 'a'. Cụm 'a uniform grey' nghĩa là một màu xám đồng nhất." },
                    { q: "16. He started his working life as ___ engineer but later became ___ teacher.", options: ["a - a", "an - a", "the - the", "an - the"], a: "an - a", exp: "Chỉ nghề nghiệp. 'engineer' bắt đầu bằng nguyên âm -> 'an'. 'teacher' bắt đầu bằng phụ âm -> 'a'." },
                    { q: "17. As every schoolboy knows, ___ earth revolves around ___ sun.", options: ["an - the", "the - the", "the - a", "Ø - the"], a: "the - the", exp: "Cả 'earth' (trái đất) và 'sun' (mặt trời) đều là những vật thể duy nhất -> dùng 'the'." },
                    { q: "18. London used to be ___ financial capital of ___ world.", options: ["the - the", "a - the", "the - a", "Ø - the"], a: "the - the", exp: "'financial capital' được xác định bởi 'of the world'. 'world' là duy nhất -> cả 2 đều dùng 'the'." },
                    { q: "19. James are on the way to ___ airport to catch ___ flight to ___ US.", options: ["the - a - the", "an - the - the", "the - the - the", "an - a - the"], a: "the - a - the", exp: "'airport' (địa điểm công cộng) -> the. 'flight' (chuyến bay, nhắc lần đầu) -> a. 'US' (hợp chủng quốc) -> the." },
                    { q: "20. I often hate ___ winter but I like ___ winter in 2000 when I met my wife for ___ first time.", options: ["the - the - the", "Ø - the - the", "Ø - a - the", "a - the - the"], a: "Ø - the - the", exp: "Mùa nói chung -> Ø. Mùa xác định rõ (winter in 2000) -> the. Số thứ tự (first time) -> the." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice",
                tip: "Nhìn từ phía sau chỗ trống để xác định loại mạo từ. Đừng quên các trường hợp ngoại lệ như 'university', 'hour' hoặc các danh từ duy nhất nhé!",
                colorClass: "color-2",
                icon: "🐢",
                questions: [
                    { q: "1. She wants to be ___ doctor when she grows up.", options: ["A. a", "B. the", "C. an", "D. Ø"], a: "A. a", exp: "Nói về nghề nghiệp chung chung, 'doctor' đếm được số ít và bắt đầu bằng phụ âm -> dùng 'a'." },
                    { q: "2. ___ sun rises in the east and sets in ___ west.", options: ["A. The - the", "B. A - the", "C. The - a", "D. A - a"], a: "A. The - the", exp: "'sun' là vật thể duy nhất, 'west' là phương hướng -> đều phải dùng 'The / the'." },
                    { q: "3. I had ___ little problem with my car, but it's been fixed now.", options: ["A. the", "B. a", "C. an", "D. some"], a: "B. a", exp: "Cấu trúc 'a little' đi với danh từ trừu tượng hoặc không đếm được (ở đây problem đếm được nhưng cụm 'a little problem' mang nghĩa một rắc rối nhỏ) -> 'a'." },
                    { q: "4. Most of ___ international students have met their advisors, but a few of them have appointments next week.", options: ["A. an", "B. the", "C. a", "D. Ø"], a: "B. the", exp: "Sử dụng cấu trúc 'Most of + the / tính từ sở hữu + Danh từ'." },
                    { q: "5. ___ Nile valley divides the country into two parts, the Eastern Desert and the Western Desert.", options: ["A. A", "B. An", "C. The", "D. Ø"], a: "C. The", exp: "Trước tên của thung lũng, dòng sông lớn (Nile) ta sử dụng mạo từ 'The'." },
                    { q: "6. Could you get me half ___ dozen eggs when you go to ___ supermarket?", options: ["A. a - the", "B. a - an", "C. a - a", "D. the - the"], a: "A. a - the", exp: "Cụm 'half a dozen' (nửa tá). Đi siêu thị (địa điểm công cộng quen thuộc) -> dùng 'the'." },
                    { q: "7. ___ great many people have joined the protest to voice their concerns over increased taxes.", options: ["A. The", "B. A", "C. Ø", "D. An"], a: "B. A", exp: "Cụm từ chỉ số lượng: 'A great many + N số nhiều' (Rất nhiều...)." },
                    { q: "8. You should go by ___ bus if you want to see the sights.", options: ["A. the", "B. an", "C. a", "D. Ø"], a: "D. Ø", exp: "Trước tên các phương tiện giao thông đi sau giới từ 'by' (by bus, by car, by train...) thì không dùng mạo từ." },
                    { q: "9. This type of nursery care may well be ___ best choice for your child.", options: ["A. A", "B. An", "C. Ø", "D. the"], a: "D. the", exp: "Tính từ so sánh nhất 'best' luôn đi kèm với mạo từ 'the'." },
                    { q: "10. ___ surface temperature of ___ sun is around 6000 degrees C.", options: ["A. A - the", "B. A - an", "C. The - the", "D. the - a"], a: "C. The - the", exp: "'surface temperature' được xác định bởi 'of the sun'. 'sun' là duy nhất -> cả hai dùng 'The / the'." },
                    { q: "11. A new release starring Keanu Reeves is being shown on ___ TV tonight.", options: ["A. the", "B. Ø", "C. an", "D. a"], a: "B. Ø", exp: "Chỉ việc xem truyền hình nói chung (on TV, watch TV) thì không sử dụng mạo từ." },
                    { q: "12. I have ___ few friends and I love them.", options: ["A. a", "B. an", "C. the", "D. any"], a: "A. a", exp: "Cụm từ 'a few + N đếm được số nhiều' mang ý nghĩa khẳng định (có một vài)." },
                    { q: "13. ___ boy felt down from a tree. An ambulance is taking ___ boy to the hospital.", options: ["A. A - a", "B. A - an", "C. A - the", "D. The - a"], a: "C. A - the", exp: "Câu đầu nhắc đến 'cậu bé' lần đầu -> dùng 'A'. Câu sau nhắc lại chính cậu bé đó -> dùng 'the'." },
                    { q: "14. On ___ first day of term, the school issued the students with their textbooks.", options: ["A. the", "B. a", "C. Ø", "D. an"], a: "A. the", exp: "Trước số thứ tự 'first' luôn sử dụng mạo từ 'the'." },
                    { q: "15. He plays ___ guitar and sings folk songs.", options: ["A. the", "B. Ø", "C. a", "D. an"], a: "A. the", exp: "Sau động từ 'play' mà chỉ việc chơi nhạc cụ thì bắt buộc phải dùng mạo từ 'the' (play the guitar)." },
                    { q: "16. ___ Browns have been living in New York since they migrated to ___ America in 2000.", options: ["A. The - a", "B. The - Ø", "C. Ø - a", "D. a - a"], a: "B. The - Ø", exp: "'Browns' chỉ một gia đình họ Brown -> dùng 'The'. 'America' là tên quốc gia nói chung -> không dùng mạo từ (Ø)." },
                    { q: "17. ___ most striking technological success in ___ twentieth century is probably the computer revolution.", options: ["A. A - an", "B. Ø - the", "C. The - a", "D. The - the"], a: "D. The - the", exp: "'most striking' là so sánh nhất -> dùng 'The'. 'twentieth century' là số thứ tự kỷ -> dùng 'the'." },
                    { q: "18. ___ rich have the responsibility to help ___ poor.", options: ["A. Ø - Ø", "B. A - a", "C. The - the", "D. An - an"], a: "C. The - the", exp: "The + Tính từ (rich, poor) tạo thành danh từ số nhiều chỉ một tầng lớp người." },
                    { q: "19. ___ large number of students in this school speak English quite fluently.", options: ["A. A", "B. An", "C. The", "D. Ø"], a: "A. A", exp: "Cấu trúc chỉ số lượng: 'A large number of + N đếm được số nhiều' (Nhiều...)." },
                    { q: "20. Would you like ___ glass of milk tea or ___ cup of hot chocolate after dinner?", options: ["A. a - a", "B. the - the", "C. Ø - Ø", "D. Ø - a"], a: "A. a - a", exp: "Cụm danh từ đong đếm: 'a glass of' (một ly), 'a cup of' (một tách)." },
                    { q: "21. ___ whale feeds by opening its mouth wide, waiting for masses of shrimp like animals called krill.", options: ["A. A", "B. The", "C. An", "D. Any"], a: "B. The", exp: "The + Danh từ số ít (whale) dùng để đại diện cho cả một loài động vật." },
                    { q: "22. We went by ___ train to ___ west of England.", options: ["A. Ø - Ø", "B. Ø - the", "C. a - the", "D. the - the"], a: "B. Ø - the", exp: "Đi lại bằng tàu 'by train' -> Ø. Phương hướng 'west' (phía tây) -> the." },
                    { q: "23. ___ old man is working this factory. I borrowed his bicycle yesterday.", options: ["A. A", "B. An", "C. The", "D. Ø"], a: "B. An", exp: "'old man' được nhắc lần đầu, số ít và bắt đầu bằng nguyên âm 'o' -> dùng 'An'." },
                    { q: "24. ___ New York Times is a daily newspaper published in New York city.", options: ["A. The", "B. Ø", "C. A", "D. An"], a: "A. The", exp: "Tên các tờ báo (New York Times) thường đi với mạo từ 'The'." },
                    { q: "25. He plays ___ badminton better than she does.", options: ["A. a", "B. the", "C. Ø", "D. an"], a: "C. Ø", exp: "Trước tên của các môn thể thao (badminton, football, tennis...) thì không dùng mạo từ." },
                    { q: "26. He usually works early in ___ morning.", options: ["A. a", "B. an", "C. any", "D. the"], a: "D. the", exp: "Cụm từ cố định chỉ các buổi trong ngày: 'in the morning, in the afternoon, in the evening'." },
                    { q: "27. The teams have been playing for ___ hour.", options: ["A. an", "B. a", "C. many", "D. the"], a: "A. an", exp: "Từ 'hour' có chữ 'h' bị câm, nên phát âm bắt đầu bằng nguyên âm -> dùng 'an'." },
                    { q: "28. Of the three girls, Mary is ___ tallest.", options: ["A. Ø", "B. the", "C. a", "D. an"], a: "B. the", exp: "'tallest' là dạng so sánh hơn nhất của tính từ nên bắt buộc phải có 'the'." },
                    { q: "29. My success depends on my ___ friend helping me.", options: ["A. a", "B. an", "C. Ø", "D. the"], a: "C. Ø", exp: "Khi đã có tính từ sở hữu (my, your, his...) đứng trước danh từ thì không dùng mạo từ nữa." },
                    { q: "30. ___ on the table is interesting.", options: ["A. The book", "B. A book", "C. Some book", "D. Book"], a: "A. The book", exp: "Cuốn sách được xác định cụ thể bởi cụm từ chỉ vị trí 'on the table' (trên bàn) -> dùng The book." },
                    { q: "31. Shall we go out to ___ cinema or stay at home?", options: ["A. a", "B. an", "C. the", "D. No article"], a: "C. the", exp: "Cụm từ chỉ địa điểm công cộng giải trí quen thuộc: 'go to the cinema'." },
                    { q: "32. Oh, you've got ___ lot of candies! Will you split with us?", options: ["A. a", "B. an", "C. the", "D. many"], a: "A. a", exp: "Cụm từ chỉ số lượng quen thuộc: 'a lot of' (rất nhiều)." },
                    { q: "33. Marie Curie was ___ first woman who was awarded the Nobel Prize in ___ chemistry.", options: ["A. a - the", "B. Ø - the", "C. the - Ø", "D. a - a"], a: "C. the - Ø", exp: "'first' là số thứ tự -> the. 'chemistry' là môn học -> không dùng mạo từ (Ø)." },
                    { q: "34. Laura first went to HaNoi, which is ___ capital of VietNam.", options: ["A. Ø", "B. the", "C. an", "D. a"], a: "B. the", exp: "Thủ đô (capital) của một quốc gia là duy nhất -> dùng 'the'." },
                    { q: "35. ___ Pacific Ocean, which might have been crossed by raft during the Stone Age, is the world's largest ocean.", options: ["A. The", "B. A", "C. Any", "D. Some"], a: "A. The", exp: "Tên của các đại dương (Thái Bình Dương - Pacific Ocean) bắt buộc phải đi với mạo từ 'The'." },
                    { q: "36. My favourite colour is ___ blue.", options: ["A. Ø", "B. the", "C. a", "D. some"], a: "A. Ø", exp: "Trước các danh từ chỉ màu sắc (blue, red, green...) không sử dụng mạo từ." },
                    { q: "37. ___ noise of the airplanes taking off from ___ airport over our house was unbearable at times.", options: ["A. A - a", "B. A - the", "C. The - a", "D. The - the"], a: "D. The - the", exp: "'noise' được xác định bởi cụm 'of the airplanes...'. 'airport' là địa điểm công cộng -> cả hai dùng 'the'." },
                    { q: "38. They work in ___ hospital sponsored by the government.", options: ["A. the", "B. a", "C. No article", "D. any"], a: "B. a", exp: "Nói đến việc làm việc tại 'một' bệnh viện (nhấn mạnh nghề nghiệp, chưa phải bệnh viện cụ thể người nghe đều biết) -> dùng 'a'." },
                    { q: "39. Students don't have to go to ___ school on sunday.", options: ["A. the", "B. an", "C. a", "D. Ø"], a: "D. Ø", exp: "Đi học đúng với mục đích của trường (go to school) thì không sử dụng mạo từ." },
                    { q: "40. Look at ___ board, please!", options: ["A. some", "B. a", "C. the", "D. No article"], a: "C. the", exp: "Cái bảng (board) trong lớp học là vật thể cả người nói và người nghe đều đang nhìn thấy rõ ràng -> dùng 'the'." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex, exIndex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            // Title & Tip
            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span>${ex.tip}</span>
                </div>
            `;

            // Questions
            ex.questions.forEach((qObj, qIndex) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                // Question Text
                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                // Options Container
                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                // Explanantion Container
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Sai rồi! Đáp án đúng là: ${qObj.a}.</strong> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
