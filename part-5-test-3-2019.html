<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 5 - Test 3 - 2019 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
        
    <style>
        :root {
            /* Tông màu Cute, Hoa hòe & Trưởng thành (Pink/Purple/Floral Pastel) */
            --primary: #f472b6;       /* Soft Pink */
            --primary-dark: #be185d;  /* Deep Pink */
            --secondary: #a855f7;     /* Purple */
            --secondary-dark: #7e22ce;
            --bg-body: #fdf2f8;       /* Very light pink */
            --bg-card: #ffffff;
            --text-main: #334155;
            --text-light: #64748b;
            --border: #fbcfe8;
            --correct-bg: #f0fdf4;
            --correct-text: #166534;
            --correct-border: #bbf7d0;
            --wrong-bg: #fff1f2;
            --wrong-text: #9f1239;
            --wrong-border: #fecdd3;
            --grammar-bg: #faf5ff;
            --grammar-border: #e9d5ff;
            --vocab-bg: #fffbeb;
            --vocab-border: #fde68a;
            --header-h: 75px;
        }
        ::selection { background: #fbcfe8; color: #be185d; }
        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(#fbcfe8 1.5px, transparent 1.5px);
            background-size: 25px 25px; /* Họa tiết chấm bi hoa hòe tinh tế */
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden; 
        }

        /* --- HEADER CHÍNH --- */
        header {
            height: var(--header-h); background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(244, 114, 182, 0.15);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 1000; flex-shrink: 0;
            position: relative;
            border-bottom: 2px solid var(--border);
        }
        
        .brand { font-size: 22px; font-weight: 800; color: #334155; display: flex; align-items: center; gap: 10px; }
        .brand span { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; padding: 4px 14px; border-radius: 10px; font-size: 16px; 
            box-shadow: 0 4px 10px rgba(244, 114, 182, 0.3);
        }

        .controls { display: flex; gap: 15px; align-items: center; }

        .btn-nav-local {
            background: transparent; color: var(--secondary); border: 2px solid var(--secondary);
            padding: 8px 16px; border-radius: 10px; font-weight: 700; font-size: 14px; 
            cursor: pointer; transition: 0.3s; text-decoration: none;
        }
        .btn-nav-local:hover { background: var(--secondary); color: white; }

        .btn-nav-toggle {
            background: #fff; color: var(--primary-dark); border: 2px solid var(--primary);
            padding: 8px 20px; border-radius: 10px; font-weight: 700; font-size: 15px; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px;
            font-family: inherit;
        }
        .btn-nav-toggle:hover { background: var(--primary); color: white; }

        .btn-submit { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; border: none; padding: 10px 28px; 
            border-radius: 10px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(244, 114, 182, 0.4); font-family: inherit;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4); }

        /* --- DROPDOWN LIST --- */
        .nav-dropdown {
            position: absolute; top: calc(var(--header-h) + 15px); right: 40px;
            background: rgba(255, 255, 255, 0.98); border-radius: 16px; border: 2px solid var(--border);
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); width: 340px;
            max-height: 400px; overflow-y: auto; z-index: 999; backdrop-filter: blur(10px);
            padding: 20px; display: none; grid-template-columns: repeat(5, 1fr); gap: 12px;
            opacity: 0; transform: translateY(-10px); transition: 0.3s ease;
        }
        .nav-dropdown.show { display: grid; opacity: 1; transform: translateY(0); }
        .nav-dropdown::-webkit-scrollbar { width: 6px; }
        .nav-dropdown::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .nav-dot {
            height: 45px; border: 2px solid #e2e8f0; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700;
            cursor: pointer; color: var(--text-light); background: #f8fafc; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-dot:hover { border-color: var(--primary); color: var(--primary); transform: scale(1.05); }
        .nav-dot.done { background: var(--bg-body); color: var(--primary-dark); border-color: var(--primary); }
        .nav-dot.correct { background: var(--correct-bg); color: var(--correct-text); border-color: var(--correct-border); }
        .nav-dot.wrong { background: var(--wrong-bg); color: var(--wrong-text); border-color: var(--wrong-border); }
        .nav-dot.active { box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.3); border-color: var(--primary-dark); color: var(--primary-dark); }

        /* --- MAIN KHU VỰC CÂU HỎI --- */
        .main-area {
            flex: 1; width: 100vw; max-width: 100%; overflow-y: auto; padding: 40px 5%; /* FULL SCREEN WIDTH */
            display: flex; justify-content: center; align-items: flex-start; scroll-behavior: smooth;
        }
        
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 5px; border: 2px solid #fff; }
        ::-webkit-scrollbar-thumb:hover { background: #f472b6; }

        .question-card {
            background: var(--bg-card);
            width: 100%; max-width: none; 
            border-radius: 20px;
            padding: 40px 50px;
            box-shadow: 0 10px 30px rgba(244, 114, 182, 0.1);
            border: 2px solid #fff;
            display: none;
            animation: slideUpFade 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .question-card.active { display: block; }

        @keyframes slideUpFade { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* HEADER CỦA CÂU HỎI */
        .q-header { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px dashed var(--border); padding-bottom: 20px; margin-bottom: 30px;
        }
        .q-header-left { display: flex; align-items: center; gap: 15px; }
        .q-num { font-size: 22px; font-weight: 800; color: var(--primary-dark); letter-spacing: -0.5px;}
        
        .timer-pill {
            font-weight: 700; color: #e11d48; background: #ffe4e6; 
            padding: 8px 16px; border-radius: 20px; font-size: 15px;
            display: flex; align-items: center; gap: 6px;
            border: 2px solid #fecdd3;
            box-shadow: 0 4px 10px rgba(225, 29, 72, 0.1);
        }

        .q-counter-pill {
            font-weight: 700; color: var(--secondary-dark); background: #f3e8ff; 
            padding: 8px 18px; border-radius: 20px; font-size: 15px;
            border: 2px solid #e9d5ff;
        }

        .q-text { 
            font-size: 19px; line-height: 1.7; font-weight: 600; margin-bottom: 30px; 
            color: var(--text-main); 
        }

        /* CÁC ĐÁP ÁN */
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option {
            background: #ffffff; border: 2px solid #e2e8f0; border-radius: 14px;
            padding: 16px 24px; font-size: 17px; font-weight: 500; cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; justify-content: space-between; color: #475569;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .option:hover:not(.disabled) { background: #f8fafc; border-color: var(--primary); transform: translateX(5px); }
        .option.selected { 
            background: var(--bg-body); border-color: var(--primary); color: var(--primary-dark); 
            font-weight: 700; box-shadow: 0 4px 15px rgba(244, 114, 182, 0.15); 
        }
        .option.disabled { cursor: default; }
        
        .option.correct { background: var(--correct-bg); border-color: #4ade80; color: var(--correct-text); font-weight: 700; }
        .option.wrong { background: var(--wrong-bg); border-color: #fb7185; color: var(--wrong-text); opacity: 0.95;}

        /* --- NAVIGATION BUTTONS --- */
        .q-nav-buttons {
            display: flex; justify-content: flex-end; margin-top: 35px;
        }
        .btn-nav.next { 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: white; border: none; font-family: inherit;
            box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3); border-radius: 30px; 
            padding: 12px 35px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s;
        } 
        .btn-nav.next:hover:not(:disabled) { transform: translateX(5px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4); }
        .btn-nav:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* --- PHẦN GIẢI THÍCH CHI TIẾT --- */
        .explanation-box {
            display: none; margin-top: 45px; animation: slideUpFade 0.6s ease forwards;
            border-top: 3px dashed var(--border); padding-top: 35px;
        }
        .explanation-box.show { display: block; }
        
        .exp-main-title { 
            font-size: 20px; font-weight: 800; color: var(--primary-dark); margin-bottom: 25px; 
            display: flex; align-items: center; gap: 10px; text-transform: uppercase; letter-spacing: 0.5px;
            background: -webkit-linear-gradient(45deg, var(--primary-dark), var(--secondary-dark));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .exp-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        
        .box { padding: 22px; border-radius: 16px; border: 2px solid; font-size: 16px; line-height: 1.7; box-shadow: 0 4px 10px rgba(0,0,0,0.02);}
        .box-title { font-weight: 800; font-size: 17px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px;}
        
        .box-correct { background: var(--correct-bg); border-color: var(--correct-border); color: #064e3b; }
        .box-correct .box-title { color: var(--correct-text); }
        
        .box-wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: #881337; }
        .box-wrong .box-title { color: var(--wrong-text); }
        .box-wrong ul { margin: 0; padding-left: 22px; }
        .box-wrong li { margin-bottom: 8px; }
        
        .box-grammar { background: var(--grammar-bg); border-color: var(--grammar-border); color: #4c1d95; }
        .box-grammar .box-title { color: #6d28d9; }
        .box-grammar table { width: 100%; border-collapse: collapse; margin-top: 15px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05);}
        .box-grammar th { background: #e9d5ff; padding: 12px; text-align: left; color: #5b21b6; font-weight: 700;}
        .box-grammar td { padding: 12px; border-bottom: 1px solid #e9d5ff; background: #fff;}
        
        .box-vocab { background: var(--vocab-bg); border-color: var(--vocab-border); color: #78350f; }
        .box-vocab .box-title { color: #b45309; }
        
        .box-trans { 
            background: #f8fafc; border-color: #e2e8f0; color: #334155; font-style: italic; 
            border-left: 6px solid var(--secondary); font-size: 17px;
        }
        .box-trans .box-title { color: var(--secondary-dark); font-style: normal;}

        /* --- MODALS --- */
        .custom-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 99999; }
        .custom-modal { background: white; padding: 45px; border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); width: 90%; max-width: 450px; text-align: center; border: 2px solid var(--primary); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .custom-modal h2 { color: var(--primary-dark); font-size: 28px; margin-top: 0; font-weight: 800; margin-bottom: 15px;}
        .modal-actions { display: flex; gap: 15px; margin-top: 30px; }
        .btn-modal { flex: 1; padding: 14px; border-radius: 12px; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; font-family: inherit; border: none; }
        .btn-cancel { background: #f1f5f9; color: #475569; }
        .btn-cancel:hover { background: #e2e8f0; color: #1e293b;}
        .btn-confirm-start { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 6px 15px rgba(244, 114, 182, 0.3); }
        .btn-confirm-start:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4); }
        #timeInput { width: 100px; padding: 12px; font-size: 18px; text-align: center; border: 3px solid var(--border); border-radius: 12px; outline: none; font-weight: 800; color: var(--primary-dark); font-family: inherit; transition: 0.3s;}
        #timeInput:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(244, 114, 182, 0.2); }
        /* 1. Màn hình Tablet / Laptop màn hình nhỏ */
@media (max-width: 1024px) {
    .question-card { padding: 30px 40px; }
    header { padding: 0 20px; }
    .nav-dropdown { right: 20px; }
}

/* 2. Màn hình Điện thoại di động (Mobile) */
@media (max-width: 768px) {
    :root {
        --header-h: auto; /* Để header tự động co giãn theo nội dung */
    }
    
    /* Căn lại Header và các nút bấm */
    header {
        flex-direction: column;
        padding: 15px;
        gap: 12px;
        text-align: center;
    }
    .brand {
        font-size: 18px;
        justify-content: center;
        flex-wrap: wrap;
    }
    .controls {
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
        width: 100%;
    }
    .btn-nav-local, .btn-nav-toggle, .btn-submit {
        font-size: 13px;
        padding: 8px 12px;
        flex-grow: 1; /* Để các nút dàn đều chiều ngang trên mobile */
        text-align: center;
        justify-content: center;
    }
    
    /* Căn lại Bảng danh sách câu hỏi (Dropdown) */
    .nav-dropdown {
        top: 140px; 
        left: 5%;
        right: 5%;
        width: auto;
        grid-template-columns: repeat(5, 1fr);
    }

    /* Thu nhỏ khoảng cách khu vực làm bài chính */
    .main-area { padding: 20px 15px; }
    .question-card { padding: 20px; border-radius: 16px; }
    
    .q-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }
    .q-header-left { width: 100%; justify-content: space-between; }
    .q-counter-pill { width: 100%; justify-content: center; }
    
    .q-text { font-size: 17px; margin-bottom: 20px; }
    
    /* Các đáp án: Chuyển thành dạng cột nếu câu trả lời quá dài */
    .option { 
        font-size: 15px; 
        padding: 12px 15px; 
        flex-direction: column; 
        align-items: flex-start; 
        gap: 8px; 
    }
    .option span[id^="badge-"] { padding-left: 0; align-self: flex-start; font-size: 13px; }
    
    /* Thu gọn phần Giải thích chi tiết */
    .exp-main-title { font-size: 18px; }
    .box { padding: 15px; font-size: 15px; }
    
    /* Nút "Câu Tiếp Theo" tràn viền cho dễ bấm trên cảm ứng */
    .q-nav-buttons { justify-content: center; margin-top: 25px; }
    .btn-nav.next { width: 100%; font-size: 15px; padding: 12px; }

    /* Thu gọn Modals (Popup) */
    .custom-modal { padding: 25px 20px; width: 92%; }
    .custom-modal h2 { font-size: 22px; }
    .modal-actions { flex-direction: column; gap: 10px; }
    .btn-modal { width: 100%; }
    
    /* Box nhập thời gian */
    #timeInput { width: 80px; font-size: 16px; padding: 10px; }
}

/* 3. Màn hình Điện thoại cực nhỏ (Ví dụ: iPhone SE cũ) */
@media (max-width: 480px) {
    .nav-dropdown { grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .nav-dot { height: 40px; font-size: 14px; }
    .brand span { font-size: 13px; padding: 3px 10px;}
    .timer-pill, .q-counter-pill { font-size: 13px; padding: 6px 12px; }
}
    </style>
</head>
<body>

<div id="setupOverlay" class="custom-overlay" style="display: flex;">
    <div class="custom-modal">
        <h2>Sẵn sàng chưa? 🌸</h2>
        <p style="font-size: 16px; color: #64748b; margin-bottom: 25px; line-height: 1.6;">Cài đặt thời gian làm bài Part 5<br>(Gợi ý: 15-20 phút cho 30 câu)</p>
        <div style="margin-bottom: 30px; display: flex; justify-content: center; align-items: center; gap: 12px;">
            <input type="number" id="timeInput" value="20" min="1"> 
            <span style="font-size: 18px; font-weight: 700; color: #475569;">phút</span>
        </div>
        <button class="btn-modal btn-confirm-start" style="width: 100%;" onclick="startTest()">BẮT ĐẦU NGAY ✨</button>
    </div>
</div>

<header>
    <div class="brand"><span>SnapEnglish</span> Part 5 - Test 3 🌺</div>
    <div class="controls">
        <a href="toeic-reading.html" class="btn-nav-local">🏠 Trở về</a>
        <button class="btn-nav-toggle" onclick="toggleNavDropdown()">📑 Danh sách câu</button>
        <button class="btn-submit" id="mainSubmitBtn" onclick="askSubmit()">NỘP BÀI 🚀</button>
    </div>
    <div class="nav-dropdown" id="navDropdown"></div>
</header>

<div class="main-area" id="mainArea"></div>

<div id="confirmOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>Xác nhận nộp bài 🤔</h2>
        <p style="font-size: 17px; color: #475569; margin-top: 15px; line-height: 1.5;">Bạn có chắc chắn muốn nộp bài để xem giải thích chi tiết đầy màu sắc không?</p>
        <div class="modal-actions">
            <button class="btn-modal btn-cancel" onclick="closeConfirmModal()">Quay lại</button>
            <button class="btn-modal btn-confirm-start" onclick="submitTest()">Nộp bài 🎉</button>
        </div>
    </div>
</div>

<div id="resultOverlay" class="custom-overlay">
    <div class="custom-modal">
        <h2>🎉 Tuyệt vời quá!</h2>
        <div id="resultMessage" style="margin: 25px 0; line-height: 1.6;"></div>
        <button class="btn-modal btn-confirm-start" style="width: 100%;" onclick="closeResultModal()">Xem Giải Thích Chi Tiết 💡</button>
    </div>
</div>

<script>
    // DỮ LIỆU ĐÃ ĐƯỢC CHUẨN HÓA VỚI ĐẦY ĐỦ NGỮ PHÁP & GIẢI THÍCH MỞ RỘNG (Test 3)
    // Đã loại bỏ hoàn toàn các citation để giao diện sạch sẽ theo yêu cầu.
    const questionsData = [
        {
            id: 101, q: "York Development Corporation marked the ___ of the Ford Road office complex with a ribbon-cutting ceremony.",
            options: ["opens", "opening", "opened", "openly"], a: "opening",
            exp: {
                correct: "Chọn đáp án <b>B. opening</b>. Vì phía trước chỗ trống là mạo từ <b>the</b> và phía sau chỗ trống là giới từ <b>of</b>, nên chỗ trống cần sử dụng danh từ <b>opening</b>.",
                wrong: "<ul><li><b>(A) opens</b>: động từ số ít</li><li><b>(C) opened</b>: động từ thêm 'ed'</li><li><b>(D) openly</b>: trạng từ</li></ul>",
                grammar: "Cấu trúc danh từ nằm giữa mạo từ và giới từ: <b>The + Noun + of</b>.",
                vocab: "<ul><li><b>mark:</b> đánh dấu</li><li><b>ribbon-cutting ceremony:</b> lễ cắt băng khánh thành</li></ul>",
                trans: "Tập đoàn phát triển York đã đánh dấu việc khai trương tổ hợp văn phòng Ford Road bằng một buổi lễ cắt băng khánh thành."
            }
        },
        {
            id: 102, q: "Staff at the Bismarck Hotel were ______ helpful to us during our stay.",
            options: ["quite", "enough", "far", "early"], a: "quite",
            exp: {
                correct: "Chọn đáp án <b>A. quite</b>. Chỗ trống cần sử dụng trạng từ <b>quite</b> (khá) để bổ nghĩa cho tính từ <b>helpful</b> ở phía trước, tạo thành cấu trúc: <b>were quite helpful</b> (khá hữu ích).",
                wrong: "<ul><li><b>(B) enough</b>: đủ (BE + ADJ + ENOUGH + (FOR SB) + TO DO STH)</li><li><b>(C) far</b>: xa (FAR + ADJ SO SÁNH)</li><li><b>(D) early</b>: sớm</li></ul>",
                grammar: "Sử dụng trạng từ chỉ mức độ (Adverb of degree) đứng trước tính từ để bổ nghĩa cho tính từ đó: <b>Adv + Adj</b>.",
                vocab: "<ul><li><b>helpful:</b> hữu ích, hay giúp đỡ</li><li><b>stay:</b> khoảng thời gian lưu trú</li></ul>",
                trans: "Nhân viên tại khách sạn Bismarck khá hữu ích đối với chúng tôi trong suốt thời gian ở đây."
            }
        },
        {
            id: 103, q: "Ms. Luo will explain some possible consequences of the ___ merger with the Wilson-Peek Corporation.",
            options: ["proposed", "proposal", "proposition", "proposing"], a: "proposed",
            exp: {

    ];

    let currentQIndex = 0;
    let userAnswers = new Array(questionsData.length).fill(null);
    let isSubmitted = false;
    let testDuration = 0;
    let timerInterval = null;

    const mainArea = document.getElementById('mainArea');
    const navDropdown = document.getElementById('navDropdown');

    function toggleNavDropdown() {
        navDropdown.classList.toggle('show');
    }

    document.addEventListener('click', function(event) {
        if (!event.target.closest('.controls') && !event.target.closest('.nav-dropdown')) {
            navDropdown.classList.remove('show');
        }
    });

    function initQuiz() {
        questionsData.forEach((q, index) => {
            let dot = document.createElement('div');
            dot.className = 'nav-dot';
            dot.id = `nav-${index}`;
            dot.innerText = index + 1;
            dot.onclick = () => {
                jumpToQuestion(index);
                navDropdown.classList.remove('show'); 
            };
            navDropdown.appendChild(dot);

            let card = document.createElement('div');
            card.className = 'question-card';
            card.id = `card-${index}`;
            
            let optionsHtml = q.options.map((opt, optIndex) => `
                <div class="option" id="opt-${index}-${optIndex}" onclick="selectOption(${index}, '${opt}', ${optIndex})">
                    <div style="display:flex; align-items:center;">
                        <strong style="margin-right:15px; color: var(--secondary); font-size: 19px; width: 25px;">${String.fromCharCode(65 + optIndex)}.</strong> 
                        <span style="flex-grow: 1;">${opt}</span>
                    </div>
                    <span id="badge-${index}-${optIndex}" style="font-size: 14px; font-weight: 800; padding-left: 10px;"></span>
                </div>
            `).join('');

            card.innerHTML = `
                <div class="q-header">
                    <div class="q-header-left">
                        <div class="q-num">Part 5 Practice 🌺</div>
                        <div class="timer-pill" id="card-timer-${index}">⏱ 00:00</div>
                    </div>
                    <div class="q-counter-pill">
                        Câu ${index + 1} / ${questionsData.length}
                    </div>
                </div>
                <div class="q-text">
                    ${q.id}. ${q.q}
                </div>
                <div class="options">
                    ${optionsHtml}
                </div>
                
                <div class="q-nav-buttons">
                    <button class="btn-nav next" onclick="jumpToQuestion(${index + 1})" ${index === questionsData.length - 1 ? 'disabled' : ''}>Câu Tiếp Theo ⏩</button>
                </div>

                <div class="explanation-box" id="exp-${index}">
                    <div class="exp-main-title">✨ Giải Thích Siêu Chi Tiết ✨</div>
                    
                    <div class="exp-grid">
                        <div class="box box-correct">
                            <div class="box-title">✅ Phân Tích Đáp Án Đúng</div>
                            ${q.exp.correct}
                        </div>
                        
                        <div class="box box-wrong">
                            <div class="box-title">❌ Vì Sao Các Đáp Án Kia Sai?</div>
                            ${q.exp.wrong}
                        </div>
                        
                        <div class="box box-grammar">
                            <div class="box-title">📖 Cấu Trúc / Ngữ Pháp</div>
                            ${q.exp.grammar}
                        </div>

                        <div class="box box-vocab">
                            <div class="box-title">📚 Từ Vựng Cốt Lõi</div>
                            ${q.exp.vocab}
                        </div>
                    </div>
                    
                    <div class="box box-trans">
                        <div class="box-title">🌐 Dịch Nghĩa Toàn Câu:</div>
                        "${q.exp.trans}"
                    </div>
                </div>
            `;
            mainArea.appendChild(card);
        });
    }

    function updateCardTimers(m, s) {
        let timeStr = `⏱ ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        for(let i=0; i<questionsData.length; i++) {
            let tEl = document.getElementById(`card-timer-${i}`);
            if(tEl) tEl.innerText = timeStr;
        }
    }

    function startTest() {
        document.getElementById('setupOverlay').style.display = 'none';
        let minutes = parseInt(document.getElementById('timeInput').value) || 20;
        testDuration = minutes * 60;
        initQuiz();
        jumpToQuestion(0);
        
        timerInterval = setInterval(() => {
            let m = Math.floor(testDuration / 60);
            let s = testDuration % 60;
            updateCardTimers(m, s);

            if (--testDuration < 0) { 
                clearInterval(timerInterval); 
                executeSubmit(); 
            }
        }, 1000);
    }

    function jumpToQuestion(index) {
        if (index < 0 || index >= questionsData.length) return;
        
        let oldCard = document.getElementById(`card-${currentQIndex}`);
        let oldDot = document.getElementById(`nav-${currentQIndex}`);
        if(oldCard) oldCard.classList.remove('active');
        if(oldDot) oldDot.classList.remove('active');
        
        currentQIndex = index;
        let newCard = document.getElementById(`card-${currentQIndex}`);
        let newDot = document.getElementById(`nav-${currentQIndex}`);
        if(newCard) newCard.classList.add('active');
        if(newDot) newDot.classList.add('active');
        
        mainArea.scrollTo(0, 0);
    }

    function selectOption(qIndex, answer, optIndex) {
        if(isSubmitted) return; 
        
        userAnswers[qIndex] = answer;
        for(let i=0; i<4; i++) {
            document.getElementById(`opt-${qIndex}-${i}`).classList.remove('selected');
        }
        document.getElementById(`opt-${qIndex}-${optIndex}`).classList.add('selected');
        document.getElementById(`nav-${qIndex}`).classList.add('done');
        
        if(qIndex < questionsData.length - 1) {
            setTimeout(() => jumpToQuestion(qIndex + 1), 350);
        }
    }

    function askSubmit() {
        if(isSubmitted) return;
        document.getElementById('confirmOverlay').style.display = 'flex';
    }

    function closeConfirmModal() {
        document.getElementById('confirmOverlay').style.display = 'none';
    }
    
    function closeResultModal() {
        document.getElementById('resultOverlay').style.display = 'none';
        jumpToQuestion(0);
        navDropdown.classList.add('show'); 
    }

    function submitTest() {
        document.getElementById('confirmOverlay').style.display = 'none';
        executeSubmit();
    }

    function executeSubmit() {
        if(isSubmitted) return;
        isSubmitted = true;
        clearInterval(timerInterval);
        document.getElementById("mainSubmitBtn").style.display = 'none';

        let score = 0;
        
        questionsData.forEach((q, index) => {
            let uAns = userAnswers[index];
            let isCorrect = uAns === q.a;
            if(isCorrect) score++;

            let unAnsweredWarning = "";
            if (!uAns) {
                unAnsweredWarning = `<div style="background: #fffbeb; color: #b45309; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; font-weight: 800; border: 2px solid #fde68a;">⚠️ Ôi! Bạn đã bỏ trống câu này mất rồi!</div>`;
            }

            for(let i=0; i<4; i++) {
                let optEl = document.getElementById(`opt-${index}-${i}`);
                let badgeEl = document.getElementById(`badge-${index}-${i}`);
                optEl.classList.add('disabled');
                
                let optText = q.options[i];
                if (optText === q.a) {
                    optEl.classList.add('correct'); 
                    if (optText === uAns) {
                        badgeEl.innerHTML = "✅ Xứng đáng 10 điểm!";
                        badgeEl.style.color = "var(--correct-text)";
                    } else {
                        badgeEl.innerHTML = "👈 Đáp án đúng ở đây nè";
                        badgeEl.style.color = "var(--correct-text)";
                    }
                } else if (optText === uAns) {
                    optEl.classList.add('wrong'); 
                    badgeEl.innerHTML = "❌ Hơi tiếc một xíu";
                    badgeEl.style.color = "var(--wrong-text)";
                }
            }

            let expBox = document.getElementById(`exp-${index}`);
            expBox.classList.add('show');
            if(unAnsweredWarning) {
                expBox.insertAdjacentHTML('afterbegin', unAnsweredWarning);
            }

            let dot = document.getElementById(`nav-${index}`);
            dot.classList.remove('done', 'active');
            if (isCorrect) dot.classList.add('correct');
            else dot.classList.add('wrong');
        });

        document.getElementById('resultMessage').innerHTML = `
            <strong style="font-size: 46px; color: var(--primary-dark); display: block; margin-bottom: 15px; text-shadow: 2px 2px 0px #fbcfe8;">${score} / ${questionsData.length}</strong>
            <p style="font-size: 18px; color: #64748b; font-weight: 600;">Hành trình vạn dặm bắt đầu từ một bước chân!<br>Hãy khám phá phần giải thích để học thêm ngàn điều hay nhé 🌸</p>
        `;
        document.getElementById('resultOverlay').style.display = 'flex';
      if (window.luuDiemTOEICLenFirebase) {
            window.luuDiemTOEICLenFirebase(questionsData.length, score, "ETS 2019 - Test 3", "Reading", "Part 5");
        }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlTU4B563sSsTVbLai_je29l6eC8T-cm0",
        authDomain: "snapenglish-cb6e2.firebaseapp.com",
        projectId: "snapenglish-cb6e2",
        storageBucket: "snapenglish-cb6e2.firebasestorage.app",
        messagingSenderId: "373152038413",
        appId: "1:373152038413:web:19284622571390f8585f44"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Toast notification được thiết kế lại theo tone màu Hồng/Tím
    function showInGameToast(msg) {
        let toast = document.createElement("div");
        toast.innerText = msg;
        toast.style.cssText = "position:fixed; bottom:30px; right:30px; background:linear-gradient(135deg, var(--primary), var(--secondary)); color:white; padding:16px 24px; border-radius:14px; font-weight:700; font-family:'Be Vietnam Pro',sans-serif; z-index:99999; box-shadow:0 10px 30px rgba(244, 114, 182, 0.4); transform:translateY(100px) scale(0.9); opacity:0; transition:all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55); border: 2px solid #fff;";
        document.body.appendChild(toast);
        
        setTimeout(() => { toast.style.transform = "translateY(0) scale(1)"; toast.style.opacity = "1"; }, 100);
        setTimeout(() => { toast.style.transform = "translateY(100px) scale(0.9)"; toast.style.opacity = "0"; }, 3500);
        setTimeout(() => { toast.remove(); }, 4000);
    }

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.currentUserUid = user.uid;
            window.currentUserEmail = user.email;
        } else {
            showInGameToast("⚠️ Bạn đang học dưới dạng Khách, điểm sẽ không lưu lên kho nhé!");
        }
    });

    function calculateToeicScore(skill, correct, total) {
        let percentage = correct / total;
        let maxScore = (skill === 'Listening' || skill === 'Reading') ? 495 : 200;
        let step = (skill === 'Listening' || skill === 'Reading') ? 5 : 10;
        let estimated = Math.round((percentage * maxScore) / step) * step;
        if (estimated > maxScore) return maxScore;
        if (estimated < 5 && (skill === 'Listening' || skill === 'Reading')) return 5;
        if (estimated < 0) return 0;
        return estimated;
    }

    window.luuDiemTOEICLenFirebase = async function(tongSoCau, soCauDung, tenBai, kyNang, tenPart) {
        if (!window.currentUserUid) return; 

        let diemQuyDoi = calculateToeicScore(kyNang, soCauDung, tongSoCau);
        let thoiGianHienTai = "--";
        let inputPhut = parseInt(document.getElementById('timeInput').value) || 20; 
        let tongThoiGianGoc = inputPhut * 60;

        if (typeof testDuration !== 'undefined') {
            let thoiGianDaLam = tongThoiGianGoc - testDuration;
            if (thoiGianDaLam < 0) thoiGianDaLam = 0; 
            
            let m = Math.floor(thoiGianDaLam / 60);
            let s = thoiGianDaLam % 60;
            thoiGianHienTai = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }
        let timestamp = Date.now();
        let docId = window.currentUserUid + "_toeic_" + timestamp;
        
        try {
            await setDoc(doc(db, "user_toeic_scores", docId), {
                email: window.currentUserEmail,
                skill: kyNang,
                testName: tenBai,
                partName: tenPart,
                timeTaken: thoiGianHienTai,
                totalQ: tongSoCau,
                correctQ: soCauDung,
                score: diemQuyDoi,
                date: new Date().toLocaleDateString('vi-VN'),
                timestamp: timestamp
            });
            showInGameToast("☁️ Tuyệt vời! Đã đồng bộ điểm số lên Máy Chủ thành công!");
        } catch (error) {
            console.error("Lỗi đồng bộ:", error);
        }
    }
</script>
