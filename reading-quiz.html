<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Reading Part | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Bảng màu SnapEnglish Pastel */
            --primary: #a29bfe;
            --primary-dark: #6c5ce7;
            --accent-green: #55efc4;
            --accent-orange: #e7a87c;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #f4f2ff 100%);
            --text-dark: #2d3436;
            --text-gray: #636e72;
            
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 8px 32px 0 rgba(162, 155, 254, 0.15);
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            margin: 0;
            padding: 50px 20px;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Background Shapes --- */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape-1 { width: 350px; height: 350px; background: var(--primary); top: -50px; left: -100px; }
        .shape-2 { width: 400px; height: 400px; background: var(--accent-orange); bottom: -100px; right: -50px; }
        .shape-3 { width: 200px; height: 200px; background: var(--accent-green); top: 50%; left: 40%; filter: blur(100px); opacity: 0.3; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.05); }
        }

        /* --- Header Section --- */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            font-family: 'Quicksand', sans-serif;
            font-size: 38px; 
            margin-bottom: 10px;
            color: var(--primary-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        h1 img { width: 45px; height: auto; border-radius: 12px; }

        .brand-name { color: var(--accent-orange); font-weight: 700; }

        p.subtitle {
            color: var(--text-gray);
            font-size: 16px;
            max-width: 650px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* --- Search Bar --- */
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto 40px auto;
        }

        #searchInput {
            width: 100%;
            padding: 15px 25px;
            border-radius: 20px;
            border: 2px solid transparent;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            font-size: 15px;
            font-family: 'Nunito', sans-serif;
            color: var(--text-dark);
            box-shadow: var(--glass-shadow);
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--primary);
            outline: none;
            background: #fff;
        }

        /* --- Grid Layout --- */
        .quiz-list { 
            max-width: 1100px; 
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        /* --- Quiz Card --- */
        .quiz-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 12px 25px rgba(162, 155, 254, 0.25);
        }

        .icon-box {
            font-size: 28px;
            width: 50px;
            height: 50px;
            background: #f4f2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            margin-right: 15px;
            transition: 0.3s;
        }

        .quiz-card:hover .icon-box {
            background: var(--primary);
            color: white;
            transform: scale(1.1) rotate(-5deg);
        }

        .card-content { flex-grow: 1; }

        .quiz-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 0 0 8px 0;
        }

        .quiz-meta {
            display: flex;
            gap: 8px;
        }

        .quiz-tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            text-transform: uppercase;
        }

        .tag-p1 { background: #e3fded; color: #00b894; }
        .tag-p2 { background: #fff3e0; color: #e17055; }
        .tag-p3 { background: #ffeaa7; color: #d63031; }
        .tag-skill { background: #e0dbff; color: #6c5ce7; }

        .hidden { display: none !important; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .quiz-list { grid-template-columns: 1fr; }
            h1 { font-size: 30px; }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>

    <div class="container">
        <header class="header-section">
            <h1>
                <img src="ảnh.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/29/29302.png'" alt="Logo">
                <span class="brand-name">SnapEnglish</span> Reading
            </h1>
            <p class="subtitle">Chinh phục 3 Passages của IELTS Reading cùng SnapEnglish. Hãy lựa chọn bài luyện tập bên dưới nàaaa.</p>
        </header>

        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Tìm dạng bài (VD: Passage 1, Practice 1)...">
        </div>

        <div id="quizList" class="quiz-list"></div>
    </div>

    <script>
        // Dữ liệu Quiz - Đã lược bỏ Description
        const quizzes = [
            { name: "Reading Practice 1", tag: "Passage 1", tagClass: "tag-p1", url: "quiz1-reading.html", icon: "🌱" },
            { name: "Reading Practice 2", tag: "Passage 2", tagClass: "tag-p2", url: "quiz2-reading.html", icon: "🧩" },
            { name: "Reading Practice 3", tag: "Passage 3", tagClass: "tag-p3", url: "quiz3-reading.html", icon: "🔬" },
            { name: "Reading Practice 4", tag: "Passage 1", tagClass: "tag-p1", url: "quiz4-reading.html", icon: "📝" },
            { name: "Reading Practice 5", tag: "Passage 2", tagClass: "tag-p2", url: "quiz5-reading.html", icon: "📊" },
            { name: "Reading Practice 6", tag: "Passage 3", tagClass: "tag-p3", url: "quiz6-reading.html", icon: "🎯" },
            { name: "Reading Practice 7", tag: "Passage 1", tagClass: "tag-p1", url: "quiz7-reading.html", icon: "💡" },
            { name: "Reading Practice 8", tag: "Passage 2", tagClass: "tag-p2", url: "quiz8-reading.html", icon: "⏱️" },
            { name: "Reading Practice 9", tag: "Passage 3", tagClass: "tag-p3", url: "quiz9-reading.html", icon: "🧠" },
            { name: "Reading Practice 10", tag: "Passage 1", tagClass: "tag-p1", url: "quiz10-reading.html", icon: "🏆" }
        ];

        const quizListDiv = document.getElementById("quizList");
        const searchInput = document.getElementById("searchInput");

        function renderQuizzes() {
            quizListDiv.innerHTML = '';
            quizzes.forEach((quiz, index) => {
                const card = document.createElement("a");
                card.className = "quiz-card";
                card.href = quiz.url;
                card.target = "_blank"; 
                card.setAttribute("data-search", `${quiz.name} ${quiz.tag}`.toLowerCase());
                
                card.style.animationDelay = `${index * 0.05}s`;

                card.innerHTML = `
                    <div class="icon-box">${quiz.icon}</div>
                    <div class="card-content">
                        <h3 class="quiz-title">${quiz.name}</h3>
                        <div class="quiz-meta">
                            <span class="quiz-tag ${quiz.tagClass}">${quiz.tag}</span>
                        </div>
                    </div>
                `;
                quizListDiv.appendChild(card);
            });
        }

        searchInput.addEventListener('input', function() {
            const filter = this.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.quiz-card');
            
            cards.forEach(card => {
                const text = card.getAttribute('data-search');
                if (text.includes(filter)) {
                    card.classList.remove('hidden');
                    card.style.animation = "none"; 
                    card.style.opacity = "1";
                } else {
                    card.classList.add('hidden');
                }
            });
        });

        renderQuizzes();
    </script>
</body>
</html>
