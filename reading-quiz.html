<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reading Practice - SnapEnglish</title>
   <link rel="icon" type="image/png" href="ảnh.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', sans-serif;
      background-color: #f4f6f8; /* Nền xám nhạt trung tính */
      color: #333;
      margin: 0;
      padding: 0;
    }

    .container { 
      max-width: 1000px; 
      margin: 40px auto; 
      padding: 20px; 
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      display: inline-flex;
      align-items: center;
      gap: 15px;
      font-size: 32px;
      color: #2c3e50; /* Màu xanh đen chuyên nghiệp */
      margin: 0;
      font-weight: 700;
    }

    h1 img {
      width: 40px;
      height: auto;
    }

    .subtitle {
      margin-top: 10px;
      color: #666;
      font-size: 16px;
    }

    /* Grid Layout để các ô thẳng hàng đẹp hơn */
    .quiz-list { 
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .quiz-item { 
      background: white;
      padding: 25px 20px;
      border-radius: 12px; 
      cursor: pointer; 
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* Bóng đổ nhẹ */
      transition: all 0.3s ease;
      border: 1px solid #e1e4e8;
      position: relative;
      overflow: hidden;
    }

    /* Thanh trang trí nhỏ bên trái mỗi thẻ */
    .quiz-item::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background-color: #3498db; /* Màu chủ đạo */
      transition: width 0.3s;
    }

    .quiz-item h3 {
      margin: 0;
      font-size: 18px;
      color: #2c3e50;
    }

    .quiz-item p {
      margin: 5px 0 0;
      font-size: 14px;
      color: #888;
    }

    /* Hiệu ứng khi di chuột vào */
    .quiz-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
      border-color: #3498db;
    }

    .quiz-item:hover::before {
      width: 100%; /* Hiệu ứng background trượt qua */
      opacity: 0.1;
    }

    /* Responsive cho điện thoại */
    @media (max-width: 600px) {
      .quiz-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>
        <img src="favicon.png" onerror="this.src='https://cdn-icons-png.flaticon.com/512/29/29302.png'" alt="Logo">
        Reading Practice
      </h1>
      <p class="subtitle">Select a quiz below to start practicing your reading skills.</p>
    </header>

    <div id="quizList" class="quiz-list"></div>
  </div>
  <script>
    const quizzes = [
      { name: "Quiz 1", url: "quiz1-reading.html" },
      { name: "Quiz 2", url: "quiz2-reading.html" },
      { name: "Quiz 3", url: "quiz3-reading.html" },
{ name: "Quiz 4", url: "quiz4-reading.html" },
{ name: "Quiz 5", url: "quiz5-reading.html" },
{ name: "Quiz 6", url: "quiz6-reading.html" },
{ name: "Quiz 7", url: "quiz7.html" },
{ name: "Quiz 8", url: "quiz8.html" },
{ name: "Quiz 9", url: "quiz9.html" },
{ name: "Quiz 10", url: "quiz10.html" },
{ name: "Quiz 11", url: "quiz11.html" },
{ name: "Quiz 12", url: "quiz12.html" },
{ name: "Quiz 13", url: "quiz13.html" }
    ];

    const quizListDiv = document.getElementById("quizList");

    quizzes.forEach((quiz, index) => {
      const quizItem = document.createElement("div");
      quizItem.className = "quiz-item";
      quizItem.innerText = quiz.name;
      quizItem.onclick = () => window.location.href = quiz.url;
      quizListDiv.appendChild(quizItem);
    });

  </script>
</body>
</html>
