<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictation Pro: Booking a table</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* BẢNG MÀU MỚI: MINT & TERRACOTTA */
            --primary: #6EB5C0; /* Xanh Mint đậm/Teal */
            --primary-hover: #5a9aa4;
            --secondary: #E2E8E4; /* Xanh xám nhạt */
            --accent: #E08E79; /* Cam đất/Terracotta */
            --blue-pastel: #F0F5F5; /* Nền highlight nhẹ */
            --blue-dark: #3E6A73; /* Chữ nhấn mạnh */
            --text-dark: #333333;
            --text-light: #666666;
            --bg-main: #F7F9F9; /* Nền tổng thể */
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .layout-container {
            display: flex;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
            height: 80vh;
            min-height: 600px;
        }

        /* LEFT PANEL (1/3) */
        .sidebar {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(110, 181, 192, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .progress-section { text-align: center; }
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, #eee 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; transition: background 0.5s;
        }
        .progress-circle::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--white); border-radius: 50%; }
        .progress-text { position: relative; z-index: 1; font-size: 28px; font-weight: 700; color: var(--primary); }

        .instructions { background: var(--blue-pastel); padding: 20px; border-radius: 15px; color: var(--blue-dark); }
        .instructions h3 { margin-bottom: 15px; font-size: 18px; }
        .instructions ul { list-style: none; }
        .instructions li { margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        kbd { background: var(--white); border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px; font-family: monospace; font-size: 13px; font-weight: bold; box-shadow: 0 2px 0 #ccc; }

        /* RIGHT PANEL (2/3) */
        .main-content {
            flex: 2; background: var(--white); border-radius: 20px; padding: 35px;
            box-shadow: 0 10px 30px rgba(110, 181, 192, 0.15); display: flex; flex-direction: column; position: relative;
        }

        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px dashed #eee; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-light); }
        select { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 600; }

        .audio-section { text-align: center; margin-bottom: 20px; }
        .btn-play { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 15px rgba(110, 181, 192, 0.4);}
        .btn-play:hover { background: var(--primary-hover); transform: translateY(-2px); }

        /* Speaker Badge Tùy chỉnh màu sắc mới */
        .speaker-badge { display: inline-block; padding: 6px 20px; border-radius: 20px; font-weight: bold; font-size: 15px; margin-bottom: 15px; }
        .speaker-female { background: #ffe8e1; color: #c44d34; border: 1px solid #fbdcd5; } /* Cam nhạt */
        .speaker-male { background: #e6f4f5; color: #216773; border: 1px solid #c9e8eb; } /* Mint nhạt */

        .input-section { flex-grow: 1; display: flex; flex-direction: column; }
        .message { text-align: center; font-weight: 600; margin-bottom: 15px; min-height: 24px; color: #e53935; }
        
        .proper-noun-box { font-size: 15px; color: var(--accent); font-weight: 600; margin-bottom: 10px; background: #fdf3f0; padding: 10px 15px; border-radius: 10px; display: inline-block; border-left: 4px solid var(--accent); }

        textarea { width: 100%; height: 120px; padding: 20px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 20px; outline: none; transition: 0.3s; resize: none; color: var(--text-dark); line-height: 1.6; }
        textarea:focus { border-color: var(--primary); }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-enter { background: var(--blue-dark); color: var(--white); }
        .btn-enter:hover { background: #2f5057; }
        .btn-hint { background: var(--secondary); color: var(--blue-dark); }
        .btn-hint:hover { background: #c8d4ce; }

        /* MODAL POPUP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 35px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: var(--primary); font-size: 22px; margin-bottom: 20px; text-align: center; }
        .modal-script { font-size: 20px; font-weight: 700; color: var(--blue-dark); margin-bottom: 10px; text-align: center; padding-bottom: 15px; border-bottom: 2px dashed #eee;}
        .modal-content p { margin-bottom: 10px; line-height: 1.6; font-size: 16px; }
        .vocab-list { list-style-type: none; padding-left: 0; margin-top: 10px;}
        .vocab-list li { margin-bottom: 8px; background: #f9f9f9; padding: 8px 15px; border-radius: 8px;}
        .vocab-list li strong { color: var(--accent); font-size: 16px;}
        
        .btn-next-modal { width: 100%; background: var(--primary); color: white; margin-top: 20px; padding: 15px; font-size: 18px; }
        .btn-next-modal:hover { background: var(--primary-hover); }

        /* END SCREEN */
        .end-screen { display: none; text-align: center; padding-top: 20px;}
        .transcript-box { text-align: left; background: #fafafa; padding: 25px; border-radius: 15px; height: 350px; overflow-y: auto; margin: 25px 0; border: 1px solid #eee; line-height: 1.8; font-size: 16px;}

        @media (max-width: 850px) {
            .layout-container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .main-content { flex: none; width: 100%; order: 1; min-height: 600px;}
        }
    </style>
</head>
<body>

<div class="layout-container" id="app">
    <div class="sidebar">
        <div class="progress-section">
            <h2 style="color: var(--text-dark); margin-bottom: 25px; font-size: 22px;">Tiến độ bài học</h2>
            <div class="progress-circle" id="progress-ring"><div class="progress-text"><span id="progress-percent">0</span>%</div></div>
            <p style="color: var(--text-light); font-weight: 600; margin-top: 15px;">Câu: <span id="current-sentence-num">1</span> / <span id="total-sentences"></span></p>
            <p style="font-size: 14px; color: #888; margin-top: 5px;">Số lần học bài này: <span id="study-count">0</span></p>
        </div>
        <div class="instructions">
            <h3>⌨️ Hướng dẫn phím tắt</h3>
            <ul>
                <li><kbd>Ctrl</kbd> Lặp lại Audio.</li>
                <li><kbd>Tab</kbd> Gợi ý từ tiếp theo.</li>
                <li><kbd>Enter</kbd> Kiểm tra đáp án / Chuyển câu.</li>
            </ul>
        </div>
    </div>

    <div class="main-content">
        <div id="learning-screen" style="display: flex; flex-direction: column; height: 100%;">
            <div class="settings-bar">
                <div class="setting-group">
                    <label>Tốc độ:</label>
                    <select id="speed-setting">
                        <option value="0.7">0.7x</option>
                        <option value="0.9" selected>0.9x</option>
                        <option value="1.0">1.0x</option>
                        <option value="1.2">1.2x</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Lặp tự động:</label>
                    <select id="repeat-setting">
                        <option value="1" selected>1 lần</option>
                        <option value="2">2 lần</option>
                        <option value="3">3 lần</option>
                    </select>
                </div>
            </div>

            <div class="audio-section">
                <div id="speaker-display" class="speaker-badge"></div><br>
                <button class="btn-play" onclick="playAudio()">🔊 Nghe Audio</button>
            </div>
            
            <div class="message" id="system-message"></div>

            <div class="input-section">
                <div id="proper-noun-container" style="display: none;">
                    <span class="proper-noun-box">📌 Chú ý viết hoa: <span id="proper-noun-display"></span></span>
                </div>

                <textarea id="user-input" placeholder="Lắng nghe và gõ vào đây..." autofocus></textarea>
                
                <div class="actions">
                    <button class="btn btn-enter" onclick="handleEnterAction()">Kiểm tra (Enter)</button>
                    <button class="btn btn-hint" onclick="giveHint()">💡 Gợi ý (Tab)</button>
                </div>
            </div>
        </div>

        <div id="end-screen" class="end-screen">
            <h2 style="color: var(--primary); font-size: 28px;">Tuyệt vời! Hoàn thành 🏆</h2>
            <div class="transcript-box" id="full-transcript"></div>
            <div class="actions">
                <button class="btn btn-play" onclick="playFullAudio()">🔊 Nghe lại toàn văn</button>
                <button class="btn btn-enter" onclick="restartLesson()">🔄 Học lại từ đầu</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
        <h3>🎉 Chính xác!</h3>
        <div class="modal-script" id="trans-en"></div>
        <p><strong>🇻🇳 Nghĩa:</strong> <span id="trans-vi"></span></p>
        <p><strong>📖 Ngữ pháp:</strong> <span id="trans-grammar"></span></p>
        <ul class="vocab-list" id="trans-vocab"></ul>
        <button class="btn btn-next-modal" onclick="nextSentence()">Qua câu tiếp theo (Enter) ➔</button>
    </div>
</div>

<script>
    const lessonData = [
        { en: "Hello, Gino's.", vi: "Xin chào, nhà hàng Gino's xin nghe.", grammar: "Cách bắt máy điện thoại chuyên nghiệp tại nhà hàng.", vocab: [], nouns: ["Gino's"], speaker: "Staff", gender: "female" },
        { en: "Hi. Can I book a table for tomorrow night, please?", vi: "Chào bạn. Tôi có thể đặt một bàn cho tối mai được không?", grammar: "Can I + V-inf: Lời yêu cầu lịch sự. book a table: đặt bàn.", vocab: ["Book (Đặt trước)"], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "How many people is it for?", vi: "Bàn dành cho bao nhiêu người ạ?", grammar: "How many + danh từ số nhiều + is it for?", vocab: [], nouns: [], speaker: "Staff", gender: "female" },
        { en: "Four.", vi: "Bốn người.", grammar: "Trả lời ngắn gọn thông tin số lượng.", vocab: [], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "And what time would you like?", vi: "Và bạn muốn đi lúc mấy giờ?", grammar: "Would you like: Cách hỏi lịch sự thay cho 'do you want'.", vocab: [], nouns: [], speaker: "Staff", gender: "female" },
        { en: "About eight, eight thirty maybe?", vi: "Khoảng tám giờ, hoặc có lẽ tám giờ rưỡi?", grammar: "About + thời gian: Khoảng mấy giờ.", vocab: ["Maybe (Có lẽ)"], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "Let's see ... We're pretty busy tomorrow, so I can do half past seven or nine.", vi: "Để tôi xem... Ngày mai chúng tôi khá bận, nên tôi có thể xếp lúc bảy giờ rưỡi hoặc chín giờ.", grammar: "pretty + adj: khá... half past seven: 7 giờ 30.", vocab: ["Pretty (Khá)", "Busy (Bận rộn)", "Half past (Rưỡi)"], nouns: [], speaker: "Staff", gender: "female" },
        { en: "Oh. OK, then. Half seven, please.", vi: "Ồ. Được thôi. Vậy bảy giờ rưỡi nhé.", grammar: "Half seven là cách nói rút gọn của half past seven trong văn phong thân mật.", vocab: [], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "What name is it?", vi: "Tên bạn là gì ạ?", grammar: "Câu hỏi tên thông dụng khi đặt chỗ.", vocab: [], nouns: [], speaker: "Staff", gender: "female" },
        { en: "Jamie.", vi: "Jamie.", grammar: "Trả lời tên ngắn gọn.", vocab: [], nouns: ["Jamie"], speaker: "Jamie", gender: "male" },
        { en: "J A ...?", vi: "J-A- ...?", grammar: "Cách đánh vần tên để nhân viên xác nhận.", vocab: [], nouns: ["J A"], speaker: "Staff", gender: "female" },
        { en: "M I E.", vi: "M-I-E.", grammar: "Tiếp tục đánh vần.", vocab: [], nouns: ["M I E"], speaker: "Jamie", gender: "male" },
        { en: "OK, so that's a table for four at half past seven tomorrow evening.", vi: "Vâng, vậy là một bàn cho bốn người lúc bảy giờ rưỡi tối mai.", grammar: "So that's...: Mẫu câu để tổng hợp và xác nhận lại toàn bộ thông tin.", vocab: ["Evening (Buổi tối)"], nouns: [], speaker: "Staff", gender: "female" },
        { en: "Great. Thanks! Bye.", vi: "Tuyệt vời. Cảm ơn! Tạm biệt.", grammar: "Kết thúc cuộc gọi lịch sự.", vocab: ["Great (Tuyệt vời)"], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "Bye.", vi: "Tạm biệt.", grammar: "", vocab: [], nouns: [], speaker: "Staff", gender: "female" },
        { en: "Hello, Gino's.", vi: "Xin chào, nhà hàng Gino's xin nghe.", grammar: "Cuộc gọi thứ hai.", vocab: [], nouns: ["Gino's"], speaker: "Staff", gender: "female" },
        { en: "Hi, I called earlier to book a table for four and I was wondering if I can make it for six instead?", vi: "Chào bạn, lúc nãy tôi có gọi để đặt bàn cho bốn người và tôi đang tự hỏi liệu tôi có thể đổi thành sáu người được không?", grammar: "I was wondering if...: Tôi tự hỏi liệu... (cách nhờ vả vô cùng lịch sự). instead: thay vào đó.", vocab: ["Earlier (Lúc trước/Sớm hơn)", "Wondering (Tự hỏi)", "Instead (Thay vào đó)"], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "Ah, what name was it?", vi: "À, bạn đã đặt tên gì nhỉ?", grammar: "Dùng thì quá khứ đơn (was) do việc đặt bàn đã diễn ra.", vocab: [], nouns: [], speaker: "Staff", gender: "female" },
        { en: "It's Jamie.", vi: "Là Jamie.", grammar: "", vocab: [], nouns: ["Jamie"], speaker: "Jamie", gender: "male" },
        { en: "Table for four at half past seven. So you want to change it to 6 o'clock?", vi: "Bàn bốn người lúc bảy giờ rưỡi. Vậy bạn muốn đổi sang 6 giờ đúng không?", grammar: "change sth to sth: Đổi cái gì thành cái gì.", vocab: ["Change (Thay đổi)"], nouns: [], speaker: "Staff", gender: "female" },
        { en: "No, sorry. Can I make it for six people?", vi: "Không, xin lỗi. Tôi có thể đổi thành bàn sáu người được không?", grammar: "Make it for + [số lượng]: Đặt cho bao nhiêu người.", vocab: [], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "Oh, I see. Sorry! That shouldn't be a problem.", vi: "Ồ, tôi hiểu rồi. Xin lỗi nhé! Sẽ không có vấn đề gì đâu.", grammar: "That shouldn't be a problem: Mẫu câu phổ biến dùng để trấn an khách hàng.", vocab: ["Problem (Vấn đề)"], nouns: [], speaker: "Staff", gender: "female" },
        { en: "I can move you to a bigger table but it will be nearer the kitchen. Is that OK?", vi: "Tôi có thể chuyển bạn sang bàn lớn hơn nhưng nó sẽ gần bếp hơn. Như vậy ổn chứ?", grammar: "nearer: dạng so sánh hơn của near (gần).", vocab: ["Bigger (Lớn hơn)", "Nearer (Gần hơn)", "Kitchen (Nhà bếp)"], nouns: [], speaker: "Staff", gender: "female" },
        { en: "No problem. Is it possible to change the time as well? Make it a little bit later?", vi: "Không sao. Có thể đổi thời gian luôn được không? Trễ hơn một chút nhé?", grammar: "Is it possible to + V: Có khả năng/có thể làm gì không? a little bit later: trễ hơn một chút.", vocab: ["Possible (Có thể)", "Later (Trễ hơn)"], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "Ah ... yeah, we can. Is eight OK for you?", vi: "À ... vâng, được ạ. Tám giờ ổn với bạn không?", grammar: "", vocab: [], nouns: [], speaker: "Staff", gender: "female" },
        { en: "Perfect, thanks!", vi: "Hoàn hảo, cảm ơn nhé!", grammar: "", vocab: ["Perfect (Hoàn hảo)"], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "Lovely. See you tomorrow, then.", vi: "Tuyệt. Vậy hẹn gặp bạn vào ngày mai nhé.", grammar: "Lovely thường được người Anh dùng thay cho Great/Good. then: vậy thì.", vocab: ["Lovely (Tuyệt vời/Dễ thương)"], nouns: [], speaker: "Staff", gender: "female" },
        { en: "Thanks! Bye!", vi: "Cảm ơn! Tạm biệt!", grammar: "", vocab: [], nouns: [], speaker: "Jamie", gender: "male" },
        { en: "Thanks. Ciao!", vi: "Cảm ơn. Ciao (Tạm biệt)!", grammar: "Ciao: Từ mượn tiếng Ý, nghĩa là xin chào hoặc tạm biệt.", vocab: ["Ciao (Tạm biệt)"], nouns: ["Ciao"], speaker: "Staff", gender: "female" }
    ];

    let currentIndex = 0;
    let currentPlayCount = 0;
    let playTimeout;
    const synth = window.speechSynthesis;
    let maleVoice = null;
    let femaleVoice = null;

    const msgBox = document.getElementById("system-message");
    const inputField = document.getElementById("user-input");
    const modalOverlay = document.getElementById("feedback-modal");
    const speakerDisplay = document.getElementById("speaker-display");

    function loadVoices() {
        let voices = synth.getVoices();
        if(voices.length === 0) return;
        
        maleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google UK English Male'))) || voices.find(v => v.lang.startsWith('en'));
        femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Google US English'))) || voices.find(v => v.lang.startsWith('en'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.onload = () => {
        loadVoices();
        let count = localStorage.getItem('booking_table_count') || 0;
        document.getElementById('study-count').innerText = count;
        document.getElementById('total-sentences').innerText = lessonData.length;
        
        let savedIndex = parseInt(localStorage.getItem('booking_table_progress'));
        if (!isNaN(savedIndex) && savedIndex < lessonData.length) {
            currentIndex = savedIndex;
        }

        updateUI();
    };

    function updateUI() {
        updateProgress();
        document.getElementById('current-sentence-num').innerText = currentIndex + 1;
        
        const data = lessonData[currentIndex];
        
        speakerDisplay.innerText = `🎙️ ${data.speaker} đang nói`;
        speakerDisplay.className = data.gender === 'female' ? 'speaker-badge speaker-female' : 'speaker-badge speaker-male';

        const nounContainer = document.getElementById("proper-noun-container");
        if (data.nouns && data.nouns.length > 0) {
            nounContainer.style.display = "block";
            document.getElementById("proper-noun-display").innerText = data.nouns.join(", ");
        } else {
            nounContainer.style.display = "none";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            e.preventDefault();
            playAudio();
        } else if (e.key === 'Tab') {
            e.preventDefault();
            giveHint();
        } else if (e.key === 'Enter') {
            e.preventDefault();
            handleEnterAction();
        }
    });

    function handleEnterAction() {
        if (modalOverlay.style.display === "flex") {
            nextSentence();
        } else {
            checkAnswer();
        }
    }

    function playAudio() {
        currentPlayCount = 0;
        clearTimeout(playTimeout);
        triggerAudioLoop();
    }

    function triggerAudioLoop() {
        if (synth.speaking) synth.cancel();
        
        const data = lessonData[currentIndex];
        const utterThis = new SpeechSynthesisUtterance(data.en);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value);
        
        if (data.gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
        else if (data.gender === 'male' && maleVoice) utterThis.voice = maleVoice;
        
        utterThis.onend = () => {
            currentPlayCount++;
            const maxRepeat = parseInt(document.getElementById('repeat-setting').value);
            if (currentPlayCount < maxRepeat) {
                playTimeout = setTimeout(triggerAudioLoop, 500);
            }
        };
        
        synth.speak(utterThis);
        if (modalOverlay.style.display !== "flex") inputField.focus();
    }

    // Nâng cấp bộ lọc cho phép người dùng gõ có hoặc không có dấu phẩy/chấm/nháy đơn (I'm -> im)
    function normalizeText(text) { 
        return text.toLowerCase().replace(/[.,?!–\-:"'…]/g, '').replace(/\s+/g, ' ').trim(); 
    }

    function checkAnswer() {
        const userInput = normalizeText(inputField.value);
        const targetText = normalizeText(lessonData[currentIndex].en);
        
        if (userInput === targetText) {
            msgBox.innerText = "";
            showModal();
        } else {
            const userWords = userInput.split(' ').filter(w => w !== "");
            const targetWords = targetText.split(' ');

            if (userWords.length === 0) {
                msgBox.innerText = "Bạn chưa gõ gì cả. Nhấn Ctrl để nghe nhé!";
                return;
            }

            let wrongIndex = -1;
            for (let i = 0; i < userWords.length; i++) {
                if (userWords[i] !== targetWords[i]) {
                    wrongIndex = i;
                    break;
                }
            }

            if (wrongIndex !== -1) {
                msgBox.innerText = `Lỗi ở từ thứ ${wrongIndex + 1}. Nhấn Tab để được gợi ý!`;
            } else if (userWords.length < targetWords.length) {
                msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
            } else {
                msgBox.innerText = "Có lỗi sai chính tả nhỏ, hãy kiểm tra lại.";
            }
        }
    }

    function giveHint() {
        if (modalOverlay.style.display === "flex") return;

        const userInput = inputField.value;
        const targetWords = lessonData[currentIndex].en.split(' ');
        const userWords = userInput.trim().split(' ').filter(w => w !== "");

        let hintWord = targetWords[userWords.length];
        for (let i = 0; i < userWords.length; i++) {
            if (normalizeText(userWords[i]) !== normalizeText(targetWords[i])) {
                hintWord = targetWords[i];
                inputField.value = targetWords.slice(0, i).join(' ') + (i > 0 ? " " : "");
                break;
            }
        }

        if (hintWord) {
            inputField.value += (inputField.value.length > 0 && !inputField.value.endsWith(' ') ? ' ' : '') + hintWord + ' ';
            msgBox.innerText = "Đã điền từ tiếp theo!";
        }
    }

    function showModal() {
        inputField.blur();
        const data = lessonData[currentIndex];
        
        document.getElementById("trans-en").innerText = data.en;
        document.getElementById("trans-vi").innerText = data.vi;
        document.getElementById("trans-grammar").innerText = data.grammar;
        
        const vocabList = document.getElementById("trans-vocab");
        vocabList.innerHTML = "";
        if(data.vocab.length > 0) {
            data.vocab.forEach(v => {
                let li = document.createElement("li");
                let parts = v.split(" (");
                li.innerHTML = `<strong>${parts[0]}</strong> (${parts[1]}`;
                vocabList.appendChild(li);
            });
        }
        
        modalOverlay.style.display = "flex";
    }

    function nextSentence() {
        modalOverlay.style.display = "none";
        currentIndex++;
        inputField.value = "";
        msgBox.innerText = "";
        
        if (currentIndex < lessonData.length) {
            localStorage.setItem('booking_table_progress', currentIndex);
            updateUI();
            playAudio();
        } else {
            finishLesson();
        }
    }

    function updateProgress() {
        const percent = Math.round((currentIndex / lessonData.length) * 100);
        document.getElementById("progress-percent").innerText = percent;
        document.getElementById("progress-ring").style.background = `conic-gradient(var(--primary) ${percent}%, #eee 0)`;
    }

    function finishLesson() {
        document.getElementById("learning-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        
        let count = parseInt(localStorage.getItem('booking_table_count')) || 0;
        count++;
        localStorage.setItem('booking_table_count', count);
        document.getElementById('study-count').innerText = count;

        localStorage.removeItem('booking_table_progress');

        const transcriptBox = document.getElementById("full-transcript");
        transcriptBox.innerHTML = lessonData.map(d => {
            const color = d.gender === 'female' ? '#c44d34' : '#216773'; /* Màu chữ tương ứng theme mới */
            return `<p style="margin-bottom:15px;">
                <strong style="color:${color}">${d.speaker}:</strong> ${d.en}<br>
                <span style="color:#666; font-size: 14px;">${d.vi}</span>
            </p>`;
        }).join("");
    }

    function restartLesson() {
        localStorage.setItem('booking_table_progress', 0);
        location.reload();
    }

    async function playFullAudio() {
        if (synth.speaking) synth.cancel();
        
        for (let i = 0; i < lessonData.length; i++) {
            await speakSentence(lessonData[i]);
        }
    }

    function speakSentence(data) {
        return new Promise(resolve => {
            const utterThis = new SpeechSynthesisUtterance(data.en);
            utterThis.lang = 'en-US';
            if (data.gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
            else if (data.gender === 'male' && maleVoice) utterThis.voice = maleVoice;
            
            utterThis.onend = resolve;
            synth.speak(utterThis);
        });
    }
</script>
