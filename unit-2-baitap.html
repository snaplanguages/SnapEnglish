<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 2 - Tiếng Anh Cho Người Bắt Đầu</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff5f8;
            --text-main: #4a4a4a;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ffd1dc 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #ffb3ba, #ffdfba);
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 20px rgba(255, 179, 186, 0.3);
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            color: #fff;
            font-size: 2.8em;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: 900;
        }

        .subtitle {
            color: #fff;
            font-size: 1.2em;
            font-weight: 600;
            margin-top: 10px;
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1.5em;
            font-weight: 800;
            color: #ff8b94;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 3px dashed #ffb3ba;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border-top: 10px solid;
            transition: transform 0.3s ease;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.8em;
            font-weight: 800;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #fffcee;
            border: 2px dashed #ffdfba;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-weight: 600;
            color: #d4a017;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-block {
            background: #fcfcfc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #e0e0e0;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #ffb3ba;
            background: #fff5f8;
            transform: scale(1.05);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #baffc9 !important;
            border-color: #4ade80 !important;
            color: #166534 !important;
            animation: pop 0.4s ease;
        }

        .option-btn.incorrect {
            background: #ffb3ba !important;
            border-color: #ff6b6b !important;
            color: #991b1b !important;
            opacity: 0.8;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.3s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 5px solid #4ade80;
        }

        .explanation.error {
            background: #ffebee;
            color: #c62828;
            border-left: 5px solid #ff6b6b;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Colors for different exercises */
        .color-1 { border-top-color: #ffb3ba; }
        .color-1 .ex-title { color: #ff6b81; }
        .color-2 { border-top-color: #ffdfba; }
        .color-2 .ex-title { color: #f39c12; }
        .color-3 { border-top-color: #ffffba; }
        .color-3 .ex-title { color: #d4ac0d; }
        .color-4 { border-top-color: #baffc9; }
        .color-4 .ex-title { color: #2ecc71; }
        .color-5 { border-top-color: #bae1ff; }
        .color-5 .ex-title { color: #3498db; }
        .color-6 { border-top-color: #e2bbfd; }
        .color-6 .ex-title { color: #9b59b6; }
        .color-7 { border-top-color: #ffc4e1; }
        .color-7 .ex-title { color: #e84393; }
        .color-8 { border-top-color: #a0e8af; }
        .color-8 .ex-title { color: #1abc9c; }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ffb3ba;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-to-top:hover {
            transform: translateY(-5px);
            background: #ff8b94;
        }

    </style>
</head>
<body>

    <header>
        <h1>🎀 Trạm Luyện Tập Grammar 🎀</h1>
        <div class="subtitle">Unit 2: Danh từ & Đại từ - Tiếng Anh Cho Người Bắt Đầu</div>
        <div class="score-board">Điểm của bạn: <span id="score">0</span> / 85 🌟</div>
    </header>

    <div class="container" id="app">
        </div>

    <a href="unit-2-grammar.html" class="back-to-top" target="_blank">💡</a>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Đại từ nhân xưng",
                tip: "Đại từ làm CHỦ NGỮ đứng trước động từ (I, You, He, She, It, We, They). Đại từ làm TÂN NGỮ đứng sau động từ hoặc giới từ (me, you, him, her, it, us, them).",
                colorClass: "color-1",
                icon: "🦄",
                questions: [
                    { q: "1. My name is Lan. ___ am Vienamese.", options: ["I", "Me", "My"], a: "I", exp: "Động từ 'am' đi kèm với chủ ngữ là 'I'." },
                    { q: "2. My parents live in Ho Chi Minh City. We visit ___ often.", options: ["they", "them", "their"], a: "them", exp: "'visit' cần một tân ngữ, và phải là số nhiều để thay thế cho 'My parents'." },
                    { q: "3. It's a good story. Do you want to read ___ ?", options: ["it", "its", "they"], a: "it", exp: "Cần tân ngữ thay cho 'a good story' (vật, số ít) nên dùng 'it'." },
                    { q: "4. I have a problem. Can you help ___ ?", options: ["I", "my", "me"], a: "me", exp: "'help' + tân ngữ. Người đang gặp vấn đề là 'I' nên tân ngữ tương ứng là 'me'." },
                    { q: "5. Can ___ show me where I can find a good hotel in this city?", options: ["you", "your", "yours"], a: "you", exp: "Câu hỏi yêu cầu sự giúp đỡ, cần chủ ngữ 'you' đứng trước động từ 'show'." },
                    { q: "6. I know Linh well but ___ doesn't know me.", options: ["she", "her", "hers"], a: "she", exp: "Linh là nữ, đóng vai trò làm chủ ngữ cho vế sau 'doesn't know' nên dùng 'she'." },
                    { q: "7. Nam is a student. ___ is 9 years old.", options: ["He", "Him", "His"], a: "He", exp: "Nam là nam giới, đóng vai trò chủ ngữ nên dùng 'He'." },
                    { q: "8. Mrs Hoa has got a son. She loves ___ a lot.", options: ["he", "him", "his"], a: "him", exp: "'a son' là con trai. Cần tân ngữ đứng sau động từ 'loves' nên dùng 'him'." },
                    { q: "9. My children study at Chu Van An high school. ___ go to school on weekdays.", options: ["They", "Them", "Their"], a: "They", exp: "'My children' là số nhiều. Làm chủ ngữ cho vế sau nên dùng 'They'." },
                    { q: "10. This is Ms Van. I have known ___ for a long time.", options: ["she", "her", "hers"], a: "her", exp: "Ms Van là nữ. Làm tân ngữ sau động từ 'known' nên dùng 'her'." }
                ]
            },
            {
                title: "Exercise 2: Đại từ sở hữu",
                tip: "Đại từ sở hữu = Tính từ sở hữu + Danh từ (Ví dụ: my book -> mine). Dùng để tránh lặp lại danh từ đã nhắc phía trước nha!",
                colorClass: "color-2",
                icon: "🧸",
                questions: [
                    { q: "1. It's your pen. It's ___.", options: ["yours", "your", "you"], a: "yours", exp: "Thay thế cho 'your pen' -> yours." },
                    { q: "2. It's my bag. It's ___.", options: ["mine", "my", "me"], a: "mine", exp: "Thay thế cho 'my bag' -> mine." },
                    { q: "3. It's our car. It's ___.", options: ["ours", "our", "us"], a: "ours", exp: "Thay thế cho 'our car' -> ours." },
                    { q: "4. They're her friends. They're ___.", options: ["hers", "her", "she"], a: "hers", exp: "Thay thế cho 'her friends' -> hers." },
                    { q: "5. It's their house. It's ___.", options: ["theirs", "their", "them"], a: "theirs", exp: "Thay thế cho 'their house' -> theirs." },
                    { q: "6. They're your books. They're ___.", options: ["yours", "your", "you"], a: "yours", exp: "Thay thế cho 'your books' -> yours." },
                    { q: "7. They're my trousers. They're ___.", options: ["mine", "my", "I"], a: "mine", exp: "Thay thế cho 'my trousers' -> mine." },
                    { q: "8. It's his coat. It's ___.", options: ["his", "him", "he"], a: "his", exp: "Thay thế cho 'his coat' -> his. (Tính từ và đại từ sở hữu của 'he' đều là 'his')." },
                    { q: "9. It's my computer. It's ___.", options: ["mine", "my", "I"], a: "mine", exp: "Thay thế cho 'my computer' -> mine." },
                    { q: "10. They're our parents. They're ___.", options: ["ours", "our", "us"], a: "ours", exp: "Thay thế cho 'our parents' -> ours." }
                ]
            },
            {
                title: "Exercise 3: Đại từ phản thân",
                tip: "Kết thúc bằng '-self' (số ít) hoặc '-selves' (số nhiều). Dùng để nhấn mạnh hoặc khi Chủ ngữ và Tân ngữ là CÙNG MỘT người/vật.",
                colorClass: "color-3",
                icon: "✨",
                questions: [
                    { q: "1. My sister teaches ___ English.", options: ["himself", "herself", "themselves"], a: "herself", exp: "Chủ ngữ là 'My sister' (chị gái) -> dùng herself." },
                    { q: "2. He usually looks at ___ in the mirror.", options: ["himself", "yourself", "itself"], a: "himself", exp: "Chủ ngữ là 'He' -> phản thân là himself." },
                    { q: "3. Don't work too hard. Enjoy ___.", options: ["ourselves", "themselves", "yourselves"], a: "yourselves", exp: "Đây là câu mệnh lệnh hướng tới người nghe (you) -> dùng yourselves." },
                    { q: "4. I always make ___ sandwiches for lunch.", options: ["myself", "himself", "itself"], a: "myself", exp: "Chủ ngữ là 'I' -> tự làm cho chính mình -> myself." },
                    { q: "5. This car can stop ___.", options: ["themselves", "herself", "itself"], a: "itself", exp: "Chủ ngữ là 'This car' (vật, số ít) -> dùng itself." },
                    { q: "6. Minh and I ___ saw the thief breaking into the house.", options: ["ourselves", "themselves", "yourself"], a: "ourselves", exp: "Minh and I = We (chúng tôi) -> phản thân là ourselves." },
                    { q: "7. Did you buy that house by ___?", options: ["yourself", "ourselves", "herself"], a: "yourself", exp: "Hỏi 'you' (bạn) có tự mua không -> by yourself." },
                    { q: "8. The children can look after ___ for a day.", options: ["itself", "himself", "themselves"], a: "themselves", exp: "'The children' (số nhiều) -> dùng themselves." },
                    { q: "9. Please try to put ___ in my position!", options: ["ourselves", "herself", "yourself"], a: "yourself", exp: "Câu mệnh lệnh khuyên người nghe đặt 'chính họ' vào vị trí của mình -> yourself." },
                    { q: "10. The light can turn ___ off.", options: ["itself", "herself", "themselves"], a: "itself", exp: "'The light' (vật, số ít) -> dùng itself." }
                ]
            },
            {
                title: "Exercise 4: Đại từ bất định",
                tip: "'some-' dùng trong câu khẳng định. 'any-' dùng trong câu phủ định hoặc nghi vấn. 'no-' mang nghĩa không. 'every-' mang nghĩa tất cả.",
                colorClass: "color-4",
                icon: "🍀",
                questions: [
                    { q: "1. I am so sad. I need ___ to talk to.", options: ["someone", "anyone", "no one"], a: "someone", exp: "Câu khẳng định, cần một ai đó -> dùng someone." },
                    { q: "2. Is there ___ in the room?", options: ["someone", "anyone", "everyone"], a: "anyone", exp: "Câu nghi vấn (hỏi xem có ai không) -> dùng anyone." },
                    { q: "3. The room was empty. There was ___ there.", options: ["someone", "anyone", "no one"], a: "no one", exp: "Phòng trống (empty) nghĩa là không có ai -> dùng no one." },
                    { q: "4. ___ is here. Let's start the meeting.", options: ["Everyone", "Anyone", "No one"], a: "Everyone", exp: "Bắt đầu họp được rồi vì 'tất cả mọi người' đã có mặt -> Everyone." },
                    { q: "5. ___ is impossible.", options: ["Nothing", "Anything", "Someone"], a: "Nothing", exp: "Thành ngữ quen thuộc: 'Nothing is impossible' (Không gì là không thể)." },
                    { q: "6. I'm looking for my motorbike. Has ___ seen it?", options: ["anyone", "someone", "no one"], a: "anyone", exp: "Câu nghi vấn hỏi xem 'có bất cứ ai' thấy không -> anyone." },
                    { q: "7. Don't worry! ___ will be OK.", options: ["Everything", "Anything", "Something"], a: "Everything", exp: "Mọi thứ rồi sẽ ổn thôi -> Everything." },
                    { q: "8. She is bad. She always tells a lie to ___.", options: ["everyone", "anyone", "someone"], a: "everyone", exp: "Cô ấy nói dối tất cả mọi người -> everyone." },
                    { q: "9. I'm hungry. Have you got ___ to eat?", options: ["something", "everything", "nothing"], a: "something", exp: "Dù là câu hỏi nhưng mang tính chất mong muốn/yêu cầu có đồ ăn nên dùng 'something'." },
                    { q: "10. There is ___ wrong here. I can't start my car.", options: ["something", "anything", "nothing"], a: "something", exp: "Có 'cái gì đó' sai sai (câu khẳng định) -> something." }
                ]
            },
            {
                title: "Exercise 5: Đại từ chỉ định",
                tip: "Vị trí GẦN: This (ít) / These (nhiều). Vị trí XA: That (ít) / Those (nhiều).",
                colorClass: "color-5",
                icon: "🍓",
                questions: [
                    { q: "1. Here is my mobilephone. Have a look at ___.", options: ["this", "that", "those"], a: "this", exp: "'Here' (ở đây, gần) và điện thoại số ít -> this." },
                    { q: "2. ___ are lovely flowers. They are too far to see clearly.", options: ["These", "Those", "This"], a: "Those", exp: "'too far' (quá xa) và 'flowers' (số nhiều) -> Those." },
                    { q: "3. Come and see ___! It's a frog!", options: ["this", "that", "those"], a: "this", exp: "Bảo người ta lại xem (gần) -> this." },
                    { q: "4. ___ is my grandfather overthere.", options: ["This", "That", "These"], a: "That", exp: "'overthere' (đằng kia, xa), ông là số ít -> That." },
                    { q: "5. Is ___ your house? - Yes. Let's go inside.", options: ["this", "that", "those"], a: "this", exp: "Rủ vào nhà chứng tỏ đang đứng ngay trước nhà (gần) -> this." },
                    { q: "6. ___ are our children. This is Nam and this is Linh.", options: ["These", "Those", "This"], a: "These", exp: "Đang giới thiệu trực tiếp ở gần, children là số nhiều -> These." },
                    { q: "7. What is ___? The black thing near the red house overthere.", options: ["this", "that", "those"], a: "that", exp: "'overthere' (xa) -> that." },
                    { q: "8. Never say ___ to me again. I hate being heard about him.", options: ["that", "these", "those"], a: "that", exp: "Chỉ sự việc/câu nói vừa xảy ra/được nói ra ở quá khứ -> thường dùng That." },
                    { q: "9. Look at your book and compare it with ___ here.", options: ["this", "that", "those"], a: "this", exp: "'here' (ở đây, gần), so sánh với cuốn sách số ít -> this." },
                    { q: "10. What are ___? Why are you putting them on this table?", options: ["these", "those", "this"], a: "these", exp: "'on this table' (gần), 'them' (số nhiều) -> these." }
                ]
            },
            {
                title: "Exercise 6: Đại từ nghi vấn",
                tip: "Who: hỏi người (chủ ngữ/tân ngữ). What: hỏi vật/sự việc. Which: sự lựa chọn giữa các nhóm cố định.",
                colorClass: "color-6",
                icon: "🔮",
                questions: [
                    { q: "1. ___ is your best friend?", options: ["Who", "What", "Which"], a: "Who", exp: "Hỏi danh tính người (bạn thân là ai) -> Who." },
                    { q: "2. ___ are you speaking to?", options: ["Who", "What", "Which"], a: "Who", exp: "Hỏi người đang nói chuyện cùng (tân ngữ) -> Who (hoặc Whom)." },
                    { q: "3. ___ do you want to do in the future?", options: ["What", "Who", "Which"], a: "What", exp: "Hỏi về công việc, hành động dự định làm gì -> What." },
                    { q: "4. ___ of these bags will you take?", options: ["Which", "What", "Who"], a: "Which", exp: "Hỏi sự lựa chọn trong một số lượng túi nhất định -> Which." },
                    { q: "5. ___ invented telephone?", options: ["Who", "What", "Which"], a: "Who", exp: "Hỏi chủ thể (ai) đã phát minh ra -> Who." },
                    { q: "6. ___ do you like?", options: ["What", "Who", "Which"], a: "What", exp: "Câu hỏi chung chung sở thích cái gì -> What (nếu hỏi người thì dùng Who)." },
                    { q: "7. ___ do you go to the bookshop for?", options: ["What", "Who", "Which"], a: "What", exp: "Cấu trúc 'What... for?' = Tại sao / Để làm gì." },
                    { q: "8. ___ country do you want to visit, England or America?", options: ["Which", "What", "Who"], a: "Which", exp: "Đưa ra sự lựa chọn cụ thể (Anh hay Mỹ) -> Which." },
                    { q: "9. ___ are you?", options: ["Who", "What", "Which"], a: "Who", exp: "Hỏi người 'Bạn là ai?' -> Who." },
                    { q: "10. ___ is watching TV?", options: ["Who", "What", "Which"], a: "Who", exp: "Hỏi chủ thể chỉ người đang thực hiện hành động -> Who." }
                ]
            },
            {
                title: "Exercise 7: Đại từ quan hệ",
                tip: "Who: thay cho người (chủ ngữ). Whom: thay cho người (tân ngữ). Which: thay cho vật. Whose: thay cho sự sở hữu.",
                colorClass: "color-7",
                icon: "🌷",
                questions: [
                    { q: "1. This is the girl ___ works at a hospital.", options: ["who", "whom", "which"], a: "who", exp: "Thay cho 'the girl' làm chủ ngữ của động từ 'works' -> who." },
                    { q: "2. The woman ___ I met yesterday is a famous doctor.", options: ["which", "whom", "whose"], a: "whom", exp: "Thay cho 'The woman' làm tân ngữ cho động từ 'met' (I là chủ ngữ) -> whom." },
                    { q: "3. The film ___ won the OSCAR is about a terrible pandemic.", options: ["who", "which", "whose"], a: "which", exp: "Thay cho 'The film' (vật) làm chủ ngữ -> which." },
                    { q: "4. I have a brother ___ always makes my parents sad.", options: ["who", "whom", "which"], a: "who", exp: "Thay cho 'a brother' làm chủ ngữ cho 'makes' -> who." },
                    { q: "5. My hometown ___ is famous for green tea is located in the north of Vietnam.", options: ["which", "who", "whose"], a: "which", exp: "Thay cho 'My hometown' (vật/nơi chốn) -> which." },
                    { q: "6. The boy ___ father is a footballer can play football well.", options: ["whose", "whom", "who"], a: "whose", exp: "Chỉ sự sở hữu 'bố CỦA cậu bé' -> whose." },
                    { q: "7. The laptop ___ I bought last year still works well.", options: ["who", "whom", "which"], a: "which", exp: "Thay cho 'The laptop' (vật) -> which." },
                    { q: "8. There are many people ___ can eat nothing for many days.", options: ["who", "whom", "whose"], a: "who", exp: "Thay cho 'people' làm chủ ngữ của 'can eat' -> who." },
                    { q: "9. A bus is a big car ___ carries a lot of people.", options: ["who", "whom", "which"], a: "which", exp: "Thay cho 'a big car' (vật) -> which." },
                    { q: "10. The singer ___ many young people like can dance as well.", options: ["which", "whom", "whose"], a: "whom", exp: "Thay cho 'The singer' (người) làm tân ngữ của 'like' ('many young people' là chủ ngữ) -> whom." }
                ]
            },
            {
                title: "Exercise 8: Bài Tập Tổng Hợp",
                tip: "Nhìn kĩ vị trí chỗ trống: Nó là Chủ ngữ? Tân ngữ? Có cần sở hữu hay dùng để tránh lặp từ không nhé!",
                colorClass: "color-8",
                icon: "🏆",
                questions: [
                    { q: "1. ___ is cold today.", options: ["It", "She", "He"], a: "It", exp: "Chủ ngữ giả dùng để chỉ thời tiết luôn là 'It'." },
                    { q: "2. ___ helps me with my homework.", options: ["He", "It", "They"], a: "He", exp: "Động từ 'helps' có 's' nên cần chủ ngữ số ít chỉ người -> He." },
                    { q: "3. ___ are the best teachers I have known.", options: ["They", "We", "You"], a: "They", exp: "Đang khen ngợi những giáo viên khác -> Họ (They) là những giáo viên tốt nhất." },
                    { q: "4. Here is my room. Where is ___ ?", options: ["yours", "your", "you"], a: "yours", exp: "Tránh lặp từ 'your room' nên dùng đại từ sở hữu 'yours'." },
                    { q: "5. Look at ___ ! Here is the photo of my family.", options: ["us", "our", "we"], a: "us", exp: "Giới thiệu ảnh gia đình nên bảo họ 'hãy nhìn chúng tôi' (tân ngữ) -> us." },
                    { q: "6. She is making some cakes for the party. ___ look good!", options: ["They", "It", "Them"], a: "They", exp: "Thay cho 'some cakes' (số nhiều) làm chủ ngữ vế sau -> They." },
                    { q: "7. That book is really interesting. I borrowed ___ from my friend.", options: ["it", "them", "its"], a: "it", exp: "Thay cho 'That book' (số ít, vật) làm tân ngữ -> it." },
                    { q: "8. This is Hoa. ___ is my classmate.", options: ["She", "He", "It"], a: "She", exp: "Hoa là nữ -> Chủ ngữ là She." },
                    { q: "9. \"Can ___ help me with this exercise?\".", options: ["you", "I", "they"], a: "you", exp: "Đang nhờ người đối diện giúp đỡ -> you." },
                    { q: "10. ___ live with our parents in Ha Noi.", options: ["We", "They", "I"], a: "We", exp: "Có 'our parents' (bố mẹ chúng tôi) nên chủ ngữ phải là 'We' (Chúng tôi)." },
                    { q: "11. She was born in Viet Nam and she always thinks about ___.", options: ["it", "its", "them"], a: "it", exp: "Thay cho đất nước Viet Nam (vật/nơi chốn số ít) làm tân ngữ -> it." },
                    { q: "12. \"I can't find my phone.\" \"- Is this ___ ?\"", options: ["yours", "your", "you"], a: "yours", exp: "Hỏi 'đây có phải của bạn không' (your phone) -> yours." },
                    { q: "13. \"Whose book is that?\" \"- It's not ___. My book is old.\"", options: ["mine", "my", "me"], a: "mine", exp: "Tránh lặp 'my book' -> dùng đại từ sở hữu mine (của tôi)." },
                    { q: "14. He's in love with ___ but she doesn't love him.", options: ["her", "she", "hers"], a: "her", exp: "Sau giới từ 'with' cần dùng tân ngữ -> her." },
                    { q: "15. They're nice people. Do you know ___ ?", options: ["them", "they", "their"], a: "them", exp: "Tân ngữ thay cho 'nice people' (số nhiều) -> them." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex, exIndex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            // Title & Tip
            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span>${ex.tip}</span>
                </div>
            `;

            // Questions
            ex.questions.forEach((qObj, qIndex) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                // Question Text
                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                // Options Container
                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                // Explanantion Container
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        // Vô hiệu hóa tất cả nút trong câu hỏi này
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Đúng rồi!</strong> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            // Tìm nút đúng để highlight
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Sai rồi! Đáp án đúng là: ${qObj.a}.</strong> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
