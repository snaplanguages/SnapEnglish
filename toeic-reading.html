<script>
    const container = document.getElementById('unitContainer');
    const noResultsMsg = document.getElementById('noResults');
    const searchInput = document.getElementById('searchInput');

    // Cấu hình dữ liệu
    const startYear = 2018;
    const endYear = 2026;
    const lessons = [];

    // Tự động tạo danh sách bài học
    for (let year = startYear; year <= endYear; year++) {
        // Xác định số test: 2018 có 5 test, các năm khác có 10 test
        const maxTest = (year === 2018) ? 5 : 10;
        
        for (let test = 1; test <= maxTest; test++) {
            [5, 6, 7].forEach(part => {
                lessons.push({
                    year: year,
                    part: part,
                    test: test,
                    title: `Reading Part ${part} - Test ${test} - ${year}`,
                    // Link nội bộ .html và không target_blank
                    url: `part-${part}-test-${test}-${year}.html`
                });
            });
        }
    }

    function renderLessons() {
        lessons.forEach((item, index) => {
            const card = document.createElement('a');
            card.className = 'unit-card';
            card.href = item.url;
            // Cập nhật data-search để tìm được cả theo test
            card.setAttribute('data-search', `${item.year} part ${item.part} test ${item.test}`);
            // Giảm độ trễ animation một chút vì số lượng bài học giờ khá nhiều
            card.style.animationDelay = `${(index % 20) * 0.02}s`;

            card.innerHTML = `
                <div class="status-badge"></div>
                <div class="unit-info">
                    <span class="unit-tag">TOEIC 800+</span>
                    <h3 class="unit-title">${item.title}</h3>
                </div>
                <div class="arrow-btn">→</div>
            `;
            container.appendChild(card);
        });
    }

    // Xử lý tìm kiếm
    searchInput.addEventListener('input', function() {
        const filter = this.value.toLowerCase().trim();
        const cards = document.querySelectorAll('.unit-card');
        let count = 0;

        cards.forEach(card => {
            const searchText = card.getAttribute('data-search');
            if (searchText.includes(filter)) {
                card.classList.remove('hidden');
                count++;
            } else {
                card.classList.add('hidden');
            }
        });

        // Hiển thị thông báo nếu không có kết quả
        if (count === 0) {
            noResultsMsg.classList.remove('hidden');
        } else {
            noResultsMsg.classList.add('hidden');
        }
    });

    // Khởi tạo
    renderLessons();
   </script>
