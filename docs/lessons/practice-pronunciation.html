<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapEnglish - Pronunciation</title>
     <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #D4B4CB; 
            --bg-color: #FAF5F7;
            --text-main: #5C4A52;
            --white: #FFFFFF;
            --success: #88B7B5; 
            --danger: #E29587; 
            --card-hover: #F2E3EE;
        }

        * { box-sizing: border-box; font-family: 'Quicksand', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(212, 180, 203, 0.2);
            position: relative;
        }

        h1 { text-align: center; color: var(--text-main); margin-bottom: 5px; font-size: 1.8rem; }
        .subtitle { text-align: center; color: #999; margin-bottom: 30px; font-size: 0.9rem; }

        /* --- MÀN HÌNH TRANG CHỦ --- */
        #homeScreen { display: block; }

        .lesson-list { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            max-height: 60vh; 
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Tùy chỉnh thanh cuộn */
        .lesson-list::-webkit-scrollbar { width: 6px; }
        .lesson-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .lesson-list::-webkit-scrollbar-track { background: var(--bg-color); border-radius: 10px; }

        .lesson-card {
            background: var(--bg-color);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .lesson-card:hover {
            transform: translateY(-3px);
            background: var(--card-hover);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(212, 180, 203, 0.3);
        }

        .lesson-icon {
            font-size: 1.8rem;
            margin-right: 15px;
            background: var(--white);
            min-width: 50px; height: 50px;
            border-radius: 15px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .lesson-info h3 { margin: 0 0 5px 0; color: var(--text-main); font-size: 1rem; line-height: 1.3;}
        .lesson-info p { margin: 0; font-size: 0.8rem; color: #777; }

        /* --- MÀN HÌNH LUYỆN TẬP --- */
        #lessonScreen { display: none; text-align: center; }
        
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        
        .btn-back {
            background: none; border: none; color: #999;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: 0.2s;
        }
        .btn-back:hover { color: var(--text-main); }

        .ipa-card { background: var(--bg-color); border-radius: 20px; padding: 30px; margin-bottom: 20px; }
        .sound-display { font-size: 3rem; font-weight: 700; color: var(--primary); margin: 0; line-height: 1.2; word-wrap: break-word;}
        .word-display { font-size: 1.2rem; color: var(--text-main); margin-top: 10px; font-weight: 600; }

        .btn {
            background: var(--primary); color: var(--white); border: none;
            padding: 12px 25px; border-radius: 50px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: 0.3s; margin: 5px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 180, 203, 0.4); }
        .btn:disabled { background: #ddd; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-record {
            background: var(--text-main); width: 60px; height: 60px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            margin: 20px auto; font-size: 1.5rem;
        }
        .btn-record.recording { background: var(--danger); animation: pulse 1.5s infinite; }

        .result-box { margin-top: 20px; padding: 15px; border-radius: 15px; display: none; }
        .score-text { font-size: 2rem; font-weight: 700; margin: 0; }
        .feedback-text { font-size: 0.95rem; margin-top: 10px; }

        .btn-hint {
            position: fixed; bottom: 30px; right: 30px; background: #FFD166;
            color: #fff; width: 60px; height: 60px; border-radius: 50%;
            border: none; font-size: 1.8rem; cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 209, 102, 0.4); z-index: 1000; display: none;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(92, 74, 82, 0.5); backdrop-filter: blur(5px);
            z-index: 1001; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--white); width: 85%; max-width: 400px;
            border-radius: 20px; padding: 30px; position: relative; text-align: center;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #999; }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(226, 149, 135, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(226, 149, 135, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(226, 149, 135, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div id="homeScreen">
            <h1>Lộ Trình Tinh Tế</h1>
            <p class="subtitle">Chọn bài học hôm nay của bạn nhé</p>
            <div class="lesson-list" id="lessonListContainer">
                </div>
        </div>

        <div id="lessonScreen">
            <div class="header-action">
                <button class="btn-back" onclick="goHome()">⬅️ Quay lại</button>
                <div id="progressText" style="color: #999; font-size: 0.9rem;">1 / 40</div>
            </div>
            
            <h2 id="lessonTitle" style="margin-top: 0; font-size: 1.4rem;">Tiêu đề bài học</h2>

            <div class="ipa-card">
                <h2 class="sound-display" id="ipaWord">word</h2>
                <div class="word-display" id="ipaSubtitle">Luyện đọc từ vựng</div>
            </div>

            <button class="btn" onclick="playAudio()">🔊 Nghe Mẫu</button>
            <button class="btn btn-record" id="recordBtn" onclick="toggleRecording()" title="Bấm để đọc">🎙️</button>
            <p id="statusText">Bấm mic và đọc từ trên</p>

            <div class="result-box" id="resultBox">
                <p class="score-text" id="scoreValue">0%</p>
                <p class="feedback-text" id="feedbackText"></p>
            </div>

            <button class="btn" id="nextBtn" onclick="nextSound()" style="margin-top: 20px; width: 100%;" disabled>Chuyển Tiếp ➔</button>
        </div>

    </div>

    <button class="btn-hint" id="hintBtn" onclick="openModal()">💡</button>
    <div class="modal" id="hintModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--primary); margin-top: 0;">Hướng Dẫn</h2>
            <p><strong>Bí quyết:</strong> <span id="modalInstruction">...</span></p>
            <p style="color: var(--danger);"><strong>Lỗi sai thường gặp:</strong> <span id="modalError">...</span></p>
        </div>
    </div>

                inst: "Âm mang trọng âm đọc to hơn, dài hơn và cao hơn. Các âm khác lướt nhanh (thường biến thành âm /ə/).", 
                err: "Đọc ngang ngang không có nhấn nhá.",
                words: "record,present,export,import,object,subject,project,contract,desert,rebel,conduct,conflict,suspect,permit,transfer,insult,produce,perfect,abstract,combine,increase,decrease,update,upgrade,refund,discount,protest,invite,delay,decide,arrive,happen,listen,open,water,paper,pencil,guitar,machine,police".split(",")
            },
            intonation: { 
                title: "Ngữ điệu (Intonation)", icon: "⭐", 
                inst: "Câu hỏi Yes/No lên giọng ở cuối. Câu hỏi WH, câu trần thuật xuống giọng ở cuối.", 
                err: "Đọc đều đều như cái máy rập khuôn.",
                words: [
                    "How are you?", "What is your name?", "Where do you live?", "Are you ready?", 
                    "Do you like it?", "Is it raining?", "I bought apples, oranges, and bananas.", 
                    "She is smart, kind, and beautiful.", "Yes.", "No.", "Maybe.", "I don't know.", 
                    "That's amazing!", "Oh really?", "Watch out!", "Stop!", "Please sit down.", 
                    "Could you help me?", "I am so happy today.", "Why did you do that?", 
                    "Are you coming or not?", "Would you like tea or coffee?", "It's a nice day, isn't it?", 
                    "You live here, don't you?", "He didn't go, did he?", "They are coming, aren't they?", 
                    "Wow!", "Ouch!", "I see.", "Exactly.", "Go ahead.", "Hurry up!", "See you later.", 
                    "Have a good day.", "Can you speak louder?", "What time is it?", "I love this game.",
                    "Don't do that!", "Are we there yet?", "It is beautiful."
                ]
            }
        };

        // --- KHỞI TẠO BIẾN ---
        let currentLessonKey = '';
        let currentIndex = 0;
        let isRecording = false;
        let recognitionTimeout = null;

        // --- KHỞI TẠO MÀN HÌNH CHÍNH ---
        function renderHome() {
            const listContainer = document.getElementById('lessonListContainer');
            listContainer.innerHTML = '';
            
            for (const key in lessonsData) {
                const lesson = lessonsData[key];
                const card = document.createElement('div');
                card.className = 'lesson-card';
                card.onclick = () => openLesson(key);
                
                card.innerHTML = `
                    <div class="lesson-icon">${lesson.icon}</div>
                    <div class="lesson-info">
                        <h3>${lesson.title}</h3>
                        <p>${lesson.words.length} cụm từ luyện tập</p>
                    </div>
                `;
                listContainer.appendChild(card);
            }
        }

        // --- ĐIỀU HƯỚNG MÀN HÌNH ---
        function openLesson(key) {
            currentLessonKey = key;
            currentIndex = 0;

            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('lessonScreen').style.display = 'block';
            document.getElementById('hintBtn').style.display = 'flex';

            document.getElementById('lessonTitle').innerText = lessonsData[key].title;
            
            document.getElementById('modalInstruction').innerText = lessonsData[key].inst;
            document.getElementById('modalError').innerText = lessonsData[key].err;

            loadWord();
        }

        function goHome() {
            document.getElementById('homeScreen').style.display = 'block';
            document.getElementById('lessonScreen').style.display = 'none';
            document.getElementById('hintBtn').style.display = 'none';
            if(isRecording && recognition) recognition.stop();
        }

        // --- CẤU HÌNH NHẬN DIỆN GIỌNG NÓI ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = true; 
            recognition.continuous = false;
            recognition.maxAlternatives = 1;
        }

        const ui = {
            wordDisplay: document.getElementById('ipaWord'),
            subtitle: document.getElementById('ipaSubtitle'),
            progress: document.getElementById('progressText'),
            recordBtn: document.getElementById('recordBtn'),
            statusText: document.getElementById('statusText'),
            resultBox: document.getElementById('resultBox'),
            scoreValue: document.getElementById('scoreValue'),
            feedbackText: document.getElementById('feedbackText'),
            nextBtn: document.getElementById('nextBtn')
        };

        // Hàm hỗ trợ reset giao diện Mic
        function resetMicUI(message = 'Đã dừng mic. Bấm để thử lại!') {
            isRecording = false;
            ui.recordBtn.classList.remove('recording');
            clearTimeout(recognitionTimeout); 
            
            if (ui.statusText.innerText.includes('Đang') || ui.statusText.innerText === '') {
                ui.statusText.innerText = message;
            }
        }

        // --- CÁC HÀM XỬ LÝ GIAO DIỆN ---
        function loadWord() {
            const currentLesson = lessonsData[currentLessonKey];
            const currentWord = currentLesson.words[currentIndex];
            
            ui.wordDisplay.innerText = currentWord;
            ui.subtitle.innerText = currentLessonKey === 'intonation' ? 'Đọc đúng ngữ điệu câu' : 'Phát âm chuẩn xác';
            ui.progress.innerText = `${currentIndex + 1} / ${currentLesson.words.length}`;
            
            ui.resultBox.style.display = 'none';
            ui.nextBtn.disabled = true;
            ui.statusText.innerText = 'Bấm mic và đọc từ trên';
            
            if (isRecording && recognition) recognition.stop(); 
        }

        function playAudio() {
            const wordToPlay = lessonsData[currentLessonKey].words[currentIndex];
            const utterance = new SpeechSynthesisUtterance(wordToPlay);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        // --- ĐIỀU KHIỂN NÚT THU ÂM ---
        function toggleRecording() {
            if (!recognition) { alert("Trình duyệt không hỗ trợ. Hãy dùng Google Chrome hoặc Edge."); return; }
            
            if (isRecording) { 
                recognition.stop(); 
                resetMicUI('Bạn đã chủ động tắt mic.');
                return; 
            }
            
            try {
                ui.resultBox.style.display = 'none'; 
                recognition.start();
            } catch (e) {
                console.warn("Lỗi khởi động mic:", e);
                recognition.stop();
            }
        }

        // --- CÁC SỰ KIỆN VÒNG ĐỜI CỦA MIC ---
        if (recognition) {
            recognition.onstart = function() {
                isRecording = true;
                ui.recordBtn.classList.add('recording');
                ui.statusText.innerText = 'Đang bật mic...';

                clearTimeout(recognitionTimeout);
                recognitionTimeout = setTimeout(() => {
                    if (isRecording) {
                        recognition.stop();
                        resetMicUI('Hết thời gian chờ. Xin vui lòng đọc lớn và rõ hơn.');
                    }
                }, 6000);
            };

            recognition.onaudiostart = function() {
                ui.statusText.innerText = 'Đang nghe... Hãy nói ngay!';
            };

            recognition.onresult = function(event) {
                clearTimeout(recognitionTimeout); 

                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript;
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                if (interimTranscript) {
                    ui.statusText.innerText = `Đang nghe: "${interimTranscript}..."`;
                }

                if (finalTranscript) {
                    const spokenWord = finalTranscript.toLowerCase().trim();
                    ui.statusText.innerText = `Bạn đã đọc: "${spokenWord}"`;
                    calculateScore(spokenWord);
                }
            };

            recognition.onend = function() {
                resetMicUI('Không nhận diện được từ, bạn thử lại nhé!');
            };

            recognition.onerror = function(event) {
                let errorMsg = 'Lỗi mic, vui lòng thử lại.';
                switch(event.error) {
                    case 'network': errorMsg = 'Lỗi mạng! Quá trình dịch giọng nói cần có Internet.'; break;
                    case 'not-allowed': errorMsg = 'Trình duyệt đang chặn Micro. Vui lòng cấp quyền!'; break;
                    case 'no-speech': errorMsg = 'Không nghe thấy âm thanh. Bấm mic và thử lại.'; break;
                    case 'aborted': errorMsg = 'Đã hủy thu âm.'; break;
                }
                resetMicUI(errorMsg);
            };
        }

        // --- TÍNH ĐIỂM ---
        function calculateScore(spoken) {
            let target = lessonsData[currentLessonKey].words[currentIndex].toLowerCase().replace(/[.,?!]/g, '');
            let spokenClean = spoken.replace(/[.,?!]/g, '');
            let score = 0;

            if (spokenClean === target || spokenClean.includes(target) || target.includes(spokenClean)) {
                score = Math.floor(Math.random() * (100 - 85 + 1) + 85);
            } else if (spokenClean[0] === target[0]) {
                score = Math.floor(Math.random() * (79 - 50 + 1) + 50);
            } else {
                score = Math.floor(Math.random() * 40);
            }
            showResult(score, spoken);
        }

        function showResult(score, spoken) {
            ui.resultBox.style.display = 'block';
            ui.scoreValue.innerText = `${score}%`;

            if (score >= 80) {
                ui.resultBox.style.backgroundColor = '#E8F3F2';
                ui.scoreValue.style.color = 'var(--success)';
                ui.feedbackText.innerText = "Tuyệt vời! Bạn phát âm rất chuẩn.";
                ui.feedbackText.style.color = 'var(--success)';
                ui.nextBtn.disabled = false;
            } else {
                ui.resultBox.style.backgroundColor = '#FCEBE8';
                ui.scoreValue.style.color = 'var(--danger)';
                ui.feedbackText.innerText = `Chưa đạt 80%. Bạn đọc thành "${spoken}".\n💡 Hãy bấm vào 💡 (Góc phải dưới) để xem lỗi sai thường gặp.`;
                ui.feedbackText.style.color = 'var(--danger)';
                ui.nextBtn.disabled = true;
            }
        }

        function nextSound() {
            const currentLesson = lessonsData[currentLessonKey];
            if (currentIndex < currentLesson.words.length - 1) {
                currentIndex++;
                loadWord();
            } else {
                alert("Chúc mừng! Bạn đã hoàn thành toàn bộ chuyên đề này.");
                goHome();
            }
        }

        // --- MODAL ---
        function openModal() { document.getElementById('hintModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('hintModal').style.display = 'none'; }

        // Khởi chạy App
        window.onload = renderHome;
    </script>
</body>
</html>
