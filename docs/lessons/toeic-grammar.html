<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Grammar | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette pastel trưởng thành & thanh lịch */
            --pastel-bg: #fdfbf7;
            --pastel-green: #dcedc8;
            --pastel-purple: #d1c4e9;
            --pastel-peach: #ffccbc;
            
            /* Glassmorphism */
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-main: #3d3d3d;
            --text-sub: #8c8c8c;
            --accent: #7e57c2;
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0;
            padding: 40px 5%; /* Padding linh hoạt theo % màn hình */
            background: linear-gradient(120deg, var(--pastel-bg) 0%, #f4effa 50%, #fcf4ec 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            box-sizing: border-box;
        }

        /* Hình nền trang trí làm điểm nhấn mờ */
        body::before {
            content: '';
            position: fixed;
            top: -10%; left: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--pastel-purple) 0%, transparent 70%);
            opacity: 0.4;
            z-index: -1;
            filter: blur(40px);
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%; right: -10%;
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--pastel-peach) 0%, transparent 70%);
            opacity: 0.3;
            z-index: -1;
            filter: blur(50px);
        }

        /* WATERMARK */
        .watermark {
            position: fixed;
            bottom: 10px;
            right: 30px;
            font-size: 8vw; /* Kích thước to nhưng mờ */
            font-weight: 800;
            color: rgba(0, 0, 0, 0.03);
            z-index: -2;
            pointer-events: none;
            user-select: none;
            white-space: nowrap;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            color: var(--accent); 
            font-size: 36px;
            margin-bottom: 10px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            color: var(--text-sub);
            font-size: 16px;
            font-weight: 600;
            margin-top: 0;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 0 auto 30px auto;
            padding: 12px 28px;
            background: #ffffff;
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(126, 87, 194, 0.15);
        }

        /* SEARCH BAR */
        .search-wrapper {
            max-width: 600px;
            margin: 0 auto 40px auto;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 18px 50px 18px 30px;
            border-radius: 50px;
            border: 1px solid #e0e0e0;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-main);
            outline: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #searchInput::placeholder { color: #a0a0a0; }

        #searchInput:focus {
            border-color: var(--pastel-purple);
            box-shadow: 0 10px 30px rgba(209, 196, 233, 0.4);
            background: #ffffff;
        }

        .search-icon {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            pointer-events: none;
        }

        /* CONTAINER DÀN TRẢI TOÀN MÀN HÌNH */
        .container { 
            width: 100%; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        /* CARDS */
        a.unit-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 24px;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #ffffff;
            position: relative;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
        }

        /* Đường viền màu bên trái thẻ */
        a.unit-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 5px;
            background: linear-gradient(to bottom, var(--pastel-peach), var(--pastel-purple));
            transition: width 0.3s ease;
            opacity: 0.8;
        }
        
        a.unit-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(209, 196, 233, 0.4);
            background: #ffffff;
        }

        a.unit-card:hover::before { width: 8px; }

        .unit-info {
            text-align: left;
            flex-grow: 1;
            padding-left: 15px;
        }

        .unit-number {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent); 
            font-weight: 800;
            display: block;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .unit-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
            line-height: 1.5;
        }

        .arrow-icon {
            color: #bfa5e1; 
            font-size: 22px;
            background: #f8f6fc;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        a.unit-card:hover .arrow-icon {
            background: var(--pastel-purple);
            color: #fff;
            transform: scale(1.1);
        }

        .hidden { display: none !important; }
        
        #noResults {
            text-align: center;
            grid-column: 1 / -1;
            color: var(--text-sub);
            font-size: 16px;
            font-weight: 600;
            display: none;
            padding: 40px;
            background: rgba(255,255,255,0.5);
            border-radius: 24px;
            border: 1px dashed #d1c4e9;
        }
    </style>
</head>
<body>

    <div class="watermark">SnapEnglish</div>

    <header>
        <h1>✨ TOEIC Grammar</h1>
        <p class="subtitle">Hành trình chinh phục ngữ pháp từ con số 0 với SnapEnglish</p>
        <a href="index.html" class="home-btn">🏠 Về Trang Chủ</a>
    </header>
    
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Tìm kiếm bài học (VD: 12 hoặc Tương lai)...">
        <span class="search-icon">🔍</span>
    </div>

    <div class="container" id="unitContainer">
        <div id="noResults">Không tìm thấy bài học nào phù hợp nè... 🥺</div>
    </div>

   <script>
    const titles = [
        "Các thì đơn", "Bẫy các thì đơn", "Thì tiếp diễn", "Thì hoàn thành", "Sự hòa hợp danh từ và động từ (P1)", 
        "Sự hòa hợp danh từ và động từ (P2)", "Ôn tập", "Câu bị động", "Bẫy câu bị động", "Câu điều kiện", "Mệnh đề quan hệ", "Bẫy mệnh đề quan hệ",
        "Ôn tập", "Đại từ", "Danh từ", "Danh từ đếm được và không đếm được", "Các cụm danh từ thường gặp", "Bẫy danh từ",
        "Tính từ", "Các cụm tính từ thường gặp", "Ôn tập", "Bẫy tính từ", "Trạng từ", "Các cụm trạng từ thường gặp",
        "Các cụm động từ thường gặp", "Cụm động từ & giới từ", "Liên từ (P1)", "Liên từ (P2)", "Giới từ", "Ôn tập"
    ];

    const links = [
        "unit-1-toeic.html", "unit-2-toeic.html", "unit-3-toeic.html", "unit-4-toeic.html", "unit-5-toeic.html", 
        "unit-6-toeic.html", "unit-7-toeic.html", "unit-8-toeic.html", "unit-9-toeic.html", "unit-10-toeic.html", 
        "unit-11-toeic.html", "unit-12-toeic.html", "unit-13-toeic.html", "unit-14-toeic.html", "unit-15-toeic.html", 
        "unit-16-toeic.html", "unit-17-toeic.html", "unit-18-toeic.html", "unit-19-toeic.html", "unit-20-toeic.html", 
        "unit-21-toeic.html", "unit-22-toeic.html", "unit-23-toeic.html", "unit-24-toeic.html", "unit-25-toeic.html", 
        "unit-26-toeic.html", "unit-27-toeic.html", "unit-28-toeic.html", "unit-29-toeic.html", "unit-30-toeic.html"
    ];

    const container = document.getElementById('unitContainer');
    const searchInput = document.getElementById('searchInput');
    const noResultsMsg = document.getElementById('noResults');

    function renderUnits() {
        titles.forEach((title, index) => {
            const unitNum = index + 1;
            const link = links[index] || "#"; 

            const card = document.createElement('a');
            card.className = 'unit-card';
            card.setAttribute('data-search', `unit ${unitNum} ${title.toLowerCase()}`);
            
            if (link !== "#") {
                card.href = link;
                card.target = "_blank"; 
            } else {
                card.href = "javascript:void(0)";
                card.onclick = function() {
                    alert("🚧 Bài này chưa được gắn link (cần sửa trong code)!");
                };
            }

            card.innerHTML = `
                <div class="unit-info">
                    <span class="unit-number">Unit ${unitNum}</span>
                    <h3 class="unit-title">${title}</h3>
                </div>
                <div class="arrow-icon">➔</div>
            `;
            container.insertBefore(card, noResultsMsg);
        });
    }

    searchInput.addEventListener('input', function() {
        const filter = this.value.toLowerCase().trim();
        const cards = document.querySelectorAll('.unit-card');
        let hasResult = false;

        cards.forEach(card => {
            const searchText = card.getAttribute('data-search');
            if (searchText.includes(filter)) {
                card.classList.remove('hidden');
                hasResult = true;
            } else {
                card.classList.add('hidden');
            }
        });

        if (!hasResult) {
            noResultsMsg.style.display = 'block';
        } else {
            noResultsMsg.style.display = 'none';
        }
    });

    renderUnits();
   </script>

</body>
</html>
