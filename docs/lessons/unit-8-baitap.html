<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 8 - Thì Quá Khứ Đơn</title>
     <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0fdf4;
            --text-main: #14532d;
            --white: #ffffff;
            --primary: #4ade80;
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#bbf7d0 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* THANH CỐ ĐỊNH NHỎ GỌN */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #86efac, #f9a8d4);
            padding: 10px 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(134, 239, 172, 0.4);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            border: 3px solid #fff;
            border-top: none;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #fff;
            font-size: 1.6em;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #fff;
            font-size: 0.95em;
            font-weight: 700;
            margin-top: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 5px 25px;
            border-radius: 20px;
            font-size: 1.25em;
            font-weight: 800;
            color: #db2777;
            margin-top: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px dashed #fbcfe8;
            transition: transform 0.3s ease;
        }

        .score-board:hover {
            transform: scale(1.05);
        }

        .container {
            max-width: 900px;
            margin: 30px auto 0;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(74, 222, 128, 0.1);
            border-top: 8px solid;
            transition: transform 0.3s ease;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #fdf2f8;
            border: 2px dashed;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05em;
        }

        .question-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #dcfce7;
            transition: all 0.3s ease;
        }

        .question-block:hover {
            border-color: #86efac;
            box-shadow: 0 5px 15px rgba(134, 239, 172, 0.15);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #166534;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #f0fdf4;
            border: 2px solid #bbf7d0;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: #15803d;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #4ade80;
            background: #dcfce7;
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #bbf7d0 !important;
            border-color: #22c55e !important;
            color: #14532d !important;
            animation: bounce 0.4s ease;
        }

        .option-btn.incorrect {
            background: #fecdd3 !important;
            border-color: #f43f5e !important;
            color: #881337 !important;
            opacity: 0.9;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.4s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fff1f2;
            color: #e11d48;
            border-left: 5px solid #f43f5e;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-to-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #f9a8d4;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(249, 168, 212, 0.4);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            background: #f472b6;
        }

        /* Color Themes for 4 Exercises */
        .color-1 { border-top-color: #4ade80; }
        .color-1 .ex-title { color: #16a34a; }
        .color-1 .tip-box { border-color: #86efac; color: #15803d; background: #f0fdf4;}

        .color-2 { border-top-color: #f472b6; }
        .color-2 .ex-title { color: #db2777; }
        .color-2 .tip-box { border-color: #fbcfe8; color: #be185d; background: #fdf2f8;}

        .color-3 { border-top-color: #2dd4bf; }
        .color-3 .ex-title { color: #0d9488; }
        .color-3 .tip-box { border-color: #5eead4; color: #0f766e; background: #f0fdfa;}

        .color-4 { border-top-color: #a78bfa; }
        .color-4 .ex-title { color: #7c3aed; }
        .color-4 .tip-box { border-color: #c4b5fd; color: #6d28d9; background: #f5f3ff;}

    </style>
</head>
<body>

    <div class="sticky-header">
        <h1>🍃 Trạm Luyện Tập Grammar 🍃</h1>
        <div class="subtitle">Unit 8: Thì Quá Khứ Đơn (Past Simple Tense)</div>
        <div class="score-board">Điểm: <span id="score">0</span> / 45 🌟</div>
    </div>

    <div class="container" id="app">
        </div>

    <a href="unit-8-grammar.html" class="back-to-top" title="Lên đầu trang">⬆️</a>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Chia dạng đúng của động từ",
                tip: "Dấu hiệu nhận biết: yesterday, last (night/week/month/year), ago, in + năm trong quá khứ. Động từ có quy tắc thêm '-ed', bất quy tắc thì phải học thuộc cột 2 nha! (Ví dụ: go -> went). Nhớ mượn trợ động từ 'did/didn't' cho câu hỏi và phủ định.",
                colorClass: "color-1",
                icon: "🥑",
                questions: [
                    { q: "1. I (go) to the zoo with my family yesterday.", options: ["went", "goed", "was go"], a: "went", exp: "Dấu hiệu 'yesterday'. 'Go' là động từ bất quy tắc, cột 2 là 'went'." },
                    { q: "2. She (not/watch) TV last night.", options: ["don't watch", "didn't watch", "wasn't watch"], a: "didn't watch", exp: "Câu phủ định ở thì quá khứ đơn mượn trợ động từ 'didn't', động từ chính giữ nguyên." },
                    { q: "3. (they/play) football last Sunday?", options: ["Do they play", "Were they play", "Did they play"], a: "Did they play", exp: "Câu hỏi ở quá khứ đảo trợ động từ 'Did' lên trước chủ ngữ." },
                    { q: "4. We (visit) our grandparents two days ago.", options: ["visit", "visitted", "visited"], a: "visited", exp: "Dấu hiệu 'two days ago'. 'Visit' là động từ có quy tắc, chỉ cần thêm '-ed'." },
                    { q: "5. He (buy) a new car in 2015.", options: ["buyed", "bought", "did buy"], a: "bought", exp: "Dấu hiệu 'in 2015'. 'Buy' là động từ bất quy tắc, quá khứ là 'bought'." },
                    { q: "6. I (be) very tired after the long trip.", options: ["was", "were", "am"], a: "was", exp: "Động từ 'to be' chia theo ngôi 'I' ở quá khứ là 'was'." },
                    { q: "7. They (not/be) happy with the final result.", options: ["didn't be", "weren't", "wasn't"], a: "weren't", exp: "Động từ 'to be' phủ định với chủ ngữ số nhiều 'They' là 'were not' -> 'weren't'." },
                    { q: "8. What (you/do) last weekend?", options: ["did you do", "do you did", "were you do"], a: "did you do", exp: "Câu hỏi Wh-word: What + did + S + V(nguyên thể)?" },
                    { q: "9. The train (leave) at 8 a.m. this morning.", options: ["leaved", "left", "was leave"], a: "left", exp: "Sự việc 'this morning' đã kết thúc. 'Leave' bất quy tắc chuyển thành 'left'." },
                    { q: "10. She (give) me a beautiful gift for my birthday.", options: ["gived", "gave", "given"], a: "gave", exp: "Động từ 'give' bất quy tắc chuyển thành 'gave'." },
                    { q: "11. My father (work) in that factory 10 years ago.", options: ["work", "worked", "has worked"], a: "worked", exp: "Dấu hiệu '10 years ago'. Thêm '-ed' vào động từ thường 'work'." },
                    { q: "12. We (have) a great time at the party last night.", options: ["haved", "had", "has"], a: "had", exp: "'Have' chuyển sang quá khứ là 'had'." },
                    { q: "13. (he/be) at home yesterday?", options: ["Did he be", "Was he", "Were he"], a: "Was he", exp: "Câu hỏi với động từ 'to be'. Ngôi 'He' dùng 'Was' đảo lên đầu." },
                    { q: "14. I (read) that book last summer.", options: ["read", "readed", "was read"], a: "read", exp: "'Read' bất quy tắc, viết vẫn là 'read' nhưng phát âm là /red/ ở quá khứ." },
                    { q: "15. The children (not/sleep) well last night.", options: ["weren't sleep", "didn't sleep", "doesn't sleep"], a: "didn't sleep", exp: "Phủ định của động từ thường: didn't + V(nguyên thể)." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice (Trắc nghiệm)",
                tip: "Luôn tìm các từ khóa chỉ thời gian trong câu (yesterday, in 1990...) để xác định chắc chắn đây là thì Quá khứ đơn nha!",
                colorClass: "color-2",
                icon: "🍓",
                questions: [
                    { q: "1. They _______ a new house last month.", options: ["A. bought", "B. buy", "C. have bought"], a: "A. bought", exp: "Có 'last month' -> Thì Quá khứ đơn. Động từ bất quy tắc buy -> bought." },
                    { q: "2. Where _______ you last night?", options: ["A. did", "B. were", "C. was"], a: "B. were", exp: "Câu hỏi không có động từ thường mà hỏi về vị trí/trạng thái -> Dùng động từ to be 'were' cho ngôi 'you'." },
                    { q: "3. She _______ her keys yesterday, so she couldn't get in.", options: ["A. loses", "B. lost", "C. has lost"], a: "B. lost", exp: "Có 'yesterday' -> Hành động đã xảy ra và chấm dứt (lost)." },
                    { q: "4. _______ you _______ to the party last weekend?", options: ["A. Did / went", "B. Were / go", "C. Did / go"], a: "C. Did / go", exp: "Cấu trúc nghi vấn: Did + S + V(nguyên thể)." },
                    { q: "5. I _______ the movie very much. It was boring.", options: ["A. didn't like", "B. wasn't like", "C. don't like"], a: "A. didn't like", exp: "Động từ 'like' (thích) mượn trợ động từ 'didn't' cho câu phủ định ở quá khứ." },
                    { q: "6. He _______ me a letter two weeks ago.", options: ["A. send", "B. sent", "C. sended"], a: "B. sent", exp: "Có 'two weeks ago'. Động từ bất quy tắc send -> sent." },
                    { q: "7. We _______ a lot of photos on our holiday in Japan.", options: ["A. took", "B. taked", "C. take"], a: "A. took", exp: "Chuyến đi nghỉ mát đã kết thúc. Take photos -> took photos." },
                    { q: "8. The weather _______ really good yesterday.", options: ["A. is", "B. was", "C. were"], a: "B. was", exp: "'The weather' (thời tiết) là danh từ không đếm được/số ít -> to be là 'was'." },
                    { q: "9. She _______ to music all evening yesterday.", options: ["A. listens", "B. listened", "C. listening"], a: "B. listened", exp: "Hành động nghe nhạc diễn ra vào tối qua -> Thêm '-ed' thành 'listened'." },
                    { q: "10. I _______ him at the shopping mall last Tuesday.", options: ["A. saw", "B. see", "C. seed"], a: "A. saw", exp: "Động từ bất quy tắc see -> saw." }
                ]
            },
            {
                title: "Exercise 3: Chọn câu dịch đúng / Đồng nghĩa",
                tip: "Hãy đối chiếu cấu trúc Khẳng định, Phủ định, và Nghi vấn trong tiếng Việt với tiếng Anh. Chú ý đừng nhầm lẫn giữa động từ To Be và động từ thường nhé!",
                colorClass: "color-3",
                icon: "🌿",
                questions: [
                    { q: "1. 'Hôm qua tôi đã không đi học.'", options: ["A. I wasn't go to school yesterday.", "B. I didn't go to school yesterday."], a: "B. I didn't go to school yesterday.", exp: "'Đi học' là động từ thường nên ta phải mượn trợ động từ 'didn't'." },
                    { q: "2. 'Bạn đã làm gì tối qua?'", options: ["A. What did you do last night?", "B. What were you do last night?"], a: "A. What did you do last night?", exp: "Câu hỏi Wh-word có động từ chính (do), ta dùng: What + did + you + do?" },
                    { q: "3. 'Anh ấy đã mua chiếc xe đó vào năm 2020.'", options: ["A. He bought that car in 2020.", "B. He has bought that car in 2020."], a: "A. He bought that car in 2020.", exp: "Có mốc thời gian rõ ràng trong quá khứ (in 2020) bắt buộc dùng QK Đơn." },
                    { q: "4. 'Bọn trẻ đã rất hào hứng với chuyến đi.'", options: ["A. The children were very excited about the trip.", "B. The children did very excited about the trip."], a: "A. The children were very excited about the trip.", exp: "'Excited' là tính từ nên ta dùng động từ to be 'were' (vì children là số nhiều)." },
                    { q: "5. 'Tuần trước trời đã mưa rất to.'", options: ["A. It was rained heavily last week.", "B. It rained heavily last week."], a: "B. It rained heavily last week.", exp: "'Rain' vừa là danh từ vừa là động từ. Ở đây nó đóng vai trò động từ thường -> rained." },
                    { q: "6. 'Cô ấy đã không sống ở đây cách đây 5 năm.'", options: ["A. She didn't live here 5 years ago.", "B. She wasn't live here 5 years ago."], a: "A. She didn't live here 5 years ago.", exp: "Phủ định của động từ thường 'live' -> didn't live." },
                    { q: "7. 'Bố tôi đã từng hút thuốc rất nhiều (bây giờ thì không).' ", options: ["A. My father used to smoke a lot.", "B. My father usually smoked a lot."], a: "A. My father used to smoke a lot.", exp: "Cấu trúc 'used to + V' diễn tả thói quen trong quá khứ nay đã chấm dứt." },
                    { q: "8. 'Bộ phim đã bắt đầu lúc 7 giờ tối.'", options: ["A. The movie started at 7 PM.", "B. The movie did start at 7 PM."], a: "A. The movie started at 7 PM.", exp: "Câu khẳng định chỉ cần thêm '-ed' vào động từ thường 'started'." },
                    { q: "9. 'Họ đã ở London vào tháng trước phải không?'", options: ["A. Did they be in London last month?", "B. Were they in London last month?"], a: "B. Were they in London last month?", exp: "Hỏi về vị trí ở quá khứ -> dùng động từ to be đảo lên đầu." },
                    { q: "10. 'Tôi đã thấy cô ấy tại bữa tiệc.'", options: ["A. I saw her at the party.", "B. I see her at the party yesterday."], a: "A. I saw her at the party.", exp: "'See' là động từ bất quy tắc -> quá khứ là 'saw'." }
                ]
            },
            {
                title: "Exercise 4: Quá khứ đơn (Past Simple) VS Hiện tại hoàn thành (Present Perfect)",
                tip: "Đây là chướng ngại vật lớn nhất! Quá khứ đơn: Có thời gian cụ thể (hôm qua, năm 2010). Hiện tại hoàn thành: Không có thời gian cụ thể, mang tính trải nghiệm (ever, never), hoặc bắt đầu ở quá khứ kéo dài đến tận HIỆN TẠI (for, since).",
                colorClass: "color-4",
                icon: "🔮",
                questions: [
                    { q: "1. I (know) him since 2010.", options: ["A. knew", "B. have known"], a: "B. have known", exp: "Có 'since 2010' (kể từ 2010 đến nay vẫn biết) -> Dùng HT Hoàn Thành." },
                    { q: "2. I (meet) him in 2010.", options: ["A. met", "B. have met"], a: "A. met", exp: "Có 'in 2010' (vào năm 2010) là một thời điểm cụ thể đã chấm dứt -> Dùng QK Đơn." },
                    { q: "3. She (already/finish) her homework. She can play now.", options: ["A. already finished", "B. has already finished"], a: "B. has already finished", exp: "Có 'already' và hậu quả lưu lại hiện tại (có thể đi chơi) -> HT Hoàn Thành." },
                    { q: "4. She (finish) her homework two hours ago.", options: ["A. finished", "B. has finished"], a: "A. finished", exp: "Có 'ago' (cách đây 2 giờ) -> Dùng QK Đơn." },
                    { q: "5. We (not/see) them last week.", options: ["A. didn't see", "B. haven't seen"], a: "A. didn't see", exp: "Có 'last week' (tuần trước) -> Quá khứ đơn." },
                    { q: "6. We (not/see) them for a week. I miss them.", options: ["A. didn't see", "B. haven't seen"], a: "B. haven't seen", exp: "Có 'for a week' (được 1 tuần nay rồi) -> Hiện tại hoàn thành." },
                    { q: "7. (you/ever/eat) sushi?", options: ["A. Did you ever eat", "B. Have you ever eaten"], a: "B. Have you ever eaten", exp: "Có 'ever' hỏi về trải nghiệm từ trước tới nay -> HT Hoàn thành." },
                    { q: "8. (you/eat) sushi last night?", options: ["A. Did you eat", "B. Have you eaten"], a: "A. Did you eat", exp: "Hỏi về sự việc xảy ra tại mốc thời gian cụ thể 'last night' -> QK Đơn." },
                    { q: "9. He (live) in this house for 5 years.", options: ["A. lived", "B. has lived"], a: "B. has lived", exp: "Có 'for 5 years' (sống được 5 năm và hiện vẫn đang sống ở đây) -> HT Hoàn Thành." },
                    { q: "10. He (live) in Paris from 2010 to 2015.", options: ["A. lived", "B. has lived"], a: "A. lived", exp: "Khoảng thời gian (2010 - 2015) đã hoàn toàn kết thúc trong quá khứ -> Dùng QK Đơn." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo học tài:</strong> ${ex.tip}</span>
                </div>
            `;

            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Tuyệt vời!</strong> <br> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${qObj.a}.</strong> <br> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
