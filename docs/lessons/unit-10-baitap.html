    <script>
        const exercises = [
            {
                title: "Exercise 1: Chia động từ (Quá khứ hoàn thành)",
                tip: "Cấu trúc siêu đơn giản: S + had + V3/ed. Nhớ nhé: Hành động xảy ra TRƯỚC dùng Quá khứ hoàn thành, hành động xảy ra SAU dùng Quá khứ đơn. Dấu hiệu: After, Before, By the time, When.",
                colorClass: "color-1",
                icon: "🏕️",
                questions: [
                    { q: "1. When I arrived at the cinema, the film (start).", options: ["started", "had started", "was starting"], a: "had started", exp: "Bộ phim đã bắt đầu (TRƯỚC) khi tôi đến (SAU). Dùng QK Hoàn thành cho hành động xảy ra trước." },
                    { q: "2. After he (finish) his work, he went home.", options: ["finished", "has finished", "had finished"], a: "had finished", exp: "Sau 'After' là hành động xảy ra trước -> had finished. Vế sau 'went home' (QKĐ) là hành động xảy ra sau." },
                    { q: "3. By the time the police arrived, the thief (escape).", options: ["escaped", "has escaped", "had escaped"], a: "had escaped", exp: "Cấu trúc: By the time + S + V(quá khứ đơn), S + had + V3/ed (kẻ trộm đã tẩu thoát trước khi cảnh sát tới)." },
                    { q: "4. I couldn't buy the ticket because I (lose) my wallet.", options: ["lost", "had lost", "was losing"], a: "had lost", exp: "Việc mất ví (had lost) xảy ra trước việc không thể mua vé (couldn't buy)." },
                    { q: "5. Before they moved to Hanoi, they (live) in Hue for 5 years.", options: ["lived", "had lived", "have lived"], a: "had lived", exp: "Hành động sống ở Huế xảy ra trước hành động chuyển đến Hà Nội (moved)." },
                    { q: "6. She (already / eat) dinner when we called her.", options: ["had already eaten", "already ate", "has already eaten"], a: "had already eaten", exp: "Cô ấy 'đã ăn xong rồi' (xảy ra trước) trước khi chúng tôi gọi (called - xảy ra sau)." },
                    { q: "7. (you / ever / visit) this museum before 2020?", options: ["Did you ever visit", "Have you ever visited", "Had you ever visited"], a: "Had you ever visited", exp: "Trải nghiệm tính đến một mốc thời gian trong quá khứ (before 2020) -> Quá khứ hoàn thành." },
                    { q: "8. They (not / meet) each other until yesterday's party.", options: ["didn't meet", "hadn't met", "haven't met"], a: "hadn't met", exp: "Cho tới tận bữa tiệc hôm qua (mốc quá khứ), họ chưa từng gặp nhau trước đó -> hadn't met." },
                    { q: "9. The grass was yellow because it (not / rain) all summer.", options: ["didn't rain", "hadn't rained", "wasn't raining"], a: "hadn't rained", exp: "Nguyên nhân (hadn't rained) dẫn tới kết quả trong quá khứ (was yellow) -> Dùng QK Hoàn thành." },
                    { q: "10. He realized that he (forget) his keys at the office.", options: ["forgot", "had forgotten", "forgets"], a: "had forgotten", exp: "Nhận ra (realized - quá khứ) một việc đã xảy ra trước đó (had forgotten)." },
                    { q: "11. When we got to the station, the train (already / leave).", options: ["already left", "had already left", "was already leaving"], a: "had already left", exp: "Tàu đã rời đi TRƯỚC khi chúng tôi tới ga." },
                    { q: "12. I (never / see) such a beautiful beach before I went to Hawaii.", options: ["never saw", "have never seen", "had never seen"], a: "had never seen", exp: "Chưa từng thấy bãi biển nào đẹp thế (xảy ra trước) mốc thời gian đi Hawaii (went - quá khứ)." },
                    { q: "13. Tom was tired because he (study) hard the night before.", options: ["studied", "had studied", "was studying"], a: "had studied", exp: "Việc học chăm chỉ (đêm trước) là nguyên nhân của việc mệt mỏi (quá khứ)." },
                    { q: "14. We passed the exam because we (prepare) very well.", options: ["prepared", "had prepared", "have prepared"], a: "had prepared", exp: "Chuẩn bị tốt (trước) nên mới thi đậu (sau - passed)." },
                    { q: "15. (she / do) her homework before she went out?", options: ["Did she do", "Had she done", "Has she done"], a: "Had she done", exp: "Hỏi xem việc làm bài tập có xảy ra TRƯỚC việc đi chơi (went out) hay không." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice (Trắc nghiệm)",
                tip: "Phân tích kĩ trình tự thời gian của các hành động trong câu. Nhớ kỹ 2 cấu trúc vàng: 'After + QKHT, QKĐ' và 'Before/By the time + QKĐ, QKHT'.",
                colorClass: "color-2",
                icon: "🦊",
                questions: [
                    { q: "1. She didn't want to go to the cinema because she _______ the film.", options: ["A. saw", "B. has seen", "C. had seen"], a: "C. had seen", exp: "Lý do không muốn đi (didn't want - quá khứ) là vì ĐÃ XEM bộ phim đó từ trước rồi (had seen)." },
                    { q: "2. _______ they had eaten dinner, they went for a walk.", options: ["A. Before", "B. After", "C. By the time"], a: "B. After", exp: "Hành động ăn tối chia QKHT (had eaten), tức là xảy ra trước. Mệnh đề chứa QKHT đứng sau từ 'After'." },
                    { q: "3. By the time I arrived, the guests _______.", options: ["A. had left", "B. left", "C. were leaving"], a: "A. had left", exp: "Cấu trúc: By the time + QKĐ (arrived), QKHT (had left)." },
                    { q: "4. He told me he _______ the book I gave him.", options: ["A. lost", "B. had lost", "C. loses"], a: "B. had lost", exp: "Anh ấy 'kể' (told - quá khứ) về một việc 'đã mất sách' (xảy ra trước lúc kể) -> had lost." },
                    { q: "5. We were late for the flight because we _______ our passports.", options: ["A. forgot", "B. had forgotten", "C. have forgotten"], a: "B. had forgotten", exp: "Nguyên nhân xảy ra trước (quên hộ chiếu) dẫn đến hậu quả trong quá khứ (trễ chuyến bay)." },
                    { q: "6. I _______ English for 3 years before I moved to London.", options: ["A. studied", "B. have studied", "C. had studied"], a: "C. had studied", exp: "Học 3 năm (xảy ra trước) rồi mới chuyển tới London (moved - quá khứ)." },
                    { q: "7. When she got to the shop, it _______.", options: ["A. closed", "B. had closed", "C. was closing"], a: "B. had closed", exp: "Khi tới nơi (got - QKĐ) thì cửa hàng đã đóng cửa mất rồi (had closed - xảy ra trước)." },
                    { q: "8. The children were excited because they _______ to a zoo before.", options: ["A. had never been", "B. never went", "C. have never been"], a: "A. had never been", exp: "Họ hào hứng (were - QK) vì tính đến lúc đó họ CHƯA TỪNG tới sở thú (had never been)." },
                    { q: "9. _______ you finished your work before the boss came?", options: ["A. Did", "B. Have", "C. Had"], a: "C. Had", exp: "Câu hỏi dạng QKHT: Had + S + V3/ed? (Bạn ĐÃ làm xong trước khi sếp ĐẾN chưa?)" },
                    { q: "10. Mary _______ the house by the time her husband came back.", options: ["A. cleaned", "B. had cleaned", "C. was cleaning"], a: "B. had cleaned", exp: "Cấu trúc: S + had + V3/ed + by the time + S + V2/ed." },
                    { q: "11. He couldn't recognize her because she _______ a lot.", options: ["A. changed", "B. had changed", "C. has changed"], a: "B. had changed", exp: "Cô ấy đã thay đổi (trước đó) nên anh ta mới không nhận ra (couldn't - quá khứ)." },
                    { q: "12. I understood the story only after I _______ it twice.", options: ["A. read", "B. have read", "C. had read"], a: "C. had read", exp: "Đã đọc 2 lần (xảy ra trước) rồi mới hiểu (understood - xảy ra sau)." },
                    { q: "13. They _______ the project before the deadline arrived.", options: ["A. finished", "B. had finished", "C. finish"], a: "B. had finished", exp: "Hoàn thành dự án (TRƯỚC) thời hạn chót (SAU)." },
                    { q: "14. My mother was angry because I _______ my room.", options: ["A. hadn't cleaned", "B. didn't clean", "C. haven't cleaned"], a: "A. hadn't cleaned", exp: "Mẹ tức giận (was - QK) vì trước đó tôi đã không dọn phòng (hadn't cleaned)." },
                    { q: "15. David _______ the guitar for 5 years before he joined the band.", options: ["A. played", "B. has played", "C. had played"], a: "C. had played", exp: "Hành động chơi guitar kéo dài 5 năm xảy ra TRƯỚC hành động tham gia ban nhạc (joined - QKĐ)." }
                ]
            },
            {
                title: "Exercise 3: Chọn câu đồng nghĩa / Dịch chuẩn",
                tip: "Lưu ý vị trí của 'Before' và 'After'. <br> Mệnh đề đi liền sau 'After' chia QK Hoàn thành. <br> Mệnh đề đi liền sau 'Before' chia QK Đơn.",
                colorClass: "color-3",
                icon: "🍂",
                questions: [
                    { q: "1. 'Sau khi tôi hoàn thành bài tập, tôi đã đi ngủ.'", options: ["A. After I had finished my homework, I went to bed.", "B. After I finished my homework, I had gone to bed."], a: "A. After I had finished my homework, I went to bed.", exp: "Làm bài tập TRƯỚC (had finished) -> Đi ngủ SAU (went)." },
                    { q: "2. 'Trước khi anh ấy đến, chúng tôi đã ăn tối xong.'", options: ["A. Before he had arrived, we ate dinner.", "B. Before he arrived, we had eaten dinner."], a: "B. Before he arrived, we had eaten dinner.", exp: "Ăn tối TRƯỚC (had eaten) -> Anh ấy đến SAU (arrived). 'Before' đứng trước hành động xảy ra sau." },
                    { q: "3. 'Tôi đã không gặp cô ấy cho đến ngày hôm qua.'", options: ["A. I hadn't met her until yesterday.", "B. I didn't meet her until yesterday."], a: "A. I hadn't met her until yesterday.", exp: "Tính đến 'ngày hôm qua' (mốc QK) thì sự việc 'chưa gặp' đã xảy ra và kéo dài -> QKHT." },
                    { q: "4. 'Cô ấy đã sống ở đây 10 năm trước khi cô ấy chuyển đi.'", options: ["A. She had lived here for 10 years before she moved.", "B. She lived here for 10 years before she had moved."], a: "A. She had lived here for 10 years before she moved.", exp: "Sống ở đây TRƯỚC (had lived) -> Chuyển đi SAU (moved)." },
                    { q: "5. 'Anh ấy nói rằng anh ấy đã làm mất vé.'", options: ["A. He said that he lost the ticket.", "B. He said that he had lost the ticket."], a: "B. He said that he had lost the ticket.", exp: "Nói (said - QKĐ), mất vé xảy ra trước lúc nói -> had lost." },
                    { q: "6. 'Họ đã dọn dẹp nhà cửa trước lúc khách tới.'", options: ["A. They had cleaned the house by the time the guests arrived.", "B. They cleaned the house by the time the guests had arrived."], a: "A. They had cleaned the house by the time the guests arrived.", exp: "Dọn nhà TRƯỚC (had cleaned), khách đến SAU (arrived)." },
                    { q: "7. 'Đây là lần đầu tiên tôi ăn món sushi (tính tới mốc hôm qua).'", options: ["A. It was the first time I ate sushi.", "B. It was the first time I had eaten sushi."], a: "B. It was the first time I had eaten sushi.", exp: "Cấu trúc: It was the first time + S + had + V3/ed." },
                    { q: "8. 'Bởi vì anh ấy đã không học bài, anh ấy đã trượt kỳ thi.'", options: ["A. Because he hadn't studied, he failed the exam.", "B. Because he didn't study, he had failed the exam."], a: "A. Because he hadn't studied, he failed the exam.", exp: "Không học bài (Nguyên nhân xảy ra trước -> hadn't studied), trượt (Hậu quả xảy ra sau -> failed)." },
                    { q: "9. 'Khi chúng tôi đến rạp, bộ phim đã bắt đầu được 10 phút.'", options: ["A. When we arrived at the cinema, the film had started for 10 minutes.", "B. When we arrived at the cinema, the film started 10 minutes ago."], a: "A. When we arrived at the cinema, the film had started for 10 minutes.", exp: "Hành động bắt đầu đã diễn ra TRƯỚC lúc đến rạp và kéo dài được 1 khoảng thời gian." },
                    { q: "10. 'Tôi nhận ra rằng tôi đã để quên điện thoại ở nhà.'", options: ["A. I realized that I left my phone at home.", "B. I realized that I had left my phone at home."], a: "B. I realized that I had left my phone at home.", exp: "Việc 'để quên' xảy ra TRƯỚC việc 'nhận ra' (realized)." }
                ]
            },
            {
                title: "Exercise 4: Quá khứ đơn (Past Simple) VS Quá khứ hoàn thành (Past Perfect)",
                tip: "Thử thách nhận diện: Cùng nằm trong câu kể về quá khứ, hãy đọc kỹ xem hành động nào XẢY RA TRƯỚC (chọn QK Hoàn thành), hành động nào XẢY RA SAU (chọn QK Đơn).",
                colorClass: "color-4",
                icon: "🔮",
                questions: [
                    { q: "1. The house was very quiet because everyone (go) to sleep.", options: ["A. went", "B. had gone"], a: "B. had gone", exp: "Ngôi nhà yên tĩnh (was - xảy ra sau) VÌ mọi người ĐÃ đi ngủ hết (had gone - xảy ra trước)." },
                    { q: "2. Yesterday, I (go) to the supermarket and bought some milk.", options: ["A. went", "B. had gone"], a: "A. went", exp: "Chuỗi hành động xảy ra liên tiếp nhau trong quá khứ (đi siêu thị rồi mua sữa) -> Tất cả dùng QK Đơn." },
                    { q: "3. When we (arrive) at the party, John had already left.", options: ["A. arrived", "B. had arrived"], a: "A. arrived", exp: "Việc chúng tôi đến (arrived) xảy ra SAU việc John đã rời đi (had left)." },
                    { q: "4. I (not / see) my friend for 5 years when we met yesterday.", options: ["A. didn't see", "B. hadn't seen"], a: "B. hadn't seen", exp: "Khoảng thời gian 5 năm không gặp ĐÃ KÉO DÀI tới tận lúc gặp nhau hôm qua (met) -> QK Hoàn thành." },
                    { q: "5. He asked me what I (do) the previous night.", options: ["A. did", "B. had done"], a: "B. had done", exp: "Anh ta hỏi (asked - QK), hành động được hỏi diễn ra vào đêm trước đó (the previous night) -> Xảy ra trước -> had done." },
                    { q: "6. I (lose) my key yesterday, but luckily I found it this morning.", options: ["A. lost", "B. had lost"], a: "A. lost", exp: "Việc mất chìa khóa hôm qua là một hành động đơn lẻ kết thúc trong quá khứ -> Dùng QK Đơn." },
                    { q: "7. The teacher corrected the tests which the students (do).", options: ["A. did", "B. had done"], a: "B. had done", exp: "Học sinh làm bài test (had done - TRƯỚC) thì giáo viên mới có thể chấm bài (corrected - SAU)." },
                    { q: "8. Before I (go) to bed, I had turned off all the lights.", options: ["A. went", "B. had gone"], a: "A. went", exp: "Đi ngủ là hành động xảy ra SAU hành động tắt đèn (had turned off) -> went." },
                    { q: "9. I couldn't open the door because I (forget) my keys.", options: ["A. forgot", "B. had forgotten"], a: "B. had forgotten", exp: "Việc quên chìa khóa (had forgotten) là nguyên nhân xảy ra TRƯỚC hậu quả không thể mở cửa (couldn't open)." },
                    { q: "10. He (open) the door, turned on the light, and sat down.", options: ["A. opened", "B. had opened"], a: "A. opened", exp: "Chuỗi 3 hành động xảy ra liên tiếp nhau (mở cửa, bật đèn, ngồi xuống) -> Tất cả đều chia QK Đơn." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo ăn điểm:</strong> ${ex.tip}</span>
                </div>
            `;

            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${qObj.a}.</strong> <br> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
