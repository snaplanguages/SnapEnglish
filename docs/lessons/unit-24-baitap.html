    <script>
        const exercises = [
            {
                title: "Exercise 1 [202401]: Điền đại từ/trạng từ quan hệ thích hợp",
                tip: "Xác định danh từ đứng ngay trước chỗ trống (người, vật, thời gian, nơi chốn) và vai trò của từ cần điền trong mệnh đề phụ (chủ ngữ, tân ngữ hay sở hữu). Lưu ý dấu phẩy (,) không dùng 'that'.",
                questions: [
                    ["Question 1 [517008]: Las Vegas, _______ is located in the State of Nevada, is well-known for its casinos and night clubs.", 
                    ["A. which", "B. that", "C. where", "D. who"], 0, 
                    "<ul><li><strong>A đúng:</strong> 'Las Vegas' là danh từ chỉ vật/địa điểm, đóng vai trò chủ ngữ cho động từ 'is located', dùng 'which'.</li><li><strong>B sai:</strong> Có dấu phẩy (mệnh đề không xác định) nên KHÔNG được dùng 'that'.</li><li><strong>C sai:</strong> 'where' là trạng từ (thay cho in/at which), không thể làm chủ ngữ.</li><li><strong>D sai:</strong> 'who' chỉ dùng cho người.</li></ul>"],

                    ["Question 2 [517009]: My uncle, _______ works for a markets research company, is now on a tour of South-East Asian countries.", 
                    ["A. who", "B. whom", "C. that", "D. whose"], 0, 
                    "<ul><li><strong>A đúng:</strong> 'My uncle' là người, làm chủ ngữ cho động từ 'works' -> dùng 'who'.</li><li><strong>B sai:</strong> 'whom' làm tân ngữ, không làm chủ ngữ.</li><li><strong>C sai:</strong> Có dấu phẩy nên không dùng 'that'.</li><li><strong>D sai:</strong> 'whose' chỉ sự sở hữu, sau nó phải là một danh từ.</li></ul>"],

                    ["Question 3 [517010]: This film was made by Steven Spielberg, _______ has won several Oscar prizes.", 
                    ["A. that", "B. which", "C. who", "D. whom"], 2, 
                    "<ul><li><strong>A sai:</strong> Có dấu phẩy nên không dùng 'that'.</li><li><strong>B sai:</strong> 'Steven Spielberg' là người, không dùng 'which'.</li><li><strong>C đúng:</strong> Chỉ người, làm chủ ngữ cho 'has won' -> dùng 'who'.</li><li><strong>D sai:</strong> 'whom' làm tân ngữ, không làm chủ ngữ.</li></ul>"],

                    ["Question 4 [517011]: Mrs May, _______ husband teaches mathematics in this school, is also a teacher of English.", 
                    ["A. who", "B. whom", "C. whose", "D. that"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Không thể hiện được mối quan hệ sở hữu.</li><li><strong>C đúng:</strong> Giữa hai danh từ 'Mrs May' và 'husband' có mối quan hệ sở hữu (chồng của bà May) -> dùng 'whose'.</li></ul>"],

                    ["Question 5 [517012]: She bought me this new pairs of shoes, _______ didn't fit me well.", 
                    ["A. which", "B. that", "C. where", "D. who"], 0, 
                    "<ul><li><strong>A đúng:</strong> 'shoes' là vật, làm chủ ngữ cho 'didn't fit' -> dùng 'which'.</li><li><strong>B sai:</strong> Có dấu phẩy nên không dùng 'that'.</li><li><strong>C sai:</strong> 'where' chỉ nơi chốn.</li><li><strong>D sai:</strong> 'who' chỉ người.</li></ul>"],

                    ["Question 6 [517013]: His letter, _______ I received two days ago, is full of interesting news.", 
                    ["A. which", "B. that", "C. where", "D. when"], 0, 
                    "<ul><li><strong>A đúng:</strong> 'His letter' là vật, làm tân ngữ cho 'received' -> dùng 'which'.</li><li><strong>B sai:</strong> Có dấu phẩy nên không dùng 'that'.</li><li><strong>C sai:</strong> Chỉ nơi chốn.</li><li><strong>D sai:</strong> Chỉ thời gian.</li></ul>"],

                    ["Question 7 [517014]: My friend Tam, _______ sister is an actress, often gets free tickets for the theater.", 
                    ["A. who", "B. whom", "C. whose", "D. that"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Không chỉ sự sở hữu. (Đặc biệt D không dùng sau dấu phẩy).</li><li><strong>C đúng:</strong> Tương tự câu 4, 'sister' thuộc sở hữu của 'Tam' (chị của Tâm) -> dùng 'whose'.</li></ul>"],

                    ["Question 8 [517015]: My sister, _______ you once met, is coming to visit us tomorrow.", 
                    ["A. who", "B. whom", "C. that", "D. whose"], 1, 
                    "<ul><li><strong>A sai (hoặc kém chính xác):</strong> 'who' thường làm chủ ngữ. Tuy trong văn nói có thể dùng thay whom, nhưng văn viết chuẩn chọn whom.</li><li><strong>B đúng:</strong> 'My sister' là người, làm tân ngữ cho động từ 'met' (you met my sister) -> dùng 'whom'.</li><li><strong>C sai:</strong> Có phẩy không dùng 'that'.</li><li><strong>D sai:</strong> Không có danh từ sở hữu theo sau.</li></ul>"],

                    ["Question 9 [517016]: We talk about the party _______ Sarah wants to organize for my birthday.", 
                    ["A. whom", "B. which", "C. where", "D. when"], 1, 
                    "<ul><li><strong>A sai:</strong> Chỉ người.</li><li><strong>B đúng:</strong> 'the party' là sự vật/sự việc, làm tân ngữ cho 'organize' -> dùng 'which' (hoặc 'that').</li><li><strong>C sai:</strong> Chỉ nơi chốn, không làm tân ngữ.</li><li><strong>D sai:</strong> Chỉ thời gian.</li></ul>"],

                    ["Question 10 [517017]: The paintings _______ Mr. Flowers has in his house are worth around £100,000.", 
                    ["A. whom", "B. which", "C. whose", "D. where"], 1, 
                    "<ul><li><strong>A sai:</strong> Chỉ người.</li><li><strong>B đúng:</strong> 'The paintings' là vật, làm tân ngữ cho 'has' -> dùng 'which'.</li><li><strong>C sai:</strong> Chỉ sở hữu.</li><li><strong>D sai:</strong> Chỉ nơi chốn.</li></ul>"],

                    ["Question 11 [517018]: She is probably the hardest student _______ I've ever taught.", 
                    ["A. who", "B. whom", "C. that", "D. which"], 2, 
                    "<ul><li><strong>A, B sai:</strong> Tuy chỉ người nhưng khi có so sánh nhất (the hardest) thì bắt buộc dùng 'that'.</li><li><strong>C đúng:</strong> Dùng 'that' sau cụm từ có chứa so sánh nhất.</li><li><strong>D sai:</strong> 'which' chỉ vật.</li></ul>"],

                    ["Question 12 [517019]: Stevenson is an architect _______ designs have won some international prizes.", 
                    ["A. who", "B. whom", "C. whose", "D. that"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Không biểu đạt được ý sở hữu.</li><li><strong>C đúng:</strong> 'designs' (các bản thiết kế) thuộc sở hữu của kiến trúc sư (architect) -> dùng 'whose'.</li></ul>"],

                    ["Question 13 [517020]: Dorothy said something _______ I couldn't hear clearly.", 
                    ["A. that", "B. who", "C. whom", "D. whose"], 0, 
                    "<ul><li><strong>A đúng:</strong> Sau các đại từ bất định (something, anything, everything, nothing...) ta luôn dùng 'that'.</li><li><strong>B, C, D sai:</strong> Sai loại từ.</li></ul>"],

                    ["Question 14 [517021]: There was a little _______ we couldn't do to help her.", 
                    ["A. that", "B. which", "C. who", "D. whom"], 0, 
                    "<ul><li><strong>A đúng:</strong> Tương tự câu 13, sau các đại từ như (all, little, much, few...) ta ưu tiên dùng 'that'.</li><li><strong>B sai:</strong> 'which' ít được dùng sau 'a little'.</li><li><strong>C, D sai:</strong> Chỉ người.</li></ul>"],

                    ["Question 15 [517022]: These walls are all _______ remain of the city.", 
                    ["A. that", "B. which", "C. where", "D. what"], 0, 
                    "<ul><li><strong>A đúng:</strong> Mệnh đề quan hệ đứng sau 'all' bắt buộc dùng 'that'.</li><li><strong>B sai:</strong> Không dùng 'which' sau 'all'.</li><li><strong>C sai:</strong> Trạng từ nơi chốn.</li><li><strong>D sai:</strong> 'what' không phải là đại từ quan hệ thay thế cho danh từ đứng trước.</li></ul>"],

                    ["Question 16 [517023]: It may be the most important decision _______ you have ever made.", 
                    ["A. which", "B. that", "C. where", "D. when"], 1, 
                    "<ul><li><strong>A sai:</strong> Không dùng 'which' sau so sánh nhất.</li><li><strong>B đúng:</strong> 'the most important' là so sánh nhất, bắt buộc dùng 'that'.</li><li><strong>C, D sai:</strong> Không phù hợp nghĩa.</li></ul>"],

                    ["Question 17 [517024]: The reason _______ grass is green was a mystery to the little boy.", 
                    ["A. why", "B. which", "C. when", "D. where"], 0, 
                    "<ul><li><strong>A đúng:</strong> Đi với danh từ 'the reason' (lý do) ta dùng trạng từ quan hệ 'why' (hoặc for which).</li><li><strong>B sai:</strong> Nếu dùng which phải có giới từ 'for'.</li><li><strong>C, D sai:</strong> Chỉ thời gian / nơi chốn.</li></ul>"],

                    ["Question 18 [517025]: That is the village _______ I spent my childhood with my brother.", 
                    ["A. which", "B. where", "C. that", "D. when"], 1, 
                    "<ul><li><strong>A, C sai:</strong> 'the village' ở đây đóng vai trò là nơi chốn diễn ra hành động (spent childhood IN the village), nên không dùng đại từ quan hệ (which/that) làm tân ngữ.</li><li><strong>B đúng:</strong> Thay thế cho nơi chốn (in the village) -> dùng 'where'.</li><li><strong>D sai:</strong> 'when' chỉ thời gian.</li></ul>"],

                    ["Question 19 [517026]: I've seen the little girl and her puppy _______ have lived next door for ages.", 
                    ["A. who", "B. which", "C. that", "D. whom"], 2, 
                    "<ul><li><strong>A sai:</strong> 'who' chỉ thay được cho người (the little girl), bỏ sót 'her puppy'.</li><li><strong>B sai:</strong> 'which' chỉ thay được cho vật (her puppy), bỏ sót 'the little girl'.</li><li><strong>C đúng:</strong> Khi cụm danh từ phía trước bao gồm CẢ NGƯỜI LẪN VẬT, ta bắt buộc phải dùng 'that'.</li><li><strong>D sai:</strong> Chỉ tân ngữ người.</li></ul>"],

                    ["Question 20 [517027]: I still remember the day _______ I met my wife for the first time.", 
                    ["A. which", "B. when", "C. where", "D. why"], 1, 
                    "<ul><li><strong>A sai:</strong> Nếu dùng 'which' phải có giới từ 'on' (on which = when).</li><li><strong>B đúng:</strong> 'the day' là danh từ chỉ thời gian, dùng trạng từ quan hệ 'when'.</li><li><strong>C, D sai:</strong> Chỉ nơi chốn / lý do.</li></ul>"]
                ]
            },
            {
                title: "Exercise 2 [202402]: Chọn đáp án đúng để hoàn thành các câu sau",
                tip: "Vận dụng kiến thức tương tự Bài 1. Chú ý các cấu trúc câu chẻ (It is/was ... that) và các đại từ bất định.",
                questions: [
                    ["Question 1 [517028]: She gives her children everything _______ they want.", 
                    ["A. that", "B. who", "C. whom", "D. what"], 0, 
                    "<ul><li><strong>A đúng:</strong> Sau các đại từ bất định (everything, anything...) luôn dùng 'that'.</li><li><strong>B, C sai:</strong> Dùng cho người, trong khi 'everything' là vật.</li><li><strong>D sai:</strong> 'what' không phải là đại từ quan hệ thay thế cho từ đứng trước.</li></ul>"],

                    ["Question 2 [517029]: Tell me _______ you want and I will try to help you.", 
                    ["A. that", "B. what", "C. who", "D. which"], 1, 
                    "<ul><li><strong>A, C, D sai:</strong> Các từ này là đại từ quan hệ, BẮT BUỘC phải có một danh từ đứng trước làm tiền ngữ (antecedent). Ở đây trước chỗ trống là động từ 'Tell me', không có danh từ.</li><li><strong>B đúng:</strong> 'what' (những gì) hoạt động như một cụm danh từ + đại từ quan hệ (= the thing that).</li></ul>"],

                    ["Question 3 [517030]: The place _______ we spent our holiday was really beautiful.", 
                    ["A. what", "B. who", "C. where", "D. which"], 2, 
                    "<ul><li><strong>A, B sai:</strong> Sai từ loại.</li><li><strong>C đúng:</strong> 'The place' chỉ nơi chốn, ta đã dành kỳ nghỉ Ở ĐÓ (in that place) -> dùng trạng từ 'where'.</li><li><strong>D sai:</strong> Nếu dùng 'which' thì phải có giới từ 'in which'.</li></ul>"],

                    ["Question 4 [517031]: What was the name of the girl _______ passport was stolen?", 
                    ["A. whose", "B. who", "C. which", "D. when"], 0, 
                    "<ul><li><strong>A đúng:</strong> Có sự sở hữu giữa 'the girl' và 'passport' (Hộ chiếu của cô gái) -> dùng 'whose'.</li><li><strong>B, C, D sai:</strong> Không thể hiện sự sở hữu.</li></ul>"],

                    ["Question 5 [517032]: Lady Astor was the first woman _______ her seat in Parliament.", 
                    ["A. who take", "B. whom took", "C. that took", "D. which takes"], 2, 
                    "<ul><li><strong>A sai:</strong> Chia sai thì/số (woman số ít, take số nhiều). Vả lại sự việc ở quá khứ.</li><li><strong>B sai:</strong> 'whom' làm tân ngữ, không đi kèm trực tiếp với động từ 'took'.</li><li><strong>C đúng:</strong> Sau số thứ tự (the first) dùng 'that'. Động từ chia ở quá khứ (took) phù hợp ngữ cảnh.</li><li><strong>D sai:</strong> 'which' không dùng cho người.</li></ul>"],

                    ["Question 6 [517033]: The house _______ walls and roof are made of glass is a green house.", 
                    ["A. which", "B. that", "C. whose", "D. where"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Không thể hiện sự sở hữu.</li><li><strong>C đúng:</strong> 'walls and roof' (tường và mái nhà) thuộc sở hữu của 'the house' (ngôi nhà) -> dùng 'whose'. ('whose' có thể dùng cho cả người và vật).</li></ul>"],

                    ["Question 7 [517034]: You didn't tell us the reason _______ we have to cut down on our daily expenses.", 
                    ["A. which", "B. it", "C. what", "D. why"], 3, 
                    "<ul><li><strong>A sai:</strong> Dùng which phải có 'for which'.</li><li><strong>B, C sai:</strong> Không dùng làm từ nối mệnh đề quan hệ ở ngữ cảnh này.</li><li><strong>D đúng:</strong> Sau 'the reason' luôn đi kèm trạng từ 'why' (lý do tại sao).</li></ul>"],

                    ["Question 8 [517035]: The students don't know how to do the exercise _______ given by the teacher yesterday.", 
                    ["A. which was", "B. who", "C. whom", "D. whose"], 0, 
                    "<ul><li><strong>A đúng:</strong> Mệnh đề quan hệ đầy đủ là 'which was given'. (Nếu rút gọn thì chỉ còn V3/ed là 'given', nhưng trong các đáp án có 'which was' là chuẩn nhất).</li><li><strong>B, C, D sai:</strong> Dùng cho người, trong khi 'the exercise' là vật.</li></ul>"],

                    ["Question 9 [517036]: Those envelops, _______ are lying on the table, have no stamp on them.", 
                    ["A. that", "B. which", "C. who", "D. whom"], 1, 
                    "<ul><li><strong>A sai:</strong> Mệnh đề có dấu phẩy (non-defining) KHÔNG được dùng 'that'.</li><li><strong>B đúng:</strong> 'envelops' (phong bì) là vật -> dùng 'which'.</li><li><strong>C, D sai:</strong> Chỉ người.</li></ul>"],

                    ["Question 10 [517037]: What was the name of the people _______ car had broken down.", 
                    ["A. which", "B. who", "C. whom", "D. whose"], 3, 
                    "<ul><li><strong>A, B, C sai:</strong> Không thể hiện sự sở hữu.</li><li><strong>D đúng:</strong> Xe ô tô (car) thuộc sở hữu của những người đó (people) -> dùng 'whose'.</li></ul>"],

                    ["Question 11 [517038]: The hall _______ you're giving your talk has a really good sound system.", 
                    ["A. what", "B. that", "C. where", "D. which"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> 'The hall' (Hội trường) là nơi chốn diễn ra hành động 'give your talk' (bạn đang phát biểu TẠI HỘI TRƯỜNG ĐÓ - in the hall). Do đó không dùng đại từ làm tân ngữ.</li><li><strong>C đúng:</strong> Dùng 'where' để thay thế cho trạng từ nơi chốn.</li></ul>"],

                    ["Question 12 [517039]: My grandmother, _______ is old and sick, never goes out of the house.", 
                    ["A. who", "B. whom", "C. that", "D. which"], 0, 
                    "<ul><li><strong>A đúng:</strong> 'grandmother' (người), làm chủ ngữ cho 'is' -> dùng 'who'.</li><li><strong>B sai:</strong> 'whom' làm tân ngữ.</li><li><strong>C sai:</strong> Có dấu phẩy không dùng 'that'.</li><li><strong>D sai:</strong> Không dùng cho người.</li></ul>"],

                    ["Question 13 [517040]: The reason _______ I phoned him was to invite him to my birthday party.", 
                    ["A. what", "B. whose", "C. why", "D. which"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Không đi kèm trực tiếp với 'reason' theo nghĩa chỉ nguyên nhân.</li><li><strong>C đúng:</strong> Tương tự câu 7, danh từ 'the reason' đi với trạng từ quan hệ 'why'.</li></ul>"],

                    ["Question 14 [517041]: She told me her address _______ I wrote on a piece of paper.", 
                    ["A. what", "B. which", "C. when", "D. where"], 1, 
                    "<ul><li><strong>A sai:</strong> Không dùng nối câu.</li><li><strong>B đúng:</strong> 'address' ở đây không phải là nơi diễn ra hành động (tôi không VIẾT TẠI ĐỊA CHỈ ĐÓ), mà nó là TÂN NGỮ của động từ 'wrote' (tôi viết CÁI ĐỊA CHỈ ĐÓ lên giấy) -> dùng 'which'.</li><li><strong>C, D sai:</strong> Trạng từ chỉ thời gian / nơi chốn.</li></ul>"],

                    ["Question 15 [517042]: They needed more space, _______ is why they moved house.", 
                    ["A. that", "B. which", "C. when", "D. where"], 1, 
                    "<ul><li><strong>A sai:</strong> Có dấu phẩy không dùng 'that'.</li><li><strong>B đúng:</strong> 'which' ở đây không thay cho một danh từ, mà nó <strong>thay thế cho TOÀN BỘ mệnh đề phía trước</strong> (Việc họ cần thêm không gian...).</li><li><strong>C, D sai:</strong> Không có chức năng này.</li></ul>"],

                    ["Question 16 [517043]: Mexico City, _______ is the fastest growing city in the world, has a population of over 10 million.", 
                    ["A. what", "B. which", "C. that", "D. where"], 1, 
                    "<ul><li><strong>A sai:</strong> Không dùng nối câu.</li><li><strong>B đúng:</strong> Thay cho tên địa danh làm chủ ngữ cho 'is' -> dùng 'which'.</li><li><strong>C sai:</strong> Có dấu phẩy không dùng 'that'.</li><li><strong>D sai:</strong> 'where' không làm chủ ngữ.</li></ul>"],

                    ["Question 17 [517044]: It was in this village _______ I was born and grew up.", 
                    ["A. which", "B. where", "C. that", "D. when"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Không tuân theo cấu trúc câu chẻ.</li><li><strong>C đúng:</strong> Cấu trúc <strong>Câu chẻ (Cleft sentence)</strong> để nhấn mạnh: <em>It is/was + Thành phần nhấn mạnh + THAT + Clause</em>.</li></ul>"],

                    ["Question 18 [517045]: Completed in 1756, Nassau Hall is one of the oldest building _______ now stands on the campus of Princeton University.", 
                    ["A. that", "B. which", "C. who", "D. whom"], 0, 
                    "<ul><li><strong>A đúng:</strong> Trong mệnh đề quan hệ, khi có so sánh nhất (the oldest) thì ưu tiên dùng 'that'.</li><li><strong>B sai:</strong> Kém ưu tiên hơn 'that' khi có so sánh nhất.</li><li><strong>C, D sai:</strong> Dùng cho người.</li></ul>"],

                    ["Question 19 [517046]: She is the woman _______ sister looks after the baby for us.", 
                    ["A. who", "B. whom", "C. that", "D. whose"], 3, 
                    "<ul><li><strong>A, B, C sai:</strong> Không thể hiện sự sở hữu.</li><li><strong>D đúng:</strong> Có mối quan hệ sở hữu (Chị/em gái của người phụ nữ đó) -> dùng 'whose'.</li></ul>"],

                    ["Question 20 [517047]: It was your carelessness _______ caused the accident.", 
                    ["A. who", "B. whom", "C. that", "D. which"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Đây là Câu chẻ, không phải mệnh đề quan hệ thông thường.</li><li><strong>C đúng:</strong> Cấu trúc Câu chẻ nhấn mạnh: <em>It is/was + Chủ ngữ/Tân ngữ/Trạng ngữ + THAT + ...</em></li></ul>"],

                    ["Question 21 [517048]: The Massachusetts State House, _______ was completed in 1798, was the most distinguished building in the United States at that time.", 
                    ["A. that", "B. which", "C. when", "D. what"], 1, 
                    "<ul><li><strong>A sai:</strong> Có dấu phẩy không dùng 'that'.</li><li><strong>B đúng:</strong> Tên công trình kiến trúc (vật), làm chủ ngữ -> dùng 'which'.</li><li><strong>C, D sai:</strong> Sai từ loại.</li></ul>"],

                    ["Question 22 [517049]: The parcel arrived in the post at 11 am, _______ I was still at work.", 
                    ["A. that", "B. which", "C. when", "D. where"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Không thay thế được cho cụm thời gian.</li><li><strong>C đúng:</strong> '11 am' là mốc thời gian -> dùng trạng từ quan hệ 'when'.</li></ul>"],

                    ["Question 23 [517050]: It was not until eleven o'clock _______ the film ended.", 
                    ["A. which", "B. when", "C. that", "D. who"], 2, 
                    "<ul><li><strong>A, B, D sai:</strong> Sai cấu trúc.</li><li><strong>C đúng:</strong> Cấu trúc cố định: <strong>It was not until + Thời gian/Mệnh đề + THAT + S + V</strong> (Mãi cho đến 11 giờ thì bộ phim mới kết thúc).</li></ul>"],

                    ["Question 24 [517051]: My friend decided to quit her job, _______ surprised me a lot.", 
                    ["A. that", "B. when", "C. which", "D. who"], 2, 
                    "<ul><li><strong>A sai:</strong> Có dấu phẩy không dùng 'that'.</li><li><strong>B, D sai:</strong> Sai loại từ.</li><li><strong>C đúng:</strong> 'which' dùng để thay thế cho <strong>toàn bộ mệnh đề phía trước</strong> (Việc bạn tôi nghỉ việc đã làm tôi bất ngờ).</li></ul>"],

                    ["Question 25 [517052]: They have just found the couple and their car _______ were swept away during the heavy storm last week.", 
                    ["A. that", "B. which", "C. whose", "D. when"], 0, 
                    "<ul><li><strong>A đúng:</strong> Tiền ngữ bao gồm 'the couple' (người) và 'their car' (vật). Bắt buộc phải dùng 'that'.</li><li><strong>B sai:</strong> Chỉ dùng cho vật.</li><li><strong>C, D sai:</strong> Sai từ loại.</li></ul>"],

                    ["Question 26 [517053]: It was the worst winter _______ anyone could remember.", 
                    ["A. which", "B. that", "C. where", "D. why"], 1, 
                    "<ul><li><strong>A sai:</strong> Không dùng which sau so sánh nhất.</li><li><strong>B đúng:</strong> 'the worst' là so sánh nhất, bắt buộc dùng 'that'.</li><li><strong>C, D sai:</strong> Sai từ loại.</li></ul>"],

                    ["Question 27 [517054]: There is nothing _______ I cannot do for you.", 
                    ["A. which", "B. that", "C. who", "D. whom"], 1, 
                    "<ul><li><strong>A sai:</strong> 'which' không dùng sau đại từ bất định.</li><li><strong>B đúng:</strong> 'nothing' là đại từ bất định, bắt buộc dùng 'that'.</li><li><strong>C, D sai:</strong> Dùng cho người.</li></ul>"],

                    ["Question 28 [517055]: Shirley has a 17-year-old daughter _______ ambition is to be a photographer.", 
                    ["A. that", "B. whose", "C. who", "D. whom"], 1, 
                    "<ul><li><strong>A, C, D sai:</strong> Không chỉ sự sở hữu.</li><li><strong>B đúng:</strong> 'ambition' (hoài bão) của người con gái (daughter) -> dùng 'whose'.</li></ul>"],

                    ["Question 29 [517056]: That was the week _______ we booked our holiday.", 
                    ["A. that", "B. which", "C. when", "D. where"], 2, 
                    "<ul><li><strong>A, B sai:</strong> 'the week' là thời gian, chúng ta đặt kỳ nghỉ VÀO TUẦN ĐÓ -> phải dùng trạng từ 'when' (hoặc in which).</li><li><strong>C đúng:</strong> Dùng 'when' thay cho thời gian.</li><li><strong>D sai:</strong> Dùng cho nơi chốn.</li></ul>"],

                    ["Question 30 [517057]: It was not until eleven o'clock _______ the film ended.", 
                    ["A. that", "B. which", "C. whose", "D. when"], 0, 
                    "<ul><li><strong>A đúng:</strong> Cấu trúc <strong>It was not until ... THAT ...</strong> (Mãi cho đến 11 giờ thì bộ phim mới kết thúc).</li><li><strong>B, C, D sai:</strong> Sai cấu trúc cố định.</li></ul>"]
                ]
            }
        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        const card = document.createElement("div");
        card.className = `exercise-card`;

        let htmlContent = `
            <h2 class="ex-title">🔥 Trắc Nghiệm: 30 Câu Mệnh Đề Quan Hệ</h2>
            <div class="tip-box">
                <span>💡 <strong>Mẹo làm bài:</strong> Hãy xác định kỹ loại từ đứng ngay trước chỗ trống và vai trò của từ cần điền (để chọn Who/Whom/Which/Where...) nhé!</span>
            </div>
            <div id="questions-container"></div>
        `;

        card.innerHTML = htmlContent;
        app.appendChild(card);

        const qContainer = document.getElementById("questions-container");

        exData[0].questions.forEach((qObj, qIndex) => {
            // Because I combined both exercises into one 30-question test based on the data structure requested.
            // Wait, looking closely at exData, it has 2 objects, each with questions. Let's iterate properly.
        });
        
        // Correct iteration for the nested structure
        exData.forEach(ex => {
            ex.questions.forEach((qObj, qIndex) => {
                const [qText, options, correctIndex, expText] = qObj;
                
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qTitle = document.createElement("div");
                qTitle.className = "question-text";
                qTitle.innerText = qText;
                qBlock.appendChild(qTitle);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                options.forEach((opt, idx) => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerHTML = opt; // Using innerHTML if options have tags
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(idx === correctIndex) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${expText}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings[correctIndex].classList.add("correct");
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> ${expText}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                qContainer.appendChild(qBlock);
            });
        });
    </script>
</body>
</html>
