<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Magic Bag - Pack for Adventure!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF9F43;
            --bg-color: #81ecec;
            --text-color: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            /* Nền bầu trời có chấm bi vui nhộn */
            background-color: var(--bg-color);
            background-image: radial-gradient(#fff 15%, transparent 16%), radial-gradient(#fff 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #FFD32A;
            text-align: center;
            margin-top: 40px;
            font-size: 3.5rem;
            letter-spacing: 2px;
            /* Tạo viền chữ 3D siêu cute */
            text-shadow: 
                -3px -3px 0 #FF5252,  
                 3px -3px 0 #FF5252,
                -3px  3px 0 #FF5252,
                 3px  3px 0 #FF5252,
                 0 8px 0 #D63031;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Khu vực để đồ vật */
        .items-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
            max-width: 600px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            border: 4px dashed #00cec9;
        }

        /* Các thẻ bài đồ vật */
        .item {
            background-color: #fff;
            border: 4px solid #2d3436;
            border-radius: 25px;
            width: 90px;
            height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            /* Đổ bóng 3D cứng kiểu game */
            box-shadow: 0 8px 0 #2d3436;
            transition: all 0.1s ease;
            user-select: none;
            position: relative;
        }

        .item:hover {
            transform: translateY(-5px);
            box-shadow: 0 13px 0 #2d3436;
        }

        /* Hiệu ứng khi bấm vào - lún xuống */
        .item:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #2d3436;
        }

        .item-icon {
            font-size: 3.5rem;
            margin-bottom: 5px;
            filter: drop-shadow(2px 4px 0px rgba(0,0,0,0.2));
        }

        .item-name {
            font-family: 'Fredoka One', cursive;
            color: #2d3436;
            font-size: 1.1rem;
            background: #FFD32A;
            padding: 2px 10px;
            border-radius: 10px;
            border: 2px solid #2d3436;
        }

        /* CHIẾC BA LÔ CUTE */
        .bag-wrapper {
            position: relative;
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bag-handle {
            width: 100px;
            height: 40px;
            border: 12px solid #FF5252;
            border-bottom: none;
            border-radius: 50px 50px 0 0;
            z-index: 1;
        }

        .bag {
            width: 380px;
            min-height: 280px;
            background: #FFD32A;
            border: 8px solid #2d3436;
            border-radius: 40px 40px 30px 30px;
            padding: 30px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-content: flex-start;
            box-shadow: inset -10px -15px 0 rgba(0,0,0,0.1), 0 15px 0 #d1a812;
            position: relative;
            z-index: 2;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Khuôn mặt ba lô */
        .bag-face {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 30px;
            pointer-events: none; /* Không cản trở việc click */
        }

        .eye {
            width: 25px;
            height: 25px;
            background: #2d3436;
            border-radius: 50%;
            position: relative;
            animation: blink 4s infinite;
        }

        .eye::after {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
        }

        .mouth {
            width: 30px;
            height: 15px;
            border: 5px solid #2d3436;
            border-top: none;
            border-radius: 0 0 30px 30px;
        }

        @keyframes blink {
            0%, 96%, 98%, 100% { transform: scaleY(1); }
            97%, 99% { transform: scaleY(0.1); }
        }

        /* Hiệu ứng khi cất vào túi */
        .in-bag {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border-color: #00b894;
            box-shadow: 0 6px 0 #00b894;
        }
        
        .in-bag .item-name {
            background: #00b894;
            color: white;
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(10deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        /* Lời nhắn sâu sắc khi hoàn thành */
        .message {
            display: none;
            text-align: center;
            margin-top: 40px;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: white;
            padding: 20px 30px;
            border-radius: 30px;
            border: 5px solid #00b894;
            box-shadow: 0 10px 0 #00b894;
            max-width: 500px;
        }

        .message h2 {
            font-family: 'Fredoka One', cursive;
            color: #FF5252;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 0px #F8EFBA;
        }

        .message p {
            color: #2d3436;
            font-size: 1.3rem;
            font-weight: 900;
            margin: 0;
            line-height: 1.5;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.3) translateY(50px); }
            50% { opacity: 1; transform: scale(1.1) translateY(-20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Lắc nhẹ ba lô khi có đồ thả vào */
        .shake-bag {
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) scale(1); }
            25% { transform: translateX(-5px) scale(1.02); }
            50% { transform: translateX(5px) scale(1.02); }
            75% { transform: translateX(-5px) scale(1.02); }
        }
    </style>
</head>
<body>

    <h1>Pack My Bag! 🎒</h1>

    <div class="items-container" id="wardrobe">
        <div class="item" onclick="toggleItem(this, 'boots')">
            <span class="item-icon">👢</span>
            <span class="item-name">Boots</span>
        </div>
        <div class="item" onclick="toggleItem(this, 'umbrella')">
            <span class="item-icon">☂️</span>
            <span class="item-name">Umbrella</span>
        </div>
        <div class="item" onclick="toggleItem(this, 'scarf')">
            <span class="item-icon">🧣</span>
            <span class="item-name">Scarf</span>
        </div>
        <div class="item" onclick="toggleItem(this, 'coat')">
            <span class="item-icon">🧥</span>
            <span class="item-name">Coat</span>
        </div>
       <div class="item" onclick="toggleItem(this, 'shorts')">
            <span class="item-icon">
                <svg width="56" height="56" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22 L52 22 L56 52 L36 52 L32 38 L28 52 L8 52 Z" fill="#00cec9" stroke="#2d3436" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
                    <rect x="10" y="14" width="44" height="10" rx="4" fill="#FFD32A" stroke="#2d3436" stroke-width="4" />
                    <path d="M30 24 C 26 32, 22 34, 22 34" fill="none" stroke="#2d3436" stroke-width="3" stroke-linecap="round"/>
                    <path d="M34 24 C 38 32, 42 34, 42 34" fill="none" stroke="#2d3436" stroke-width="3" stroke-linecap="round"/>
                    <line x1="32" y1="24" x2="32" y2="38" stroke="#2d3436" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="item-name">Shorts</span>
        </div>
    </div>

    <div class="bag-wrapper">
        <div class="bag-handle"></div>
        <div class="bag" id="myBag">
            <div class="bag-face" id="bagFace">
                <div class="eye"></div>
                <div class="mouth"></div>
                <div class="eye"></div>
            </div>
        </div>
    </div>

    <div class="message" id="successMessage">
        <h2>Great Job! 🌟</h2>
        <p>Mỗi món đồ là một người bạn bảo vệ con khỏi nắng mưa. Con đã chuẩn bị rất tốt, sẵn sàng cho chuyến phiêu lưu rồi đấy! 🎉</p>
    </div>

    <script>
        let itemsPacked = 0;
        const totalItems = 5;

        function toggleItem(element, wordName) {
            // 1. Phát âm tiếng Anh
            const msg = new SpeechSynthesisUtterance(wordName);
            msg.lang = 'en-US'; 
            msg.rate = 0.9;     
            window.speechSynthesis.speak(msg);

            const bag = document.getElementById('myBag');
            const wardrobe = document.getElementById('wardrobe');
            const successMessage = document.getElementById('successMessage');
            const bagFace = document.getElementById('bagFace');
            
            // Tạo hiệu ứng nảy ba lô khi tương tác
            bag.classList.remove('shake-bag');
            void bag.offsetWidth; // Trigger reflow để chạy lại animation
            bag.classList.add('shake-bag');

            // 2. Chuyển đổi vị trí đồ vật
            if (!element.classList.contains('in-bag')) {
                element.classList.add('in-bag');
                // Chèn vào trước khuôn mặt ba lô để mặt luôn nằm dưới
                bag.insertBefore(element, bagFace); 
                itemsPacked++;
            } else {
                element.classList.remove('in-bag');
                wardrobe.appendChild(element); 
                itemsPacked--;
            }

            // 3. Xử lý khi hoàn thành
            if (itemsPacked === totalItems) {
                setTimeout(() => {
                    successMessage.style.display = 'block';
                    const praiseMsg = new SpeechSynthesisUtterance("Great job! You are ready!");
                    praiseMsg.lang = 'en-US';
                    window.speechSynthesis.speak(praiseMsg);
                    
                    // Đổi miệng ba lô thành hình chữ O ngạc nhiên vui vẻ
                    document.querySelector('.mouth').style.borderRadius = '50%';
                    document.querySelector('.mouth').style.height = '20px';
                }, 600);
            } else {
                successMessage.style.display = 'none';
                // Trả lại miệng cười bình thường
                document.querySelector('.mouth').style.borderRadius = '0 0 30px 30px';
                document.querySelector('.mouth').style.height = '15px';
            }
        }
    </script>
</body>
</html>
