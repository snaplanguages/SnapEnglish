<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Magic Bag - Pack for Adventure!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ff6b6b;
            text-align: center;
            margin-top: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: #5f27cd;
            font-size: 1.2rem;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 800;
        }

        /* Khu vực để đồ vật */
        .items-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
            min-height: 120px;
            padding: 20px;
        }

        .item {
            background-color: white;
            border: 4px solid #fff;
            border-radius: 20px;
            width: 90px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            user-select: none;
        }

        .item:hover {
            transform: translateY(-10px) scale(1.1);
            border-color: #ff9ff3;
            box-shadow: 0 15px 25px rgba(255, 159, 243, 0.4);
        }

        .item-icon {
            font-size: 3.5rem;
            margin-bottom: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 56px;
        }

        .item-name {
            font-family: 'Fredoka One', cursive;
            color: #341f97;
            font-size: 1.1rem;
        }

        /* Chiếc túi thần kỳ */
        .bag-wrapper {
            position: relative;
            margin-top: 20px;
        }

        .bag-handle {
            width: 120px;
            height: 50px;
            border: 15px solid #ff9a9e;
            border-bottom: none;
            border-radius: 60px 60px 0 0;
            margin: 0 auto;
        }

        .bag {
            width: 350px;
            min-height: 250px;
            background: rgba(255, 255, 255, 0.5); /* Túi trong suốt */
            border: 8px dashed #ff9a9e;
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-content: flex-start;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.8), 0 15px 30px rgba(0,0,0,0.05);
            backdrop-filter: blur(5px);
        }

        /* Hiệu ứng khi cất vào túi */
        .in-bag {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: none;
            border-color: #1dd1a1;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Lời nhắn sâu sắc khi hoàn thành */
        .message {
            display: none;
            text-align: center;
            margin-top: 30px;
            animation: fadeIn 1s ease;
        }

        .message h2 {
            font-family: 'Fredoka One', cursive;
            color: #1dd1a1;
            font-size: 2rem;
            margin: 0;
        }

        .message p {
            color: #576574;
            font-size: 1.2rem;
            font-weight: 800;
            max-width: 400px;
            text-align: center;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>Pack My Bag 🎒</h1>

    <div class="items-container" id="wardrobe">
        <div class="item" onclick="toggleItem(this, 'boots')">
            <span class="item-icon">👢</span>
            <span class="item-name">Boots</span>
        </div>
        <div class="item" onclick="toggleItem(this, 'umbrella')">
            <span class="item-icon">☂️</span>
            <span class="item-name">Umbrella</span>
        </div>
        <div class="item" onclick="toggleItem(this, 'scarf')">
            <span class="item-icon">🧣</span>
            <span class="item-name">Scarf</span>
        </div>
        <div class="item" onclick="toggleItem(this, 'coat')">
            <span class="item-icon">🧥</span>
            <span class="item-name">Coat</span>
        </div>
        <div class="item" onclick="toggleItem(this, 'shorts')">
            <span class="item-icon">
                <svg width="50" height="50" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                    <path d="M14 18 L50 18 L54 52 L36 52 L32 36 L28 52 L10 52 Z" fill="#48dbfb" stroke="#2e86de" stroke-width="3" stroke-linejoin="round"/>
                    <rect x="12" y="14" width="40" height="6" rx="2" fill="#2e86de" />
                    <line x1="32" y1="18" x2="32" y2="36" stroke="#2e86de" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </span>
            <span class="item-name">Shorts</span>
        </div>
    </div>

    <div class="bag-wrapper">
        <div class="bag-handle"></div>
        <div class="bag" id="myBag">
            </div>
    </div>

    <div class="message" id="successMessage">
        <h2>Great Job! 🌟</h2>
        <p>Mỗi món đồ là một người bạn bảo vệ con khỏi nắng mưa. Con đã chuẩn bị rất tốt, sẵn sàng cho những chuyến phiêu lưu tuyệt vời rồi đấy!</p>
    </div>

    <script>
        let itemsPacked = 0;
        const totalItems = 5;

        function toggleItem(element, wordName) {
            // 1. Phát âm tiếng Anh để bé nghe mỗi khi bấm vào đồ vật
            const msg = new SpeechSynthesisUtterance(wordName);
            msg.lang = 'en-US'; 
            msg.rate = 0.9;     
            window.speechSynthesis.speak(msg);

            const bag = document.getElementById('myBag');
            const wardrobe = document.getElementById('wardrobe');
            const successMessage = document.getElementById('successMessage');
            
            // 2. Kiểm tra xem món đồ đang ở ĐÂU để quyết định chuyển đi
            // Nếu đồ chưa vào túi (chưa có class 'in-bag')
            if (!element.classList.contains('in-bag')) {
                element.classList.add('in-bag');
                bag.appendChild(element); // Cất vào túi
                itemsPacked++;
            } 
            // Nếu đồ đã ở trong túi
            else {
                element.classList.remove('in-bag');
                wardrobe.appendChild(element); // Bỏ ra lại ngoài tủ
                itemsPacked--;
            }

            // 3. Kiểm tra ẩn/hiện lời nhắn chúc mừng
            if (itemsPacked === totalItems) {
                setTimeout(() => {
                    successMessage.style.display = 'block';
                    // Đọc một câu khen ngợi
                    const praiseMsg = new SpeechSynthesisUtterance("Great job! You are ready!");
                    praiseMsg.lang = 'en-US';
                    window.speechSynthesis.speak(praiseMsg);
                }, 800);
            } else {
                // Nếu lấy đồ ra thì ẩn câu chúc mừng đi
                successMessage.style.display = 'none';
            }
        }
    </script>
</body>
</html>
