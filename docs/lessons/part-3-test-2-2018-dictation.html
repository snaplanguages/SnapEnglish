<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 3 Test 2 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* TÔNG MÀU MỚI: Ocean Blue & Coral */
        :root {
            --primary: #0284C7;         /* Light Blue 600 */
            --primary-hover: #0369A1;   /* Light Blue 700 */
            --secondary: #E0F2FE;       /* Light Blue 100 */
            --accent: #F97316;          /* Orange 500 (Coral) */
            --blue-pastel: #F0F9FF;     /* Sky 50 */
            --blue-dark: #0C4A6E;       /* Sky 900 */
            --text-dark: #0F172A;       /* Slate 900 */
            --text-light: #475569;      /* Slate 600 */
            --bg-main: #F8FAFC;         /* Slate 50 */
            --white: #FFFFFF;
            --brand-pink: #F97316;      /* Coral cho Logo SnapEnglish */
            --brand-text: #0F172A;
            --error-glow: #E11D48;      /* Đỏ Rose 600 cho lỗi */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }
        .brand-badge {
            background-color: var(--brand-pink);
            color: var(--white);
            font-weight: 800;
            font-size: 26px;
            padding: 8px 20px;
            border-radius: 15px;
            letter-spacing: -0.5px;
        }
        .brand-title {
            color: var(--brand-text);
            font-weight: 800;
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        /* Giao diện mở rộng toàn màn hình */
        .layout-container {
            display: flex;
            gap: 25px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
        }

        .sidebar {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .progress-section { text-align: center; }
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, #eee 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; transition: background 0.5s;
        }
        .progress-circle::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--white); border-radius: 50%; }
        .progress-text { position: relative; z-index: 1; font-size: 28px; font-weight: 700; color: var(--primary); }

        .instructions { background: var(--blue-pastel); padding: 20px; border-radius: 15px; color: var(--blue-dark); }
        .instructions h3 { margin-bottom: 15px; font-size: 18px; }
        .instructions ul { list-style: none; }
        .instructions li { margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        kbd { background: var(--white); border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px; font-family: monospace; font-size: 13px; font-weight: bold; box-shadow: 0 2px 0 #ccc; color: #333;}

        .main-content {
            flex: 3; background: var(--white); border-radius: 20px; padding: 35px;
            box-shadow: 0 10px 30px rgba(2, 132, 199, 0.1); display: flex; flex-direction: column; position: relative;
        }

        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #eee; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-light); }
        select { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 600; color: var(--text-dark);}

        .audio-section { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px;}
        
        .speaker-badge { display: inline-block; padding: 8px 30px; border-radius: 20px; font-weight: bold; font-size: 16px; }
        .speaker-male { background: #E0F2FE; color: #0284C7; border: 1px solid #BAE6FD; }
        .speaker-female { background: #FFEDD5; color: #C2410C; border: 1px solid #FED7AA; }

        .btn-play { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);}
        .btn-play:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .input-section { flex-grow: 1; display: flex; flex-direction: column; }
        
        .message { text-align: center; margin-bottom: 10px; min-height: 45px; }
        .glow-error {
            color: var(--error-glow);
            text-shadow: 0 0 12px rgba(225, 29, 72, 0.6);
            font-weight: 800;
            background: #FFF1F2;
            padding: 2px 6px;
            border-radius: 6px;
            border: 2px dashed var(--error-glow);
            display: inline-block;
            transform: scale(1.05);
        }
        
        textarea { width: 100%; height: 120px; padding: 20px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 22px; outline: none; transition: 0.3s; resize: none; color: var(--text-dark); line-height: 1.6; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(2, 132, 199, 0.2); }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-enter { background: var(--blue-dark); color: var(--white); }
        .btn-enter:hover { background: #082F49; }
        .btn-hint { background: var(--secondary); color: var(--blue-dark); }
        .btn-hint:hover { background: #BAE6FD; }
        .btn-nav { background: #E2E8F0; color: #334155; }
        .btn-nav:hover { background: #CBD5E1; }

        /* MODAL POPUP NÂNG CẤP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 600px; padding: 35px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative; max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: #0EA5E9; font-size: 22px; margin-bottom: 15px; text-align: center; }
        .modal-script { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-align: center; padding-bottom: 15px; border-bottom: 2px dashed #eee;}
        .modal-content p { margin-bottom: 10px; line-height: 1.6; font-size: 16px; }
        
        .vocab-list { list-style-type: none; padding-left: 0; margin-top: 10px;}
        .vocab-list li { margin-bottom: 8px; background: #F8FAFC; padding: 10px 15px; border-radius: 8px; border-left: 4px solid var(--accent);}
        .vocab-list li strong { color: var(--accent); font-size: 16.5px;}
        
        .btn-next-modal { width: 100%; background: var(--primary); color: white; margin-top: 20px; padding: 15px; font-size: 18px; }
        .btn-next-modal:hover { background: var(--primary-hover); }

        /* END SCREEN */
        .end-screen { display: none; text-align: center; padding-top: 20px;}
        .transcript-box { text-align: left; background: #F8FAFC; padding: 25px; border-radius: 15px; height: 400px; overflow-y: auto; margin: 25px 0; border: 1px solid #E2E8F0; line-height: 1.8; font-size: 16px;}

        @media (max-width: 850px) {
            .layout-container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .main-content { flex: none; width: 100%; order: 1; min-height: 500px;}
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="header-brand">
        <div class="brand-badge">SnapEnglish</div>
        <div class="brand-title">Part 3 Test 2</div>
    </div>

    <div class="layout-container" id="app">
        <div class="sidebar">
            <div class="progress-section">
                <h2 style="color: var(--text-dark); margin-bottom: 25px; font-size: 22px;">Tiến độ bài học</h2>
                <div class="progress-circle" id="progress-ring"><div class="progress-text"><span id="progress-percent">0</span>%</div></div>
                <p style="color: var(--text-light); font-weight: 600; margin-top: 15px;">Câu: <span id="current-sentence-num">1</span> / <span id="total-sentences"></span></p>
                <p style="font-size: 14px; color: #888; margin-top: 5px;">Số lần luyện tập: <span id="study-count">0</span></p>
            </div>
            <div class="instructions">
                <h3>⌨️ Hướng dẫn phím tắt</h3>
                <ul>
                    <li><kbd>Ctrl</kbd> Lặp lại Audio.</li>
                    <li><kbd>Tab</kbd> Gợi ý từ tiếp theo.</li>
                    <li><kbd>Enter</kbd> Kiểm tra đáp án / Chuyển câu.</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div id="learning-screen" style="display: flex; flex-direction: column; height: 100%;">
                <div class="settings-bar">
                    <div class="setting-group">
                        <label>Tốc độ:</label>
                        <select id="speed-setting">
                            <option value="0.7">0.7x</option>
                            <option value="0.9" selected>0.9x</option>
                            <option value="1.0">1.0x</option>
                            <option value="1.2">1.2x</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Lặp tự động:</label>
                        <select id="repeat-setting">
                            <option value="1" selected>1 lần</option>
                            <option value="2">2 lần</option>
                            <option value="3">3 lần</option>
                        </select>
                    </div>
                </div>

                <div class="audio-section">
                    <div id="speaker-label" class="speaker-badge speaker-male">👨 Man</div>
                    <button class="btn-play" onclick="playAudio()">🔊 Nghe Audio (Ctrl)</button>
                </div>
                
                <div class="message" id="system-message"></div>

                <div class="input-section">
                    <textarea id="user-input" placeholder="Lắng nghe hội thoại và gõ vào đây..." autofocus></textarea>
                    
                    <div class="actions">
                        <button class="btn btn-nav" onclick="prevSentenceManual()">⬅️ Back</button>
                        <button class="btn btn-enter" onclick="handleEnterAction()">Kiểm tra (Enter)</button>
                        <button class="btn btn-hint" onclick="giveHint()">💡 Gợi ý (Tab)</button>
                        <button class="btn btn-nav" onclick="nextSentenceManual()">Next ➡️</button>
                    </div>
                </div>
            </div>

            <div id="end-screen" class="end-screen">
                <h2 style="color: var(--primary); font-size: 28px;">Tuyệt vời! Hoàn thành Test 🏆</h2>
                <div class="transcript-box" id="full-transcript"></div>
                <div class="actions">
                    <button class="btn btn-enter" onclick="restartLesson()">🔄 Luyện tập lại</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
        <h3>🎉 Chính xác!</h3>
        <div class="modal-script" id="trans-en"></div>
        <p><strong>🇻🇳 Nghĩa:</strong> <span id="trans-vi"></span></p>
        <p id="grammar-container" style="display: none;"><strong>📖 Cấu trúc/Ngữ pháp:</strong> <span id="trans-grammar"></span></p>
        <ul class="vocab-list" id="trans-vocab"></ul>
        
        <button class="btn btn-next-modal" onclick="nextSentence()">Qua câu tiếp theo (Enter) ➔</button>
    </div>
</div>

<script>
    // DỮ LIỆU ĐÃ ĐƯỢC LÀM GIÀU BỞI TỪ VỰNG (KÈM SYNONYMS) VÀ NGỮ PHÁP
    const lessonData = [
        // Conversation 32-34
        { 
            en: "Good afternoon. I'm Robert Merril. I have an appointment for a checkup with Dr. Sanchez at 1:00 P.M.", 
            vi: "Chào buổi chiều. Tôi là Robert Merril. Tôi có hẹn khám sức khỏe với bác sĩ Sanchez vào lúc 1 giờ chiều.", 
            speaker: "Man", gender: "male",
            grammar: "Have an appointment for + N: Có lịch hẹn cho việc gì.",
            vocab: ["appointment (cuộc hẹn, lịch hẹn) - Đồng nghĩa: arrangement, reservation", "checkup (khám sức khỏe tổng quát) - Viết khác: medical examination"]
        },
        { 
            en: "Yes, I see your name on the list. Unfortunately, the doctor is running about twenty minutes behind schedule.", 
            vi: "Vâng, tôi đã thấy tên ông trong danh sách. Rất tiếc là bác sĩ đang bị chậm so với lịch trình khoảng 20 phút.", 
            speaker: "Woman", gender: "female",
            grammar: "Run behind schedule: Chậm tiến độ/chậm lịch trình so với dự kiến.",
            vocab: ["unfortunately (rất tiếc, không may) - Đồng nghĩa: unluckily, regrettably", "behind schedule (chậm tiến độ) - Trái nghĩa: ahead of schedule"]
        },
        { 
            en: "In that case, I'd better call my office to let them know I'll get back later than expected.", 
            vi: "Trong trường hợp đó, tôi nên gọi điện về văn phòng để báo cho họ biết rằng tôi sẽ quay lại muộn hơn dự kiến.", 
            speaker: "Man", gender: "male",
            grammar: "Had better + V(nguyên thể): Nên làm gì (để tránh hậu quả xấu).",
            vocab: ["in that case (trong trường hợp đó)", "expected (được dự kiến) - Đồng nghĩa: anticipated, projected"]
        },
        { 
            en: "Of course. But, could you go down to the cafeteria on the first floor to do that? We'd rather that you didn't make phone calls here in the waiting room.", 
            vi: "Tất nhiên rồi. Nhưng ông có thể xuống quán ăn tự phục vụ ở tầng 1 để gọi điện không? Chúng tôi không muốn khách hàng gọi điện thoại ngay tại phòng chờ này.", 
            speaker: "Woman", gender: "female",
            grammar: "Would rather (that) + S + V(quá khứ đơn): Thích/Muốn ai đó làm (hoặc không làm) gì hơn.",
            vocab: ["cafeteria (nhà ăn, quán ăn tự phục vụ) - Đồng nghĩa: canteen, dining hall", "make phone calls (thực hiện cuộc gọi)"]
        },

        // Conversation 35-37
        { 
            en: "Hi. My name is Sandra Browning, and I recently applied for a credit card with you. I still haven't heard whether I've been approved for the card though.", 
            vi: "Xin chào. Tên tôi là Sandra Browning, và gần đây tôi có nộp đơn đăng ký thẻ tín dụng bên mình. Tuy nhiên, tôi vẫn chưa nhận được thông báo liệu mình có được phê duyệt cấp thẻ hay chưa.", 
            speaker: "Woman", gender: "female",
            grammar: "Apply for + N: Đăng ký/nộp đơn xin cái gì. Thì hiện tại hoàn thành (haven't heard) diễn tả hành động chưa xảy ra tính đến hiện tại.",
            vocab: ["apply for (nộp đơn xin/đăng ký) - Đồng nghĩa: request, put in an application", "approve (phê duyệt, chấp thuận) - Đồng nghĩa: authorize, accept"]
        },
        { 
            en: "I'm sorry, Ms. Browning. Let me check our records. Do you remember when you submitted the application?", 
            vi: "Tôi rất tiếc, thưa bà Browning. Để tôi kiểm tra lại hồ sơ của chúng tôi. Bà có nhớ mình đã nộp đơn đăng ký khi nào không?", 
            speaker: "Man", gender: "male",
            grammar: "Remember + Wh-word + S + V: Nhớ xem ai đó đã làm gì khi nào.",
            vocab: ["records (hồ sơ, dữ liệu lưu trữ) - Đồng nghĩa: documents, archives", "submit (nộp, gửi đi) - Đồng nghĩa: hand in, turn in"]
        },
        { 
            en: "Um, I don't remember the exact day, but it was about a month ago. I sent it by mail.", 
            vi: "Ừm, tôi không nhớ chính xác ngày nào, nhưng khoảng một tháng trước. Tôi đã gửi nó qua đường bưu điện.", 
            speaker: "Woman", gender: "female",
            grammar: "By mail: Bằng đường bưu điện.",
            vocab: ["exact (chính xác) - Đồng nghĩa: precise, accurate"]
        },
        { 
            en: "Hmm. Unfortunately, it looks like we never received your application. But we can complete the application over the phone. I can put your information directly into the computer so it will be processed right away.", 
            vi: "Hừm. Thật không may, có vẻ như chúng tôi chưa từng nhận được đơn đăng ký của bà. Nhưng chúng ta có thể hoàn tất việc đăng ký qua điện thoại. Tôi có thể nhập trực tiếp thông tin của bà vào máy tính để nó được xử lý ngay lập tức.", 
            speaker: "Man", gender: "male",
            grammar: "Over the phone: Qua điện thoại. Bị động tương lai đơn: will be + V3/ed.",
            vocab: ["complete (hoàn thành) - Đồng nghĩa: finish, wrap up", "process (xử lý) - Đồng nghĩa: deal with, handle", "right away (ngay lập tức) - Đồng nghĩa: immediately, instantly"]
        },

        // Conversation 38-40
        { 
            en: "Hi Lisa. I just got an e-mail that our clients from Singapore are attending a conference in New York at the end of the month. They were wondering if they could visit our offices since they'll already be in the area.", 
            vi: "Chào Lisa. Tôi vừa nhận được một email thông báo rằng các khách hàng của chúng ta từ Singapore sẽ tham dự một hội nghị ở New York vào cuối tháng này. Họ đang thắc mắc liệu có thể ghé thăm văn phòng của chúng ta không vì khi đó họ đã ở sẵn khu vực này rồi.", 
            speaker: "Man", gender: "male",
            grammar: "Wondering if + S + V: Thắc mắc liệu rằng...",
            vocab: ["attend (tham dự) - Đồng nghĩa: go to, be present at", "wonder (tự hỏi, thắc mắc) - Đồng nghĩa: be curious, ask oneself"]
        },
        { 
            en: "Oh, this'll be a good opportunity to show them the new mobile phone app we're designing for them. Do you think the design team can finish it in time?", 
            vi: "Ồ, đây sẽ là một cơ hội tốt để cho họ thấy ứng dụng điện thoại di động mới mà chúng ta đang thiết kế cho họ. Anh có nghĩ đội thiết kế có thể hoàn thành nó kịp lúc không?", 
            speaker: "Woman", gender: "female",
            grammar: "In time: Kịp giờ, vừa vặn trước hạn chót.",
            vocab: ["opportunity (cơ hội) - Đồng nghĩa: chance, occasion", "design (thiết kế) - Đồng nghĩa: create, plan"]
        },
        { 
            en: "I think so, but I'd better tell the design team right away that we're moving up their deadline so it's ready in time for the client visit. They thought they'd have more time to complete the work.", 
            vi: "Tôi nghĩ là được, nhưng tôi nên báo ngay cho đội thiết kế rằng chúng ta sẽ đẩy sớm thời hạn của họ lên để sản phẩm sẵn sàng kịp lúc cho chuyến thăm của khách hàng. Họ vốn nghĩ rằng mình sẽ có nhiều thời gian hơn để hoàn tất công việc.", 
            speaker: "Man", gender: "male",
            grammar: "Move up the deadline: Đẩy sớm hạn chót.",
            vocab: ["move up (đẩy lên sớm hơn) - Đồng nghĩa: bring forward", "deadline (hạn chót) - Đồng nghĩa: time limit", "complete (hoàn thành) - Đồng nghĩa: finish, finalize"]
        },

        // Conversation 41-43
        { 
            en: "Hi. I'm looking to buy another delivery vehicle for my catering business—one that will keep the food hot or cold.", 
            vi: "Xin chào. Tôi đang tìm mua thêm một chiếc xe giao hàng khác cho doanh nghiệp cung cấp dịch vụ ăn uống của mình—một chiếc xe có thể giữ thức ăn nóng hoặc lạnh.", 
            speaker: "Man", gender: "male",
            grammar: "Look to do sth: Lên kế hoạch/tìm cách làm gì.",
            vocab: ["delivery vehicle (xe giao hàng)", "catering business (doanh nghiệp cung cấp dịch vụ ăn uống/nấu cỗ)"]
        },

        },
        {

            vi: "Được rồi, vậy thì gói một năm sẽ là tốt nhất. Ông có muốn ký hợp đồng ngay bây giờ không?",

            grammar: "Would you like to V?: Bạn có muốn...",
            vocab: ["sign (ký kết)"]
        },
        { 
            en: "Sure, let's do that.", 
            vi: "Chắc chắn rồi, hãy làm vậy đi.", 
            speaker: "Man", gender: "male",
            grammar: "Let's + V: Cùng làm gì.",
            vocab: []
        }
    ];

    window.currentIndex = 0;
    let currentPlayCount = 0;
    let playTimeout;
    const synth = window.speechSynthesis;
    let maleVoice = null;
    let femaleVoice = null;

    const msgBox = document.getElementById("system-message");
    const inputField = document.getElementById("user-input");
    const modalOverlay = document.getElementById("feedback-modal");
    const labelDisplay = document.getElementById("speaker-label");

    function loadVoices() {
        let voices = synth.getVoices();
        if(voices.length === 0) return;
        maleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google UK English Male'))) || voices.find(v => v.lang.startsWith('en'));
        femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Google US English'))) || voices.find(v => v.lang.startsWith('en'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.onload = () => {
        loadVoices();
        let count = localStorage.getItem('part3_test2_count') || 0;
        document.getElementById('study-count').innerText = count;
        document.getElementById('total-sentences').innerText = lessonData.length;
        
        let savedIndex = parseInt(localStorage.getItem('part3_test2_progress'));
        if (!isNaN(savedIndex) && savedIndex < lessonData.length) {
            window.currentIndex = savedIndex;
        }

        updateUI();
    };

    function updateUI() {
        updateProgress();
        document.getElementById('current-sentence-num').innerText = window.currentIndex + 1;
        
        const data = lessonData[window.currentIndex];
        
        if (data.gender === "male") {
            labelDisplay.innerText = "👨 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-male";
        } else {
            labelDisplay.innerText = "👩 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-female";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            e.preventDefault();
            playAudio();
        } else if (e.key === 'Tab') {
            e.preventDefault();
            giveHint();
        } else if (e.key === 'Enter' && modalOverlay.style.display !== "flex") {
            e.preventDefault();
            handleEnterAction();
        }
    });

    function handleEnterAction() {
        if (modalOverlay.style.display === "flex") {
            nextSentence();
        } else {
            checkAnswer();
        }
    }

    function playAudio() {
        currentPlayCount = 0;
        clearTimeout(playTimeout);
        triggerAudioLoop();
    }

    function triggerAudioLoop() {
        if (synth.speaking) synth.cancel();
        
        const data = lessonData[window.currentIndex];
        const utterThis = new SpeechSynthesisUtterance(data.en);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value);
        
        if (data.gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
        else if (data.gender === 'male' && maleVoice) utterThis.voice = maleVoice;
        
        utterThis.onend = () => {
            currentPlayCount++;
            const maxRepeat = parseInt(document.getElementById('repeat-setting').value);
            if (currentPlayCount < maxRepeat) {
                playTimeout = setTimeout(triggerAudioLoop, 500);
            }
        };
        
        synth.speak(utterThis);
        if (modalOverlay.style.display !== "flex") inputField.focus();
    }

    function normalizeText(text) { 
        let standardText = text.replace(/[’‘`´]/g, "'"); 
        return standardText.toLowerCase().replace(/[.,?!–\-:"]/g, '').trim(); 
    }

    function expandContractions(text) {
        let lower = text.toLowerCase().replace(/[’‘`´]/g, "'");
        const dict = {
            "they're": "they are", "we're": "we are", "you're": "you are",
            "he's": "he is", "she's": "she is", "it's": "it is", "that's": "that is", "there's": "there is", "who's": "who is", "what's": "what is",
            "i'm": "i am",
            "they'd": "they would", "we'd": "we would", "you'd": "you would", "he'd": "he would", "she'd": "she would", "i'd": "i would",
            "they've": "they have", "we've": "we have", "you've": "you have", "i've": "i have",
            "they'll": "they will", "we'll": "we will", "you'll": "you will", "he'll": "he will", "she'll": "she will", "it'll": "it will", "i'll": "i will",
            "don't": "do not", "doesn't": "does not", "didn't": "did not",
            "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
            "haven't": "have not", "hasn't": "has not", "hadn't": "had not",
            "can't": "can not", "cannot": "can not", "won't": "will not", "wouldn't": "would not",
            "shouldn't": "should not", "couldn't": "could not", "mustn't": "must not"
        };
        
        lower = lower.replace(/[.,?!–\-:"]/g, '');
        return lower.split(/\s+/).map(w => dict[w] || w).join(' ').trim();
    }
    
    function normalizeSpelling(text) {
        return text
            .replace(/ise\b/g, 'ize')
            .replace(/ised\b/g, 'ized')
            .replace(/ising\b/g, 'izing')
            .replace(/ises\b/g, 'izes')
            .replace(/isation/g, 'ization')
            .replace(/our\b/g, 'or')
            .replace(/ours\b/g, 'ors')
            .replace(/tre\b/g, 'ter')
            .replace(/tres\b/g, 'ters')
            .replace(/lling\b/g, 'ling')
            .replace(/lled\b/g, 'led');
    }

    function checkAnswer() {
        const rawUserInput = inputField.value;
        const rawTargetText = lessonData[window.currentIndex].en;
        
        const userInputExpanded = normalizeSpelling(expandContractions(rawUserInput).replace(/'/g, ''));
        const targetTextExpanded = normalizeSpelling(expandContractions(rawTargetText).replace(/'/g, ''));
        
        if (userInputExpanded === targetTextExpanded) {
            msgBox.innerText = "";
            showModal();
            return;
        }

        if (targetTextExpanded.startsWith(userInputExpanded) && userInputExpanded.length > 0) {
            msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
            return; 
        }

        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(rawTargetText);
        
        const userWordsNorm = userInput.split(' ').filter(w => w !== "");
        const targetWordsNorm = targetText.split(' ');
        
        const rawWords = rawUserInput.trim().split(/\s+/);

        if (userWordsNorm.length === 0) {
            msgBox.innerText = "Bạn chưa gõ gì cả. Nhấn Ctrl để nghe nhé!";
            return;
        }

        let wrongIndex = -1;
            for (let i = 0; i < userWordsNorm.length; i++) {
                if (userWordsNorm[i] !== targetWordsNorm[i]) {
                    wrongIndex = i;
                    break;
                }
            }

            if (wrongIndex !== -1) {
                let startPos = 0;
                for (let k = 0; k < wrongIndex; k++) {
                    startPos += rawWords[k].length + 1; 
                }
                
                const leadingSpaces = inputField.value.length - inputField.value.trimStart().length;
                startPos += leadingSpaces;
                let endPos = startPos + rawWords[wrongIndex].length;

                inputField.focus();
                inputField.setSelectionRange(startPos, endPos);

                let displayHTML = rawWords.map((w, idx) => {
                    if (idx === wrongIndex) {
                        return `<span class="glow-error">${w}</span>`;
                    }
                    return w;
                }).join(' ');

                msgBox.innerHTML = `Vị trí sai:<br><div style="margin-top:12px; font-size:19px; color:var(--text-dark); font-weight: 500;">${displayHTML}</div>`;
                
            } else if (userWordsNorm.length < targetWordsNorm.length) {
                msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
                inputField.focus();
                inputField.setSelectionRange(inputField.value.length, inputField.value.length);
            } else {
                msgBox.innerText = "Có lỗi sai chính tả nhỏ, hãy kiểm tra lại.";
            }
        
    }

    function giveHint() {
        if (modalOverlay.style.display === "flex") return;

        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[window.currentIndex].en);
        
        const targetWordsRaw = lessonData[window.currentIndex].en.split(' ');
        const targetWordsNorm = targetText.split(' ');
        const userWords = userInput.split(' ').filter(w => w !== "");

        let hintWord = targetWordsRaw[userWords.length];
        for (let i = 0; i < userWords.length; i++) {
            if (userWords[i] !== targetWordsNorm[i]) {
                hintWord = targetWordsRaw[i];
                inputField.value = targetWordsRaw.slice(0, i).join(' ') + (i > 0 ? " " : "");
                break;
            }
        }

        if (hintWord) {
            inputField.value += (inputField.value.length > 0 && !inputField.value.endsWith(' ') ? ' ' : '') + hintWord + ' ';
            msgBox.innerText = "Đã điền từ tiếp theo!";
        }
    }

    function showModal() {
        inputField.blur();
        const data = lessonData[window.currentIndex];
        
        document.getElementById("trans-en").innerText = data.en;
        document.getElementById("trans-vi").innerText = data.vi;
        
        const grammarContainer = document.getElementById("grammar-container");
        if(data.grammar) {
            grammarContainer.style.display = "block";
            document.getElementById("trans-grammar").innerText = data.grammar;
        } else {
            grammarContainer.style.display = "none";
        }
        
        const vocabList = document.getElementById("trans-vocab");
        vocabList.innerHTML = "";
        if(data.vocab && data.vocab.length > 0) {
            data.vocab.forEach(v => {
                let li = document.createElement("li");
                let parts = v.split(" (");
                li.innerHTML = `<strong>${parts[0]}</strong> <span style="color:var(--text-light); font-size:15px;">(${parts[1]}</span>`;
                vocabList.appendChild(li);
            });
        }
        
        modalOverlay.style.display = "flex";
        document.querySelector('.btn-next-modal').focus();
    }

    function prevSentenceManual() {
        if (window.currentIndex > 0) {
            window.currentIndex--;
            resetForNewSentence();
        }
    }

    function nextSentenceManual() {
        if (window.currentIndex < lessonData.length - 1) {
            window.currentIndex++;
            resetForNewSentence();
        } else {
            finishLesson();
        }
    }
    
    function resetForNewSentence() {
        modalOverlay.style.display = "none";
        inputField.value = "";
        msgBox.innerHTML = "";
        localStorage.setItem('part3_test2_progress', window.currentIndex);
        if(window.saveProgressToCloud) window.saveProgressToCloud(window.currentIndex);
        updateUI();
        playAudio();
    }

    function nextSentence() {
        modalOverlay.style.display = "none";
        window.currentIndex++;
        inputField.value = "";
        msgBox.innerHTML = "";
        
        if (window.currentIndex < lessonData.length) {
            localStorage.setItem('part3_test2_progress', window.currentIndex);
            if(window.saveProgressToCloud) window.saveProgressToCloud(window.currentIndex);
            updateUI();
            playAudio();
        } else {
            finishLesson();
        }
    }

    function updateProgress() {
        const percent = Math.round((window.currentIndex / lessonData.length) * 100);
        document.getElementById("progress-percent").innerText = percent;
        document.getElementById("progress-ring").style.background = `conic-gradient(var(--primary) ${percent}%, #eee 0)`;
    }

    window.playEndScreenAudio = function(text, gender) {
        if (synth.speaking) synth.cancel();
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value) || 1.0; 
        if (gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
        else if (gender === 'male' && maleVoice) utterThis.voice = maleVoice;
        synth.speak(utterThis);
    };

    function finishLesson() {
        document.getElementById("learning-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        
        let count = parseInt(localStorage.getItem('part3_test2_count')) || 0;
        count++;
        localStorage.setItem('part3_test2_count', count);
        document.getElementById('study-count').innerText = count;

        localStorage.removeItem('part3_test2_progress');
        if(window.saveProgressToCloud) window.saveProgressToCloud(0);

        const transcriptBox = document.getElementById("full-transcript");
        let htmlContent = "";

        lessonData.forEach(d => {
            const color = d.gender === 'male' ? '#0284C7' : '#C2410C';
            htmlContent += `<p style="margin-bottom:12px; padding-left: 10px;">
                <strong style="color:${color}">${d.speaker}:</strong> <span style="font-weight: 500;">${d.en}</span>
                <button onclick="playEndScreenAudio(\`${d.en.replace(/`/g, "'")}\`, '${d.gender}')" style="background:none; border:none; cursor:pointer; font-size:18px; margin-left: 5px; transition: 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" title="Nghe lại câu này">🔊</button><br>
                <span style="color:var(--text-light); font-size: 14px;">${d.vi}</span>
            </p>`;
        });
        transcriptBox.innerHTML = htmlContent;
    }

    function restartLesson() {
        localStorage.setItem('part3_test2_progress', 0);
        location.reload();
    }
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlTU4B563sSsTVbLai_je29l6eC8T-cm0",
        authDomain: "snapenglish-cb6e2.firebaseapp.com",
        projectId: "snapenglish-cb6e2",
        storageBucket: "snapenglish-cb6e2.firebasestorage.app",
        messagingSenderId: "373152038413",
        appId: "1:373152038413:web:19284622571390f8585f44"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.saveProgressToCloud = async (progressIndex) => {
        if (window.currentUserUid) {
            try {
                await setDoc(doc(db, "userProgress", window.currentUserUid), {
                    part3_test2_progress: progressIndex
                }, { merge: true });
            } catch (e) {
                console.error("Lỗi khi lưu tiến độ:", e);
            }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            window.currentUserUid = user.uid;
            window.currentUserEmail = user.email;
            
            try {
                const docRef = doc(db, "userProgress", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    let cloudProgress = docSnap.data().part3_test2_progress;
                    if (cloudProgress !== undefined) {
                        window.currentIndex = cloudProgress; 
                        window.updateUI();
                    }
                }
            } catch (error) {
                console.error("Lỗi khi tải tiến độ:", error);
            }
           
        } else {
            window.currentUserUid = null;
            window.currentUserEmail = null;
        }
    });
</script>
