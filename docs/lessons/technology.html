<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology | SnapEnglish</title>
   <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F0F4F8;
            --primary: #2A4B7C; /* Xanh Tech sâu sắc */
            --secondary: #5B8DB8;
            --accent: #E1E8F0;
            --text-main: #2C3E50;
            --text-light: #7F8C8D;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--white);
            max-width: 600px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(42, 75, 124, 0.08);
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-family: 'Lora', serif;
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 30px;
            font-style: italic;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #f0f0f0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .exercise-area {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .question {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-main);
            line-height: 1.5;
        }

        button.option-btn {
            background-color: var(--white);
            border: 2px solid var(--accent);
            color: var(--text-main);
            padding: 12px 20px;
            margin: 8px 0;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
        }

        button.option-btn:hover {
            background-color: var(--accent);
            transform: translateY(-2px);
        }

        button.option-btn.correct {
            background-color: var(--primary);
            border-color: var(--primary);
            color: var(--white);
        }

        button.option-btn.wrong {
            background-color: #E05D5D;
            border-color: #E05D5D;
            color: var(--white);
        }

        input[type="text"] {
            width: 80%;
            padding: 15px;
            border: 2px solid var(--accent);
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Nunito', sans-serif;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .blank-input {
            width: auto;
            min-width: 100px;
            display: inline-block;
            margin: 0 10px;
            padding: 8px;
            border-bottom: 2px solid var(--primary);
            border-top: none;
            border-left: none;
            border-right: none;
            border-radius: 0;
            background-color: transparent;
        }

        .action-btn {
            background-color: var(--primary);
            color: var(--white);
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
            box-shadow: 0 4px 15px rgba(42, 75, 124, 0.3);
        }

        .action-btn:hover {
            background-color: #1A3459;
        }

        .scramble-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .scramble-word {
            background: var(--accent);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            color: var(--text-main);
        }
        
        .scramble-word.selected {
            opacity: 0.5;
            pointer-events: none;
        }

        .answer-dropzone {
            min-height: 50px;
            border: 2px dashed var(--secondary);
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 10px;
        }

        .feedback {
            margin-top: 15px;
            font-weight: bold;
            height: 24px;
        }
    </style>
</head>
<body>

        { en: "replace human labour", vn: "thay thế lao động con người" },

        { en: "express human emotions and values", vn: "thể hiện cảm xúc và giá trị con người" },

        { en: "address the human condition", vn: "đề cập bản chất con người" },
        { en: "cannot be quantified by data", vn: "không thể đo lường bằng dữ liệu" },
        { en: "complement scientific progress", vn: "bổ trợ cho tiến bộ khoa học" },
        { en: "autonomous vehicles", vn: "phương tiện tự lái" },
        { en: "reduce traffic accidents", vn: "giảm tai nạn giao thông" },
        { en: "eliminate human-related driving errors", vn: "loại bỏ lỗi do con người gây ra" },
        { en: "improve road safety", vn: "cải thiện an toàn giao thông" },
        { en: "raise ethical and legal concerns", vn: "làm dấy lên lo ngại về đạo đức và pháp lý" },
        { en: "revolutionize the transportation system", vn: "cách mạng hóa hệ thống giao thông" },
        { en: "gain public trust", vn: "giành được lòng tin của công chúng" },
        { en: "technology is still in its infancy", vn: "công nghệ vẫn đang trong giai đoạn sơ khai" }
    ];

    let currentItem = {};
    let currentIndex = 0;
    const totalQuestions = 20; 
    let currentScrambleWords = [];
    let blankWordData = { word: '', fullEn: '' };

    const exerciseArea = document.getElementById('exerciseArea');
    const feedbackText = document.getElementById('feedbackText');
    const nextBtn = document.getElementById('nextBtn');
    const progressFill = document.getElementById('progressFill');

    function getRandomItem(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
    }

    function shuffleArray(array) {
        let newArray = [...array];
        for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
        }
        return newArray;
    }

    function updateProgress() {
        const percent = (currentIndex / totalQuestions) * 100;
        progressFill.style.width = `${percent}%`;
    }

    // RESET SESSION DÀNH RIÊNG CHO GOOGLE SITES
    function resetSession() {
        currentIndex = 0;
        startExercise();
    }

    function startExercise() {
        if (currentIndex >= totalQuestions) {
            exerciseArea.innerHTML = `
                <h2 style="font-family: 'Lora', serif; color: var(--primary);">System Upgraded!</h2>
                <p>Tuyệt vời! Dữ liệu từ vựng Technology đã được cài đặt sâu vào bộ nhớ của bạn. Hãy duy trì thói quen học hàng tuần nhé!</p>
                <button class="action-btn" onclick="resetSession()">Luyện tiếp Session mới</button>
            `;
            feedbackText.innerHTML = "";
            nextBtn.style.display = "none";
            updateProgress();
            return;
        }

        feedbackText.innerHTML = "";
        nextBtn.style.display = "none";
        currentItem = getRandomItem(vocabData);
        updateProgress();

        const type = Math.floor(Math.random() * 5) + 1;
        
        switch(type) {
            case 1: renderMultipleChoice(); break;
            case 2: renderTyping(); break;
            case 3: renderMatching(); break;
            case 4: renderUnscramble(); break;
            case 5: renderFillInBlank(); break;
        }
    }

    function renderMultipleChoice() {
        let options = [currentItem];
        while(options.length < 4) {
            let randomOpt = getRandomItem(vocabData);
            if(!options.find(o => o.en === randomOpt.en)) options.push(randomOpt);
        }
        options = shuffleArray(options);

        let html = `<div class="question">Nghĩa của cụm từ: <br><span style="color:var(--primary); font-family: 'Lora', serif; font-size: 26px;">"${currentItem.en}"</span> là gì?</div>`;
        options.forEach(opt => {
            html += `<button class="option-btn" onclick="checkAnswer(this, '${opt.vn.replace(/'/g, "\\'")}', '${currentItem.vn.replace(/'/g, "\\'")}')">${opt.vn}</button>`;
        });
        exerciseArea.innerHTML = html;
    }

    function renderTyping() {
        exerciseArea.innerHTML = `
            <div class="question">Viết cụm từ tiếng Anh cho:<br><span style="color:var(--secondary); font-size: 22px;">"${currentItem.vn}"</span></div>
            <input type="text" id="typeInput" placeholder="Gõ tiếng Anh vào đây..." onkeypress="handleEnter(event, checkTyping)">
            <button class="action-btn" onclick="checkTyping()">Kiểm tra</button>
        `;
        setTimeout(() => document.getElementById('typeInput').focus(), 100);
    }

    function renderMatching() {
        let options = [currentItem];
        while(options.length < 4) {
            let randomOpt = getRandomItem(vocabData);
            if(!options.find(o => o.vn === randomOpt.vn)) options.push(randomOpt);
        }
        options = shuffleArray(options);

        let html = `<div class="question">Chọn tiếng Anh chuẩn cho:<br><span style="color:var(--primary); font-size: 22px;">"${currentItem.vn}"</span></div>`;
        options.forEach(opt => {
            html += `<button class="option-btn" onclick="checkAnswer(this, '${opt.en.replace(/'/g, "\\'")}', '${currentItem.en.replace(/'/g, "\\'")}')">${opt.en}</button>`;
        });
        exerciseArea.innerHTML = html;
    }

    function renderUnscramble() {
        const words = shuffleArray(currentItem.en.split(' '));
        currentScrambleWords = [];
        
        let html = `
            <div class="question">Xếp từ thành cụm hoàn chỉnh:<br><span style="color:var(--text-light); font-size: 18px;">(${currentItem.vn})</span></div>
            <div class="answer-dropzone" id="dropzone"></div>
            <div class="scramble-container" id="scrambleWords">
        `;
        
        words.forEach((word, index) => {
            html += `<div class="scramble-word" id="sw-${index}" onclick="selectScrambleWord('${word.replace(/'/g, "\\'")}', ${index})">${word}</div>`;
        });
        
        html += `</div><button class="action-btn" onclick="checkScramble()">Kiểm tra</button><button class="action-btn" style="background:#e9ecef; color:#495057; margin-left:10px;" onclick="resetScramble()">Làm lại</button>`;
        exerciseArea.innerHTML = html;
    }

    function renderFillInBlank() {
        const words = currentItem.en.split(' ');
        if(words.length < 2) { 
            renderMultipleChoice();
            return; 
        }
        const blankIndex = Math.floor(Math.random() * words.length);
        blankWordData.word = words[blankIndex];
        blankWordData.fullEn = currentItem.en;
        
        let displayWords = [...words];
        displayWords[blankIndex] = `<input type="text" id="blankInput" class="blank-input" onkeypress="handleEnter(event, checkBlank)">`;
        
        exerciseArea.innerHTML = `
            <div class="question">Điền từ còn thiếu vào cụm sau:<br><span style="color:var(--text-light); font-size: 18px;">(${currentItem.vn})</span></div>
            <div style="font-size: 22px; font-weight: 600; margin-bottom: 20px;">
                ${displayWords.join(' ')}
            </div>
            <button class="action-btn" onclick="checkBlank()">Kiểm tra</button>
        `;
        setTimeout(() => document.getElementById('blankInput').focus(), 100);
    }

    function selectScrambleWord(word, index) {
        document.getElementById(`sw-${index}`).classList.add('selected');
        currentScrambleWords.push({word, index});
        renderDropzone();
    }

    function renderDropzone() {
        const dropzone = document.getElementById('dropzone');
        dropzone.innerHTML = currentScrambleWords.map(item => `<div class="scramble-word" style="background:var(--primary); color:white">${item.word}</div>`).join('');
    }

    function resetScramble() {
        currentScrambleWords = [];
        renderDropzone();
        document.querySelectorAll('.scramble-word').forEach(el => el.classList.remove('selected'));
    }

    function checkScramble() {
        const answer = currentScrambleWords.map(item => item.word).join(' ');
        if(answer === currentItem.en) showFeedback(true);
        else showFeedback(false, currentItem.en);
    }

    function checkBlank() {
        const input = document.getElementById('blankInput').value.trim().toLowerCase();
        const cleanInput = input.replace(/[.,'"]/g, "");
        const cleanWord = blankWordData.word.toLowerCase().replace(/[.,'"]/g, "");
        
        if(cleanInput === cleanWord) showFeedback(true);
        else showFeedback(false, blankWordData.fullEn);
    }

    function handleEnter(e, checkFunction) {
        if(e.key === 'Enter') checkFunction();
    }

    function checkAnswer(btn, selected, correct) {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
        
        if(selected === correct) {
            btn.classList.add('correct');
            showFeedback(true);
        } else {
            btn.classList.add('wrong');
            btns.forEach(b => {
                if(b.innerText === correct) b.classList.add('correct');
            });
            showFeedback(false, correct);
        }
    }

    function checkTyping() {
        const input = document.getElementById('typeInput').value.trim().toLowerCase();
        const cleanInput = input.replace(/[.,'"]/g, "");
        const cleanTarget = currentItem.en.toLowerCase().replace(/[.,'"]/g, "");

        if(cleanInput === cleanTarget) showFeedback(true);
        else showFeedback(false, currentItem.en);
    }

    function showFeedback(isCorrect, correctAnswer = "") {
        if(isCorrect) {
            feedbackText.innerHTML = `<span style="color: #2A4B7C;">Chính xác! Lập luận bén như AI. 🤖</span>`;
        } else {
            feedbackText.innerHTML = `<span style="color: #E05D5D;">Lỗi xử lý. Đáp án đúng là: <b>${correctAnswer}</b></span>`;
        }
        nextBtn.style.display = "inline-block";
    }

    function nextQuestion() {
        currentIndex++;
        startExercise();
    }

    window.onload = startExercise;

</script>
</body>
</html>
