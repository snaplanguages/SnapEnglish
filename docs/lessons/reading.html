<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Reading | SnapEnglish</title>
     <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- Bảng màu English Pastel (Tím & Cam đất) --- */
        :root {
            --primary-eng: #a29bfe; /* Tím pastel chủ đạo */
            --secondary-eng: #c8c2f2; /* Tím nhạt */
            --accent-eng: #e7a87c; /* Cam đất warm-tone */
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --text-main: #4a4a4a;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Quicksand', sans-serif; 
            margin: 0;
            padding: 50px 20px;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
        }

        /* --- Background trang trí --- */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.4;
        }
        .shape-1 { width: 300px; height: 300px; background: var(--primary-eng); top: -50px; right: -50px; border-radius: 50%; }
        .shape-2 { width: 400px; height: 400px; background: var(--accent-eng); bottom: -100px; left: -100px; border-radius: 30% 70% 70% 30%; }

        /* --- Header --- */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            font-size: 38px; 
            margin-bottom: 5px;
            color: #6c5ce7;
            letter-spacing: -0.5px;
        }

        .brand-name { color: var(--accent-eng); font-weight: 700; }

        p.subtitle {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* --- Thanh Tìm Kiếm --- */
        .search-wrapper {
            max-width: 500px;
            margin: 0 auto 50px auto;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 15px 25px;
            border-radius: 15px;
            border: 2px solid transparent;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            box-sizing: border-box; 
            transition: all 0.3s ease;
        }

        #searchInput:focus {
            border-color: var(--primary-eng);
            outline: none;
            background: #fff;
        }

        /* --- Grid --- */
        .container { 
            max-width: 1100px; 
            margin: auto; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding-bottom: 80px; /* Chừa chỗ cho nút liên hệ */
        }

        /* --- Card Unit --- */
        .unit-card { 
            background: var(--glass-bg);
            padding: 20px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease backwards;
        }

        .unit-card:hover {
            transform: translateY(-5px);
            background: #fff;
            box-shadow: 0 12px 25px rgba(162, 155, 254, 0.2);
            border-color: var(--primary-eng);
        }

        .unit-icon {
            font-size: 32px;
            margin-right: 15px;
            width: 60px;
            height: 60px;
            background: #f4f2ff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            transition: 0.3s;
        }

        .unit-card:hover .unit-icon {
            background: var(--primary-eng);
            color: white;
        }

        .unit-content { flex-grow: 1; }

        .level-tag {
            font-size: 10px;
            background: var(--secondary-eng);
            color: #4b4b4b;
            padding: 2px 8px;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .unit-card:hover .level-tag {
            background: var(--accent-eng);
            color: white;
        }

        .unit-title {
            margin: 5px 0 0 0;
            font-size: 17px;
            font-weight: 700;
            color: #333;
        }

        /* --- Nút Liên hệ cố định --- */
        .contact-floating-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--accent-eng);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
            box-shadow: 0 4px 15px rgba(231, 168, 124, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .contact-floating-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(231, 168, 124, 0.6);
            background-color: #d99668;
        }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
            .contact-floating-btn {
                bottom: 20px;
                right: 20px;
                padding: 10px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="header-section">
        <h1>🗣️ Snap<span class="brand-name">English</span></h1>
        <p class="subtitle">Luyện đọc thực chiến từ A1 đến C2</p>
    </div>
    
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Tìm tên bài, cấp độ (VD: poster, A1)...">
    </div>

    <div class="container" id="unitContainer"></div>

    <a href="contact.html" class="contact-floating-btn">
        💬 Liên hệ
    </a>

    <script>
        /**
         * DANH SÁCH BÀI HỌC (URL đã chuyển sang .html cục bộ)
         */
        const unitsData = [
            { 
                title: "A poster at work", 
                level: "A1", 
                icon: "📩", 
                url: "a-poster-at-work.html" 
            },
            { 
                title: "A poster for exam candidates", 
                level: "A1", 
                icon: "📢", 
                url: "a-poster-for-exam-candidates.html" 
            },
        { 
                title: "A message to a new friend", 
                level: "A2", 
                icon: "👋", 
                url: "a-message-to-a-new-friend.html" 
            },
            { 
                title: "A Plastic Ocean: a film review", 
                level: "B2", 
                icon: "👋", 
                url: "a-plastic-ocean.html" 
            },
             { 
                title: "A biography of Kilian Jornet", 
                level: "C1", 
                icon: "🏃‍♂️", 
                url: "a-biography-of-kilian-jornet.html" 
            }
        ];

        const container = document.getElementById('unitContainer');
        const searchInput = document.getElementById('searchInput');

        function renderUnits() {
            container.innerHTML = '';
            unitsData.forEach((unit, index) => {
                const card = document.createElement('a');
                card.className = 'unit-card';
                card.href = unit.url;
                // Bỏ card.target = "_blank" để mở trong cùng tab
                card.setAttribute('data-search', `${unit.title} ${unit.level}`.toLowerCase());
                card.style.animationDelay = `${index * 0.05}s`;

                card.innerHTML = `
                    <div class="unit-icon">${unit.icon}</div>
                    <div class="unit-content">
                        <span class="level-tag">${unit.level}</span>
                        <h3 class="unit-title">${unit.title}</h3>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Chức năng tìm kiếm
        searchInput.addEventListener('input', function() {
            const filter = this.value.toLowerCase().trim();
            const cards = document.querySelectorAll('.unit-card');
            
            cards.forEach(card => {
                const text = card.getAttribute('data-search');
                card.classList.toggle('hidden', !text.includes(filter));
            });
        });

        // Khởi tạo hiển thị bài học
        renderUnits();
    </script>

</body>
</html>
