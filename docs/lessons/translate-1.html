<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="ảnh.png">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgDark: '#0B1120',

                        primaryHighlight: '#38bdf8', /* Xanh dương sáng */

    </script>
    <style>
        body { background-color: #0B1120; color: #94a3b8; }
        .sentence { transition: all 0.3s ease; }
        .sentence.active { color: #38bdf8; font-style: italic; font-weight: bold; }
        .sentence.completed { color: #4ade80; font-weight: normal; } 
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animation cho Modal Popup */
        .modal-overlay {
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1; pointer-events: auto;
        }
        .modal-content {
            transform: translateY(-20px) scale(0.95); transition: all 0.3s ease;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex justify-center font-sans">

    <div class="max-w-6xl w-full relative">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
            <h1 class="text-white text-2xl font-bold">The Joy of Celebrating New Year's Eve</h1>
            <div class="flex items-center gap-6 text-sm font-medium">
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 bg-yellow-500 rounded-full flex items-center justify-center text-black font-bold">
                        <i class="fa-solid fa-c text-xs"></i>
                    </div>
                    <span class="text-white">10<br><span class="text-slate-400 font-normal">credits</span></span>
                </div>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-star text-yellow-500 text-xl"></i>
                    <span class="text-white">0<br><span class="text-slate-400 font-normal">points</span></span>
                </div>
                <div class="text-right ml-4">
                    <p class="text-slate-400">Progress: <span id="progress-text" class="text-white font-bold">0/19</span> sentences</p>
                </div>
            </div>
        </div>

        <div class="w-full bg-slate-800 rounded-full h-2 mb-8 overflow-hidden relative">
            <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-primaryHighlight h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 flex flex-col gap-4">
                <div class="bg-cardDark rounded-2xl p-6 border border-slate-800 shadow-xl flex-1 flex flex-col">
                    <div class="flex-1 mb-8">
                        <p id="paragraph-container" class="text-[17px] leading-loose text-justify"></p>
                    </div>
                    <div class="mt-auto border-t border-slate-700/50 pt-6">
                        <textarea id="translation-input" rows="2" 
                            placeholder="Enter your English translation here..." 
                            class="w-full bg-slate-900/50 rounded-lg border border-slate-700 focus:border-primaryHighlight focus:ring-1 focus:ring-primaryHighlight outline-none text-white px-4 py-3 text-lg placeholder-slate-600 transition resize-none"></textarea>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button class="px-6 py-3 bg-slate-800 hover:bg-slate-700 rounded-xl text-white font-medium transition duration-200">Quit</button>
                    <button id="btn-hint" class="px-6 py-3 bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 hover:bg-indigo-600/40 rounded-xl font-medium transition duration-200 flex items-center gap-2">
                        <i class="fa-solid fa-lightbulb"></i> Hint
                    </button>
                    <div class="flex-1 text-right">
                        <button id="btn-submit" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl text-white font-medium transition duration-200 shadow-[0_0_15px_rgba(37,99,235,0.4)] flex items-center justify-center gap-2 ml-auto">
                            Submit <span class="bg-white/20 px-2 py-0.5 rounded text-sm">1 <i class="fa-solid fa-bitcoin-sign text-yellow-400"></i></span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1 flex flex-col gap-5">
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-dictionary" class="bg-gradient-to-br from-slate-800 to-cardDark border border-slate-700 rounded-2xl p-5 flex flex-col items-center justify-center gap-3 hover:border-primaryHighlight transition group">
                        <div class="w-12 h-12 bg-blue-500/10 rounded-full flex items-center justify-center group-hover:scale-110 transition">
                            <i class="fa-solid fa-book text-primaryHighlight text-2xl"></i>
                        </div>
                        <span class="text-sm font-semibold text-white">Dictionary</span>
                    </button>
                    <div class="bg-gradient-to-br from-slate-800 to-cardDark border border-slate-700 rounded-2xl p-5 flex flex-col items-center justify-center gap-3">
                        <div class="w-12 h-12 bg-green-500/10 rounded-full flex items-center justify-center">
                            <i class="fa-solid fa-bullseye text-green-500 text-2xl"></i>
                        </div>
                        <span id="accuracy-display" class="text-sm font-semibold text-white">Accuracy: 0%</span>
                    </div>
                </div>

                <div class="bg-cardDark border border-slate-700 rounded-2xl p-5 shadow-lg">
                    <h3 class="text-white font-bold text-lg mb-4 flex items-center gap-2"><i class="fa-solid fa-robot text-primaryHighlight"></i> AI Feedback</h3>
                    <div id="feedback-box" class="bg-slate-900 rounded-xl p-4 text-sm text-slate-300 leading-relaxed border border-slate-800 min-h-[100px]">
                        Click <span class="text-yellow-400 font-semibold italic">Submit</span> to get feedback from AI.
                    </div>
                </div>

                <div class="bg-cardDark border border-slate-700 rounded-2xl p-5 shadow-lg">
                    <h3 class="text-white font-bold text-lg mb-5 flex items-center gap-2"><i class="fa-solid fa-trophy text-yellow-500"></i> Today's Achievements</h3>
                    <div class="grid grid-cols-2 gap-4 text-center">
                        <div class="flex flex-col items-center gap-2 bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                            <i class="fa-solid fa-fire text-orange-500 text-3xl"></i>
                            <span id="streak-text" class="text-xs text-white font-bold mt-1">1 Day Streak</span>
                        </div>
                        <div class="flex flex-col items-center gap-2 bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                            <i class="fa-solid fa-lightbulb text-yellow-200 text-3xl drop-shadow-[0_0_10px_rgba(253,224,71,0.6)]"></i>
                            <span class="text-xs text-white font-bold mt-1">Bright Mind</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="dictionary-modal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
        <div class="modal-content bg-[#1e293b] border border-slate-600 rounded-3xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden relative">
            <div class="bg-gradient-to-r from-indigo-900 to-slate-800 p-5 flex justify-between items-center border-b border-slate-700">
                <h2 id="modal-title" class="text-xl font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-book-open text-primaryHighlight"></i> Dictionary
                </h2>
                <button id="close-modal" class="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 hover:bg-white/20 text-white transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div id="dictionary-list" class="p-5 overflow-y-auto space-y-4 bg-slate-900/50 flex-1 custom-scrollbar">
            </div>
        </div>
    </div>

    <script>
        // --- 1. STREAK SYSTEM ---
        function updateStreak() {
            const today = new Date().toDateString(); 
            const yesterdayDate = new Date();
            yesterdayDate.setDate(yesterdayDate.getDate() - 1);
            const yesterday = yesterdayDate.toDateString();

            let lastActive = localStorage.getItem('lastActiveDate');
            let currentStreak = parseInt(localStorage.getItem('studyStreak') || "0");

            if (lastActive === today) {
                // Đã học hôm nay rồi
            } else if (lastActive === yesterday) {
                currentStreak++;
            } else {
                currentStreak = 1;
            }

            localStorage.setItem('lastActiveDate', today);
            localStorage.setItem('studyStreak', currentStreak);
            document.getElementById('streak-text').innerText = `${currentStreak} Day Streak`;
        }
        updateStreak();

        // --- 2. DICTIONARY DATA ---
        const dictionaryData = [
            { word: "holiday", type: "Word", meaning: "Ngày nghỉ lễ.", example: "We plan to go to the beach for the whole holiday." },
            { word: "reflection", type: "Word", meaning: "Sự suy ngẫm, sự phản ánh.", example: "The reflection from the lake was beautiful at sunset." },
            { word: "achievements", type: "Word", meaning: "Những thành tích đã đạt được.", example: "Her recent awards are significant achievements in her career." },
            { word: "challenges", type: "Word", meaning: "Những khó khăn, thử thách.", example: "She faced many challenges during her career." },
            { word: "goals", type: "Word", meaning: "Mục tiêu.", example: "Setting clear goals is important for personal development." },
            { word: "growth", type: "Word", meaning: "Sự phát triển, sự tăng trưởng.", example: "The company's growth has been impressive over the last year." },
            { word: "celebrations", type: "Word", meaning: "Các buổi lễ kỷ niệm.", example: "We held many celebrations for the anniversary." },
            { word: "family", type: "Word", meaning: "Gia đình.", example: "My family is going on vacation next week." },
            { word: "friends", type: "Word", meaning: "Bạn bè.", example: "I have known my best friend since childhood." },
            { word: "fireworks", type: "Word", meaning: "Pháo bông.", example: "We watched the fireworks light up the sky on New Year's Eve." },
            { word: "atmosphere", type: "Word", meaning: "Bầu không khí.", example: "Atmosphere in the restaurant was warm and inviting." },
            { word: "questions", type: "Word", meaning: "Câu hỏi.", example: "She asked a challenging question during the meeting." },
            { word: "memories", type: "Word", meaning: "Ký ức, kỷ niệm.", example: "I have vivid memories of my childhood." },
            { word: "joy", type: "Word", meaning: "Niềm vui.", example: "Her face lit up with joy when she heard the news." },
            { word: "hope", type: "Word", meaning: "Hy vọng.", example: "Hope is what keeps us going during difficult times." },
            { word: "new year's eve", type: "Noun phrase", meaning: "Đêm giao thừa.", example: "We celebrated New Year's Eve with a big party." },
            { word: "past year", type: "Noun phrase", meaning: "Năm trước, năm cũ.", example: "In the past year, I traveled to several countries." },
            { word: "personal growth", type: "Noun phrase", meaning: "Sự phát triển cá nhân.", example: "Engaging in personal growth activities can lead to a more fulfilling life." },
            { word: "joyful atmosphere", type: "Noun phrase", meaning: "Không khí vui vẻ.", example: "The party created a joyful atmosphere." },
            { word: "deeper thinking", type: "Noun phrase", meaning: "Suy nghĩ sâu sắc hơn.", example: "Engaging in deeper thinking can lead to better decisions." },
            { word: "think about", type: "Verb phrase", meaning: "Suy nghĩ về.", example: "I need to think about the proposal before making a decision." },
            { word: "gather to share", type: "Verb phrase", meaning: "Tập hợp để chia sẻ.", example: "Gather to share insights during the monthly meeting." }
        ];

        // --- 3. LESSON DATA ---
        const lessonData = [
            { vi: "Đêm giao thừa là một ngày lễ đặc biệt đối với nhiều người.", en: "New Year's Eve is a special holiday for many people." },
            { vi: "Nó đánh dấu sự kết thúc của một năm và bắt đầu một năm mới.", en: "It marks the end of a year and the beginning of a new year." },
            { vi: "Nhiều người thích ngày lễ này vì nhiều lý do.", en: "Many people like this holiday for various reasons." },
            { vi: "Đầu tiên, đây là thời gian để suy ngẫm.", en: "First, this is a time for reflection." },
            { vi: "Mọi người nghĩ về năm cũ của mình.", en: "People think about their past year." },
            { vi: "Họ cân nhắc những thành tựu và thử thách của mình.", en: "They consider their achievements and challenges." },
            { vi: "Sau đó, họ đặt ra mục tiêu cho năm mới.", en: "Then, they make goals for the new year." },
            { vi: "Thực hành này khuyến khích sự phát triển cá nhân.", en: "This practice encourages personal growth." },
            { vi: "Thứ hai, lễ kỷ niệm thường bao gồm gia đình và bạn bè.", en: "Second, celebrations usually include family and friends." },
            { vi: "Mọi người tụ tập để chia sẻ đồ ăn và đồ uống.", en: "People gather to share food and drinks." },
            { vi: "Họ thích trò chơi, âm nhạc và pháo hoa.", en: "They enjoy games, music, and fireworks." },
            { vi: "Những hoạt động như vậy tạo ra bầu không khí vui tươi.", en: "Such activities create a joyful atmosphere." },
            { vi: "Ngày lễ này cũng đặt ra những câu hỏi quan trọng.", en: "This holiday also raises important questions." },
            { vi: "Tại sao chúng bản ta lại ăn mừng những thay đổi theo thời gian?", en: "Why do we celebrate changes in time?" },
            { vi: "Những lễ kỷ niệm này định hình cuộc sống của chúng ta như thế nào?", en: "How do these celebrations shape our lives?" },
            { vi: "Những câu hỏi này gợi lên những suy nghĩ sâu sắc hơn.", en: "These questions evoke deeper thinking." },
            { vi: "Đêm giao thừa tạo ra những kỷ niệm kéo dài suốt đời.", en: "New Year's Eve creates memories that last a lifetime." },
            { vi: "Sự kết hợp của niềm vui, hy vọng và sự suy ngẫm làm cho nó trở nên độc đáo.", en: "The combination of joy, hope, and reflection makes it unique." },
            { vi: "Do đó, nhiều người trân trọng ngày lễ này.", en: "Therefore, many people cherish this holiday." }
        ];

        let currentIndex = 0;
        const totalSentences = lessonData.length;
        
        const container = document.getElementById('paragraph-container');
        const inputField = document.getElementById('translation-input');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const feedbackBox = document.getElementById('feedback-box');
        const accuracyDisplay = document.getElementById('accuracy-display');
        const btnSubmit = document.getElementById('btn-submit');
        
        // --- 4. RENDER TEXT ---
        function renderText() {
            container.innerHTML = ''; 
            lessonData.forEach((item, index) => {
                const span = document.createElement('span');
                if (index < currentIndex) {
                    span.textContent = item.en + ' ';
                    span.className = 'sentence completed';
                } else if (index === currentIndex) {
                    span.textContent = item.vi + ' ';
                    span.className = 'sentence active';
                } else {
                    span.textContent = item.vi + ' ';
                    span.className = 'sentence';
                }
                container.appendChild(span);
            });

            progressText.innerText = `${currentIndex}/${totalSentences}`;
            progressBar.style.width = `${(currentIndex / totalSentences) * 100}%`;
        }
        renderText();

        // --- 5. LỌC VÀ GỌI GEMINI API TRỰC TIẾP ---
        async function evaluateWithRealAI(userTranslation, expectedAnswer, originalVietnamese) {
            const originalBtnHTML = btnSubmit.innerHTML;
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> AI is thinking...`;
            btnSubmit.disabled = true;
            inputField.disabled = true;

            try {
                // API Key được lấy từ file TOEIC
                const API_KEY = "AIzaSyAS5z9HQ-0fIcwZooo-QJYHOIfaWX7ZoTE";
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;
                // Tạo prompt yêu cầu AI trả về định dạng JSON thuần tuý
                const prompt = `Bạn là một giáo viên chấm điểm dịch tiếng Anh có kinh nghiệm sửa chữa giúp học viên cải thiện điểm rất nhanh và chuyên nghiệp.
Hãy đánh giá câu dịch của học viên dựa trên thông tin sau:
- Câu gốc tiếng Việt: "${originalVietnamese}"
- Câu trả lời chuẩn: "${expectedAnswer}"
- Câu học viên dịch: "${userTranslation}"

Trả về KẾT QUẢ DUY NHẤT DƯỚI DẠNG JSON với cấu trúc sau (không có bất kì text hoặc markdown nào khác ở ngoài):
{
    "accuracy": <điểm số từ 0 đến 100 dựa trên độ chính xác ngữ nghĩa và ngữ pháp>,
    "feedback": "<Lời nhận xét ngắn gọn, nhẹ nhàng, chỉ ra tất cả lỗi sai, lưu ý và cách sửa bằng tiếng Việt, ngữ pháp chung cho câu đó>"
}`;

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: prompt }]
                        }],
                        // Cấu hình bắt buộc API trả về dạng JSON chuẩn
                        generationConfig: {
                            response_mime_type: "application/json"
                        }
                    })
                });

                const rawData = await response.json();

                if (!response.ok) {
                    throw new Error(rawData.error?.message || "Lỗi gọi AI");
                }
                
                // Lấy kết quả từ Gemini và Parse
                const textResponse = rawData.candidates[0].content.parts[0].text;
                const data = JSON.parse(textResponse);

                // Cập nhật giao diện với dữ liệu thật
                handleAIFeedback(data.accuracy, data.feedback, expectedAnswer, userTranslation);

            } catch (error) {
                console.error("Chi tiết lỗi:", error);
                feedbackBox.innerHTML = `
                    <div class="text-red-400 font-medium">
                        <i class="fa-solid fa-triangle-exclamation"></i> Lỗi hệ thống: ${error.message}
                    </div>`;
            } finally {
                btnSubmit.innerHTML = originalBtnHTML;
                btnSubmit.disabled = false;
                inputField.disabled = false;
                inputField.focus();
            }
        }

        function handleAIFeedback(accuracy, feedbackText, expectedAnswer, userTranslation) {
            accuracyDisplay.innerText = `Accuracy: ${accuracy}%`;

            if (accuracy >= 90) {
                feedbackBox.innerHTML = `
                    <div class="text-green-400 font-bold mb-2 text-base"><i class="fa-solid fa-circle-check"></i> Tuyệt vời! (Điểm: ${accuracy}/100)</div>
                    <div class="text-slate-300 mb-2">${feedbackText}</div>
                `;
                currentIndex++;
                renderText();
                inputField.value = '';
            } else {
                feedbackBox.innerHTML = `
                    <div class="text-yellow-400 font-bold mb-2 text-base"><i class="fa-solid fa-sparkles"></i> AI Suggestion (Điểm: ${accuracy}/100)</div>
                    <div class="text-slate-300 mb-2">Câu của bạn: <span class="text-gray-400 italic">"${userTranslation}"</span></div>
                    <div class="text-white mb-3 italic">" ${feedbackText} "</div>
                    <div class="text-green-400 bg-green-900/20 p-2 rounded border border-green-800/50">
                        <span class="font-semibold text-white">Đáp án tham khảo:</span> ${expectedAnswer}
                    </div>
                `;
                // Vẫn cho qua câu
                currentIndex++;
                renderText();
                inputField.value = '';
            }

            if (currentIndex === totalSentences) {
                inputField.placeholder = "🎉 Chúc mừng bạn đã hoàn thành bài học!";
                inputField.disabled = true;
                btnSubmit.disabled = true;
            }
        }

        // Bắt sự kiện Submit
        btnSubmit.addEventListener('click', () => {
            const userTranslation = inputField.value.trim();
            if (currentIndex >= totalSentences) return;

            if (userTranslation === "") {
                feedbackBox.innerHTML = `<div class="text-red-400 font-medium"><i class="fa-solid fa-circle-exclamation"></i> Vui lòng nhập bản dịch của bạn!</div>`;
                return;
            }

            const expectedAnswer = lessonData[currentIndex].en;
            const originalVietnamese = lessonData[currentIndex].vi;
            
            evaluateWithRealAI(userTranslation, expectedAnswer, originalVietnamese);
        });

        // Hỗ trợ Enter
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                btnSubmit.click();
            }
        });

        // --- 6. MODAL TỪ ĐIỂN VÀ HINT ---
        const modal = document.getElementById('dictionary-modal');
        const modalList = document.getElementById('dictionary-list');
        const modalTitle = document.getElementById('modal-title');

        function renderModalData(dataToRender, title, icon) {
            modalTitle.innerHTML = `<i class="fa-solid ${icon} text-primaryHighlight"></i> ${title}`;
            modalList.innerHTML = '';

            if (dataToRender.length === 0) {
                modalList.innerHTML = `<div class="text-center text-slate-400 py-10">Không tìm thấy từ vựng nào.</div>`;
            }

            dataToRender.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-[#151C2C] border border-slate-700/50 p-4 rounded-2xl hover:border-indigo-500/50 transition duration-300";
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-3">
                            <h3 class="text-xl font-bold text-white capitalize">${item.word}</h3>
                            <span class="bg-indigo-900/50 text-indigo-300 text-xs px-2.5 py-1 rounded-md font-medium border border-indigo-700/30">${item.type}</span>
                        </div>
                        <button class="text-slate-400 hover:text-white transition w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-700">
                            <i class="fa-solid fa-volume-high"></i>
                        </button>
                    </div>
                    <div class="text-slate-300 mb-2"><span class="font-semibold text-slate-400">Nghĩa:</span> ${item.meaning}</div>
                    <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800 italic text-slate-400 text-sm">
                        <span class="text-primaryHighlight font-semibold not-italic">VD:</span> "${item.example}"
                    </div>
                `;
                modalList.appendChild(card);
            });
            
            modal.classList.add('active');
        }

        document.getElementById('btn-dictionary').addEventListener('click', () => {
            renderModalData(dictionaryData, "Toàn bộ từ vựng", "fa-book-open");
        });

        document.getElementById('btn-hint').addEventListener('click', () => {
            if (currentIndex >= totalSentences) return;
            const currentEng = lessonData[currentIndex].en.toLowerCase();
            const hintData = dictionaryData.filter(item => currentEng.includes(item.word.toLowerCase()));
            renderModalData(hintData, `Gợi ý câu ${currentIndex + 1}`, "fa-lightbulb");
        });

        document.getElementById('close-modal').addEventListener('click', () => {
            modal.classList.remove('active');
        });
        
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

    </script>
</body>
</html>
