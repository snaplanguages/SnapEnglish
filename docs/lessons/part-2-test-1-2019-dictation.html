<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 2 Test 1 (2019) | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* TÔNG MÀU MỚI: Sapphire Blue & Sunset Orange */
        :root {
            --primary: #2563EB;         /* Blue 600 */
            --primary-hover: #1D4ED8;   /* Blue 800 */
            --secondary: #DBEAFE;       /* Blue 100 */
            --accent: #F59E0B;          /* Amber 500 */
            --blue-pastel: #EFF6FF;     /* Blue 50 */
            --blue-dark: #1E3A8A;       /* Blue 900 */
            --text-dark: #1E293B;       
            --text-light: #64748B;      
            --bg-main: #F8FAFC;         
            --white: #FFFFFF;
            --brand-pink: #EA580C;      /* Orange 600 */
            --brand-text: #0F172A;
            --error-glow: #E11D48;      /* Rose 600 */
            
            --badge-q-bg: #EFF6FF; --badge-q-border: #BFDBFE; --badge-q-text: #2563EB;
            --badge-opt-bg: #FFFBEB; --badge-opt-border: #FEF08A; --badge-opt-text: #B45309;
            --badge-corr-bg: #F0FDF4; --badge-corr-border: #BBF7D0; --badge-corr-text: #166534;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }
        .brand-badge {
            background-color: var(--brand-pink);
            color: var(--white);
            font-weight: 800;
            font-size: 26px;
            padding: 8px 20px;
            border-radius: 15px;
            letter-spacing: -0.5px;
        }
        .brand-title {
            color: var(--brand-text);
            font-weight: 800;
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        .layout-container {
            display: flex;
            gap: 25px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
        }

        .sidebar {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .progress-section { text-align: center; }
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, #eee 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; transition: background 0.5s;
        }
        .progress-circle::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--white); border-radius: 50%; }
        .progress-text { position: relative; z-index: 1; font-size: 28px; font-weight: 700; color: var(--primary); }

        .instructions { background: var(--blue-pastel); padding: 20px; border-radius: 15px; color: var(--blue-dark); }
        .instructions h3 { margin-bottom: 15px; font-size: 18px; }
        .instructions ul { list-style: none; }
        .instructions li { margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        kbd { background: var(--white); border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px; font-family: monospace; font-size: 13px; font-weight: bold; box-shadow: 0 2px 0 #ccc; color: #333;}

        .main-content {
            flex: 3; background: var(--white); border-radius: 20px; padding: 35px;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.1); display: flex; flex-direction: column; position: relative;
        }

        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px dashed #eee; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-light); }
        select { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 600; color: var(--text-dark);}

        .audio-section { text-align: center; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px;}
        
        .speaker-badge { display: inline-block; padding: 8px 25px; border-radius: 20px; font-weight: bold; font-size: 16px; }
        .badge-question { background: var(--badge-q-bg); color: var(--badge-q-text); border: 1px solid var(--badge-q-border); }
        .badge-option { background: var(--badge-opt-bg); color: var(--badge-opt-text); border: 1px solid var(--badge-opt-border); }
        .badge-correct { background: var(--badge-corr-bg); color: var(--badge-corr-text); border: 1px solid var(--badge-corr-border); }

        .btn-play { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);}
        .btn-play:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .input-section { flex-grow: 1; display: flex; flex-direction: column; }
        
        .message { text-align: center; margin-bottom: 10px; min-height: 45px; }
        .glow-error {
            color: var(--error-glow);
            text-shadow: 0 0 12px rgba(225, 29, 72, 0.6);
            font-weight: 800;
            background: #FFF1F2;
            padding: 2px 6px;
            border-radius: 6px;
            border: 2px dashed var(--error-glow);
            display: inline-block;
            transform: scale(1.05);
        }
        
        textarea { width: 100%; height: 120px; padding: 20px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 22px; outline: none; transition: 0.3s; resize: none; color: var(--text-dark); line-height: 1.6; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(37, 99, 235, 0.2); }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-enter { background: var(--blue-dark); color: var(--white); }
        .btn-enter:hover { background: #0F172A; }
        .btn-hint { background: var(--secondary); color: var(--primary-hover); }
        .btn-hint:hover { background: #BFDBFE; }
        .btn-nav { background: #E2E8F0; color: #334155; }
        .btn-nav:hover { background: #CBD5E1; }

        /* MODAL POPUP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 35px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative; max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: #16A34A; font-size: 22px; margin-bottom: 15px; text-align: center; }
        .modal-script { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-align: center; padding-bottom: 15px; border-bottom: 2px dashed #eee;}
        .modal-content p { margin-bottom: 10px; line-height: 1.6; font-size: 16px; }
        .vocab-list { list-style-type: none; padding-left: 0; margin-top: 10px;}
        .vocab-list li { margin-bottom: 8px; background: #f8fafc; padding: 8px 15px; border-radius: 8px; border-left: 4px solid var(--primary);}
        .vocab-list li strong { color: var(--brand-pink); font-size: 16px;}
        
        .btn-next-modal { width: 100%; background: var(--primary); color: white; margin-top: 20px; padding: 15px; font-size: 18px; }
        .btn-next-modal:hover { background: var(--primary-hover); }

        /* END SCREEN */
        .end-screen { display: none; text-align: center; padding-top: 20px;}
        .transcript-box { text-align: left; background: #f8fafc; padding: 25px; border-radius: 15px; height: 350px; overflow-y: auto; margin: 25px 0; border: 1px solid #e2e8f0; line-height: 1.8; font-size: 16px;}

        @media (max-width: 850px) {
            .layout-container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .main-content { flex: none; width: 100%; order: 1; min-height: 500px;}
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="header-brand">
        <div class="brand-badge">SnapEnglish</div>
        <div class="brand-title">Part 2 Test 1 (2019)</div>
    </div>

    <div class="layout-container" id="app">
        <div class="sidebar">
            <div class="progress-section">
                <h2 style="color: var(--text-dark); margin-bottom: 25px; font-size: 22px;">Tiến độ bài học</h2>
                <div class="progress-circle" id="progress-ring"><div class="progress-text"><span id="progress-percent">0</span>%</div></div>
                <p style="color: var(--text-light); font-weight: 600; margin-top: 15px;">Câu: <span id="current-sentence-num">1</span> / <span id="total-sentences"></span></p>
                <p style="font-size: 14px; color: #888; margin-top: 5px;">Số lần luyện tập: <span id="study-count">0</span></p>
            </div>
            <div class="instructions">
                <h3>⌨️ Hướng dẫn phím tắt</h3>
                <ul>
                    <li><kbd>Ctrl</kbd> Lặp lại Audio.</li>
                    <li><kbd>Tab</kbd> Gợi ý từ tiếp theo.</li>
                    <li><kbd>Enter</kbd> Kiểm tra đáp án.</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div id="learning-screen" style="display: flex; flex-direction: column; height: 100%;">
                <div class="settings-bar">
                    <div class="setting-group">
                        <label>Tốc độ:</label>
                        <select id="speed-setting">
                            <option value="0.7">0.7x</option>
                            <option value="0.9" selected>0.9x</option>
                            <option value="1.0">1.0x</option>
                            <option value="1.2">1.2x</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Lặp tự động:</label>
                        <select id="repeat-setting">
                            <option value="1" selected>1 lần</option>
                            <option value="2">2 lần</option>
                            <option value="3">3 lần</option>
                        </select>
                    </div>
                </div>

                <div class="audio-section">
                    <div id="sentence-label" class="speaker-badge badge-question">Question</div>
                    <button class="btn-play" onclick="playAudio()">🔊 Nghe Audio (Ctrl)</button>
                </div>
                
                <div class="message" id="system-message"></div>

                <div class="input-section">
                    <textarea id="user-input" placeholder="Lắng nghe hội thoại và gõ vào đây..." autofocus></textarea>
                    
                    <div class="actions">
                        <button class="btn btn-nav" onclick="prevSentenceManual()">⬅️ Back</button>
                        <button class="btn btn-enter" onclick="handleEnterAction()">Kiểm tra (Enter)</button>
                        <button class="btn btn-hint" onclick="giveHint()">💡 Gợi ý (Tab)</button>
                        <button class="btn btn-nav" onclick="nextSentenceManual()">Next ➡️</button>
                    </div>
                </div>
            </div>

            <div id="end-screen" class="end-screen">
                <h2 style="color: var(--primary); font-size: 28px;">Tuyệt vời! Hoàn thành Test 🏆</h2>
                <div class="transcript-box" id="full-transcript"></div>
                <div class="actions">
                    <button class="btn btn-enter" onclick="restartLesson()">🔄 Luyện tập lại</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
        <h3>🎉 Chính xác!</h3>
        <div class="modal-script" id="trans-en"></div>
        <p><strong>🇻🇳 Nghĩa:</strong> <span id="trans-vi"></span></p>
        <p id="grammar-container"><strong>📖 Ngữ pháp:</strong> <span id="trans-grammar"></span></p>
        <ul class="vocab-list" id="trans-vocab"></ul>
        <button class="btn btn-next-modal" onclick="nextSentence()">Qua câu tiếp theo (Enter) ➔</button>
    </div>
</div>

<script>
    // Dữ liệu trích xuất & làm giàu từ file Part 2 test 1 2019.docx
    const lessonData = [
        // Question 7
        { en: "When did you buy your new phone?", vi: "Bạn đã mua chiếc điện thoại mới của mình khi nào?", grammar: "Câu hỏi 'When' hỏi về thời điểm trong quá khứ (dùng trợ động từ did).", vocab: ["buy (mua) - Đồng nghĩa: purchase"], label: "Question 7", type: "question" },
        { en: "The store is close to my house.", vi: "Cửa hàng gần nhà tôi.", grammar: "Đáp án sai. Trả lời cho câu hỏi Where.", vocab: ["close to (gần với) - Đồng nghĩa: near"], label: "(A)", type: "option" },
        { en: "Last week when it was on sale.", vi: "Tuần trước khi nó được giảm giá.", grammar: "Đáp án đúng. Đưa ra thời điểm cụ thể trong quá khứ (Last week).", vocab: ["on sale (đang giảm giá) - Đồng nghĩa: discounted, at a discount"], label: "(B) - Đáp án đúng", type: "correct" },
        { en: "I think it's the same number.", vi: "Tôi nghĩ nó là số y hệt.", grammar: "Đáp án sai do bẫy từ vựng liên tưởng (number liên tưởng tới phone).", vocab: [], label: "(C)", type: "option" },

        // Question 8
        { en: "Do you know where Keiko's office is?", vi: "Bạn có biết văn phòng của Keiko ở đâu không?", grammar: "Câu hỏi gián tiếp: Do you know + wh-word + S + V.", vocab: ["office (văn phòng) - Đồng nghĩa: workplace"], label: "Question 8", type: "question" },
        { en: "That's the official logo.", vi: "Đó là logo chính thức.", grammar: "Đáp án sai.", vocab: ["official (chính thức) - Đồng nghĩa: authorized"], label: "(A)", type: "option" },
        { en: "To reserve a room.", vi: "Để đặt một phòng.", grammar: "Đáp án sai. Trả lời cho câu hỏi Why.", vocab: ["reserve (đặt trước) - Đồng nghĩa: book"], label: "(B)", type: "option" },
        { en: "It's on the second floor.", vi: "Nó ở tầng 2.", grammar: "Đáp án đúng. Đưa ra vị trí cụ thể.", vocab: ["second floor (tầng hai)"], label: "(C) - Đáp án đúng", type: "correct" },

        // Question 9
        { en: "That was a short movie, wasn't it?", vi: "Đó là một bộ phim ngắn, phải không?", grammar: "Câu hỏi đuôi (Tag question) dùng để xác nhận lại thông tin.", vocab: ["short movie (phim ngắn) - Trái nghĩa: feature-length film"], label: "Question 9", type: "question" },
        { en: "The theater on Glenn Road.", vi: "Rạp phim trên đường Glenn.", grammar: "Đáp án sai.", vocab: ["theater (rạp hát, rạp chiếu phim) - Đồng nghĩa: cinema"], label: "(A)", type: "option" },
        { en: "You're right, it was only an hour!", vi: "Bạn đúng đấy – nó chỉ kéo dài 1 tiếng đồng hồ!", grammar: "Đáp án đúng. Thể hiện sự đồng tình với nhận định trong câu hỏi.", vocab: [], label: "(B) - Đáp án đúng", type: "correct" },
        { en: "I must have misplaced it.", vi: "Chắc hẳn tôi đã để nó sai chỗ.", grammar: "Đáp án sai. 'Must have + V3/ed' (Chắc hẳn đã làm gì trong quá khứ).", vocab: ["misplace (để nhầm chỗ, lạc mất) - Đồng nghĩa: lose"], label: "(C)", type: "option" },

        // Question 10
        { en: "Where can I find a building directory?", vi: "Tôi có thể tìm sơ đồ hướng dẫn tòa nhà ở đâu?", grammar: "Câu hỏi 'Where' tìm kiếm địa điểm/vị trí.", vocab: ["building directory (sơ đồ/bảng chỉ dẫn tòa nhà) - Đồng nghĩa: building guide"], label: "Question 10", type: "question" },
        { en: "In two weeks.", vi: "Trong 2 tuần nữa.", grammar: "Đáp án sai. Trả lời cho câu hỏi When.", vocab: [], label: "(A)", type: "option" },
        { en: "No, thank you.", vi: "Không, cảm ơn.", grammar: "Đáp án sai. Đây là câu trả lời cho câu hỏi Yes/No hoặc lời mời.", vocab: [], label: "(B)", type: "option" },
        { en: "Near the front entrance.", vi: "Gần lối vào phía trước.", grammar: "Đáp án đúng. Chỉ ra một địa điểm cụ thể.", vocab: ["entrance (lối vào) - Trái nghĩa: exit"], label: "(C) - Đáp án đúng", type: "correct" },

        // Question 11
        { en: "Who's going to lead the merger negotiations?", vi: "Ai sẽ là người dẫn dắt các cuộc đàm phán sáp nhập?", grammar: "Thì tương lai gần (be going to + V) hỏi về dự định/kế hoạch.", vocab: ["lead (dẫn dắt, lãnh đạo) - Đồng nghĩa: head, direct", "merger (sự sáp nhập)", "negotiation (sự đàm phán, thương lượng) - Đồng nghĩa: discussion, talk"], label: "Question 11", type: "question" },
        { en: "John Sanchez is.", vi: "John Sanchez sẽ làm.", grammar: "Đáp án đúng. Đưa ra tên một người cụ thể thay cho đại từ Who.", vocab: [], label: "(A) - Đáp án đúng", type: "correct" },
        { en: "Thanks, I appreciate it.", vi: "Cảm ơn, tôi rất trân trọng.", grammar: "Đáp án sai.", vocab: ["appreciate (trân trọng, đánh giá cao)"], label: "(B)", type: "option" },
        { en: "No, that's not mine.", vi: "Không, đó không phải của tôi.", grammar: "Đáp án sai. Không dùng Yes/No cho câu hỏi Wh-.", vocab: [], label: "(C)", type: "option" },

        // Question 12
        { en: "How do I contact the financial consultant?", vi: "Làm sao tôi có thể liên lạc với người cố vấn tài chính?", grammar: "Câu hỏi 'How' tìm kiếm phương thức hoặc cách thức thực hiện.", vocab: ["contact (liên lạc) - Đồng nghĩa: get in touch with", "financial consultant (cố vấn tài chính) - Đồng nghĩa: financial advisor"], label: "Question 12", type: "question" },
        { en: "A free consultation.", vi: "Một buổi tư vấn miễn phí.", grammar: "Đáp án sai. Bẫy từ phái sinh (consultation - consultant).", vocab: ["consultation (sự cố vấn, buổi tư vấn)"], label: "(A)", type: "option" },
        { en: "He left his business card.", vi: "Anh ấy đã để lại danh thiếp của mình.", grammar: "Đáp án đúng. Chỉ ra cách liên lạc gián tiếp thông qua danh thiếp.", vocab: ["business card (danh thiếp)"], label: "(B) - Đáp án đúng", type: "correct" },
        { en: "In a few more days.", vi: "Trong một vài ngày nữa.", grammar: "Đáp án sai. Trả lời cho câu hỏi When.", vocab: [], label: "(C)", type: "option" },

        // Question 13
        { en: "When is the health inspector coming?", vi: "Khi nào thì thanh tra y tế đến?", grammar: "Thì hiện tại tiếp diễn mang nghĩa tương lai (kế hoạch đã định).", vocab: ["inspector (thanh tra viên) - Đồng nghĩa: examiner"], label: "Question 13", type: "question" },
        { en: "Anytime this week.", vi: "Bất cứ lúc nào trong tuần này.", grammar: "Đáp án đúng. Đưa ra khoảng thời gian dự kiến.", vocab: ["anytime (bất cứ lúc nào)"], label: "(A) - Đáp án đúng", type: "correct" },
        { en: "It's good for your health.", vi: "Nó tốt cho sức khỏe của bạn.", grammar: "Đáp án sai. Bẫy lặp từ (health).", vocab: [], label: "(B)", type: "option" },
        { en: "At the back door.", vi: "Ở cửa sau.", grammar: "Đáp án sai. Trả lời cho câu hỏi Where.", vocab: [], label: "(C)", type: "option" },

        // Question 14

    window.currentIndex = 0;
    let currentPlayCount = 0;
    let playTimeout;
    const synth = window.speechSynthesis;
    let mainVoice = null;

    const msgBox = document.getElementById("system-message");
    const inputField = document.getElementById("user-input");
    const modalOverlay = document.getElementById("feedback-modal");
    const labelDisplay = document.getElementById("sentence-label");

    function loadVoices() {
        let voices = synth.getVoices();
        if(voices.length === 0) return;
        mainVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Male') || v.name.includes('Google US English'))) || voices.find(v => v.lang.startsWith('en'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.onload = () => {
        loadVoices();
        let count = localStorage.getItem('part2_test1_2019_count') || 0;
        document.getElementById('study-count').innerText = count;
        document.getElementById('total-sentences').innerText = lessonData.length;
        
        let savedIndex = parseInt(localStorage.getItem('part2_test1_2019_progress'));
        if (!isNaN(savedIndex) && savedIndex < lessonData.length) {
            window.currentIndex = savedIndex;
        }

        updateUI();
    };

    function updateUI() {
        updateProgress();
        document.getElementById('current-sentence-num').innerText = window.currentIndex + 1;
        
        const data = lessonData[window.currentIndex];
        
        labelDisplay.innerText = data.label;
        if (data.type === "question") {
            labelDisplay.className = "speaker-badge badge-question";
        } else if (data.type === "correct") {
            labelDisplay.className = "speaker-badge badge-correct";
        } else {
            labelDisplay.className = "speaker-badge badge-option";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            e.preventDefault();
            playAudio();
        } else if (e.key === 'Tab') {
            e.preventDefault();
            giveHint();
        } else if (e.key === 'Enter' && modalOverlay.style.display !== "flex") {
            e.preventDefault();
            handleEnterAction();
        }
    });

    function handleEnterAction() {
        if (modalOverlay.style.display === "flex") {
            nextSentence();
        } else {
            checkAnswer();
        }
    }

    function playAudio() {
        currentPlayCount = 0;
        clearTimeout(playTimeout);
        triggerAudioLoop();
    }

    function triggerAudioLoop() {
        if (synth.speaking) synth.cancel();
        
        const data = lessonData[window.currentIndex];
        const utterThis = new SpeechSynthesisUtterance(data.en);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value);
        
        if (mainVoice) utterThis.voice = mainVoice;
        
        utterThis.onend = () => {
            currentPlayCount++;
            const maxRepeat = parseInt(document.getElementById('repeat-setting').value);
            if (currentPlayCount < maxRepeat) {
                playTimeout = setTimeout(triggerAudioLoop, 500);
            }
        };
        
        synth.speak(utterThis);
        if (modalOverlay.style.display !== "flex") inputField.focus();
    }

    function normalizeText(text) { 
        let standardText = text.replace(/[’‘`´]/g, "'"); 
        return standardText.toLowerCase().replace(/[.,?!–\-:"]/g, '').trim(); 
    }

    function expandContractions(text) {
        let lower = text.toLowerCase().replace(/[’‘`´]/g, "'");
        const dict = {
            "they're": "they are", "we're": "we are", "you're": "you are",
            "he's": "he is", "she's": "she is", "it's": "it is", "that's": "that is", "there's": "there is", "who's": "who is", "what's": "what is",
            "i'm": "i am",
            "they'd": "they would", "we'd": "we would", "you'd": "you would", "he'd": "he would", "she'd": "she would", "i'd": "i would",
            "they've": "they have", "we've": "we have", "you've": "you have", "i've": "i have",
            "they'll": "they will", "we'll": "we will", "you'll": "you will", "he'll": "he will", "she'll": "she will", "it'll": "it will", "i'll": "i will",
            "don't": "do not", "doesn't": "does not", "didn't": "did not",
            "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
            "haven't": "have not", "hasn't": "has not", "hadn't": "had not",
            "can't": "can not", "cannot": "can not", "won't": "will not", "wouldn't": "would not",
            "shouldn't": "should not", "couldn't": "could not", "mustn't": "must not"
        };
        lower = lower.replace(/[.,?!–\-:"]/g, '');
        return lower.split(/\s+/).map(w => dict[w] || w).join(' ').trim();
    }

    function normalizeSpelling(text) {
        return text
            .replace(/ise\b/g, 'ize')
            .replace(/ised\b/g, 'ized')
            .replace(/ising\b/g, 'izing')
            .replace(/ises\b/g, 'izes')
            .replace(/isation/g, 'ization')
            .replace(/our\b/g, 'or')
            .replace(/ours\b/g, 'ors')
            .replace(/tre\b/g, 'ter')
            .replace(/tres\b/g, 'ters')
            .replace(/lling\b/g, 'ling')
            .replace(/lled\b/g, 'led');
    }

    function checkAnswer() {
        const rawUserInput = inputField.value;
        const rawTargetText = lessonData[window.currentIndex].en;
        
        const userInputExpanded = normalizeSpelling(expandContractions(rawUserInput).replace(/'/g, ''));
        const targetTextExpanded = normalizeSpelling(expandContractions(rawTargetText).replace(/'/g, ''));
        
        if (userInputExpanded === targetTextExpanded) {
            msgBox.innerText = "";
            showModal();
            return;
        }

        if (targetTextExpanded.startsWith(userInputExpanded) && userInputExpanded.length > 0) {
            msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
            return; 
        }

        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(rawTargetText);
        
        const userWordsNorm = userInput.split(' ').filter(w => w !== "");
        const targetWordsNorm = targetText.split(' ');
        
        const rawWords = rawUserInput.trim().split(/\s+/);

        if (userWordsNorm.length === 0) {
            msgBox.innerText = "Bạn chưa gõ gì cả. Nhấn Ctrl để nghe nhé!";
            return;
        }

        let wrongIndex = -1;
        for (let i = 0; i < userWordsNorm.length; i++) {
            if (userWordsNorm[i] !== targetWordsNorm[i]) {
                wrongIndex = i;
                break;
            }
        }

        if (wrongIndex !== -1) {
            let startPos = 0;
            for (let k = 0; k < wrongIndex; k++) {
                startPos += rawWords[k].length + 1; 
            }
            
            const leadingSpaces = inputField.value.length - inputField.value.trimStart().length;
            startPos += leadingSpaces;
            let endPos = startPos + rawWords[wrongIndex].length;

            inputField.focus();
            inputField.setSelectionRange(startPos, endPos);

            let displayHTML = rawWords.map((w, idx) => {
                if (idx === wrongIndex) {
                    return `<span class="glow-error">${w}</span>`;
                }
                return w;
            }).join(' ');

            msgBox.innerHTML = `Vị trí sai:<br><div style="margin-top:12px; font-size:19px; color:var(--text-dark); font-weight: 500;">${displayHTML}</div>`;
            
        } else if (userWordsNorm.length < targetWordsNorm.length) {
            msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
            inputField.focus();
            inputField.setSelectionRange(inputField.value.length, inputField.value.length);
        } else {
            msgBox.innerText = "Có lỗi sai chính tả nhỏ, hãy kiểm tra lại.";
        }
    }

    function giveHint() {
        if (modalOverlay.style.display === "flex") return;

        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[window.currentIndex].en);
        
        const targetWordsRaw = lessonData[window.currentIndex].en.split(' ');
        const targetWordsNorm = targetText.split(' ');
        const userWords = userInput.split(' ').filter(w => w !== "");

        let hintWord = targetWordsRaw[userWords.length];
        for (let i = 0; i < userWords.length; i++) {
            if (userWords[i] !== targetWordsNorm[i]) {
                hintWord = targetWordsRaw[i];
                inputField.value = targetWordsRaw.slice(0, i).join(' ') + (i > 0 ? " " : "");
                break;
            }
        }

        if (hintWord) {
            inputField.value += (inputField.value.length > 0 && !inputField.value.endsWith(' ') ? ' ' : '') + hintWord + ' ';
            msgBox.innerText = "Đã điền từ tiếp theo!";
        }
    }

    function showModal() {
        inputField.blur();
        const data = lessonData[window.currentIndex];
        
        document.getElementById("trans-en").innerText = data.en;
        document.getElementById("trans-vi").innerText = data.vi;
        
        const grammarContainer = document.getElementById("grammar-container");
        if(data.grammar) {
            grammarContainer.style.display = "block";
            document.getElementById("trans-grammar").innerText = data.grammar;
        } else {
            grammarContainer.style.display = "none";
        }
        
        const vocabList = document.getElementById("trans-vocab");
        vocabList.innerHTML = "";
        if(data.vocab && data.vocab.length > 0) {
            data.vocab.forEach(v => {
                let li = document.createElement("li");
                let parts = v.split(" (");
                li.innerHTML = `<strong>${parts[0]}</strong> <span style="color:var(--text-light); font-size:15px;">(${parts[1]}</span>`;
                vocabList.appendChild(li);
            });
        }
        
        modalOverlay.style.display = "flex";
        document.querySelector('.btn-next-modal').focus();
    }

    function prevSentenceManual() {
        if (window.currentIndex > 0) {
            window.currentIndex--;
            resetForNewSentence();
        }
    }

    function nextSentenceManual() {
        if (window.currentIndex < lessonData.length - 1) {
            window.currentIndex++;
            resetForNewSentence();
        } else {
            finishLesson();
        }
    }
    
    function resetForNewSentence() {
        modalOverlay.style.display = "none";
        inputField.value = "";
        msgBox.innerHTML = "";
        
        localStorage.setItem('part2_test1_2019_progress', window.currentIndex); 
        if(window.saveProgressToCloud) window.saveProgressToCloud(window.currentIndex); 
        
        updateUI();
        playAudio();
    }

    function nextSentence() {
        modalOverlay.style.display = "none";
        window.currentIndex++;
        inputField.value = "";
        msgBox.innerHTML = "";
        
        if (window.currentIndex < lessonData.length) {
            localStorage.setItem('part2_test1_2019_progress', window.currentIndex);
            if(window.saveProgressToCloud) window.saveProgressToCloud(window.currentIndex);

            updateUI();
            playAudio();
        } else {
            finishLesson();
        }
    }

    function updateProgress() {
        const percent = Math.round((window.currentIndex / lessonData.length) * 100);
        document.getElementById("progress-percent").innerText = percent;
        document.getElementById("progress-ring").style.background = `conic-gradient(var(--primary) ${percent}%, #eee 0)`;
    }

    window.playEndScreenAudio = function(text) {
        if (synth.speaking) synth.cancel();
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value) || 1.0; 
        if (window.mainVoice) utterThis.voice = window.mainVoice; 
        synth.speak(utterThis);
    };

    function finishLesson() {
        document.getElementById("learning-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        
        let count = parseInt(localStorage.getItem('part2_test1_2019_count')) || 0;
        count++;
        localStorage.setItem('part2_test1_2019_count', count);
        document.getElementById('study-count').innerText = count;

        localStorage.removeItem('part2_test1_2019_progress');
        if(window.saveProgressToCloud) window.saveProgressToCloud(0);

        const transcriptBox = document.getElementById("full-transcript");
        let htmlContent = "";

        lessonData.forEach(d => {
            const isQuestion = d.type === 'question';
            const color = isQuestion ? 'var(--badge-q-text)' : (d.type === 'correct' ? 'var(--badge-corr-text)' : 'var(--badge-opt-text)');
            const padding = isQuestion ? '0' : '25px';
            
            const playBtnHtml = `<button onclick="playEndScreenAudio(\`${d.en.replace(/`/g, "'")}\`)" style="background:none; border:none; cursor:pointer; font-size:18px; margin-left: 5px; transition: 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" title="Nghe lại câu này">🔊</button>`;

            htmlContent += `<p style="margin-bottom:10px; padding-left: ${padding};">
                <strong style="color:${color}">${d.label}:</strong> <span style="font-weight: 500;">${d.en}</span> ${playBtnHtml}<br>
                <span style="color:var(--text-light); font-size: 14px;">${d.vi}</span>
            </p>`;
            
            if (d.type === 'option' || d.type === 'correct') {
                if (d.label.includes('(C)')) {
                    htmlContent += `<hr style="border:1px dashed #eee; margin: 15px 0;">`;
                }
            }
        });
        transcriptBox.innerHTML = htmlContent;
    }

    function restartLesson() {
        localStorage.setItem('part2_test1_2019_progress', 0);
        location.reload();
    }
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBlTU4B563sSsTVbLai_je29l6eC8T-cm0",
        authDomain: "snapenglish-cb6e2.firebaseapp.com",
        projectId: "snapenglish-cb6e2",
        storageBucket: "snapenglish-cb6e2.firebasestorage.app",
        messagingSenderId: "373152038413",
        appId: "1:373152038413:web:19284622571390f8585f44"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.saveProgressToCloud = async (progressIndex) => {
        if (window.currentUserUid) {
            try {
                await setDoc(doc(db, "userProgress", window.currentUserUid), {
                    part2_test1_2019_progress: progressIndex
                }, { merge: true });
            } catch (e) {
                console.error("Lỗi khi lưu tiến độ:", e);
            }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            window.currentUserUid = user.uid;
            window.currentUserEmail = user.email;
            
            try {
                const docRef = doc(db, "userProgress", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    let cloudProgress = docSnap.data().part2_test1_2019_progress;
                    if (cloudProgress !== undefined) {
                        window.currentIndex = cloudProgress; 
                        window.updateUI();
                    }
                }
            } catch (error) {
                console.error("Lỗi khi tải tiến độ:", error);
            }
           
        } else {
            window.currentUserUid = null;
            window.currentUserEmail = null;
        }
    });
</script>
