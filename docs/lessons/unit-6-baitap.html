<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 6 - Thì Hiện Tại Tiếp Diễn</title>
     <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f9ff;
            --text-main: #0f172a;
            --white: #ffffff;
            --primary: #38bdf8;
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* THANH CỐ ĐỊNH - THIẾT KẾ NHỎ GỌN */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            padding: 10px 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            border: 3px solid #fff;
            border-top: none;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #fff;
            font-size: 1.6em;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #fff;
            font-size: 0.95em;
            font-weight: 700;
            margin-top: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 5px 25px;
            border-radius: 20px;
            font-size: 1.25em;
            font-weight: 800;
            color: #4338ca;
            margin-top: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px dashed #818cf8;
            transition: transform 0.3s ease;
        }

        .score-board:hover {
            transform: scale(1.05);
        }

        .container {
            max-width: 900px;
            margin: 30px auto 0;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.1);
            border-top: 8px solid;
            transition: transform 0.3s ease;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #f8fafc;
            border: 2px dashed;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05em;
        }

        .question-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e0f2fe;
            transition: all 0.3s ease;
        }

        .question-block:hover {
            border-color: #bae6fd;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.1);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #1e293b;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: #475569;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #38bdf8;
            background: #f0f9ff;
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            animation: bounce 0.4s ease;
        }

        .option-btn.incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            opacity: 0.9;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.4s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fef2f2;
            color: #991b1b;
            border-left: 5px solid #ef4444;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-to-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #38bdf8;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            background: #0284c7;
        }

        /* Color Themes for 4 Exercises */
        .color-1 { border-top-color: #38bdf8; }
        .color-1 .ex-title { color: #0284c7; }
        .color-1 .tip-box { border-color: #bae6fd; color: #0284c7; background: #f0f9ff;}

        .color-2 { border-top-color: #818cf8; }
        .color-2 .ex-title { color: #4f46e5; }
        .color-2 .tip-box { border-color: #c7d2fe; color: #4338ca; background: #eef2ff;}

        .color-3 { border-top-color: #34d399; }
        .color-3 .ex-title { color: #059669; }
        .color-3 .tip-box { border-color: #a7f3d0; color: #059669; background: #ecfdf5;}

        .color-4 { border-top-color: #fbbf24; }
        .color-4 .ex-title { color: #d97706; }
        .color-4 .tip-box { border-color: #fde68a; color: #b45309; background: #fffbeb;}

    </style>
</head>
<body>

    <div class="sticky-header">
        <h1>🌊 Trạm Luyện Tập Grammar 🌊</h1>
        <div class="subtitle">Unit 6: Thì Hiện Tại Tiếp Diễn (Present Continuous)</div>
        <div class="score-board">Điểm: <span id="score">0</span> / 45 🌟</div>
    </div>

    <div class="container" id="app">
        </div>

    <a href="unit-6-grammar.html" target="_blank" class="back-to-top" title="Lên đầu trang">⬆️</a>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Chia dạng đúng của động từ",
                tip: "Dấu hiệu nhận biết: now, at present, at the moment, Look!, Listen!, Be quiet! hoặc các lịch trình tương lai gần. Nhớ sử dụng cấu trúc: am/ is/ are + V-ing nhé!",
                colorClass: "color-1",
                icon: "🐬",
                questions: [
                    { q: "1. Mr Hung (teach) me English now.", options: ["is teaching", "teaches", "are teaching"], a: "is teaching", exp: "Có 'now' (bây giờ). 'Mr Hung' là ngôi thứ 3 số ít nên dùng 'is teaching'." },
                    { q: "2. The governments around the world (respond) to the global outbreak of COVID-19 at present.", options: ["is responding", "are responding", "respond"], a: "are responding", exp: "Có 'at present'. 'The governments' là danh từ số nhiều -> 'are responding'." },
                    { q: "3. The baker now (work) out more recipes using Vietnamese farm produce.", options: ["works", "are working", "is working"], a: "is working", exp: "Có 'now'. 'The baker' (thợ làm bánh) là số ít -> 'is working'." },
                    { q: "4. Look! The baby (cry) loudly in the garden.", options: ["cries", "is crying", "are crying"], a: "is crying", exp: "Dấu hiệu 'Look!' -> Hành động đang xảy ra. The baby số ít -> 'is crying'." },
                    { q: "5. Why you always (make) noise in the class?", options: ["do you always make", "you are always making", "are you always making"], a: "are you always making", exp: "Phàn nàn về hành động lặp đi lặp lại gây khó chịu (always) -> dùng HT Tiếp Diễn. Câu hỏi nên đảo 'are' lên trước chủ ngữ." },
                    { q: "6. They (have) dinner with their friends at the moment?", options: ["Do they have", "Are they having", "Are they have"], a: "Are they having", exp: "Có 'at the moment'. Câu hỏi ngôi 'They' dùng 'Are they having'." },
                    { q: "7. Helen (write) a letter at present? No, she isn't.", options: ["Does Helen write", "Are Helen writing", "Is Helen writing"], a: "Is Helen writing", exp: "Có 'at present'. Helen là số ít -> 'Is Helen writing'." },
                    { q: "8. The chief engineer (not instruct) all the workers of plants now.", options: ["doesn't instruct", "is not instructing", "are not instructing"], a: "is not instructing", exp: "Có 'now'. Kỹ sư trưởng (The chief engineer) là số ít -> 'is not instructing'." },
                    { q: "9. She (fly) to Paris tomorrow as planned?", options: ["Is she flying", "Does she fly", "Are she flying"], a: "Is she flying", exp: "Diễn tả một kế hoạch/lịch trình cá nhân đã lên sẵn trong tương lai gần -> Dùng Hiện tại tiếp diễn mang nghĩa tương lai." },
                    { q: "10. What you (do) now? I (do) homework.", options: ["do you do - do", "are you doing - do", "are you doing - am doing"], a: "are you doing - am doing", exp: "Có 'now'. Cả câu hỏi và câu trả lời đều phải chia ở HT Tiếp Diễn." },
                    { q: "11. She (read) novels at the moment?", options: ["Is she reading", "Does she read", "Are she reading"], a: "Is she reading", exp: "Có 'at the moment' -> Câu hỏi với chủ ngữ 'she' dùng 'Is she reading'." },
                    { q: "12. Be quiet! The newborn (sleep).", options: ["sleeps", "is sleeping", "are sleeping"], a: "is sleeping", exp: "Dấu hiệu 'Be quiet!' (Trật tự nào!) -> Hành động đang diễn ra -> 'is sleeping'." },
                    { q: "13. Right now, while her husband (read) a newspaper, she (water) flowers in the garden.", options: ["reads - waters", "is reading - is watering", "is reading - waters"], a: "is reading - is watering", exp: "Có 'Right now' và 'while' diễn tả 2 hành động đang song song diễn ra cùng lúc." },
                    { q: "14. Where she (be) now? She (hang) clothes on the terrace.", options: ["is she - is hanging", "is she - hangs", "does she be - is hanging"], a: "is she - is hanging", exp: "Động từ 'to be' chia ở HTĐ là 'is she', vế sau diễn tả hành động đang xảy ra dùng HTTĐ 'is hanging'." },
                    { q: "15. My mother often (get) up early in the morning, but today she (not get) up until 9 am. She may be ill.", options: ["gets - isn't getting", "is getting - doesn't get", "gets - doesn't get"], a: "gets - isn't getting", exp: "Vế đầu là thói quen (often) -> HTĐ (gets). Vế sau là sự việc bất thường/thay đổi thói quen xảy ra hôm nay (today) -> HT Tiếp Diễn (isn't getting)." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice (Mới Bổ Sung)",
                tip: "Đọc kĩ ngữ cảnh của câu. Nếu có kế hoạch cố định trong tương lai gần, hoặc một sự thay đổi thói quen tạm thời, hãy chọn thì Hiện tại tiếp diễn!",
                colorClass: "color-2",
                icon: "🐳",
                questions: [
                    { q: "1. Listen! The teacher _______ the lesson.", options: ["A. is explaining", "B. explains", "C. explain"], a: "A. is explaining", exp: "Dấu hiệu 'Listen!' (Nghe này!) -> Hành động đang xảy ra trước mắt người nói." },
                    { q: "2. We _______ a party next Sunday. Would you like to come?", options: ["A. have", "B. are having", "C. has"], a: "B. are having", exp: "Kế hoạch đã định sẵn trong tương lai gần (next Sunday) -> Dùng HT Tiếp diễn." },
                    { q: "3. Look! The bus _______.", options: ["A. comes", "B. coming", "C. is coming"], a: "C. is coming", exp: "Dấu hiệu 'Look!' -> Chiếc xe buýt đang tới." },
                    { q: "4. I _______ with my friend until I find an apartment.", options: ["A. live", "B. am living", "C. lives"], a: "B. am living", exp: "Diễn tả một hành động mang tính chất tạm thời (chỉ sống ở đây cho đến khi tìm được nhà)." },
                    { q: "5. She _______ to the radio at the moment.", options: ["A. listens", "B. is listening", "C. listening"], a: "B. is listening", exp: "Dấu hiệu 'at the moment' (ngay lúc này)." },
                    { q: "6. He _______ his keys! It's so annoying.", options: ["A. always loses", "B. is always losing", "C. always lose"], a: "B. is always losing", exp: "Sử dụng 'always' trong thì HT Tiếp Diễn để phàn nàn về một thói quen xấu lặp đi lặp lại." },
                    { q: "7. What _______ at the moment?", options: ["A. are you doing", "B. do you do", "C. you are doing"], a: "A. are you doing", exp: "Cấu trúc câu hỏi HT Tiếp Diễn: Wh-word + to be + S + V-ing?" },
                    { q: "8. They _______ a new shopping mall in the city center.", options: ["A. are building", "B. build", "C. builds"], a: "A. are building", exp: "Hành động đang diễn ra trong khoảng thời gian hiện tại (không nhất thiết phải diễn ra ngay đúng khoảnh khắc nói)." },
                    { q: "9. _______ the homework right now?", options: ["A. Does she do", "B. She is doing", "C. Is she doing"], a: "C. Is she doing", exp: "Câu hỏi nghi vấn ở thì HT Tiếp diễn có đảo 'to be' lên trước chủ ngữ." },
                    { q: "10. Why _______? Is there a problem?", options: ["A. are you crying", "B. do you cry", "C. you cry"], a: "A. are you crying", exp: "Đang thấy người đối diện khóc nên hỏi lý do tại sao lúc này bạn lại đang khóc." }
                ]
            },
            {
                title: "Exercise 3: Chọn câu dịch đúng nhất (Mới Bổ Sung)",
                tip: "Xác định xem ngữ cảnh trong tiếng Việt đang diễn tả thói quen (HT Đơn) hay hành động đang xảy ra / phàn nàn / kế hoạch (HT Tiếp diễn).",
                colorClass: "color-3",
                icon: "🐢",
                questions: [
                    { q: "1. Hiện tại họ đang chơi đá bóng.", options: ["A. They are playing football now.", "B. They play football now."], a: "A. They are playing football now.", exp: "Có từ 'đang', 'hiện tại' -> HT Tiếp diễn." },
                    { q: "2. Cô ấy luôn luôn phàn nàn về công việc (thể hiện sự bực bội).", options: ["A. She is always complaining about her work.", "B. She always complains about her work."], a: "A. She is always complaining about her work.", exp: "Cấu trúc 'is always V-ing' dùng để phàn nàn." },
                    { q: "3. Tối nay chúng tôi sẽ đi xem phim (đã lên kế hoạch).", options: ["A. We go to the cinema tonight.", "B. We are going to the cinema tonight."], a: "B. We are going to the cinema tonight.", exp: "Kế hoạch đã chốt cho tương lai gần -> dùng HT Tiếp diễn." },
                    { q: "4. Hãy im lặng! Em bé đang ngủ.", options: ["A. Keep silent! The baby is sleeping.", "B. Keep silent! The baby sleeps."], a: "A. Keep silent! The baby is sleeping.", exp: "Câu cảm thán ra hiệu gây sự chú ý -> HT Tiếp diễn." },
                    { q: "5. Bây giờ tôi đang không đọc sách.", options: ["A. I am not reading books now.", "B. I don't read books now."], a: "A. I am not reading books now.", exp: "Câu phủ định của hành động đang xảy ra -> am not V-ing." },
                    { q: "6. Cậu bé đang làm gì thế?", options: ["A. What does the boy do?", "B. What is the boy doing?"], a: "B. What is the boy doing?", exp: "Hỏi về hành động đang thực hiện -> HT Tiếp diễn." },
                    { q: "7. Mùa hè này họ sẽ đi du lịch ở Pháp (kế hoạch cố định).", options: ["A. They are travelling to France this summer.", "B. They travel to France this summer."], a: "A. They are travelling to France this summer.", exp: "Dùng HT Tiếp diễn cho dự định cá nhân chắc chắn sẽ xảy ra." },
                    { q: "8. Cô ấy đang nói chuyện điện thoại với mẹ.", options: ["A. She is talking on the phone with her mom.", "B. She talks on the phone with her mom."], a: "A. She is talking on the phone with her mom.", exp: "Hành động 'đang' diễn ra." },
                    { q: "9. Nhìn kìa! Trời đang mưa.", options: ["A. Look! It rains.", "B. Look! It is raining."], a: "B. Look! It is raining.", exp: "Dấu hiệu 'Look!' -> It is raining." },
                    { q: "10. Tại sao bạn lại đang cười?", options: ["A. Why are you laughing?", "B. Why do you laugh?"], a: "A. Why are you laughing?", exp: "Hỏi về hành động đang diễn ra ngay lúc nói." }
                ]
            },
            {
                title: "Exercise 4: Hiện Tại Đơn vs Hiện Tại Tiếp Diễn",
                tip: "Những động từ chỉ cảm giác, nhận thức, sở hữu (love, want, know, understand, have...) thường KHÔNG chia ở thì tiếp diễn đâu nhé!",
                colorClass: "color-4",
                icon: "🐠",
                questions: [
                    { q: "1. I usually (go) to school by bus, but today I (walk).", options: ["A. go - am walking", "B. am going - walk"], a: "A. go - am walking", exp: "Vế 1 là thói quen (usually) -> HTĐ. Vế 2 là thay đổi tạm thời (today) -> HTTĐ." },
                    { q: "2. The earth (go) around the sun.", options: ["A. goes", "B. is going"], a: "A. goes", exp: "Chân lý, sự thật hiển nhiên luôn chia ở thì Hiện Tại Đơn." },
                    { q: "3. Keep silent! The teacher (explain) the lesson.", options: ["A. explains", "B. is explaining"], a: "B. is explaining", exp: "Hành động đang xảy ra ngay lúc nói -> is explaining." },
                    { q: "4. We (have) dinner at 7 p.m every day.", options: ["A. have", "B. are having"], a: "A. have", exp: "Thói quen lặp đi lặp lại hằng ngày (every day) -> HTĐ." },
                    { q: "5. Right now, I (read) a book and my sister (listen) to music.", options: ["A. am reading - is listening", "B. read - listen"], a: "A. am reading - is listening", exp: "Hai hành động đang song song diễn ra tại thời điểm nói (Right now)." },
                    { q: "6. He always (come) late! The teacher is really angry.", options: ["A. always comes", "B. is always coming"], a: "B. is always coming", exp: "Phàn nàn về việc đi trễ thường xuyên (kèm bực tức) -> is always coming." },
                    { q: "7. Water (boil) at 100 degrees Celsius.", options: ["A. boils", "B. is boiling"], a: "A. boils", exp: "Sự thật hiển nhiên của tự nhiên -> HTĐ (boils)." },
                    { q: "8. They (not/go) to the cinema very often.", options: ["A. don't go", "B. aren't going"], a: "A. don't go", exp: "Diễn tả tần suất (very often) -> HTĐ." },
                    { q: "9. Are you busy? - Yes, I (work) on my essay.", options: ["A. am working", "B. work"], a: "A. am working", exp: "Đang bận vì ngay lúc này 'đang' làm bài luận." },
                    { q: "10. She (love) watching movies.", options: ["A. loves", "B. is loving"], a: "A. loves", exp: "Các động từ chỉ cảm xúc (love, like, hate) KHÔNG chia ở thì tiếp diễn." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            // Sinh tiêu đề và mẹo
            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Ghi nhớ:</strong> ${ex.tip}</span>
                </div>
            `;

            // Sinh các câu hỏi
            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Sai mất rồi! Đáp án là: ${qObj.a}.</strong> <br> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
