<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 14 - Trật Tự Tính Từ | SnapEnglish</title>
  <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0fdfa;
            --text-main: #134e4a;
            --white: #ffffff;
            --primary: #2dd4bf;
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ccfbf1 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #2dd4bf, #3b82f6);
            padding: 10px 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(45, 212, 191, 0.3);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            border: 3px solid #fff;
            border-top: none;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #fff;
            font-size: 1.6em;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            font-weight: 800;
        }

        .subtitle {
            color: #fff;
            font-size: 0.95em;
            font-weight: 700;
            margin-top: 3px;
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 5px 25px;
            border-radius: 20px;
            font-size: 1.25em;
            font-weight: 800;
            color: #0f766e;
            margin-top: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px dashed #5eead4;
            transition: transform 0.3s ease;
        }

        .score-board:hover {
            transform: scale(1.05);
        }

        .container {
            max-width: 900px;
            margin: 30px auto 0;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(45, 212, 191, 0.15);
            border-top: 8px solid;
            transition: transform 0.3s ease;
        }
.snap-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .snap-footer {
            text-align: center;
            margin-top: 20px;
            padding-bottom: 40px;
            color: #db2777;
            font-weight: 600;
            font-size: 0.95em;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #f0fdfa;
            border: 2px dashed;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05em;
        }

        .question-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e0f2fe;
            transition: all 0.3s ease;
        }

        .question-block:hover {
            border-color: #bae6fd;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.1);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #0369a1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #f0f9ff;
            border: 2px solid #e0f2fe;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: #0284c7;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #38bdf8;
            background: #e0f2fe;
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            animation: bounce 0.4s ease;
        }

        .option-btn.incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            opacity: 0.9;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.4s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fff1f2;
            color: #e11d48;
            border-left: 5px solid #f43f5e;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-to-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #3b82f6;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            background: #2563eb;
        }

        .color-1 { border-top-color: #0ea5e9; }
        .color-1 .ex-title { color: #0284c7; }
        .color-1 .tip-box { border-color: #bae6fd; color: #0369a1; background: #f0f9ff;}

        .color-2 { border-top-color: #10b981; }
        .color-2 .ex-title { color: #047857; }
        .color-2 .tip-box { border-color: #6ee7b7; color: #065f46; background: #ecfdf5;}

        .color-3 { border-top-color: #8b5cf6; }
        .color-3 .ex-title { color: #5b21b6; }
        .color-3 .tip-box { border-color: #c4b5fd; color: #4c1d95; background: #f5f3ff;}

        .color-4 { border-top-color: #f59e0b; }
        .color-4 .ex-title { color: #b45309; }
        .color-4 .tip-box { border-color: #fcd34d; color: #92400e; background: #fffbeb;}
    </style>
</head>
<body>

    <div class="sticky-header">
        <h1>✨ Trạm Luyện Tập Grammar ✨</h1>
        <div class="subtitle">Unit 14: Trật tự của tính từ trước danh từ (Adjective Order)</div>
        <div class="score-board">Điểm: <span id="score">0</span> / 35 🚀</div>
    </div>

    <div class="container" id="app">
<div class="snap-header">
            <div class="snap-logo-text">📸 Snap<span>English</span></div>
            <p class="snap-slogan">✨ Học tiếng Anh "nhanh như chớp" cùng SnapEnglish ✨</p>
        </div>

        <div id="app">
            </div>
    </div>

    <div class="snap-footer">
        <p>Thành thạo Tiếng Anh không khó khi đã có <strong>SnapEnglish</strong>!</p>
        <p>© 2026 SnapEnglish. All rights reserved.</p>
    </div>
    <a href="unit-14-grammar.html" class="btn-back-grammar" title="Về Lý Thuyết">
        <span>💡 Về Lý Thuyết</span>
    </a>
    <script>
        const exercises = [
            {
                title: "Exercise 1: Sắp xếp theo đúng trật tự tính từ [201401]",
                tip: "Nhớ kỹ công thức thần thánh OSASCOMP: Opinion (Ý kiến) - Size (Kích cỡ) - Age (Tuổi tác) - Shape (Hình dáng) - Color (Màu sắc) - Origin (Nguồn gốc) - Material (Chất liệu) - Purpose (Mục đích).",
                colorClass: "color-1",
                icon: "🧩",
                questions: [
                    { q: "Question 1: Peter's father gave him a(n) _______ bike as a birthday present last week. [cite: 384]", options: ["A. expensive blue Japanese", "B. blue expensive Japanese", "C. Japanese expensive blue"], a: "A. expensive blue Japanese", exp: "expensive (Opinion) -> blue (Color) -> Japanese (Origin)." },
                    { q: "Question 2: My sister lives in a _______ house. [cite: 385]", options: ["A. new nice black wooden", "B. nice new black wooden", "C. nice black new wooden"], a: "B. nice new black wooden", exp: "nice (Opinion) -> new (Age) -> black (Color) -> wooden (Material)." },
                    { q: "Question 3: My mother often wears a pair of _______ gloves when she washes the dishes. [cite: 387, 389]", options: ["A. small comfortable black Chinese leather", "B. comfortable black small Chinese leather", "C. comfortable small black Chinese leather"], a: "C. comfortable small black Chinese leather", exp: "comfortable (Opinion) -> small (Size) -> black (Color) -> Chinese (Origin) -> leather (Material)." },
                    { q: "Question 4: I saw her wearing a _______ dress going out with her boyfriend last week. [cite: 390]", options: ["A. nice white Vietnamese cotton", "B. nice cotton white Vietnamese", "C. white nice Vietnamese cotton"], a: "A. nice white Vietnamese cotton", exp: "nice (Opinion) -> white (Color) -> Vietnamese (Origin) -> cotton (Material)." },
                    { q: "Question 5: It is a(n) _______ woman. I'm too lucky to work with her at the office. [cite: 391, 392]", options: ["A. young intelligent English", "B. intelligent young English", "C. intelligent English young"], a: "B. intelligent young English", exp: "intelligent (Opinion) -> young (Age) -> English (Origin)." },
                    { q: "Question 6: He bought a _______ house as a gift for his new wife. [cite: 394, 395]", options: ["A. beautiful big new pink wooden", "B. big beautiful new pink wooden", "C. beautiful new big pink wooden"], a: "A. beautiful big new pink wooden", exp: "beautiful (Opinion) -> big (Size) -> new (Age) -> pink (Color) -> wooden (Material)." },
                    { q: "Question 7: This is a _______ bag for my baby on the next trip to Thailand. [cite: 397]", options: ["A. new small black Chinese sleeping", "B. small black new Chinese sleeping", "C. small new black Chinese sleeping"], a: "C. small new black Chinese sleeping", exp: "small (Size) -> new (Age) -> black (Color) -> Chinese (Origin) -> sleeping (Purpose)." },
                    { q: "Question 8: Yesterday, my husband gave me a(n) _______ painting he bought when he went on a business trip. [cite: 399]", options: ["A. ancient precious French", "B. precious ancient French", "C. precious French ancient"], a: "B. precious ancient French", exp: "precious (Opinion) -> ancient (Age) -> French (Origin)." },
                    { q: "Question 9: At first sight I met her, I was impressed with her _______ eyes. [cite: 401, 402]", options: ["A. big beautiful round black", "B. beautiful round big black", "C. beautiful big round black"], a: "C. beautiful big round black", exp: "beautiful (Opinion) -> big (Size) -> round (Shape) -> black (Color)." },
                    { q: "Question 10: I would like to have _______ sports shoes to run in the park. [cite: 404]", options: ["A. comfortable medium new grey leather", "B. medium comfortable new grey leather", "C. comfortable new medium grey leather"], a: "A. comfortable medium new grey leather", exp: "comfortable (Opinion) -> medium (Size) -> new (Age) -> grey (Color) -> leather (Material)." },
                    { q: "Question 11: He's a more _______ person than any men I have ever met. [cite: 406]", options: ["A. tall intelligent young English", "B. intelligent tall young English", "C. intelligent young tall English"], a: "B. intelligent tall young English", exp: "intelligent (Opinion) -> tall (Size) -> young (Age) -> English (Origin)." },
                    { q: "Question 12: They cook a _______ meal to welcome their guests from England. [cite: 407]", options: ["A. delicious big traditional Vietnamese", "B. big delicious traditional Vietnamese", "C. delicious traditional big Vietnamese"], a: "A. delicious big traditional Vietnamese", exp: "delicious (Opinion) -> big (Size) -> traditional (Age/Characteristic) -> Vietnamese (Origin)." },
                    { q: "Question 13: His brother presented her a(n) _______ clock. [cite: 408]", options: ["A. nice Japanese oval digital", "B. nice oval Japanese digital", "C. oval nice digital Japanese"], a: "B. nice oval Japanese digital", exp: "nice (Opinion) -> oval (Shape) -> Japanese (Origin) -> digital (Type/Purpose)." },
                    { q: "Question 14: My teacher is a _______ man, so a lot of students love him. [cite: 409]", options: ["A. tall kind middle-aged Japanese", "B. kind middle-aged tall Japanese", "C. kind tall middle-aged Japanese"], a: "C. kind tall middle-aged Japanese", exp: "kind (Opinion) -> tall (Size) -> middle-aged (Age) -> Japanese (Origin)." },
                    { q: "Question 15: We usually throw trash into _______ bags. [cite: 410]", options: ["A. convenient small black plastic", "B. small convenient black plastic", "C. convenient black small plastic"], a: "A. convenient small black plastic", exp: "convenient (Opinion) -> small (Size) -> black (Color) -> plastic (Material)." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice (Chọn đáp án trắc nghiệm mở rộng)",
                tip: "Vẫn là nguyên tắc OSASCOMP. Chú ý các cụm từ thường xuất hiện trong các bài đánh giá học thuật hoặc môi trường làm việc.",
                colorClass: "color-2",
                icon: "🎓",
                questions: [
                    { q: "Question 1: The candidate confidently answered all the questions from the _______ examiner.", options: ["A. friendly tall middle-aged", "B. tall friendly middle-aged", "C. friendly middle-aged tall"], a: "A. friendly tall middle-aged", exp: "friendly (Opinion) -> tall (Size) -> middle-aged (Age)." },
                    { q: "Question 2: Please put on these _______ headsets before the listening test begins.", options: ["A. modern black plastic", "B. plastic modern black", "C. black modern plastic"], a: "A. modern black plastic", exp: "modern (Age/Opinion) -> black (Color) -> plastic (Material)." },
                    { q: "Question 3: We need to book a _______ conference room for the delegation tomorrow.", options: ["A. large comfortable square", "B. comfortable large square", "C. square comfortable large"], a: "B. comfortable large square", exp: "comfortable (Opinion) -> large (Size) -> square (Shape)." },
                    { q: "Question 4: She was awarded a _______ certificate for her outstanding language proficiency.", options: ["A. beautiful shiny new", "B. beautiful new shiny", "C. shiny beautiful new"], a: "A. beautiful shiny new", exp: "beautiful (Opinion) -> shiny (Physical quality/Opinion) -> new (Age)." },
                    { q: "Question 5: They are analyzing a _______ chart in their research methodology class.", options: ["A. complex big circular", "B. big circular complex", "C. complex big circular"], a: "A. complex big circular", exp: "complex (Opinion) -> big (Size) -> circular (Shape)." },
                    { q: "Question 6: He is writing a thesis about a(n) _______ method of learning vocabulary.", options: ["A. effective new quantitative", "B. new effective quantitative", "C. quantitative effective new"], a: "A. effective new quantitative", exp: "effective (Opinion) -> new (Age) -> quantitative (Type/Purpose)." },
                    { q: "Question 7: I just bought a _______ desk to organize my language study materials.", options: ["A. wooden sturdy brown", "B. sturdy brown wooden", "C. brown sturdy wooden"], a: "B. sturdy brown wooden", exp: "sturdy (Opinion) -> brown (Color) -> wooden (Material)." },
                    { q: "Question 8: The university campus has a _______ library.", options: ["A. magnificent huge ancient", "B. huge magnificent ancient", "C. ancient magnificent huge"], a: "A. magnificent huge ancient", exp: "magnificent (Opinion) -> huge (Size) -> ancient (Age)." },
                    { q: "Question 9: For the speaking test, you will interact with a _______ screen.", options: ["A. flat wide digital", "B. wide flat digital", "C. digital wide flat"], a: "B. wide flat digital", exp: "wide (Size) -> flat (Shape) -> digital (Type)." },
                    { q: "Question 10: She brought a _______ notebook to jot down key grammatical structures.", options: ["A. small useful yellow", "B. useful small yellow", "C. yellow small useful"], a: "B. useful small yellow", exp: "useful (Opinion) -> small (Size) -> yellow (Color)." }
                ]
            },
            {
                title: "Exercise 3: Error Identification (Tìm lỗi sai)",
                tip: "Đọc thật kỹ cụm danh từ. Nếu trật tự không tuân theo OSASCOMP thì đó chính là lỗi sai cần tìm.",
                colorClass: "color-3",
                icon: "🔎",
                questions: [
                    { q: "Question 1: The university has recently built a (A) huge (B) modern (C) beautiful (D) stadium.", options: ["A. huge", "B. modern", "C. beautiful", "D. stadium"], a: "C. beautiful", exp: "Lỗi sai ở vị trí các tính từ. Trật tự đúng phải là: beautiful (Opinion) -> huge (Size) -> modern (Age) stadium." },
                    { q: "Question 2: She always carries a (A) leather (B) black (C) expensive (D) handbag to the seminars.", options: ["A. leather", "B. black", "C. expensive", "D. handbag"], a: "A. leather", exp: "Trật tự đúng phải là: expensive (Opinion) -> black (Color) -> leather (Material) handbag." },
                    { q: "Question 3: The professor is a (A) respected (B) old (C) tall (D) American scholar.", options: ["A. respected", "B. old", "C. tall", "D. American"], a: "C. tall", exp: "Trật tự đúng: respected (Opinion) -> tall (Size) -> old (Age) -> American (Origin) scholar." },
                    { q: "Question 4: They served us some (A) hot (B) delicious (C) Italian (D) coffee during the break.", options: ["A. hot", "B. delicious", "C. Italian", "D. coffee"], a: "A. hot", exp: "Trật tự đúng: delicious (Opinion) -> hot (Physical state/Size/Temp) -> Italian (Origin) coffee." },
                    { q: "Question 5: I need to buy a (A) glass (B) round (C) large (D) table for my group study.", options: ["A. glass", "B. round", "C. large", "D. table"], a: "A. glass", exp: "Trật tự đúng: large (Size) -> round (Shape) -> glass (Material) table." }
                ]
            },
            {
                title: "Exercise 4: Sentence Translation (Dịch câu / Đồng nghĩa)",
                tip: "Xác định rõ các tính từ trong tiếng Việt và xếp chúng ngược lại theo chuẩn OSASCOMP trong tiếng Anh.",
                colorClass: "color-4",
                icon: "✍️",
                questions: [
                    { q: "Question 1: 'Cô ấy đang mặc một chiếc áo lụa màu đỏ tuyệt đẹp.'", options: ["A. She is wearing a gorgeous red silk shirt.", "B. She is wearing a red gorgeous silk shirt."], a: "A. She is wearing a gorgeous red silk shirt.", exp: "gorgeous (Opinion) -> red (Color) -> silk (Material)." },
                    { q: "Question 2: 'Họ vừa trình bày một bản kế hoạch kinh doanh mới cực kỳ chi tiết.'", options: ["A. They have just presented a new detailed business plan.", "B. They have just presented a detailed new business plan."], a: "B. They have just presented a detailed new business plan.", exp: "detailed (Opinion) -> new (Age) -> business (Purpose)." },
                    { q: "Question 3: 'Đó là một bức tượng bằng đồng cổ kính và to lớn.'", options: ["A. It is a massive ancient bronze statue.", "B. It is an ancient massive bronze statue."], a: "A. It is a massive ancient bronze statue.", exp: "massive (Size) -> ancient (Age) -> bronze (Material)." },
                    { q: "Question 4: 'Giảng viên yêu cầu chúng tôi nộp bài tập trên một tờ giấy A4 trắng và mỏng.'", options: ["A. The lecturer asked us to submit the assignment on a thin white A4 paper.", "B. The lecturer asked us to submit the assignment on a white thin A4 paper."], a: "A. The lecturer asked us to submit the assignment on a thin white A4 paper.", exp: "thin (Size/Thickness) -> white (Color) -> A4 (Type/Purpose)." },
                    { q: "Question 5: 'Anh ấy đang đọc một cuốn sách bìa cứng cũ kỹ của Anh.'", options: ["A. He is reading an old British hardback book.", "B. He is reading a hardback old British book."], a: "A. He is reading an old British hardback book.", exp: "old (Age) -> British (Origin) -> hardback (Type)." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo:</strong> ${ex.tip}</span>
                </div>
            `;

            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> Giải thích: ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${qObj.a}.</strong> <br> Giải thích: ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
