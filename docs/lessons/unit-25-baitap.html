    <script>
        const exData = [
            ["Question 1 [517147]: Ho Chi Minh city is much _______ than Hanoi capital.", 
            ["A. larger", "B. largest", "C. more larger", "D. as large"], 0, 
            "<ul><li><strong>A đúng:</strong> Dấu hiệu 'than' -> so sánh hơn. 'large' là tính từ ngắn -> thêm '-er' thành 'larger'. Từ 'much' đứng trước để nhấn mạnh mức độ.</li><li><strong>B sai:</strong> 'largest' là dạng so sánh nhất, không dùng với 'than'.</li><li><strong>C sai:</strong> Đã có đuôi '-er' thì không dùng thêm 'more' (lỗi so sánh kép).</li><li><strong>D sai:</strong> 'as large' là cấu trúc so sánh bằng (as... as), không đi với 'than'.</li></ul>"],

            ["Question 2 [517148]: Australia is the _______ continent in the world.", 
            ["A. smallest", "B. smaller", "C. most small", "D. more small"], 0, 
            "<ul><li><strong>A đúng:</strong> Có mạo từ 'the' và cụm 'in the world' -> so sánh nhất. 'small' là tính từ ngắn -> thêm '-est' thành 'smallest'.</li><li><strong>B sai:</strong> 'smaller' là so sánh hơn.</li><li><strong>C sai:</strong> 'small' là tính từ ngắn, không dùng 'most'.</li><li><strong>D sai:</strong> Lỗi ngữ pháp tương tự C.</li></ul>"],

            ["Question 3 [517149]: Living in the city is _______ than living in the countryside.", 
            ["A. more noisy", "B. noisier", "C. noisiest", "D. noisy"], 1, 
            "<ul><li><strong>A sai:</strong> Tính từ kết thúc bằng '-y' (noisy) được coi là tính từ ngắn. Ta đổi 'y' thành 'i' rồi thêm '-er'. Không dùng 'more'.</li><li><strong>B đúng:</strong> So sánh hơn của 'noisy' là 'noisier' (vì có từ 'than').</li><li><strong>C sai:</strong> Đây là dạng so sánh nhất.</li><li><strong>D sai:</strong> Thiếu đuôi so sánh.</li></ul>"],

            ["Question 4 [517150]: She is _______ student in my class.", 
            ["A. the most hard-working", "B. more hard-working", "C. as hard-working", "D. hard-working"], 0, 
            "<ul><li><strong>A đúng:</strong> Dấu hiệu 'in my class' (trong một tập thể) -> so sánh nhất. 'hard-working' là tính từ dài -> dùng 'the most + adj'.</li><li><strong>B sai:</strong> 'more' là so sánh hơn.</li><li><strong>C, D sai:</strong> Không phải dạng so sánh nhất.</li></ul>"],

            ["Question 5 [517151]: This book is _______ than the one I read last week.", 
            ["A. interesting", "B. more interesting", "C. most interesting", "D. as interesting"], 1, 
            "<ul><li><strong>A, D sai:</strong> Cấu trúc câu có từ 'than' đòi hỏi hình thức so sánh hơn.</li><li><strong>B đúng:</strong> 'interesting' là tính từ dài (3 âm tiết trở lên) -> so sánh hơn dùng 'more + adj + than'.</li><li><strong>C sai:</strong> 'most' dùng cho so sánh nhất.</li></ul>"],

            ["Question 6 [517152]: My sister is two years _______ than me.", 
            ["A. young", "B. so young", "C. younger", "D. the youngest"], 2, 
            "<ul><li><strong>A, B sai:</strong> Thiếu dạng so sánh hơn dù trong câu có từ 'than'.</li><li><strong>C đúng:</strong> So sánh hơn của tính từ ngắn 'young' là 'younger'. Có thể thêm số lượng (two years) lên trước để chỉ mức độ chênh lệch.</li><li><strong>D sai:</strong> Là dạng so sánh nhất.</li></ul>"],

            ["Question 7 [517153]: He doesn't play tennis as _______ as his brother.", 
            ["A. good", "B. better", "C. well", "D. best"], 2, 
            "<ul><li><strong>A sai:</strong> 'play' là động từ thường nên phải đi với trạng từ, 'good' là tính từ.</li><li><strong>B, D sai:</strong> Đây là cấu trúc so sánh bằng 'as... as', từ ở giữa phải giữ nguyên thể (không chia so sánh hơn hay nhất).</li><li><strong>C đúng:</strong> Trạng từ của 'good' là 'well'. Đứng sau động từ thường 'play' và trong cấu trúc 'as well as'.</li></ul>"],

            ["Question 8 [517154]: Of the two sisters, Mary is _______.", 
            ["A. the more beautiful", "B. more beautiful", "C. the most beautiful", "D. beautiful"], 0, 
            "<ul><li><strong>A đúng:</strong> Dấu hiệu 'Of the two...' (Trong 2 người/vật) -> Ta dùng cấu trúc <strong>the + so sánh hơn</strong> để chỉ người/vật nhỉnh hơn.</li><li><strong>B sai:</strong> Thiếu mạo từ 'the'.</li><li><strong>C sai:</strong> So sánh nhất (most) chỉ dùng khi có từ 3 đối tượng trở lên.</li><li><strong>D sai:</strong> Thiếu cấu trúc so sánh.</li></ul>"],

            ["Question 9 [517155]: The weather today is _______ than it was yesterday.", 
            ["A. bad", "B. badder", "C. worse", "D. worst"], 2, 
            "<ul><li><strong>A sai:</strong> Thiếu so sánh hơn.</li><li><strong>B sai:</strong> 'bad' là tính từ bất quy tắc, không có dạng 'badder'.</li><li><strong>C đúng:</strong> So sánh hơn của 'bad' là 'worse'.</li><li><strong>D sai:</strong> 'worst' là so sánh nhất.</li></ul>"],

            ["Question 10 [517156]: Which is the _______ mountain in the world?", 
            ["A. high", "B. higher", "C. highest", "D. highly"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Cụm 'in the world' đòi hỏi một sự so sánh nhất.</li><li><strong>C đúng:</strong> So sánh nhất của tính từ ngắn 'high' là 'highest' (có 'the' phía trước).</li></ul>"],

            ["Question 11 [517157]: _______ you study, _______ your results will be.", 
            ["A. The harder / the better", "B. The more hard / the more good", "C. The hardest / the best", "D. Harder / better"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc so sánh kép (Càng... thì càng...): <strong>The + so sánh hơn + S + V, the + so sánh hơn + S + V</strong>. 'hard' là tính từ ngắn -> harder; 'good' bất quy tắc -> better.</li><li><strong>B sai:</strong> Không dùng 'more' cho tính từ ngắn 'hard' và tính từ bất quy tắc 'good'.</li><li><strong>C sai:</strong> Đây là so sánh nhất.</li><li><strong>D sai:</strong> Thiếu mạo từ 'the'.</li></ul>"],

            ["Question 12 [517158]: She types _______ than her colleagues.", 
            ["A. careful", "B. more carefully", "C. carefully", "D. most carefully"], 1, 
            "<ul><li><strong>A, C sai:</strong> 'type' là động từ thường nên cần trạng từ 'carefully'. Câu có 'than' nên cần dạng so sánh hơn.</li><li><strong>B đúng:</strong> 'carefully' là trạng từ dài, so sánh hơn là 'more carefully'.</li><li><strong>D sai:</strong> 'most' là so sánh nhất.</li></ul>"],

            ["Question 13 [517159]: This is _______ film I have ever seen.", 
            ["A. worse", "B. the worst", "C. bad", "D. badly"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Dấu hiệu 'I have ever seen' (tôi từng xem) thường đi kèm với so sánh nhất (Đây là bộ phim tệ nhất tôi từng xem).</li><li><strong>B đúng:</strong> So sánh nhất của 'bad' là 'the worst'.</li></ul>"],

            ["Question 14 [517160]: He has _______ money than I do.", 
            ["A. little", "B. less", "C. least", "D. fewer"], 1, 
            "<ul><li><strong>A sai:</strong> Cần so sánh hơn vì có 'than'.</li><li><strong>B đúng:</strong> So sánh hơn của 'little' (dành cho danh từ không đếm được 'money') là 'less'.</li><li><strong>C sai:</strong> 'least' là so sánh nhất.</li><li><strong>D sai:</strong> 'fewer' là so sánh hơn của 'few' (dùng cho danh từ đếm được số nhiều).</li></ul>"],

            ["Question 15 [517161]: His health is getting _______ and _______.", 
            ["A. bad / bad", "B. worse / worse", "C. worst / worst", "D. badder / badder"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> D sai vì 'bad' bất quy tắc. A và C không cấu tạo thành cấu trúc so sánh lũy tiến.</li><li><strong>B đúng:</strong> Cấu trúc so sánh kép (càng ngày càng): <strong>so sánh hơn + and + so sánh hơn</strong> (worse and worse: càng ngày càng tệ).</li></ul>"],

            ["Question 16 [517162]: Mount Everest is higher _______ any other mountain in the world.", 
            ["A. as", "B. than", "C. to", "D. from"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Sai giới từ/liên từ của cấu trúc so sánh hơn.</li><li><strong>B đúng:</strong> Đi kèm với tính từ/trạng từ so sánh hơn ('higher') luôn là liên từ 'than'.</li></ul>"],

            ["Question 17 [517163]: The price of this car is twice _______ that of the old one.", 
            ["A. as much as", "B. more than", "C. as many as", "D. much than"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc so sánh gấp nhiều lần: <strong>Số lần (twice, three times...) + as + much/many/adj + as</strong>. Tiền (price) không đếm được nên dùng 'much'.</li><li><strong>B, D sai:</strong> Không dùng 'than' ngay sau số lần trong dạng này.</li><li><strong>C sai:</strong> 'many' dùng cho danh từ đếm được.</li></ul>"],

            ["Question 18 [517164]: It is becoming _______ to find a job nowadays.", 
            ["A. hard and hard", "B. the hardest", "C. harder and harder", "D. more hard and hard"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Để diễn tả 'càng ngày càng', với tính từ ngắn 'hard' ta dùng 'harder and harder'. Không dùng 'more hard'.</li><li><strong>C đúng:</strong> Cấu trúc so sánh lũy tiến với tính từ ngắn: <strong>adj-er + and + adj-er</strong>.</li></ul>"],

            ["Question 19 [517165]: She speaks English _______ than she used to.", 
            ["A. fluenter", "B. more fluently", "C. fluent", "D. most fluently"], 1, 
            "<ul><li><strong>A sai:</strong> 'fluently' là trạng từ dài, không thêm đuôi '-er'.</li><li><strong>B đúng:</strong> Động từ 'speaks' cần trạng từ (fluently). Có 'than' nên dùng so sánh hơn -> 'more fluently'.</li><li><strong>C, D sai:</strong> Thiếu so sánh hoặc dùng so sánh nhất.</li></ul>"],

            ["Question 20 [517196]: I am not as good at English as my friend. (Chọn câu nghĩa tương đương)", 
            ["A. My friend is better at English than me.", "B. My friend is the best at English in my class.", "C. I am the best at English in my class.", "D. I am better at English than my friend."], 0, 
            "<ul><li><strong>A đúng:</strong> 'Tôi không giỏi tiếng Anh BẰNG bạn tôi' = 'Bạn tôi giỏi tiếng Anh HƠN tôi' (better... than).</li><li><strong>B, C sai:</strong> Tự ý thêm so sánh nhất (in my class).</li><li><strong>D sai:</strong> Ngược nghĩa với câu gốc.</li></ul>"],

            ["Question 21 [517166]: No one in my class is _______ tall as Peter.", 
            ["A. so", "B. more", "C. much", "D. the"], 0, 
            "<ul><li><strong>A đúng:</strong> Trong câu phủ định (No one...), cấu trúc so sánh bằng có thể dùng 'as... as' hoặc <strong>'so... as'</strong>.</li><li><strong>B, C, D sai:</strong> Sai cấu trúc so sánh bằng.</li></ul>"],

            ["Question 22 [517167]: The new smartphone is _______ expensive than the old model.", 
            ["A. slightly", "B. a lot of", "C. many", "D. fairly"], 0, 
            "<ul><li><strong>A đúng:</strong> Để nhấn mạnh mức độ trong so sánh hơn, ta có thể dùng 'much, far, a lot, a bit, slightly'. 'Slightly' nghĩa là hơi/một chút.</li><li><strong>B sai:</strong> Nhấn mạnh dùng 'a lot', không dùng 'a lot of'.</li><li><strong>C, D sai:</strong> Không đứng trước so sánh hơn để nhấn mạnh.</li></ul>"],

            ["Question 23 [517168]: Who is the _______ of the three boys?", 
            ["A. tall", "B. taller", "C. tallest", "D. most tall"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Khi có từ 3 đối tượng trở lên (the three boys), ta bắt buộc phải dùng so sánh nhất. 'tall' là tính từ ngắn nên không dùng 'most'.</li><li><strong>C đúng:</strong> So sánh nhất của tính từ ngắn 'tall' là 'tallest'.</li></ul>"],

            ["Question 24 [517169]: _______ you read, _______ vocabulary you will learn.", 
            ["A. The more / the more", "B. More / more", "C. The much / the much", "D. The most / the most"], 0, 
            "<ul><li><strong>A đúng:</strong> So sánh kép (Càng... thì càng): <strong>The more + S + V, the more + N + S + V</strong>. (Bạn càng đọc nhiều, bạn càng học được nhiều từ vựng).</li><li><strong>B, C, D sai:</strong> Thiếu mạo từ 'the' hoặc sai cấp độ so sánh.</li></ul>"],

            ["Question 25 [517170]: My father is much _______ than my mother.", 
            ["A. old", "B. older", "C. elder", "D. oldest"], 1, 
            "<ul><li><strong>A, D sai:</strong> Có 'than' nên dùng so sánh hơn.</li><li><strong>B đúng:</strong> So sánh hơn của 'old' dùng để so sánh tuổi tác chung là 'older'.</li><li><strong>C sai:</strong> 'elder' thường đứng trước danh từ để chỉ anh/chị lớn trong gia đình (my elder brother), KHÔNG dùng với 'than'.</li></ul>"],

            ["Question 26 [517171]: Traveling by plane is _______ way to get there.", 
            ["A. fast", "B. faster", "C. the fastest", "D. as fast"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Không có từ so sánh 'than' hay 'as', câu mang ý nghĩa khẳng định vị trí độc tôn (cách nhanh NHẤT).</li><li><strong>C đúng:</strong> So sánh nhất của 'fast' là 'the fastest'.</li></ul>"],

            ["Question 27 [517172]: Your car is much more economical _______ mine.", 
            ["A. as", "B. than", "C. to", "D. like"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Sai liên từ.</li><li><strong>B đúng:</strong> Dấu hiệu 'more economical' (so sánh hơn) bắt buộc phải đi với liên từ 'than'.</li></ul>"],

            ["Question 28 [517173]: The problem was _______ complicated than we had expected.", 
            ["A. very", "B. too", "C. far more", "D. so"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Các từ này bổ nghĩa cho tính từ nguyên thể (very complicated), không đi cùng so sánh hơn có 'than'.</li><li><strong>C đúng:</strong> 'more complicated' là so sánh hơn. Dùng 'far' ở trước để nhấn mạnh (phức tạp HƠN RẤT NHIỀU).</li></ul>"],

            ["Question 29 [517174]: She doesn't have _______ free time as her husband.", 
            ["A. as much", "B. more", "C. so many", "D. as many"], 0, 
            "<ul><li><strong>A đúng:</strong> 'free time' (thời gian rảnh) là danh từ không đếm được. Cấu trúc so sánh bằng: <strong>as much + N(không đếm được) + as</strong>.</li><li><strong>B sai:</strong> Có từ 'as' ở vế sau nên không dùng 'more'.</li><li><strong>C, D sai:</strong> 'many' chỉ dùng cho danh từ đếm được.</li></ul>"],

            ["Question 30 [517175]: Of the two shirts, the blue one is _______.", 
            ["A. the prettiest", "B. prettier", "C. the prettier", "D. pretty"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Nhắc lại quy tắc: 'Of the two...' (Trong 2 cái) thì ta phải dùng <strong>the + so sánh hơn</strong>. B thiếu mạo từ 'the'.</li><li><strong>C đúng:</strong> 'the prettier'. 'pretty' (kết thúc y) coi là tính từ ngắn -> prettier.</li></ul>"],

            ["Question 31 [517176]: The deeper we dive, _______ the water becomes.", 
            ["A. the colder", "B. colder", "C. the coldest", "D. as cold as"], 0, 
            "<ul><li><strong>A đúng:</strong> So sánh kép: <strong>The + so sánh hơn, The + so sánh hơn</strong>. Vế đầu 'The deeper', vế sau phải là 'the colder'.</li><li><strong>B, C, D sai:</strong> Thiếu 'the' hoặc sai cấp độ so sánh.</li></ul>"],

            ["Question 32 [517177]: This test is not _______ difficult as the last one.", 
            ["A. as", "B. so", "C. Both A and B are correct", "D. more"], 2, 
            "<ul><li><strong>A và B đúng:</strong> Trong câu phủ định (not), ta có thể dùng 'not as... as' hoặc 'not so... as'. Do đó đáp án C là chính xác nhất.</li><li><strong>D sai:</strong> Không dùng 'more... as'.</li></ul>"],

            ["Question 33 [517178]: He ran _______ than the other athletes.", 
            ["A. farther", "B. further", "C. Both A and B are correct", "D. farthest"], 2, 
            "<ul><li><strong>A và B đúng:</strong> Tính từ 'far' có 2 dạng so sánh hơn là 'farther' (chỉ khoảng cách vật lý) và 'further' (khoảng cách vật lý VÀ mức độ/chiều sâu). Ở đây chạy xa (vật lý) nên dùng cả 2 đều đúng -> Chọn C.</li><li><strong>D sai:</strong> Đây là so sánh nhất.</li></ul>"],

            ["Question 34 [517179]: Please contact me for _______ information.", 
            ["A. farther", "B. further", "C. farthest", "D. furthest"], 1, 
            "<ul><li><strong>A sai:</strong> 'farther' CHỈ dùng cho khoảng cách địa lý/vật lý.</li><li><strong>B đúng:</strong> 'further information' (thông tin sâu hơn/chi tiết hơn) là cụm cố định. 'further' chỉ mức độ, thông tin bổ sung.</li><li><strong>C, D sai:</strong> Dạng so sánh nhất không phù hợp ngữ cảnh.</li></ul>"],

            ["Question 35 [517180]: She earns _______ money than I do, but she is _______ happy.", 
            ["A. less / less", "B. fewer / less", "C. less / fewer", "D. fewer / fewer"], 0, 
            "<ul><li><strong>A đúng:</strong> 'money' (tiền) không đếm được -> dùng 'less'. 'happy' (hạnh phúc) là tính từ trừu tượng -> cũng dùng 'less' (kém hạnh phúc hơn).</li><li><strong>B, C, D sai:</strong> 'fewer' chỉ dùng cho danh từ đếm được số nhiều.</li></ul>"],

            ["Question 36 [517181]: _______ people use smartphones today than ten years ago.", 
            ["A. Much", "B. Less", "C. More", "D. Most"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Có từ 'than' nên cần dạng so sánh hơn. 'people' là danh từ đếm được số nhiều, không dùng 'less' hay 'much'.</li><li><strong>C đúng:</strong> So sánh hơn của many/much là 'more'. (Nhiều người sử dụng smartphone hơn).</li></ul>"],

            ["Question 37 [517182]: The new restaurant is _______ popular than the old one.", 
            ["A. far more", "B. highly", "C. entirely", "D. completely"], 0, 
            "<ul><li><strong>A đúng:</strong> Dấu hiệu 'than' -> so sánh hơn. 'popular' là tính từ dài -> 'more popular'. Dùng 'far' đứng trước để nhấn mạnh (phổ biến hơn rất nhiều).</li><li><strong>B, C, D sai:</strong> Không dùng để nhấn mạnh dạng so sánh hơn.</li></ul>"],

            ["Question 38 [517183]: This is the _______ beautiful dress I have ever bought.", 
            ["A. more", "B. much", "C. most", "D. less"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Dấu hiệu 'the...' và 'I have ever bought' -> so sánh nhất.</li><li><strong>C đúng:</strong> So sánh nhất của tính từ dài 'beautiful' là 'the most beautiful'.</li></ul>"],

            ["Question 39 [517184]: His condition is getting _______.", 
            ["A. more and more bad", "B. worst and worst", "C. worse and worse", "D. badly and badly"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> 'bad' là tính từ bất quy tắc, so sánh hơn là 'worse'.</li><li><strong>C đúng:</strong> So sánh kép lũy tiến (càng ngày càng): <strong>worse and worse</strong>.</li></ul>"],

            ["Question 40 [517185]: This laptop is _______ expensive of all.", 
            ["A. the less", "B. the least", "C. least", "D. fewer"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Dấu hiệu 'of all' (trong tất cả) -> so sánh nhất. So sánh nhất cần mạo từ 'the'.</li><li><strong>B đúng:</strong> So sánh nhất của 'little/less' mang nghĩa 'ít nhất' là 'the least'. (Laptop này ít đắt đỏ nhất trong tất cả).</li></ul>"],

            ["Question 41 [517186]: English is spoken _______ widely than French in the world.", 
            ["A. more", "B. much", "C. as", "D. most"], 0, 
            "<ul><li><strong>A đúng:</strong> Có 'than' -> so sánh hơn. 'widely' là trạng từ dài -> thêm 'more'.</li><li><strong>B, C, D sai:</strong> Không đúng cấu trúc so sánh hơn.</li></ul>"],

            ["Question 42 [517187]: That was _______ decision I have ever made.", 
            ["A. the hard", "B. hardest", "C. the hardest", "D. the more hard"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Dấu hiệu 'ever made' -> so sánh nhất. Cần mạo từ 'the'. 'hard' là tính từ ngắn -> hardest.</li><li><strong>C đúng:</strong> 'the hardest' (Quyết định khó khăn nhất).</li></ul>"],

            ["Question 43 [517188]: _______ you eat, _______ you will get.", 
            ["A. The much / the fatter", "B. The more / the fatter", "C. The more / the more fat", "D. More / fatter"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> 'fat' (kết thúc bằng 1 nguyên âm + 1 phụ âm) -> nhân đôi phụ âm thêm -er (fatter). Không dùng 'more fat'. Phải có 'the' ở 2 vế.</li><li><strong>B đúng:</strong> So sánh kép: The more + S + V, the fatter + S + V.</li></ul>"],

            ["Question 44 [517189]: The Pacific Ocean is _______ than the Atlantic Ocean.", 
            ["A. deep", "B. deepest", "C. deeper", "D. more deep"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Có 'than' -> so sánh hơn. 'deep' là tính từ ngắn -> deeper.</li><li><strong>C đúng:</strong> 'deeper' (sâu hơn).</li></ul>"],

            ["Question 45 [517190]: My brother's handwriting is not _______ mine.", 
            ["A. as clear as", "B. more clear than", "C. clearest as", "D. as clearly as"], 0, 
            "<ul><li><strong>A đúng:</strong> Sau động từ to be (is) cần TÍNH TỪ. Cấu trúc so sánh bằng: <strong>as + adj + as</strong>.</li><li><strong>B sai:</strong> 'clear' là tính từ ngắn -> 'clearer than'.</li><li><strong>C sai:</strong> Sai cấu trúc.</li><li><strong>D sai:</strong> 'clearly' là trạng từ, không đứng sau to be.</li></ul>"],

            ["Question 46 [517191]: No river in the world is _______ the Nile.", 
            ["A. longer than", "B. as long as", "C. the longest", "D. long than"], 1, 
            "<ul><li><strong>A sai:</strong> Cấu trúc 'No... is longer than' cũng mang nghĩa tương đương so sánh nhất, tuy nhiên trong các bài tập thông dụng, nếu không có 'than' sẵn, ta dùng cấu trúc bằng. (Tuy nhiên nếu đề cho 'longer than' vẫn đúng về ngữ pháp, nhưng ở đây ta chọn 'as long as' làm chuẩn mực cho so sánh bằng với No... is). Dù sao, 'as long as' là an toàn nhất. *Thực ra A và B đều đúng ngữ pháp, nhưng B tự nhiên hơn trong pattern chuyển đổi câu.* Hãy coi B là đáp án được ưu tiên.</li><li><strong>B đúng:</strong> 'Không con sông nào dài BẰNG sông Nile'.</li><li><strong>C, D sai.</strong></li></ul>"],

            ["Question 47 [517192]: This is the _______ interesting book I've read.", 
            ["A. little", "B. less", "C. least", "D. fewer"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Có mạo từ 'the' -> so sánh nhất. 'fewer' là so sánh hơn của few.</li><li><strong>C đúng:</strong> 'the least interesting' mang nghĩa là cuốn sách ÍT thú vị NHẤT.</li></ul>"],

            ["Question 48 [517193]: She is _______ of the two girls.", 
            ["A. cleverer", "B. the cleverer", "C. the cleverest", "D. cleverest"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Khi có cụm 'of the two' (trong 2 người), ta bắt buộc dùng cấu trúc <strong>The + So sánh hơn</strong>. Bỏ qua so sánh nhất.</li><li><strong>B đúng:</strong> 'clever' có 2 âm tiết kết thúc bằng 'er' -> coi như tính từ ngắn -> cleverer. Kèm 'the' -> 'the cleverer'.</li></ul>"],

            ["Question 49 [517194]: The test was _______ easier than we expected.", 
            ["A. much", "B. very", "C. too", "D. so"], 0, 
            "<ul><li><strong>A đúng:</strong> 'much' đứng trước so sánh hơn ('easier') để nhấn mạnh mức độ (dễ hơn NHIỀU).</li><li><strong>B, C, D sai:</strong> 'very, too, so' chỉ bổ nghĩa cho tính từ ở dạng nguyên thể, không đi với so sánh hơn.</li></ul>"],

            ["Question 50 [517195]: You must do it _______.", 
            ["A. careful", "B. more careful", "C. more carefully", "D. as careful as"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Động từ thường 'do' cần TRẠNG TỪ bổ nghĩa, không dùng tính từ (careful).</li><li><strong>C đúng:</strong> 'carefully' là trạng từ. Nếu trong ngữ cảnh nhắc nhở làm cẩn thận hơn -> dùng 'more carefully'.</li></ul>"]
        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        const card = document.createElement("div");
        card.className = `exercise-card`;

        let htmlContent = `
            <h2 class="ex-title">🔥 50 Câu Trắc Nghiệm: Các Dạng So Sánh</h2>
            <div class="tip-box">
                <span>💡 <strong>Mẹo làm bài:</strong> Hãy chú ý vào các dấu hiệu như <strong>"than"</strong> (So sánh hơn), <strong>"the" hoặc "in/of"</strong> (So sánh nhất), <strong>"as...as"</strong> (So sánh bằng) và đặc biệt chú ý <strong>"of the two"</strong> (The + So sánh hơn). Đừng quên phân biệt tính từ ngắn/dài nhé!</span>
            </div>
            <div id="questions-container"></div>
        `;

        card.innerHTML = htmlContent;
        app.appendChild(card);

        const qContainer = document.getElementById("questions-container");

        exData.forEach((qObj) => {
            const [qText, options, correctIndex, expText] = qObj;
            
            const qBlock = document.createElement("div");
            qBlock.className = "question-block";

            const qTitle = document.createElement("div");
            qTitle.className = "question-text";
            qTitle.innerText = qText;
            qBlock.appendChild(qTitle);

            const optContainer = document.createElement("div");
            optContainer.className = "options";
            
            const expDiv = document.createElement("div");
            expDiv.className = "explanation";

            options.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = opt; // Using innerHTML if options have tags
                
                btn.onclick = () => {
                    const siblings = optContainer.querySelectorAll(".option-btn");
                    siblings.forEach(sibling => sibling.disabled = true);

                    if(idx === correctIndex) {
                        btn.classList.add("correct");
                        currentScore++;
                        scoreDisplay.innerText = currentScore;
                        expDiv.classList.add("success", "show");
                        expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${expText}`;
                    } else {
                        btn.classList.add("incorrect");
                        siblings[correctIndex].classList.add("correct");
                        expDiv.classList.add("error", "show");
                        expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> ${expText}`;
                    }
                };
                optContainer.appendChild(btn);
            });

            qBlock.appendChild(optContainer);
            qBlock.appendChild(expDiv);
            qContainer.appendChild(qBlock);
        });
    </script>
</body>
</html>
