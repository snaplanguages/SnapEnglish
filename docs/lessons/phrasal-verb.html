<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="ảnh.png">
    <title>75 Phrasal Verbs Collection ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Quicksand', sans-serif; 
            min-height: 100vh;
            /* Nền Gradient Pastel chuyển động */
            background: linear-gradient(120deg, #a1c4fd 0%, #c2e9fb 100%);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 900px; /* Rộng hơn để chứa nhiều cột */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        h1 { 
            font-family: 'Fredoka', sans-serif;
            color: #6c5ce7; 
            font-size: 36px; 
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        p.subtitle { color: #a29bfe; margin-bottom: 25px; font-weight: 600; }

        /* Thanh tìm kiếm cute */
        .search-box {
            margin-bottom: 30px;
            position: relative;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid #dfe6e9;
            font-family: 'Quicksand', sans-serif;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .search-box input:focus {
            border-color: #74b9ff;
            box-shadow: 0 5px 20px rgba(116, 185, 255, 0.3);
        }

        /* Lưới hiển thị danh sách */
        .grid-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); /* Tự động chia cột */
            gap: 15px;
            padding-bottom: 20px;
        }

        /* Style từng ô động từ */
        .test-item { 
            padding: 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            color: #555;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: white;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .test-item span.number {
            font-size: 12px;
            color: #b2bec3;
            margin-bottom: 5px;
            background: #f1f2f6;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .test-item span.word {
            font-size: 18px;
            color: #2d3436;
        }

        /* Hiệu ứng Hover */
        .test-item:hover { 
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #fab1a0;
        }

        /* Footer */
        .footer {
            margin-top: 20px;
            font-size: 13px;
            color: #b2bec3;
        }

        /* Responsive cho mobile */
        @media (max-width: 600px) {
            .grid-buttons {
                grid-template-columns: repeat(2, 1fr); /* 2 cột trên mobile */
            }
            h1 { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🌸 Phrasal Verbs 🌸</h1>
        <p class="subtitle">75 cụm động từ thông dụng nhất</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm (ví dụ: Run, Go...)" onkeyup="filterVerbs()">
        </div>
        
        <div class="grid-buttons" id="verbList"></div>

        <div class="footer">Keep fighting! 💪</div>
    </div>

   <script>
    // Danh sách đầy đủ 75 từ dựa trên hình ảnh
    const verbs = [
        "ACCOUNT", "ACT", "AGREE", "ASK", "BACK", 
        "BANG", "BEAR", "BEAT", "BLOW", "BREAK", 
        "BRICK", "BRING", "BUILD", "BUMP", "BURN", 
        "CATCH", "CALL", "CARRY", "CLEAR", "CHANGE", 
        "CHECK", "CLOSE", "COUNT", "COME", "CRY", 
        "CUT", "DIE", "DO", "DRAW", "DRIVE", 
        "DROP", "EAT", "FACE", "FALL", "FILL", 
        "GET", "GIVE", "GO", "GROW", "HAND", 
        "HANG", "HAVE", "HEAD", "HEAR", "HOLD", 
        "KEEP", "KNOCK", "LAY", "LEAVE", "LET", 
        "LEVEL", "LIE", "LIVE", "LOOK", "MAKE", 
        "PASS", "PAY", "PICK", "PLAY", "PULL", 
        "PUSH", "PUT", "RUN", "SEE", "SET", 
        "SHOW", "STAND", "STAY", "TAKE", "TALK", 
        "TELL", "THINK", "THROW", "TURN", "WEAR"
    ];

    // Các màu pastel dễ thương để random background nhẹ cho từng ô
    const colors = ["#ffeaa7", "#81ecec", "#fab1a0", "#74b9ff", "#a29bfe", "#fdcb6e", "#e17055", "#00b894"];

    const listContainer = document.getElementById('verbList');

    // Hàm tạo danh sách hiển thị
    function renderList(items) {
        listContainer.innerHTML = ""; // Xóa danh sách cũ
        
        items.forEach((verb, index) => {
            // Lấy index gốc từ mảng chính để giữ đúng số thứ tự (index + 1)
            const realIndex = verbs.indexOf(verb) + 1;
            
            const div = document.createElement('div');
            div.className = 'test-item';
            
            // Random hiệu ứng màu viền nhẹ khi hover (bằng code CSS inline biến)
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            div.style.borderBottom = `3px solid ${randomColor}`;

            div.innerHTML = `
                <span class="number">#${realIndex}</span>
                <span class="word">${verb}</span>
            `;

            // Sự kiện click
            div.onclick = function() {
                goToTest(realIndex, verb);
            };

            listContainer.appendChild(div);
        });
    }

    // Render lần đầu
    renderList(verbs);

    // Hàm xử lý tìm kiếm
    function filterVerbs() {
        const input = document.getElementById('searchInput').value.toUpperCase();
        const filtered = verbs.filter(verb => verb.includes(input));
        renderList(filtered);
    }

    // Hàm chuyển trang
    function goToTest(index, verbName) {
        // Tạo tên file tự động: cumdongtu-1.account.html
        // Chuyển về chữ thường để khớp với tên file
        const fileName = `cumdongtu-${index}.${verbName.toLowerCase()}.html`;
        
        // Chuyển hướng (Bạn cần đảm bảo file đó đã tồn tại)
        // Nếu muốn check file tồn tại thì cần logic phía server, ở đây client cứ chuyển hướng
        window.location.href = fileName;
        
        // Log để kiểm tra (xóa khi chạy thật)
        console.log("Go to:", fileName); 
    }
</script>

</body>
</html>
