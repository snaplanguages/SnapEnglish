    <script>
        // DỮ LIỆU BÀI TẬP VÀ GIẢI THÍCH CHI TIẾT
        const exercises = [
            {
                title: "Task 1 [203001]: Choose the best answer.",
                tip: "Lưu ý ngữ cảnh của câu để chọn Idiom chỉ tính cách, tâm trạng hoặc thói quen phù hợp.",
                questions: [
                    ["Question 1 [517531]: Jack is _______ about buying a new car.", 
                    ["A. out of his mind", "B. in two minds", "C. keeping his head", "D. having a good head"], 1, 
                    "<ul><li><strong>A sai:</strong> <em>out of his mind</em> nghĩa là mất trí, phát điên, không hợp lý khi nói về việc mua xe.</li><li><strong>B đúng:</strong> <em>in two minds</em> nghĩa là lưỡng lự, phân vân (chưa quyết định được có nên mua xe không).</li><li><strong>C sai:</strong> <em>keep one's head</em> nghĩa là giữ bình tĩnh, không liên quan đến ngữ cảnh đưa ra quyết định mua bán.</li><li><strong>D sai:</strong> <em>have a good head for</em> nghĩa là có năng khiếu, giỏi về cái gì, phải đi kèm một danh từ/V-ing phía sau (VD: figures).</li></ul>"],
                    
                    ["Question 2 [517532]: Jack's an accountant and he _______ figures.", 
                    ["A. has a good head for", "B. learns by hearts", "C. keeps an eye out for", "D. makes up his mind"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>have a good head for something</em> nghĩa là giỏi về lĩnh vực gì. Kế toán (accountant) thì giỏi về những con số (figures).</li><li><strong>B sai:</strong> <em>learn by heart</em> là học thuộc lòng. Thừa chữ 's' ở heart và không hợp logic kế toán học vẹt con số.</li><li><strong>C sai:</strong> <em>keep an eye out for</em> là để mắt, coi chừng cái gì đó. Không sát nghĩa bằng A.</li><li><strong>D sai:</strong> <em>make up one's mind</em> là đưa ra quyết định, không đi trực tiếp với danh từ 'figures' như vậy.</li></ul>"],

                    ["Question 3 [517533]: Mary's doing well in her piano lessons - she definitely _______.", 
                    ["A. makes up her mind", "B. keeps her head", "C. has an ear for music", "D. keeps an eye out for"], 2, 
                    "<ul><li><strong>A sai:</strong> <em>make up one's mind</em> là quyết định.</li><li><strong>B sai:</strong> <em>keep one's head</em> là giữ bình tĩnh.</li><li><strong>C đúng:</strong> <em>have an ear for music</em> nghĩa là có năng khiếu cảm thụ âm nhạc, thẩm âm tốt (Rất hợp với việc học piano tốt).</li><li><strong>D sai:</strong> <em>keep an eye out for</em> là để ý, coi chừng.</li></ul>"],

                    ["Question 4 [517534]: The company report is _______ hand next week.", 
                    ["A. all ears", "B. out of his mind", "C. face-to-face", "D. in"], 3, 
                    "<ul><li><strong>A sai:</strong> <em>all ears</em> là chăm chú lắng nghe.</li><li><strong>B sai:</strong> <em>out of his mind</em> là mất trí.</li><li><strong>C sai:</strong> <em>face-to-face</em> là trực tiếp/đối mặt.</li><li><strong>D đúng:</strong> Cụm từ <em>in hand</em> nghĩa là đang được xử lý, giải quyết hoặc trong tầm kiểm soát. 'Báo cáo công ty sẽ được xử lý vào tuần tới'.</li></ul>"],

                    ["Question 5 [517535]: Peter _______ all the new vocabulary and structures in the lesson everyday.", 
                    ["A. keeps his head", "B. learns by heart", "C. makes up his mind", "D. has an ear for"], 1, 
                    "<ul><li><strong>A sai:</strong> <em>keep his head</em> là giữ bình tĩnh.</li><li><strong>B đúng:</strong> <em>learn by heart</em> là học thuộc lòng. (Peter học thuộc lòng từ vựng và cấu trúc mới mỗi ngày).</li><li><strong>C sai:</strong> <em>make up his mind</em> là quyết định.</li><li><strong>D sai:</strong> <em>have an ear for</em> là có năng khiếu âm nhạc, không dùng cho việc học từ vựng.</li></ul>"]
                ]
            },
            {
                title: "Task 2 [203002]: Read and choose the correct idiom.",
                tip: "Dựa vào bài tập nối (Match) trong sách, hãy chọn thành ngữ phù hợp nhất để điền vào chỗ trống.",
                questions: [
                    ["Question 1: The trip to Ho Chi Minh City _______.", 
                    ["A. cost me an arm and a leg", "B. got cold feet", "C. let the cat out of the bag", "D. was a piece of cake"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>cost an arm and a leg</em> nghĩa là cực kỳ đắt đỏ, tốn kém (chuyến đi tốn rất nhiều tiền).</li><li><strong>B sai:</strong> <em>get cold feet</em> là chùn bước, lo lắng.</li><li><strong>C sai:</strong> <em>let the cat out of the bag</em> là tiết lộ bí mật.</li><li><strong>D sai:</strong> <em>piece of cake</em> là dễ ợt (không hợp lý khi nói về cả 1 chuyến đi tốn kém).</li></ul>"],

                    ["Question 2: I am _______ about the test result.", 
                    ["A. getting cold feet", "B. fishing out of water", "C. night owls", "D. passing with flying colors"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>getting cold feet</em> là lo lắng, chùn bước (lo lắng về kết quả bài thi).</li><li><strong>B sai:</strong> <em>fish out of water</em> là cảm giác lạc lõng ở môi trường mới.</li><li><strong>C sai:</strong> <em>night owls</em> là cú đêm (người hay thức khuya).</li><li><strong>D sai:</strong> Sai ngữ pháp (am passing) và sai ngữ cảnh vì chưa có kết quả nên đang lo lắng.</li></ul>"],

                    ["Question 3: I think we _______ about many things.", 
                    ["A. see eye to eye", "B. rain cats and dogs", "C. get a kick out of", "D. make up our minds"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>see eye to eye</em> nghĩa là đồng tình, cùng chung quan điểm (chúng tôi đồng tình với nhau về nhiều thứ).</li><li><strong>B sai:</strong> <em>rain cats and dogs</em> là mưa tầm tã.</li><li><strong>C sai:</strong> <em>get a kick out of</em> là thích thú việc gì. Nếu dùng phải có tân ngữ (get a kick out of MANY THINGS - không có about).</li><li><strong>D sai:</strong> <em>make up our minds</em> là quyết định.</li></ul>"],

                    ["Question 4: I feel like being a _______ in this place.", 
                    ["A. fish out of water", "B. night owl", "C. piece of cake", "D. black sheep"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>fish out of water</em> nghĩa là lạc lõng, bỡ ngỡ (như cá ra khỏi nước) ở một nơi xa lạ.</li><li><strong>B sai:</strong> <em>night owl</em> là cú đêm.</li><li><strong>C sai:</strong> <em>piece of cake</em> là dễ ợt (dành cho sự vật/sự việc, không dùng cho người).</li><li><strong>D sai:</strong> <em>black sheep</em> là thành viên cá biệt trong gia đình/nhóm, không hợp với ngữ cảnh 'in this place' (ở nơi này).</li></ul>"],

                    ["Question 5: It started to _______ when I was walking home.", 
                    ["A. rain cats and dogs", "B. get cold feet", "C. pass with flying colors", "D. call it a day"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>rain cats and dogs</em> nghĩa là mưa tầm tã. (Trời bắt đầu mưa tầm tã khi tôi đi bộ về).</li><li><strong>B sai:</strong> <em>get cold feet</em> là lo sợ.</li><li><strong>C sai:</strong> <em>pass with flying colors</em> là thi đậu điểm cao.</li><li><strong>D sai:</strong> <em>call it a day</em> là dừng tay, nghỉ ngơi.</li></ul>"],

                    ["Question 6: I think he will lend us the bicycle _______.", 
                    ["A. when pigs fly", "B. out of the blue", "C. on average", "D. for certain"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>when pigs fly</em> nghĩa là chuyện viển vông, không đời nào xảy ra (Mỉa mai: anh ta keo kiệt nên không đời nào cho mượn xe).</li><li><strong>B sai:</strong> <em>out of the blue</em> là bất thình lình.</li><li><strong>C sai:</strong> <em>on average</em> là trung bình.</li><li><strong>D sai:</strong> <em>for certain</em> là chắc chắn (về mặt ý nghĩa có thể điền được nhưng trong danh sách ghép từ của Task 2 thì 'when pigs fly' là đáp án được chỉ định).</li></ul>"],

                    ["Question 7: Idioms are difficult but I believe you will _______ them.", 
                    ["A. get a kick out of", "B. let the cat out of the bag", "C. hold your horses", "D. give it a shot"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>get a kick out of something</em> nghĩa là bắt đầu cảm thấy thích thú với cái gì. (Dù khó nhưng tôi tin bạn sẽ thích chúng).</li><li><strong>B sai:</strong> <em>let the cat out of the bag</em> là lộ bí mật.</li><li><strong>C sai:</strong> <em>hold your horses</em> là bình tĩnh, chờ đã.</li><li><strong>D sai:</strong> <em>give it a shot</em> là thử nghiệm, không hợp ngữ pháp ở vị trí này.</li></ul>"],

                    ["Question 8: I didn't mean to _______ when talking to him what present you have bought him for his birthday.", 
                    ["A. let the cat out of the bag", "B. hold my horses", "C. slip my mind", "D. speak my mind"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>let the cat out of the bag</em> nghĩa là vô tình tiết lộ bí mật (tôi không cố ý tiết lộ bí mật về món quà sinh nhật của bạn).</li><li><strong>B sai:</strong> <em>hold my horses</em> là chờ đợi.</li><li><strong>C sai:</strong> <em>slip my mind</em> là quên béng mất.</li><li><strong>D sai:</strong> <em>speak my mind</em> là nói thẳng suy nghĩ.</li></ul>"],

                    ["Question 9: The boy passed the final exam _______.", 
                    ["A. with flying colors", "B. at a snail's pace", "C. down to the wire", "D. in the same boat"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>with flying colors</em> nghĩa là vượt qua một cách xuất sắc, điểm cao chót vót.</li><li><strong>B sai:</strong> <em>at a snail's pace</em> là chậm như sên.</li><li><strong>C sai:</strong> <em>down to the wire</em> là tới phút chót.</li><li><strong>D sai:</strong> <em>in the same boat</em> là cùng chung cảnh ngộ.</li></ul>"],

                    ["Question 10: The students are called _______ because they often stay up late.", 
                    ["A. night owls", "B. out of the blue", "C. fish out of water", "D. black sheep"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>night owls</em> là cú đêm, chỉ những người thích thức khuya làm việc/học tập.</li><li><strong>B sai:</strong> <em>out of the blue</em> là bất ngờ.</li><li><strong>C sai:</strong> <em>fish out of water</em> là người lạc lõng.</li><li><strong>D sai:</strong> <em>black sheep</em> là thành viên cá biệt.</li></ul>"]
                ]
            },
            {
                title: "Task 3 [203003]: Translate into English.",
                tip: "Dựa vào các câu Tiếng Việt trong sách, chọn câu dịch có chứa Idiom chính xác nhất.",
                questions: [
                    ["Question 1 [517536]: Tôi luôn chóng mặt khi nhìn thấy máu.", 
                    ["A. I always black out when I see blood.", "B. I always have the blues when I see blood.", "C. I always see eye to eye when I see blood.", "D. I always keep my head when I see blood."], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>black out</em> nghĩa là chóng mặt, ngất xỉu. Phù hợp 100% nghĩa gốc.</li><li><strong>B sai:</strong> <em>have the blues</em> là cảm thấy buồn bã, u sầu.</li><li><strong>C sai:</strong> <em>see eye to eye</em> là đồng tình.</li><li><strong>D sai:</strong> <em>keep my head</em> là giữ bình tĩnh, hoàn toàn trái ngược với chóng mặt/ngất.</li></ul>"],

                questions: [

                    ["Question 2 [517547]: Is David coming to the party tomorrow for _______?",

                    "<ul><li><strong>A đúng:</strong> <em>for certain</em> nghĩa là chắc chắn (Có chắc chắn ngày mai David đến không?).</li><li><strong>B sai:</strong> <em>on purpose</em> (chứ không phải for purpose) mới là cố tình.</li><li><strong>C sai:</strong> <em>for example</em> là ví dụ.</li><li><strong>D sai:</strong> <em>on sale</em> (chứ không phải for sale trong list của sách) là đang giảm giá/được bày bán.</li></ul>"],

                    ["Question 3 [517548]: This printer is out _______. I can't start it.", 
                    ["A. of breath", "B. of work", "C. of order", "D. of the blue"], 2, 
                    "<ul><li><strong>A sai:</strong> Dùng cho người bị mệt, đứt hơi.</li><li><strong>B sai:</strong> <em>out of work</em> dùng cho người bị thất nghiệp.</li><li><strong>C đúng:</strong> <em>out of order</em> dùng cho máy móc bị hư hỏng (máy in bị hỏng nên không khởi động được).</li><li><strong>D sai:</strong> <em>out of the blue</em> là hoàn toàn bất ngờ.</li></ul>"],

                    ["Question 4 [517549]: This textbook explains World War II in _______, but it is clear and easy to understand.",

                    ["Question 5 [517550]: Bruce works out on _______ four times a week.",

                    ["Question 7 [517552]: Is this house on _______?",

                    ["Question 8 [517553]: If the work goes smoothly, the plan can be finished on _______ today.", 
                    ["A. purpose", "B. average", "C. schedule", "D. sale"], 2, 
                    "<ul><li><strong>A sai:</strong> cố tình.</li><li><strong>B sai:</strong> trung bình.</li><li><strong>C đúng:</strong> <em>on schedule</em> hoặc <em>on time</em> nghĩa là đúng tiến độ kế hoạch đặt ra.</li><li><strong>D sai:</strong> đang bán.</li></ul>"],

                    ["Question 9 [517554]: The man who is dressed in a T-shirt and jeans is in _______ the CEO of the company.", 
                    ["A. brief", "B. common", "C. danger", "D. fact"], 3, 
                    "<ul><li><strong>A sai:</strong> tóm lại.</li><li><strong>B sai:</strong> điểm chung.</li><li><strong>C sai:</strong> gặp nguy hiểm.</li><li><strong>D đúng:</strong> <em>in fact</em> nghĩa là trên thực tế. Nhìn mặc áo phông quần jeans thế thôi nhưng thực tế ông ấy là CEO.</li></ul>"],

                    ["Question 10 [517555]: I love history in general, but I would like to learn more about Vietnamese history in _______.", 
                    ["A. particular", "B. brief", "C. advance", "D. debt"], 0, 
                    "<ul><li><strong>A đúng:</strong> <em>in particular</em> nghĩa là nói riêng, đặc biệt. Thích lịch sử nói chung nhưng đặc biệt muốn tìm hiểu lịch sử VN.</li><li><strong>B sai:</strong> vắn tắt.</li><li><strong>C sai:</strong> làm trước.</li><li><strong>D sai:</strong> <em>in debt</em> là mắc nợ.</li></ul>"]
                ]
            }
        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        exercises.forEach((ex, exIndex) => {
            const card = document.createElement("div");
            card.className = `exercise-card`;

            let htmlContent = `
                <h2 class="ex-title">✨ ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡 <strong>Hướng dẫn:</strong> ${ex.tip}</span>
                </div>
            `;

            if (ex.passage) {
                htmlContent += `<div class="reading-passage">${ex.passage}</div>`;
            }

            card.innerHTML = htmlContent;
            
            const containerId = `ex-container-${exIndex}`;
            const qContainer = document.createElement("div");
            qContainer.id = containerId;
            card.appendChild(qContainer);
            app.appendChild(card);

            ex.questions.forEach((qObj, qIndex) => {
                const [qText, options, correctIndex, expText] = qObj;
                
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qTitle = document.createElement("div");
                qTitle.className = "question-text";
                qTitle.innerText = qText;
                qBlock.appendChild(qTitle);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                options.forEach((opt, idx) => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerHTML = opt; // Using innerHTML because options might contain tags
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(idx === correctIndex) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${expText}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings[correctIndex].classList.add("correct");
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> ${expText}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                qContainer.appendChild(qBlock);
            });
        });
    </script>
