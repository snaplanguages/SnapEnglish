<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking Understanding | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pastel-pink: #ffd1dc;
            --pastel-blue: #aec6cf;
            --pastel-green: #b7e4c7;
            --pastel-yellow: #fdfd96;
            --pastel-purple: #c3b1e1;
            --text-main: #4a4a4a;
            --text-light: #7a7a7a;
            --bg-color: #faf8f5;
            --card-bg: #ffffff;
            --partner-bg: #f0f4f8;
            --student-bg: #fdf2f4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            background: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, var(--pastel-pink), var(--pastel-purple));
            padding: 30px;
            text-align: center;
            color: white;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 16px;
            font-weight: 600;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .step {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .step.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .step-title {
            font-size: 22px;
            color: var(--pastel-blue);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Task Items */
        .task-item {
            background: #fdfdfd;
            border: 2px dashed var(--pastel-blue);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .jumbled-words {
            font-size: 18px;
            font-weight: 700;
            color: var(--pastel-purple);
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        .speaking-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        /* Checkbox Task */
        .checkbox-list { list-style: none; }
        .checkbox-list li {
            display: flex; flex-direction: row; align-items: center; justify-content: space-between;
            padding: 15px; background: #f9f9f9; margin-bottom: 10px;
            border-radius: 12px; border-left: 5px solid var(--pastel-green);
        }
        .tf-options { display: flex; gap: 15px; }
        .tf-options label { cursor: pointer; font-weight: 600; }

        /* --- ROLE SELECTOR UI --- */
        .role-selector-container {
            background: #fff9fa;
            border: 2px solid var(--pastel-pink);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .role-selector-container p {
            font-weight: 700;
            color: var(--pastel-purple);
            margin: 0;
        }

        .role-buttons {
            display: flex;
            gap: 10px;
        }

        .role-btn {
            padding: 8px 16px;
            border: 2px solid #eee;
            background: white;
            border-radius: 10px;
            font-weight: 700;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .role-btn.active {
            background: var(--pastel-pink);
            color: white;
            border-color: var(--pastel-pink);
            box-shadow: 0 4px 10px rgba(255, 209, 220, 0.4);
        }

        /* --- DIALOGUE CHAT UI --- */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fafafa;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #eee;
        }

        .chat-row { display: flex; width: 100%; gap: 15px; }
        .chat-row.partner { justify-content: flex-start; }
        .chat-row.student { justify-content: flex-end; text-align: right; }

        .chat-avatar {
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 2px solid; flex-shrink: 0;
        }

        .partner .chat-avatar { border-color: var(--pastel-blue); }
        .student .chat-avatar { border-color: var(--pastel-pink); }

        .chat-bubble {
            max-width: 75%; padding: 15px 20px; border-radius: 20px;
            font-size: 17px; line-height: 1.6; position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .partner .chat-bubble { background: var(--partner-bg); border-top-left-radius: 5px; color: #333; }
        .student .chat-bubble { background: var(--student-bg); border-top-right-radius: 5px; color: #444; border: 2px dashed var(--pastel-pink); }

        .speaker-name { font-size: 13px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .partner .speaker-name { color: var(--pastel-blue); }
        .student .speaker-name { color: var(--pastel-purple); }

        .audio-btn, .chat-mic-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%; border: none;
            cursor: pointer; margin-top: 10px; transition: all 0.2s; color: white;
        }
        .audio-btn { background: var(--pastel-blue); }
        .audio-btn:hover { background: #88a7b5; transform: scale(1.1); }
        .chat-mic-btn { background: var(--pastel-pink); }
        .chat-mic-btn:hover { background: #e8a5b5; transform: scale(1.1); }
        .chat-mic-btn.recording { background: #ff6b6b; animation: pulse 1.5s infinite; }

        .blank {
            display: inline-block; border-bottom: 2px solid var(--pastel-purple);
            min-width: 50px; text-align: center; color: var(--pastel-purple);
            font-weight: bold; padding: 0 5px;
        }

        .speech-result-chat { font-size: 14px; color: var(--text-light); font-style: italic; margin-top: 10px; display: block; }

        /* Mic button for Prep Task */
        .mic-btn {
            background: var(--pastel-pink); border: none; width: 60px; height: 60px;
            border-radius: 50%; color: white; font-size: 24px; cursor: pointer;
            transition: transform 0.2s; box-shadow: 0 4px 10px rgba(255, 209, 220, 0.6);
        }
        .mic-btn.recording { background: #ff6b6b; animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); display: none;
            justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: white; width: 90%; max-width: 500px;
            border-radius: 20px; padding: 30px; position: relative;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; }
        .modal-header { display: flex; align-items: center; gap: 10px; font-size: 22px; margin-bottom: 15px; }
        .success-color { color: #4caf50; } .error-color { color: #f44336; }

        /* Navigation Buttons */
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 30px; border-top: 2px solid #f0f0f0; padding-top: 20px; }
        .btn { padding: 12px 24px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-prev { background: #e0e0e0; } .btn-next { background: var(--pastel-blue); color: white; }
        
        /* Animated Stage */
        .animation-stage {
            background: linear-gradient(to bottom, #e0f7fa, #b2ebf2); border-radius: 16px; padding: 30px 20px;
            position: relative; min-height: 350px; display: flex; flex-direction: column; justify-content: space-between;
        }
        .scene { display: flex; justify-content: space-around; align-items: flex-end; height: 150px; margin-top: 20px; }
        .character { text-align: center; opacity: 0.7; transition: 0.3s; }
        .character.active { transform: scale(1.2); opacity: 1; }
        .avatar { font-size: 60px; width: 100px; height: 100px; background: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 4px solid var(--pastel-blue); margin-bottom: 10px; }
        .name { font-weight: bold; background: white; padding: 2px 10px; border-radius: 10px; }
        .bubble-anim { background: white; border-radius: 15px; padding: 15px; margin: 20px auto; width: 80%; border-left: 5px solid var(--pastel-purple); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1><i class="fa-solid fa-microphone-lines"></i> Speaking: A1</h1>
            <p>Checking Understanding</p>
        </div>

        <div class="content">
            <div class="step active" id="step-1">
                <h2 class="step-title"><i class="fa-solid fa-clapperboard"></i> Animated Dialogue</h2>
                <div class="animation-stage" id="animationStage">
                    <div class="scene">
                        <div class="character" id="char-Paul"><div class="avatar">👨‍🔧</div><div class="name">Paul</div></div>
                        <div class="character" id="char-Bob"><div class="avatar">👷‍♂️</div><div class="name">Bob</div></div>
                    </div>
                    <div class="bubble-anim" id="chatBubbleAnim" style="display: none;">
                        <strong id="speakerNameAnim"></strong>: <span id="speakerTextAnim"></span>
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <button class="btn btn-next" id="playBtn" onclick="playAnimation()"><i class="fa-solid fa-play"></i> Bắt đầu xem hoạt cảnh</button>
                    </div>
                </div>
            </div>

            <div class="step" id="step-2">
                <h2 class="step-title"><i class="fa-solid fa-puzzle-piece"></i> Preparation Task</h2>
                <div id="prep-tasks-container"></div>
            </div>

            <div class="step" id="step-3">
                <h2 class="step-title"><i class="fa-solid fa-check-double"></i> Task 1</h2>
                <ul class="checkbox-list" id="task1-container"></ul>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn btn-next" onclick="checkTask1()" style="background: var(--pastel-green);">Kiểm tra đáp án</button>
                </div>
            </div>

            <div class="step" id="step-4">
                <h2 class="step-title"><i class="fa-solid fa-user-group"></i> Task 2: Roleplay with Bob</h2>
                
                <div class="role-selector-container">
                    <p>🎭 Bạn muốn đóng vai ai?</p>
                    <div class="role-buttons">
                        <button class="role-btn active" id="btn-role-task2-Paul" onclick="setRole('task2', 'Paul')">👨‍🔧 Paul</button>
                        <button class="role-btn" id="btn-role-task2-Bob" onclick="setRole('task2', 'Bob')">👷‍♂️ Bob</button>
                    </div>
                </div>

                <div class="chat-container" id="task2-container"></div>
            </div>

            <div class="step" id="step-5">
                <h2 class="step-title"><i class="fa-solid fa-phone-volume"></i> Task 3: Phone Roleplay</h2>
                
                <div class="role-selector-container">
                    <p>🎭 Bạn muốn đóng vai ai?</p>
                    <div class="role-buttons">
                        <button class="role-btn active" id="btn-role-task3-Receptionist" onclick="setRole('task3', 'Receptionist')">👩‍💼 Receptionist</button>
                        <button class="role-btn" id="btn-role-task3-Caller" onclick="setRole('task3', 'Caller')">🚚 Caller</button>
                    </div>
                </div>

                <div class="chat-container" id="task3-container"></div>
            </div>

            <div class="nav-buttons">
                <button class="btn btn-prev" id="btnPrev" onclick="navigate(-1)" style="visibility: hidden;">Quay lại</button>
                <button class="btn btn-next" id="btnNext" onclick="navigate(1)">Tiếp theo</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="feedbackModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-header" id="modalHeader"></div>
            <div class="modal-body" id="modalBody" style="font-size: 16px; line-height: 1.6; color: #4a4a4a;"></div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const prepTasks = [
            { id: 1, jumbled: "sorry. / I'm", answer: "I'm sorry", expRight: "Xuất sắc! <strong>'I'm sorry'</strong> là cách lịch sự nhất để bắt đầu.", expWrong: "Trật tự đúng là <strong>\"I'm sorry\"</strong>." },
            { id: 2, jumbled: "very well. / hear you / I can't", answer: "I can't hear you very well", expRight: "Rất chuẩn! Dùng modal verb <strong>'can't'</strong> đi với động từ nguyên thể 'hear'.", expWrong: "Trật tự đúng là: <strong>\"I can't hear you very well\"</strong>." },
            { id: 3, jumbled: "that / Could / say / again, please? / you", answer: "Could you say that again please", expRight: "Tuyệt vời! Dùng <strong>'Could you...?'</strong> là cách lịch sự để yêu cầu.", expWrong: "Trật tự đúng là: <strong>\"Could you say that again, please?\"</strong>." },
            { id: 4, jumbled: "don't understand. / I", answer: "I don't understand", expRight: "Đúng rồi! Câu cơ bản khi bạn chưa hiểu ý đối phương.", expWrong: "Trật tự đúng là: <strong>\"I don't understand.\"</strong>" },
            { id: 5, jumbled: "more slowly, / Can / please? / that / you repeat", answer: "Can you repeat that more slowly please", expRight: "Chính xác! Dùng Can/Could để nhờ người khác nói chậm lại.", expWrong: "Trật tự đúng là: <strong>\"Can you repeat that more slowly, please?\"</strong>" },
            { id: 6, jumbled: "you / Do / the hammer? / mean", answer: "Do you mean the hammer", expRight: "Rất tốt! 'Do you mean...' dùng để xác nhận lại ý của người nói.", expWrong: "Trật tự đúng là: <strong>\"Do you mean the hammer?\"</strong>" },
            { id: 7, jumbled: "Is / it? / this", answer: "Is this it", expRight: "Chuẩn xác! Mẫu câu hỏi ngắn gọn để xác nhận đồ vật.", expWrong: "Trật tự đúng là: <strong>\"Is this it?\"</strong>" },
            { id: 8, jumbled: "that's / Yes, / right!", answer: "Yes that's right", expRight: "Chính xác! Dùng khi bạn đồng ý.", expWrong: "Trật tự đúng là: <strong>\"Yes, that's right!\"</strong>" }
        ];

        const task1Data = [
            { id: 1, q: "Bob wants the hammer.", ans: "true", exp: "Đúng! Bob nói: 'could you pass me the hammer?'" },
            { id: 2, q: "Paul is ill.", ans: "true", exp: "Đúng! Paul nói 'my ears are blocked'." },
            { id: 3, q: "The hammer is in the toolbox.", ans: "true", exp: "Đúng! Bob nói 'It's in the toolbox'." },
            { id: 4, q: "The hammer is on the right.", ans: "false", exp: "Sai! Bob nói chiếc búa ở 'on the left'." },
            { id: 5, q: "Paul gives Bob the scissors.", ans: "false", exp: "Sai! Paul nhầm búa với 'spanner'." },
            { id: 6, q: "Paul thinks Bob spoke clearly.", ans: "false", exp: "Sai! Paul trách Bob 'Why didn't you say so?'." }
        ];

        // FULL DATA TASK 2
        const task2Dialogue = [
            { role: 'Bob', avatar: '👷‍♂️', text: "Excuse me, Paul, could you pass me the hammer?", answer: "excuse me paul could you pass me the hammer", expRight: "Rất tốt! Bạn bắt đầu hội thoại rất tự nhiên." },
            { role: 'Paul', avatar: '👨‍🔧', text: "I'm {sorry}, Bob, my ears are blocked. I can't {hear} you very {well}. Could you say that again, please?", answer: "i'm sorry bob my ears are blocked i can't hear you very well could you say that again please", expRight: "Tuyệt vời! Ngữ điệu rất liền mạch." },
            { role: 'Bob', avatar: '👷‍♂️', text: "The hammer. Please could you pass it to me?", answer: "the hammer please could you pass it to me", expRight: "Phát âm rất rõ ràng!" },
            { role: 'Paul', avatar: '👨‍🔧', text: "Sorry, Bob, I don't {understand}.", answer: "sorry bob i don't understand", expRight: "Nhấn trọng âm từ understand rất chuẩn!" },
            { role: 'Bob', avatar: '👷‍♂️', text: "No, Paul - I need the hammer. It's in the toolbox, on the left, under the scissors.", answer: "no paul i need the hammer it's in the toolbox on the left under the scissors", expRight: "Câu khá dài nhưng bạn làm rất tốt!" },
            { role: 'Paul', avatar: '👨‍🔧', text: "Sorry, Bob. Can you {repeat} that more {slowly}, please?", answer: "sorry bob can you repeat that more slowly please", expRight: "Ngữ điệu yêu cầu rất hay." },
            { role: 'Bob', avatar: '👷‍♂️', text: "The hammer ... in the toolbox ... on the left ... under the scissors.", answer: "the hammer in the toolbox on the left under the scissors", expRight: "Đọc ngắt nghỉ rất tốt." },
            { role: 'Paul', avatar: '👨‍🔧', text: "On the left ... under the scissors ... Ah! Do you {mean} the hammer? Is {this} it?", answer: "on the left under the scissors ah do you mean the hammer is this it", expRight: "Biểu cảm hỏi lại rất tuyệt!" },
            { role: 'Bob', avatar: '👷‍♂️', text: "Yes, that's {right}!", answer: "yes that's right", expRight: "Hoàn hảo! Bật âm đuôi /t/ rất tốt." }
        ];

        // FULL DATA TASK 3
        const task3Dialogue = [
            { role: 'Receptionist', avatar: '👩‍💼', text: "(Phone ringing) Good morning.", answer: "good morning", expRight: "Chào hỏi chuyên nghiệp!" },
            { role: 'Caller', avatar: '🚚', text: "Good morning. Is Noelia there, please?", answer: "good morning is noelia there please", expRight: "Rất tự nhiên!" },
            { role: 'Receptionist', avatar: '👩‍💼', text: "I'm {sorry}. I can't {hear} you very well.", answer: "i'm sorry i can't hear you very well", expRight: "Phát âm chuẩn xác!" },
            { role: 'Caller', avatar: '🚚', text: "Noelia. I have a package for her. I'm in a van in the street.", answer: "noelia i have a package for her i'm in a van in the street", expRight: "Tốt lắm!" },
            { role: 'Receptionist', avatar: '👩‍💼', text: "I'm sorry. Could you {say} that {again}, please?", answer: "i'm sorry could you say that again please", expRight: "Rất lịch sự!" },
            { role: 'Caller', avatar: '🚚', text: "I'm in a van. I've got a package for Noelia.", answer: "i'm in a van i've got a package for noelia", expRight: "Tuyệt vời!" },
            { role: 'Receptionist', avatar: '👩‍💼', text: "Ah! OK. You can park here. The code is 367HGV57.", answer: "ah ok you can park here the code is 367hgv57", expRight: "Phát âm rõ ràng!" },
            { role: 'Caller', avatar: '🚚', text: "OK. Do you {mean} the company car park?", answer: "ok do you mean the company car park", expRight: "Ngữ điệu lên giọng cuối câu chuẩn!" },
            { role: 'Receptionist', avatar: '👩‍💼', text: "Yes.", answer: "yes", expRight: "Tốt!" },
            { role: 'Caller', avatar: '🚚', text: "OK. Sorry, can you {repeat} the code more {slowly}, please?", answer: "ok sorry can you repeat the code more slowly please", expRight: "Yêu cầu rất tự nhiên!" },
            { role: 'Receptionist', avatar: '👩‍💼', text: "Yes, sorry! 3 ... 6 ... 7 ... H ... G ... V ... 5 ... 7.", answer: "yes sorry 3 6 7 h g v 5 7", expRight: "Đọc mã code rất rõ!" },
            { role: 'Caller', avatar: '🚚', text: "OK. 367 ... HGV ... 57?", answer: "ok 367 hgv 57", expRight: "Xác nhận tốt!" },
            { role: 'Receptionist', avatar: '👩‍💼', text: "Yes, that's {right}.", answer: "yes that's right", expRight: "Hoàn thành xuất sắc đoạn hội thoại!" }
        ];

        // --- STATE MANAGEMENT ---
        const activeRoles = {
            task2: 'Paul',
            task3: 'Receptionist'
        };

        function setRole(task, role) {
            activeRoles[task] = role;
            
            // Cập nhật UI nút bấm
            document.querySelectorAll(`[id^="btn-role-${task}"]`).forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-role-${task}-${role}`).classList.add('active');

            // Render lại khung chat
            if (task === 'task2') renderRoleplay('task2-container', task2Dialogue, 'task2');
            if (task === 'task3') renderRoleplay('task3-container', task3Dialogue, 'task3');
        }

        function renderRoleplay(containerId, dialogueData, taskName) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; // Clear cũ
            const selectedRole = activeRoles[taskName];

            dialogueData.forEach((line, index) => {
                let formattedText = line.text.replace(/\{([^}]+)\}/g, '<span class="blank">$1</span>');
                
                // Nếu dòng này là của nhân vật học sinh đang chọn -> Nút Micro
                if (line.role === selectedRole) {
                    container.innerHTML += `
                        <div class="chat-row student">
                            <div class="chat-bubble">
                                <div class="speaker-name">Bạn (${line.role})</div>
                                <div>${formattedText}</div>
                                <div>
                                    <button class="chat-mic-btn" id="mic-${taskName}-${index}" onclick="startSpeaking('${taskName}', ${index})">
                                        <i class="fa-solid fa-microphone"></i>
                                    </button>
                                </div>
                                <span class="speech-result-chat" id="result-${taskName}-${index}">Nhấn micro để nói...</span>
                            </div>
                            <div class="chat-avatar">${line.avatar}</div>
                        </div>
                    `;
                } 
                // Nếu dòng này là của nhân vật kia -> Nút Audio
                else {
                    // Loại bỏ format blank (chữ trong ngoặc) để máy đọc mượt
                    let cleanText = line.text.replace(/[{}]/g, ''); 
                    container.innerHTML += `
                        <div class="chat-row partner">
                            <div class="chat-avatar">${line.avatar}</div>
                            <div class="chat-bubble">
                                <div class="speaker-name">Đối tác (${line.role})</div>
                                <div>${cleanText}</div>
                                <button class="audio-btn" onclick="playSingleTTS('${cleanText.replace(/'/g, "\\'")}', '${line.role}')">
                                    <i class="fa-solid fa-volume-high"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        // --- APP INIT ---
        function initApp() {
            // Render Prep
            const prepContainer = document.getElementById('prep-tasks-container');
            prepTasks.forEach((task, index) => {
                prepContainer.innerHTML += `
                    <div class="task-item">
                        <div class="jumbled-words">${task.id}. ${task.jumbled}</div>
                        <div class="speaking-area">
                            <button class="mic-btn" id="mic-prep-${index}" onclick="startSpeaking('prep', ${index})"><i class="fa-solid fa-microphone"></i></button>
                            <div class="speech-result-chat" id="result-prep-${index}">Nhấn micro để đọc đáp án...</div>
                        </div>
                    </div>`;
            });

            // Render Task 1
            const task1Container = document.getElementById('task1-container');
            task1Data.forEach((task, index) => {
                task1Container.innerHTML += `<li><span>${task.id}. ${task.q}</span><div class="tf-options"><label><input type="radio" name="t1-q${index}" value="true"> True</label><label><input type="radio" name="t1-q${index}" value="false"> False</label></div></li>`;
            });

            // Init Roleplays
            renderRoleplay('task2-container', task2Dialogue, 'task2');
            renderRoleplay('task3-container', task3Dialogue, 'task3');
        }

        // --- NAVIGATION ---
        let currentStep = 1;
        const totalSteps = 5;
        function navigate(dir) {
            document.getElementById(`step-${currentStep}`).classList.remove('active');
            currentStep += dir;
            document.getElementById(`step-${currentStep}`).classList.add('active');
            document.getElementById('btnPrev').style.visibility = currentStep === 1 ? 'hidden' : 'visible';
            document.getElementById('btnNext').style.display = currentStep === totalSteps ? 'none' : 'block';
        }

        // --- TTS & SPEECH RECOGNITION ---
        function playSingleTTS(text, speaker) {
            if (!('speechSynthesis' in window)) return alert("Trình duyệt không hỗ trợ phát giọng nói.");
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-GB';
            utterance.rate = 0.9;
            utterance.pitch = (speaker === 'Bob' || speaker === 'Caller') ? 1.1 : 0.9;
            window.speechSynthesis.speak(utterance);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if (SpeechRecognition) { recognition = new SpeechRecognition(); recognition.continuous = false; recognition.lang = 'en-US'; }

        function startSpeaking(type, index) {
            if (!recognition) return alert("Trình duyệt không hỗ trợ micro.");
            document.querySelectorAll('.mic-btn, .chat-mic-btn').forEach(btn => btn.classList.remove('recording'));
            
            const btn = document.getElementById(`mic-${type}-${index}`);
            const resultBox = document.getElementById(`result-${type}-${index}`);
            btn.classList.add('recording'); resultBox.innerText = "Đang nghe...";

            try { recognition.start(); } catch (e) { recognition.stop(); setTimeout(() => recognition.start(), 100); }

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                resultBox.innerText = `Bạn nói: "${transcript}"`;
                checkSpeechResult(transcript, type, index);
            };

            recognition.onerror = () => { resultBox.innerText = "Không nghe rõ!"; btn.classList.remove('recording'); };
            recognition.onend = () => btn.classList.remove('recording');
        }

        // Loại bỏ số đếm thành chữ để check dễ hơn
        function normalizeText(text) {
            return text.toLowerCase().replace(/[.,?!]/g, '')
                       .replace(/three/g, '3').replace(/six/g, '6').replace(/seven/g, '7').replace(/five/g, '5')
                       .replace(/\s+/g, ' ').trim();
        }

        function checkSpeechResult(transcript, type, index) {
            const spokenText = normalizeText(transcript);
            let targetText = '', expRight = '', expWrong = 'Chú ý phát âm rõ và đọc trôi chảy cả câu nhé.';

            if (type === 'prep') {
                targetText = normalizeText(prepTasks[index].answer); expRight = prepTasks[index].expRight;
            } else if (type === 'task2') {
                targetText = normalizeText(task2Dialogue[index].answer); expRight = task2Dialogue[index].expRight;
            } else if (type === 'task3') {
                targetText = normalizeText(task3Dialogue[index].answer); expRight = task3Dialogue[index].expRight;
            }

            const isCorrect = targetText.includes(spokenText) && spokenText.length > targetText.length * 0.6 || spokenText === targetText;

            setTimeout(() => {
                if (isCorrect) showModal(true, "Tuyệt vời!", expRight);
                else showModal(false, "Cần luyện tập thêm", `Hệ thống nghe được: <em>"${transcript}"</em>.<br><br>` + expWrong);
            }, 500);
        }

        // --- TASK 1 CHECK & MODAL ---
        function checkTask1() {
            let allCorrect = true; let feedbackHTML = "";
            task1Data.forEach((task, index) => {
                const selected = document.querySelector(`input[name="t1-q${index}"]:checked`);
                if (!selected) { allCorrect = false; feedbackHTML += `<li><strong>Câu ${task.id}:</strong> Chưa chọn đáp án.</li>`; } 
                else if (selected.value === task.ans) feedbackHTML += `<li><span class="success-color">✔ Câu ${task.id}: Đúng!</span> <br><small>${task.exp}</small></li>`;
                else { allCorrect = false; feedbackHTML += `<li><span class="error-color">✘ Câu ${task.id}: Sai.</span> <br><small>${task.exp}</small></li>`; }
            });
            showModal(allCorrect, allCorrect ? "Làm tốt lắm!" : "Sửa bài tập Task 1", `<ul style="list-style:none; padding:0; display:flex; flex-direction:column; gap:10px;">${feedbackHTML}</ul>`);
        }

        function showModal(isCorrect, titleText, bodyText) {
            document.getElementById('modalHeader').innerHTML = `<i class="fa-solid fa-circle-${isCorrect ? 'check' : 'xmark'} ${isCorrect ? 'success' : 'error'}-color"></i> <span class="${isCorrect ? 'success' : 'error'}-color">${titleText}</span>`;
            document.getElementById('modalBody').innerHTML = bodyText;
            document.getElementById('feedbackModal').classList.add('active');
        }
        function closeModal() { document.getElementById('feedbackModal').classList.remove('active'); }

        // --- ANIMATED DIALOGUE (Step 1) ---
        const animDialogueData = [
            { speaker: "Bob", text: "Excuse me, Paul, could you pass me the hammer?" },
            { speaker: "Paul", text: "Sorry, Bob, my ears are blocked. I can't hear you very well. Could you say that again, please?" },
            { speaker: "Bob", text: "The hammer. Please could you pass it to me?" },
            { speaker: "Paul", text: "The spanner?" },
            { speaker: "Bob", text: "No. The hammer!" },
            { speaker: "Paul", text: "Sorry, Bob, I don't understand. This is the spanner!" },
            { speaker: "Bob", text: "No, Paul, I need the hammer. It's in the toolbox, on the left, under the scissors." },
            { speaker: "Paul", text: "Sorry, Bob. Could you repeat that more slowly, please?" },
            { speaker: "Bob", text: "The hammer... in the toolbox... on the left... under the scissors." },
            { speaker: "Paul", text: "On the left... under the scissors... Oh! Do you mean the hammer? Is this it?" },
            { speaker: "Bob", text: "Yes, that's right!" }
        ];
        let animCurrentLine = 0; let isAnimPlaying = false;
        function playAnimation() {
            if (isAnimPlaying) return;
            document.getElementById('playBtn').style.display = 'none';
            isAnimPlaying = true; animCurrentLine = 0;
            if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); playNextAnimLine(); }
        }
        function playNextAnimLine() {
            if (animCurrentLine >= animDialogueData.length) {
                document.getElementById('char-Paul').classList.remove('active'); document.getElementById('char-Bob').classList.remove('active');
                document.getElementById('chatBubbleAnim').style.display = 'none'; document.getElementById('playBtn').style.display = 'inline-block'; document.getElementById('playBtn').innerHTML = '<i class="fa-solid fa-rotate-right"></i> Xem lại';
                isAnimPlaying = false; return;
            }
            const line = animDialogueData[animCurrentLine];
            document.getElementById('char-Paul').classList.remove('active'); document.getElementById('char-Bob').classList.remove('active');
            document.getElementById(`char-${line.speaker}`).classList.add('active');
            document.getElementById('chatBubbleAnim').style.display = 'block';
            document.getElementById('speakerNameAnim').innerText = line.speaker;
            document.getElementById('speakerTextAnim').innerText = line.text;
            const utterance = new SpeechSynthesisUtterance(line.text); utterance.lang = 'en-GB'; utterance.rate = 0.9; utterance.pitch = line.speaker === 'Bob' ? 1.2 : 0.8;
            utterance.onend = function() { animCurrentLine++; setTimeout(playNextAnimLine, 500); };
            window.speechSynthesis.speak(utterance);
        }

        window.onload = initApp;
    </script>
    
</body>
</html>
