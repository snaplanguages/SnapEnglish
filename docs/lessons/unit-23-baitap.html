    <script>
        const exData = [
            ["Question 1 [516016]: _______, he would have been able to pass the exam.", 
            ["A. If he had studied more hard-working", "B. If he had been studied more hard-working", "C. If he studied more hard-working", "D. If he studies more hard-working"], 0, 
            "<ul><li><strong>A đúng:</strong> Mệnh đề chính dùng 'would have been' -> Đây là Câu điều kiện loại 3 (trái với quá khứ). Cấu trúc mệnh đề If: If + S + had + V3/ed.</li><li><strong>B sai:</strong> Dư 'been' tạo thành câu bị động (Nếu anh ấy BỊ học chăm chỉ hơn), sai nghĩa hoàn toàn.</li><li><strong>C sai:</strong> Sai thì (Đây là cấu trúc ĐK loại 2).</li><li><strong>D sai:</strong> Sai thì (Đây là cấu trúc ĐK loại 1).</li></ul>"],

            ["Question 2 [516017]: According to some historians, if Napoleon had not invaded Russia, he _______ the rest of the world.", 
            ["A. had conquered", "B. would conquer", "C. would have conquered", "D. conquered"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai cấu trúc mệnh đề chính của Câu điều kiện loại 3.</li><li><strong>C đúng:</strong> Dấu hiệu mệnh đề If: 'had not invaded' (Quá khứ hoàn thành) -> ĐK loại 3. Mệnh đề chính phải là: S + would have + V3/ed.</li></ul>"],

            ["Question 3 [516018]: Tony would have forgotten the appointment if I _______ him.", 
            ["A. don't remind", "B. didn't remind", "C. hadn't reminded", "D. reminded"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai cấu trúc thì cho mệnh đề If của ĐK loại 3. Đồng thời D bị ngược nghĩa (Nếu tôi nhắc nhở anh ấy thì anh ấy đã quên -> Vô lý).</li><li><strong>C đúng:</strong> Mệnh đề chính 'would have forgotten' -> ĐK loại 3. Mệnh đề If phải dùng QKHT (had + V3/ed). Hợp nghĩa: Nếu tôi ĐÃ KHÔNG nhắc, anh ấy ĐÃ quên.</li></ul>"],

            ["Question 4 [516019]: \"I'm going out now.\" - \"If you _______ to pass a chemist's, please get me some aspirins?\"", 
            ["A. had happen", "B. happen", "C. happened", "D. have happened"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Không khớp với cấu trúc ĐK loại 1 dạng mệnh lệnh.</li><li><strong>B đúng:</strong> Mệnh đề chính là câu cầu khiến/mệnh lệnh ('please get me...'). Đây là Câu điều kiện loại 1. Mệnh đề If chia ở hiện tại đơn (happen).</li></ul>"],

            ["Question 5 [516020]: \"What would you do in my position?\" - \"If I _______ like that, I would complain to the manager.\"", 
            ["A. treated", "B. had treated", "C. were treated", "D. treat"], 2, 
            "<ul><li><strong>A sai:</strong> Dùng chủ động 'treated' nghĩa là 'Nếu tôi ĐỐI XỬ như vậy', không hợp logic.</li><li><strong>B, D sai:</strong> Sai thì của ĐK loại 2.</li><li><strong>C đúng:</strong> Câu hỏi 'What would you do...' -> ĐK loại 2 (giả định không có thật ở HT). Mệnh đề If chia ở Quá khứ đơn, mang nghĩa Bị Động ('Nếu tôi BỊ ĐỐI XỬ như vậy...'). Tobe của ĐK loại 2 luôn dùng 'were'.</li></ul>"],

            ["Question 6 [516021]: If I had revised more carefully, I _______ better in the last exam.", 
            ["A. would do", "B. would have done", "C. will do", "D. wouldn't have done"], 1, 
            "<ul><li><strong>A, C sai:</strong> Sai cấu trúc mệnh đề chính ĐK loại 3.</li><li><strong>B đúng:</strong> Mệnh đề If: 'had revised' (QKHT) -> ĐK loại 3. Mệnh đề chính là 'would have + V3/ed'. Nghĩa tích cực: 'Tôi ĐÃ CÓ THỂ làm bài tốt hơn'.</li><li><strong>D sai:</strong> Ngược nghĩa (Tôi đã KHÔNG làm tốt hơn).</li></ul>"],

            ["Question 7 [516022]: The book would have been perfect if it _______ for the ending.", 
            ["A. had not been", "B. weren't", "C. isn't", "D. had been"], 0, 
            "<ul><li><strong>A đúng:</strong> Mệnh đề chính 'would have been' -> ĐK loại 3. Có cấu trúc cố định: <strong>If it hadn't been for + N</strong> (Nếu không vì...). Cuốn sách đã hoàn hảo nếu không vì cái kết của nó.</li><li><strong>B, C, D sai:</strong> B/C sai thì, D sai nghĩa.</li></ul>"],

            ["Question 8 [516023]: He said if he had not answered the phone at the petroleum station then, he _______ a fine.", 
            ["A. would pay", "B. hadn't paid", "C. had been paid", "D. wouldn't have had to pay"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Sai cấu trúc mệnh đề chính ĐK loại 3. 'hadn't paid' và 'had been paid' là cấu trúc mệnh đề If.</li><li><strong>D đúng:</strong> Dấu hiệu 'had not answered' -> ĐK loại 3. Cấu trúc S + would(n't) have + V3/ed. Dịch: Nếu lúc đó anh ta không nghe điện thoại, anh ta đã KHÔNG PHẢI NỘP phạt.</li></ul>"],

            ["Question 9 [516024]: If _______ taller, I might be better at basketball.", 
            ["A. I am", "B. I were", "C. I had been", "D. were I"], 1, 
            "<ul><li><strong>A, C sai:</strong> Mệnh đề chính dùng 'might be' (tương đương would be) -> ĐK loại 2. Nên mệnh đề If không thể dùng HTĐ (am) hay QKHT (had been).</li><li><strong>B đúng:</strong> ĐK loại 2 dùng tobe là 'were' cho mọi ngôi.</li><li><strong>D sai:</strong> Đây là dạng đảo ngữ, nhưng vẫn giữ từ 'If' ở đầu nên sai (Nếu đảo ngữ thì phải bỏ If: Were I taller,...).</li></ul>"],

            ["Question 10 [516025]: _______ the book, please give it to me.", 
            ["A. If you find", "B. If you had found", "C. Were you to find", "D. If you found"], 0, 
            "<ul><li><strong>A đúng:</strong> Mệnh đề sau là câu mệnh lệnh 'please give...' -> ĐK loại 1. Mệnh đề If chia ở hiện tại đơn (If you find).</li><li><strong>B, C, D sai:</strong> Đều là cấu trúc của ĐK loại 2 và 3, không đi với câu mệnh lệnh hiện tại.</li></ul>"],

            ["Question 11 [516026]: If she _______ sick, she would have gone out with me to the party.", 
            ["A. wasn't", "B. hadn't been", "C. hasn't been", "D. weren't"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Không khớp thì với mệnh đề chính của ĐK loại 3.</li><li><strong>B đúng:</strong> Mệnh đề chính 'would have gone' -> ĐK loại 3. Mệnh đề If chia ở QKHT (had + V3/ed -> hadn't been). Dịch: Nếu cô ấy KHÔNG ỐM (trong quá khứ), cô ấy đã đi chơi với tôi.</li></ul>"],

            ["Question 12 [516027]: If anyone _______, the plan will be reconsidered.", 
            ["A. object", "B. objects", "C. objected", "D. had objected"], 1, 
            "<ul><li><strong>A sai:</strong> Đại từ bất định (anyone, someone, nobody...) luôn đi với động từ số ít (phải thêm s/es).</li><li><strong>B đúng:</strong> Mệnh đề chính 'will be' -> ĐK loại 1. 'anyone' là số ít nên động từ chia 'objects'.</li><li><strong>C, D sai:</strong> Sai thì (quá khứ).</li></ul>"],

            ["Question 13 [516028]: If I had known that you were ill last week, _______.", 
            ["A. I would have gone to see you", "B. I would go to see you", "C. I will go to see you", "D. I shall have gone to see you"], 0, 
            "<ul><li><strong>A đúng:</strong> Mệnh đề If 'had known' -> ĐK loại 3. Mệnh đề chính phải là 'would have + V3/ed'.</li><li><strong>B, C, D sai:</strong> B là ĐK loại 2. C là ĐK loại 1. D sai trợ động từ (thường không dùng shall have V3 cho cấu trúc If).</li></ul>"],

            ["Question 14 [516029]: Students will not be allowed into the exam room if they _______ their student cards.", 
            ["A. don't produce", "B. didn't produce", "C. produced", "D. hadn't produced"], 0, 
            "<ul><li><strong>A đúng:</strong> Mệnh đề chính 'will not be allowed' -> ĐK loại 1. Mệnh đề If chia ở Hiện tại đơn (don't produce: không xuất trình).</li><li><strong>B, D sai:</strong> Sai thì (quá khứ).</li><li><strong>C sai:</strong> Ngược nghĩa (Nếu họ XUẤT TRÌNH thì sẽ KHÔNG được vào phòng thi -> Vô lý).</li></ul>"],

            ["Question 15 [516030]: If it hadn't been for your help, I _______ the technical problem with my computer the other day.", 
            ["A. wouldn't solve", "B. couldn't have solved", "C. could solve", "D. can't solve"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> A và C là cấu trúc mệnh đề chính ĐK loại 2. D là ĐK loại 1.</li><li><strong>B đúng:</strong> Dấu hiệu 'hadn't been for' -> ĐK loại 3. Mệnh đề chính dùng 'would/could have + V3/ed'. Dịch: Nếu không có sự giúp đỡ của bạn, tôi ĐÃ KHÔNG THỂ GIẢI QUYẾT được vấn đề kỹ thuật.</li></ul>"],

            ["Question 16 [516031]: If Martin were here now, he _______ us to solve this difficult problem.", 
            ["A. would help", "B. helps", "C. will help", "D. has helped"], 0, 
            "<ul><li><strong>A đúng:</strong> Dấu hiệu 'were here now' -> Giả định không có thật ở hiện tại -> ĐK loại 2. Mệnh đề chính là 'would + V(bare)'.</li><li><strong>B, C, D sai:</strong> Thuộc ĐK loại 1 hoặc sai thì cơ bản.</li></ul>"],

            ["Question 17 [516032]: If he didn't have to work today, he _______ his children to the zoo.", 
            ["A. will take", "B. takes", "C. would take", "D. has taken"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Thuộc ĐK loại 1 hoặc sai thì cơ bản.</li><li><strong>C đúng:</strong> Dấu hiệu 'didn't have to work' (Quá khứ đơn) -> ĐK loại 2. Mệnh đề chính là 'would + V(bare)'.</li></ul>"],

            ["Question 18 [516033]: If you didn't have to leave today, I _______ you around the city.", 
            ["A. have shown", "B. showed", "C. will show", "D. would show"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Sai cấu trúc mệnh đề chính ĐK loại 2.</li><li><strong>D đúng:</strong> Tương tự câu 17, 'didn't have to' -> ĐK loại 2. Mệnh đề chính dùng 'would show' (Tôi sẽ dẫn bạn đi vòng quanh thành phố).</li></ul>"],

            ["Question 19 [516034]: If our teacher were here now, he _______ us with this difficult exercise.", 
            ["A. has helped", "B. helps", "C. will help", "D. would help"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Thuộc ĐK loại 1 hoặc sai thì.</li><li><strong>D đúng:</strong> Dấu hiệu 'were here now' -> ĐK loại 2. Mệnh đề chính: 'would help' (Thầy giáo sẽ giúp chúng ta).</li></ul>"],

            ["Question 20 [516035]: If he were younger, he _______ a professional running competition now.", 
            ["A. will join", "B. had joined", "C. would have joined", "D. would join"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> A là ĐK loại 1. B, C là ĐK loại 3.</li><li><strong>D đúng:</strong> Dấu hiệu 'were younger' -> ĐK loại 2. Mệnh đề chính dùng 'would join' (Anh ấy sẽ tham gia).</li></ul>"],

            ["Question 21 [516036]: If you watch this film, you _______ about the cultures of Southeast Asian countries.", 
            ["A. learned", "B. were learning", "C. will learn", "D. would learn"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai thì. 'would learn' dùng cho ĐK loại 2.</li><li><strong>C đúng:</strong> Dấu hiệu mệnh đề If: 'watch' (Hiện tại đơn) -> ĐK loại 1. Mệnh đề chính chia Tương lai đơn (will learn).</li></ul>"],

            ["Question 22 [516037]: If he were better qualified, he _______ get the job.", 
            ["A. will", "B. can", "C. may", "D. could"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Dùng cho ĐK loại 1.</li><li><strong>D đúng:</strong> Mệnh đề If 'were better qualified' -> ĐK loại 2. Mệnh đề chính dùng 'would/could/might + V'. Dùng 'could' để chỉ khả năng (anh ấy đã CÓ THỂ nhận được việc).</li></ul>"],

            ["Question 23 [516038]: If life _______ predictable it would cease to be life, and be without flavor.", 
            ["A. is", "B. would be", "C. were", "D. had been"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> A là ĐK loại 1. B là cấu trúc mệnh đề chính. D là ĐK loại 3.</li><li><strong>C đúng:</strong> Mệnh đề chính 'would cease to be' -> ĐK loại 2. Mệnh đề If dùng Tobe là 'were' cho tất cả các ngôi.</li></ul>"],

            ["Question 24 [516039]: That sounds like a good offer. I _______ it if I _______ you.", 
            ["A. would accept - were", "B. accepted - would be", "C. accept - will be", "D. will accept - were"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc ĐK loại 2 dùng để khuyên bảo: 'If I were you, I would + V' (Nếu tôi là bạn, tôi sẽ...). Vị trí mệnh đề If bị đảo ra sau: I would accept it if I were you.</li><li><strong>B, C, D sai:</strong> Xếp sai trật tự động từ hoặc sai thì.</li></ul>"],

            ["Question 25 [516040]: If he improved his IT skills, he _______ a job.", 
            ["A. will easily get", "B. would easily get", "C. will easily have got", "D. would easily have got"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Lệch thì. D dùng cho ĐK loại 3.</li><li><strong>B đúng:</strong> Mệnh đề If 'improved' (Quá khứ đơn) -> ĐK loại 2. Mệnh đề chính dùng 'would + V(bare)' (would easily get).</li></ul>"],

            ["Question 26 [516041]: If he _______ a thorough knowledge of English, he could have applied for this post.", 
            ["A. had had", "B. had", "C. has", "D. has had"], 0, 
            "<ul><li><strong>A đúng:</strong> Mệnh đề chính 'could have applied' -> ĐK loại 3. Mệnh đề If chia ở Quá khứ hoàn thành (had + V3/ed). Động từ chính 'có' là 'have' -> V3/ed là 'had'. Gộp lại thành 'had had'.</li><li><strong>B, C, D sai:</strong> B là ĐK loại 2. C, D dùng cho hiện tại.</li></ul>"],

            ["Question 27 [516042]: If it _______ their encouragement, he could have given it up.", 
            ["A. hadn't been for", "B. wouldn't have been for", "C. had been for", "D. hadn't been"], 0, 
            "<ul><li><strong>A đúng:</strong> Mệnh đề chính 'could have given' -> ĐK loại 3. Cấu trúc cố định: 'If it hadn't been for + N' (Nếu không vì sự động viên của họ, anh ấy đã bỏ cuộc).</li><li><strong>B, C, D sai:</strong> B sai cấu trúc mệnh đề If. C sai nghĩa (Nếu VÌ sự động viên -> bỏ cuộc là vô lý). D thiếu giới từ 'for'.</li></ul>"],

            ["Question 28 [516043]: If I were in charge, I _______ things differently.", 
            ["A. had done", "B. would do", "C. would have done", "D. will do"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> A, C dùng cho ĐK loại 3. D dùng cho ĐK loại 1.</li><li><strong>B đúng:</strong> Mệnh đề If 'were in charge' -> ĐK loại 2. Mệnh đề chính dùng 'would + V(bare)'. (Nếu tôi chịu trách nhiệm, tôi sẽ làm mọi thứ khác đi).</li></ul>"],

            ["Question 29 [516044]: If a drop of oil is placed in a glass of water, it _______ to the top.", 
            ["A. floats", "B. would float", "C. will float", "D. should float"], 2, 
            "<ul><li><strong>A đúng / C cũng đúng:</strong> Đây là sự thật hiển nhiên (dầu nổi trên mặt nước) nên có thể dùng Câu điều kiện loại 0 (hiện tại - hiện tại) -> 'floats'. TUY NHIÊN, trong format trắc nghiệm chuẩn của Việt Nam, cấu trúc ĐK loại 1 'will float' thường được ưu tiên làm đáp án chính thức.</li><li><strong>B, D sai:</strong> Dùng cho ĐK loại 2 hoặc mang nghĩa khuyên bảo.</li></ul>"],

            ["Question 30 [516045]: If we are not busy this weekend, we _______ the new fruit farm in the countryside.", 
            ["A. will visit", "B. would visit", "C. would have visited", "D. visited"], 0, 
            "<ul><li><strong>A đúng:</strong> Mệnh đề If 'are not busy' (Hiện tại đơn) -> ĐK loại 1 (sự việc có thể xảy ra ở tương lai). Mệnh đề chính dùng Tương lai đơn (will visit).</li><li><strong>B, C, D sai:</strong> Sai cấu trúc thì tương ứng với mệnh đề If.</li></ul>"]
        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        const card = document.createElement("div");
        card.className = `exercise-card`;

        let htmlContent = `
            <h2 class="ex-title">🔥 Trắc Nghiệm: 30 Câu Điều Kiện</h2>
            <div class="tip-box">
                <span>💡 <strong>Mẹo làm bài:</strong> Hãy xác định VẾ ĐÃ CHO TRƯỚC đang ở thì gì (Hiện tại / Quá khứ / Quá khứ hoàn thành) để suy ngược ra đây là Câu điều kiện Loại 1, 2 hay 3 nhé!</span>
            </div>
            <div id="questions-container"></div>
        `;

        card.innerHTML = htmlContent;
        app.appendChild(card);

        const qContainer = document.getElementById("questions-container");

        exData.forEach((qObj, qIndex) => {
            const [qText, options, correctIndex, expText] = qObj;
            
            const qBlock = document.createElement("div");
            qBlock.className = "question-block";

            const qTitle = document.createElement("div");
            qTitle.className = "question-text";
            qTitle.innerText = qText;
            qBlock.appendChild(qTitle);

            const optContainer = document.createElement("div");
            optContainer.className = "options";
            
            const expDiv = document.createElement("div");
            expDiv.className = "explanation";

            options.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = opt; // Using innerHTML if options have tags
                
                btn.onclick = () => {
                    const siblings = optContainer.querySelectorAll(".option-btn");
                    siblings.forEach(sibling => sibling.disabled = true);

                    if(idx === correctIndex) {
                        btn.classList.add("correct");
                        currentScore++;
                        scoreDisplay.innerText = currentScore;
                        expDiv.classList.add("success", "show");
                        expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${expText}`;
                    } else {
                        btn.classList.add("incorrect");
                        siblings[correctIndex].classList.add("correct");
                        expDiv.classList.add("error", "show");
                        expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> ${expText}`;
                    }
                };
                optContainer.appendChild(btn);
            });

            qBlock.appendChild(optContainer);
            qBlock.appendChild(expDiv);
            qContainer.appendChild(qBlock);
        });
    </script>
</body>
</html>
