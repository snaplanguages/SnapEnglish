    <script>
        const exercises = [
            {
                title: "Exercise 1. [201301]: Chia dạng đúng của động từ trong ngoặc",
                tip: "Xác định rõ chủ ngữ là số ít hay số nhiều, chú ý các từ đặc biệt (Dominoes, Neither... nor..., A large number of...) và thì của câu.",
                colorClass: "color-1",
                icon: "📝",
                questions: [
                    { q: "Question 1 [515052]: What really concerned her (be) _______ her secrets.", options: ["A. is", "B. are", "C. was", "D. were"], a: "C. was", exp: "Mệnh đề danh từ 'What really concerned her' làm chủ ngữ -> động từ chia số ít. Động từ 'concerned' chia quá khứ nên to be là 'was'." },
                    { q: "Question 2 [515053]: Dominoes (be) _______ a game in which you try to match the spots of a domino put down by another player.", options: ["A. is", "B. are", "C. was", "D. were"], a: "A. is", exp: "'Dominoes' là tên một trò chơi, mặc dù có 's' nhưng vẫn là danh từ số ít -> chia 'is'." },
                    { q: "Question 3 [515054]: Many pupils (have) _______ extra classes in the evenings or at weekends.", options: ["A. has", "B. have", "C. is having", "D. was having"], a: "B. have", exp: "'Many pupils' là danh từ đếm được số nhiều -> động từ chia số nhiều 'have'." },
                    { q: "Question 4 [515055]: Snakes and lizards (be) _______ cold-blooded animals.", options: ["A. is", "B. are", "C. was", "D. were"], a: "B. are", exp: "Hai chủ ngữ nối với nhau bằng 'and' tạo thành danh từ số nhiều -> 'are'." },
                    { q: "Question 5 [515056]: None of my children (have) _______ blue eyes.", options: ["A. has", "B. are", "C. is", "D. was"], a: "A. has", exp: "'None of + danh từ số nhiều' có thể dùng với động từ số ít hoặc số nhiều. Tuy nhiên, theo ngữ pháp chuẩn mực trong các bài thi, thường ưu tiên chia số ít -> 'has'." },
                    { q: "Question 6 [515057]: There (be) _______ someone outside the house.", options: ["A. are", "B. is", "C. have", "D. were"], a: "B. is", exp: "Cấu trúc 'There + be + N'. 'Someone' là đại từ bất định (số ít) -> 'is'." },
                    { q: "Question 7 [515058]: Neither she nor her children (be) _______ injured in the accident last week.", options: ["A. was", "B. were", "C. is", "D. are"], a: "B. were", exp: "Cấu trúc 'Neither S1 nor S2', động từ chia theo S2 (her children - số nhiều). Dấu hiệu 'last week' -> quá khứ 'were'." },
                    { q: "Question 8 [515059]: One of the men (be) _______ here to see you, sir.", options: ["A. is", "B. are", "C. have", "D. were"], a: "A. is", exp: "Cấu trúc 'One of + danh từ số nhiều' làm chủ ngữ thì động từ luôn chia ở số ít -> 'is'." },
                    { q: "Question 9 [515060]: Listening to music (be) _______ my hobby.", options: ["A. are", "B. were", "C. is", "D. have been"], a: "C. is", exp: "Danh động từ (V-ing) làm chủ ngữ -> động từ chia số ít -> 'is'." },
                    { q: "Question 10 [515061]: Researchers say people whose eyes are blue (have) _______ a common ancestor.", options: ["A. has", "B. have", "C. is", "D. are"], a: "B. have", exp: "Chủ ngữ của mệnh đề này là 'people' (số nhiều) -> 'have'." },
                    { q: "Question 11 [515062]: Ten pounds (donate) _______ to charity for every bottle sold.", options: ["A. is donated", "B. are donated", "C. donates", "D. donate"], a: "A. is donated", exp: "Đại lượng chỉ tiền bạc ('Ten pounds') được tính là số ít -> 'is donated' (Bị động)." },
                    { q: "Question 12 [515063]: A large number of tickets (be) _______ sold almost immediately this morning.", options: ["A. is", "B. are", "C. was", "D. were"], a: "D. were", exp: "Cấu trúc 'A number of / A large number of + N(số nhiều) + V(số nhiều)'. Dấu hiệu 'this morning' (đã xảy ra) -> 'were'." },
                    { q: "Question 13 [515064]: Romeo and Juliet (be) _______ a tragedy written by William Shakespeare.", options: ["A. is", "B. are", "C. was", "D. were"], a: "A. is", exp: "'Romeo and Juliet' là tên của MỘT vở kịch -> động từ chia số ít 'is'." },
                    { q: "Question 14 [515065]: Diabetes (be) _______ a disease in which the body cannot control the level of sugar in the blood.", options: ["A. are", "B. is", "C. was", "D. were"], a: "B. is", exp: "'Diabetes' (bệnh tiểu đường) là tên một căn bệnh, dù tận cùng là 's' nhưng là danh từ số ít -> 'is'." },
                    { q: "Question 15 [515066]: Wales (be) _______ a country that is part of the United Kingdom.", options: ["A. are", "B. is", "C. was", "D. were"], a: "B. is", exp: "'Wales' là tên một quốc gia -> danh từ số ít -> 'is'." },
                    { q: "Question 16 [515067]: Many people never (do) _______ any exercise.", options: ["A. does", "B. doing", "C. do", "D. is doing"], a: "C. do", exp: "'Many people' là danh từ số nhiều -> động từ giữ nguyên 'do'." },
                    { q: "Question 17 [515068]: The rich (be) _______ the people who (have) _______ a lot of money.", options: ["A. is - has", "B. are - have", "C. is - have", "D. are - has"], a: "B. are - have", exp: "Cấu trúc 'The + Adjective' (The rich) chỉ một tầng lớp người -> chia số nhiều. Đại từ quan hệ 'who' thay cho 'the people' (số nhiều) -> chia 'have'." },
                    { q: "Question 18 [515069]: Not only she but also her sisters (study) _______ English well.", options: ["A. studies", "B. study", "C. studying", "D. is studying"], a: "B. study", exp: "Cấu trúc 'Not only S1 but also S2', động từ chia theo S2 ('her sisters' - số nhiều) -> 'study'." },
                    { q: "Question 19 [515070]: That bottle of champagne together with those chocolates (be) _______ used to make a nice present.", options: ["A. are", "B. were", "C. is", "D. have been"], a: "C. is", exp: "S1 + together with + S2 -> động từ chia theo S1 ('That bottle' - số ít) -> 'is'." },
                    { q: "Question 20 [515071]: Nobody (know) _______ the reason why she is crying.", options: ["A. know", "B. knows", "C. is knowing", "D. knowing"], a: "B. knows", exp: "Các đại từ bất định (Nobody, everyone, someone...) luôn đi với động từ số ít -> 'knows'." }
                ]
            },
            {
                title: "Exercise 2. [201302]: Chọn đáp án đúng để hoàn thành các câu dưới đây",
                tip: "Phân tích kỹ cấu trúc câu để nhận diện chủ ngữ chính của câu. Áp dụng chuẩn các nguyên tắc hòa hợp chủ - vị.",
                colorClass: "color-2",
                icon: "🎯",
                questions: [
                    { q: "Question 1 [515072]: Each of the pumpkins in the field _______ they could become a jack-o-lantern.", options: ["A. wishes", "B. wish", "C. had wished", "D. is wishing"], a: "A. wishes", exp: "'Each of + danh từ số nhiều' -> động từ chia ở số ít." },
                    { q: "Question 2 [515073]: The staff _______ deciding how they want to vote.", options: ["A. are", "B. has been", "C. is", "D. was"], a: "A. are", exp: "Từ 'they' ở vế sau cho thấy 'The staff' ở đây đang chỉ từng thành viên trong đội ngũ (số nhiều) -> dùng 'are'." },
                    { q: "Question 3 [515074]: Digging holes in the yard _______ Doodle's favorite thing to do.", options: ["A. are", "B. is", "C. was", "D. were"], a: "B. is", exp: "Cụm danh động từ (V-ing) làm chủ ngữ -> động từ luôn chia số ít." },
                    { q: "Question 4 [515075]: Mathematics _______ John's favorite subject, while Civics _______ Andrea's favorite subject.", options: ["A. are - are", "B. is - are", "C. is - is", "D. are - is"], a: "C. is - is", exp: "Tên môn học (Mathematics, Civics) dù có tận cùng là 's' vẫn là danh từ số ít." },
                    { q: "Question 5 [515076]: Neither you nor he _______ responsible for recruiting and training new staff.", options: ["A. ha", "B. have", "C. are", "D. is"], a: "D. is", exp: "Cấu trúc 'Neither S1 nor S2', động từ chia theo chủ ngữ gần nhất (he) -> 'is'." },
                    { q: "Question 6 [515077]: French cheeses _______ exported to many different countries.", options: ["A. is", "B. have", "C. are", "D. were"], a: "C. are", exp: "Chủ ngữ là 'cheeses' (danh từ đếm được số nhiều) -> 'are' (câu bị động hiện tại chung chung)." },
                    { q: "Question 7 [515078]: Neither of them _______ interested in going to university.", options: ["A. go", "B. has", "C. is", "D. were"], a: "C. is", exp: "'Neither of + Đại từ/Danh từ số nhiều' -> động từ chia ở số ít." },
                    { q: "Question 8 [515079]: Five years _______ the maximum sentence for that offense.", options: ["A. have", "B. is", "C. are", "D. were"], a: "B. is", exp: "Khoảng thời gian (Five years) được coi là một tổng thể thống nhất -> động từ chia số ít." },
                    { q: "Question 9 [515080]: Only 40 percent of people in this list _______ qualified for this job.", options: ["A. are", "B. is", "C. has", "D. was"], a: "A. are", exp: "Phần trăm + of + Danh từ số nhiều (people) -> động từ chia theo danh từ số nhiều -> 'are'." },
                    { q: "Question 10 [515081]: Excitement, as well as nervousness, _______ the cause of her shaking.", options: ["A. were", "B. have been", "C. is", "D. are"], a: "C. is", exp: "S1 + as well as + S2 -> động từ chia theo S1 (Excitement - danh từ không đếm được) -> 'is'." },
                    { q: "Question 11 [515082]: What I wanted to find out first _______ how long it was going to take.", options: ["A. are", "B. is", "C. was", "D. were"], a: "C. was", exp: "Mệnh đề danh từ 'What I wanted...' làm chủ ngữ -> động từ số ít. Câu mang thì quá khứ ('wanted', 'was going to') -> 'was'." },
                    { q: "Question 12 [515083]: There _______ fifteen candies in that bag. Now there _______ only one left!", options: ["A. was - is", "B. have been - are", "C. were - is", "D. was - are"], a: "C. were - is", exp: "Vế 1: There + were + 15 candies (quá khứ). Vế 2: 'Now there is...' (hiện tại, chỉ còn 1 cái)." },
                    { q: "Question 13 [515084]: The movie, including all the previews, _______ about two hours to watch.", options: ["A. takes", "B. have taken", "C. are taking", "D. take"], a: "A. takes", exp: "S1 + including + S2 -> động từ chia theo S1 ('The movie' - số ít)." },
                    { q: "Question 14 [515085]: Sandals and towels _______ essential gear for a trip to the beach.", options: ["A. has been", "B. are", "C. is", "D. was"], a: "B. are", exp: "Hai danh từ nối với nhau bằng 'and' chỉ hai vật khác biệt -> động từ chia số nhiều." },
                    { q: "Question 15 [515086]: Either Cassie or Marie _______ going to the party tonight.", options: ["A. are", "B. will be", "C. are", "D. is"], a: "D. is", exp: "Cấu trúc 'Either S1 or S2', động từ chia theo S2 ('Marie' - số ít) -> 'is'." },
                    { q: "Question 16 [515087]: Mumps _______ an infectious disease that causes painful swellings in the neck and throat and a fever.", options: ["A. is", "B. has been", "C. are", "D. was"], a: "A. is", exp: "'Mumps' (bệnh quai bị) là tên một căn bệnh -> danh từ số ít." },
                    { q: "Question 17 [515088]: Twenty minutes _______ the amount of time it takes me to get home from work.", options: ["A. is", "B. are", "C. have been", "D. were"], a: "A. is", exp: "Khoảng thời gian (Twenty minutes) -> động từ chia số ít." },
                    { q: "Question 18 [515089]: Each and every one of the flowers _______ its own colour and smell.", options: ["A. have", "B. are having", "C. has", "D. are"], a: "C. has", exp: "Bắt đầu bằng đại từ 'Each' -> động từ luôn chia số ít." },
                    { q: "Question 19 [515090]: The young man who you met _______ to the same college as my sister.", options: ["A. goes", "B. are going", "C. go", "D. were going"], a: "A. goes", exp: "Chủ ngữ chính của câu là 'The young man' (số ít) -> 'goes'." },
                    { q: "Question 20 [515091]: Everybody who signed up for the snowboarding trip _______ lessons.", options: ["A. have taken", "B. was taking", "C. were taking", "D. take"], a: "B. was taking", exp: "Đại từ bất định 'Everybody' -> động từ chia số ít ('was taking' là lựa chọn số ít hợp lý trong các đáp án)." },
                    { q: "Question 21 [515092]: Mealses (Measles) _______ one of the most uncomfortable diseases.", options: ["A. are", "B. is", "C. were", "D. have been"], a: "B. is", exp: "'Measles' (Bệnh sởi) là tên một loại bệnh -> động từ chia số ít." },
                    { q: "Question 22 [515093]: A small number of children _______ educated at home.", options: ["A. has been", "B. was", "C. are", "D. will"], a: "C. are", exp: "'A number of + danh từ số nhiều' -> động từ chia số nhiều -> 'are'." },
                    { q: "Question 23 [515094]: One hundred dollars _______ not a lot of money to some people.", options: ["A. were", "B. have been", "C. are", "D. is"], a: "D. is", exp: "Số tiền (One hundred dollars) -> coi là một tổng thể -> động từ chia số ít." },
                    { q: "Question 24 [515095]: Caffeine, which _______ found in coffee and tea, is a mild stimulant.", options: ["A. are", "B. were", "C. is", "D. have been"], a: "C. is", exp: "Đại từ quan hệ 'which' thay thế cho 'Caffeine' (không đếm được) -> 'is'." },
                    { q: "Question 25 [515096]: A great deal of effort _______ gone into making the software reliable.", options: ["A. has", "B. have", "C. are", "D. were"], a: "A. has", exp: "'A great deal of + Danh từ không đếm được' (effort) -> động từ chia số ít -> 'has' (tạo thành thì HTHT 'has gone')." },
                    { q: "Question 26 [515097]: Neither of my parents _______ my boyfriend.", options: ["A. have liked", "B. likes", "C. like", "D. are liking"], a: "B. likes", exp: "Cấu trúc 'Neither of + N(pl)' theo ngữ pháp truyền thống được chia với động từ số ít -> 'likes'." },
                    { q: "Question 27 [515098]: Linguistics _______ the scientific study of language.", options: ["A. were", "B. have been", "C. are", "D. is"], a: "D. is", exp: "'Linguistics' (Ngôn ngữ học) là tên một môn học/ngành học -> động từ chia số ít." },
                    { q: "Question 28 [515099]: Your chances of winning the lottery in New York State _______ less than being struck by lightening.", options: ["A. was", "B. are", "C. has been", "D. is"], a: "B. are", exp: "Chủ ngữ chính là 'Your chances' (số nhiều) -> 'are'." },
                    { q: "Question 29 [515100]: The recommendation of two policemen, a judge, and three lawyers _______ accepted.", options: ["A. was", "B. were", "C. are", "D. have been"], a: "A. was", exp: "Chủ ngữ chính nằm trước giới từ 'of': 'The recommendation' (số ít) -> 'was'." },
                    { q: "Question 30 [515101]: Some of the students _______ exhausted after finals.", options: ["A. is", "B. has been", "C. were", "D. was"], a: "C. were", exp: "'Some of + danh từ số nhiều' -> động từ chia số nhiều. 'after finals' chỉ việc đã xảy ra -> 'were'." },
                    { q: "Question 31 [515102]: We are hoping to attract the type of customer who _______ never thought of opening a layaway account.", options: ["A. have", "B. are", "C. would", "D. has"], a: "D. has", exp: "Đại từ 'who' thay thế cho danh từ số ít 'customer' ở ngay trước -> 'has' (tạo thì hiện tại hoàn thành)." },
                    { q: "Question 32 [515103]: The causes of this horrible disease _______ poor diet and lack of exercise.", options: ["A. is", "B. are", "C. was", "D. has"], a: "B. are", exp: "Chủ ngữ chính là 'The causes' (số nhiều) -> 'are'." },
                    { q: "Question 33 [515104]: The noise of the fan's screams _______ a problem at some football stadiums.", options: ["A. is", "B. were", "C. have been", "D. are"], a: "A. is", exp: "Chủ ngữ chính là 'The noise' (danh từ không đếm được) -> 'is'." },
                    { q: "Question 34 [515105]: Scissors _______ too dangerous to give to small children.", options: ["A. has been", "B. are", "C. was", "D. is"], a: "B. are", exp: "Các danh từ chỉ vật có 2 bộ phận như kéo (scissors), quần tây (trousers), kính (glasses) luôn đi với động từ số nhiều." },
                    { q: "Question 35 [515106]: No prize or medal _______ given to the boy, though he stood first in the examination.", options: ["A. were", "B. have been", "C. are", "D. was"], a: "D. was", exp: "Cấu trúc 'No + N1 or N2' mang ý nghĩa phủ định cho toàn bộ và được chia với động từ số ít. Dấu hiệu 'stood' -> quá khứ -> 'was'." },
                    { q: "Question 36 [515107]: Not only the Smiths but also Tonya _______ here now.", options: ["A. is", "B. are", "C. was", "D. were"], a: "A. is", exp: "Cấu trúc 'Not only S1 but also S2', động từ chia theo S2 ('Tonya' - số ít). Dấu hiệu 'now' -> 'is'." },
                    { q: "Question 37 [515108]: There once _______ a poor widow who had a beautiful daughter.", options: ["A. is", "B. are", "C. was", "D. were"], a: "C. was", exp: "'There + be + N' chia theo 'a poor widow' (số ít). 'once' (ngày xửa ngày xưa) -> 'was'." },
                    { q: "Question 38 [515109]: The winning of five medals by the same athlete _______ a rare achievement.", options: ["A. were", "B. have been", "C. are", "D. is"], a: "D. is", exp: "Danh động từ (The winning) làm chủ ngữ chính -> động từ chia số ít -> 'is'." },
                    { q: "Question 39 [515110]: There _______ someone on the phone for you.", options: ["A. are", "B. is", "C. has", "D. were"], a: "B. is", exp: "There + be + someone (đại từ bất định số ít) -> 'is'." },
                    { q: "Question 40 [515111]: The Philippines _______ a country formed of a group of islands in Southeast Asia.", options: ["A. are", "B. has been", "C. was", "D. is"], a: "D. is", exp: "'The Philippines' (Phi-líp-pin) là tên một quốc gia (dù có 's') -> động từ chia số ít -> 'is'." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo:</strong> ${ex.tip}</span>
                </div>
            `;

            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> Giải thích: ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${qObj.a}.</strong> <br> Giải thích: ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
