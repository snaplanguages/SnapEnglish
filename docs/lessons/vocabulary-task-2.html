<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Topics | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Quicksand', sans-serif; 
            min-height: 100vh;
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
            /* Nền Gradient: Xanh mint - Hồng phấn */
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            padding: 20px;
            overflow-x: hidden;
            gap: 20px; 
        }

        /* --- NÚT QUAY LẠI (GLASSMORPHISM STYLE) --- */
        .back-btn {
            text-decoration: none;
            color: #2d3436;
            background: rgba(255, 255, 255, 0.5); 
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: 700;
            backdrop-filter: blur(10px); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.4);
            z-index: 10; 
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            color: #00cec9; 
        }
        /* ------------------------------------------- */

        /* Hiệu ứng kính mờ cho Container chính */
        .container { 
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 35px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 1;
        }

        h1 { 
            font-family: 'Fredoka', sans-serif;
            color: #2d3436; 
            font-size: 30px; 
            margin-bottom: 10px;
        }

        p.subtitle {
            color: #636e72;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Style từng nút chủ đề */
        .topic-item { 
            padding: 15px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 18px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .topic-item .content {
            display: flex;
            align-items: center;
            z-index: 2;
        }

        .topic-item .icon {
            font-size: 24px;
            margin-right: 15px;
            background: rgba(255,255,255,0.3);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .topic-item .arrow {
            font-size: 20px;
            opacity: 0.8;
            transition: transform 0.3s;
            z-index: 2;
        }

        /* Màu sắc riêng cho từng chủ đề (Thêm mới 7 chủ đề) */
        .edu { background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); }
        .soc { background: linear-gradient(to right, #43e97b 0%, #38f9d7 100%); box-shadow: 0 5px 15px rgba(67, 233, 123, 0.4); }
        .cul { background: linear-gradient(to right, #fa709a 0%, #fee140 100%); box-shadow: 0 5px 15px rgba(250, 112, 154, 0.4); }
        .env { background: linear-gradient(to right, #89f7fe 0%, #66a6ff 100%); box-shadow: 0 5px 15px rgba(102, 166, 255, 0.4); }
        .gov { background: linear-gradient(to right, #f6d365 0%, #fda085 100%); box-shadow: 0 5px 15px rgba(253, 160, 133, 0.4); }
        
        .tech { background: linear-gradient(to right, #667eea 0%, #764ba2 100%); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .med { background: linear-gradient(to right, #a18cd1 0%, #fbc2eb 100%); box-shadow: 0 5px 15px rgba(161, 140, 209, 0.4); }
        .int { background: linear-gradient(to right, #00c6fb 0%, #005bea 100%); box-shadow: 0 5px 15px rgba(0, 198, 251, 0.4); }
        .cri { background: linear-gradient(to right, #ff0844 0%, #ffb199 100%); box-shadow: 0 5px 15px rgba(255, 8, 68, 0.4); }
        .tra { background: linear-gradient(to right, #f093fb 0%, #f5576c 100%); box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4); }
        .hea { background: linear-gradient(to right, #0ba360 0%, #3cba92 100%); box-shadow: 0 5px 15px rgba(11, 163, 96, 0.4); }
        .job { background: linear-gradient(to right, #f83600 0%, #f9d423 100%); box-shadow: 0 5px 15px rgba(248, 54, 0, 0.4); }

        /* Hover Effect */
        .topic-item:hover { 
            transform: scale(1.03) translateY(-3px);
            filter: brightness(1.05);
        }

        .topic-item:hover .arrow {
            transform: translateX(5px);
        }

        /* Trang trí nền (Floating shapes) */
        .bg-shape {
            position: absolute;
            z-index: 0;
            border-radius: 50%;
            animation: floatShape 8s ease-in-out infinite;
        }
        .shape-1 { top: -60px; left: -60px; width: 150px; height: 150px; background: #fff1eb; opacity: 0.6; }
        .shape-2 { bottom: -40px; right: -40px; width: 120px; height: 120px; background: #ace0f9; opacity: 0.6; }

        @keyframes floatShape {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, -20px); }
        }

        /* Footer */
        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: #636e72;
        }

    </style>
</head>
<body>

    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <a href="index.html" class="back-btn">
        🏠 Quay lại Dashboard
    </a>

    <div class="container">
        <h1>📚 Vocabulary Topics with SnapEnglish</h1>
        <p class="subtitle">12 Chủ đề Cốt lõi IELTS Writing Task 2</p>
        
        <div class="topic-list">
            <div class="topic-item edu" onclick="goToTest(1)">
                <div class="content">
                    <div class="icon">🎓</div>
                    <span>Education</span>
                </div>
                <div class="arrow">➜</div>
            </div>
            
            <div class="topic-item soc" onclick="goToTest(2)">
                <div class="content">
                    <div class="icon">🌍</div>
                    <span>Society</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item cul" onclick="goToTest(3)">
                <div class="content">
                    <div class="icon">🏮</div>
                    <span>Culture</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item env" onclick="goToTest(4)">
                <div class="content">
                    <div class="icon">🌱</div>
                    <span>Environment</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item gov" onclick="goToTest(5)">
                <div class="content">
                    <div class="icon">🏛️</div>
                    <span>Government</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item tech" onclick="goToTest(6)">
                <div class="content">
                    <div class="icon">💻</div>
                    <span>Technology</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item med" onclick="goToTest(7)">
                <div class="content">
                    <div class="icon">📺</div>
                    <span>Media</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item int" onclick="goToTest(8)">
                <div class="content">
                    <div class="icon">🤝</div>
                    <span>International</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item cri" onclick="goToTest(9)">
                <div class="content">
                    <div class="icon">⚖️</div>
                    <span>Crime</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item tra" onclick="goToTest(10)">
                <div class="content">
                    <div class="icon">✈️</div>
                    <span>Travel</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item hea" onclick="goToTest(11)">
                <div class="content">
                    <div class="icon">🩺</div>
                    <span>Health</span>
                </div>
                <div class="arrow">➜</div>
            </div>

            <div class="topic-item job" onclick="goToTest(12)">
                <div class="content">
                    <div class="icon">💼</div>
                    <span>Job/Work</span>
                </div>
                <div class="arrow">➜</div>
            </div>
        </div>

        <div class="footer">
            Keep learning every day! ✨
        </div>
    </div>

   <script>
    function goToTest(testNumber) {
        // --- Danh sách URL đã được chuyển thành file .html cục bộ ---
        const testLinks = {
            1: "education.html", 
            2: "society.html",
            3: "culture.html", 
            4: "environment.html",
            5: "government.html",
            6: "technology.html",
            7: "media.html",
            8: "international.html",
            9: "crime.html",
            10: "travel.html",
            11: "health.html",
            12: "job-work.html"
        };

        const link = testLinks[testNumber];

        if (link) {
            // Chuyển trang trực tiếp, loại bỏ việc mở tab mới
            window.location.href = link;
        } else {
            alert("🚧 Chủ đề này đang được cập nhật!");
        }
    }
</script>
</body>
</html>
