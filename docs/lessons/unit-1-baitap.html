<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 1 - Cấu Trúc Câu Trong Tiếng Anh</title>
     <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff5f8;
            --text-main: #4a4a4a;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#ffd1dc 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, #ffb3ba, #ffdfba);
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            box-shadow: 0 10px 20px rgba(255, 179, 186, 0.3);
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            color: #fff;
            font-size: 2.8em;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-weight: 900;
        }

        .subtitle {
            color: #fff;
            font-size: 1.2em;
            font-weight: 600;
            margin-top: 10px;
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 10px 30px;
            border-radius: 30px;
            font-size: 1.5em;
            font-weight: 800;
            color: #ff8b94;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 3px dashed #ffb3ba;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.05);
            border-top: 10px solid;
            transition: transform 0.3s ease;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.8em;
            font-weight: 800;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #fffcee;
            border: 2px dashed #ffdfba;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-weight: 600;
            color: #d4a017;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .question-block {
            background: #fcfcfc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #eee;
        }

        .question-text {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #e0e0e0;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 1.1em;
            font-weight: 700;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #ffb3ba;
            background: #fff5f8;
            transform: scale(1.05);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #baffc9 !important;
            border-color: #4ade80 !important;
            color: #166534 !important;
            animation: pop 0.4s ease;
        }

        .option-btn.incorrect {
            background: #ffb3ba !important;
            border-color: #ff6b6b !important;
            color: #991b1b !important;
            opacity: 0.8;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.3s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 5px solid #4ade80;
        }

        .explanation.error {
            background: #ffebee;
            color: #c62828;
            border-left: 5px solid #ff6b6b;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .color-1 { border-top-color: #ffb3ba; }
        .color-1 .ex-title { color: #ff6b81; }
        .color-2 { border-top-color: #ffdfba; }
        .color-2 .ex-title { color: #f39c12; }
        .color-3 { border-top-color: #ffffba; }
        .color-3 .ex-title { color: #d4ac0d; }
        .color-4 { border-top-color: #baffc9; }
        .color-4 .ex-title { color: #2ecc71; }
        .color-5 { border-top-color: #bae1ff; }
        .color-5 .ex-title { color: #3498db; }
        
        .footer-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .footer-link a {
            color: #ff6b81;
            font-weight: bold;
            text-decoration: none;
        }

        .back-to-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #ffb3ba;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-decoration: none;
            transition: all 0.3s;
        }
        .back-to-top:hover {
            transform: translateY(-5px);
            background: #ff8b94;
        }

    </style>
</head>
<body>

    <header>
        <h1>🎀 Trạm Luyện Tập Grammar 🎀</h1>
        <div class="subtitle">Unit 1: Cấu Trúc Câu Trong Tiếng Anh</div>
        <div class="score-board">Điểm của bạn: <span id="score">0</span> / 50 🌟</div>
    </header>

    <div class="container" id="app">
    </div>

    <div class="footer-link">
        <a href="https://englishlanguagestudies.com" target="_blank">Học thêm tại English Language Studies ✨</a>
    </div>

    <a href="unit-1-grammar.html" class="back-to-top" target="_blank">💡</a>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Nhận diện Chủ ngữ (Subject - S)",
                tip: "Chủ ngữ là từ/cụm từ chỉ người, sự vật làm chủ thể cho hành động. Thường đứng đầu câu, trước động từ nhé các học sinh!",
                colorClass: "color-1",
                icon: "🦄",
                questions: [
                    { q: "1. 'She eats very much.' Chủ ngữ trong câu là:", options: ["She", "eats", "very much"], a: "She", exp: "Đại từ 'She' đứng đầu câu làm chủ thể cho hành động 'eats'." },
                    { q: "2. 'Watching TV too much may cause eye diseases.' Chủ ngữ trong câu là:", options: ["Watching TV too much", "may cause", "eye diseases"], a: "Watching TV too much", exp: "Cụm danh động từ 'Watching TV too much' làm chủ ngữ." },
                    { q: "3. 'I am a student.' Chủ ngữ trong câu là:", options: ["I", "am", "a student"], a: "I", exp: "Đại từ 'I' là chủ ngữ của câu." },
                    { q: "4. 'My father works in a factory.' Chủ ngữ là:", options: ["works", "in a factory", "My father"], a: "My father", exp: "Cụm danh từ 'My father' làm chủ ngữ cho hành động 'works'." },
                    { q: "5. 'Tom can play the piano.' Chủ ngữ trong câu là:", options: ["can play", "Tom", "the piano"], a: "Tom", exp: "Danh từ riêng 'Tom' làm chủ ngữ." },
                    { q: "6. 'His brother is graduating from university next month.' Chủ ngữ là:", options: ["His brother", "is graduating", "next month"], a: "His brother", exp: "Cụm danh từ 'His brother' làm chủ thể." },
                    { q: "7. 'Yesterday a new clothes shop was opened.' Chủ ngữ là:", options: ["Yesterday", "a new clothes shop", "was opened"], a: "a new clothes shop", exp: "Cụm danh từ 'a new clothes shop' làm chủ ngữ (đứng sau trạng ngữ chỉ thời gian)." },
                    { q: "8. 'We hope to see you soon.' Chủ ngữ là:", options: ["hope", "to see you soon", "We"], a: "We", exp: "Đại từ 'We' làm chủ ngữ cho động từ 'hope'." },
                    { q: "9. 'It is raining.' Chủ ngữ trong câu là:", options: ["It", "is", "raining"], a: "It", exp: "Đại từ 'It' đóng vai trò chủ ngữ giả chỉ thời tiết." },
                    { q: "10. 'They are playing football.' Chủ ngữ là:", options: ["are playing", "football", "They"], a: "They", exp: "Đại từ 'They' làm chủ thể cho hành động đang diễn ra." }
                ]
            },
            {
                title: "Exercise 2: Nhận diện Động từ (Verb - V)",
                tip: "Động từ đi sau chủ ngữ, diễn tả hành động hoặc trạng thái. Chú ý động từ có thể thay đổi theo thì nha!",
                colorClass: "color-2",
                icon: "🧸",
                questions: [
                    { q: "1. 'My mother is watching TV.' Động từ trong câu là:", options: ["My mother", "is watching", "TV"], a: "is watching", exp: "Động từ 'watch' được chia ở thì hiện tại tiếp diễn." },
                    { q: "2. 'He often helps us with the housework.' Động từ chính là:", options: ["often", "helps", "us"], a: "helps", exp: "Động từ 'helps' chia theo chủ ngữ ngôi ba số ít 'He'." },
                    { q: "3. 'She comes from England.' Động từ trong câu là:", options: ["She", "comes", "from England"], a: "comes", exp: "Động từ chỉ hành động 'comes'." },
                    { q: "4. 'My parents bought me a new bike last week.' Động từ là:", options: ["bought", "a new bike", "last week"], a: "bought", exp: "Động từ 'buy' được chia ở quá khứ đơn thành 'bought'." },
                    { q: "5. 'We are building a sand castle.' Động từ trong câu là:", options: ["We", "are building", "a sand castle"], a: "are building", exp: "Hành động 'are building' (đang xây)." },
                    { q: "6. 'I walk to school everyday.' Động từ là:", options: ["I", "walk", "to school"], a: "walk", exp: "Động từ chỉ hành động đi bộ 'walk'." },
                    { q: "7. 'He smiled.' Động từ trong câu là:", options: ["He", "smiled", "Không có"], a: "smiled", exp: "Động từ 'smile' chia ở quá khứ." },
                    { q: "8. 'I like listening to music.' Động từ chính của câu là:", options: ["I", "like", "listening"], a: "like", exp: "Động từ chính là 'like', theo sau là danh động từ 'listening'." },
                    { q: "9. 'She gave me a lift.' Động từ trong câu là:", options: ["She", "gave", "a lift"], a: "gave", exp: "Động từ 'give' chia quá khứ là 'gave'." },
                    { q: "10. 'He teaches us English.' Động từ là:", options: ["He", "teaches", "English"], a: "teaches", exp: "Động từ 'teach' thêm 'es' vì chủ ngữ là 'He'." }
                ]
            },
            {
                title: "Exercise 3: Nhận diện Tân ngữ (Object - O)",
                tip: "Tân ngữ thường đứng sau động từ, là đối tượng chịu tác động của hành động. Có cả tân ngữ trực tiếp và gián tiếp đó!",
                colorClass: "color-3",
                icon: "✨",
                questions: [
                    { q: "1. 'My mother bought a new dress yesterday.' Tân ngữ trực tiếp là:", options: ["My mother", "a new dress", "yesterday"], a: "a new dress", exp: "Cụm danh từ 'a new dress' đứng sau động từ 'bought' làm tân ngữ." },
                    { q: "2. 'I gave him a book.' Tân ngữ trực tiếp (O2) là:", options: ["I", "him", "a book"], a: "a book", exp: "Vật được đưa là 'a book' nên nó là tân ngữ trực tiếp." },
                    { q: "3. 'I gave him a book.' Tân ngữ gián tiếp (O1) là:", options: ["I", "him", "a book"], a: "him", exp: "Người nhận 'him' là tân ngữ gián tiếp." },
                    { q: "4. 'They are playing football.' Tân ngữ là:", options: ["They", "are playing", "football"], a: "football", exp: "Môn thể thao chịu tác động của hành động chơi là 'football'." },
                    { q: "5. 'She gave me a lift.' Tân ngữ gián tiếp (O1) là:", options: ["She", "me", "a lift"], a: "me", exp: "'me' chỉ người tiếp nhận hành động." },
                    { q: "6. 'He teaches us English.' Tân ngữ trực tiếp (O2) là:", options: ["He", "us", "English"], a: "English", exp: "Môn học được dạy là 'English' (tân ngữ trực tiếp)." },
                    { q: "7. 'I like listening to music.' Tân ngữ của câu là:", options: ["I", "like", "listening to music"], a: "listening to music", exp: "Cụm danh động từ 'listening to music' làm tân ngữ cho 'like'." },
                    { q: "8. 'We are building a sand castle.' Tân ngữ là:", options: ["We", "are building", "a sand castle"], a: "a sand castle", exp: "Vật được xây dựng là 'a sand castle'." },
                    { q: "9. 'My parents bought me a new bike.' Tân ngữ trực tiếp là:", options: ["me", "a new bike", "My parents"], a: "a new bike", exp: "Vật được mua là 'a new bike'." },
                    { q: "10. 'Tom can play the piano.' Tân ngữ trong câu là:", options: ["Tom", "play", "the piano"], a: "the piano", exp: "Nhạc cụ được chơi là 'the piano'." }
                ]
            },
            {
                title: "Exercise 4: Bổ ngữ (C) & Trạng ngữ (A)",
                tip: "Bổ ngữ đi sau động từ nối (be, look...) để bổ nghĩa cho chủ ngữ. Trạng ngữ chỉ thời gian, địa điểm, cách thức!",
                colorClass: "color-4",
                icon: "🍀",
                questions: [
                    { q: "1. 'She is a doctor.' Cụm 'a doctor' đóng vai trò là:", options: ["Tân ngữ (O)", "Bổ ngữ (C)", "Trạng ngữ (A)"], a: "Bổ ngữ (C)", exp: "Đi sau động từ to be 'is' để bổ nghĩa cho chủ ngữ 'She'." },
                    { q: "2. 'We hope to see you soon.' Cụm 'to see you soon' là:", options: ["Tân ngữ (O)", "Bổ ngữ (C)", "Trạng ngữ (A)"], a: "Bổ ngữ (C)", exp: "Cụm động từ làm bổ ngữ cho câu." },
                    { q: "3. 'She looks tired.' Từ 'tired' đóng vai trò là:", options: ["Tân ngữ (O)", "Bổ ngữ (C)", "Trạng ngữ (A)"], a: "Bổ ngữ (C)", exp: "Tính từ đi sau động từ nối 'looks' làm bổ ngữ." },
                    { q: "4. 'He considers himself an artist.' Cụm 'an artist' là:", options: ["Tân ngữ (O)", "Bổ ngữ (C)", "Trạng ngữ (A)"], a: "Bổ ngữ (C)", exp: "Bổ ngữ cho tân ngữ 'himself'." },
                    { q: "5. 'Yesterday a new clothes shop was opened.' Từ 'Yesterday' là:", options: ["Bổ ngữ (C)", "Trạng ngữ (A)", "Chủ ngữ (S)"], a: "Trạng ngữ (A)", exp: "Trạng ngữ chỉ thời gian đứng đầu câu." },
                    { q: "6. 'I live in the city.' Cụm 'in the city' là:", options: ["Trạng ngữ (A)", "Tân ngữ (O)", "Bổ ngữ (C)"], a: "Trạng ngữ (A)", exp: "Trạng ngữ chỉ địa điểm." },
                    { q: "7. 'I saw him when I was walking.' Mệnh đề 'when I was walking' là:", options: ["Tân ngữ (O)", "Bổ ngữ (C)", "Trạng ngữ (A)"], a: "Trạng ngữ (A)", exp: "Mệnh đề trạng ngữ chỉ thời gian." },
                    { q: "8. 'He often helps us.' Từ 'often' là:", options: ["Trạng ngữ (A)", "Bổ ngữ (C)", "Tân ngữ (O)"], a: "Trạng ngữ (A)", exp: "Trạng từ chỉ tần suất." },
                    { q: "9. 'I walk to school everyday.' Từ 'everyday' là:", options: ["Tân ngữ (O)", "Bổ ngữ (C)", "Trạng ngữ (A)"], a: "Trạng ngữ (A)", exp: "Trạng ngữ chỉ thời gian / tần suất." },
                    { q: "10. 'My parents bought me a bike last week.' Cụm 'last week' là:", options: ["Trạng ngữ (A)", "Tân ngữ (O)", "Bổ ngữ (C)"], a: "Trạng ngữ (A)", exp: "Trạng ngữ chỉ thời gian." }
                ]
            },
            {
                title: "Exercise 5: Xác định Cấu trúc câu",
                tip: "Gắn các thành phần S, V, O, C, A lại với nhau để xem câu thuộc cấu trúc nào nhé!",
                colorClass: "color-5",
                icon: "🍓",
                questions: [
                    { q: "1. Câu 'It is raining.' thuộc cấu trúc nào?", options: ["S - V", "S - V - O", "S - V - C"], a: "S - V", exp: "It (S) + is raining (V)." },
                    { q: "2. Câu 'He smiled.' thuộc cấu trúc nào?", options: ["S - V", "S - V - O", "S - V - O - O"], a: "S - V", exp: "He (S) + smiled (V)." },
                    { q: "3. Câu 'I like listening to music.' thuộc cấu trúc nào?", options: ["S - V", "S - V - O", "S - V - C"], a: "S - V - O", exp: "I (S) + like (V) + listening to music (O)." },
                    { q: "4. Câu 'They are playing football.' thuộc cấu trúc nào?", options: ["S - V - O", "S - V - C", "S - V - O - A"], a: "S - V - O", exp: "They (S) + are playing (V) + football (O)." },
                    { q: "5. Câu 'She gave me a lift.' thuộc cấu trúc nào?", options: ["S - V - O", "S - V - O - O", "S - V - C"], a: "S - V - O - O", exp: "She (S) + gave (V) + me (O1) + a lift (O2)." },
                    { q: "6. Câu 'He teaches us English.' thuộc cấu trúc nào?", options: ["S - V - O - C", "S - V - C", "S - V - O - O"], a: "S - V - O - O", exp: "He (S) + teaches (V) + us (O1) + English (O2)." },
                    { q: "7. Câu 'He considers himself an artist.' thuộc cấu trúc nào?", options: ["S - V - O - O", "S - V - O - C", "S - V - O - A"], a: "S - V - O - C", exp: "He (S) + considers (V) + himself (O) + an artist (C)." },
                    { q: "8. Câu 'She looks tired.' thuộc cấu trúc nào?", options: ["S - V - O", "S - V - C", "S - V"], a: "S - V - C", exp: "She (S) + looks (V - động từ nối) + tired (C)." },
                    { q: "9. Câu 'We have known each other for a long time.' thuộc cấu trúc nào?", options: ["S - V - O - A", "S - V - O - C", "S - V - O - O"], a: "S - V - O - A", exp: "We (S) + have known (V) + each other (O) + for a long time (A)." },
                    { q: "10. Câu 'I live in the city.' thuộc cấu trúc nào?", options: ["S - V - O", "S - V - A", "S - V - C"], a: "S - V - A", exp: "I (S) + live (V) + in the city (A - trạng ngữ chỉ địa điểm)." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex, exIndex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            // Title & Tip
            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span>${ex.tip}</span>
                </div>
            `;

            // Questions
            ex.questions.forEach((qObj, qIndex) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                // Question Text
                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                // Options Container
                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                // Explanantion Container
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Đúng rồi!</strong> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Sai rồi! Đáp án đúng là: ${qObj.a}.</strong> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
