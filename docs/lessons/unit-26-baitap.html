    <script>
        const exData = [
            ["Question 1 [516925]: _______ you study for the coming exam, _______ you will do.", 
            ["A. The harder / the better", "B. The more / the much", "C. The hardest / the best", "D. The more hard / the more good"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc so sánh kép (Càng... thì càng...): The + so sánh hơn + S + V, the + so sánh hơn + S + V. 'hard' là tính từ ngắn -> harder; 'good' bất quy tắc -> better.</li><li><strong>B sai:</strong> 'much' không phải dạng so sánh hơn.</li><li><strong>C sai:</strong> Đây là dạng so sánh nhất.</li><li><strong>D sai:</strong> Không dùng 'more' cho tính từ ngắn 'hard' và tính từ bất quy tắc 'good'.</li></ul>"],

            ["Question 2 [516926]: My neighbor is driving me mad! It seems that _______ it is at night, _______ he plays his music!", 
            ["A. the less / the more loud", "B. the less / less", "C. the more late / the more loudlier", "D. the later / the louder"], 3, 
            "<ul><li><strong>A, C sai:</strong> 'late' và 'loud' là tính từ/trạng từ ngắn nên phải thêm đuôi '-er'. Không dùng 'more late' hay 'more loud'.</li><li><strong>B sai:</strong> Thiếu mạo từ 'the' ở vế thứ hai.</li><li><strong>D đúng:</strong> 'the later / the louder' (càng về khuya, anh ta bật nhạc càng to).</li></ul>"],

            ["Question 3 [516927]: Thanks to the progress of science and technology, our lives have become _______.", 
            ["A. more and more good", "B. better and better", "C. the more and more good", "D. gooder and gooder"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> 'good' là tính từ bất quy tắc, dạng so sánh hơn của nó là 'better'. Không dùng 'more good' hay 'gooder'. Cấu trúc này không dùng 'the' ở đầu.</li><li><strong>B đúng:</strong> So sánh lũy tiến (Càng ngày càng...): So sánh hơn + and + so sánh hơn -> 'better and better'.</li></ul>"],

            ["Question 4 [516928]: It gets _______ when the winter is coming.", 
            ["A. cold and cold", "B. the coldest and coldest", "C. colder and colder", "D. more and more cold"], 2, 
            "<ul><li><strong>A sai:</strong> Thiếu đuôi so sánh hơn '-er'.</li><li><strong>B sai:</strong> Đây là dạng so sánh nhất.</li><li><strong>C đúng:</strong> 'cold' là tính từ ngắn, so sánh lũy tiến là 'colder and colder' (càng ngày càng lạnh).</li><li><strong>D sai:</strong> 'cold' là tính từ ngắn nên không dùng 'more and more'.</li></ul>"],

            ["Question 5 [516929]: The faster we finish, _______.", 
            ["A. the sooner we can leave", "B. we can leave sooner and sooner", "C. the sooner can we leave", "D. we can leave the sooner"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc 'The + so sánh hơn + S + V, the + so sánh hơn + S + V'. (Hoàn thành càng nhanh, chúng ta càng có thể về sớm).</li><li><strong>B, D sai:</strong> Thiếu 'The + so sánh hơn' đứng ở đầu mệnh đề thứ hai.</li><li><strong>C sai:</strong> Trong cấu trúc so sánh kép KHÔNG đảo ngữ (không đưa 'can' lên trước 'we').</li></ul>"],

            ["Question 6 [516930]: The more she practices, _______.", 
            ["A. the greater confidence she becomes", "B. more confidently she becomes", "C. the more confident she becomes", "D. the most confident she becomes"], 2, 
            "<ul><li><strong>A sai:</strong> Sau 'become' cần một tính từ, 'confidence' là danh từ.</li><li><strong>B sai:</strong> Thiếu mạo từ 'the'. 'become' đi với tính từ, không đi với trạng từ 'confidently'.</li><li><strong>C đúng:</strong> 'the more confident' (tính từ dài) + S + V(becomes).</li><li><strong>D sai:</strong> Đây là so sánh nhất.</li></ul>"],

            ["Question 7 [516931]: _______ he drank, _______ he became.", 
            ["A. More / more violent", "B. The most / the most violent", "C. The more / the more violent", "D. The less / less violent"], 2, 
            "<ul><li><strong>A, D sai:</strong> Thiếu mạo từ 'the' ở một hoặc cả hai vế.</li><li><strong>B sai:</strong> Đây là so sánh nhất, không phải so sánh kép.</li><li><strong>C đúng:</strong> Cấu trúc 'The more... the more...'. (Anh ta càng uống nhiều, anh ta càng trở nên bạo lực).</li></ul>"],

            ["Question 8 [516932]: The standard of living is getting _______.", 
            ["A. higher and higher", "B. high and high", "C. the highest and highest", "D. more high and high"], 0, 
            "<ul><li><strong>A đúng:</strong> So sánh lũy tiến với tính từ ngắn 'high' -> 'higher and higher' (càng ngày càng cao).</li><li><strong>B sai:</strong> Thiếu dạng so sánh hơn.</li><li><strong>C sai:</strong> Đây là dạng so sánh nhất.</li><li><strong>D sai:</strong> Tính từ ngắn không dùng với 'more'.</li></ul>"],

            ["Question 9 [516933]: The town is getting _______.", 
            ["A. the more and more crowded", "B. more and more crowded", "C. crowded and more crowded", "D. crowder and crowder"], 1, 
            "<ul><li><strong>A sai:</strong> Cấu trúc so sánh lũy tiến (càng ngày càng) KHÔNG có mạo từ 'the'.</li><li><strong>B đúng:</strong> 'crowded' là tính từ dài -> 'more and more crowded' (càng ngày càng đông đúc).</li><li><strong>C, D sai:</strong> Sai cấu trúc so sánh lũy tiến của tính từ dài.</li></ul>"],

            ["Question 10 [516934]: _______ you are, _______ you concentrate.", 
            ["A. The more tired / the less", "B. Tired / less", "C. The more tired / the fewer", "D. The tired / the fewer"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The more tired' (Càng mệt mỏi), 'the less' (bạn càng ít tập trung). 'less' là so sánh hơn của 'little' bổ nghĩa cho động từ 'concentrate'.</li><li><strong>B, D sai:</strong> Thiếu 'the' hoặc dạng so sánh hơn.</li><li><strong>C sai:</strong> 'fewer' chỉ dùng cho danh từ đếm được, không dùng để bổ nghĩa cho động từ.</li></ul>"],

            ["Question 11 [516935]: As he grew older, he became _______.", 
            ["A. the more and more understanding", "B. more and more understanding", "C. understanding and understanding", "D. most understanding"], 1, 
            "<ul><li><strong>A sai:</strong> Không dùng mạo từ 'the' trong cấu trúc so sánh lũy tiến 'more and more + adj'.</li><li><strong>B đúng:</strong> 'understanding' (thấu hiểu) là tính từ dài -> 'more and more understanding' (ngày càng thấu hiểu hơn).</li><li><strong>C, D sai:</strong> Sai cấu trúc.</li></ul>"],

            ["Question 12 [516936]: _______ the weather is, _______ I feel.", 
            ["A. The warmer / the better", "B. The warm / the better", "C. Warmer / better", "D. The warmer / the best"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The + so sánh hơn (warmer)... the + so sánh hơn (better)...'. Thời tiết càng ấm, tôi càng cảm thấy tốt hơn.</li><li><strong>B sai:</strong> 'warm' chưa chia so sánh hơn.</li><li><strong>C sai:</strong> Thiếu mạo từ 'the' ở cả hai vế.</li><li><strong>D sai:</strong> 'the best' là so sánh nhất.</li></ul>"],

            ["Question 13 [516937]: _______ you exercise, _______ you will be.", 
            ["A. The more / the fitter", "B. The much / the fatter", "C. The more / the fit", "D. More / fatter"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The more' (Càng tập thể dục nhiều), 'the fitter' (càng cân đối). 'fit' là tính từ ngắn -> gấp đôi phụ âm 't' thành 'fitter'.</li><li><strong>B, C sai:</strong> 'much' không phải so sánh hơn. 'fit' chưa chia so sánh hơn.</li><li><strong>D sai:</strong> Thiếu mạo từ 'the'.</li></ul>"],

            ["Question 14 [516938]: Houses in big cities are getting _______.", 
            ["A. the most expensive", "B. more and more expensive", "C. expensive and expensive", "D. expensiver and expensiver"], 1, 
            "<ul><li><strong>A sai:</strong> Đây là so sánh nhất, không diễn đạt sự thay đổi tăng tiến.</li><li><strong>B đúng:</strong> 'expensive' là tính từ dài -> so sánh lũy tiến là 'more and more expensive' (càng ngày càng đắt).</li><li><strong>C, D sai:</strong> Sai cấu trúc cơ bản của tính từ dài.</li></ul>"],

            ["Question 15 [516939]: _______ he waited, _______ he got.", 
            ["A. The longer / the more impatient", "B. The longest / the most impatient", "C. Longer / more impatient", "D. The longer / more impatient"], 0, 
            "<ul><li><strong>A đúng:</strong> Cấu trúc 'The + so sánh hơn... the + so sánh hơn...'. 'long' là tính từ ngắn -> 'longer'. 'impatient' là tính từ dài -> 'more impatient'.</li><li><strong>B sai:</strong> Dùng so sánh nhất.</li><li><strong>C, D sai:</strong> Thiếu mạo từ 'the'.</li></ul>"],

            ["Question 16 [516940]: _______ the deadline approaches, _______ I feel.", 
            ["A. The faster / the nervous", "B. The more fast / the nervous", "C. The fast / the more nervous", "D. The faster / the more nervous"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> 'fast' là từ ngắn -> 'faster'. 'nervous' là từ dài -> 'more nervous'. Cần có 'the' ở cả hai vế.</li><li><strong>D đúng:</strong> 'The faster... the more nervous...' (Hạn chót đến càng nhanh, tôi càng cảm thấy lo lắng).</li></ul>"],

            ["Question 17 [516941]: The richer you are, _______.", 
            ["A. you may become more worried", "B. you more worried may become", "C. the more worried you may become", "D. the more worry you may become"], 2, 
            "<ul><li><strong>A, B sai:</strong> Vế thứ hai phải bắt đầu bằng 'The + so sánh hơn'.</li><li><strong>C đúng:</strong> 'worried' là tính từ dài -> 'the more worried' + S + V(you may become).</li><li><strong>D sai:</strong> 'worry' là động từ/danh từ, ở vị trí này cần tính từ chỉ cảm xúc 'worried'.</li></ul>"],

            ["Question 18 [516942]: Many endangered species are moving _______ to extinction, and we are losing our precious places.", 
            ["A. close and close", "B. closely and closely", "C. closer and closer", "D. more closely and closely"], 2, 
            "<ul><li><strong>A, B sai:</strong> Thiếu đuôi so sánh hơn.</li><li><strong>C đúng:</strong> Động từ 'move' đi với tính từ/trạng từ 'close' (gần). 'close' là từ ngắn -> 'closer and closer' (càng ngày càng tiến gần đến sự tuyệt chủng).</li><li><strong>D sai:</strong> Cấu trúc 'move close to' dùng từ ngắn 'close', không dùng 'closely'.</li></ul>"],

            ["Question 19 [516943]: The more carefully humans mind their daily activities, _______ on the environment.", 
            ["A. the less harmful impact have they", "B. the less harmful impact they have", "C. the less impact harmful they have", "D. the less harmful they have impact"], 1, 
            "<ul><li><strong>A sai:</strong> Cấu trúc so sánh kép KHÔNG đảo ngữ (không đưa 'have' lên trước 'they').</li><li><strong>B đúng:</strong> 'the less harmful impact' (cụm danh từ làm tân ngữ được đảo lên sau the less) + S (they) + V (have).</li><li><strong>C, D sai:</strong> Trật tự cụm danh từ sai. Phải là 'harmful impact'.</li></ul>"],

            ["Question 20 [516944]: Growth is of very immediate environmental concern because _______ the more pollutants we throw out into the atmosphere.", 
            ["A. the more the world economy grows", "B. the more economy the world grows", "C. the more grows the world economy", "D. the more the world grows economy"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The more' + S (the world economy) + V (grows). Nền kinh tế thế giới càng phát triển thì chúng ta càng thải nhiều chất ô nhiễm.</li><li><strong>B, D sai:</strong> Sai trật tự từ ('world economy' là nền kinh tế thế giới).</li><li><strong>C sai:</strong> Sai trật tự S-V (động từ 'grows' phải đứng cuối).</li></ul>"],

            ["Question 21 [516945]: _______ the hotel is, _______ the services are.", 
            ["A. The more expensive / the better", "B. The expensive / the good", "C. More expensive / better", "D. The most expensive / the best"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The more expensive' (Khách sạn càng đắt), 'the better' (Dịch vụ càng tốt).</li><li><strong>B, C, D sai:</strong> Thiếu mạo từ 'the' hoặc sai cấp độ so sánh (so sánh nhất).</li></ul>"],

            ["Question 22 [516946]: His speech was getting _______.", 
            ["A. boring and boring", "B. more and more boring", "C. the more boring", "D. borer and borer"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> 'boring' là tính từ dài. So sánh lũy tiến của tính từ dài là 'more and more + adj'. Không dùng 'the'.</li><li><strong>B đúng:</strong> 'more and more boring' (càng ngày càng nhàm chán).</li></ul>"],

            ["Question 23 [516947]: _______ the problem is, _______ it is to find a solution.", 
            ["A. The more complicated / the harder", "B. The complicated / the hard", "C. More complicated / harder", "D. The most complicated / the hardest"], 0,

            ["Question 24 [516948]: The company is expanding. It is getting _______.",

            ["Question 26 [516950]: It is becoming _______ to find a good job.",

            ["Question 27 [516951]: _______ she speaks, _______ people can understand her.",

            ["Question 28 [516952]: Her English is improving. It is getting _______.",

            "<ul><li><strong>A, B, D sai:</strong> Không dùng 'the'. 'good' là tính từ bất quy tắc -> 'better'. Không dùng 'more good' hay 'gooder'.</li><li><strong>C đúng:</strong> 'better and better' (càng ngày càng tốt).</li></ul>"],

            ["Question 29 [516953]: _______ you practice speaking English, _______ you will speak it.", 
            ["A. The more / the fluently", "B. The more / the more fluently", "C. More / more fluently", "D. The most / the most fluently"], 1, 
            "<ul><li><strong>A sai:</strong> Vế sau chưa chia so sánh hơn ('fluently' -> 'more fluently').</li><li><strong>B đúng:</strong> 'The more' (Càng luyện tập nhiều), 'the more fluently' (bạn sẽ càng nói trôi chảy hơn).</li><li><strong>C, D sai:</strong> Thiếu 'the' hoặc dùng so sánh nhất.</li></ul>"],

            ["Question 30 [516954]: The cost of living is going up _______.", 
            ["A. higher and higher", "B. more and more high", "C. highest and highest", "D. the higher and higher"], 0, 
            "<ul><li><strong>A đúng:</strong> 'high' là tính từ ngắn -> 'higher and higher' (Chi phí sinh hoạt đang ngày càng cao lên).</li><li><strong>B, C, D sai:</strong> Sai cấu trúc cơ bản của tính từ ngắn.</li></ul>"],

            ["Question 31 [516955]: _______ we leave, _______ we will arrive.", 
            ["A. The earlier / the sooner", "B. The early / the soon", "C. Earlier / sooner", "D. The earliest / the soonest"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The earlier' (Chúng ta rời đi càng sớm), 'the sooner' (chúng ta sẽ đến nơi càng nhanh). 'early' đổi y thành i + er.</li><li><strong>B, C, D sai:</strong> Sai cấp độ so sánh hoặc thiếu 'the'.</li></ul>"],

            ["Question 32 [516956]: The traffic in the city is getting _______.", 
            ["A. badder and badder", "B. the worse and worse", "C. worse and worse", "D. worst and worst"], 2, 
            "<ul><li><strong>A sai:</strong> 'bad' bất quy tắc, không có 'badder'.</li><li><strong>B sai:</strong> Thừa mạo từ 'the'.</li><li><strong>C đúng:</strong> 'worse and worse' (càng ngày càng tệ).</li><li><strong>D sai:</strong> Dùng so sánh nhất.</li></ul>"],

            ["Question 33 [516957]: _______ he ate, _______ he became.",

            ["Question 34 [516958]: Technology is developing _______.", 
            ["A. fast and fast", "B. the faster and faster", "C. more and more fast", "D. faster and faster"], 3,

            ["Question 35 [516959]: _______ the book is, _______ I feel.", 
            ["A. The thicker / the more discouraged", "B. The thick / the discouraged", "C. Thicker / more discouraged", "D. The thickest / the most discouraged"], 0,

            ["Question 36 [516960]: The hole in the ozone layer is becoming _______.", 
            ["A. more and more large", "B. larger and larger", "C. the larger and larger", "D. largest and largest"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> 'large' là tính từ ngắn -> 'larger and larger'. Không dùng 'more', không dùng 'the'.</li><li><strong>B đúng:</strong> Lỗ thủng tầng ozone đang ngày càng lớn hơn.</li></ul>"],

            ["Question 37 [516961]: _______ the match went on, _______ the crowd became.", 
            ["A. The long / the excited", "B. The longest / the most excited", "C. The longer / the more excited", "D. Longer / more excited"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai cấu trúc so sánh kép (The + SS Hơn... The + SS Hơn...).</li><li><strong>C đúng:</strong> 'The longer' (Trận đấu diễn ra càng lâu), 'the more excited' (đám đông càng trở nên phấn khích).</li></ul>"],

            ["Question 38 [516962]: The weather is getting _______.", 
            ["A. warm and warm", "B. warmer and warmer", "C. the warmer and warmer", "D. more and more warm"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> 'warm' là tính từ ngắn.</li><li><strong>B đúng:</strong> 'warmer and warmer' (Thời tiết càng ngày càng ấm áp).</li></ul>"],

            ["Question 39 [516963]: _______ you are, _______ mistakes you will make.", 
            ["A. The more careful / the fewer", "B. The careful / the few", "C. The more careful / the less", "D. More careful / fewer"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The more careful' (Bạn càng cẩn thận), 'the fewer mistakes' (bạn sẽ càng tạo ra ít lỗi sai hơn). 'mistakes' đếm được nên dùng 'fewer', không dùng 'less'.</li><li><strong>B, C, D sai:</strong> Sai cấu trúc hoặc dùng sai 'less' cho danh từ đếm được.</li></ul>"],

            ["Question 40 [516964]: The pollution in our city is getting _______.", 
            ["A. the more and more serious", "B. seriouser and seriouser", "C. more and more serious", "D. serious and serious"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> 'serious' là tính từ dài. So sánh lũy tiến là 'more and more serious'. KHÔNG dùng mạo từ 'the'.</li><li><strong>C đúng:</strong> Ô nhiễm trong thành phố của chúng ta càng ngày càng nghiêm trọng.</li></ul>"],

            ["Question 41 [516965]: _______ I look into your eyes, _______ I love you.", 
            ["A. The much / the much", "B. The most / the most", "C. The more / the more", "D. More / more"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> Sai cấp độ so sánh hoặc thiếu mạo từ 'the'.</li><li><strong>C đúng:</strong> 'The more... the more...' (Anh càng nhìn vào mắt em, anh càng yêu em). Cấu trúc kinh điển dùng với động từ.</li></ul>"],

            ["Question 42 [516966]: Cars are becoming _______.", 
            ["A. more and more affordable", "B. the more and more affordable", "C. affordabler and affordabler", "D. more affordable and affordable"], 0, 
            "<ul><li><strong>A đúng:</strong> 'affordable' là tính từ dài -> 'more and more affordable' (càng ngày càng có giá cả phải chăng).</li><li><strong>B, C, D sai:</strong> Sai cấu trúc so sánh lũy tiến của tính từ dài.</li></ul>"],

            ["Question 43 [516967]: _______ the house is, _______ it is to clean.", 
            ["A. The bigger / the difficult", "B. The biggest / the most difficult", "C. Bigger / more difficult", "D. The bigger / the more difficult"], 3, 
            "<ul><li><strong>A, B, C sai:</strong> Thiếu so sánh hơn ở vế sau, dùng so sánh nhất, hoặc thiếu 'the'.</li><li><strong>D đúng:</strong> 'The bigger' (Ngôi nhà càng lớn), 'the more difficult' (càng khó để dọn dẹp).</li></ul>"],

            ["Question 44 [516968]: The river is getting _______.", 
            ["A. the more and more polluted", "B. more and more polluted", "C. polluteder and polluteder", "D. more polluted and polluted"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> 'polluted' là tính từ dài, cấu trúc là 'more and more polluted', không có mạo từ 'the'.</li><li><strong>B đúng:</strong> Dòng sông đang ngày càng bị ô nhiễm.</li></ul>"],

            ["Question 45 [516969]: _______ experience you have, _______ it is to get a job.", 
            ["A. The more / the easier", "B. The much / the easy", "C. More / easier", "D. The most / the easiest"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The more experience' (Bạn càng có nhiều kinh nghiệm), 'the easier' (càng dễ để tìm việc). 'easy' tận cùng là y -> easier.</li><li><strong>B, C, D sai:</strong> Thiếu so sánh hơn, thiếu 'the' hoặc dùng so sánh nhất.</li></ul>"],

            ["Question 46 [516970]: Because of the storm, the wind blew _______.", 
            ["A. the harder and harder", "B. more and more hard", "C. harder and harder", "D. hard and hard"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> 'hard' là trạng từ ngắn. Dùng 'harder and harder' không có mạo từ 'the'.</li><li><strong>C đúng:</strong> 'harder and harder' (gió thổi càng lúc càng mạnh).</li></ul>"],

            ["Question 47 [516971]: _______ people care about the environment, _______ our planet will be.", 
            ["A. The more / the greener", "B. The much / the green", "C. More / greener", "D. The most / the greenest"], 0, 
            "<ul><li><strong>A đúng:</strong> 'The more people' (Càng nhiều người quan tâm...), 'the greener' (hành tinh của chúng ta sẽ càng xanh hơn).</li><li><strong>B, C, D sai:</strong> Sai cấu trúc The + comparative.</li></ul>"],

            ["Question 48 [516972]: His voice got _______.", 
            ["A. weaker and weaker", "B. the weaker and weaker", "C. more and more weak", "D. weak and weak"], 0, 
            "<ul><li><strong>A đúng:</strong> 'weak' là tính từ ngắn -> 'weaker and weaker' (Giọng anh ấy trở nên càng ngày càng yếu).</li><li><strong>B, C, D sai:</strong> Sai cấu trúc cơ bản của tính từ ngắn.</li></ul>"],

            ["Question 49 [516973]: _______ she gets, _______ she becomes.", 
            ["A. The old / the beautiful", "B. The older / the more beautiful", "C. Older / more beautiful", "D. The oldest / the most beautiful"], 1, 
            "<ul><li><strong>A, C, D sai:</strong> Sai cấu trúc The + SS Hơn... The + SS Hơn...</li><li><strong>B đúng:</strong> 'The older' (Càng lớn tuổi), 'the more beautiful' (cô ấy càng trở nên xinh đẹp).</li></ul>"],

            ["Question 50 [516974]: The situation is becoming _______.", 
            ["A. the more and more complex", "B. complexer and complexer", "C. more and more complex", "D. more complex and complex"], 2, 
            "<ul><li><strong>A, B, D sai:</strong> 'complex' là tính từ dài. So sánh lũy tiến là 'more and more complex'. KHÔNG dùng mạo từ 'the'.</li><li><strong>C đúng:</strong> Tình huống đang trở nên ngày càng phức tạp.</li></ul>"]
        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        const card = document.createElement("div");
        card.className = `exercise-card`;

        let htmlContent = `
            <h2 class="ex-title">🔥 50 Câu Trắc Nghiệm: So Sánh Kép</h2>
            <div class="tip-box">
                <span>💡 <strong>Mẹo làm bài:</strong> <br>- Càng ngày càng: Tính từ ngắn -> <strong>adj-er and adj-er</strong> | Tính từ dài -> <strong>more and more adj</strong>. (Tuyệt đối KHÔNG có "the").<br>- Càng... thì càng...: <strong>The + so sánh hơn + S + V, The + so sánh hơn + S + V</strong>.</span>
            </div>
            <div id="questions-container"></div>
        `;

        card.innerHTML = htmlContent;
        app.appendChild(card);

        const qContainer = document.getElementById("questions-container");

        exData.forEach((qObj) => {
            const [qText, options, correctIndex, expText] = qObj;
            
            const qBlock = document.createElement("div");
            qBlock.className = "question-block";

            const qTitle = document.createElement("div");
            qTitle.className = "question-text";
            qTitle.innerText = qText;
            qBlock.appendChild(qTitle);

            const optContainer = document.createElement("div");
            optContainer.className = "options";
            
            const expDiv = document.createElement("div");
            expDiv.className = "explanation";

            options.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = opt; // Use innerHTML to handle bolding if necessary
                
                btn.onclick = () => {
                    const siblings = optContainer.querySelectorAll(".option-btn");
                    siblings.forEach(sibling => sibling.disabled = true);

                    if(idx === correctIndex) {
                        btn.classList.add("correct");
                        currentScore++;
                        scoreDisplay.innerText = currentScore;
                        expDiv.classList.add("success", "show");
                        expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${expText}`;
                    } else {
                        btn.classList.add("incorrect");
                        siblings[correctIndex].classList.add("correct");
                        expDiv.classList.add("error", "show");
                        expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> ${expText}`;
                    }
                };
                optContainer.appendChild(btn);
            });

            qBlock.appendChild(optContainer);
            qBlock.appendChild(expDiv);
            qContainer.appendChild(qBlock);
        });
    </script>
</body>
</html>
