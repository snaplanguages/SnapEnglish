<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách bài mẫu Task 2 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Bảng màu SnapEnglish Pastel */
            --primary: #a29bfe;
            --primary-dark: #6c5ce7;
            --accent-green: #55efc4;
            --accent-orange: #e7a87c;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #f4f2ff 100%);
            --text-dark: #2d3436;
            --text-gray: #636e72;
            
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 8px 32px 0 rgba(162, 155, 254, 0.15);
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            margin: 0;
            padding: 40px 20px;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Background Shapes --- */
        .shape {
            position: fixed;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.5;
            border-radius: 50%;
            animation: float 10s infinite ease-in-out alternate;
        }
        .shape-1 { width: 350px; height: 350px; background: var(--accent-orange); top: -50px; left: -50px; }
        .shape-2 { width: 300px; height: 300px; background: var(--primary); bottom: -50px; right: -50px; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(20px) scale(1.05); }
        }

        /* --- Top Bar & Navigation --- */
        .top-bar {
            max-width: 800px;
            margin: 0 auto 30px auto;
            display: flex;
            align-items: center;
        }

        .back-btn {
            background: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            color: var(--primary-dark);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(162, 155, 254, 0.2);
            color: var(--accent-orange);
        }

        /* --- Header --- */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            font-family: 'Quicksand', sans-serif;
            font-size: 36px; 
            color: var(--primary-dark);
            margin: 0 0 10px 0;
        }

        #type-title { color: var(--accent-orange); font-weight: 700; }
        
        .subtitle { color: var(--text-gray); font-size: 16px; }

        /* --- Container Bài Mẫu --- */
        .container { 
            max-width: 800px; 
            margin: auto; 
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 50px;
        }

        /* --- Card Bài Mẫu --- */
        .sample-card { 
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 20px 25px;
            border-radius: 20px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
            box-shadow: var(--glass-shadow);
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .sample-card:hover {
            transform: translateY(-4px) scale(1.01);
            background: #ffffff;
            border-color: var(--primary);
            box-shadow: 0 12px 30px rgba(162, 155, 254, 0.25);
        }

        .sample-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .sample-title {
            font-family: 'Quicksand', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #2d3436;
            margin: 0;
        }

        .sample-desc {
            font-size: 14px;
            color: var(--text-gray);
            margin: 0;
        }

        .sample-meta {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .band-tag {
            background: #f4f2ff;
            color: var(--primary-dark);
            font-weight: 700;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid #e0dbff;
        }

        .tag-practice {
            background: #e3fded;
            color: #00b894;
            border-color: #b2f5ea;
        }

        .read-icon {
            font-size: 20px;
            color: var(--accent-orange);
            transition: 0.3s;
        }

        .sample-card:hover .read-icon {
            transform: translateX(5px);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            background: var(--glass-bg);
            border-radius: 20px;
            color: var(--text-gray);
            border: 1px dashed #b2bec3;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .sample-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .sample-meta { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="top-bar">
        <a href="javascript:history.back()" class="back-btn">⬅ Quay lại thư viện Task 2</a>
    </div>

    <div class="header-section">
        <h1>Dạng bài: <span id="type-title">Loading...</span></h1>
        <p class="subtitle">Lựa chọn bài học hoặc bài mẫu dưới đây để phân tích Idea và lập luận.</p>
    </div>

    <div class="container" id="sample-list"></div>

    <script>
        // Lấy type từ URL
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');

        // Ánh xạ tên hiển thị đẹp cho các dạng bài
        const typeNames = {
            'task2': '🧮 Công thức & Bài tập',
            'advantages-disadvantages': '⚖️ Advantages - Disadvantages',
            'agree-disagree': '✅ Agree - Disagree',
            'discussion': '💬 Discussion',
            'cause-problem-solution': '🚑 Cause - Problem - Solution',
            'consolidation': '📚 Consolidation'
        };

        document.getElementById('type-title').innerText = typeNames[type] || 'Chưa xác định';

        // Dữ liệu bài mẫu đã được làm giàu (Thêm desc và band)
        const sampleData = {
            "task2": [
                { title: "Công thức mở bài", desc: "Hướng dẫn viết Introduction ăn điểm, đi thẳng vào vấn đề.", link: "mobaitask2.html", band: "Lý thuyết" },
                { title: "Bài tập mở bài", desc: "Thực hành viết lại các mở bài theo cấu trúc chuẩn.", link: "baitapmobaitask2.html", band: "Thực hành", isPractice: true },
                { title: "Công thức thân bài", desc: "Cách phát triển Idea, lập luận và lấy ví dụ cho Body paragraph.", link: "thanbaitask2.html", band: "Lý thuyết" }
            ],
            "advantages-disadvantages": [
                { title: "Quảng cáo (advertising)", desc: "Đánh giá những lợi ích và rủi ro tiềm ẩn của quảng cáo.", link: "sampleadvantages_disadvantages-1.html", band: "Band 8.0+" },
                { title: "Làm việc từ xa (Remote work)", desc: "Phân tích ưu nhược điểm của xu hướng làm việc tại nhà.", link: "sampleadvantages_disadvantages-2.html", band: "Band 8.0" }
            ],
            "agree-disagree": [
                { title: "Giáo dục miễn phí đại học", desc: "Bảo vệ quan điểm về việc nhà nước có nên đài thọ học phí.", link: "sampleagree_disagree-1.html", band: "Band 7.0" },
                { title: "Khoảng cách thế hệ", desc: "Thảo luận mức độ đồng tình về sự khác biệt tư duy giữa các thế hệ.", link: "sampleagree_disagree-2.html", band: "Band 8.0" }
            ],
            "discussion": [
                { title: "Lương giám đốc vs. nhân viên", desc: "Phân tích góc nhìn của 2 luồng ý kiến trái chiều.", link: "samplediscussion-1.html", band: "Band 8.0+" },
                ],
            "cause-problem-solution": [
                { title: "Ùn tắc giao thông đô thị", desc: "Chỉ ra nguyên nhân và đề xuất các giải pháp khả thi.", link: "samplecause_problem_solution-1.html", band: "Band 7.0" },
                { title: "Tỷ lệ béo phì ở trẻ em", desc: "Phân tích thực trạng và cách giải quyết từ phía gia đình, xã hội.", link: "samplecause_problem_solution-2.html", band: "Band 7.5" }
            ],
            "consolidation": [
                { title: "Mạng xã hội và giới trẻ", desc: "Tại sao điều này xảy ra? Nó là tích cực hay tiêu cực?", link: "sampleconsolidation-1.html", band: "Band 8.0" },
                { title: "Người già sống độc lập", desc: "Nguyên nhân do đâu? Hậu quả đối với xã hội là gì?", link: "sampleconsolidation-2.html", band: "Band 7.5+" }
            ]
        };

        const sampleList = document.getElementById("sample-list");

        if (type && sampleData[type] && sampleData[type].length > 0) {
            sampleData[type].forEach((sample, index) => {
                const linkObj = document.createElement("a");
                linkObj.className = "sample-card";
                linkObj.href = sample.link;
                // Thiết lập target blank theo quy chuẩn hệ thống
                linkObj.target = "_blank"; 
                
                linkObj.style.animationDelay = `${index * 0.1}s`;

                // Đổi màu tag nếu là bài thực hành
                const tagClass = sample.isPractice ? "band-tag tag-practice" : "band-tag";

                linkObj.innerHTML = `
                    <div class="sample-info">
                        <h3 class="sample-title">${sample.title}</h3>
                        <p class="sample-desc">${sample.desc}</p>
                    </div>
                    <div class="sample-meta">
                        <span class="${tagClass}">${sample.band}</span>
                        <span class="read-icon">➔</span>
                    </div>
                `;
                sampleList.appendChild(linkObj);
            });
        } else {
            sampleList.innerHTML = `
                <div class="empty-state">
                    <h3>Oops! Nội dung đang được cập nhật.</h3>
                    <p>Các bài mẫu cho dạng này đang được biên soạn. Bạn vui lòng quay lại sau nhé!</p>
                </div>
            `;
        }
    </script>

</body>
</html>
