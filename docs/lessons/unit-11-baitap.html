        .container {

        /* SnapEnglish Brand Elements */

        .snap-footer {

        /* Cards & Questions */
        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.15);

        .exercise-card:hover {

        .ex-title {

        .tip-box {
            background: #fdfae8;

            padding: 15px 20px;

            align-items: center;

        }

        .question-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;

        .question-block:hover {
            border-color: #bae6fd;
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.1);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #0369a1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #f0f9ff;
            border: 2px solid #bae6fd;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: #0284c7;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #38bdf8;
            background: #e0f2fe;
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            animation: bounce 0.4s ease;
        }

        .option-btn.incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            opacity: 0.9;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.4s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fff1f2;
            color: #e11d48;
            border-left: 5px solid #f43f5e;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Nút quay về lý thuyết (Cập nhật từ back-to-top) */
        .btn-back-grammar {

            z-index: 999;
            border: 2px solid #0284c7;
            gap: 8px;

        .btn-back-grammar:hover {

            background: #0284c7;
            color: #ffffff;

        /* Color Themes for 4 Exercises */
        .color-1 { border-top-color: #38bdf8; }

        .color-2 { border-top-color: #facc15; }
        .color-2 .ex-title { color: #ca8a04; }
        .color-2 .tip-box { border-color: #fde047; color: #a16207; background: #fefce8;}

        .color-3 { border-top-color: #10b981; }
        .color-3 .ex-title { color: #059669; }
        .color-3 .tip-box { border-color: #6ee7b7; color: #047857; background: #ecfdf5;}

        .color-4 { border-top-color: #8b5cf6; }
        .color-4 .ex-title { color: #6d28d9; }
        .color-4 .tip-box { border-color: #c4b5fd; color: #5b21b6; background: #f5f3ff;}

        @media (max-width: 768px) {
            .btn-back-grammar { bottom: 15px; left: 15px; padding: 10px 15px; font-size: 0.9em; }
        }

    <script>
        const exercises = [
            {
                title: "Exercise 1: Chia dạng đúng của động từ",
                tip: "Thì Tương lai đơn rất dễ! Chỉ cần dùng: Will + Động từ nguyên thể (V-inf). Thể phủ định là Will not = Won't. <br> Dấu hiệu: tomorrow, next week, in the future, soon, think, hope, promise...",
                colorClass: "color-1",
                icon: "🚀",
                questions: [
                    { q: "1. I think it (rain) tomorrow.", options: ["rains", "will rain", "will raining"], a: "will rain", exp: "Đưa ra dự đoán cá nhân (I think) về tương lai (tomorrow) -> dùng 'will rain'." },
                    { q: "2. I promise I (not/tell) anyone your secret.", options: ["don't tell", "am not telling", "won't tell"], a: "won't tell", exp: "Đưa ra lời hứa (I promise) -> dùng Tương lai đơn. 'Will not' viết tắt là 'won't'." },
                    { q: "3. (you/help) me carry these heavy bags, please?", options: ["Do you help", "Will you help", "Are you helping"], a: "Will you help", exp: "Dùng 'Will you + V?' để đưa ra lời nhờ vả, yêu cầu ai đó giúp đỡ." },
                    { q: "4. Don't worry, I (pay) for the meal.", options: ["pay", "will pay", "am paying"], a: "will pay", exp: "Quyết định ngay tại thời điểm nói (không có kế hoạch trước) -> dùng 'will pay'." },
                    { q: "5. We (visit) our grandparents next weekend.", options: ["visit", "will visit", "will visits"], a: "will visit", exp: "Dấu hiệu 'next weekend' (cuối tuần tới). Cấu trúc: Will + V (nguyên thể không chia)." },
                    { q: "6. Maybe she (arrive) late due to the traffic jam.", options: ["will arrives", "will arrive", "arrived"], a: "will arrive", exp: "Có 'Maybe' (có lẽ) diễn tả sự phỏng đoán trong tương lai -> dùng 'will arrive'." },
                    { q: "7. I hope they (pass) the final exam.", options: ["passed", "pass", "will pass"], a: "will pass", exp: "Sau các từ chỉ hi vọng, mong đợi như 'hope, expect' thường dùng Tương lai đơn." },
                    { q: "8. (they/win) the match tomorrow?", options: ["Do they win", "Will they win", "Are they winning"], a: "Will they win", exp: "Câu hỏi ở tương lai (tomorrow) đảo 'Will' lên trước chủ ngữ: Will they win?" },
                    { q: "9. I'm sure you (like) this new movie.", options: ["like", "will like", "liked"], a: "will like", exp: "Thể hiện sự chắc chắn về một điều chưa xảy ra (I'm sure) -> dùng 'will like'." },
                    { q: "10. He (be) 20 years old next month.", options: ["is", "will be", "will is"], a: "will be", exp: "Diễn tả một sự thật/độ tuổi trong tương lai -> Will + be." },
                    { q: "11. If you study hard, you (get) good grades.", options: ["get", "will get", "got"], a: "will get", exp: "Câu điều kiện loại 1 (sự việc có thể xảy ra ở tương lai), mệnh đề chính dùng 'will get'." },
                    { q: "12. In the future, people (travel) to Mars.", options: ["will travel", "travel", "travelled"], a: "will travel", exp: "Dự đoán xa xôi 'In the future' (Trong tương lai) -> dùng 'will travel'." },
                    { q: "13. I (call) you as soon as I arrive.", options: ["call", "will call", "called"], a: "will call", exp: "Lời hứa sẽ thực hiện ngay khi đến nơi -> 'will call'." },
                    { q: "14. She (not/go) to the party because she is tired.", options: ["don't go", "isn't go", "won't go"], a: "won't go", exp: "Hành động sẽ không xảy ra ở tương lai -> won't go." },
                    { q: "15. I think cars (fly) in the next 50 years.", options: ["flies", "will fly", "are flying"], a: "will fly", exp: "Dự đoán không có căn cứ (I think... in the next 50 years) -> will fly." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice (Cách dùng Will)",
                tip: "Thì Tương lai đơn (Will) thường được dùng cho: <br>1. Quyết định tức thì. <br>2. Lời hứa. <br>3. Lời yêu cầu/Đề nghị. <br>4. Dự đoán (không có chứng cứ).",
                colorClass: "color-2",
                icon: "🌻",
                questions: [
                    { q: "1. 'It's very cold in here.' - 'I _______ turn on the heater.'", options: ["A. am going to", "B. will", "C. turn"], a: "B. will", exp: "Quyết định đưa ra ngay tại thời điểm nói (thấy lạnh nên quyết định bật máy sưởi ngay)." },
                    { q: "2. I swear I _______ tell anyone what you said.", options: ["A. won't", "B. am not going to", "C. don't"], a: "A. won't", exp: "Đưa ra lời thề/lời hứa (I swear) -> Dùng will/won't." },
                    { q: "3. _______ you please open the door for me?", options: ["A. Do", "B. Are", "C. Will"], a: "C. Will", exp: "Đưa ra lời nhờ vả, yêu cầu ai đó giúp đỡ -> Will you...?" },
                    { q: "4. I think the internet _______ be much faster in the future.", options: ["A. will", "B. goes to", "C. is"], a: "A. will", exp: "Dự đoán mang tính cá nhân (I think) về tương lai xa." },
                    { q: "5. 'The phone is ringing!' - 'I _______ answer it!'", options: ["A. am answering", "B. answer", "C. will answer"], a: "C. will answer", exp: "Nghe điện thoại reo và quyết định nhấc máy ngay lúc đó -> Quyết định tức thời (Will)." },
                    { q: "6. Don't drink coffee before bed, or you _______ sleep.", options: ["A. don't", "B. won't", "C. aren't"], a: "B. won't", exp: "Đưa ra một lời cảnh báo về hậu quả trong tương lai (sẽ không thể ngủ được)." },
                    { q: "7. I expect that he _______ arrive before 8 PM.", options: ["A. will", "B. does", "C. is going to"], a: "A. will", exp: "Sau động từ 'expect' (mong đợi) thường dùng 'will'." },
                    { q: "8. _______ we go out for dinner tonight?", options: ["A. Shall", "B. Will", "C. Do"], a: "A. Shall", exp: "Để đưa ra lời rủ rê/gợi ý với ngôi 'I' và 'We', người ta thường dùng 'Shall' thay cho 'Will' (Shall we go...?)" },
                    { q: "9. If it rains tomorrow, we _______ stay at home.", options: ["A. stay", "B. stayed", "C. will stay"], a: "C. will stay", exp: "Mệnh đề chính của Câu điều kiện loại 1 chia ở Tương lai đơn." },
                    { q: "10. This bag looks too heavy. I _______ carry it for you.", options: ["A. carry", "B. am going to carry", "C. will carry"], a: "C. will carry", exp: "Đưa ra lời đề nghị giúp đỡ ai đó ngay tại thời điểm nói -> dùng 'will'." }
                ]
            },
            {
                title: "Exercise 3: Chọn câu dịch / Phản xạ tình huống",
                tip: "Hãy tưởng tượng bạn đang giao tiếp thực tế. Bạn sẽ dùng 'Will' để hứa hẹn, dự đoán hay giúp đỡ người khác như thế nào?",
                colorClass: "color-3",
                icon: "🌿",
                questions: [
                    { q: "1. 'Tôi hứa tôi sẽ trả lại tiền cho bạn vào ngày mai.'", options: ["A. I promise I return your money tomorrow.", "B. I promise I will return your money tomorrow."], a: "B. I promise I will return your money tomorrow.", exp: "Lời hứa (promise) dùng thì Tương lai đơn (will return)." },
                    { q: "2. 'Bạn sẽ mở cửa sổ giúp tôi được không?'", options: ["A. Will you open the window for me?", "B. Do you open the window for me?"], a: "A. Will you open the window for me?", exp: "Lời yêu cầu, nhờ vả lịch sự dùng 'Will you + V?'." },
                    { q: "3. 'Tôi nghĩ rằng ngày mai trời sẽ mưa.'", options: ["A. I think it will rain tomorrow.", "B. I think it rains tomorrow."], a: "A. I think it will rain tomorrow.", exp: "Dự đoán chủ quan (I think) về ngày mai -> will rain." },
                    { q: "4. 'Ôi, tôi để quên ví ở nhà rồi.' - 'Đừng lo, tôi sẽ cho bạn mượn.'", options: ["A. Don't worry, I lend you some.", "B. Don't worry, I will lend you some."], a: "B. Don't worry, I will lend you some.", exp: "Quyết định cho mượn tiền nảy sinh ngay lúc nói (không có kế hoạch trước) -> Will lend." },
                    { q: "5. 'Chúng ta sẽ đi xem phim tối nay chứ?' (Gợi ý)", options: ["A. Will we go to the cinema tonight?", "B. Shall we go to the cinema tonight?"], a: "B. Shall we go to the cinema tonight?", exp: "Để rủ rê, đề xuất với ngôi 'we', ta dùng 'Shall we...'." },
                    { q: "6. 'Tôi sẽ không bao giờ quên sự giúp đỡ của bạn.'", options: ["A. I don't never forget your help.", "B. I will never forget your help."], a: "B. I will never forget your help.", exp: "Lời hứa/khẳng định về tương lai. 'Will never + V' = Sẽ không bao giờ." },
                    { q: "7. 'Có lẽ họ sẽ đến muộn.'", options: ["A. Perhaps they will arrive late.", "B. Perhaps they arrive late."], a: "A. Perhaps they will arrive late.", exp: "'Perhaps' (có lẽ) là dấu hiệu của sự phỏng đoán trong tương lai -> will arrive." },
                    { q: "8. 'Năm sau cô ấy sẽ tròn 20 tuổi.'", options: ["A. She is 20 years old next year.", "B. She will be 20 years old next year."], a: "B. She will be 20 years old next year.", exp: "Diễn tả một sự thật không thể thay đổi ở tương lai (độ tuổi) -> will be." },
                    { q: "9. 'Tôi sẽ làm bài tập ngay bây giờ!'", options: ["A. I will do my homework right now!", "B. I am doing my homework right now!"], a: "A. I will do my homework right now!", exp: "Vừa mới quyết định làm bài tập (chưa phải đang làm) -> Will do." },
                    { q: "10. 'Nếu bạn ăn nhiều đồ ngọt, bạn sẽ bị sâu răng.'", options: ["A. If you eat a lot of sweets, you have toothache.", "B. If you eat a lot of sweets, you will have toothache."], a: "B. If you eat a lot of sweets, you will have toothache.", exp: "Mệnh đề kết quả của Câu điều kiện 1 (dự đoán hậu quả) -> will have." }
                ]
            },
            {
                title: "Exercise 4: Will (Tương lai đơn) VS Be going to (Tương lai gần)",
                tip: "Đây là phần rất dễ nhầm! <br>✅ 'Will': Quyết định tức thì, không có kế hoạch, dự đoán KHÔNG CÓ CĂN CỨ. <br>✅ 'Be going to': Đã CÓ KẾ HOẠCH từ trước, hoặc dự đoán CÓ CĂN CỨ rõ ràng ở hiện tại (ví dụ: mây đen -> sắp mưa).",
                colorClass: "color-4",
                icon: "🔮",
                questions: [
                    { q: "1. Look at those dark clouds! It _______ rain.", options: ["A. will", "B. is going to"], a: "B. is going to", exp: "Có căn cứ rõ ràng ở hiện tại (nhìn đám mây đen kìa!) -> Dùng Tương lai gần (is going to)." },
                    { q: "2. I haven't bought any food yet. I think I _______ order a pizza.", options: ["A. will", "B. am going to"], a: "A. will", exp: "Quyết định đặt pizza vừa nảy sinh lúc nói (vì chưa mua đồ ăn) -> Dùng Will." },
                    { q: "3. We _______ visit Paris next summer. We have already booked the tickets.", options: ["A. will", "B. are going to"], a: "B. are going to", exp: "Đã có kế hoạch rõ ràng từ trước (đã đặt vé xong xuôi) -> Dùng Be going to." },
                    { q: "4. 'I have a headache.' - 'Wait here. I _______ get you some medicine.'", options: ["A. will", "B. am going to"], a: "A. will", exp: "Nghe bạn kêu đau đầu nên quyết định đi lấy thuốc ngay lập tức (không lên lịch trước) -> Dùng Will." },
                    { q: "5. Watch out! You _______ hit that tree!", options: ["A. will", "B. are going to"], a: "B. are going to", exp: "Dự đoán có căn cứ trước mắt (thấy người ta sắp đâm vào cây) -> Dùng Be going to." },
                    { q: "6. Do you think people _______ live on the moon in 2050?", options: ["A. will", "B. are going to"], a: "A. will", exp: "Dự đoán chủ quan, xa xôi, không có bằng chứng hiện tại -> Dùng Will." },
                    { q: "7. I've decided what to do. I _______ quit my job.", options: ["A. will", "B. am going to"], a: "B. am going to", exp: "Đã suy nghĩ và 'đưa ra quyết định từ trước' (I've decided) -> Dùng Be going to." },
                    { q: "8. 'The phone is ringing.' - 'I _______ get it.'", options: ["A. will", "B. am going to"], a: "A. will", exp: "Quyết định tức thì ngay khi nghe tiếng điện thoại -> Dùng Will." },
                    { q: "9. She _______ have a baby next month. The doctor told her yesterday.", options: ["A. will", "B. is going to"], a: "B. is going to", exp: "Sự việc có bằng chứng và thời gian dự kiến rõ ràng (bác sĩ đã báo) -> Dùng Be going to." },
                    { q: "10. I promise I _______ study harder next semester.", options: ["A. will", "B. am going to"], a: "A. will", exp: "Đưa ra lời hứa (I promise) -> Luôn luôn dùng Will." },
                    { q: "11. 'Did you buy bread?' - 'Oh, I forgot! I _______ buy some now.'", options: ["A. will", "B. am going to"], a: "A. will", exp: "Chợt nhớ ra là đã quên nên quyết định đi mua ngay lúc đó -> Dùng Will." },
                    { q: "12. 'Did you buy bread?' - 'Yes, I _______ make sandwiches for us.'", options: ["A. will", "B. am going to"], a: "B. am going to", exp: "Đã mua bánh mì rồi, tức là đã có dự định/kế hoạch làm sandwich từ trước -> Dùng Be going to." },
                    { q: "13. The traffic is terrible. We _______ be late for the meeting.", options: ["A. will", "B. are going to"], a: "B. are going to", exp: "Dự đoán có căn cứ thực tế trước mắt (đường đang tắc) -> Dùng Be going to." },
                    { q: "14. Perhaps she _______ forgive you if you apologize.", options: ["A. will", "B. is going to"], a: "A. will", exp: "Có từ 'Perhaps' (có lẽ) diễn tả sự phỏng đoán không chắc chắn -> Dùng Will." },
                    { q: "15. Look at the time! It's 8:30. The train _______ leave in 5 minutes.", options: ["A. will", "B. is going to"], a: "B. is going to", exp: "Sự việc sắp xảy ra có căn cứ rõ ràng (nhìn đồng hồ đã 8:30) -> Dùng Be going to." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo học tài:</strong> ${ex.tip}</span>
                </div>
            `;

            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chuẩn xác!</strong> <br> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${qObj.a}.</strong> <br> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
