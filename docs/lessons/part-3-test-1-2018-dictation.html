<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part 3 Test 1 | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* TÔNG MÀU MỚI: Amethyst Purple & Amber */
        :root {
            --primary: #6D28D9;         
            --primary-hover: #5B21B6;   
            --secondary: #F5F3FF;       
            --accent: #F59E0B;          
            --blue-pastel: #F3F4F6;     
            --blue-dark: #312E81;       
            --text-dark: #1E293B;       
            --text-light: #64748B;      
            --bg-main: #F8FAFC;         
            --white: #FFFFFF;
            --brand-pink: #E11D48;      
            --brand-text: #0F172A;
            --error-glow: #E11D48;      
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
            width: 100%;
        }
        .brand-badge {
            background-color: var(--brand-pink);
            color: var(--white);
            font-weight: 800;
            font-size: 26px;
            padding: 8px 20px;
            border-radius: 15px;
            letter-spacing: -0.5px;
        }
        .brand-title {
            color: var(--brand-text);
            font-weight: 800;
            font-size: 30px;
            letter-spacing: -0.5px;
        }

        .layout-container {
            display: flex;
            gap: 25px;
            width: 100%;
            height: 85vh;
            min-height: 600px;
        }

        .sidebar {
            flex: 1;
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(109, 40, 217, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .progress-section { text-align: center; }
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(var(--primary) 0%, #eee 0);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; transition: background 0.5s;
        }
        .progress-circle::after { content: ""; position: absolute; width: 120px; height: 120px; background: var(--white); border-radius: 50%; }
        .progress-text { position: relative; z-index: 1; font-size: 28px; font-weight: 700; color: var(--primary); }

        .instructions { background: var(--secondary); padding: 20px; border-radius: 15px; color: var(--blue-dark); }
        .instructions h3 { margin-bottom: 15px; font-size: 18px; }
        .instructions ul { list-style: none; }
        .instructions li { margin-bottom: 12px; font-size: 14.5px; line-height: 1.5; }
        kbd { background: var(--white); border: 1px solid #ccc; border-radius: 4px; padding: 3px 8px; font-family: monospace; font-size: 13px; font-weight: bold; box-shadow: 0 2px 0 #ccc; color: #333;}

        .main-content {
            flex: 3; background: var(--white); border-radius: 20px; padding: 35px;
            box-shadow: 0 10px 30px rgba(109, 40, 217, 0.1); display: flex; flex-direction: column; position: relative;
        }

        .settings-bar { display: flex; justify-content: flex-end; gap: 15px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 2px dashed #eee; }
        .setting-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-light); }
        select { padding: 6px 12px; border-radius: 8px; border: 1px solid #ddd; outline: none; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 600; color: var(--text-dark);}

        .audio-section { text-align: center; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px;}
        
        .speaker-badge { display: inline-block; padding: 8px 30px; border-radius: 20px; font-weight: bold; font-size: 16px; }
        .speaker-male { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }
        .speaker-female { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        .btn-play { background: var(--primary); color: white; border: none; padding: 15px 35px; border-radius: 50px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: 700; box-shadow: 0 4px 15px rgba(109, 40, 217, 0.3);}
        .btn-play:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .input-section { flex-grow: 1; display: flex; flex-direction: column; }
        
        .message { text-align: center; margin-bottom: 10px; min-height: 45px; }
        .glow-error {
            color: var(--error-glow);
            text-shadow: 0 0 12px rgba(225, 29, 72, 0.6);
            font-weight: 800;
            background: #FFF1F2;
            padding: 2px 6px;
            border-radius: 6px;
            border: 2px dashed var(--error-glow);
            display: inline-block;
            transform: scale(1.05);
        }
        
        textarea { width: 100%; height: 120px; padding: 20px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 22px; outline: none; transition: 0.3s; resize: none; color: var(--text-dark); line-height: 1.6; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(109, 40, 217, 0.2); }

        .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-enter { background: var(--blue-dark); color: var(--white); }
        .btn-enter:hover { background: #1E1B4B; }
        .btn-hint { background: var(--secondary); color: var(--primary); }
        .btn-hint:hover { background: #DDD6FE; }
        .btn-nav { background: #E2E8F0; color: #334155; }
        .btn-nav:hover { background: #CBD5E1; }

        /* MODAL POPUP */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; width: 90%; max-width: 550px; padding: 35px;
            border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left; position: relative; max-height: 90vh; overflow-y: auto;
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-content h3 { color: #059669; font-size: 22px; margin-bottom: 15px; text-align: center; }
        .modal-script { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 10px; text-align: center; padding-bottom: 15px; border-bottom: 2px dashed #eee;}
        .modal-content p { margin-bottom: 10px; line-height: 1.6; font-size: 16px; }
        .vocab-list { list-style-type: none; padding-left: 0; margin-top: 10px;}
        .vocab-list li { margin-bottom: 8px; background: #f8fafc; padding: 8px 15px; border-radius: 8px;}
        .vocab-list li strong { color: var(--brand-pink); font-size: 16px;}
        
        .btn-next-modal { width: 100%; background: var(--primary); color: white; margin-top: 20px; padding: 15px; font-size: 18px; }
        .btn-next-modal:hover { background: var(--primary-hover); }

        .end-screen { display: none; text-align: center; padding-top: 20px;}
        .transcript-box { text-align: left; background: #F8FAFC; padding: 25px; border-radius: 15px; height: 350px; overflow-y: auto; margin: 25px 0; border: 1px solid #E2E8F0; line-height: 1.8; font-size: 16px;}

        @media (max-width: 850px) {
            .layout-container { flex-direction: column; height: auto; }
            .sidebar { flex: none; width: 100%; order: 2; }
            .main-content { flex: none; width: 100%; order: 1; min-height: 500px;}
        }
    </style>
</head>
<body>

<div class="layout-wrapper">
    <div class="header-brand">
        <div class="brand-badge">SnapEnglish</div>
        <div class="brand-title">Part 3 Test 1</div>
    </div>

    <div class="layout-container" id="app">
        <div class="sidebar">
            <div class="progress-section">
                <h2 style="color: var(--text-dark); margin-bottom: 25px; font-size: 22px;">Tiến độ bài học</h2>
                <div class="progress-circle" id="progress-ring"><div class="progress-text"><span id="progress-percent">0</span>%</div></div>
                <p style="color: var(--text-light); font-weight: 600; margin-top: 15px;">Câu: <span id="current-sentence-num">1</span> / <span id="total-sentences"></span></p>
                <p style="font-size: 14px; color: #888; margin-top: 5px;">Số lần luyện tập: <span id="study-count">0</span></p>
            </div>
            <div class="instructions">
                <h3>⌨️ Hướng dẫn phím tắt</h3>
                <ul>
                    <li><kbd>Ctrl</kbd> Lặp lại Audio.</li>
                    <li><kbd>Tab</kbd> Gợi ý từ tiếp theo.</li>
                    <li><kbd>Enter</kbd> Kiểm tra đáp án / Chuyển câu.</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div id="learning-screen" style="display: flex; flex-direction: column; height: 100%;">
                <div class="settings-bar">
                    <div class="setting-group">
                        <label>Tốc độ:</label>
                        <select id="speed-setting">
                            <option value="0.7">0.7x</option>
                            <option value="0.9" selected>0.9x</option>
                            <option value="1.0">1.0x</option>
                            <option value="1.2">1.2x</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Lặp tự động:</label>
                        <select id="repeat-setting">
                            <option value="1" selected>1 lần</option>
                            <option value="2">2 lần</option>
                            <option value="3">3 lần</option>
                        </select>
                    </div>
                </div>

                <div class="audio-section">
                    <div id="speaker-label" class="speaker-badge speaker-male">👨 Man</div>
                    <button class="btn-play" onclick="playAudio()">🔊 Nghe Audio (Ctrl)</button>
                </div>
                
                <div class="message" id="system-message"></div>

                <div class="input-section">
                    <textarea id="user-input" placeholder="Lắng nghe hội thoại và gõ vào đây..." autofocus></textarea>
                    
                    <div class="actions">
                        <button class="btn btn-nav" onclick="prevSentenceManual()">⬅️ Back</button>
                        <button class="btn btn-enter" onclick="handleEnterAction()">Kiểm tra (Enter)</button>
                        <button class="btn btn-hint" onclick="giveHint()">💡 Gợi ý (Tab)</button>
                        <button class="btn btn-nav" onclick="nextSentenceManual()">Next ➡️</button>
                    </div>
                </div>
            </div>

            <div id="end-screen" class="end-screen">
                <h2 style="color: var(--primary); font-size: 28px;">Tuyệt vời! Hoàn thành Test 🏆</h2>
                <div class="transcript-box" id="full-transcript"></div>
                <div class="actions">
                    <button class="btn btn-enter" onclick="restartLesson()">🔄 Luyện tập lại</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
        <h3>🎉 Chính xác!</h3>
        <div class="modal-script" id="trans-en"></div>
        <p><strong>🇻🇳 Nghĩa:</strong> <span id="trans-vi"></span></p>
        <p id="grammar-container" style="display: none;"><strong>📖 Ngữ pháp/Ghi chú:</strong> <span id="trans-grammar"></span></p>
        <ul class="vocab-list" id="trans-vocab"></ul>
        <button class="btn btn-next-modal" onclick="nextSentence()">Qua câu tiếp theo (Enter) ➔</button>
    </div>
</div>

<script>
    const lessonData = [
        // Conversation 32-34
        { en: "I'm glad your store carries the new EPG8 smartphone.", vi: "Thật vui vì cửa hàng của bạn có bán mẫu điện thoại thông minh EPG8 mới.", speaker: "Man", gender: "male" },
        { en: "I've been waiting a long time to get it.", vi: "Tôi đã đợi mua nó từ lâu rồi.", speaker: "Man", gender: "male" },
        { en: "Yes, there's been a lot of interest in this phone.", vi: "Vâng, có rất nhiều sự quan tâm dành cho chiếc điện thoại này.", speaker: "Woman", gender: "female" },
        { en: "What colors does it come in?", vi: "Nó có những màu nào?", speaker: "Man", gender: "male" },
        { en: "Three: white, black, and gold.", vi: "Ba màu: trắng, đen và vàng.", speaker: "Woman", gender: "female" },
        { en: "However, since the phone has been in such high demand, our store doesn't have all three colors in stock now.", vi: "Tuy nhiên, vì nhu cầu mua điện thoại này quá cao, nên cửa hàng chúng tôi hiện không có sẵn cả ba màu trong kho.", speaker: "Woman", gender: "female" },
        { en: "Oh. What colors do you have?", vi: "Ồ. Các bạn đang có màu gì?", speaker: "Man", gender: "male" },
        { en: "Let's see. We have black phones, but no white or gold.", vi: "Để tôi xem nào. Chúng tôi có điện thoại màu đen, nhưng không có màu trắng hay vàng.", speaker: "Woman", gender: "female" },
        { en: "We can place an order from the warehouse...", vi: "Chúng tôi có thể đặt hàng từ kho...", speaker: "Woman", gender: "female" },
        { en: "The black phone looks nice. I think that's the one I'll get.", vi: "Điện thoại màu đen trông đẹp đấy. Tôi nghĩ tôi sẽ lấy cái đó.", speaker: "Man", gender: "male" },
        { en: "OK. Follow me to the register and I'll ring up your purchase.", vi: "Vâng. Hãy theo tôi đến quầy thu ngân và tôi sẽ tính tiền cho bạn.", speaker: "Woman", gender: "female" },
        { en: "Then I'll activate the device for you.", vi: "Sau đó tôi sẽ kích hoạt thiết bị cho bạn.", speaker: "Woman", gender: "female" },

        // Conversation 35-37
        { en: "Hi, Charlie. The driver who usually delivers our merchandise to the J.M. Cuisine store is out today.", vi: "Chào Charlie. Tài xế thường giao hàng hóa của chúng ta đến cửa hàng J.M. Cuisine hôm nay đi vắng rồi.", speaker: "Woman", gender: "female" },
        { en: "Do you think you could make his four o'clock delivery for him this afternoon?", vi: "Chiều nay lúc 4 giờ, bạn có thể đi giao hàng thay cho anh ấy được không?", speaker: "Woman", gender: "female" },
        { en: "Alright, but I've never made any deliveries to that store before, so I'll need some directions.", vi: "Được thôi, nhưng tôi chưa từng đi giao hàng đến cửa hàng đó bao giờ, nên tôi sẽ cần được chỉ đường.", speaker: "Man", gender: "male" },
        { en: "How do I get there from our warehouse?", vi: "Từ kho của chúng ta đi đến đó như thế nào?", speaker: "Man", gender: "male" },
        { en: "I suggest taking Route Five and getting off at the Sixth Street exit.", vi: "Tôi khuyên bạn nên đi theo Tuyến số 5 và ra ở lối thoát Sixth Street.", speaker: "Woman", gender: "female" },
        { en: "Once you're there, don't forget to have the store manager sign the delivery confirmation form.", vi: "Khi bạn đến nơi, đừng quên yêu cầu người quản lý cửa hàng ký vào biểu mẫu xác nhận giao hàng nhé.", speaker: "Woman", gender: "female" },

        // Conversation 38-40
        { en: "Hi, I'm calling about the International Food expo next month...", vi: "Xin chào, tôi gọi đến liên quan đến Hội chợ Thực phẩm Quốc tế vào tháng tới...", speaker: "Woman", gender: "female" },
        { en: "I tried to sign up online for a display space, but I couldn't submit the form.", vi: "Tôi đã cố gắng đăng ký không gian trưng bày trực tuyến, nhưng tôi không thể gửi được biểu mẫu.", speaker: "Woman", gender: "female" },
        { en: "Are you accepting any more registrations?", vi: "Các bạn có còn nhận đăng ký nữa không?", speaker: "Woman", gender: "female" },
        { en: "I'm sorry, but we're currently having some problems with our Web site.", vi: "Tôi xin lỗi, nhưng hiện tại trang web của chúng tôi đang gặp một số vấn đề.", speaker: "Man", gender: "male" },
        { en: "But I can register you by phone. Is this your first time attending the expo?", vi: "Tuy nhiên, tôi có thể đăng ký cho bạn qua điện thoại. Đây có phải là lần đầu tiên bạn tham dự hội chợ không?", speaker: "Man", gender: "male" },
        { en: "No, I had a booth last year.", vi: "Không, năm ngoái tôi đã có một gian hàng rồi.", speaker: "Woman", gender: "female" },
        { en: "In fact, I'd like to have the same exhibit location again, if possible.", vi: "Thực ra, nếu có thể, tôi muốn lấy lại vị trí trưng bày giống hệt năm ngoái.", speaker: "Woman", gender: "female" },
        { en: "Let me check. What name was the registration under?", vi: "Để tôi kiểm tra xem. Bạn đã đăng ký dưới tên gì?", speaker: "Man", gender: "male" },
        { en: "I can look up the records from last year and see if that space is still available.", vi: "Tôi có thể tra cứu hồ sơ năm ngoái và xem vị trí không gian đó có còn trống hay không.", speaker: "Man", gender: "male" },

        // Conversation 41-43
        { en: "Hi Tricia, I was just looking over the advertisement that you finished for Jenning Bank, and you did a wonderful job.", vi: "Chào Tricia, tôi vừa xem qua quảng cáo mà bạn đã hoàn thành cho Ngân hàng Jenning, bạn đã làm rất tuyệt vời.", speaker: "Man", gender: "male" },
        { en: "Thanks, it was a great campaign to work on.", vi: "Cảm ơn, đó là một chiến dịch tuyệt vời để làm việc.", speaker: "Woman", gender: "female" },
        { en: "Would you consider joining my team for our new contract with Circle Bookings?", vi: "Bạn có cân nhắc tham gia vào nhóm của tôi cho hợp đồng mới của chúng ta với Circle Bookings không?", speaker: "Man", gender: "male" },
        { en: "They're a popular travel Web site, and they're looking to expand their market with some new advertisements.", vi: "Họ là một trang web du lịch nổi tiếng và họ đang muốn mở rộng thị trường bằng một số quảng cáo mới.", speaker: "Man", gender: "male" },
        { en: "It sounds exciting, but at this point I really can't say.", vi: "Nghe thú vị đấy. Nhưng vào lúc này tôi thực sự không thể nói trước được điều gì.", speaker: "Woman", gender: "female" },
        { en: "I have a meeting with my manager tomorrow morning though.", vi: "Dù sao thì sáng mai tôi cũng có một cuộc họp với quản lý của mình.", speaker: "Woman", gender: "female" },
        { en: "OK. Would it help if I stop by your meeting and go over the details with both of you?", vi: "Được rồi. Vậy có ích không nếu tôi ghé qua cuộc họp của bạn và thảo luận chi tiết với cả hai người?", speaker: "Man", gender: "male" },
        { en: "This way, your manager will know what the project entails.", vi: "Bằng cách này, quản lý của bạn sẽ biết dự án đòi hỏi những gì.", speaker: "Man", gender: "male" },
        { en: "That sounds good.", vi: "Nghe hay đấy.", speaker: "Woman", gender: "female" },

        // Conversation 44-46
        { en: "Hello, I'm calling about renting a furnished apartment from your agency.", vi: "Xin chào. Tôi gọi đến trung tâm môi giới của bạn để hỏi về việc thuê một căn hộ đã có sẵn nội thất.", speaker: "Man", gender: "male" },
        { en: "I'll be in Kiev for two months on business, and I'd rather stay in an apartment than a hotel.", vi: "Tôi sẽ đi công tác ở Kiev trong 2 tháng, và tôi thích ở căn hộ hơn là khách sạn.", speaker: "Man", gender: "male" },
        { en: "We'd be happy to help you. Can you tell me a little more about what you're looking for?", vi: "Chúng tôi rất sẵn lòng giúp đỡ bạn. Bạn có thể cho tôi biết thêm một chút về những gì bạn đang tìm kiếm không?", speaker: "Woman", gender: "female" },
        { en: "My office is in the city center, on Pushkinska Street, and I want to be within short walking distance of it.", vi: "Văn phòng của tôi ở khu trung tâm thành phố, trên Phố Pushkinska, và tôi muốn ở một khoảng cách đi bộ ngắn đến đó.", speaker: "Man", gender: "male" },
        { en: "I'd like a one-bedroom apartment that has Internet and cable television.", vi: "Tôi muốn một căn hộ một phòng ngủ có Internet và truyền hình cáp.", speaker: "Man", gender: "male" },
        { en: "Do you think you might be able to help me with this?", vi: "Bạn có nghĩ rằng bạn có thể giúp tôi việc này không?", speaker: "Man", gender: "male" },
        { en: "We do have several rental properties in that area, though I'll need to check their availability.", vi: "Chúng tôi thực sự có một số bất động sản cho thuê trong khu vực đó, mặc dù tôi sẽ cần phải kiểm tra xem chúng có đang trống hay không.", speaker: "Woman", gender: "female" },
        { en: "What are your exact arrival and departure dates?", vi: "Ngày đến và ngày đi chính xác của bạn là ngày nào?", speaker: "Woman", gender: "female" },

        // Conversation 47-49

    window.currentIndex = 0;
    let currentPlayCount = 0;
    let playTimeout;
    const synth = window.speechSynthesis;
    let maleVoice = null;
    let femaleVoice = null;

    const msgBox = document.getElementById("system-message");
    const inputField = document.getElementById("user-input");
    const modalOverlay = document.getElementById("feedback-modal");
    const labelDisplay = document.getElementById("speaker-label");

    function loadVoices() {
        let voices = synth.getVoices();
        if(voices.length === 0) return;
        maleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Google UK English Male'))) || voices.find(v => v.lang.startsWith('en'));
        femaleVoice = voices.find(v => v.lang.includes('en') && (v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Zira') || v.name.includes('Google US English'))) || voices.find(v => v.lang.startsWith('en'));
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.onload = () => {
        loadVoices();
        let count = localStorage.getItem('part3_test1_2018_count') || 0;
        document.getElementById('study-count').innerText = count;
        document.getElementById('total-sentences').innerText = lessonData.length;
        
        let savedIndex = parseInt(localStorage.getItem('part3_test1_2018_progress'));
        if (!isNaN(savedIndex) && savedIndex < lessonData.length) {
            window.currentIndex = savedIndex;
        }

        updateUI();
    };

    function updateUI() {
        updateProgress();
        document.getElementById('current-sentence-num').innerText = window.currentIndex + 1;
        
        const data = lessonData[window.currentIndex];
        
        // Update Speaker Label
        if (data.gender === "male") {
            labelDisplay.innerText = "👨 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-male";
        } else {
            labelDisplay.innerText = "👩 " + data.speaker;
            labelDisplay.className = "speaker-badge speaker-female";
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Control') {
            e.preventDefault();
            playAudio();
        } else if (e.key === 'Tab') {
            e.preventDefault();
            giveHint();
        } else if (e.key === 'Enter' && modalOverlay.style.display !== "flex") {
            e.preventDefault();
            handleEnterAction();
        }
    });

    function handleEnterAction() {
        if (modalOverlay.style.display === "flex") {
            nextSentence();
        } else {
            checkAnswer();
        }
    }

    function playAudio() {
        currentPlayCount = 0;
        clearTimeout(playTimeout);
        triggerAudioLoop();
    }

    function triggerAudioLoop() {
        if (synth.speaking) synth.cancel();
        
        const data = lessonData[window.currentIndex];
        const utterThis = new SpeechSynthesisUtterance(data.en);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value);
        
        if (data.gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
        else if (data.gender === 'male' && maleVoice) utterThis.voice = maleVoice;
        
        utterThis.onend = () => {
            currentPlayCount++;
            const maxRepeat = parseInt(document.getElementById('repeat-setting').value);
            if (currentPlayCount < maxRepeat) {
                playTimeout = setTimeout(triggerAudioLoop, 500);
            }
        };
        
        synth.speak(utterThis);
        if (modalOverlay.style.display !== "flex") inputField.focus();
    }

// 1. Hàm xóa dấu câu và ĐỒNG BỘ DẤU NHÁY từ mọi thiết bị
    function normalizeText(text) { 
        // Gom tất cả nháy cong, nháy ngược về nháy thẳng (')
        let standardText = text.replace(/[’‘`´]/g, "'"); 
        return standardText.toLowerCase().replace(/[.,?!–\-:"]/g, '').trim(); 
    }

    // 2. Hàm hỗ trợ quy đổi từ viết tắt sang dạng đầy đủ
    function expandContractions(text) {
        // Đồng bộ dấu nháy trước khi tra từ điển
        let lower = text.toLowerCase().replace(/[’‘`´]/g, "'");
        const dict = {
            "they're": "they are", "we're": "we are", "you're": "you are",
            "he's": "he is", "she's": "she is", "it's": "it is", "that's": "that is", "there's": "there is", "who's": "who is", "what's": "what is",
            "i'm": "i am",
            "they'd": "they would", "we'd": "we would", "you'd": "you would", "he'd": "he would", "she'd": "she would", "i'd": "i would",
            "they've": "they have", "we've": "we have", "you've": "you have", "i've": "i have",
            "they'll": "they will", "we'll": "we will", "you'll": "you will", "he'll": "he will", "she'll": "she will", "it'll": "it will", "i'll": "i will",
            "don't": "do not", "doesn't": "does not", "didn't": "did not",
            "isn't": "is not", "aren't": "are not", "wasn't": "was not", "weren't": "were not",
            "haven't": "have not", "hasn't": "has not", "hadn't": "had not",
            "can't": "can not", "cannot": "can not", "won't": "will not", "wouldn't": "would not",
            "shouldn't": "should not", "couldn't": "could not", "mustn't": "must not"
        };
        
        lower = lower.replace(/[.,?!–\-:"]/g, '');
        return lower.split(/\s+/).map(w => dict[w] || w).join(' ').trim();
    }
    // 3. Hàm chuẩn hóa chính tả Anh-Anh sang Anh-Mỹ để bao dung lỗi
    function normalizeSpelling(text) {
        return text
            .replace(/ise\b/g, 'ize')
            .replace(/ised\b/g, 'ized')
            .replace(/ising\b/g, 'izing')
            .replace(/ises\b/g, 'izes')
            .replace(/isation/g, 'ization')
            .replace(/our\b/g, 'or')
            .replace(/ours\b/g, 'ors')
            .replace(/tre\b/g, 'ter')
            .replace(/tres\b/g, 'ters')
            .replace(/lling\b/g, 'ling')
            .replace(/lled\b/g, 'led');
    }
    function checkAnswer() {
        const rawUserInput = inputField.value;
        const rawTargetText = lessonData[window.currentIndex].en;
        
        const userInputExpanded = normalizeSpelling(expandContractions(rawUserInput).replace(/'/g, ''));
        const targetTextExpanded = normalizeSpelling(expandContractions(rawTargetText).replace(/'/g, ''));
        
        if (userInputExpanded === targetTextExpanded) {
            msgBox.innerText = "";
            showModal();
            return;
        }

        if (targetTextExpanded.startsWith(userInputExpanded) && userInputExpanded.length > 0) {
            msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
            return; 
        }

        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(rawTargetText);
        
        const userWordsNorm = userInput.split(' ').filter(w => w !== "");
        const targetWordsNorm = targetText.split(' ');
        
        const rawWords = rawUserInput.trim().split(/\s+/);

        if (userWordsNorm.length === 0) {
            msgBox.innerText = "Bạn chưa gõ gì cả. Nhấn Ctrl để nghe nhé!";
            return;
        }

        let wrongIndex = -1;
            for (let i = 0; i < userWordsNorm.length; i++) {
                if (userWordsNorm[i] !== targetWordsNorm[i]) {
                    wrongIndex = i;
                    break;
                }
            }

            if (wrongIndex !== -1) {
                let startPos = 0;
                for (let k = 0; k < wrongIndex; k++) {
                    startPos += rawWords[k].length + 1; 
                }
                
                const leadingSpaces = inputField.value.length - inputField.value.trimStart().length;
                startPos += leadingSpaces;
                let endPos = startPos + rawWords[wrongIndex].length;

                inputField.focus();
                inputField.setSelectionRange(startPos, endPos);

                let displayHTML = rawWords.map((w, idx) => {
                    if (idx === wrongIndex) {
                        return `<span class="glow-error">${w}</span>`;
                    }
                    return w;
                }).join(' ');

                msgBox.innerHTML = `Vị trí sai:<br><div style="margin-top:12px; font-size:19px; color:var(--text-dark); font-weight: 500;">${displayHTML}</div>`;
                
            } else if (userWordsNorm.length < targetWordsNorm.length) {
                msgBox.innerText = "Chưa hết câu, hãy nghe thêm và gõ tiếp nhé!";
                inputField.focus();
                inputField.setSelectionRange(inputField.value.length, inputField.value.length);
            } else {
                msgBox.innerText = "Có lỗi sai chính tả nhỏ, hãy kiểm tra lại.";
            }
        
    }

    function giveHint() {
        if (modalOverlay.style.display === "flex") return;

        const rawUserInput = inputField.value;
        const userInput = normalizeText(rawUserInput);
        const targetText = normalizeText(lessonData[window.currentIndex].en);
        
        const targetWordsRaw = lessonData[window.currentIndex].en.split(' ');
        const targetWordsNorm = targetText.split(' ');
        const userWords = userInput.split(' ').filter(w => w !== "");

        let hintWord = targetWordsRaw[userWords.length];
        for (let i = 0; i < userWords.length; i++) {
            if (userWords[i] !== targetWordsNorm[i]) {
                hintWord = targetWordsRaw[i];
                inputField.value = targetWordsRaw.slice(0, i).join(' ') + (i > 0 ? " " : "");
                break;
            }
        }

        if (hintWord) {
            inputField.value += (inputField.value.length > 0 && !inputField.value.endsWith(' ') ? ' ' : '') + hintWord + ' ';
            msgBox.innerText = "Đã điền từ tiếp theo!";
        }
    }

    function showModal() {
        inputField.blur();
        const data = lessonData[window.currentIndex];
        
        document.getElementById("trans-en").innerText = data.en;
        document.getElementById("trans-vi").innerText = data.vi;
        
        // Render Grammar & Vocab
        const grammarContainer = document.getElementById("grammar-container");
        if(data.grammar) {
            grammarContainer.style.display = "block";
            document.getElementById("trans-grammar").innerText = data.grammar;
        } else {
            grammarContainer.style.display = "none";
        }
        
        const vocabList = document.getElementById("trans-vocab");
        vocabList.innerHTML = "";
        if(data.vocab && data.vocab.length > 0) {
            data.vocab.forEach(v => {
                let li = document.createElement("li");
                let parts = v.split(" (");
                li.innerHTML = `<strong>${parts[0]}</strong> (${parts[1]}`;
                vocabList.appendChild(li);
            });
        }

        modalOverlay.style.display = "flex";
        document.querySelector('.btn-next-modal').focus();
    }

    function prevSentenceManual() {
        if (window.currentIndex > 0) {
            window.currentIndex--;
            resetForNewSentence();
        }
    }

    function nextSentenceManual() {
        if (window.currentIndex < lessonData.length - 1) {
            window.currentIndex++;
            resetForNewSentence();
        } else {
            finishLesson();
        }
    }
    
    function resetForNewSentence() {
        modalOverlay.style.display = "none";
        inputField.value = "";
        msgBox.innerHTML = "";
        localStorage.setItem('part3_test1_2018_progress', window.currentIndex);
        if(window.saveProgressToCloud) window.saveProgressToCloud(window.currentIndex);
        updateUI();
        playAudio();
    }

    function nextSentence() {
        modalOverlay.style.display = "none";
        window.currentIndex++;
        inputField.value = "";
        msgBox.innerHTML = "";
        
        if (window.currentIndex < lessonData.length) {
            localStorage.setItem('part3_test1_2018_progress', window.currentIndex);
            if(window.saveProgressToCloud) window.saveProgressToCloud(window.currentIndex);
            updateUI();
            playAudio();
        } else {
            finishLesson();
        }
    }

    function updateProgress() {
        const percent = Math.round((window.currentIndex / lessonData.length) * 100);
        document.getElementById("progress-percent").innerText = percent;
        document.getElementById("progress-ring").style.background = `conic-gradient(var(--primary) ${percent}%, #eee 0)`;
    }

    // HÀM NGHE AUDIO RIÊNG Ở MÀN HÌNH KẾT THÚC (End Screen)
    window.playEndScreenAudio = function(text, gender) {
        if (synth.speaking) synth.cancel();
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'en-US';
        utterThis.rate = parseFloat(document.getElementById('speed-setting').value) || 1.0; 
        if (gender === 'female' && femaleVoice) utterThis.voice = femaleVoice;
        else if (gender === 'male' && maleVoice) utterThis.voice = maleVoice;
        synth.speak(utterThis);
    };

    function finishLesson() {
        document.getElementById("learning-screen").style.display = "none";
        document.getElementById("end-screen").style.display = "block";
        
        let count = parseInt(localStorage.getItem('part3_test1_2018_count')) || 0;
        count++;
        localStorage.setItem('part3_test1_2018_count', count);
        document.getElementById('study-count').innerText = count;

        localStorage.removeItem('part3_test1_2018_progress');
        if(window.saveProgressToCloud) window.saveProgressToCloud(0);

        const transcriptBox = document.getElementById("full-transcript");
        let htmlContent = "";

        lessonData.forEach(d => {
            const color = d.gender === 'male' ? '#1565c0' : '#c62828';
            htmlContent += `<p style="margin-bottom:12px; padding-left: 10px;">
                <strong style="color:${color}">${d.speaker}:</strong> <span style="font-weight: 500;">${d.en}</span>
                <button onclick="playEndScreenAudio(\`${d.en.replace(/`/g, "'")}\`, '${d.gender}')" style="background:none; border:none; cursor:pointer; font-size:18px; margin-left: 5px; transition: 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" title="Nghe lại câu này">🔊</button><br>
                <span style="color:var(--text-light); font-size: 14px;">${d.vi}</span>
            </p>`;
        });
        transcriptBox.innerHTML = htmlContent;
    }

    function restartLesson() {
        localStorage.setItem('part3_test1_2018_progress', 0);
        location.reload();
    }
</script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    // Cấu hình Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyBlTU4B563sSsTVbLai_je29l6eC8T-cm0",
        authDomain: "snapenglish-cb6e2.firebaseapp.com",
        projectId: "snapenglish-cb6e2",
        storageBucket: "snapenglish-cb6e2.firebasestorage.app",
        messagingSenderId: "373152038413",
        appId: "1:373152038413:web:19284622571390f8585f44"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app); 

    window.saveProgressToCloud = async (progressIndex) => {
        if (window.currentUserUid) {
            try {
                await setDoc(doc(db, "userProgress", window.currentUserUid), {
                    part3_test1_2018_progress: progressIndex
                }, { merge: true });
            } catch (e) {
                console.error("Lỗi khi lưu tiến độ:", e);
            }
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            window.currentUserUid = user.uid;
            window.currentUserEmail = user.email;
            
            try {
                const docRef = doc(db, "userProgress", user.uid);
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    let cloudProgress = docSnap.data().part3_test1_2018_progress; 
                    if (cloudProgress !== undefined) {
                        window.currentIndex = cloudProgress; 
                        window.updateUI();
                    }
                }
            } catch (error) {
                console.error("Lỗi khi tải tiến độ:", error);
            }
        } else {
            window.currentUserUid = null;
            window.currentUserEmail = null;
        }
    });
</script>
