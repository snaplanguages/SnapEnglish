    <title>Luyện Tập Grammar Unit 9 - Thì Quá Khứ Tiếp Diễn</title>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f3ff;
            --text-main: #312e81;
            --white: #ffffff;
            --primary: #818cf8;
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#c7d2fe 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* THANH CỐ ĐỊNH NHỎ GỌN */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #6366f1, #c084fc);
            padding: 10px 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            border: 3px solid #fff;
            border-top: none;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #fff;
            font-size: 1.6em;
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: #fff;
            font-size: 0.95em;
            font-weight: 700;
            margin-top: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 5px 25px;
            border-radius: 20px;
            font-size: 1.25em;
            font-weight: 800;
            color: #6366f1;
            margin-top: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px dashed #c084fc;
            transition: transform 0.3s ease;
        }

        .score-board:hover {
            transform: scale(1.05);
        }

        .container {
            max-width: 900px;
            margin: 30px auto 0;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.15);
            border-top: 8px solid;
            transition: transform 0.3s ease;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #eef2ff;
            border: 2px dashed;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05em;
        }

        .question-block {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e0e7ff;
            transition: all 0.3s ease;
        }

        .question-block:hover {
            border-color: #a5b4fc;
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.1);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #3730a3;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #f8fafc;
            border: 2px solid #c7d2fe;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: #4338ca;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #6366f1;
            background: #eef2ff;
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            animation: bounce 0.4s ease;
        }

        .option-btn.incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            opacity: 0.9;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.4s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fff1f2;
            color: #e11d48;
            border-left: 5px solid #f43f5e;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-to-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #8b5cf6;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            background: #6d28d9;
        }

        /* Color Themes for 4 Exercises */
        .color-1 { border-top-color: #6366f1; }
        .color-1 .ex-title { color: #4338ca; }
        .color-1 .tip-box { border-color: #a5b4fc; color: #3730a3; background: #eef2ff;}

        .color-2 { border-top-color: #d946ef; }
        .color-2 .ex-title { color: #a21caf; }
        .color-2 .tip-box { border-color: #f5d0fe; color: #86198f; background: #fdf4ff;}

        .color-3 { border-top-color: #06b6d4; }
        .color-3 .ex-title { color: #0e7490; }
        .color-3 .tip-box { border-color: #67e8f9; color: #155e75; background: #ecfeff;}

        .color-4 { border-top-color: #f59e0b; }
        .color-4 .ex-title { color: #b45309; }
        .color-4 .tip-box { border-color: #fcd34d; color: #92400e; background: #fffbeb;}

    </style>
</head>

    <div class="sticky-header">
        <h1>🌌 Trạm Luyện Tập Grammar 🌌</h1>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Chia động từ ở thì Quá khứ tiếp diễn",
                tip: "Cấu trúc: Was/Were + V-ing. Dùng cho hành động ĐANG XẢY RA tại một thời điểm CHÍNH XÁC trong quá khứ (at 8 pm yesterday, at this time last week...). 'I/He/She/It' đi với 'was', 'You/We/They' đi với 'were'.",
                colorClass: "color-1",
                icon: "🔮",
                questions: [
                    { q: "1. At 8 o'clock yesterday evening, I (watch) TV.", options: ["watched", "was watching", "were watching"], a: "was watching", exp: "Có giờ giấc cụ thể trong quá khứ 'At 8 o'clock yesterday evening' -> QK Tiếp diễn. Ngôi 'I' dùng 'was'." },
                    { q: "2. What (you/do) at this time last week?", options: ["did you do", "were you doing", "was you doing"], a: "were you doing", exp: "Dấu hiệu 'at this time last week' (vào giờ này tuần trước). Chủ ngữ 'you' dùng 'were'." },
                    { q: "3. He (not/sleep) when I called him.", options: ["didn't sleep", "wasn't sleeping", "weren't sleeping"], a: "wasn't sleeping", exp: "Hành động 'đang ngủ' bị hành động 'gọi điện' cắt ngang. Ngôi 'He' dùng 'wasn't'." },
                    { q: "4. They (play) football at 4 pm yesterday.", options: ["were playing", "was playing", "played"], a: "were playing", exp: "Có thời gian cụ thể ở quá khứ 'at 4 pm yesterday'. Chủ ngữ 'They' dùng 'were'." },
                    { q: "5. While my mother (cook) dinner, my father (read) a book.", options: ["cooked - read", "was cooking - was reading", "was cooking - read"], a: "was cooking - was reading", exp: "Hai hành động đang diễn ra song song cùng lúc trong quá khứ (có 'While'). Cả 2 đều dùng QK Tiếp diễn." },
                    { q: "6. (she/work) in the garden at 9 am yesterday?", options: ["Did she work", "Were she working", "Was she working"], a: "Was she working", exp: "Hỏi về hành động đang diễn ra vào 9h sáng hôm qua -> Đảo 'Was' lên trước 'she'." },
                    { q: "7. I (walk) down the street when it began to rain.", options: ["walked", "was walking", "were walking"], a: "was walking", exp: "Tôi 'đang đi bộ' thì trời 'bắt đầu mưa' (cắt ngang) -> Dùng QK Tiếp diễn cho hành động kéo dài." },
                    { q: "8. At this time last year, we (live) in London.", options: ["lived", "was living", "were living"], a: "were living", exp: "Dấu hiệu 'At this time last year'. Ngôi 'we' dùng 'were'." },
                    { q: "9. The children (make) a lot of noise, so I couldn't concentrate.", options: ["were making", "made", "was making"], a: "were making", exp: "Trẻ em 'đang làm ồn' nên tôi không thể tập trung. 'The children' (số nhiều) -> 'were making'." },
                    { q: "10. While we (wait) for the bus, we saw an accident.", options: ["waited", "was waiting", "were waiting"], a: "were waiting", exp: "Sau 'While' thường đi với thì Tiếp diễn (chúng tôi đang đợi xe buýt...)." },
                    { q: "11. She (not/pay) attention while the teacher was explaining.", options: ["didn't pay", "wasn't paying", "weren't paying"], a: "wasn't paying", exp: "Hai hành động song song: Cô ấy 'đang không chú ý' trong khi giáo viên 'đang giảng bài'." },
                    { q: "12. What (they/do) when the fire alarm went off?", options: ["did they do", "was they doing", "were they doing"], a: "were they doing", exp: "Họ 'đang làm gì' khi chuông báo cháy reo lên? Dùng 'were they doing'." },
                    { q: "13. At 10 pm last night, my brother (play) video games.", options: ["played", "was playing", "were playing"], a: "was playing", exp: "Thời điểm chính xác trong quá khứ. 'my brother' là số ít -> 'was playing'." },
                    { q: "14. I (listen) to music while I was driving to work.", options: ["listened", "was listening", "were listening"], a: "was listening", exp: "Hai hành động đang diễn ra đồng thời: nghe nhạc và lái xe." },
                    { q: "15. He (take) a shower when the phone rang.", options: ["took", "were taking", "was taking"], a: "was taking", exp: "Anh ấy 'đang tắm' thì điện thoại reo. Ngôi 'He' -> 'was taking'." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice (Trắc nghiệm tổng hợp)",
                tip: "Chú ý mệnh đề chứa 'When' (Khi) và 'While' (Trong khi). Thường thì 'When' + QK Đơn, và 'While' + QK Tiếp diễn nhé!",
                colorClass: "color-2",
                icon: "🪁",
                questions: [
                    { q: "1. When I saw him, he _______ to a stranger.", options: ["A. talked", "B. was talking", "C. is talking"], a: "B. was talking", exp: "Khi tôi thấy anh ấy (sự việc cắt ngang), anh ấy đang nói chuyện với một người lạ (hành động đang kéo dài)." },
                    { q: "2. While I _______ my homework, the lights went out.", options: ["A. was doing", "B. did", "C. am doing"], a: "A. was doing", exp: "Sau 'While' ta dùng QK Tiếp diễn (Trong lúc tôi đang làm bài...)." },
                    { q: "3. They _______ when the teacher entered the room.", options: ["A. were talking", "B. talked", "C. are talking"], a: "A. were talking", exp: "Họ 'đang nói chuyện' thì giáo viên bước vào." },
                    { q: "4. What _______ at 9 pm last night?", options: ["A. did you do", "B. were you doing", "C. are you doing"], a: "B. were you doing", exp: "Hỏi về hành động đang diễn ra tại một mốc giờ cụ thể đêm qua." },
                    { q: "5. I _______ down the street when I met my old friend.", options: ["A. walked", "B. was walking", "C. walk"], a: "B. was walking", exp: "Hành động đang đi bộ (kéo dài) bị hành động gặp bạn (chớp nhoáng cắt ngang)." },
                    { q: "6. She _______ dinner when we arrived.", options: ["A. cooked", "B. cooks", "C. was cooking"], a: "C. was cooking", exp: "Cô ấy 'đang nấu ăn' thì chúng tôi đến." },
                    { q: "7. While we _______ in the park, it started to rain.", options: ["A. was walking", "B. were walking", "C. walked"], a: "B. were walking", exp: "'We' (số nhiều) đi với 'were walking' sau mệnh đề 'While'." },
                    { q: "8. The sun _______ brightly when we got up this morning.", options: ["A. shined", "B. is shining", "C. was shining"], a: "C. was shining", exp: "Miêu tả bối cảnh đang diễn ra (mặt trời đang chiếu sáng) lúc chúng tôi thức dậy." },
                    { q: "9. He _______ fast when the police stopped him.", options: ["A. drove", "B. was driving", "C. is driving"], a: "B. was driving", exp: "Anh ta 'đang lái xe' rất nhanh thì bị cảnh sát dừng lại." },
                    { q: "10. At this time yesterday, I _______ for my exam.", options: ["A. prepared", "B. was preparing", "C. am preparing"], a: "B. was preparing", exp: "Dấu hiệu 'At this time yesterday' bắt buộc dùng QK Tiếp diễn." },
                    { q: "11. My brother _______ TV while I _______ a book.", options: ["A. was watching / was reading", "B. watched / read", "C. was watching / read"], a: "A. was watching / was reading", exp: "Hai hành động song song cùng diễn ra trong quá khứ." },
                    { q: "12. _______ you _______ a shower when the phone rang?", options: ["A. Did / take", "B. Are / taking", "C. Were / taking"], a: "C. Were / taking", exp: "Hỏi xem bạn 'có đang' tắm lúc điện thoại reo không." },
                    { q: "13. We _______ football at 5 pm yesterday.", options: ["A. played", "B. were playing", "C. are playing"], a: "B. were playing", exp: "Có mốc giờ cụ thể 'at 5 pm yesterday'." },
                    { q: "14. The baby _______ soundly when the doorbell rang.", options: ["A. slept", "B. is sleeping", "C. was sleeping"], a: "C. was sleeping", exp: "Em bé 'đang ngủ' ngon lành thì chuông cửa reo." },
                    { q: "15. While I _______ for the bus, I dropped my phone.", options: ["A. waited", "B. was waiting", "C. am waiting"], a: "B. was waiting", exp: "Trong lúc 'đang đợi' xe buýt (kéo dài), tôi làm rơi điện thoại (cắt ngang)." }
                ]
            },
            {
                title: "Exercise 3: Chọn câu dịch / đồng nghĩa",
                tip: "Phân tích kĩ bối cảnh bằng tiếng Việt: Cái gì 'đang' diễn ra, cái gì 'bất chợt' xen vào? Từ đó ráp đúng công thức của 2 thì.",
                colorClass: "color-3",
                icon: "🌙",
                questions: [
                    { q: "1. 'Tôi đang tắm thì điện thoại reo.'", options: ["A. I took a shower when the phone was ringing.", "B. I was taking a shower when the phone rang."], a: "B. I was taking a shower when the phone rang.", exp: "Đang tắm (was taking) là hành động dài, điện thoại reo (rang) cắt ngang." },
                    { q: "2. 'Họ đang chơi bóng đá lúc 4 giờ chiều hôm qua.'", options: ["A. They played football at 4 pm yesterday.", "B. They were playing football at 4 pm yesterday."], a: "B. They were playing football at 4 pm yesterday.", exp: "Có giờ cụ thể (4 pm) -> Thì tiếp diễn." },
                    { q: "3. 'Trong khi mẹ tôi đang nấu ăn, tôi đang dọn dẹp nhà cửa.'", options: ["A. While my mother was cooking, I was cleaning the house.", "B. When my mother cooked, I cleaned the house."], a: "A. While my mother was cooking, I was cleaning the house.", exp: "Hai hành động song song dùng 'While' và đều chia Tiếp diễn." },
                    { q: "4. 'Bạn đang làm gì vào giờ này tuần trước?'", options: ["A. What did you do at this time last week?", "B. What were you doing at this time last week?"], a: "B. What were you doing at this time last week?", exp: "Hỏi về sự việc đang diễn ra vào 1 thời điểm cụ thể -> What were you doing..." },
                    { q: "5. 'Trời đang mưa rất to khi chúng tôi rời khỏi nhà.'", options: ["A. It was raining heavily when we left home.", "B. It rained heavily when we were leaving home."], a: "A. It was raining heavily when we left home.", exp: "Bối cảnh 'trời đang mưa' (kéo dài) lúc hành động 'rời nhà' (ngắn) xảy ra." },
                    { q: "6. 'Cô ấy đã không chú ý khi giáo viên đang giảng bài.'", options: ["A. She didn't pay attention when the teacher explained.", "B. She wasn't paying attention while the teacher was explaining."], a: "B. She wasn't paying attention while the teacher was explaining.", exp: "Sự lơ đễnh diễn ra song song với việc giảng bài." },
                    { q: "7. 'Chúng tôi đang ngủ thì nghe thấy tiếng ồn lớn.'", options: ["A. We were sleeping when we heard a loud noise.", "B. We slept when we were hearing a loud noise."], a: "A. We were sleeping when we heard a loud noise.", exp: "Đang ngủ (were sleeping) thì bất chợt nghe tiếng ồn (heard)." },
                    { q: "8. 'Anh ấy đang làm gì khi vụ tai nạn xảy ra?'", options: ["A. What was he doing when the accident happened?", "B. What did he do when the accident was happening?"], a: "A. What was he doing when the accident happened?", exp: "Vụ tai nạn là sự việc chớp nhoáng (happened), câu hỏi muốn biết lúc đó anh ta đang làm gì (was he doing)." },
                    { q: "9. 'Lúc 10 giờ tối qua, tôi không đọc sách.'", options: ["A. At 10 pm last night, I didn't read a book.", "B. At 10 pm last night, I wasn't reading a book."], a: "B. At 10 pm last night, I wasn't reading a book.", exp: "Có mốc thời gian 10h tối cụ thể -> Dùng QK Tiếp diễn phủ định." },
                    { q: "10. 'Trong lúc họ đang lái xe, chiếc xe bị hỏng.'", options: ["A. While they were driving, the car broke down.", "B. While they drove, the car was breaking down."], a: "A. While they were driving, the car broke down.", exp: "Đang lái xe (were driving) thì xe hỏng (broke down - bất thình lình)." }
                ]
            },
            {
                title: "Exercise 4: Quá khứ đơn (Past Simple) vs Quá khứ tiếp diễn (Past Continuous)",
                tip: "Hành động dài, đang làm nền -> chia Quá khứ tiếp diễn (was/were V-ing). Hành động ngắn, đột ngột cắt ngang -> chia Quá khứ đơn (V-ed/V2).",
                colorClass: "color-4",
                icon: "⚔️",
                questions: [
                    { q: "1. I (read) a book when the phone (ring).", options: ["A. read / was ringing", "B. was reading / rang"], a: "B. was reading / rang", exp: "Tôi ĐANG đọc sách (was reading) thì điện thoại CẮT NGANG (rang)." },
                    { q: "2. While they (sleep), a thief (break) into their house.", options: ["A. were sleeping / broke", "B. slept / was breaking"], a: "A. were sleeping / broke", exp: "Đang ngủ (were sleeping) thì kẻ trộm đột nhập (broke)." },
                    { q: "3. When I (arrive), she (have) dinner.", options: ["A. arrived / was having", "B. was arriving / had"], a: "A. arrived / was having", exp: "Lúc tôi TỚI (arrived - ngắn), cô ấy ĐANG ăn tối (was having - nền)." },
                    { q: "4. He (fall) down while he (run) in the park.", options: ["A. fell / was running", "B. was falling / ran"], a: "A. fell / was running", exp: "Đang chạy (was running) thì bị ngã (fell)." },
                    { q: "5. The electricity (go) out while we (watch) a movie.", options: ["A. went / were watching", "B. was going / watched"], a: "A. went / were watching", exp: "Cúp điện (went out) cắt ngang lúc đang xem phim (were watching)." },
                    { q: "6. When the teacher (enter) the room, the students (talk) loudly.", options: ["A. entered / were talking", "B. was entering / talked"], a: "A. entered / were talking", exp: "Học sinh ĐANG ồn ào (were talking) thì giáo viên BƯỚC VÀO (entered)." },
                    { q: "7. I (see) an accident while I (wait) for the bus.", options: ["A. saw / was waiting", "B. was seeing / waited"], a: "A. saw / was waiting", exp: "Trong lúc đang đợi xe (was waiting), tôi nhìn thấy tai nạn (saw)." },
                    { q: "8. She (drop) her bag when she (get) off the train.", options: ["A. was dropping / got", "B. dropped / was getting"], a: "B. dropped / was getting", exp: "Đang bước xuống tàu (was getting off) thì đánh rơi túi xách (dropped)." },
                    { q: "9. We (drive) to London when our car (break) down.", options: ["A. were driving / broke", "B. drove / was breaking"], a: "A. were driving / broke", exp: "Đang trên đường lái xe (were driving) thì xe hỏng (broke down)." },
                    { q: "10. What (you/do) when I (call) you last night?", options: ["A. were you doing / called", "B. did you do / was calling"], a: "A. were you doing / called", exp: "Hỏi đối phương đang làm việc gì (were you doing) vào khoảnh khắc tôi gọi đến (called)." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo học tài:</strong> ${ex.tip}</span>
                </div>
            `;

            ex.questions.forEach((qObj) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Giỏi quá!</strong> <br> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${qObj.a}.</strong> <br> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
    
</body>
</html>
