<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card | Hồng Phúc</title>
     <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* --- Cài đặt chung --- */
        :root {
            --primary-color: #ff477e;
            --bg-gradient: linear-gradient(135deg, #fff0f5 0%, #ffe6ee 100%);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.8);
        }
::selection {
  background: #ffb6c1; /* Màu hồng nhạt */
  color: #fff;
}
        body {
            font-family: 'Poppins', 'Quicksand', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        /* --- Hiệu ứng Background (Blobs) --- */
        .blob {
            position: absolute;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s ease-in-out infinite;
        }

        .blob-1 {
            width: 300px; height: 300px;
            background: #ff9a9e;
            top: -100px; left: -100px;
            border-radius: 50%;
        }

        .blob-2 {
            width: 400px; height: 400px;
            background: #fecfef;
            bottom: -150px; right: -100px;
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation-delay: -5s;
        }

        /* --- Profile Card (Glassmorphism) --- */
        .profile-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(255, 71, 126, 0.1);
            padding: 45px 30px;
            width: 350px;
            text-align: center;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.8s ease-out;
            z-index: 10;
        }

        .profile-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 60px rgba(255, 71, 126, 0.15);
        }

        /* --- Avatar --- */
        .avatar-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #fff;
            box-shadow: 0 10px 25px rgba(255, 71, 126, 0.2);
            transition: all 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .profile-card:hover .avatar {
            transform: scale(1.05) rotate(3deg);
        }

        .avatar-container::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff477e, #ffb6c1, #ff8a00);
            z-index: 1;
            animation: spin 3s linear infinite;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .profile-card:hover .avatar-container::before {
            opacity: 1;
        }

        /* --- Typography --- */
        .name {
            font-size: 24px;
            color: var(--text-main);
            margin: 0 0 5px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(45deg, #ff477e, #ff8a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .major {
            font-size: 15px;
            color: var(--text-muted);
            margin: 0;
            font-weight: 600;
        }

        .university {
            font-size: 12px;
            color: #ff709b;
            margin: 5px 0 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        /* --- Buttons --- */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 14px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }

        .zalo-btn { background-color: rgba(0, 104, 255, 0.1); color: #0068ff; }
        .zalo-btn:hover { background-color: #0068ff; color: #ffffff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0, 104, 255, 0.3); }

        .gmail-btn { background-color: rgba(231, 76, 60, 0.1); color: #e74c3c; }
        .gmail-btn:hover { background-color: #e74c3c; color: #ffffff; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(231, 76, 60, 0.3); }

        .share-btn { 
            background: linear-gradient(45deg, #ff477e, #ff709b); 
            color: white; 
            border: none;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.3);
        }
        .share-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 71, 126, 0.5); filter: brightness(1.1); }

        .icon { margin-right: 10px; font-size: 18px; }

        /* --- QR Popup Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            transform: scale(0.8) translateY(20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            width: 280px;
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: #f1f2f6;
            border: none;
            width: 30px; height: 30px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            color: #747d8c;
            transition: 0.3s;
        }

        .close-btn:hover { background: #ff477e; color: white; }

        .qr-code {
            width: 180px; height: 180px;
            margin: 15px auto;
            border: 2px solid #f1f2f6;
            border-radius: 15px;
            padding: 10px;
        }

        .modal-title {
            font-size: 18px;
            color: var(--text-main);
            font-weight: 700;
            margin-bottom: 5px;
        }

        .copy-btn {
            background: #f1f2f6;
            color: var(--text-main);
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        .copy-btn:hover { background: #dfe4ea; }

        /* --- Keyframes --- */
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, -20px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* --- Watermark Style --- */
.watermark {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1; /* Nằm dưới cùng để không che mất bài học */
  pointer-events: none; /* Không cho người dùng tương tác, click xuyên qua được */
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
  align-content: space-around;
  opacity: 0.04; /* Độ mờ cực thấp (4%), đủ để thấy khi nhìn kỹ nhưng không gây chói */
  font-family: 'Poppins', sans-serif;
  font-size: 5rem;
  font-weight: 700;
  color: var(--primary-color);
  transform: rotate(-30deg); /* Nghiêng nhẹ cho nghệ thuật */
  user-select: none;
  overflow: hidden;
  white-space: nowrap;
}

/* Nhân bản chữ để lấp đầy màn hình (dùng kỹ thuật pseudo-element) */
.watermark::before {
  content: "SnapEnglish  SnapEnglish  SnapEnglish  SnapEnglish  SnapEnglish";
  line-height: 200px;
}
    </style>
</head>
<body>
<div class="watermark">SnapEnglish</div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="profile-card">
<div class="content-wrap">
    
    <div class="avatar-container">
        <img src="https://s120-25-ava-talk.zadn.vn/123/a1d327b38e0e961bddcfdaf1013779ca.jpg?key=zY8uTDumdxEqJ8eVnC7QQQ&time=1781426753" 
             alt="Nguyễn Thị Hồng Phúc" class="avatar">
    </div>
    
    <h2 class="name">Nguyễn Thị Hồng Phúc</h2>
    <p class="major">Ngôn ngữ Anh</p>
    <p class="university">HUFLIT University</p>
    
    <p style="font-size: 13px; color: #888; font-style: italic; margin: -15px 0 20px;">
        "Language is the road map of a culture."
    </p>
    
    <div class="contact-info">
        <a href="https://zalo.me/0352968977" target="_blank" class="btn zalo-btn">
            <span class="icon">💬</span> Zalo: 0352968977
        </a>
        <a href="https://mail.google.com/mail/?view=cm&fs=1&to=nguyenthihongphucb@gmail.com" target="_blank" class="btn gmail-btn">
            <span class="icon">✉️</span> Gửi Email qua Gmail
        </a>
        <button class="btn share-btn" onclick="openModal()">
            <span class="icon">🌐</span> Chia sẻ SnapEnglish
        </button>
    </div>

</div>
    </div>

    <div class="modal-overlay" id="qrModal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <h3 class="modal-title">SnapEnglish</h3>
            <p style="font-size: 13px; color: #636e72; margin: 0;">Quét mã để truy cập trang chủ</p>
            
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://snaplanguages.github.io/Snap/" 
                 alt="QR Code" class="qr-code">
                 
            <button class="copy-btn" id="copyBtn" onclick="copyLink()">
                📋 Copy Link Trang Chủ
            </button>
        </div>
    </div>

<script>
        // ĐÃ CẬP NHẬT LINK COPY TẠI ĐÂY
        const linkToShare = "https://snaplanguages.github.io/Snap/";

        function openModal() {
            document.getElementById('qrModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('qrModal').classList.remove('active');
            setTimeout(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerHTML = "📋 Copy Link Trang Chủ";
                copyBtn.style.background = "#f1f2f6";
                copyBtn.style.color = "var(--text-main)";
            }, 300);
        }

        function copyLink() {
            // Tạo một thẻ input ảo để thực hiện lệnh copy (hoạt động tốt kể cả khi mở file local)
            const tempInput = document.createElement("input");
            tempInput.value = linkToShare;
            document.body.appendChild(tempInput);
            tempInput.select();
            tempInput.setSelectionRange(0, 99999); /* Dành cho mobile */
            
            try {
                document.execCommand("copy");
                
                // Đổi giao diện nút khi copy thành công
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerHTML = "✨ Đã Copy Thành Công!";
                copyBtn.style.background = "#e6f4ea";
                copyBtn.style.color = "#1e8e3e";
                
                // Trả lại trạng thái cũ sau 2 giây
                setTimeout(() => {
                    copyBtn.innerHTML = "📋 Copy Link Trang Chủ";
                    copyBtn.style.background = "#f1f2f6";
                    copyBtn.style.color = "var(--text-main)";
                }, 2000);
            } catch (err) {
                alert("Trình duyệt của bạn không hỗ trợ copy tự động. Link: " + linkToShare);
            }
            
            // Xóa thẻ input ảo đi để dọn dẹp
            document.body.removeChild(tempInput);
        }

        // Đóng popup khi click ra ngoài khung trắng
        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>

</body>
</html>
