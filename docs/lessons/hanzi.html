  <style>
    :root {
      --primary: #e63946;
      --secondary: #ff4d6d;
      --bg: #fff5f5;
      --glass: rgba(255, 255, 255, 0.85);
      --shadow: 0 10px 30px rgba(230, 57, 70, 0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #fff0f0 0%, #ffe6e6 100%);
      color: #2d3436;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* --- GIAO DIỆN TẬP TRUNG (DEEP WORK) --- */
    .writing-container {
      max-width: 900px;
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 40px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255, 255, 255, 0.6);
      text-align: center;
      animation: fadeIn 0.8s ease;
    }

    .header-info { margin-bottom: 30px; }
    .header-info h1 { font-weight: 800; color: var(--primary); font-size: 2rem; margin-bottom: 10px; }
    .header-info p { font-weight: 600; color: #636e72; }

    /* --- KHUNG VIẾT CHỮ (MI ZI GE) --- */
    .practice-area {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
      justify-content: center;
      align-items: center;
    }

    #target-word-container {
      background: white;
      border: 4px solid var(--primary);
      border-radius: 15px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s ease;
      position: relative;
    }
    /* Tạo lưới Mễ Tự Cách (Mi Zi Ge) bằng CSS */
    #target-word-container::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: 
        linear-gradient(to right, rgba(230, 57, 70, 0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(230, 57, 70, 0.1) 1px, transparent 1px),
        linear-gradient(45deg, transparent 49%, rgba(230, 57, 70, 0.1) 49%, rgba(230, 57, 70, 0.1) 51%, transparent 51%),
        linear-gradient(-45deg, transparent 49%, rgba(230, 57, 70, 0.1) 49%, rgba(230, 57, 70, 0.1) 51%, transparent 51%);
      background-size: 100% 100%, 100% 100%, 100% 100%, 100% 100%;
      pointer-events: none;
    }

    .word-details {
      flex: 1;
      min-width: 280px;
      text-align: left;
      background: rgba(255, 77, 109, 0.05);
      padding: 25px;
      border-radius: 20px;
      border-left: 5px solid var(--primary);
    }

    .word-details h2 { font-size: 1.5rem; margin-bottom: 10px; color: var(--primary); }
    .detail-item { margin-bottom: 8px; font-weight: 700; }
    .detail-item span { color: #636e72; font-weight: 400; }

    /* --- ĐIỀU KHIỂN --- */
    .controls {
      margin-top: 30px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 25px;
      border-radius: 15px;
      border: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-animate { background: var(--primary); color: white; }
    .btn-quiz { background: #ff8a00; color: white; }
    .btn-reset { background: #e2e8f0; color: #475569; }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); opacity: 0.9; }

    /* --- LỘ TRÌNH CHI TIẾT --- */
    .roadmap-section {
      margin-top: 50px;
      width: 100%;
      max-width: 900px;
    }

    .roadmap-title {
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hsk-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .hsk-tab {
      padding: 8px 20px;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
      border: 2px solid transparent;
      transition: 0.3s;
    }

    .hsk-tab.active {
      border-color: var(--primary);
      color: var(--primary);
      background: #fff0f0;
    }

    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 15px;
    }

    .word-card {
      background: white;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid #eee;
      font-family: "Ma Shan Zheng", cursive;
    }

    .word-card:hover {
      background: var(--primary);
      color: white;
      transform: scale(1.1);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* Floating Home Button */
    .back-home {
      position: fixed; bottom: 30px; left: 30px;
      width: 50px; height: 50px; background: white;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 20px; box-shadow: var(--shadow);
      z-index: 100; transition: 0.3s;
    }
    .back-home:hover { transform: rotate(-10deg) scale(1.1); }
  </style>
</head>

        width: 250,
        height: 250,
        padding: 20,
        strokeAnimationSpeed: 1, 
        delayBetweenStrokes: 200, // Ms

    function loadWordSet(level) {
      // Cập nhật tab active
      document.querySelectorAll('.hsk-tab').forEach(tab => tab.classList.remove('active'));
      event.target.classList.add('active');

      const listContainer = document.getElementById('word-list');
      listContainer.innerHTML = '';

      const words = hskData[level] || [];
      words.forEach(item => {
        const card = document.createElement('div');
        card.className = 'word-card';
        card.innerText = item.char;
        card.onclick = () => updateCharInfo(item);
        listContainer.appendChild(card);
      });
    }

    // Khởi tạo mặc định
    window.onload = () => {
      updateCharInfo(currentData);
      loadWordSet(1);
    };
