<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luyện Tập Grammar Unit 5 - Thì Hiện Tại Đơn</title>
     <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f5f3ff;
            --text-main: #4c1d95;
            --white: #ffffff;
            --primary: #c4b5fd;
            --accent: #fbcfe8;
        }

        * {
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#e0e7ff 2px, transparent 2px);
            background-size: 30px 30px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        /* THANH CỐ ĐỊNH ĐƯỢC LÀM NHỎ GỌN LẠI */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            padding: 10px 15px; /* Đã thu nhỏ padding */
            text-align: center;
            box-shadow: 0 5px 15px rgba(167, 139, 250, 0.3);
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            border: 3px solid #fff;
            border-top: none;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: #fff;
            font-size: 1.6em; /* Đã thu nhỏ font */
            margin: 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
            font-weight: 800;
        }

        .subtitle {
            color: #fff;
            font-size: 0.95em; /* Đã thu nhỏ font */
            font-weight: 700;
            margin-top: 3px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .score-board {
            display: inline-block;
            background: #fff;
            padding: 5px 25px; /* Đã thu nhỏ padding */
            border-radius: 20px;
            font-size: 1.25em; /* Đã thu nhỏ font */
            font-weight: 800;
            color: #db2777;
            margin-top: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 2px dashed #fbcfe8;
            transition: transform 0.3s ease;
        }

        .score-board:hover {
            transform: scale(1.05);
        }

        .container {
            max-width: 900px;
            margin: 30px auto 0;
            padding: 0 20px 50px 20px;
        }

        .exercise-card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(139, 92, 246, 0.08);
            border-top: 8px solid #c4b5fd;
            transition: transform 0.3s ease;
        }

        .exercise-card:hover {
            transform: translateY(-5px);
        }

        .ex-title {
            font-size: 1.6em;
            font-weight: 800;
            margin-top: 0;
            color: #7c3aed;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tip-box {
            background: #fdf4ff;
            border: 2px dashed #f472b6;
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            font-weight: 700;
            color: #be185d;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.05em;
        }

        .question-block {
            background: #faf5ff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #f3e8ff;
            transition: all 0.3s ease;
        }

        .question-block:hover {
            border-color: #e9d5ff;
            box-shadow: 0 5px 15px rgba(167, 139, 250, 0.15);
        }

        .question-text {
            font-size: 1.15em;
            font-weight: 700;
            margin-bottom: 15px;
            color: #4c1d95;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-btn {
            background: #fff;
            border: 2px solid #e9d5ff;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            color: #6b7280;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            border-color: #c4b5fd;
            background: #f5f3ff;
            transform: translateX(5px);
        }

        .option-btn:disabled {
            cursor: not-allowed;
        }

        .option-btn.correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
            animation: bounce 0.4s ease;
        }

        .option-btn.incorrect {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            opacity: 0.9;
        }

        .explanation {
            margin-top: 15px;
            padding: 15px 20px;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 600;
            display: none;
            animation: slideDown 0.4s ease forwards;
        }

        .explanation.show {
            display: block;
        }

        .explanation.success {
            background: #f0fdf4;
            color: #166534;
            border-left: 5px solid #22c55e;
        }

        .explanation.error {
            background: #fef2f2;
            color: #991b1b;
            border-left: 5px solid #ef4444;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-to-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #a78bfa;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(167, 139, 250, 0.4);
            text-decoration: none;
            transition: all 0.3s;
            z-index: 999;
        }
        
        .back-to-top:hover {
            transform: translateY(-5px) scale(1.1);
            background: #8b5cf6;
        }

        .color-1 { border-top-color: #c4b5fd; }
        .color-2 { border-top-color: #fbcfe8; }
        .color-2 .ex-title { color: #db2777; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <h1>🔮 Trạm Luyện Tập Grammar 🔮</h1>
        <div class="subtitle">Unit 5: Thì Hiện Tại Đơn (Present Simple) - Tiếng Anh Cơ Bản</div>
        <div class="score-board">Điểm: <span id="score">0</span> / 30 ✨</div>
    </div>

    <div class="container" id="app">
        </div>

    <a href="unit-5-grammar.html" target="_blank" class="back-to-top" title="Lên đầu trang">⬆️</a>

    <script>
        const exercises = [
            {
                title: "Exercise 1: Chia dạng đúng của động từ",
                tip: "Nhớ nha: Ngôi thứ 3 số ít (He, She, It, Danh từ số ít) thì động từ phải thêm '-s' hoặc '-es' ('have' biến thành 'has'). Nếu là câu hỏi hoặc phủ định, hãy mượn trợ động từ 'do/does' nhé!",
                colorClass: "color-1",
                icon: "🦄",
                questions: [
                    { q: "1. How often you (wash) your hair?", options: ["How often do you wash", "How often do you washes", "How often are you wash"], a: "How often do you wash", exp: "Câu hỏi với 'you' ta mượn trợ động từ 'do', động từ chính 'wash' giữ nguyên không chia." },
                    { q: "2. He usually (get) home about six o'clock.", options: ["gets", "get", "is getting"], a: "gets", exp: "Chủ ngữ 'He' (ngôi thứ 3 số ít) nên động từ 'get' phải thêm 's'." },
                    { q: "3. She usually just (have) a sandwich for lunch.", options: ["have", "has", "haves"], a: "has", exp: "Động từ bất quy tắc 'have' đi với chủ ngữ 'She' sẽ biến đổi thành 'has'." },
                    { q: "4. It (be) never too late to start eating a healthy diet.", options: ["is", "am", "are"], a: "is", exp: "Chủ ngữ giả 'It' luôn đi với to be là 'is'." },
                    { q: "5. My sister (be) a nurse in a local hospital.", options: ["is", "am", "are"], a: "is", exp: "'My sister' là danh từ số ít (cô ấy) nên dùng to be 'is'." },
                    { q: "6. Where you (be) from? I (come) from Japan.", options: ["are - come", "do - come", "is - comes"], a: "are - come", exp: "Cấu trúc hỏi quê quán: 'Where are you from?'. Câu trả lời 'I' đi với động từ nguyên thể 'come'." },
                    { q: "7. He (be) handsome, brilliant, witty, and generally the center of attention wherever he is.", options: ["am", "is", "are"], a: "is", exp: "Chủ ngữ 'He' thì to be luôn là 'is'." },
                    { q: "8. You (like) fish?", options: ["Do you like", "Does you like", "Are you like"], a: "Do you like", exp: "Câu hỏi nghi vấn mượn trợ động từ 'Do' cho ngôi 'you'." },
                    { q: "9. She (work) as a cleaner at the hospital.", options: ["work", "works", "is working"], a: "works", exp: "Chủ ngữ 'She' số ít, diễn tả nghề nghiệp, động từ 'work' thêm 's'." },
                    { q: "10. He often (have) dinner and (watch) TV at 7 pm every day.", options: ["has - watches", "has - watch", "have - watches"], a: "has - watches", exp: "Chủ ngữ 'He' chia cả 2 động từ: 'have' -> 'has', và 'watch' tận cùng bằng 'ch' nên thêm 'es' thành 'watches'." },
                    { q: "11. She always (buy) all the latest fashion magazines.", options: ["buy", "buys", "is buying"], a: "buys", exp: "Chủ ngữ 'She' số ít, động từ kết thúc bằng 'y' nhưng trước nó là nguyên âm 'u' nên chỉ cần thêm 's' -> 'buys'." },
                    { q: "12. Liquid nitrogen (boil) at a very low temperature.", options: ["boil", "boils", "is boiling"], a: "boils", exp: "Diễn tả sự thật hiển nhiên. 'Liquid nitrogen' (Nitơ lỏng) là danh từ không đếm được (số ít) nên thêm 's'." },
                    { q: "13. The plane (take) off at 8.30 a.m.", options: ["take", "takes", "is taking"], a: "takes", exp: "Lịch trình tàu xe chạy luôn dùng thì HTĐ. 'The plane' là số ít nên thêm 's'." },
                    { q: "14. What you (want) to do after leaving school?", options: ["do you want", "does you want", "are you want"], a: "do you want", exp: "Câu hỏi mượn trợ động từ 'do' cho ngôi 'you', động từ chính 'want' giữ nguyên." },
                    { q: "15. We (not go) to the cinema very often these days.", options: ["don't go", "doesn't go", "aren't go"], a: "don't go", exp: "Câu phủ định với chủ ngữ 'We' ta mượn trợ động từ 'do not' (don't)." }
                ]
            },
            {
                title: "Exercise 2: Multiple Choice",
                tip: "Đọc kĩ chủ ngữ (số ít hay số nhiều) và các trạng từ chỉ tần suất (always, usually...) để chia động từ cho thật chuẩn nhé!",
                colorClass: "color-2",
                icon: "🎀",
                questions: [
                    { q: "1. John _________ hard in class, but I _________ he'll pass.", options: ["A. trys/don't think", "B. tries/don't think", "C. trys/doesn't think", "D. try/don't think"], a: "B. tries/don't think", exp: "John (số ít) nên 'try' đổi 'y' thành 'i' rồi thêm 'es'. Ngôi 'I' dùng phủ định là 'don't think'." },
                    { q: "2. My brother _________ breakfast at 9.00.", options: ["A. usually have", "B. usually haves", "C. has usually", "D. usually has"], a: "D. usually has", exp: "Trạng từ tần suất (usually) luôn đứng trước động từ thường. 'My brother' số ít nên chia động từ là 'has'." },
                    { q: "3. Every twelve months, the Earth _________ the Sun.", options: ["A. is circling", "B. circled", "C. has circled", "D. circles"], a: "D. circles", exp: "Sự thật hiển nhiên Trái Đất quay quanh Mặt Trời chia ở HTĐ. 'The Earth' là số ít." },
                    { q: "4. Peter _________ very hard. He never gets high scores.", options: ["A. don't studies", "B. doesn't studies", "C. doesn't study", "D. doesn't studys"], a: "C. doesn't study", exp: "Peter là ngôi 3 số ít dùng 'doesn't', sau trợ động từ thì động từ chính 'study' luôn giữ nguyên không chia." },
                    { q: "5. Her life _________ so boring. She just _________ TV every night.", options: ["A. is/watches", "B. is/watchs", "C. are/watchs", "D. are/watches"], a: "A. is/watches", exp: "'Her life' là danh từ không đếm được -> dùng 'is'. 'She' là số ít, động từ kết thúc bằng 'ch' nên thêm 'es' -> 'watches'." },
                    { q: "6. Jane _________ tennis every Sunday.", options: ["A. plays", "B. plaies", "C. play", "D. to play"], a: "A. plays", exp: "Jane (số ít), động từ 'play' có 'y' đứng sau nguyên âm 'a' nên ta chỉ việc thêm 's'." },
                    { q: "7. The flight _________ from Da Nang at 10:50 and _________ in Taipei at 14:30.", options: ["A. depart/arrive", "B. departs/arrive", "C. departs/arrives", "D. depart/arrives"], a: "C. departs/arrives", exp: "Nói về lịch trình cố định của chuyến bay -> dùng HTĐ. 'The flight' số ít nên cả 2 động từ đều thêm 's'." },
                    { q: "8. As soon as my father _________ back home, we _________ out for dinner.", options: ["A. come/will go", "B. comes/will go", "C. comes/go", "D. will come/go"], a: "B. comes/will go", exp: "Mệnh đề chỉ thời gian bắt đầu bằng 'As soon as' luôn chia ở HTĐ. Mệnh đề chính (sự việc sắp diễn ra) chia Tương lai đơn." },
                    { q: "9. My family _________ a holiday in December every year.", options: ["A. has", "B. haves", "C. have", "D. having"], a: "A. has", exp: "Danh từ tập hợp 'My family' khi coi là một thể thống nhất chung một hành động thì chia số ít -> 'has'." },
                    { q: "10. My mother often _________ me English on Saturday evenings.", options: ["A. teachs", "B. teaches", "C. teach", "D. to teach"], a: "B. teaches", exp: "'My mother' số ít. Động từ 'teach' có đuôi 'ch' nên phải thêm 'es' nhé." },
                    { q: "11. I come from Canada. Where _________ you from?", options: ["A. come/do", "B. are/coming", "C. do/come", "D. come/are"], a: "C. do/come", exp: "Cấu trúc hỏi đến từ đâu với động từ thường: 'Where + do/does + S + come from?'." },
                    { q: "12. He will take the dog out for a walk as soon as he _________ dinner.", options: ["A. finishes", "B. finishs", "C. finish", "D. will finish"], a: "A. finishes", exp: "Mệnh đề thời gian (as soon as) không chia tương lai mà chia HTĐ. 'He' số ít, động từ kết thúc bằng 'sh' nên thêm 'es'." },
                    { q: "13. The flowers _________ watered by Bob.", options: ["A. are normally", "B. normally are", "C. is normally", "D. normally is"], a: "A. are normally", exp: "Trạng từ tần suất (normally) luôn đứng SAU động từ to be (am/is/are). 'flowers' số nhiều dùng 'are'." },
                    { q: "14. Hoa and I always _________ to the countryside by bus.", options: ["A. go", "B. goes", "C. do go", "D. does"], a: "A. go", exp: "'Hoa and I' là 2 người (bằng với We - số nhiều) nên động từ 'go' giữ nguyên không chia." },
                    { q: "15. The weather generally _________ quite hot in July and August.", options: ["A. get", "B. gets", "C. getting", "D. will get"], a: "B. gets", exp: "'The weather' (thời tiết) là danh từ không đếm được -> đếm như số ít. Động từ thêm 's'." }
                ]
            }
        ];

        let currentScore = 0;
        const app = document.getElementById("app");
        const scoreDisplay = document.getElementById("score");

        exercises.forEach((ex, exIndex) => {
            const card = document.createElement("div");
            card.className = `exercise-card ${ex.colorClass}`;

            // Sinh tiêu đề và mẹo
            card.innerHTML = `
                <h2 class="ex-title">${ex.icon} ${ex.title}</h2>
                <div class="tip-box">
                    <span>💡</span>
                    <span><strong>Mẹo dễ nhớ:</strong> ${ex.tip}</span>
                </div>
            `;

            // Sinh các câu hỏi
            ex.questions.forEach((qObj, qIndex) => {
                const qBlock = document.createElement("div");
                qBlock.className = "question-block";

                const qText = document.createElement("div");
                qText.className = "question-text";
                qText.innerText = qObj.q;
                qBlock.appendChild(qText);

                const optContainer = document.createElement("div");
                optContainer.className = "options";
                
                const expDiv = document.createElement("div");
                expDiv.className = "explanation";

                qObj.options.forEach(opt => {
                    const btn = document.createElement("button");
                    btn.className = "option-btn";
                    btn.innerText = opt;
                    
                    btn.onclick = () => {
                        const siblings = optContainer.querySelectorAll(".option-btn");
                        siblings.forEach(sibling => sibling.disabled = true);

                        if(opt === qObj.a) {
                            btn.classList.add("correct");
                            currentScore++;
                            scoreDisplay.innerText = currentScore;
                            expDiv.classList.add("success", "show");
                            expDiv.innerHTML = `🎉 <strong>Chuẩn không cần chỉnh!</strong> <br> ${qObj.exp}`;
                        } else {
                            btn.classList.add("incorrect");
                            siblings.forEach(sibling => {
                                if(sibling.innerText === qObj.a) sibling.classList.add("correct");
                            });
                            expDiv.classList.add("error", "show");
                            expDiv.innerHTML = `❌ <strong>Sai mất rồi! Đáp án đúng là: ${qObj.a}.</strong> <br> ${qObj.exp}`;
                        }
                    };
                    optContainer.appendChild(btn);
                });

                qBlock.appendChild(optContainer);
                qBlock.appendChild(expDiv);
                card.appendChild(qBlock);
            });

            app.appendChild(card);
        });
    </script>
</body>
</html>
