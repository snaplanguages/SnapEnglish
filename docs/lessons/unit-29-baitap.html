    <script>
        const exData = [
            ["Question 1 [517492]: \"John's going to London.\"", 
            ["A. Often?", "B. Yesterday?", "C. By train?"], 2, 
            "<ul><li><strong>A sai:</strong> 'Often' dùng để hỏi về thói quen (hiện tại đơn), không hợp với thì tương lai gần/tiếp diễn của câu nói.</li><li><strong>B sai:</strong> 'Yesterday' là quá khứ, mâu thuẫn với 'is going to' (sắp đi).</li><li><strong>C đúng:</strong> Hỏi về phương tiện đi lại (Đi bằng tàu hỏa à?) là cách phản hồi rất tự nhiên.</li></ul>"],

            ["Question 2 [517493]: \"When do you study?\"", 
            ["A. At school.", "B. In the evenings.", "C. In the library."], 1, 
            "<ul><li><strong>A & C sai:</strong> 'At school' và 'In the library' trả lời cho câu hỏi địa điểm (Where).</li><li><strong>B đúng:</strong> 'In the evenings' (Vào các buổi tối) trả lời đúng cho câu hỏi thời gian (When).</li></ul>"],

            ["Question 3 [517494]: \"Do you like my new shoes?\"", 
            ["A. Where did you buy them?", "B. How long are they?", "C. Would you like them?"], 0, 
            "<ul><li><strong>A đúng:</strong> 'Cậu mua ở đâu thế?' là câu hỏi tiếp nối tự nhiên thể hiện sự quan tâm/khen ngợi món đồ mới của người khác.</li><li><strong>B sai:</strong> Hỏi giày dài bao nhiêu nghe không tự nhiên trong giao tiếp.</li><li><strong>C sai:</strong> 'Would you like them?' (Cậu có muốn chúng không?) sai vai vế, người nghe không thể hỏi ngược người nói câu này.</li></ul>"],

            ["Question 4 [517495]: \"Be careful.\"", 
            ["A. Thank you.", "B. I will.", "C. What a pity!"], 1, 
            "<ul><li><strong>A sai:</strong> Người ta nhắc nhở cẩn thận, đáp 'Thank you' thì hơi cụt và không phổ biến bằng B.</li><li><strong>B đúng:</strong> 'I will (be careful)' - Mình sẽ cẩn thận. Đây là lời hứa/đáp nhận sự nhắc nhở chuẩn nhất.</li><li><strong>C sai:</strong> 'Thật đáng tiếc!' hoàn toàn sai ngữ cảnh.</li></ul>"],

            ["Question 5 [517496]: \"I hate basketball.\"", 
            ["A. You are, too.", "B. It can, too.", "C. I do, too."], 2, 
            "<ul><li><strong>A & B sai:</strong> Sai trợ động từ. Động từ thường 'hate' phải đi với trợ động từ 'do/does'.</li><li><strong>C đúng:</strong> 'I do, too' (Mình cũng vậy) - dùng để đồng tình với một câu khẳng định dùng động từ thường.</li></ul>"],

            ["Question 6 [517497]: \"Let's walk to the park.\"", 
            ["A. All right.", "B. I think so.", "C. I'm sorry."], 0, 
            "<ul><li><strong>A đúng:</strong> 'All right' (Được thôi) là cách đồng ý một lời rủ rê (Let's...).</li><li><strong>B sai:</strong> 'Mình nghĩ vậy' không dùng để đáp lại lời rủ rê.</li><li><strong>C sai:</strong> 'I'm sorry' thường đi kèm với lý do từ chối, đứng một mình nghe không tự nhiên.</li></ul>"],

            ["Question 7 [517498]: \"When did you arrive?\"", 
            ["A. Tomorrow.", "B. Yesterday.", "C. For two days."], 1, 
            "<ul><li><strong>A sai:</strong> Tomorrow (ngày mai) dùng cho thì tương lai.</li><li><strong>B đúng:</strong> Câu hỏi dùng quá khứ đơn (did arrive) nên trả lời Yesterday (hôm qua) là chính xác.</li><li><strong>C sai:</strong> 'For two days' trả lời cho câu hỏi 'How long' (Bao lâu).</li></ul>"],

            ["Question 8 [517499]: \"Shall I open the window?\"", 
            ["A. Yes, I shall.", "B. Yes, you will.", "C. Yes, please."], 2, 
            "<ul><li><strong>A & B sai:</strong> Không dùng để đáp lại lời đề nghị giúp đỡ của người khác.</li><li><strong>C đúng:</strong> 'Yes, please' (Vâng, phiền bạn) là cách đồng ý lịch sự nhất khi ai đó đề nghị làm gì cho mình (Shall I...).</li></ul>"],

            ["Question 9 [517500]: \"I got a letter from Paul this morning.\"", 
            ["A. I'm afraid not.", "B. That's nice.", "C. He's fine."], 1, 
            "<ul><li><strong>A sai:</strong> 'Tôi e là không' chỉ dùng để từ chối hoặc báo tin xấu.</li><li><strong>B đúng:</strong> 'That's nice' (Thật tuyệt) là câu cảm thán lịch sự khi nghe người khác kể một tin tức bình thường/vui vẻ.</li><li><strong>C sai:</strong> 'Anh ấy ổn' trả lời cho câu hỏi 'How is he?'.</li></ul>"],

            ["Question 10 [517501]: \"How's your sister?\"", 
            ["A. She's Jane.", "B. She's at school.", "C. She's very well."], 2, 
            "<ul><li><strong>A sai:</strong> Trả lời cho 'What's her name?'.</li><li><strong>B sai:</strong> Trả lời cho 'Where is she?'.</li><li><strong>C đúng:</strong> 'How's your sister?' hỏi về sức khỏe/tình trạng, nên 'She's very well' (Cô ấy rất khỏe) là đáp án đúng.</li></ul>"],

            ["Question 11 [517502]: \"How far is it to Manchester?\"", 
            ["A. About two months.", "B. It's quite long.", "C. Almost 30 kilometres."], 2, 
            "<ul><li><strong>A sai:</strong> Trả lời thời gian cho câu 'How long'.</li><li><strong>B sai:</strong> Chỉ độ dài vật lý hoặc thời gian.</li><li><strong>C đúng:</strong> 'How far' hỏi về khoảng cách, nên trả lời bằng số kilomet là chuẩn xác.</li></ul>"],

            ["Question 12 [517503]: \"Could you give me the butter?\"", 
            ["A. Here you are.", "B. Thank you.", "C. I don't know."], 0, 
            "<ul><li><strong>A đúng:</strong> 'Here you are' (Của bạn đây) là câu nói tiêu chuẩn khi đưa đồ vật cho ai đó.</li><li><strong>B sai:</strong> Người nhờ vả mới là người nói cảm ơn.</li><li><strong>C sai:</strong> Trả lời không phù hợp với yêu cầu lấy đồ.</li></ul>"],

            ["Question 13 [517504]: \"John hates shopping.\"", 
            ["A. I love it.", "B. It's six pounds.", "C. The shop's open."], 0, 
            "<ul><li><strong>A đúng:</strong> 'Mình thì lại rất thích' (I love it) - Thể hiện sự đối lập ý kiến một cách tự nhiên trong giao tiếp.</li><li><strong>B & C sai:</strong> Hoàn toàn không liên quan đến ngữ cảnh câu nói về sở thích.</li></ul>"],

            ["Question 14 [517505]: \"I've already done my homework.\"", 
            ["A. When did you do it?", "B. Please do it.", "C. Have you done it yet?"], 0, 
            "<ul><li><strong>A đúng:</strong> 'Cậu làm lúc nào thế?' là câu hỏi tiếp nối hợp lý để duy trì cuộc hội thoại.</li><li><strong>B & C sai:</strong> Người kia vừa nói 'tôi làm xong rồi', nên việc bảo họ đi làm (B) hay hỏi lại làm chưa (C) là vô lý.</li></ul>"],

            ["Question 15 [517506]: \"What's the date today?\"", 
            ["A. It's Thursday.", "B. The third, I think.", "C. I'm 22 today."], 1, 
            "<ul><li><strong>A sai:</strong> Trả lời cho 'What day is it today?' (Hỏi thứ).</li><li><strong>B đúng:</strong> 'What's the date' hỏi ngày tháng. 'The third' (ngày mùng ba) là đáp án đúng.</li><li><strong>C sai:</strong> Trả lời cho câu hỏi tuổi tác.</li></ul>"],

            ["Question 16 [517507]: \"Hello, Sue. This is my boss, Mrs Smith.\"", 
            ["A. How old is she?", "B. How much is it?", "C. How do you do?"], 2, 
            "<ul><li><strong>A & B sai:</strong> Hỏi tuổi hoặc hỏi giá tiền ngay lần đầu gặp mặt là bất lịch sự/sai ngữ cảnh.</li><li><strong>C đúng:</strong> 'How do you do?' là câu chào vô cùng trang trọng, dùng khi được giới thiệu với người mới gặp lần đầu (đặc biệt là sếp).</li></ul>"],

            ["Question 17 [517508]: \"Tell Ben to come upstairs.\"", 
            ["A. That's right.", "B. All right.", "C. Is that right?"], 1, 
            "<ul><li><strong>A & C sai:</strong> Dùng để xác nhận thông tin đúng/sai.</li><li><strong>B đúng:</strong> 'All right' (Được thôi) thể hiện sự đồng ý thực hiện một lời yêu cầu/sai bảo.</li></ul>"],

            ["Question 18 [517509]: \"Have you got a ticket?\"", 
            ["A. At the ticket office.", "B. Here it is.", "C. Yes, please."], 1, 
            "<ul><li><strong>A sai:</strong> Trả lời cho câu hỏi địa điểm (Where).</li><li><strong>B đúng:</strong> 'Here it is' (Nó đây này) vừa trả lời vừa đưa vé ra cho người hỏi xem.</li><li><strong>C sai:</strong> Dùng để đáp lại lời mời mọc/đề nghị cho đồ ăn thức uống.</li></ul>"],

            ["Question 19 [517510]: \"Let's go to Brighton tomorrow.\"", 
            ["A. What a pity!", "B. OK. Why not?", "C. It doesn't matter."], 1, 
            "<ul><li><strong>A sai:</strong> 'Thật đáng tiếc!' dùng để chia buồn.</li><li><strong>B đúng:</strong> 'OK. Why not?' (Được, sao lại không nhỉ?) là cách đồng ý nhiệt tình cho một lời rủ rê (Let's...).</li><li><strong>C sai:</strong> Dùng để đáp lại lời xin lỗi (Không sao đâu).</li></ul>"],

            ["Question 20 [517511]: \"Can I open the window, please?\"", 
            ["A. You don't.", "B. It isn't.", "C. Of course."], 2, 
            "<ul><li><strong>A & B sai:</strong> Sai cấu trúc và không có nghĩa tự nhiên.</li><li><strong>C đúng:</strong> 'Of course' (Tất nhiên rồi) là cách đồng ý lịch sự khi ai đó xin phép làm gì (Can I...).</li></ul>"],

            ["Question 21 [517512]: \"Why don't you ask Sandra?\"", 
            ["A. I hope so.", "B. Never mind.", "C. That's a good idea."], 2, 
            "<ul><li><strong>A sai:</strong> 'Tôi hi vọng vậy' dùng khi cầu mong điều tốt đẹp xảy ra.</li><li><strong>B sai:</strong> 'Đừng bận tâm' dùng đáp lại lời xin lỗi hoặc khi không muốn người khác để ý.</li><li><strong>C đúng:</strong> 'Why don't you' là lời gợi ý, đáp lại 'Đó là một ý kiến hay' là hoàn toàn chuẩn xác.</li></ul>"],

            ["Question 22 [517513]: \"Congratulations!\"", 
            ["A. I'm sorry.", "B. Thank you.", "C. What a pity!"], 1, 
            "<ul><li><strong>A & C sai:</strong> Xin lỗi hoặc tiếc nuối không dùng khi được chúc mừng.</li><li><strong>B đúng:</strong> Khi ai đó chúc mừng, lời đáp lại chuẩn mực nhất là cảm ơn (Thank you).</li></ul>"],

            ["Question 23 [517514]: \"How is your son?\"",

        ];

        let currentScore = 0;
        const scoreDisplay = document.getElementById("score");
        const app = document.getElementById("app");

        const card = document.createElement("div");
        card.className = `exercise-card`;

        let htmlContent = `
            <h2 class="ex-title">🔥 Trắc Nghiệm: 40 Tình Huống Giao Tiếp Thực Tế</h2>
            <div class="tip-box">
                <span>💡 <strong>Hướng dẫn:</strong> Đọc kỹ câu hỏi tiếng Việt/tiếng Anh và chọn đáp án tương đồng nhất. Đừng quên đọc giải thích để học thêm cấu trúc văn phong bản xứ nhé!</span>
            </div>
            <div id="questions-container"></div>
        `;

        card.innerHTML = htmlContent;
        app.appendChild(card);

        const qContainer = document.getElementById("questions-container");

        exData.forEach((qObj) => {
            const [qText, options, correctIndex, expText] = qObj;
            
            const qBlock = document.createElement("div");
            qBlock.className = "question-block";

            const qTitle = document.createElement("div");
            qTitle.className = "question-text";
            qTitle.innerText = qText;
            qBlock.appendChild(qTitle);

            const optContainer = document.createElement("div");
            optContainer.className = "options";
            
            const expDiv = document.createElement("div");
            expDiv.className = "explanation";

            options.forEach((opt, idx) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = opt;
                
                btn.onclick = () => {
                    const siblings = optContainer.querySelectorAll(".option-btn");
                    siblings.forEach(sibling => sibling.disabled = true);

                    if(idx === correctIndex) {
                        btn.classList.add("correct");
                        currentScore++;
                        scoreDisplay.innerText = currentScore;
                        expDiv.classList.add("success", "show");
                        expDiv.innerHTML = `🎉 <strong>Chính xác!</strong> <br> ${expText}`;
                    } else {
                        btn.classList.add("incorrect");
                        siblings[correctIndex].classList.add("correct");
                        expDiv.classList.add("error", "show");
                        expDiv.innerHTML = `❌ <strong>Chưa chính xác! Đáp án đúng là: ${options[correctIndex].substring(0,2)}</strong> <br> ${expText}`;
                    }
                };
                optContainer.appendChild(btn);
            });

            qBlock.appendChild(optContainer);
            qBlock.appendChild(expDiv);
            qContainer.appendChild(qBlock);
        });
    </script>
