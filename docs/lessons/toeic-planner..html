<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Journey | SnapEnglish</title>
    <link rel="icon" type="image/png" href="ảnh.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Bảng màu Pastel Trưởng thành & Sâu sắc */
            --bg-main: #F9F6F0; /* Trắng kem ấm */
            --surface: #FFFFFF;
            --primary: #D4A5A5; /* Hồng đất */
            --primary-hover: #C39292;
            --secondary: #9DB4AB; /* Xanh rêu nhạt / Sage Green */
            --accent: #E2C2B3; /* Cam đào nhạt */
            --text-dark: #4A4045; /* Nâu xám trầm */
            --text-light: #8B8286;
            --border: #EAE3D9;
            --success: #82A896;
            --warning: #DDA7A5;
            
            --shadow-soft: 0 12px 36px rgba(74, 64, 69, 0.06);
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            
            --font-main: 'Nunito', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-main);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
            line-height: 1.6;
        }

        .app-container {
            background: var(--surface);
            max-width: 900px;
            width: 100%;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            position: relative;
        }

        /* --- Header & Typography --- */
        .header {
            text-align: center;
            padding: 40px 30px 20px;
        }

        .header h1 {
            font-size: 2.2rem;
            color: var(--text-dark);
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1.05rem;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- Form Thiết lập --- */
        .setup-section {
            padding: 20px 40px 50px;
            animation: fadeIn 0.6s ease;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group input {
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-dark);
            transition: all 0.3s ease;
            background-color: #FAFAFA;
        }

        .input-group input:focus {
            border-color: var(--secondary);
            background-color: var(--surface);
            outline: none;
            box-shadow: 0 0 0 4px rgba(157, 180, 171, 0.15);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 18px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: var(--radius-md);
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 165, 165, 0.3);
        }

        /* --- AI Loading Screen --- */
        .loading-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            text-align: center;
        }

        .ai-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        .ai-status-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-dark);
            animation: pulse 1.5s infinite;
        }

        .ai-subtext {
            color: var(--text-light);
            margin-top: 8px;
            font-size: 0.95rem;
        }

        /* --- Roadmap Dashboard --- */
        .dashboard-section {
            display: none;
            padding: 0 40px 40px;
            animation: fadeIn 0.8s ease;
        }

        .ai-insight-card {
            background: linear-gradient(145deg, #FDFBF7, #F4F0E6);
            border-left: 5px solid var(--secondary);
            padding: 24px;
            border-radius: var(--radius-md);
            margin-bottom: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            position: relative;
        }

        .ai-insight-card h3 {
            color: var(--secondary);
            font-size: 1.1rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ai-insight-card p {
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        /* Progress Bar */
        .progress-container {
            margin-bottom: 40px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .progress-track {
            height: 14px;
            background-color: var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), #B0C9C0);
            border-radius: 20px;
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Roadmap Timeline */
        .week-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            margin-bottom: 25px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .week-header {
            background-color: #FAFAFA;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            color: var(--text-dark);
            display: flex;
            justify-content: space-between;
        }

        .day-row {
            display: flex;
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }
        .day-row:last-child { border-bottom: none; }
        .day-row:hover { background-color: rgba(249, 246, 240, 0.4); }

        .day-badge {
            width: 100px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: rgba(234, 227, 217, 0.15);
            border-right: 1px solid var(--border);
            flex-shrink: 0;
        }

        .day-badge span.day-num {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
        }
        .day-badge span.day-text {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tasks-container {
            padding: 15px 24px;
            flex-grow: 1;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 12px 0;
            border-bottom: 1px dashed var(--border);
        }
        .task-item:last-child { border-bottom: none; }

        /* Custom Checkbox */
        .task-item input[type="checkbox"] {
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid var(--secondary);
            border-radius: 6px;
            margin-top: 3px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .task-item input[type="checkbox"]:checked {
            background-color: var(--secondary);
            border-color: var(--secondary);
        }

        .task-item input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .task-content {
            flex-grow: 1;
            transition: all 0.3s;
        }

        .task-item.completed .task-content {
            color: var(--text-light);
            text-decoration: line-through;
            opacity: 0.7;
        }

        /* Tags AI phân loại */
        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 8px;
            vertical-align: middle;
        }
        .tag.grammar { background-color: #E2E8F0; color: #475569; }
        .tag.listening { background-color: #E0E7FF; color: #4338CA; }
        .tag.reading { background-color: #FEF3C7; color: #B45309; }
        .tag.vocab { background-color: #FCE7F3; color: #BE185D; }
        .tag.test { background-color: #FEE2E2; color: #B91C1C; }

        .btn-reset {
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            display: block;
            margin: 40px auto 0;
            transition: 0.3s;
        }
        .btn-reset:hover {
            background: var(--bg-main);
            color: var(--primary);
            border-color: var(--primary);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }

        @media (max-width: 768px) {
            .day-row { flex-direction: column; }
            .day-badge { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 12px; flex-direction: row; justify-content: flex-start; gap: 10px; background-color: transparent;}
            .day-badge span.day-text { margin-top: 3px; }
            .setup-section, .dashboard-section { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1><span>Snap</span>English</h1>
        <p class="subtitle">TOEIC Journey Planner • Cá nhân hóa lộ trình học tập của riêng bạn</p>
    </div>

    <div id="setup-screen" class="setup-section">
        <div class="form-grid">
            <div class="input-group">
                <label>🎯 Điểm TOEIC hiện tại</label>
                <input type="number" id="currentScore" placeholder="Ví dụ: 450" min="0" max="990">
            </div>
            <div class="input-group">
                <label>🏆 Điểm Mục tiêu</label>
                <input type="number" id="targetScore" placeholder="Ví dụ: 800" min="0" max="990">
            </div>
            <div class="input-group">
                <label>⏳ Thời gian (Tháng)</label>
                <input type="number" id="months" placeholder="Khuyến nghị: Bỏ trống để AI tự tính">
            </div>
        </div>
        <button class="btn-primary" onclick="startAIAnalysis()">
            ✨ Khởi tạo Lộ trình cùng SnapEnglish
        </button>
    </div>

    <div id="loading-screen" class="loading-screen">
        <div class="ai-spinner"></div>
        <div class="ai-status-text" id="ai-status">Đang phân tích dữ liệu đầu vào...</div>
        <div class="ai-subtext">Quá trình này giúp SnapEnglish cấu trúc bài học hợp lý nhất.</div>
    </div>

    <div id="dashboard-screen" class="dashboard-section">
        
        <div class="ai-insight-card">
            <h3>✨ Lời khuyên từ SnapEnglish</h3>
            <p id="ai-advice-text"></p>
        </div>

        <div class="progress-container">
            <div class="progress-header">
                <span id="progress-percent" style="color: var(--secondary);">0% Hoàn thành</span>
                <span id="progress-count" style="color: var(--text-light);">0/0 Bài học</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
        </div>

        <div id="roadmap-content"></div>

        <button class="btn-reset" onclick="resetApp()">Xóa dữ liệu & Tạo lộ trình mới</button>
    </div>
</div>

<script>
    const STORAGE_KEY = 'snap_english_ai_planner';

    // Dữ liệu giáo trình nâng cấp với các tag phân loại ngầm định [Tag]

        // Giai đoạn 2 (350 - 550)
        "[Ngữ pháp] Hoàn thiện 4 Thì hoàn thành (Nhấn mạnh Quá khứ/Tương lai hoàn thành).",
        "[Từ vựng] Học từ vựng theo cụm (Collocations) - Chủ đề Marketing & Office.",
        "[Ngữ pháp] Phân biệt rạch ròi Danh động từ (Gerund) & Động từ nguyên thể (To V).",

        "[Nghe] Giải ETS Nghe Test 2: Bật tốc độ x1.2 để hack phản xạ thính giác.",
        "[Kỹ năng] Tối ưu hóa Sổ tay bứt phá: Rà soát các cụm từ collocations siêu khó.",

    window.onload = function() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
            renderRoadmap(JSON.parse(saved));
        }
    };

    function startAIAnalysis() {
        let current = parseInt(document.getElementById('currentScore').value);
        let target = parseInt(document.getElementById('targetScore').value);
        let userMonths = document.getElementById('months').value;

        if (isNaN(current) || isNaN(target) || current >= target || current < 0 || target > 990) {
            alert('Vui lòng nhập điểm hợp lệ (Mục tiêu phải lớn hơn hiện tại).');
            return;
        }

        // Chuyển UI sang trạng thái Loading giả lập AI
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';

        const statuses = [
            "Đang phân tích phổ điểm đầu vào...",
            "Đang trích xuất thuật toán học tập...",
            "Đang cấu trúc lộ trình cá nhân hóa...",
            "Hoàn tất! Đang khởi tạo giao diện..."
        ];
        
        let i = 0;
        const statusEl = document.getElementById('ai-status');
        const interval = setInterval(() => {
            i++;
            if (i < statuses.length) {
                statusEl.innerText = statuses[i];
            } else {
                clearInterval(interval);
                generateRoadmap(current, target, userMonths);
            }
        }, 800); // Mỗi bước 0.8 giây
    }

    function getRatio(score) {
        if (score <= 350) return (score / 350) * 0.35;
        if (score <= 550) return 0.35 + ((score - 350) / 200) * 0.25;
        if (score <= 750) return 0.60 + ((score - 550) / 200) * 0.25;
        return 0.85 + ((score - 750) / 240) * 0.15;
    }

    function generateRoadmap(current, target, userMonths) {
        let pointGap = target - current;
        let recommendedMonths = Math.max(1, Math.round(pointGap / 100 * 1.5));
        let months = userMonths ? parseFloat(userMonths) : recommendedMonths;
        let isRushed = (months < recommendedMonths * 0.65);

        let startIndex = Math.floor(getRatio(current) * masterCurriculum.length);
        let endIndex = Math.ceil(getRatio(target) * masterCurriculum.length);
        
        if(startIndex >= endIndex) endIndex = startIndex + 3;
        if(endIndex > masterCurriculum.length) endIndex = masterCurriculum.length;
        
        let selectedTasks = masterCurriculum.slice(startIndex, endIndex);
        
        let totalDays = Math.ceil(months * 28); // Giả định 1 tháng học 28 ngày
        let plan = { current, target, months, isRushed, recommendedMonths, pointGap, weeks: [] };
        let taskDistribution = Array.from({length: totalDays}, () => []);
        
        selectedTasks.forEach((task, i) => {
            let dayIndex = Math.floor((i / selectedTasks.length) * totalDays);
            taskDistribution[dayIndex].push(task);
        });

        const fillers = [
            "[Ôn tập] Lật lại sổ tay từ vựng, review các từ đã highlight.",
            "[Kỹ năng] Làm 1 bài Mini Test Nghe ngắn trên Youtube.",
            "[Đọc] Dịch chi tiết 1 bài báo tiếng Anh ngắn để tăng vốn từ thực tế.",
            "[Kỹ năng] Ôn lại các cấu trúc bẫy đã ghi chú trong tuần."
        ];

        taskDistribution.forEach((dayTasks, i) => {
            if (dayTasks.length === 0) dayTasks.push(fillers[i % fillers.length]);
        });

        let totalWeeks = Math.ceil(totalDays / 7);
        for (let w = 0; w < totalWeeks; w++) {
            let weekDays = [];
            for (let d = 0; d < 7; d++) {
                let dayIndex = w * 7 + d;
                if (dayIndex < totalDays) {
                    let tasksObj = taskDistribution[dayIndex].map((t, idx) => ({
                        id: `w${w}d${d}t${idx}`, text: t, completed: false
                    }));
                    weekDays.push({ dayNum: d + 1, tasks: tasksObj });
                }
            }
            plan.weeks.push({ weekNum: w + 1, days: weekDays });
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(plan));
        
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
            renderRoadmap(plan);
        }, 500);
    }

    function parseTaskText(rawText) {
        // Trích xuất thẻ [Tag] để style HTML
        const regex = /\[(.*?)\](.*)/;
        const match = rawText.match(regex);
        if (match) {
            let tagType = match[1].trim();
            let text = match[2].trim();
            let tagClass = 'tag';
            
            if(tagType.includes('Ngữ pháp')) tagClass += ' grammar';
            else if(tagType.includes('Nghe') || tagType.includes('Phát âm')) tagClass += ' listening';
            else if(tagType.includes('Đọc')) tagClass += ' reading';
            else if(tagType.includes('Từ vựng')) tagClass += ' vocab';
            else if(tagType.includes('Test') || tagType.includes('Kỹ năng')) tagClass += ' test';
            
            return `<span class="${tagClass}">${tagType}</span> <span>${text}</span>`;
        }
        return `<span>${rawText}</span>`;
    }

    function renderRoadmap(plan) {
        // Sinh Insight thông minh
        const insightEl = document.getElementById('ai-advice-text');
        let insightHTML = `Mục tiêu của bạn là tăng <b>${plan.pointGap} điểm</b> trong <b>${plan.months} tháng</b>. `;
        
        if (plan.isRushed) {
            insightHTML += `AI nhận thấy quỹ thời gian của bạn khá hẹp (khuyến nghị chuẩn là ${plan.recommendedMonths} tháng). Lộ trình đã được tối ưu hóa theo dạng "nước rút". Hãy ưu tiên 70% thời gian cho việc giải đề và rà soát lỗi sai nhé!`;
        } else if (plan.current < 400) {
            insightHTML += `Do đang ở giai đoạn nền tảng, AI đã ưu tiên phân bổ sâu vào từ vựng và ngữ pháp cốt lõi. Hãy kiên nhẫn xây chắc móng trước khi bước vào giải đề tốc độ.`;
        } else {
            insightHTML += `Quỹ thời gian rất lý tưởng. AI đã phân bổ đều các kỹ năng. Hãy duy trì thói quen học mỗi ngày, sự kỷ luật là chìa khóa!`;
        }
        insightEl.innerHTML = insightHTML;

        const container = document.getElementById('roadmap-content');
        container.innerHTML = '';
        
        let totalTasks = 0;
        let completedTasks = 0;

        plan.weeks.forEach((week, wIndex) => {
            const weekDiv = document.createElement('div');
            weekDiv.className = 'week-card';
            
            const header = document.createElement('div');
            header.className = 'week-header';
            header.innerHTML = `<span>Chặng Tuần ${week.weekNum}</span>`;
            weekDiv.appendChild(header);

            week.days.forEach((day, dIndex) => {
                const dayRow = document.createElement('div');
                dayRow.className = 'day-row';

                const dayBadge = document.createElement('div');
                dayBadge.className = 'day-badge';
                dayBadge.innerHTML = `<span class="day-num">${day.dayNum}</span><span class="day-text">Ngày</span>`;

                const taskList = document.createElement('div');
                taskList.className = 'tasks-container';

                day.tasks.forEach((task, tIndex) => {
                    totalTasks++;
                    if (task.completed) completedTasks++;

                    const item = document.createElement('label');
                    item.className = `task-item ${task.completed ? 'completed' : ''}`;
                    
                    const check = document.createElement('input');
                    check.type = 'checkbox';
                    check.checked = task.completed;
                    check.onchange = (e) => updateTask(wIndex, dIndex, tIndex, e.target.checked);

                    const content = document.createElement('div');
                    content.className = 'task-content';
                    content.innerHTML = parseTaskText(task.text);

                    item.appendChild(check);
                    item.appendChild(content);
                    taskList.appendChild(item);
                });

                dayRow.appendChild(dayBadge);
                dayRow.appendChild(taskList);
                weekDiv.appendChild(dayRow);
            });
            container.appendChild(weekDiv);
        });

        // Cập nhật Progress Bar
        let percent = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
        document.getElementById('progress-bar').style.width = percent + '%';
        document.getElementById('progress-percent').innerText = `${percent}% Hoàn thành`;
        document.getElementById('progress-count').innerText = `${completedTasks}/${totalTasks} Nhiệm vụ`;
    }

    function updateTask(w, d, t, isChecked) {
        let plan = JSON.parse(localStorage.getItem(STORAGE_KEY));
        plan.weeks[w].days[d].tasks[t].completed = isChecked;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(plan));
        renderRoadmap(plan); // Re-render để cập nhật % tiến độ
    }

    function resetApp() {
        if(confirm('Bạn có chắc chắn muốn xóa toàn bộ dữ liệu lộ trình hiện tại?')) {
            localStorage.removeItem(STORAGE_KEY);
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
            
            // Clear inputs
            document.getElementById('currentScore').value = '';
            document.getElementById('targetScore').value = '';
            document.getElementById('months').value = '';
        }
    }
</script>
